<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tron V2</title>
<link rel="stylesheet" href="../../Arcade/arcade-shell.css">
<style>
  :root { --bar-height: 66px; }                                                  /* tweak to taste */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Century Gothic', 'Futura', 'Segoe UI', system-ui, sans-serif;
  }
  /* El canvas ocupa sólo el área SOBRE la barra; ahí vive la pista de Tron (la grilla de colisiones se
     dimensiona a este rect). Tamaños seteados explícito desde JS en cada resize. */
  #c {
    display: block; position: absolute;
    top: 0; left: 0;
  }

  #hint {
    position: absolute; left: 0; right: 0; top: calc(10px + env(safe-area-inset-top));
    text-align: center; color: rgba(255,255,255,0.5);
    font-size: 13px; letter-spacing: 0.04em; pointer-events: none;
    transition: opacity 0.8s; z-index: 2; padding: 0 16px;
  }

  /* Barra inferior: gira al jugador humano (◄ ►) y Start/⏎ arranca o reinicia. Mismo shell que BallsWeb. */
  #bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(var(--bar-height) + env(safe-area-inset-bottom));
    padding: 0 16px env(safe-area-inset-bottom);
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 3;
  }
  #ui { display: flex; gap: 8px; }
  #ui button {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none;
    transition: background 0.1s, transform 0.08s;
    padding: 0;
  }
  #ui button:active { background: rgba(255,255,255,0.22); transform: scale(0.92); }
  #ui button svg { display: block; width: 24px; height: 24px; pointer-events: none; }

  /* Reset — reinicia la partida actual (mismos ajustes). Hueco a la derecha del bar. Mismo look que en Tron v1. */
  #btnReset {
    width: 30px; height: 30px; border-radius: 50%; flex: 0 0 auto; align-self: flex-end; margin-bottom: 6px;
    border: 1px solid rgba(255,255,255,0.45);
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
  }
  #btnReset svg { display: block; width: 15px; height: 15px; pointer-events: none; }
  #btnReset:active { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.6); color: #fff; transform: scale(0.9); }
  /* Botones ✕/⛶/ⓘ + overlay de salida vienen de arcade-shell.css. */
  #fpsOverlay {
    position: absolute;
    right: 40px;
    bottom: calc(env(safe-area-inset-bottom) + 8px);
    font-family: monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.6);
    padding: 3px 8px;
    border-radius: 4px;
    pointer-events: none;
    display: none;
    z-index: 9;
  }



</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">menú: tocá el texto para elegir · en juego: mitades de pantalla o ◄ ► para girar</div>
  <div id="bar">
  <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
<div id="ui">
      <button id="btnLeft"  aria-label="girar izquierda" title="Girar izquierda">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
      </button>
      <button id="btnRight" aria-label="girar derecha" title="Girar derecha">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
    <button id="btnReset" aria-label="reiniciar" title="Reiniciar partida">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg>
    </button>
    <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
    </button>
    <button id="btnInfo" aria-label="info" title="Info / FPS">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  TRON V2 — port web fiel de TronV2.py, con el shell mobile de BallsWeb.
  //  Light-cycles que dejan estela; morís si tu frente choca contra cualquier
  //  estela (incluida la propia). El campo hace wrap toroidal — no hay paredes.
  //
  //  El original detecta colisiones leyendo píxeles (windowSurface.get_at).
  //  Acá replicamos eso con una GRILLA DE OCUPACIÓN del tamaño del canvas
  //  (lectura O(1) — getImageData por píxel sería letal para los scans de la IA).
  //  La grilla = 1 donde hay estela; el canvas se dibuja en paralelo para mostrar.
  // ════════════════════════════════════════════════════════════════════
  const ri = (a, b) => a + Math.floor(Math.random() * (b - a + 1));               // randint inclusivo (como random.randint)

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // screenX/screenY del original (1280×720) ahora son responsive = tamaño del canvas.
  let W = 0, H = 0, dpr = 1, scl = 1;                                              // scl = factor de fuente (los px del original eran sobre 1280×720)
  let grid = new Uint8Array(0);                                                    // ocupación: grid[y*W+x] = 1 si hay estela

  const xper = p => p * W;
  const yper = p => p * H;

  // Lectura de ocupación con wrap toroidal y truncado tipo Python (floor + módulo positivo).
  function occ(fx, fy) {
    let xi = Math.floor(fx), yi = Math.floor(fy);
    xi = ((xi % W) + W) % W;
    yi = ((yi % H) + H) % H;
    return grid[yi * W + xi];
  }
  // Estampa un punto de estela (≈ el círculo radio-1 del original): 3×3 en la grilla + cuadradito en canvas.
  // OJO: recorta (no envuelve) las celdas fuera de pantalla, igual que pygame.draw.circle. Si envolviera
  // con módulo, al cruzar un borde dejaría una estela fantasma en el lado opuesto —justo donde el jugador
  // reaparece— y moriría al wrappear. La colisión occ() sí envuelve (como el `% SCREEN` del original).
  function stamp(x, y, color) {
    const ix = Math.floor(x), iy = Math.floor(y);
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const xi = ix + dx, yi = iy + dy;
        if (xi < 0 || xi >= W || yi < 0 || yi >= H) continue;                     // clip, no wrap
        grid[yi * W + xi] = 1;
      }
    }
    ctx.fillStyle = color;
    ctx.fillRect(ix - 1, iy - 1, 3, 3);                                           // el canvas recorta solo
  }

  function clearField() {
    grid.fill(0);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }

  const barEl = document.getElementById('bar');
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const barH = barEl.offsetHeight;
    W = Math.max(1, Math.floor(window.innerWidth));
    H = Math.max(1, Math.floor(window.innerHeight - barH));
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    scl = Math.min(W / 1280, H / 720);                                            // mantiene el texto adentro como en el original
    grid = new Uint8Array(W * H);
    // Cambiar de tamaño invalida la pista; volvemos al menú (la grilla vieja no sirve).
    backToMenu();
  }
  window.addEventListener('resize', resize);

  // ── COLORES ──
  const PLAYER_COLORS = [ [0,155,255], [255,0,155], [255,155,0], [0,255,155] ];
  const rgb = c => `rgb(${c[0]},${c[1]},${c[2]})`;
  const clamp255 = v => Math.max(0, Math.min(255, v | 0));
  const modifyColorPerc = (c, off) => `rgb(${clamp255(c[0]*off)},${clamp255(c[1]*off)},${clamp255(c[2]*off)})`;

  // texto centrado (port de createText; siempre 'center' en el original). size en px del original → ×scl.
  function createText(size, content, color, fx, fy) {
    ctx.font = Math.round(size * scl) + "px 'Century Gothic', 'Futura', system-ui, sans-serif";
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = color;
    ctx.fillText(content, xper(fx), yper(fy));
  }

  // ════════════════ PLAYER (port de la clase Player) ════════════════
  // directions[dir] = [vx, vy,  dx2,dy2,  dx4,dy4,  dx100,dy100]
  //   [0,1]   = velocidad (px/s, ×deltaT×1.5)
  //   [2,3]   = look-ahead inmediato (2 px) → muerte si está ocupado
  //   [4,5]   = look-ahead medio (4 px) → la IA lo usa para anticipar
  //   [6,7]   = scout lejano (≈100 px) que la IA randomiza cada 2 s
  // NOTA: el immediate look-ahead [2,3] del original era asimétrico (derecha/abajo a 1 px), un ajuste
  // al círculo radio-1 de pygame. Con la estela 3×3 (±1 px) de acá, 1 px caería sobre la propia estela
  // y matarías al girar a derecha/abajo. Lo hacemos simétrico a 2 px (> medio-ancho de la estela).
  function dirTemplate() {
    return {
      0: [0,-150, 0,-2, 0,-4, 0,-100],   // arriba
      1: [150,0, 2,0, 4,0, 100,0],       // derecha
      2: [0,150, 0,2, 0,4, 0,100],       // abajo
      3: [-150,0, -2,0, -4,0, -100,0],   // izquierda
    };
  }

  class Player {
    constructor(id, totalplayers, mode) {
      this.id = id;
      this.direction = 0;
      this.directions = dirTemplate();
      this.currentMode = mode;
      this.leftpressed = false;
      this.rightpressed = false;
      this.stop = false;
      this.alive = true;
      this.aiTurnInCD = 0;
      this.aiRandDistToTurnCD = 2;
      this.maxDistanceDir = null;
      this.premaxDistanceDir = null;

      const n = totalplayers;
      const startpos = {
        0: [ (n < 4 ? 0.75 : 0.8), 0.95 ],
        1: [ (n < 4 ? 0.25 : 0.2), (n === 4 ? 0.65 : 0.95) ],
        2: [ (n < 4 ? 0.5  : 0.6), (n === 4 ? 0.85 : 0.95) ],
        3: [ 0.4, 0.75 ],
      };
      this.color = rgb(PLAYER_COLORS[id]);
      this.x = xper(startpos[id][0]);
      this.y = yper(startpos[id][1]);
    }

    // giro manual (botones / mitades de pantalla) — sólo el humano
    turnLeft()  { this.direction = (this.direction - 1 + 4) % 4; }
    turnRight() { this.direction = (this.direction + 1) % 4; }

    process(dt) {
      const d = this.directions;

      if (this.id === 0 || this.currentMode === 1) {
        // ── HUMANO ── latch igual que el original: un giro por pulsación.
        if (!this.leftpressed && keys[this.left])  { this.direction = (this.direction - 1 + 4) % 4; this.leftpressed = true; }
        if (!this.rightpressed && keys[this.right]) { this.direction = (this.direction + 1) % 4;     this.rightpressed = true; }
        if (!keys[this.left])  this.leftpressed = false;
        if (!keys[this.right]) this.rightpressed = false;
      } else {
        // ── IA ──
        this.aiRandDistToTurnCD += dt;
        this.aiTurnInCD += dt;

        if (this.aiRandDistToTurnCD > 2) {
          d[0][7] = ri(-100, -25);
          d[1][6] = ri(25, 100);
          d[2][7] = ri(25, 100);
          d[3][6] = ri(-100, -25);
          this.aiRandDistToTurnCD = 0;
        }

        const maxDistances = [0, 0, 0, 0];
        for (let dT = 2; dT < H; dT++) { if (occ(this.x, this.y - dT)) { maxDistances[0] = dT; break; } }   // arriba
        for (let dB = 2; dB < H; dB++) { if (occ(this.x, this.y + dB)) { maxDistances[2] = dB; break; } }   // abajo
        for (let dL = 2; dL < W; dL++) { if (occ(this.x - dL, this.y)) { maxDistances[3] = dL; break; } }   // izquierda
        for (let dR = 2; dR < W; dR++) { if (occ(this.x + dR, this.y)) { maxDistances[1] = dR; break; } }   // derecha

        this.premaxDistanceDir = this.maxDistanceDir;
        this.maxDistanceDir = indexOfMax(maxDistances);

        if (this.aiTurnInCD > 0.05) {
          const dir = this.direction;
          if (occ(this.x + d[dir][2], this.y + d[dir][3])) { this.direction = this.maxDistanceDir; this.aiTurnInCD = 0; }
          else if (occ(this.x + d[dir][4], this.y + d[dir][5])) { this.direction = this.maxDistanceDir; this.aiTurnInCD = 0; }
          else if (occ(this.x + d[dir][6], this.y + d[dir][7])) { this.direction = this.maxDistanceDir; this.aiTurnInCD = 0; }
          else if (this.maxDistanceDir !== this.premaxDistanceDir) { this.direction = this.maxDistanceDir; this.aiTurnInCD = 0; }
          else if (ri(0, 1000) === 0) {
            const dR1 = (dir + 1) % 4, dL1 = (dir - 1 + 4) % 4;
            const canTurnRight = occ(this.x + d[dR1][2], this.y + d[dR1][3]) === 0;
            const canTurnLeft  = occ(this.x + d[dL1][2], this.y + d[dL1][3]) === 0;
            if (ri(0, 1) === 0 && canTurnRight && occ(this.x + d[dR1][4], this.y + d[dR1][5]) === 0) {
              this.direction = dR1;
            } else if (canTurnLeft && occ(this.x + d[dL1][4], this.y + d[dL1][5]) === 0) {
              this.direction = dL1;
            }
            this.aiTurnInCD = 0;
          }
        }
      }

      // wrap toroidal en los bordes (idéntico al original)
      this.x = this.x > W ? 0 : this.x < 0 ? W : this.x;
      this.y = this.y > H ? 0 : this.y < 0 ? H : this.y;

      // muerte: si el frente (look-ahead 2 px) está ocupado
      const dir = this.direction;
      if (occ(this.x + d[dir][2], this.y + d[dir][3])) { this.alive = false; return; }

      if (!this.stop) {
        this.x += d[dir][0] * dt * 1.5;
        this.y += d[dir][1] * dt * 1.5;
      }
    }

    draw() { stamp(this.x, this.y, this.color); }
  }

  function indexOfMax(arr) {
    let m = 0;
    for (let i = 1; i < arr.length; i++) if (arr[i] > arr[m]) m = i;
    return m;
  }

  // ════════════════ GAME HANDLER (menú + estado) ════════════════
  const gh = {
    menu: true,
    currentOption: 0,           // 0 = modo, 1 = cantidad de colores
    currentPlayers: 0,          // +2 → 2..4
    currentMode: 0,             // 0 = single, 1 = multi
    keyPressed: false,
    titleColor: PLAYER_COLORS[ri(0, 3)].slice(),
    titleColorOffset: 1,
    titleColorOffsetTimer: 0,
    titleColorUpping: true,
  };
  let players = [];

  function aliveCount() { let n = 0; for (const p of players) if (p.alive) n++; return n; }

  function startGame() {
    const n = gh.currentPlayers + 2;
    clearField();
    players = [];
    for (let i = 0; i < n; i++) players.push(new Player(i, n, gh.currentMode));
    bindControls();
    gh.menu = false;
  }
  function restart() { startGame(); }
  function backToMenu() {
    clearField();
    players = [];
    gh.menu = true;
    gh.keyPressed = true;                                                          // evita que una tecla sostenida dispare el menú al instante
  }

  // mapeo de teclas por jugador (igual que el original): P1 ←/↓, P2 Q/W, P3 O/P, P4 V/B
  const CONTROLS = [
    ['ArrowLeft', 'ArrowDown'],
    ['KeyQ', 'KeyW'],
    ['KeyO', 'KeyP'],
    ['KeyV', 'KeyB'],
  ];
  function bindControls() {
    for (const p of players) { p.left = CONTROLS[p.id][0]; p.right = CONTROLS[p.id][1]; }
  }

  function processMenu() {
    if (!gh.keyPressed) {
      const optDelta = keys.ArrowUp ? -1 : keys.ArrowDown ? 1 : 0;
      gh.currentOption = (gh.currentOption + optDelta + 2) % 2;

      const valDelta = keys.ArrowLeft ? -1 : keys.ArrowRight ? 1 : 0;
      if (gh.currentOption === 0) gh.currentMode = (gh.currentMode + valDelta + 2) % 2;
      else                        gh.currentPlayers = (gh.currentPlayers + valDelta + 3) % 3;

      if (keys.Enter) startGame();

      gh.keyPressed = keys.ArrowUp || keys.ArrowDown || keys.ArrowLeft || keys.ArrowRight;
    }
    if (!keys.ArrowUp && !keys.ArrowDown && !keys.ArrowLeft && !keys.ArrowRight) gh.keyPressed = false;
  }

  function drawMenu(dt) {
    // título con color animado (port del oscilado de offset 0↔1.5 + cambio de color al tocar fondo)
    if (gh.titleColorOffset > 1.5) gh.titleColorUpping = false;
    if (gh.titleColorOffset < 0 && !gh.titleColorUpping) {
      gh.titleColorUpping = true;
      let c = gh.titleColor;
      while (c === gh.titleColor) gh.titleColor = PLAYER_COLORS[ri(0, 3)];
    }
    gh.titleColorOffsetTimer += dt;
    if (gh.titleColorOffsetTimer > 0.01) {
      gh.titleColorOffset += (gh.titleColorUpping ? dt * 30 : -dt * 30);
      gh.titleColorOffsetTimer = 0;
    }
    const titleColor = modifyColorPerc(gh.titleColor, gh.titleColorOffset);

    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    createText(170, 'TRON', titleColor, 0.5, 0.2);
    createText(50, gh.currentMode === 0 ? 'Single Player' : 'Multi Player',
               gh.currentOption === 0 ? 'rgb(255,255,255)' : 'rgb(60,60,60)', 0.5, 0.5);
    createText(50, (gh.currentPlayers + 2) + ' Colors',
               gh.currentOption === 1 ? 'rgb(255,255,255)' : 'rgb(60,60,60)', 0.5, 0.65);
    createText(25, 'Enter / ▶ to Start', 'rgb(100,100,150)', 0.5, 0.85);
    createText(25, 'tocá el texto para elegir', 'rgb(100,100,150)', 0.5, 0.9);
  }

  function drawWinner() {
    const w = players.find(p => p.alive);
    if (!w) return;
    const name = 'Player ' + (w.id + 1);
    createText(100, name + ' Wins!', w.color, 0.5, 0.45);
    createText(60, 'Enter / ▶ to Restart', 'rgb(255,255,255)', 0.5, 0.6);
  }

  // ════════════════ INPUT ════════════════
  const keys = {};                                                                // e.code → bool
  function gameOver() { return !gh.menu && aliveCount() <= 1; }

  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (!gh.menu) {
      if (e.code === 'Escape') backToMenu();
      else if (e.code === 'Enter' && gameOver()) restart();
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Enter'].includes(e.code)) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  // Toque en el canvas: en menú elige según la zona vertical; en juego gira al humano (mitades) o reinicia.
  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    const fx = (e.clientX - r.left) / W, fy = (e.clientY - r.top) / H;
    if (gh.menu) {
      if (fy < 0.58)      { gh.currentOption = 0; gh.currentMode = (gh.currentMode + 1) % 2; }
      else if (fy < 0.78) { gh.currentOption = 1; gh.currentPlayers = (gh.currentPlayers + 1) % 3; }
      else                  startGame();
    } else if (gameOver()) {
      restart();
    } else {
      const p0 = players.find(p => p.id === 0 && p.alive);
      if (p0) (fx < 0.5 ? p0.turnLeft() : p0.turnRight());
    }
  });

  // botones de la barra. pointerdown (no click) para que respondan aun con otro toque activo (estilo BallsWeb).
  function tappable(el, fn) { el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); }); }
  function menuChangeValue(delta) {
    if (gh.currentOption === 0) gh.currentMode = (gh.currentMode + delta + 2) % 2;
    else                        gh.currentPlayers = (gh.currentPlayers + delta + 3) % 3;
  }
  function humanTurn(side) {
    const p0 = players.find(p => p.id === 0 && p.alive);
    if (p0) (side < 0 ? p0.turnLeft() : p0.turnRight());
  }
  tappable(document.getElementById('btnLeft'),  () => { gh.menu ? menuChangeValue(-1) : humanTurn(-1); });
  tappable(document.getElementById('btnRight'), () => { gh.menu ? menuChangeValue(+1) : humanTurn(+1); });
  tappable(document.getElementById('btnReset'), () => { if (!gh.menu) restart(); });   // mismo patrón que Tron v1: reinicia la partida actual

  // ════════════════ LOOP ════════════════
  let lastT = performance.now();
  function loop(now) {
    if (typeof now !== 'number') now = performance.now();
    const dt = Math.min((now - lastT) / 1000, 0.01);                              // deltaT = min(real, 0.01), igual que el original
    lastT = now;

    if (gh.menu) {
      processMenu();
      drawMenu(dt);
    } else {
      for (const p of players) {
        if (!p.alive) continue;
        p.process(dt);
        if (p.alive) p.draw();                                                    // estampa estela sólo si sigue vivo tras el chequeo
      }
      if (aliveCount() <= 1) {                                                     // game over: frenar a todos y mostrar ganador
        for (const p of players) p.stop = true;
        drawWinner();
      }
    }
    requestAnimationFrame(loop);
  }

  // ── INIT ──
  resize();
  loop();

  const hint = document.getElementById('hint');
  setTimeout(() => hint.style.opacity = '0', 6000);
  canvas.addEventListener('pointerdown', () => hint.style.opacity = '0', { once: true });
  </script>

  <!-- Shell del Arcade (exit + fullscreen + lock de orientación). data-orient: landscape/portrait/any. -->
  <script src="../../Arcade/arcade-shell.js" data-orient="landscape"></script>

  <div id="fpsOverlay">FPS: --</div>
  <script>
    (function() {
      let frameCount = 0, lastT = performance.now();
      const overlay = document.getElementById('fpsOverlay');
      function loop() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          const fps = Math.round(frameCount * 1000 / (now - lastT));
          if (overlay.style.display !== 'none') overlay.textContent = 'FPS: ' + fps;
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(loop);
      }
      loop();
      const btn = document.getElementById('btnInfo');
      btn.addEventListener('click', () => {
        const showing = overlay.style.display !== 'none';
        overlay.style.display = showing ? 'none' : 'block';
        btn.classList.toggle('on', !showing);
      });
    })();
  </script>


</body>
