<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tron V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../Arcade/arcade-shell.css">
<style>
  :root { --bar-height: 66px; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Orbitron', 'Segoe UI', system-ui, sans-serif;
  }
  /* Canvas a PANTALLA COMPLETA (sin barra que ocupe alto) — UI = botones de esquina + control por toque,
     estilo CrazyTanks/Pong. */
  #c { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

  #hint {
    position: absolute; left: 0; right: 0; top: calc(10px + env(safe-area-inset-top));
    text-align: center; color: rgba(255,255,255,0.5);
    font-size: 13px; letter-spacing: 0.04em; pointer-events: none;
    transition: opacity 0.8s; z-index: 2; padding: 0 16px;
  }

  /* Cluster de botones de esquina (arriba-derecha): ⟳ reiniciar · ⓘ info · ⛶ pantalla · ✕ salir.
     El look tenue de ✕/⛶/ⓘ lo da arcade-shell.css; acá sólo los posicionamos. */
  #corner {
    position: absolute; z-index: 10;
    top: calc(8px + env(safe-area-inset-top));
    right: calc(8px + env(safe-area-inset-right));
    display: flex; gap: 8px;
  }
  #corner button { align-self: center; margin: 0; }                              /* normaliza el align-self/margin del shell */
  #btnPause, #btnMenu {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.55);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
  }
  #btnPause svg, #btnMenu svg { display: block; width: 15px; height: 15px; pointer-events: none; }
  #btnPause:active, #btnMenu:active { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.6); color: #fff; transform: scale(0.9); }
  #btnPause.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.6); color: #fff; }
  /* pausa + menu sólo en juego (no en el menú) */
  body:not(.playing) #btnPause, body:not(.playing) #btnMenu { display: none; }
  #fpsOverlay {
    position: absolute;
    left: calc(8px + env(safe-area-inset-left));
    top: calc(8px + env(safe-area-inset-top));
    font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px; line-height: 18px;
    color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.55); padding: 4px 6px;
    pointer-events: none; display: none; z-index: 9;
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">en juego: tocá la mitad izq/der de la pantalla para doblar · la cámara te sigue</div>
  <!-- Orden como Pong: ⏸ pausa · ⌫ menu · ⛶ pantalla · ⓘ info · ✕ salir -->
  <div id="corner">
    <button id="btnPause" aria-label="pausa" title="Pausa">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </button>
    <button id="btnMenu" aria-label="volver al menú" title="Volver al menú">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><path d="M18 9l-6 6M12 9l6 6"/></svg>
    </button>
    <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
    </button>
    <button id="btnInfo" aria-label="info" title="Info / FPS">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
    </button>
    <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  TRON V2 — port web de TronV2.py con MUNDO GRANDE + cámara que sigue al jugador
  //  (como Snake/CrazyTanks), borde y obstáculos blancos, y minimapa. Visuales de la
  //  v1: paleta neón, bloom barato, cabeza que se desvanece al color base, fuente Orbitron.
  //
  //  Colisiones por GRILLA DE OCUPACIÓN del tamaño del MUNDO (no de la pantalla): grid=1 en
  //  estelas, borde y obstáculos. Fuera del mundo también cuenta como pared. La estela viaja
  //  a un canvas offscreen del mundo y la cámara blitea sólo la porción visible.
  // ════════════════════════════════════════════════════════════════════
  const ri  = (a, b) => a + Math.floor(Math.random() * (b - a + 1));              // randint inclusivo
  const rnd = (a, b) => a + Math.random() * (b - a);
  const TAU = Math.PI * 2;

  // ── TUNING ──
  const SPEED_MULT  = 1.6;                                                         // velocidad de las cycles
  const HEAD_FADE   = 0.6;                                                         // seg que tarda la cabeza en bajar al color base
  const HEAD_GLOW   = 16;                                                          // shadowBlur del núcleo de la cabeza
  const HEAD_DOT    = 2.0;                                                         // radio del núcleo blanco de la cabeza
  const TRAIL_BLOOM = 6;                                                           // desenfoque del halo neón (0 = sin glow)
  const BG          = '#03060d';                                                   // fondo casi negro
  const FONT        = "'Orbitron', 'Segoe UI', system-ui, sans-serif";

  // ── MUNDO ── más grande que la pantalla; la cámara sigue al jugador y se clampa al mundo.
  const WORLD_W = 2400, WORLD_H = 1600;
  const CELL    = 64;                                                              // paso de la grilla visual de arena
  const GRID_ALPHA = 0.05;                                                         // opacidad de las rayas blancas del mapa
  const BORDER  = 12;                                                              // grosor del borde blanco (px de mundo)
  const AI_SCAN = 340;                                                             // tope de anticipación de la IA (px) — no escanear todo el mundo
  // Minimapa: las estelas se dibujan NATIVAMENTE a esta resolución (no se dilata el trail grande), así el
  // escalado al minimapa es limpio y fiel. Proporcional al mundo.
  const MINI_W = 360, MINI_H = Math.round(MINI_W * WORLD_H / WORLD_W);
  const MINI_S = MINI_W / WORLD_W;                                                  // factor mundo → minimapa

  // ── IA (estilo V2: elige la dirección con más espacio libre) ──

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0, dpr = 1, scl = 1;                                              // viewport (ventana)
  let camX = 0, camY = 0;                                                          // esquina sup-izq de la cámara (coords de mundo)
  let grid = new Uint8Array(WORLD_W * WORLD_H);                                    // ocupación del MUNDO
  let trailCv = null, tctx = null;                                                // estela neón (mundo, transparente)
  let bgCv = null, bctx = null;                                                    // fondo estático horneado (grilla + borde + obstáculos)
  let glowCv = null, gctx = null;                                                  // buffer de glow a media resolución (viewport)
  let miniCv = null, mctx = null;                                                  // estelas a resolución de minimapa (escalado limpio)
  let obstacles = [];                                                              // sólo para referencia/depuración

  // ── OCUPACIÓN (mundo acotado: fuera del mundo = pared) ──
  function occ(fx, fy) {
    const xi = Math.floor(fx), yi = Math.floor(fy);
    if (xi < 0 || xi >= WORLD_W || yi < 0 || yi >= WORLD_H) return 1;
    return grid[yi * WORLD_W + xi];
  }
  function markCell(ix, iy) {
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const xi = ix + dx, yi = iy + dy;
        if (xi < 0 || xi >= WORLD_W || yi < 0 || yi >= WORLD_H) continue;
        grid[yi * WORLD_W + xi] = 1;
      }
    }
  }
  function markRect(x, y, w, h) {                                                  // ocupa un rect en la grilla
    const x0 = Math.max(0, Math.floor(x)), y0 = Math.max(0, Math.floor(y));
    const x1 = Math.min(WORLD_W, Math.ceil(x + w)), y1 = Math.min(WORLD_H, Math.ceil(y + h));
    for (let yy = y0; yy < y1; yy++) for (let xx = x0; xx < x1; xx++) grid[yy * WORLD_W + xx] = 1;
  }
  function markDisc(cx, cy, r) {
    const x0 = Math.max(0, Math.floor(cx - r)), y0 = Math.max(0, Math.floor(cy - r));
    const x1 = Math.min(WORLD_W, Math.ceil(cx + r)), y1 = Math.min(WORLD_H, Math.ceil(cy + r));
    const r2 = r * r;
    for (let yy = y0; yy < y1; yy++) for (let xx = x0; xx < x1; xx++) {
      const ddx = xx - cx, ddy = yy - cy;
      if (ddx * ddx + ddy * ddy <= r2) grid[yy * WORLD_W + xx] = 1;
    }
  }

  // Pinta un tramo de estela continuo (línea de (x0,y0) a (x1,y1)) en grilla + canvas offscreen.
  function paintTrail(x0, y0, x1, y1, color, connect) {
    if (connect) {
      const steps = Math.max(1, Math.ceil(Math.hypot(x1 - x0, y1 - y0)));
      for (let s = 0; s <= steps; s++) {
        const u = s / steps;
        markCell(Math.floor(x0 + (x1 - x0) * u), Math.floor(y0 + (y1 - y0) * u));
      }
      tctx.strokeStyle = color; tctx.lineWidth = 3; tctx.lineCap = 'round'; tctx.lineJoin = 'round';
      tctx.beginPath(); tctx.moveTo(x0, y0); tctx.lineTo(x1, y1); tctx.stroke();
      mctx.strokeStyle = color; mctx.lineWidth = 1.6; mctx.lineCap = 'round'; mctx.lineJoin = 'round';
      mctx.beginPath(); mctx.moveTo(x0 * MINI_S, y0 * MINI_S); mctx.lineTo(x1 * MINI_S, y1 * MINI_S); mctx.stroke();
    } else {
      markCell(Math.floor(x1), Math.floor(y1));
      tctx.fillStyle = color; tctx.fillRect(Math.floor(x1) - 1, Math.floor(y1) - 1, 3, 3);
      mctx.fillStyle = color; mctx.beginPath(); mctx.arc(x1 * MINI_S, y1 * MINI_S, 0.9, 0, TAU); mctx.fill();
    }
  }

  // ── COLORES neón (visuales de v1) ──
  const PLAYER_COLORS = [ [0,240,255], [255,120,0], [120,255,30], [255,40,200] ];
  const rgb  = c => `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
  const rgba = (c, a) => `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
  const lerpC = (a, b, t) => [ a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t ];
  function hot(base, t) {                                                          // cola → base ; cabeza → casi blanco
    const wt = Math.max(0, t) * Math.max(0, t) * 0.75;
    return [ base[0]+(255-base[0])*wt, base[1]+(255-base[1])*wt, base[2]+(255-base[2])*wt ];
  }

  function roundRectPath(c, x, y, w, h, r) {
    r = Math.min(r, h / 2, w / 2);
    c.beginPath();
    c.moveTo(x + r, y); c.arcTo(x + w, y, x + w, y + h, r); c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r); c.arcTo(x, y, x + w, y, r); c.closePath();
  }
  // texto centrado con glow opcional + caja redondeada opcional (para JUGAR).
  function createText(size, content, color, fx, fy, glow = 0, boxColor = null) {
    const fp = Math.round(size * scl);
    ctx.font = `600 ${fp}px ${FONT}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const px = W * fx, py = H * fy;
    if (boxColor) {
      const w = ctx.measureText(content).width, pad = fp * 0.45;
      ctx.fillStyle = boxColor;
      roundRectPath(ctx, px - w / 2 - pad, py - fp * 0.7, w + pad * 2, fp * 1.4, fp * 0.35);
      ctx.fill();
    }
    if (glow > 0) { ctx.shadowColor = color; ctx.shadowBlur = glow; }
    ctx.fillStyle = color;
    ctx.fillText(content, px, py);
    ctx.shadowBlur = 0;
  }

  // ════════════════ MUNDO: cámara, fondo horneado, obstáculos ════════════════
  function updateCamera() {
    // SIEMPRE el player 0 (el humano), vivo o muerto. Al morir, su x/y quedan congeladas → la cámara no
    // se mueve a otro lado cuando perdés.
    const p = players.find(q => q.id === 0) || players[0];
    const px = p ? p.x : WORLD_W / 2, py = p ? p.y : WORLD_H / 2;
    camX = Math.floor(Math.max(0, Math.min(px - W / 2, WORLD_W - W)));
    camY = Math.floor(Math.max(0, Math.min(py - H / 2, WORLD_H - H)));
    if (WORLD_W < W) camX = Math.floor((WORLD_W - W) / 2);                          // mundo más chico que viewport (raro): centrar
    if (WORLD_H < H) camY = Math.floor((WORLD_H - H) / 2);
  }

  function startposFor(id, n) {
    const cx = WORLD_W / 2, y = WORLD_H * 0.82, spread = WORLD_W * 0.12;
    return [ cx + (id - (n - 1) / 2) * spread, y ];
  }

  // Genera obstáculos aleatorios (rect / disco / barra) evitando los spawns y el borde.
  function genObstacles(spawns) {
    const list = [];
    const margin = WORLD_W * 0.05;
    const clearR = Math.min(WORLD_W, WORLD_H) * 0.16;                              // zona libre alrededor de cada spawn
    const target = ri(10, 16);
    let attempts = 0;
    while (list.length < target && attempts < 400) {
      attempts++;
      const kind = ri(0, 3);
      let o;
      if (kind === 0) {                                                            // rect
        const w = rnd(WORLD_W * 0.05, WORLD_W * 0.13), h = rnd(WORLD_H * 0.06, WORLD_H * 0.16);
        o = { kind, x: rnd(margin, WORLD_W - margin - w), y: rnd(margin, WORLD_H - margin - h), w, h };
      } else if (kind === 1) {                                                     // disco
        const r = rnd(WORLD_W * 0.03, WORLD_W * 0.065);
        o = { kind, cx: rnd(margin + r, WORLD_W - margin - r), cy: rnd(margin + r, WORLD_H - margin - r), r };
      } else {                                                                     // barra (horizontal o vertical)
        const long = rnd(WORLD_W * 0.16, WORLD_W * 0.26), thin = rnd(20, 34);
        const horiz = kind === 2;
        const w = horiz ? long : thin, h = horiz ? thin : long;
        o = { kind: 0, x: rnd(margin, WORLD_W - margin - w), y: rnd(margin, WORLD_H - margin - h), w, h };
      }
      // bounding circle del obstáculo
      const ox = o.kind === 1 ? o.cx : o.x + o.w / 2;
      const oy = o.kind === 1 ? o.cy : o.y + o.h / 2;
      const orad = o.kind === 1 ? o.r : Math.hypot(o.w, o.h) / 2;
      let ok = true;
      for (const s of spawns) if (Math.hypot(ox - s[0], oy - s[1]) < clearR + orad) { ok = false; break; }
      for (const q of list) {                                                       // no encimar demasiado
        const qx = q.kind === 1 ? q.cx : q.x + q.w / 2, qy = q.kind === 1 ? q.cy : q.y + q.h / 2;
        const qr = q.kind === 1 ? q.r : Math.hypot(q.w, q.h) / 2;
        if (Math.hypot(ox - qx, oy - qy) < orad + qr + WORLD_W * 0.02) { ok = false; break; }
      }
      if (ok) list.push(o);
    }
    return list;
  }

  // ── DECORACIÓN "tech" (blanca) compartida por obstáculos y borde: relleno tenue + hatch diagonal +
  // doble contorno + esquinas tipo brackets. Todo se hornea una vez en bgCv. ──
  function detailRect(c, x, y, w, h) {
    c.save();
    c.fillStyle = 'rgba(255,255,255,0.07)'; c.fillRect(x, y, w, h);
    c.beginPath(); c.rect(x, y, w, h); c.clip();                                   // hatch diagonal clippeado
    c.strokeStyle = 'rgba(255,255,255,0.10)'; c.lineWidth = 1; c.beginPath();
    for (let i = -h; i < w; i += 14) { c.moveTo(x + i, y); c.lineTo(x + i + h, y + h); }
    c.stroke();
    c.restore();
    c.strokeStyle = 'rgba(255,255,255,0.85)'; c.lineWidth = 2; c.strokeRect(x + 1, y + 1, w - 2, h - 2);
    c.strokeStyle = 'rgba(255,255,255,0.30)'; c.lineWidth = 1; c.strokeRect(x + 5, y + 5, w - 10, h - 10);
    c.strokeStyle = '#fff'; c.lineWidth = 2.5;                                     // brackets en las esquinas
    const cl = Math.min(16, w * 0.3, h * 0.3);
    c.beginPath();
    c.moveTo(x, y + cl); c.lineTo(x, y); c.lineTo(x + cl, y);
    c.moveTo(x + w - cl, y); c.lineTo(x + w, y); c.lineTo(x + w, y + cl);
    c.moveTo(x + w, y + h - cl); c.lineTo(x + w, y + h); c.lineTo(x + w - cl, y + h);
    c.moveTo(x + cl, y + h); c.lineTo(x, y + h); c.lineTo(x, y + h - cl);
    c.stroke();
  }
  function detailDisc(c, cx, cy, r) {
    c.save();
    c.fillStyle = 'rgba(255,255,255,0.07)'; c.beginPath(); c.arc(cx, cy, r, 0, TAU); c.fill();
    c.clip();                                                                      // hatch diagonal dentro del disco
    c.strokeStyle = 'rgba(255,255,255,0.10)'; c.lineWidth = 1; c.beginPath();
    for (let i = -2 * r; i < 2 * r; i += 14) { c.moveTo(cx - r + i, cy - r); c.lineTo(cx - r + i + 2 * r, cy + r); }
    c.stroke();
    c.restore();
    c.strokeStyle = 'rgba(255,255,255,0.85)'; c.lineWidth = 2; c.beginPath(); c.arc(cx, cy, r - 1, 0, TAU); c.stroke();
    c.strokeStyle = 'rgba(255,255,255,0.30)'; c.lineWidth = 1; c.beginPath(); c.arc(cx, cy, r - 5, 0, TAU); c.stroke();
    c.strokeStyle = 'rgba(255,255,255,0.45)'; c.beginPath(); c.arc(cx, cy, r * 0.32, 0, TAU); c.stroke();
    c.fillStyle = '#fff'; c.beginPath(); c.arc(cx, cy, 2, 0, TAU); c.fill();
    c.strokeStyle = '#fff'; c.lineWidth = 2; c.beginPath();                        // 8 ticks radiales en el borde
    for (let a = 0; a < TAU; a += TAU / 8) {
      c.moveTo(cx + Math.cos(a) * (r - 1), cy + Math.sin(a) * (r - 1));
      c.lineTo(cx + Math.cos(a) * (r - 8), cy + Math.sin(a) * (r - 8));
    }
    c.stroke();
  }
  // Borde del mundo con el MISMO motivo: banda tenue + doble frame + ticks + brackets grandes en esquinas.
  function detailBorder(c) {
    const B = BORDER;
    c.fillStyle = 'rgba(255,255,255,0.06)';
    c.fillRect(0, 0, WORLD_W, B); c.fillRect(0, WORLD_H - B, WORLD_W, B);
    c.fillRect(0, 0, B, WORLD_H); c.fillRect(WORLD_W - B, 0, B, WORLD_H);
    c.strokeStyle = 'rgba(255,255,255,0.9)'; c.lineWidth = 2; c.strokeRect(1, 1, WORLD_W - 2, WORLD_H - 2);
    c.strokeStyle = 'rgba(255,255,255,0.4)'; c.lineWidth = 1; c.strokeRect(B, B, WORLD_W - 2 * B, WORLD_H - 2 * B);
    c.strokeStyle = 'rgba(255,255,255,0.5)'; c.lineWidth = 1; c.beginPath();
    for (let x = 60; x < WORLD_W; x += 60) { c.moveTo(x, 0); c.lineTo(x, B); c.moveTo(x, WORLD_H - B); c.lineTo(x, WORLD_H); }
    for (let y = 60; y < WORLD_H; y += 60) { c.moveTo(0, y); c.lineTo(B, y); c.moveTo(WORLD_W - B, y); c.lineTo(WORLD_W, y); }
    c.stroke();
    c.strokeStyle = '#fff'; c.lineWidth = 3; const cl = 42; c.beginPath();
    c.moveTo(0, cl); c.lineTo(0, 0); c.lineTo(cl, 0);
    c.moveTo(WORLD_W - cl, 0); c.lineTo(WORLD_W, 0); c.lineTo(WORLD_W, cl);
    c.moveTo(WORLD_W, WORLD_H - cl); c.lineTo(WORLD_W, WORLD_H); c.lineTo(WORLD_W - cl, WORLD_H);
    c.moveTo(cl, WORLD_H); c.lineTo(0, WORLD_H); c.lineTo(0, WORLD_H - cl);
    c.stroke();
  }

  // Hornea el fondo del mundo (grilla blanca tenue + borde + obstáculos detallados) en bgCv, y marca
  // borde + obstáculos en la grilla de colisión.
  function buildWorld() {
    const n = gh.currentPlayers + 2;
    const spawns = []; for (let i = 0; i < n; i++) spawns.push(startposFor(i, n));
    obstacles = genObstacles(spawns);

    bctx.setTransform(1, 0, 0, 1, 0, 0);
    bctx.fillStyle = BG; bctx.fillRect(0, 0, WORLD_W, WORLD_H);

    // grilla de arena (rayas blancas tenues)
    bctx.strokeStyle = `rgba(255,255,255,${GRID_ALPHA})`; bctx.lineWidth = 1;
    bctx.beginPath();
    for (let x = CELL; x < WORLD_W; x += CELL) { bctx.moveTo(x + 0.5, 0); bctx.lineTo(x + 0.5, WORLD_H); }
    for (let y = CELL; y < WORLD_H; y += CELL) { bctx.moveTo(0, y + 0.5); bctx.lineTo(WORLD_W, y + 0.5); }
    bctx.stroke();

    // obstáculos detallados (formas blancas tipo tech) + marca de colisión
    for (const o of obstacles) {
      if (o.kind === 1) { detailDisc(bctx, o.cx, o.cy, o.r); markDisc(o.cx, o.cy, o.r); }
      else              { detailRect(bctx, o.x, o.y, o.w, o.h); markRect(o.x, o.y, o.w, o.h); }
    }

    // borde del mundo con el MISMO motivo detallado + marca de colisión
    detailBorder(bctx);
    markRect(0, 0, WORLD_W, BORDER); markRect(0, WORLD_H - BORDER, WORLD_W, BORDER);
    markRect(0, 0, BORDER, WORLD_H); markRect(WORLD_W - BORDER, 0, BORDER, WORLD_H);
  }

  function clearField() {
    grid.fill(0);
    tctx.setTransform(1, 0, 0, 1, 0, 0);
    tctx.clearRect(0, 0, WORLD_W, WORLD_H);                                         // estela transparente
    mctx.clearRect(0, 0, MINI_W, MINI_H);                                          // estela del minimapa
    ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.max(1, Math.floor(window.innerWidth));
    H = Math.max(1, Math.floor(window.innerHeight));                              // canvas a pantalla completa (sin barra)
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
    scl = Math.min(W / 1280, H / 720);

    // offscreens del MUNDO (1:1, sin dpr — la cámara los blitea escalando a viewport)
    if (!trailCv) { trailCv = document.createElement('canvas'); trailCv.width = WORLD_W; trailCv.height = WORLD_H; tctx = trailCv.getContext('2d'); }
    if (!bgCv)    { bgCv = document.createElement('canvas'); bgCv.width = WORLD_W; bgCv.height = WORLD_H; bctx = bgCv.getContext('2d'); }
    if (!miniCv)  { miniCv = document.createElement('canvas'); miniCv.width = MINI_W; miniCv.height = MINI_H; mctx = miniCv.getContext('2d'); }
    // buffer de glow a media resolución del VIEWPORT
    glowCv = glowCv || document.createElement('canvas');
    glowCv.width  = Math.max(1, Math.floor(W * dpr / 2));
    glowCv.height = Math.max(1, Math.floor(H * dpr / 2));
    gctx = glowCv.getContext('2d');
    // NO reiniciamos al redimensionar: el mundo (grilla/estela/fondo) es de tamaño fijo y sobrevive un
    // resize. Antes acá se llamaba backToMenu() y por eso el botón de fullscreen te sacaba al menú.
  }
  window.addEventListener('resize', resize);

  // ════════════════ PLAYER ════════════════
  // directions[dir] = [vx, vy, dx2,dy2, dx4,dy4, dx100,dy100]
  function dirTemplate() {
    return {
      0: [0,-150, 0,-2, 0,-4, 0,-100],   // arriba
      1: [150,0, 2,0, 4,0, 100,0],       // derecha
      2: [0,150, 0,2, 0,4, 0,100],       // abajo
      3: [-150,0, -2,0, -4,0, -100,0],   // izquierda
    };
  }

  class Player {
    constructor(id, totalplayers, mode) {
      this.id = id;
      this.direction = 0;
      this.directions = dirTemplate();
      this.currentMode = mode;
      this.leftpressed = false; this.rightpressed = false;
      this.stop = false; this.alive = true;
      this.aiTurnInCD = 0; this.aiRandDistToTurnCD = 2;
      this.maxDistanceDir = null; this.premaxDistanceDir = null;

      const [sx, sy] = startposFor(id, totalplayers);
      this.colorArr = PLAYER_COLORS[id];
      this.color = rgb(this.colorArr);
      this.x = sx; this.y = sy;
      this.head = [];
      this.lastX = null; this.lastY = null;
    }

    turnLeft()  { this.direction = (this.direction - 1 + 4) % 4; }
    turnRight() { this.direction = (this.direction + 1) % 4; }

    process(dt) {
      const d = this.directions;

      if (this.id === 0 || this.currentMode === 1) {
        if (!this.leftpressed && keys[this.left])  { this.direction = (this.direction - 1 + 4) % 4; this.leftpressed = true; }
        if (!this.rightpressed && keys[this.right]) { this.direction = (this.direction + 1) % 4;     this.rightpressed = true; }
        if (!keys[this.left])  this.leftpressed = false;
        if (!keys[this.right]) this.rightpressed = false;
      } else {
        // ── IA (maxDistanceDir, escaneo capado a AI_SCAN) ──
        this.aiRandDistToTurnCD += dt;
        this.aiTurnInCD += dt;
        if (this.aiRandDistToTurnCD > 2) {
          d[0][7] = ri(-100, -25); d[1][6] = ri(25, 100); d[2][7] = ri(25, 100); d[3][6] = ri(-100, -25);
          this.aiRandDistToTurnCD = 0;
        }
        const maxD = [0, 0, 0, 0];
        for (let k = 2; k <= AI_SCAN; k++) { if (occ(this.x, this.y - k)) { maxD[0] = k; break; } if (k === AI_SCAN) maxD[0] = k; }
        for (let k = 2; k <= AI_SCAN; k++) { if (occ(this.x, this.y + k)) { maxD[2] = k; break; } if (k === AI_SCAN) maxD[2] = k; }
        for (let k = 2; k <= AI_SCAN; k++) { if (occ(this.x - k, this.y)) { maxD[3] = k; break; } if (k === AI_SCAN) maxD[3] = k; }
        for (let k = 2; k <= AI_SCAN; k++) { if (occ(this.x + k, this.y)) { maxD[1] = k; break; } if (k === AI_SCAN) maxD[1] = k; }
        this.premaxDistanceDir = this.maxDistanceDir;
        this.maxDistanceDir = indexOfMax(maxD);

        if (this.aiTurnInCD > 0.05) {
          const dir = this.direction;
          if (occ(this.x + d[dir][2], this.y + d[dir][3])) { this.direction = this.maxDistanceDir; this.aiTurnInCD = 0; }
          else if (occ(this.x + d[dir][4], this.y + d[dir][5])) { this.direction = this.maxDistanceDir; this.aiTurnInCD = 0; }
          else if (occ(this.x + d[dir][6], this.y + d[dir][7])) { this.direction = this.maxDistanceDir; this.aiTurnInCD = 0; }
          else if (this.maxDistanceDir !== this.premaxDistanceDir) { this.direction = this.maxDistanceDir; this.aiTurnInCD = 0; }
          else if (ri(0, 1000) === 0) {
            const dR1 = (dir + 1) % 4, dL1 = (dir - 1 + 4) % 4;
            const canR = occ(this.x + d[dR1][2], this.y + d[dR1][3]) === 0;
            const canL = occ(this.x + d[dL1][2], this.y + d[dL1][3]) === 0;
            if (ri(0, 1) === 0 && canR && occ(this.x + d[dR1][4], this.y + d[dR1][5]) === 0) this.direction = dR1;
            else if (canL && occ(this.x + d[dL1][4], this.y + d[dL1][5]) === 0) this.direction = dL1;
            this.aiTurnInCD = 0;
          }
        }
      }

      // muerte: COLISIÓN BARRIDA. La cycle avanza varios px por frame (más a FPS bajos), así que no
      // alcanza con chequear un solo punto 2px adelante — saltaría por encima de una estela fina. Muestreo
      // todo el tramo que recorrerá este frame, de 2px adelante hasta donde llegará la cabeza (+ margen).
      const dir = this.direction;
      if (!this.stop) {
        const ux = Math.sign(d[dir][0]), uy = Math.sign(d[dir][1]);
        const moveDist = Math.hypot(d[dir][0], d[dir][1]) * dt * SPEED_MULT;
        const reach = moveDist + 2;
        for (let s = 2; s <= reach; s += 1) {
          if (occ(this.x + ux * s, this.y + uy * s)) { this.alive = false; return; }
        }
        this.x += d[dir][0] * dt * SPEED_MULT;
        this.y += d[dir][1] * dt * SPEED_MULT;
        this.head.push({ x: this.x, y: this.y, age: 0 });
      }
    }

    draw() {
      const far = Math.min(WORLD_W, WORLD_H) * 0.4;
      const connect = this.lastX !== null && Math.hypot(this.x - this.lastX, this.y - this.lastY) <= far;
      paintTrail(this.lastX, this.lastY, this.x, this.y, this.color, connect);
      this.lastX = this.x; this.lastY = this.y;
    }

    // cola brillante (en coords de MUNDO; el caller aplica el offset de cámara). Segmentos conectados.
    drawHead(dt) {
      for (const h of this.head) h.age += dt;
      this.head = this.head.filter(h => h.age <= HEAD_FADE);
      if (!this.head.length) return;
      ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      for (let k = 1; k < this.head.length; k++) {
        const a = this.head[k - 1], b = this.head[k];
        const t = 1 - b.age / HEAD_FADE;
        ctx.strokeStyle = rgb(hot(this.colorArr, t));
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      }
      if (this.alive && !this.stop) {
        const tip = this.head[this.head.length - 1];
        ctx.save();
        ctx.shadowColor = this.color; ctx.shadowBlur = HEAD_GLOW;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(tip.x, tip.y, HEAD_DOT, 0, TAU); ctx.fill();
        ctx.restore();
      }
    }
  }

  function indexOfMax(arr) { let m = 0; for (let i = 1; i < arr.length; i++) if (arr[i] > arr[m]) m = i; return m; }

  // ════════════════ MINIMAPA ════════════════
  function drawMinimap() {
    const mmW = Math.max(120, Math.min(W * 0.27, 240));
    const mmH = mmW * WORLD_H / WORLD_W;
    const mmX = W - mmW - 12, mmY = 48;                                           // derecha, DEBAJO del cluster de botones
    const sx = mmW / WORLD_W, sy = mmH / WORLD_H;
    ctx.save();
    ctx.imageSmoothingEnabled = true;
    ctx.globalAlpha = 0.45;                                                        // mapa (mundo) más transparente
    ctx.drawImage(bgCv, 0, 0, WORLD_W, WORLD_H, mmX, mmY, mmW, mmH);                // mundo (grilla+borde+obstáculos)
    ctx.globalAlpha = 1;                                                           // estelas: buffer nativo del minimapa → escalado limpio
    ctx.drawImage(miniCv, 0, 0, MINI_W, MINI_H, mmX, mmY, mmW, mmH);
    // jugadores: punto chico (halo blanco + núcleo) — chico para no tapar la línea de estela de abajo.
    for (const p of players) {
      if (!p.alive) continue;
      const mx = mmX + p.x * sx, my = mmY + p.y * sy;
      const rCore = p.id === 0 ? 3.5 : 2.5;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(mx, my, rCore + 1.5, 0, TAU); ctx.fill();
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(mx, my, rCore, 0, TAU); ctx.fill();
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;                   // rectángulo de la cámara
    ctx.strokeRect(mmX + camX * sx, mmY + camY * sy, Math.min(W, WORLD_W) * sx, Math.min(H, WORLD_H) * sy);
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5;
    ctx.strokeRect(mmX, mmY, mmW, mmH);
  }

  // ════════════════ GAME HANDLER (menú + estado) ════════════════
  const gh = {
    menu: true,
    currentOption: 0,           // 0 = modo, 1 = cantidad de colores
    currentPlayers: 0,          // +2 → 2..4
    currentMode: 0,             // 0 = single, 1 = multi
    keypressed: false,
    paused: false,
  };
  let players = [];

  function aliveCount() { let n = 0; for (const p of players) if (p.alive) n++; return n; }

  function startGame() {
    clearField();
    buildWorld();
    const n = gh.currentPlayers + 2;
    players = [];
    for (let i = 0; i < n; i++) players.push(new Player(i, n, gh.currentMode));
    bindControls();
    gh.menu = false;
    gh.paused = false;
    updateCamera();
  }
  function restart() { startGame(); }
  function backToMenu() {
    clearField();
    players = [];
    gh.menu = true;
    gh.paused = false;
    gh.keypressed = true;
    const bp = document.getElementById('btnPause'); if (bp) bp.classList.remove('on');
  }
  function togglePause() {
    if (gh.menu || gameOver()) return;
    gh.paused = !gh.paused;
    document.getElementById('btnPause').classList.toggle('on', gh.paused);
  }

  const CONTROLS = [ ['ArrowLeft','ArrowDown'], ['KeyQ','KeyW'], ['KeyO','KeyP'], ['KeyV','KeyB'] ];
  function bindControls() { for (const p of players) { p.left = CONTROLS[p.id][0]; p.right = CONTROLS[p.id][1]; } }

  // ── MENÚ estilo v1 (filas tocables + ‹ › + glow + título neón que cicla + botón JUGAR) ──
  // Sólo se juega contra la IA → una sola opción (cantidad de colores) + JUGAR.
  let hoverY = -1;
  // Layout COMPACTO centrado: tamaños y separaciones en px proporcionales a min(W,H) — NO a la altura
  // total. Así no se desparrama en pantallas altas (mobile) y entra bien en cualquier orientación.
  function menuLayout() {
    const S = Math.min(W, H), cy = H * 0.47;
    return {
      titleY: cy - S * 0.135, titlePx: S * 0.17,
      divY:   cy - S * 0.045,
      optY:   cy + S * 0.035, optPx: S * 0.052,
      playY:  cy + S * 0.150, playPx: S * 0.052,
      tol:    S * 0.06,
    };
  }
  function menuChangeValue(delta) { gh.currentPlayers = (gh.currentPlayers + delta + 3) % 3; }
  function tapMenu(lx, ly) {
    const L = menuLayout(), dir = lx < W * 0.5 ? -1 : 1;
    if (Math.abs(ly - L.optY) < L.tol)       gh.currentPlayers = (gh.currentPlayers + dir + 3) % 3;
    else if (Math.abs(ly - L.playY) < L.tol) startGame();
  }
  function processMenu() {
    if (!gh.keypressed) {
      if (keys.ArrowLeft)  { menuChangeValue(-1); gh.keypressed = true; }
      if (keys.ArrowRight) { menuChangeValue(+1); gh.keypressed = true; }
      if (keys.Enter) startGame();
    }
    if (!keys.ArrowLeft && !keys.ArrowRight) gh.keypressed = false;
  }

  function drawMenuBg() {
    ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
    const step = Math.max(28, Math.round(Math.min(W, H) / 18));
    ctx.strokeStyle = `rgba(255,255,255,0.05)`; ctx.lineWidth = 1; ctx.beginPath();
    for (let x = 0; x <= W; x += step) { ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, H); }
    for (let y = 0; y <= H; y += step) { ctx.moveTo(0, y + 0.5); ctx.lineTo(W, y + 0.5); }
    ctx.stroke();
  }
  // Título MULTICOLOR (la onda propia de V2): cada letra de TRON en un color de jugador, con bloom.
  function drawTitle(yPx, fp) {
    fp = Math.round(fp);
    const py = yPx, breathe = 0.5 + 0.5 * Math.sin(T * 1.6);
    const letters = 'TRON'.split('');
    ctx.save();
    ctx.font = `900 ${fp}px ${FONT}`; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    const sp = fp * 0.12;
    const widths = letters.map(ch => ctx.measureText(ch).width);
    const total = widths.reduce((a, b) => a + b, 0) + sp * (letters.length - 1);
    let x = W * 0.5 - total / 2;
    for (let i = 0; i < letters.length; i++) {
      const col = PLAYER_COLORS[i % PLAYER_COLORS.length];
      ctx.shadowColor = rgb(col); ctx.fillStyle = rgb(col);
      for (const blur of [36, 18, 0]) { ctx.shadowBlur = blur * (0.7 + 0.3 * breathe); ctx.fillText(letters[i], x, py); }
      ctx.shadowBlur = 10; ctx.fillStyle = `rgba(255,255,255,${0.4 + 0.3 * breathe})`; ctx.fillText(letters[i], x, py);
      x += widths[i] + sp;
    }
    ctx.restore();
  }

  // Light-cycles fantasma deambulando de fondo (ambiente Tron), dejando estela neón. Sólo en el menú.
  let menuCycles = null;
  function drawMenuCycles(dt) {
    if (!menuCycles) {
      menuCycles = [];
      for (let i = 0; i < 4; i++) menuCycles.push({ x: rnd(W * 0.15, W * 0.85), y: rnd(H * 0.2, H * 0.85), dir: ri(0, 3), col: PLAYER_COLORS[i], trail: [], turnT: rnd(0.4, 1.2), t: 0 });
    }
    const SP = Math.min(W, H) * 0.22, MAXT = 46, far = Math.min(W, H) * 0.5;
    for (const c of menuCycles) {
      c.t += dt;
      if (c.t > c.turnT) { c.t = 0; c.turnT = rnd(0.4, 1.3); c.dir = (c.dir + (Math.random() < 0.5 ? 1 : 3)) % 4; }
      const vx = [0, 1, 0, -1][c.dir], vy = [-1, 0, 1, 0][c.dir];
      c.x += vx * SP * dt; c.y += vy * SP * dt;
      if (c.x < 0) c.x = W; else if (c.x > W) c.x = 0;
      if (c.y < 0) c.y = H; else if (c.y > H) c.y = 0;
      c.trail.push({ x: c.x, y: c.y });
      if (c.trail.length > MAXT) c.trail.shift();
      ctx.strokeStyle = rgba(c.col, 0.38); ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.shadowColor = rgb(c.col); ctx.shadowBlur = 8;
      ctx.beginPath(); let started = false;
      for (let k = 0; k < c.trail.length; k++) {
        const p = c.trail[k];
        if (k > 0 && Math.hypot(p.x - c.trail[k - 1].x, p.y - c.trail[k - 1].y) > far) { ctx.stroke(); ctx.beginPath(); started = false; }   // corta en el wrap
        if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke(); ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(c.x, c.y, 2.5, 0, TAU); ctx.fill();
    }
  }
  function drawOption(label, yPx, selected, col, fp) {
    fp = Math.round(fp);
    const txt = selected ? '‹  ' + label + '  ›' : label;
    ctx.font = `600 ${fp}px ${FONT}`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (selected) { ctx.shadowColor = rgb(col); ctx.shadowBlur = 18; ctx.fillStyle = rgb(col); }
    else { ctx.fillStyle = 'rgb(120,128,142)'; }
    ctx.fillText(txt, W * 0.5, yPx); ctx.shadowBlur = 0;
  }
  function drawPlay(yPx, col, fp) {
    fp = Math.round(fp);
    const hj = hoverY >= 0 && Math.abs(hoverY - yPx) < fp * 1.1, pulse = 0.6 + 0.4 * Math.sin(T * 4);
    const px = W * 0.5, text = '▶ JUGAR';
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `700 ${fp}px ${FONT}`;
    const w = ctx.measureText(text).width, padX = fp * 0.7, padY = fp * 0.42;
    const bw = w + padX * 2, bh = fp + padY * 2, bx = px - bw / 2, by = yPx - bh / 2;
    ctx.shadowColor = rgb(col); ctx.shadowBlur = hj ? 28 : 15;
    ctx.lineWidth = 2; ctx.strokeStyle = rgba(col, hj ? 0.95 : 0.7);
    roundRectPath(ctx, bx, by, bw, bh, bh * 0.5);
    ctx.fillStyle = rgba(col, hj ? 0.20 : 0.10);
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = hj ? 18 : 10;
    ctx.fillStyle = `rgba(255,255,255,${0.82 + 0.18 * pulse})`;
    ctx.fillText(text, px, yPx);
    ctx.restore();
  }
  function drawMenu(dt) {
    drawMenuBg();
    drawMenuCycles(dt);                                                            // ambiente: cycles fantasma de fondo
    const L = menuLayout(), col = PLAYER_COLORS[0];                                // acento fijo cyan (V1 cicla; V2 no → se diferencian)
    drawTitle(L.titleY, L.titlePx);                                               // título multicolor
    const dw = Math.min(W * 0.55, 420);
    ctx.save();
    ctx.strokeStyle = rgba(col, 0.5); ctx.shadowColor = rgb(col); ctx.shadowBlur = 10; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W / 2 - dw / 2, L.divY); ctx.lineTo(W / 2 + dw / 2, L.divY); ctx.stroke();
    ctx.restore();
    drawOption((gh.currentPlayers + 2) + ' Colors', L.optY, true, col, L.optPx);
    drawPlay(L.playY, col, L.playPx);
  }

  function drawWinner() {
    const alive = players.filter(p => p.alive);
    if (alive.length === 1) {                                                      // un único sobreviviente → ganador
      const w = alive[0];
      createText(90, 'Player ' + (w.id + 1) + ' Wins!', w.color, 0.5, 0.45, 22, 'rgba(0,0,0,0.55)');
    } else {                                                                       // el humano murió con varias IAs vivas
      createText(90, 'Game Over', 'rgb(235,235,235)', 0.5, 0.45, 22, 'rgba(0,0,0,0.55)');
    }
    createText(40, 'tocá o Enter para reiniciar', 'rgb(220,220,220)', 0.5, 0.58, 0, 'rgba(0,0,0,0.55)');
  }

  // ════════════════ INPUT ════════════════
  const keys = {};
  // En single player el humano es el player 0: si muere y sólo quedan IAs, la ronda termina (no se sigue
  // esperando a que las IAs se choquen entre sí). En multi todos son humanos → vale el "queda 1".
  function humanDead() { if (gh.currentMode === 1) return false; const p0 = players.find(p => p.id === 0); return p0 && !p0.alive; }
  function gameOver() { return !gh.menu && (aliveCount() <= 1 || humanDead()); }

  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (!gh.menu) {
      if (e.code === 'Escape') backToMenu();
      else if (e.code === 'Enter' && gameOver()) restart();
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Enter'].includes(e.code)) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    const lx = e.clientX - r.left, ly = e.clientY - r.top;
    if (gh.menu) tapMenu(lx, ly);
    else if (gameOver()) restart();
    else if (gh.paused) return;                                                    // en pausa, ignorar el giro por toque
    else { const p0 = players.find(p => p.id === 0 && p.alive); if (p0) (lx < W * 0.5 ? p0.turnLeft() : p0.turnRight()); }
  });
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    hoverY = e.clientY - r.top;                                                    // sólo para iluminar JUGAR al pasar el mouse
  });
  canvas.addEventListener('mouseleave', () => { hoverY = -1; });

  function tappable(el, fn) { el && el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); }); }
  tappable(document.getElementById('btnPause'), togglePause);
  tappable(document.getElementById('btnMenu'),  () => { if (!gh.menu) backToMenu(); });

  // ════════════════ LOOP ════════════════
  // dt medido contra el MISMO reloj (el now que entra) y clampeado — evita el crash de mobile por
  // desfase de épocas entre performance.now() y el timestamp de rAF.
  let lastT = null;
  let T = 0;
  function loop(now) {
    if (typeof now !== 'number') now = performance.now();
    if (lastT === null) lastT = now;
    let dt = (now - lastT) / 1000;
    lastT = now;
    if (!(dt >= 0) || dt > 0.05) dt = 0.01;
    T += dt;

    document.body.classList.toggle('playing', !gh.menu);                          // muestra pausa/menu sólo en juego

    if (gh.menu) {
      processMenu();
      drawMenu(dt);
    } else {
      if (!gh.paused) { for (const p of players) { if (!p.alive) continue; p.process(dt); if (p.alive) p.draw(); } }
      updateCamera();

      // fondo del mundo visible
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(bgCv, camX, camY, Math.min(W, WORLD_W), Math.min(H, WORLD_H), 0, 0, Math.min(W, WORLD_W), Math.min(H, WORLD_H));

      // halo neón de la estela (sólo la porción visible, a media resolución → barato)
      if (TRAIL_BLOOM > 0) {
        const gw = glowCv.width, gh2 = glowCv.height;
        gctx.setTransform(1, 0, 0, 1, 0, 0);
        gctx.clearRect(0, 0, gw, gh2);
        gctx.filter = `blur(${TRAIL_BLOOM * 0.6}px)`;
        gctx.drawImage(trailCv, camX, camY, Math.min(W, WORLD_W), Math.min(H, WORLD_H), 0, 0, gw, gh2);
        gctx.filter = 'none';
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(glowCv, 0, 0, gw, gh2, 0, 0, W, H);
        ctx.imageSmoothingEnabled = false;
      }
      // estela nítida
      ctx.drawImage(trailCv, camX, camY, Math.min(W, WORLD_W), Math.min(H, WORLD_H), 0, 0, Math.min(W, WORLD_W), Math.min(H, WORLD_H));

      // cabezas brillantes (en coords de mundo → offset de cámara). dt=0 si está pausado: no envejecen.
      ctx.save(); ctx.translate(-camX, -camY);
      for (const p of players) p.drawHead(gh.paused ? 0 : dt);
      ctx.restore();

      drawMinimap();

      if (gameOver()) { for (const p of players) p.stop = true; drawWinner(); }
      else if (gh.paused) {
        createText(80, 'PAUSA', 'rgb(235,235,235)', 0.5, 0.45, 20, 'rgba(0,0,0,0.5)');
        createText(34, 'tocá ⏸ para seguir', 'rgb(200,200,200)', 0.5, 0.56, 0, 'rgba(0,0,0,0.5)');
      }
    }
    requestAnimationFrame(loop);
  }

  // ── INIT ──
  resize();
  loop();

  const hint = document.getElementById('hint');
  setTimeout(() => hint.style.opacity = '0', 6000);
  canvas.addEventListener('pointerdown', () => hint.style.opacity = '0', { once: true });
  </script>

  <!-- Shell del Arcade (exit + fullscreen + lock de orientación). -->
  <script src="../../Arcade/arcade-shell.js" data-orient="landscape"></script>

  <div id="fpsOverlay">FPS: --</div>
  <script>
    (function () {
      let frameCount = 0, lastT = performance.now();
      const overlay = document.getElementById('fpsOverlay');
      const btnInfo = document.getElementById('btnInfo');
      let on = false;
      if (btnInfo) btnInfo.addEventListener('pointerdown', e => { e.preventDefault(); on = !on; overlay.style.display = on ? 'block' : 'none'; btnInfo.classList.toggle('on', on); });
      function tick() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          if (on) overlay.textContent = 'FPS: ' + Math.round(frameCount * 1000 / (now - lastT));
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(tick);
      }
      tick();
    })();
  </script>
</body>
</html>
