        if (tx !== null) { let aim = Math.atan2(ty - anchor.y, tx - anchor.x), d = aim - restAng;
          d = ((d+Math.PI)%TAU+TAU)%TAU - Math.PI; d = Math.max(-h.freedom, Math.min(h.freedom, d)); h.targetAng = restAng + d;
        } else h.targetAng = restAng;
        let diff = h.targetAng - h.ang; diff = ((diff+Math.PI)%TAU+TAU)%TAU - Math.PI;
        h.ang += diff * Math.min(1, deltaT*7);                                    // gira suave hacia el objetivo
        const hx = anchor.x + Math.cos(h.ang)*reach, hy = anchor.y + Math.sin(h.ang)*reach; // posición deseada (sobre el cuello, estirado desde el anchor)
        h.x += (hx - h.x) * Math.min(1, deltaT*10); h.y += (hy - h.y) * Math.min(1, deltaT*10); // seguimiento fluido
        if (h.lungeT > 0) {                                                       // embestida de la cabeza extra
          const v = lungeVel(h.lungeT); h.x += h.lungeX*v*deltaT; h.y += h.lungeY*v*deltaT; h.lungeT -= deltaT;
          if (h.lungeT <= LUNGE_TIME && !h.atkHit) this.extraHeadHit(h);
        }
        // cuello: puntos repartidos entre la cabeza y el anchor, con un leve arco vivo
        h.bow += deltaT*3;
        const nlen = h.neck.length, px = -Math.sin(h.ang), py = Math.cos(h.ang);
        for (let i = 0; i < nlen; i++) {
          const t = (i+1)/(nlen+1), bx = h.x + (anchor.x - h.x)*t, by = h.y + (anchor.y - h.y)*t;
          const bow = Math.sin(t*Math.PI) * Math.sin(h.bow) * reach*0.1;
          h.neck[i].x = bx + px*bow; h.neck[i].y = by + py*bow;
        }
        // combate: dispara la embestida si una cabeza rival entra en su cono y el CD está listo
        if (h.attackCD <= 0 && h.lungeT <= 0) {
          if (ph && manager.immunity <= 0 && inAttackCone(h.x, h.y, h.ang, ph.x, ph.y, range)) { this.startExtraLunge(h, ph.x, ph.y); h.atkPlayer = true; h.atkFoe = null; h.atkHit = false; }
          else for (const e of enemies) {
            if (e === this || e.dead || (this.groupId !== null && e.groupId === this.groupId)) continue;
            const eh = e.pieces[0];
            if (inAttackCone(h.x, h.y, h.ang, eh.x, eh.y, range)) { this.startExtraLunge(h, eh.x, eh.y); h.atkFoe = e; h.atkPlayer = false; h.atkHit = false; break; }
          }
        }
      }
    }
    combat() {                                                                    // ataca ANTE LA OPORTUNIDAD: cualquier cabeza rival en su cono + CD listo (el turbo es para alcanzar)
      if (this.attackCD > 0) this.attackCD -= deltaT;
      this.hp = Math.min(this.maxHp, this.hp + HP_REGEN*deltaT);                  // regen de vida
      if (this.attackCD > 0) return;
      const head = this.pieces[0], range = sper(ATTACK_RANGE_F);
      const ph = snake[0];
      if (ph && manager.immunity <= 0 && inAttackCone(head.x, head.y, this.ang, ph.x, ph.y, range)) {
        this.startLunge(ph.x, ph.y); this.attackCD = ATTACK_CD; head.wt = WAVE_TOTAL;
        this.atkPlayer = true; this.atkFoe = null; this.atkHit = false;          // daño al iniciar el dash
        return;
      }
      for (const e of enemies) {
        if (e === this || e.dead || (this.groupId !== null && e.groupId === this.groupId)) continue; // no ataca a su grupo
        const eh = e.pieces[0];
        if (inAttackCone(head.x, head.y, this.ang, eh.x, eh.y, range)) {
          this.startLunge(eh.x, eh.y); this.attackCD = ATTACK_CD; head.wt = WAVE_TOTAL;
          this.atkFoe = e; this.atkPlayer = false; this.atkHit = false;
          return;
        }
      }
    }
    shrink(n) { for (let i = 0; i < n && this.pieces.length > 6; i++) this.pieces.pop(); this.hurt = HAZARD_FLASH_TIME; }
    shedChunk(awayAng, count) {                                                   // golpe → arranca `count` segmentos (pedazos voladores que pueden volverse estrella)
      const h = this.pieces[0];
      for (let i = 0; i < count && this.pieces.length > 6; i++) this.pieces.pop();
      spawnChunks(h.x, h.y, this.hue, awayAng, count, curR*this.sizeMul*this.g);
    }
    die() {                                                                       // muere con el MISMO efecto que el jugador (se deshace en partículas) + suelta comida
      if (this.dead) return;
      this.dead = true;
      const n = this.pieces.length, r = curR*this.sizeMul;
      const step = Math.max(1, Math.ceil(n / 160));                              // partículas que se dispersan lento y se desvanecen, con su color
      for (let i = 0; i < n; i += step) {
        const p = this.pieces[i];
        for (let k = 0; k < 6; k++) {
          const a = Math.random()*TAU, sp = sper(0.06) + Math.random()*sper(0.22), life = rndRange(0.9, DEATH_FADE);
          manager.deathParticles.push({ x: p.x + rndRange(-r,r), y: p.y + rndRange(-r,r), vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, r: r*rndRange(0.4,1.1), life, maxLife: life, hue: this.hue });
        }
      }
      const drops = Math.min(6, 2 + (n/14|0));                                   // y suelta algo de comida donde estaba (slither-style)
      for (let k = 0; k < drops; k++) {
        const p = this.pieces[Math.min(n-1, (k*n/drops)|0)];
        new Food(p.x + rndRange(-r, r), p.y + rndRange(-r, r));
      }
    }
    process() {
      if (manager.gameOver || manager.pause) return;
      if (this.hurt > 0) this.hurt = Math.max(this.hurt - deltaT, 0);
      this.chase = 1;                                                            // se sube a >1 sólo mientras persigue una víctima
      const head = this.pieces[0];
      const rBase = curR*this.sizeMul;                                           // grosor base (espaciado/giro), sin engorde — igual que el jugador
      this.g = 1 + GIRTH_MAX * Math.min(1, this.pieces.length / GIRTH_LEN);      // engorda con el largo
      const r = rBase * this.g, hd = Math.hypot(head.x, head.y);                 // grosor real (colisión / dibujo)
      // ── STEERING (suma de vectores en coords de mundo) ──
      let sx = Math.cos(this.ang), sy = Math.sin(this.ang);                      // inercia: tiende a seguir derecho
      let wantsTurbo = false;                                                    // ¿quiere usar el turbo este frame? (al perseguir)
      if (!this.integrated) {                                                    // todavía entrando: tirar fuerte al centro
        const inv = hd || 1; sx += (-head.x/inv)*2.4; sy += (-head.y/inv)*2.4;
        if (hd < WORLD_R - r*5) this.integrated = true;                          // ya adentro → no vuelve a salir
      } else {
        if (this.leader && !this.leader.dead) {                                  // GRUPO: la chica ESCOLTA a la grande (van juntas)
          const lh = this.leader.pieces[0], dx = lh.x-head.x, dy = lh.y-head.y, d = Math.hypot(dx, dy) || 1;
          if (d > curR*7) { sx += dx/d*1.7; sy += dy/d*1.7; }                    // ir hacia el líder si se aleja
        } else {
          // PATRULLA: punto objetivo dentro del lago, re-elegido al llegar o cada tanto → recorren el interior
          this.roamT -= deltaT;
          const rdx = this.roamX-head.x, rdy = this.roamY-head.y, rd = Math.hypot(rdx, rdy);
          if (this.roamT <= 0 || rd < curR*8) {
            const ra = Math.random()*TAU, rr = Math.sqrt(Math.random())*WORLD_R*0.72;
            this.roamX = Math.cos(ra)*rr; this.roamY = Math.sin(ra)*rr; this.roamT = rndRange(3, 7);
          }
          if (rd > 1) { sx += rdx/rd*0.95; sy += rdy/rd*0.95; }
        }
        let best = null, bd = Infinity;                                          // comida cercana (prioridad sobre la patrulla)
        for (const f of food) { if (f.appear < 0.3 || f.grabbed) continue; const dx = f.x-head.x, dy = f.y-head.y, d = dx*dx+dy*dy; if (d < bd) { bd = d; best = f; } }
        const VIS = sper(0.55);
        if (best && bd < VIS*VIS) { const d = Math.sqrt(bd) || 1; sx += (best.x-head.x)/d*1.9; sy += (best.y-head.y)/d*1.9; }
        // ORILLA: girar hacia adentro bien ANTES del borde (así bordean y no quedan clavados contra la pared)
        if (hd > WORLD_R*0.66) { const k = (hd - WORLD_R*0.66)/(WORLD_R*0.34), inv = hd || 1; sx += (-head.x/inv)*(2 + k*6); sy += (-head.y/inv)*(2 + k*6); }
        // COMBATE (cut-off estilo slither): elegir una víctima cercana y meterle la cabeza ADELANTE para que

    draw() {

        drawCreatureHead(eh.x, eh.y, eh.ang, hrad, hue, flash>0?95:80, light+6);
      }
    }
  }

  // ════════════════ MANAGER ════════════════
  class Manager {
    constructor() {

      this.gameOver = false;
      this.score = 0;
      this.pause = false;
      this.pauseBlinkCD = 0;
      this.initCD = 4;
      this.hitFlash = 0;                                                          // timer del destello rojo al chocar una mina
      this.pendingShrink = 0;                                                     // segmentos a sacar (se aplican fuera del for de proceso)
      this.pendingGrow = 0;                                                       // segmentos a sumar (se materializan de a pocos por frame, no apilados)
      this.fed = 0;                                                               // COMIDA acumulada: alimenta el engorde (girth) — comer te hace crecer a lo ancho, no apilar largo
      this.foodCD = 0;                                                            // delay hasta el próximo spawn de comida
      this.hazCD = HAZARD_SPAWN_DELAY;                                            // delay hasta el próximo spawn de mina
      this.jellyCD = JELLY_SPAWN_DELAY;                                           // delay hasta la próxima medusa
      this.seahorseCD = SEAHORSE_SPAWN_DELAY;                                     // delay hasta el próximo caballito de mar
      this.speedBoost = 0;                                                        // boost de velocidad activo (caballito), en segundos

      this.attackCD = 0; this.lungeT = 0; this.lungeX = 0; this.lungeY = 0;       // ataque por embestida
      this.atkTarget = null; this.atkHit = false;                                 // víctima del ataque en curso + si ya pegó (el daño es al iniciar el dash)
      this.healQueue = 0;                                                         // cura pendiente de la estrella (entra por tiempo, no de golpe)
      this.turbo = 1; this.boosting = false;                                      // turbo con carga (se drena al usar, se recarga al soltar)
      this.enemyCD = 2;                                                           // delay hasta la próxima serpiente enemiga
      this.dying = false;                                                         // animación de "rotura" en curso
      this.deathT = 0;                                                            // tiempo desde la muerte
      this.deathParticles = [];                                                   // partículas en que se deshace la víbora (estilo Fireworks)
      this.immunity = 0;                                                          // inmunidad (no muere por su cuerpo) al arrancar
      // ── MEJORAS (multiplicadores del jugador; las enemigas usan los valores base) ──
      this.dmgMul = 1; this.regenMul = 1; this.healMul = 1;                       // daño / regeneración / cura al comer
      this.turboDrainMul = 1; this.turboRechargeMul = 1;                          // turbo dura más / recarga más rápido
      this.atkRangeMul = 1; this.atkConeBonus = 0; this.turnMul = 1; this.sizeDmgBonus = 0; // alcance / cono / giro / bonus por tamaño
      this.lifesteal = 0; this.thorns = 0; this.armor = 0; this.magnetMul = 1;    // pasivas: robo de vida / espinas / coraza / imán
      // ── NIVELES (XP mixta) ──
      this.xp = 0; this.level = 1; this.xpNeed = XP_BASE; this.choosing = false;  // choosing = eligiendo mejora (congela el juego)
      this.takenPassives = new Set();                                            // pasivas ya tomadas (no se repiten en el pool)
    }
    addXP(n) { this.xp += n; if (this.xp >= this.xpNeed && !this.choosing) this.startLevelUp(); }
    startLevelUp() {
      this.xp -= this.xpNeed; this.level++;
      this.xpNeed = Math.round(XP_BASE * Math.pow(XP_GROWTH, this.level - 1));
      this.choosing = true; this.pause = true;                                    // congela y abre el overlay de elección
      showUpgradeOverlay(rollUpgrades());
    }
    applyUpgrade(u) {
      u.apply(this);
      if (u.passive) this.takenPassives.add(u.id);
      this.choosing = false; this.pause = false;
      if (this.xp >= this.xpNeed) this.startLevelUp();                            // encadena si juntaste varios niveles de un saque
    }
    hitEnemy(e, dmg, fromAng) {                                                   // el JUGADOR le pega a una enemiga (único camino → otorga XP y SCORE)
      if (!e || e.dead) return;
      e.hp -= dmg; e.hurt = HAZARD_FLASH_TIME; if (e.pieces[0]) e.pieces[0].wt = WAVE_TOTAL;
      e.shedChunk(fromAng, Math.max(1, Math.min(CHUNK_MAX, Math.round(dmg/CHUNK_DMG_PER))));
      this.score += Math.round(dmg * HIT_SCORE);                                 // PEGAR da puntos
      if (this.lifesteal > 0) this.healQueue += dmg * this.lifesteal;            // "Sanguijuela"
      if (e.hp <= 0) { this.score += KILL_SCORE + Math.round(e.maxHp); e.die(); this.addXP(XP_KILL); } // MATAR da bonus
    }
    hurtPlayer(dmg, fromAng, attacker) {                                          // una enemiga (o mina) le pega al jugador
      if (this.immunity > 0 || this.gameOver) return;                            // escudo bloquea

      if (this.thorns > 0 && attacker && !attacker.dead) this.hitEnemy(attacker, dmg*this.thorns, fromAng + Math.PI); // "Espinas"
      if (this.hp <= 0) this.die();
    }
    shedPlayerChunk(awayAng, count) {                                             // golpe al jugador → arranca pedazos (se acortan de la cola; los pedazos vuelan desde la cabeza)

      spawnChunks(h.x, h.y, 150, awayAng, count, curR*girth);
    }
    die() {
      if (this.gameOver) return;                                                  // una sola vez
      this.gameOver = true; this.dying = true; this.deathT = 0;
      // La víbora se DESHACE en partículas que se dispersan lento como en el agua y se desvanecen (en vez de
      // volar en pedazos). Cada segmento aporta unas pocas; en cuerpos largos se muestrea para acotar el total.
      this.deathParticles = [];
      const step = Math.max(1, Math.ceil(snake.length / 220));                    // más muestras
      const hx = snake[0] ? snake[0].x : 0, hy = snake[0] ? snake[0].y : 0;
      for (let i = 0; i < snake.length; i += step) {
        const e = snake[i];
        const hue = 145 + Math.min(1, e.id/60)*55;                                // hereda el color del segmento
        const per = (i === 0) ? 10 : 6;                                           // más partículas por segmento
        for (let k = 0; k < per; k++) {
          const a = Math.random()*TAU, sp = sper(0.06) + Math.random()*sper(0.22);// dispersión lenta (agua)
          const ox = (e.x - hx), oy = (e.y - hy);
          const out = Math.atan2(oy, ox) + (Math.random()-0.5);                   // empujón hacia afuera del centro
          const vx = Math.cos(a)*sp*0.6 + Math.cos(out)*sp*0.5;
          const vy = Math.sin(a)*sp*0.6 + Math.sin(out)*sp*0.5;
          const life = rndRange(0.9, DEATH_FADE);
          this.deathParticles.push({ x: e.x + rndRange(-curR,curR), y: e.y + rndRange(-curR,curR),
            vx, vy, r: curR*rndRange(0.4,1.1), life, maxLife: life, hue });
        }
      }
      // suelta ESTRELLAS a lo largo del cuerpo (más cuanto más larga la víbora), como las enemigas al morir
      const drops = Math.min(24, 4 + (snake.length/12|0));
      for (let k = 0; k < drops; k++) {
        const e = snake[Math.min(snake.length-1, (k*snake.length/drops)|0)];
        new Food(e.x + rndRange(-curR*2, curR*2), e.y + rndRange(-curR*2, curR*2));
      }
    }
    burst(x, y, hue, count) {                                                     // burst de partículas efímeras en (x,y) — usado al comer medusa/caballito
      for (let k = 0; k < count; k++) {
        const a = Math.random()*TAU, sp = sper(0.05) + Math.random()*sper(0.18), life = rndRange(0.4, 0.9);
        this.deathParticles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, r: curR*rndRange(0.3,0.8), life, maxLife: life, hue });
      }
    }
    onJellyEat(j) {
      spritesToRemove.push(j);
      this.immunity = JELLY_IMMUNITY;                                             // escudo: atravesás tu cuerpo un rato
      this.score += 250;                                                          // bonus mayor que una estrella (100); NO da segmentos (sólo escudo + score)
      if (snake[0]) snake[0].wave_time = snake[0].wave_time_total;
      this.burst(j.x, j.y, 335, 22);                                              // burst rosado
    }
    onSeahorseEat(s) {                                                            // caballito: BOOST de velocidad (3×) por unos segundos, sin indicador
      spritesToRemove.push(s);
      this.speedBoost = SPEED_BOOST_TIME;
      this.score += s.points;
      if (snake[0]) snake[0].wave_time = snake[0].wave_time_total;
      this.burst(s.x, s.y, 32, 20);                                              // burst naranja
    }
    updateTurbo() {                                                              // carga del turbo: se drena al acelerar, se RECARGA al soltar
      const wants = sprint;
      if (wants && this.turbo > 0) { this.turbo = Math.max(0, this.turbo - TURBO_DRAIN*this.turboDrainMul*deltaT); this.boosting = true; }
      else if (wants) { this.boosting = false; }                                 // sin carga: no acelera (soltar para recargar)
      else { this.turbo = Math.min(1, this.turbo + TURBO_RECHARGE*this.turboRechargeMul*deltaT); this.boosting = false; }
      // el PROPIO orbe es el indicador: se llena/vacía como un vaso (de abajo hacia arriba) con la carga.
      const b = document.getElementById('btnSprint');
      if (b) {
        const p = (Math.max(0, Math.min(1, this.turbo))*100).toFixed(1);
        const on = this.boosting ? 'rgba(120,255,190,0.95)' : 'rgba(0,230,140,0.85)', off = 'rgba(0,40,26,0.55)';
        b.style.background = `linear-gradient(to top, ${on} 0%, ${on} ${p}%, ${off} ${p}%, ${off} 100%)`;
        b.classList.toggle('on', this.boosting);
      }
    }
    onHazardHit(mx, my) {                                                         // mina: daño + pedazo (escudo/coraza vía hurtPlayer)
      const h = snake[0], ang = h ? Math.atan2(h.y - my, h.x - mx) : 0;          // el pedazo vuela en sentido contrario a la mina
      this.hurtPlayer(HAZARD_DMG, ang, null);                                     // sin atacante → no dispara espinas
    }
    process() {
      if (this.choosing) return;                                                 // eligiendo mejora: congela TODO (no drena escudo/boost ni spawnea)
      if (this.hitFlash > 0) this.hitFlash = Math.max(this.hitFlash - deltaT, 0);
      if (this.immunity > 0) this.immunity = Math.max(this.immunity - deltaT, 0);
      if (this.speedBoost > 0) this.speedBoost = Math.max(this.speedBoost - deltaT, 0);
      if (this.healQueue > 0) {                                                  // cura de la estrella, gradual (no de golpe)
        const amt = Math.min(this.healQueue, HEAL_RATE*deltaT);
        this.hp = Math.min(this.maxHp, this.hp + amt); this.healQueue -= amt;
      }
      if (this.gameOver) { this.deathT += deltaT; return; }                      // durante la muerte: avanzar timer, no spawnear nada
      if (this.initCD > 0) this.initCD = Math.max(this.initCD - deltaT, 0);
      if (!snake.length) { for (let i = 0; i < 10; i++) new SnakePiece(i, true); this.immunity = 1; } // largo inicial DESPLEGADO + 1s de inmunidad
      if (this.initCD > 0) return;                                               // nada aparece hasta pasar el initCD inicial

      // COMBATE del jugador: si ACELERA (boost/sprint) con la cabeza de una enemiga en su cono, lanza la embestida
      // hacia la MÁS CERCANA en cono. El daño no es automático: cae sólo si el dash CONECTA (ver SnakePiece).
      if (this.attackCD > 0) this.attackCD -= deltaT;
      this.hp = Math.min(this.maxHp, this.hp + HP_REGEN*this.regenMul*deltaT);    // regen (mejora "Regeneración")
      const accel = this.boosting || this.speedBoost > 0;
      if (accel && this.attackCD <= 0 && snake[0]) {
        const h = snake[0], range = sper(ATTACK_RANGE_F)*this.atkRangeMul, cos = Math.cos(ATTACK_ANG + this.atkConeBonus);
        let best = null, bd = Infinity;
        for (const e of enemies) {
          const eh = e.pieces[0], dx = eh.x-h.x, dy = eh.y-h.y, d2 = dx*dx+dy*dy;
          if (d2 < bd && inAttackCone(h.x, h.y, h.ang, eh.x, eh.y, range, cos)) { bd = d2; best = e; }
        }
        if (best) {
          const eh = best.pieces[0], dx = eh.x-h.x, dy = eh.y-h.y, d = Math.hypot(dx, dy) || 1;
          this.lungeX = dx/d; this.lungeY = dy/d; this.lungeT = LUNGE_WIND + LUNGE_TIME; this.attackCD = ATTACK_CD;
          this.atkTarget = best; this.atkHit = false;
          h.wave_time = h.wave_time_total;
        }
      }

      // crecimiento: materializar segmentos del contador de a pocos por frame → se despliegan solos en vez
      // de apilarse quietos al comer en ráfaga. (El engorde -girth- ya es continuo según el largo.)
      if (this.pendingGrow >= 1) {
        const add = Math.min(Math.floor(this.pendingGrow), GROW_DRIP);           // floor: guarda el remanente fraccionario (LEN_GROW_FRAC deja medios)
        for (let i = 0; i < add; i++) new SnakePiece(snake.length);
        this.pendingGrow -= add;
      }

      // comida: aparece de a una con un delay entre spawns. MÁS comida cuando hay enemigos (compensa el
      // consumo) → siempre hay suficiente en juego para el jugador y las enemigas.
      const targetFood = 4 + enemies.length*2;
      if (food.length < targetFood) {
        this.foodCD -= deltaT;
        if (this.foodCD <= 0) { new Food(); this.foodCD = FOOD_SPAWN_DELAY; }
      } else this.foodCD = FOOD_SPAWN_DELAY;

      // serpientes enemigas: mantener una población; aparecen desde fuera del lago (escalonadas)
      if (enemies.length < ENEMY_TARGET) {
        this.enemyCD -= deltaT;
        if (this.enemyCD <= 0) {
          if (Math.random() < PAIR_CHANCE && enemies.length <= ENEMY_TARGET - 2) {
            // PAREJA: mismo color, una grande + una chica (la escolta), mismo lado de entrada; no se atacan
            const hue = ENEMY_HUES[ri(0, ENEMY_HUES.length-1)], gid = ++enemyGroupSeq, ea = Math.random()*TAU;
            const big = new EnemySnake({ hue, sizeMul: rndRange(1.25, 1.5), groupId: gid, entryAng: ea });
            new EnemySnake({ hue, sizeMul: rndRange(0.7, 0.95), groupId: gid, leader: big, entryAng: ea + rndRange(-0.15, 0.15) });
            pairAlert = 4;                                                       // aviso en el minimapa
          } else {                                                              // enemiga suelta: a veces MULTI-CABEZA (cluster/hydra/body al azar)
            const opts = {};
            if (Math.random() < MULTIHEAD_CHANCE) opts.headLayout = HEAD_LAYOUTS[ri(0, HEAD_LAYOUTS.length-1)];
            new EnemySnake(opts);
          }
          this.enemyCD = rndRange(3, 7);
        }
      } else this.enemyCD = rndRange(3, 7);

      // minas: ídem, con dificultad creciente (arranca en 5, sube con el score). Se reciclan al alejarte
      // (ver Hazard.process) → siempre hay densidad cerca tuyo, no podés irte a una zona vacía.
      const targetHaz = Math.min(MAX_HAZARDS, 5 + Math.floor(this.score / 320));
      if (hazards.length < targetHaz) {
        this.hazCD -= deltaT;
        if (this.hazCD <= 0) { new Hazard(); this.hazCD = HAZARD_SPAWN_DELAY; }
      } else this.hazCD = HAZARD_SPAWN_DELAY;

      // medusa: premio raro, de a una, con delay largo y aleatorio
      if (treasures.length < 1) {
        this.jellyCD -= deltaT;
        if (this.jellyCD <= 0) { new Jelly(); this.jellyCD = JELLY_SPAWN_DELAY + rndRange(0, 6); }
      } else this.jellyCD = JELLY_SPAWN_DELAY;

      // caballito de mar: ídem, de a uno
      if (seahorses.length < 1) {
        this.seahorseCD -= deltaT;
        if (this.seahorseCD <= 0) { new Seahorse(); this.seahorseCD = SEAHORSE_SPAWN_DELAY + rndRange(0, 6); }
      } else this.seahorseCD = SEAHORSE_SPAWN_DELAY;
    }
    updateParticles() {
      if (!this.deathParticles.length) return;
      const drag = Math.exp(-deltaT / 0.8);                                       // freno suave (resistencia del agua)
      const out = [];
      for (const p of this.deathParticles) {
        p.life -= deltaT;
        if (p.life <= 0) continue;
        p.x += p.vx * deltaT; p.y += p.vy * deltaT;
        p.vx *= drag; p.vy *= drag;
        out.push(p);
      }
      this.deathParticles = out;
    }
    drawParticles() {                                                            // dibujadas en coords de mundo (dentro de la cámara)
      if (!this.deathParticles.length) return;
      ctx.globalCompositeOperation = 'lighter';
      for (const p of this.deathParticles) {
        const a = p.life / p.maxLife;                                            // se desvanece y achica
        ctx.fillStyle = `hsla(${p.hue},100%,65%,${0.7*a})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r*(0.4 + a*0.8), 0, TAU); ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';
    }
    draw() {
      if (this.gameOver) {
        const t = Math.min(1, Math.max(0, (this.deathT - DEATH_TEXT_DELAY) / 0.7)); // aparición suave tras la rotura
        if (t > 0) {
          ctx.globalAlpha = t;
          createText(100, 'GAME OVER',          'center', [255,255,255], xper(0.5), yper(0.47));
          createText(50,  'SCORE: '+this.score, 'center', [120,255,220], xper(0.5), yper(0.6));
          createText(24,  'TOCÁ PARA REINICIAR','center', [255,90,120],  xper(0.5), yper(0.67));
          ctx.globalAlpha = 1;
        }
      }
      if (this.pause && !this.choosing) {                                         // mientras elegís mejora NO se muestra "PAUSA" (el overlay ya tapa la pantalla)
        this.pauseBlinkCD += deltaT;
        createText(100, this.pauseBlinkCD > 0.25 ? 'PAUSA' : '', 'center', [255,255,255], xper(0.5), yper(0.5));
        if (this.pauseBlinkCD > 0.5) this.pauseBlinkCD = 0;
      }
      if (showDebug) {                                                            // HUD estilo Pong: panel monoespaciado arriba a la izquierda.
        const lines = [
          'FPS: '   + Math.round(1/Math.max(1e-3,dtSmoothed)),
          'len: '   + snake.length,
          'minas: ' + hazards.length,
        ];
        const lh = 18, padX = 8, padY = 8, boxW = 132;
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(padX, padY, boxW, lh * lines.length + 8);
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = '13px ui-monospace, Menlo, Consolas, monospace';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        lines.forEach((s, i) => ctx.fillText(s, padX + 6, padY + 4 + i * lh));
      }
    }
    reset() {
      snake = []; food = []; hazards = []; treasures = []; seahorses = []; enemies = []; chunks = []; spritesToRemove = [];
      this.speedBoost = 0;
      this.gameOver = false; this.dying = false; this.deathT = 0; this.deathParticles = [];
      this.score = 0; this.initCD = 4; this.pause = false;
      this.pendingGrow = 0; this.pendingShrink = 0; this.fed = 0;
      this.maxHp = PLAYER_MAX_HP; this.hp = this.maxHp;                           // las mejoras subían maxHp → volver a base
      this.attackCD = 0; this.lungeT = 0; this.atkTarget = null; this.atkHit = false; this.healQueue = 0;
      this.turbo = 1; this.boosting = false;
      // reset de mejoras + nivel
      this.dmgMul = 1; this.regenMul = 1; this.healMul = 1; this.turboDrainMul = 1; this.turboRechargeMul = 1;
      this.atkRangeMul = 1; this.atkConeBonus = 0; this.turnMul = 1; this.sizeDmgBonus = 0;
      this.lifesteal = 0; this.thorns = 0; this.armor = 0; this.magnetMul = 1;
      this.xp = 0; this.level = 1; this.xpNeed = XP_BASE; this.choosing = false; this.takenPassives.clear();
      const ov = document.getElementById('levelup'); if (ov) ov.classList.remove('show');
      camX = 0; camY = 0; initAmbient();
    }
  }

  // ════════════════ RESIZE ════════════════
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 1.5);                           // capeado a 1.5: el render está limitado por fillrate; en celus 3× esto casi duplica FPS
    W = screenX = window.innerWidth;
    H = screenY = window.innerHeight;                                            // pantalla completa: sin barra, los controles flotan sobre el canvas
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    WORLD_R = sper(WORLD_FACTOR);                                                 // radio del lago (mundo circular)
    if (!ambient.length) initAmbient();
  }
  window.addEventListener('resize', resize);

  // ── AMBIENTE: motas a la deriva (sensación de corriente). Se mantienen alrededor de la cámara (envuelven
  // al salir de un box centrado en la cabeza) para densidad constante en pantalla, sin importar el zoom. ──
  function makeMote(x, y) {
    return { x, y, r: rndRange(0.4, 1.8), a: rndRange(0.05, 0.22), ph: Math.random()*TAU, sp: rndRange(0.4, 1.2) };
  }
  function initAmbient() {
    ambient.length = 0;
    const hx = snake[0] ? snake[0].x : 0, hy = snake[0] ? snake[0].y : 0;
    for (let i = 0; i < 46; i++) ambient.push(makeMote(hx + rndRange(-W*0.6, W*0.6), hy + rndRange(-H*0.6, H*0.6)));
  }
  function updateAmbient() {
    const hx = camX, hy = camY, bx = W*0.6, by = H*0.6;
    const cur = sper(0.02);                                                       // velocidad de la corriente (lenta)
    for (const m of ambient) {
      m.ph += deltaT;
      m.x += (Math.cos(currentAng)*m.sp + Math.cos(m.ph)*0.3) * cur * deltaT;
      m.y += (Math.sin(currentAng)*m.sp + Math.sin(m.ph*1.3)*0.3) * cur * deltaT;
      if (m.x < hx - bx) m.x += bx*2; else if (m.x > hx + bx) m.x -= bx*2;        // envolver para densidad constante
      if (m.y < hy - by) m.y += by*2; else if (m.y > hy + by) m.y -= by*2;
    }
  }
  function drawAmbient() {
    ctx.globalCompositeOperation = 'lighter';
    for (const m of ambient) {
      ctx.fillStyle = `rgba(120,220,225,${m.a})`;
      ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, TAU); ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
  }

  // ── LAGO: disco grande con gradiente teal y orilla. La cámara mantiene la cabeza en el centro, así que
  // cerca del borde se ve la orilla y afuera el agua profunda. ──
  function drawLake() {
    const g = ctx.createRadialGradient(0, 0, WORLD_R*0.05, 0, 0, WORLD_R);
    g.addColorStop(0,    'rgb(13,46,52)');                                        // centro: teal iluminado
    g.addColorStop(0.65, 'rgb(7,27,33)');
    g.addColorStop(1,    'rgb(4,15,19)');                                         // hacia la orilla: más oscuro
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, WORLD_R, 0, TAU); ctx.fill();
    ctx.lineWidth = Math.max(8, curR*2.2);                                        // halo de orilla (interior, tenue)
    ctx.strokeStyle = 'rgba(70,190,200,0.10)';
    ctx.beginPath(); ctx.arc(0, 0, WORLD_R - curR*1.4, 0, TAU); ctx.stroke();
    ctx.lineWidth = Math.max(3, curR*0.5);                                        // línea de orilla
    ctx.strokeStyle = 'rgba(40,130,140,0.55)';
    ctx.beginPath(); ctx.arc(0, 0, WORLD_R, 0, TAU); ctx.stroke();
  }

  // ── HUD: score lindo y destacado en la esquina superior izquierda (la der la ocupan los botones) ──
  function drawHUD() {
    if (manager.gameOver) return;
    const big = Math.round(36 * tscale()), small = Math.round(12 * tscale());
    const x = 16, y = 14;
    ctx.save();
    ctx.textBaseline = 'top'; ctx.textAlign = 'left';
    ctx.font = `700 ${small}px 'Segoe UI', system-ui, sans-serif`;               // etiqueta
    ctx.fillStyle = 'rgba(120,230,220,0.7)';
    ctx.fillText('SCORE', x + 2, y);
    ctx.font = `800 ${big}px 'Segoe UI', system-ui, sans-serif`;                 // número con glow (1 solo texto → shadowBlur barato)
    ctx.shadowColor = 'rgba(0,255,190,0.95)'; ctx.shadowBlur = 18;
    ctx.fillStyle = '#eafff6';
    ctx.fillText(String(manager.score), x, y + small + 3);
    ctx.shadowBlur = 0;
    // barra de XP + nivel (debajo del score). XP mixta: matar suma mucho, comer poco.
    const bw = Math.max(120, W*0.2), bh = Math.max(6, 7*tscale()), by = y + small + 3 + big + 6;
    const frac = manager.xpNeed ? Math.max(0, Math.min(1, manager.xp/manager.xpNeed)) : 0;
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(x, by, bw, bh);
    ctx.fillStyle = 'rgba(120,230,220,0.9)'; ctx.fillRect(x, by, bw*frac, bh);
    ctx.strokeStyle = 'rgba(120,230,220,0.35)'; ctx.lineWidth = 1; ctx.strokeRect(x+0.5, by+0.5, bw, bh);
    ctx.font = `700 ${small}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = 'rgba(180,255,240,0.9)';
    ctx.fillText('NIVEL ' + manager.level, x, by + bh + 3);
    ctx.restore();                                                                // (la vida va sobre la cabeza como las otras; el turbo en el propio orbe)
  }

  // ── MINIMAPA: disco en la esquina sup-derecha (debajo de los botones) que muestra el lago entero y la
  // posición de la cabeza, las estrellas (con su color), las minas y la medusa. El mundo (radio WORLD_R) se
  // escala al radio del minimapa; el origen del mundo cae en el centro del minimapa. ──
  function drawMinimap() {
    if (manager.gameOver) return;
    const mmR = Math.max(36, Math.min(W, H) * 0.085);
    const mmx = W - 14 - mmR, mmy = 58 + mmR;                                     // sup-derecha, despejado de la fila de botones
    const scale = mmR / WORLD_R;
    ctx.save();
    ctx.beginPath(); ctx.arc(mmx, mmy, mmR, 0, TAU); ctx.clip();                  // recorte circular
    ctx.fillStyle = 'rgba(6,24,30,0.66)'; ctx.fillRect(mmx-mmR, mmy-mmR, mmR*2, mmR*2);
    const dot = (wx, wy, color, r) => {
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(mmx + wx*scale, mmy + wy*scale, r, 0, TAU); ctx.fill();
    };
    const stepB = Math.max(1, Math.ceil(snake.length / 80));                     // cuerpo (muestreado: ~80 puntos máx), debajo del resto
    for (let i = snake.length - 1; i >= 0; i -= stepB) dot(snake[i].x, snake[i].y, snake[i]._bodyStr, 1.5);
    for (const e of enemies) {                                                   // serpientes enemigas (su color)
      const es = Math.max(1, Math.ceil(e.pieces.length / 30));
      for (let i = e.pieces.length - 1; i >= 0; i -= es) dot(e.pieces[i].x, e.pieces[i].y, `hsl(${e.hue},80%,55%)`, 1.6);
      if (e.groupId !== null) {                                                  // PAREJA: anillo blanco palpitante para resaltarlas
        const pr = 4 + 1.6*Math.abs(Math.sin(waveClock*5));
        ctx.lineWidth = 1.6; ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.beginPath(); ctx.arc(mmx + e.pieces[0].x*scale, mmy + e.pieces[0].y*scale, pr, 0, TAU); ctx.stroke();
      }
    }
    for (const f of food)      dot(f.x, f.y, `hsl(${f.hue},90%,62%)`, 2);
    for (const h of hazards)   dot(h.x, h.y, 'rgba(255,90,200,0.9)', 2);
    for (const j of treasures) dot(j.x, j.y, 'hsl(335,100%,72%)', 2.6);
    for (const s of seahorses) dot(s.x, s.y, 'hsl(32,100%,60%)', 2.6);
    const head = snake[0];
    if (head) {                                                                  // cabeza: punto brillante con halo
      ctx.fillStyle = 'rgba(0,255,190,0.35)'; ctx.beginPath(); ctx.arc(mmx + head.x*scale, mmy + head.y*scale, 5, 0, TAU); ctx.fill();
      dot(head.x, head.y, '#eafff6', 2.6);
    }
    ctx.restore();
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(70,190,200,0.18)';                // glow de orilla
    ctx.beginPath(); ctx.arc(mmx, mmy, mmR-1, 0, TAU); ctx.stroke();
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(50,150,160,0.75)';                // borde
    ctx.beginPath(); ctx.arc(mmx, mmy, mmR, 0, TAU); ctx.stroke();
    if (pairAlert > 0) {                                                         // aviso al aparecer una pareja
      ctx.fillStyle = `rgba(255,255,255,${0.5 + 0.5*Math.abs(Math.sin(waveClock*7))})`;
      ctx.font = `700 ${Math.round(12*tscale())}px 'Segoe UI', system-ui, sans-serif`;
      ctx.textAlign = 'right'; ctx.textBaseline = 'top';
      ctx.fillText('⚠ dúo', mmx + mmR, mmy + mmR + 4);
    }
  }

  // ════════════════ INPUT ════════════════
  // En TOUCH la dirección la da la PALANCA hand-rolled (más abajo); tocar el campo NO dirige — sólo sirve para
  // acelerar con 2+ dedos y para reiniciar en game over. En DESKTOP el mouse dirige (la cabeza va hacia el
  // puntero) y mantener el botón acelera (port de "LMB held = sprint").
  function evtPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
  // Conteo de dedos a NIVEL WINDOW (no por elemento): el pointerup/cancel siempre llega a window aunque el
  // dedo se deslice fuera del elemento donde empezó, así NUNCA quedan punteros zombi (esa era la causa de que
  // el boost/dirección se trabaran tras varios toques). 2+ dedos = acelerar.
  const activeTouches = new Set();
  let mousePressed = false;                                                      // desktop: botón del mouse = acelerar
  function updateSprint() {                                                      // sprint = INTENCIÓN de acelerar; el turbo real (con carga) lo maneja manager.updateTurbo
    sprint = sprintBtnHeld || mousePressed || activeTouches.size >= 2;           // 2+ dedos (o botón, o mouse en desktop)
  }
  addEventListener('pointerdown', e => { if (e.pointerType !== 'mouse') { activeTouches.add(e.pointerId); updateSprint(); } });
  function dropTouch(e) { if (activeTouches.delete(e.pointerId)) updateSprint(); }
  addEventListener('pointerup', dropTouch);
  addEventListener('pointercancel', dropTouch);
  function aimAt(px, py) {                                                       // fija el RUMBO de la cabeza hacia el puntero — sólo mouse (desktop)
    const head = snake[0];
    if (!head || manager.gameOver) return;
    const dx = px - W/2, dy = py - H/2, dz = curR * 1.5;                          // cámara: la cabeza está SIEMPRE en el centro de pantalla → rumbo = centro→puntero
    if (dx*dx + dy*dy > dz*dz) head.targetAng = Math.atan2(dy, dx);              // ignora inputs pegados al centro (dirección ambigua)
  }

  canvas.addEventListener('pointerdown', e => {
    const p = evtPos(e);
    if (manager.gameOver) { manager.reset(); btnPause.classList.remove('on'); return; }  // tocá para reiniciar
    hint.style.opacity = '0';
    if (e.pointerType === 'mouse') {
      mouseX = p.x; mouseY = p.y; aimAt(p.x, p.y);                               // desktop: el mouse dirige
      mousePressed = true;
      updateSprint();
    }
  });
  canvas.addEventListener('pointermove', e => {
    if (e.pointerType === 'mouse') { const p = evtPos(e); mouseX = p.x; mouseY = p.y; aimAt(p.x, p.y); }
  });
  function endPointer(e) {
    if (e.pointerType === 'mouse') { mousePressed = false; updateSprint(); }
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ── BOTONES ──
  // tap en pointerdown (responde aunque otro dedo esté dirigiendo en el canvas), igual que BallsWeb.
  function tappable(el, fn) { el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); }); }
  // press-and-hold: mantener apretado el botón ⚡ acelera; soltar/salir lo corta. SÓLO listeners en el propio
  // elemento (igual que el holdBtn de TankWARS): nada a nivel document, así no se pisa con la palanca.
  let sprintBtnHeld = false;
  function pressable(el, onDown, onUp) {
    const down = e => { e.preventDefault(); onDown(); };
    const up   = () => onUp();
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
    el.addEventListener('pointerleave', up);
  }

  const btnSprint = document.getElementById('btnSprint');
  pressable(btnSprint,
    () => { sprintBtnHeld = true;  updateSprint(); },
    () => { sprintBtnHeld = false; updateSprint(); });

  const btnPause = document.getElementById('btnPause');
  tappable(btnPause, () => {
    if (manager.gameOver) return;
    manager.pause = !manager.pause; manager.pauseBlinkCD = 0;
    btnPause.classList.toggle('on', manager.pause);
  });

  tappable(document.getElementById('btnReset'), () => { manager.reset(); btnPause.classList.remove('on'); });

  const btnDebug = document.getElementById('btnDebug');
  tappable(btnDebug, () => { showDebug = !showDebug; btnDebug.classList.toggle('on', showDebug); });

  // ── PALANCA DE DIRECCIÓN (hand-rolled) — sólo touch ──
  // Palanca propia, SIN nipplejs: aparece donde tocás dentro de la zona (mitad izq × 1/3 inferior) y su
  // dirección fija el RUMBO de la cabeza (head.targetAng), persistente entre inputs. La clave de robustez es
  // setPointerCapture: TODOS los eventos de ese dedo (move/up/cancel) llegan siempre a la zona, vaya donde
  // vaya el dedo, así NUNCA queda colgada — ni aunque otro dedo esté en el orbe de boost. nipplejs en modo
  // dynamic perdía el pointerup con multitouch y dejaba la palanca pegada al centro.
  const IS_TOUCH = (window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches) || 'ontouchstart' in window;
  const JOY_BASE_R = 52, JOY_KNOB_R = 30, JOY_DEAD = 7;    // px CSS (el ctx ya está escalado por dpr)
  let joy = null;                                          // { id, ox, oy, kx, ky } mientras dirigís, o null en reposo
  const jZone = document.getElementById('jMove');
  const jRest = document.getElementById('jMoveRest');
  if (IS_TOUCH) {
    jZone.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse') return;
      e.preventDefault();
      if (manager.gameOver) { manager.reset(); btnPause.classList.remove('on'); return; }   // tocá para reiniciar
      if (joy) return;                                     // ya hay un dedo dirigiendo; el 2º sólo cuenta para boost (window)
      try { jZone.setPointerCapture(e.pointerId); } catch {}
      const p = evtPos(e);
      joy = { id: e.pointerId, ox: p.x, oy: p.y, kx: p.x, ky: p.y };
      hint.style.opacity = '0';
      jRest.style.display = 'none';
    });
    jZone.addEventListener('pointermove', e => {
      if (!joy || e.pointerId !== joy.id) return;
      const p = evtPos(e);
      let dx = p.x - joy.ox, dy = p.y - joy.oy;
      const d = Math.hypot(dx, dy);
      if (d > JOY_BASE_R) { dx = dx/d*JOY_BASE_R; dy = dy/d*JOY_BASE_R; }   // el nub se clampa al borde de la base
      joy.kx = joy.ox + dx; joy.ky = joy.oy + dy;
      if (d > JOY_DEAD) { const head = snake[0]; if (head && !manager.gameOver) head.targetAng = Math.atan2(dy, dx); }
    });
    const endJoy = e => { if (joy && e.pointerId === joy.id) { joy = null; jRest.style.display = ''; } };
    jZone.addEventListener('pointerup', endJoy);
    jZone.addEventListener('pointercancel', endJoy);
    jZone.addEventListener('lostpointercapture', endJoy);
  } else {
    jZone.style.display = 'none';
    jRest.style.display = 'none';
  }
  // Dibuja la palanca ACTIVA sobre el canvas (la de reposo es el placeholder DOM .joyRest). Se llama en el loop.
  function drawJoystick() {
    if (!joy) return;
    ctx.beginPath(); ctx.arc(joy.ox, joy.oy, JOY_BASE_R, 0, TAU);          // base hundida
    ctx.fillStyle = 'rgba(0,255,140,0.06)'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,255,140,0.35)'; ctx.stroke();
    ctx.globalCompositeOperation = 'lighter';                              // nub con glow verde
    ctx.beginPath(); ctx.arc(joy.kx, joy.ky, JOY_KNOB_R, 0, TAU);
    const g = ctx.createRadialGradient(joy.kx, joy.ky - JOY_KNOB_R*0.3, JOY_KNOB_R*0.2, joy.kx, joy.ky, JOY_KNOB_R);
    g.addColorStop(0, 'rgba(170,255,210,0.9)'); g.addColorStop(1, 'rgba(0,220,130,0.5)');
    ctx.fillStyle = g; ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(190,255,220,0.8)'; ctx.stroke();
  }

  // ════════════════ MEJORAS (pool del sistema de niveles) ════════════════
  // Cada mejora: id, ícono, nombre, desc y apply(manager). Las `passive` son ÚNICAS (no se repiten en el pool).
  // Pediste stats base + alguna pasiva: las primeras 9 son numéricas (repetibles), las últimas 5 son pasivas.
  const UPGRADES = [
    { id:'hp',     ico:'❤️',  name:'Vitalidad',       desc:'+25 vida máxima y te curás',        apply:m=>{ m.maxHp += 25; m.hp = m.maxHp; } },
    { id:'regen',  ico:'➕',  name:'Regeneración',    desc:'+60% regeneración de vida',          apply:m=>{ m.regenMul += 0.6; } },
    { id:'dmg',    ico:'⚔️',  name:'Filo',            desc:'+20% daño de ataque',                apply:m=>{ m.dmgMul += 0.2; } },
    { id:'size',   ico:'🦈',  name:'Depredador',      desc:'+25% al bonus de daño por tamaño',   apply:m=>{ m.sizeDmgBonus += 0.25; } },
    { id:'turbA',  ico:'⚡',  name:'Turbo extendido', desc:'el turbo dura ~30% más',             apply:m=>{ m.turboDrainMul *= 0.78; } },
    { id:'turbR',  ico:'🔋',  name:'Recarga',         desc:'+45% recarga de turbo',              apply:m=>{ m.turboRechargeMul += 0.45; } },
    { id:'range',  ico:'🎯',  name:'Alcance',         desc:'+22% alcance del ataque',            apply:m=>{ m.atkRangeMul += 0.22; } },
    { id:'cone',   ico:'📐',  name:'Embestida ancha', desc:'cono de ataque más ancho',           apply:m=>{ m.atkConeBonus = Math.min(0.35, m.atkConeBonus + 0.18); } },
    { id:'turn',   ico:'🌀',  name:'Agilidad',        desc:'+20% velocidad de giro',             apply:m=>{ m.turnMul += 0.2; } },
    { id:'leech',  ico:'🩸',  name:'Sanguijuela',     desc:'PASIVA: curás 25% del daño que hacés', passive:true, apply:m=>{ m.lifesteal += 0.25; } },
    { id:'thorn',  ico:'🛡️',  name:'Espinas',         desc:'PASIVA: quien te ataca recibe 40% de vuelta', passive:true, apply:m=>{ m.thorns += 0.4; } },
    { id:'armor',  ico:'🪖',  name:'Coraza',          desc:'PASIVA: -20% daño recibido',         passive:true, apply:m=>{ m.armor = Math.min(0.7, m.armor + 0.2); } },
    { id:'feast',  ico:'🍽️',  name:'Festín',          desc:'PASIVA: comer cura el doble',        passive:true, apply:m=>{ m.healMul += 1; } },
    { id:'magnet', ico:'🧲',  name:'Imán',            desc:'PASIVA: atraés la comida de más lejos', passive:true, apply:m=>{ m.magnetMul += 0.8; } },
  ];
  function rollUpgrades() {                                                       // 3 mejoras al azar (excluye pasivas ya tomadas)
    const bag = UPGRADES.filter(u => !(u.passive && manager.takenPassives.has(u.id)));
    const pick = [];
    while (pick.length < 3 && bag.length) pick.push(bag.splice(ri(0, bag.length-1), 1)[0]);
    return pick;
  }
  function showUpgradeOverlay(list) {
    const ov = document.getElementById('levelup');
    document.getElementById('luLvl').textContent = manager.level;
    const cards = document.getElementById('luCards');
    cards.innerHTML = '';
    list.forEach(u => {
      const c = document.createElement('div');
      c.className = 'luCard' + (u.passive ? ' passive' : '');
      c.innerHTML = `<div class="luIco">${u.ico}</div><div class="luName">${u.name}</div><div class="luDesc">${u.desc}</div>`;
      c.addEventListener('pointerdown', e => { e.preventDefault(); ov.classList.remove('show'); ov.setAttribute('aria-hidden', 'true'); manager.applyUpgrade(u); });
      cards.appendChild(c);
    });
    ov.classList.add('show'); ov.setAttribute('aria-hidden', 'false');
  }

  // ════════════════ LOOP ════════════════
  function loop(now) {
    if (typeof now !== 'number') now = performance.now();
    deltaT = Math.min(0.05, (now - lastT) / 1000);                               // dt real, clamp 50ms (igual que Snake.py)
    lastT = now;
    dtSmoothed = dtSmoothed*0.9 + deltaT*0.1;
    if (!manager.gameOver && !manager.pause) { waveClock += deltaT; currentAng += deltaT*0.02; } // wiggle + giro lentísimo de la corriente
    curR = sper(0.01);                                                           // radio base, 1 sola vez por frame
    girth = 1 + GIRTH_MAX * Math.min(1, manager.fed / GIRTH_FOOD);               // engorde según la COMIDA acumulada (no el largo): crecés a lo ancho al comer
    manager.updateTurbo();                                                       // carga/descarga del turbo del jugador (antes de mover)
    if (pairAlert > 0) pairAlert = Math.max(pairAlert - deltaT, 0);              // aviso de pareja en el minimapa

    // ── PROCESO (lógica; no dibuja) ──
    if (!manager.gameOver) {
      // cabeza→cola: cada segmento lee la posición YA actualizada del de adelante → el movimiento se
      // propaga por TODA la cadena en un frame (independiente del fps). Cacheo n para no procesar las
      // piezas que la cabeza crea al comer este mismo frame.
      const n = snake.length;
      for (let i = 0; i < n; i++) snake[i].process();
    }
    for (const f of food) f.process();
    for (const h of hazards) h.process();
    for (const j of treasures) j.process();
    for (const s of seahorses) s.process();
    for (const e of enemies) e.process();
    if (enemies.some(e => e.dead)) enemies = enemies.filter(e => !e.dead);       // quitar las que murieron por choque (el manager respawnea desde afuera)
    manager.updateParticles();
    updateChunks();                                                              // pedazos voladores (golpes): mueven, frenan y se vuelven estrella o se desvanecen
    manager.process();
    updateAmbient();

    // mina: sacar segmentos de la cola DESPUÉS de procesar (popear durante el for dejaría índices undefined).
    if (manager.pendingShrink > 0) {
      const rem = Math.min(manager.pendingShrink, snake.length - 5);
      for (let i = 0; i < rem; i++) snake.pop();
      manager.pendingShrink = 0;
    }

    // ── CÁMARA: la cabeza queda SIEMPRE en el centro de la pantalla; el mundo se dibuja trasladado. En
    // muerte la cabeza no se mueve, así que la cámara queda congelada en el lugar donde se deshizo. ──
    const head = snake[0];
    if (head) { camX = head.x; camY = head.y; }
    // CULLING: límites de la vista en coords de mundo (+ margen), en los GLOBALES vL/vR/vT/vB (los usa también
    // el dibujo de los enemigos). Con la cámara pegada a la cabeza, en cuerpos largos la mayor parte cae fuera.
    const vm = curR*4; vL = camX - W/2 - vm; vR = camX + W/2 + vm; vT = camY - H/2 - vm; vB = camY + H/2 + vm;

    ctx.fillStyle = '#03080b'; ctx.fillRect(0, 0, W, H);                         // agua profunda fuera del lago
    ctx.save();
    ctx.translate(W/2 - camX, H/2 - camY);

    drawLake();
    drawAmbient();
    for (const e of enemies) e.draw();                                          // serpientes enemigas (debajo del jugador y los objetos)

    // GLOW del cuerpo: UN solo stroke aditivo a lo largo de toda la víbora (mucho más barato que N halos).
    // Si hay ESCUDO (medusa) se agrega un 2º stroke rosado, más ancho y tenue, sobre el mismo trazo → un
    // brillo de escudo que envuelve TODA la víbora (no sólo la cabeza). Pulsa suave.
    if (!manager.dying && snake.length > 1) {
      ctx.globalCompositeOperation = 'lighter';
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      // PERF: el stroke ANCHO está limitado por fillrate, no por vértices. En víboras largas DECIMAMOS el path
      // (1 de cada stepG): el trazo grueso tapa los huecos y se nota igual, pero hay muchos menos lineTo.
      const stepG = snake.length > 240 ? 3 : snake.length > 120 ? 2 : 1;
      ctx.beginPath();
      let pen = false;                                                           // culling: sólo trazo el tramo visible (corto el path en los huecos fuera de cámara)
      for (let i = 0; i < snake.length; i += stepG) {
        const e = snake[i];
        let x = e.x, y = e.y;
        if (e.id > 0) {                                                          // MISMO wiggle que el cuerpo, si no el glow va recto
          const off = Math.sin(waveClock*WIG_SPEED - e.id*WIG_DENSITY) * (curR*girth*WIG_AMP*Math.min(1, e.id/4));
          x += Math.cos(e.ang + Math.PI/2)*off;
          y += Math.sin(e.ang + Math.PI/2)*off;
        }
        if (inView(x, y)) { if (!pen) { ctx.moveTo(x, y); pen = true; } else ctx.lineTo(x, y); }
        else if (pen) { ctx.lineTo(x, y); pen = false; }                         // 1 punto extra al salir → el trazo llega al borde
      }
      if (manager.immunity > 0) {                                                // escudo: brillo rosado que TITILA alrededor de toda la víbora
        const ending = manager.immunity < 1.2;                                   // último tramo → titileo rápido y fuerte (aviso de que se termina)
        const t = Math.abs(Math.sin(waveClock*(ending ? 13 : 5)));               // 0..1
        const alpha = ending ? 0.10 + 0.95*t : 0.30 + 0.6*t;                     // UN solo stroke (antes 2 → mitad de fillrate): alpha más alto compensa
        ctx.strokeStyle = `hsla(335,100%,80%,${alpha})`;
        ctx.lineWidth = curR * girth * (2.6 + 0.7*t);                            // también late el grosor
        ctx.stroke();
      }
      ctx.strokeStyle = 'hsla(168,100%,55%,0.16)';                               // glow cian normal del cuerpo
      ctx.lineWidth = curR * girth * 2.7;
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    }

    // DIBUJO (en coords de mundo). En muerte NO se dibuja la víbora (se deshizo en partículas). Culling: se
    // saltean los segmentos fuera de cámara (la cabeza siempre se dibuja).
    if (!manager.dying) for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      if (s.id !== 0 && !inView(s.x, s.y)) continue;
      s.draw();
    }
    if (!manager.dying && snake[0]) {                                            // barra de vida del jugador sobre la cabeza (igual que las enemigas)
      const h = snake[0], rad = curR*girth*1.15, frac = Math.max(0, manager.hp/manager.maxHp);
      const bw = rad*3.4, bh = Math.max(3, rad*0.34), bx = h.x - bw/2, by = h.y - rad - bh*2.8;
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = `hsl(${110*frac},85%,54%)`; ctx.fillRect(bx, by, bw*frac, bh);
    }
    for (const h of hazards) h.draw();
    for (const f of food) f.draw();
    for (const j of treasures) j.draw();
    for (const s of seahorses) s.draw();
    drawChunks();                                                               // pedazos desprendidos por los golpes
    manager.drawParticles();                                                    // bursts de medusa + dispersión de muerte
    removeSprites();

    ctx.restore();

    // ── HUD / overlays (coords de PANTALLA, fuera de la cámara) ──
    drawHUD();
    drawMinimap();
    manager.draw();                                                             // game over / pausa / debug

    // punto-guía: en DESKTOP, en la posición del mouse (sólo visual). En touch alcanza con la palanca.
    if (!IS_TOUCH && !manager.gameOver) {
      const cr = Math.max(3, sper(0.006));
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.arc(mouseX, mouseY, cr*2.2, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.arc(mouseX, mouseY, cr, 0, TAU); ctx.fill();
    }
    if (IS_TOUCH) drawJoystick();                                                 // palanca activa (touch) por encima de todo

    requestAnimationFrame(loop);
  }

  // ── INIT ──
  resize();
  manager = new Manager();
  mouseX = xper(0.5); mouseY = yper(0.5);
  loop();

  const hint = document.getElementById('hint');
  setTimeout(() => hint.style.opacity = '0', 6000);
  </script>
  <script>
    document.getElementById('btnExit').addEventListener('click', () => {
      // Embebido en la shell del Arcade: postMessage para volver al menú sin recargar el iframe.
      // Suelto: navegamos directo (sin confirm — mismo patrón que el resto de los juegos).
      if (window.self !== window.top) {
        try { window.parent.postMessage({ type: 'arcade:exit' }, '*'); } catch (e) {}
        return;
      }
      try { screen.orientation && screen.orientation.unlock && screen.orientation.unlock(); } catch {}
      location.href = '../../Arcade/';
    });
  </script>
  <script>
    (function() {
      const EMBEDDED = (window.self !== window.top);
      const btn = document.getElementById('btnFs');
      btn.addEventListener('click', () => {
        // Embebido: same-origin → llamamos requestFullscreen DIRECTO sobre el doc padre para
        // preservar el user-activation del tap. postMessage perdía la activación.
        if (EMBEDDED) {
          try {
            const topDoc = window.top.document;
            if (topDoc.fullscreenElement || topDoc.webkitFullscreenElement) {
              (topDoc.exitFullscreen || topDoc.webkitExitFullscreen).call(topDoc);
            } else {
              const el = topDoc.documentElement;
              const req = el.requestFullscreen || el.webkitRequestFullscreen;
              const p = req.call(el);
              if (p && p.catch) p.catch(() => {});
            }
          } catch (e) {
            try { window.parent.postMessage({ type: 'arcade:fullscreen' }, '*'); } catch (e2) {}
          }
          return;
        }
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      });
      document.addEventListener('fullscreenchange', () => {
        document.body.classList.toggle('fs-on', !!document.fullscreenElement || EMBEDDED);
      });
      // Embebido: la shell nos avisa su estado de FS para sincronizar el ícono.
      window.addEventListener('message', e => { if (e.data && e.data.type === 'arcade:fs-state') document.body.classList.toggle('fs-on', !!e.data.on); });
      if (EMBEDDED) document.body.classList.add('fs-on');
    })();
  </script>

</body>
</html>
