<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Snake</title>
<style>
  :root { --bar-height: 66px; }                                                  /* tweak to taste */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  /* Canvas occupies only the space ABOVE the bar — the playfield (screenX/screenY) is sized to this
     rect, so the snake never runs behind the buttons. Dimensions are set explicitly from JS each resize. */
  #c {
    display: block; position: absolute;
    top: 0; left: 0;
    cursor: none;                                                                /* hide the OS cursor — we draw our own dot at the steering point (port of pygame.mouse.set_visible(False)) */
  }

  #hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    max-width: min(88vw, 480px);
    background: rgba(8,16,8,0.78); border: 1px solid rgba(120,255,120,0.22);
    padding: 12px 20px; border-radius: 14px;
    text-align: center; color: rgba(180,255,180,0.95);
    font-size: 13px; letter-spacing: 0.04em; line-height: 1.45;
    pointer-events: none; transition: opacity 0.8s; z-index: 2;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }

  /* ── Controles FLOTANTES sobre el canvas, sin barra (estilo TankWARS/CrazyTanks) ── */

  /* Menú chico arriba-derecha: pausa / reiniciar / debug / pantalla completa */
  #padMenu {
    position: absolute; top: calc(env(safe-area-inset-top) + 8px);
    right: calc(env(safe-area-inset-right) + 8px);
    z-index: 10; display: flex; gap: 8px;
  }
  #padMenu button {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid rgba(0,255,140,0.3);
    background: rgba(0,40,25,0.5);
    color: rgba(180,255,210,0.9);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s, border-color 0.12s;
  }
  #padMenu button svg { display: block; width: 16px; height: 16px; pointer-events: none; }
  #padMenu button:active { background: rgba(0,255,140,0.28); transform: scale(0.9); }
  #padMenu button.on { background: rgba(0,255,140,0.3); border-color: rgba(0,255,140,0.6); color: #fff; }
  #btnFs .ic-exit { display: none; }
  body.fs-on #btnFs .ic-enter { display: none; }
  body.fs-on #btnFs .ic-exit  { display: block; }

  /* Exit — ahora DENTRO de #padMenu (último = pegado a la esquina derecha). Hereda el tamaño/forma de
     #padMenu button; sólo le damos un dejo rojo para diferenciarlo y el rojo fuerte al presionar. */
  #btnExit { border-color: rgba(255,120,120,0.45) !important; color: rgba(255,190,190,0.9) !important; }
  #btnExit:active { background: rgba(240,90,95,0.32) !important; border-color: rgba(240,90,95,0.6) !important; color: #fff !important; }

  /* Palanca de dirección (hand-rolled). Zona invisible = TODO el ancho × 1/3 inferior: tocás en cualquier
     punto de abajo y la palanca se dibuja centrada en el dedo. El orbe de boost queda EXCLUIDO solo porque
     tiene mayor z-index (4 > 3) → intercepta sus propios toques. Sólo touch; en desktop se oculta. */
  #jMove { position: fixed; left: 0; bottom: 0; width: 100%; height: 33%; z-index: 3; touch-action: none; }
  .nipple .back {
    background: radial-gradient(circle at 50% 38%, rgba(0,255,140,0.12), rgba(0,255,140,0.03) 70%) !important;
    border: 1px solid rgba(0,255,140,0.35);
    box-shadow: inset 0 2px 14px rgba(0,0,0,0.5), 0 0 16px rgba(0,255,140,0.22);
    opacity: 1 !important;
  }
  .nipple .front {
    background: radial-gradient(circle at 50% 35%, rgba(160,255,200,0.95), rgba(0,230,140,0.55) 70%) !important;
    border: 1px solid rgba(190,255,220,0.8);
    box-shadow: 0 3px 10px rgba(0,0,0,0.5), 0 0 16px rgba(0,255,140,0.6);
    opacity: 1 !important;
  }

  /* Placeholder TENUE de la palanca: muestra una posición de descanso prolija al arrancar, antes del primer
     toque (en semi el joystick real recién se crea al tocar; después él mismo queda tenue donde lo soltaste). */
  .joyRest {
    position: fixed; left: 64px; bottom: calc(env(safe-area-inset-bottom) + 64px);
    width: 96px; height: 96px; border-radius: 50%;
    transform: translate(-50%, 50%); z-index: 2; pointer-events: none; opacity: 0.4;
    background: radial-gradient(circle at 50% 38%, rgba(0,255,140,0.12), rgba(0,255,140,0.03) 70%);
    border: 1px solid rgba(0,255,140,0.35);
    box-shadow: inset 0 2px 14px rgba(0,0,0,0.5), 0 0 16px rgba(0,255,140,0.22);
  }
  .joyRest::after {
    content: ''; position: absolute; left: 50%; top: 50%; width: 48px; height: 48px; border-radius: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 50% 35%, rgba(160,255,200,0.95), rgba(0,230,140,0.55) 70%);
    border: 1px solid rgba(190,255,220,0.8);
  }

  /* Boost: botón de acción grande y flotante, abajo-derecha, ARRIBA del botón de info. Orbe verde que
     brilla fuerte al mantenerlo (.on). Simétrico al joystick de la izquierda. */
  #btnSprint {
    position: absolute;
    right: 16px;
    bottom: calc(env(safe-area-inset-bottom) + 16px);
    width: 88px; height: 88px; border-radius: 50%;                               /* orbe de boost, simétrico al joystick (size 96) */
    z-index: 4; padding: 0; cursor: pointer; touch-action: none;
    display: flex; align-items: center; justify-content: center;
    color: #eafff2;
    border: 1px solid rgba(120,255,180,0.55);
    background:
      radial-gradient(circle at 50% 32%, rgba(170,255,210,0.30), rgba(0,200,120,0.10) 60%, rgba(0,40,25,0.20) 100%),
      linear-gradient(160deg, rgba(0,95,58,0.55), rgba(0,28,18,0.6));
    box-shadow: inset 0 2px 16px rgba(0,0,0,0.45), inset 0 0 18px rgba(0,255,150,0.18),
                0 6px 22px -6px rgba(0,255,150,0.5), 0 0 22px rgba(0,255,150,0.22);
    transition: transform 0.08s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
  }
  #btnSprint svg { width: 44px; height: 44px; pointer-events: none; filter: drop-shadow(0 0 6px rgba(140,255,190,0.85)); }
  #btnSprint:active, #btnSprint.on {
    transform: scale(0.94);
    border-color: rgba(180,255,215,0.95);
    background:
      radial-gradient(circle at 50% 35%, rgba(205,255,228,0.65), rgba(0,255,150,0.32) 60%, rgba(0,80,50,0.35) 100%),
      linear-gradient(160deg, rgba(0,165,98,0.7), rgba(0,60,40,0.6));
    box-shadow: inset 0 0 22px rgba(0,255,160,0.45), 0 0 34px rgba(0,255,150,0.7), 0 0 72px rgba(0,255,150,0.35);
  }

  /* ── Overlay de SUBIDA DE NIVEL: 3 cartas para elegir una mejora (roguelite). Congela el juego detrás. ── */
  #levelup {
    position: fixed; inset: 0; z-index: 20; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background: rgba(2,10,12,0.74);
  }
  #levelup.show { display: flex; }
  #luTitle { color: #eafff6; font-size: 26px; font-weight: 800; letter-spacing: 0.04em; text-shadow: 0 0 18px rgba(0,255,190,0.7); }
  #luSub { color: rgba(180,255,220,0.8); font-size: 13px; margin-top: -8px; letter-spacing: 0.04em; }
  #luCards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; max-width: min(94vw, 540px); }
  .luCard {
    width: 150px; min-height: 142px; border-radius: 16px; padding: 14px 12px; cursor: pointer;
    border: 1px solid rgba(0,255,140,0.35);
    background: linear-gradient(160deg, rgba(0,60,40,0.6), rgba(0,22,16,0.72));
    color: #eafff2; display: flex; flex-direction: column; gap: 7px; touch-action: none; text-align: left;
    transition: transform 0.08s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    box-shadow: inset 0 0 18px rgba(0,255,150,0.08), 0 6px 22px -8px rgba(0,255,150,0.4);
  }
  .luCard:active { transform: scale(0.95); border-color: rgba(120,255,200,0.95); box-shadow: 0 0 26px rgba(0,255,150,0.55); }
  .luCard .luIco { font-size: 26px; line-height: 1; }
  .luCard .luName { font-weight: 800; font-size: 15px; }
  .luCard .luDesc { font-size: 12px; line-height: 1.35; color: rgba(200,255,230,0.85); }
  .luCard.passive { border-color: rgba(255,200,90,0.55); background: linear-gradient(160deg, rgba(70,52,0,0.55), rgba(26,18,0,0.72)); }
  .luCard.passive .luName { color: #ffe6a8; }

</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">dirigí con la palanca · ⚡ para acelerar · comé estrellas, esquivá minas y no te muerdas la cola</div>
  <div id="levelup" aria-hidden="true">
    <div id="luTitle">¡NIVEL <span id="luLvl">2</span>!</div>
    <div id="luSub">elegí una mejora</div>
    <div id="luCards"></div>
  </div>
  <div id="padMenu">
    <button id="btnPause" aria-label="pausa" title="Pausa">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </button>
    <button id="btnReset" aria-label="reiniciar" title="Reiniciar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg>
    </button>
    <button id="btnDebug" aria-label="debug" title="Info / debug">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
    </button>
    <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
    </button>
    <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>

  <!-- Palanca de dirección (touch): zona invisible full-screen; la palanca aparece donde tocás (semi).
       Su dirección fija el rumbo de la cabeza. Mismo esquema dinámico que TankWARS. -->
  <div id="jMove" aria-label="dirección"></div>
  <div id="jMoveRest" class="joyRest"></div>

  <!-- Boost: botón de acción grande y flotante (abajo-derecha, arriba del de info), simétrico al joystick -->
  <button id="btnSprint" aria-label="acelerar" title="Acelerar (mantener)">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
  </button>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  SNAKE — port web fiel de Snake.py, con el mismo shell mobile que BallsWeb.
  //  Snake no-grid: la cabeza persigue el puntero, cada segmento persigue al
  //  anterior. Comés estrellas (crece +10), chocar un segmento "brillante"
  //  (cada 4º, id>5) es game over.
  //
  //  Notas de performance (el cuerpo puede llegar a cientos de segmentos):
  //   · sin sort por frame — el z-orden es fijo (cola→cabeza→comida→manager).
  //   · el radio se calcula 1 vez por frame (curR), no por pieza.
  //   · geometría con escalares (cero arrays por llamada) y distancia² (sin sqrt).
  //   · cada segmento cachea su string rgb() — no se reconstruye por círculo.
  // ════════════════════════════════════════════════════════════════════
  const TAU = Math.PI * 2;
  const MAX_HAZARDS = 16;                                                         // tope de minas (obstáculos no comestibles)
  // Serpiente MARINA en un lago: todo se mueve lento, como arrastrado por una corriente suave.
  const SNAKE_SPEED = 0.155;                                                      // velocidad base de la cabeza (× sper). Antes 0.3 → la mitad: deriva calma de lago
  const WIG_AMP = 0.5, WIG_SPEED = 3.4, WIG_DENSITY = 0.5;                        // ondulación del cuerpo: más amplia y MUCHO más lenta (reptar marino, no vibrar)
  const HAZARD_PENALTY = 10;                                                      // segmentos que te saca una mina al chocarla
  const HAZARD_FLASH_TIME = 0.4;                                                  // segundos de destello rojo al chocar una mina
  const FOOD_SPAWN_DELAY = 0.7, HAZARD_SPAWN_DELAY = 0.6, JELLY_SPAWN_DELAY = 6;  // delay entre apariciones (escalonado, no todas de golpe)
  const SPAWN_ANIM_TIME = 0.7;                                                    // duración de la animación de aparición (más lenta, acuática)
  const JELLY_IMMUNITY = 4.5;                                                     // segundos de escudo que da la medusa
  const SEAHORSE_SPAWN_DELAY = 8;                                                 // delay entre caballitos de mar (boost de velocidad)
  const SPEED_BOOST_TIME = 3, SPEED_BOOST_MULT = 3;                               // caballito: 3× la velocidad base por ~3 s (corto, sin indicador)
  const MAGNET_RANGE = 0.075;                                                     // distancia (× sper) a la que el comestible empieza a atraerse a la cabeza (radio chico)
  const MAGNET_SPEED = 0.16;                                                      // velocidad de atracción (× sper); muy suave, acelera al acercarse
  const MAGNET_RESID_TC = 0.5;                                                    // constante de freno de la velocidad residual: al salir del rango sigue un toque y desacelera
  const easeOutBack = t => { const c1 = 1.70158, c3 = c1 + 1, u = t - 1; return 1 + c3*u*u*u + c1*u*u; }; // pop con leve rebote
  const smoothstep = t => t*t*(3 - 2*t);                                          // S(0)=0,S(1)=1,S'(0)=S'(1)=0 → base del perfil del dash (sin tirón)
  // Tipos de estrella DEFINIDOS: color fijo + puntos. Las de más puntos son más raras (menor weight).
  const STAR_TYPES = [
    { hue: 45,  points: 100, weight: 48 },                                        // ámbar (la original) — la más común
    { hue: 135, points: 200, weight: 27 },                                        // verde
    { hue: 280, points: 300, weight: 17 },                                        // violeta
    { hue: 210, points: 400, weight: 8  },                                        // azul — la más rara
  ];
  const STAR_WEIGHT = STAR_TYPES.reduce((s, t) => s + t.weight, 0);
  function pickStarType() {
    let r = Math.random() * STAR_WEIGHT;
    for (const t of STAR_TYPES) { if ((r -= t.weight) < 0) return t; }
    return STAR_TYPES[0];
  }
  const DEATH_FADE = 1.6, DEATH_TEXT_DELAY = 0.7;                                 // game over: vida media de las partículas y delay del texto
  const WORLD_FACTOR = 1.7;                                                       // radio del lago = sper(WORLD_FACTOR) (mundo circular grande; cámara fija en la cabeza)
  // Crecimiento: los segmentos a sumar NO se materializan todos de golpe (se apilaban sin moverse al comer en
  // ráfaga); van saliendo de a pocos por frame desde un CONTADOR (manager.pendingGrow) y se despliegan solos.
  // Además la víbora ENGORDA con el largo (girth): se ve más grande y gorda a medida que crece.
  const GROW_DRIP = 2;                                                            // segmentos que se materializan por frame desde el contador
  const GIRTH_MAX = 1.3, GIRTH_LEN = 320;                                         // engorde MÁX: radio ×(1+GIRTH_MAX). El JUGADOR engorda con la COMIDA acumulada (abajo); las enemigas con su largo (~GIRTH_LEN segs)
  const GIRTH_FOOD = 700;                                                         // comida acumulada (fuel) para llegar al girth máximo: comer te hace crecer A LO ANCHO, no apilar largo sin espacio
  const LEN_GROW_FRAC = 0.3;                                                      // qué fracción del crecimiento va al LARGO (el resto es engorde). Bajalo si se sigue amontonando; 0 = sólo engorda
  const AGILITY_DROP = 0.4;                                                       // pérdida de agilidad de giro proporcional al engorde (gorda = gira más lento)
  const ENEMY_TARGET = 8;                                                         // cuántas serpientes enemigas mantener en juego (más población)
  const ENEMY_HUES = [5, 22, 60, 225, 255, 275];                                  // paleta más amplia (rojo/naranja/amarillo/azul/índigo/violeta) → menos coincidencias de color casuales
  const ENEMY_MAX_LEN = 130;                                                      // tope de largo de un enemigo (perf)
  const WAVE_TOTAL = 0.2;                                                          // duración de la onda de "respiración" (igual que el wave_time_total del jugador)
  // ── COMBATE: nadie muere por chocar; el daño es por ATAQUE. Si una serpiente ACELERA con la cabeza de otra
  //    en su cono frontal, la ataca: hace daño + un envión (lunge) hacia el rival. Tiene cooldown. Vida 0 = muere. ──
  const PLAYER_MAX_HP = 100, PLAYER_DMG = 22;                                      // vida y daño del jugador
  const ENEMY_DMG = 14;                                                           // daño base de las enemigas (la vida escala con su tamaño)
  const ATTACK_CD = 1.0;                                                           // cooldown entre ataques (s)
  const ATTACK_ANG = 0.55;                                                         // SEMIÁNGULO del cono de ataque (rad ~31°): hay que apuntar BASTANTE de frente al rival para dashear (antes ~66°, disparaba de costado)
  const ATTACK_RANGE_F = 0.13, ATTACK_COS = Math.cos(ATTACK_ANG);                  // alcance del cono (× sper) y coseno del semiángulo
  const LUNGE_WIND = 0.25, WIND_SPEED_F = 0.88;                                    // RETRACCIÓN: la serpiente se recoge antes de embestir (joroba twin-smoothstep, se ve sin tirón)
  const LUNGE_TIME = 0.28, LUNGE_SPEED_F = 1.9;                                    // EMBESTIDA: duración y velocidad pico (× sper); curva C1 → avance NETO ~+85px hacia el rival (con la retracción de ~-153px)
  const STRIKE_PEAK = 0.76;                                                        // dónde (0..1) cae el PICO de la embestida: 0.30 = arranque rápido/snap; 0.5 = simétrico. NO cambia el alcance neto (sólo el carácter del golpe)
  const ATTACK_HIT_F = 0.085;                                                      // RADIO de impacto (× sper): durante la embestida, el daño SÓLO cae si la cabeza llega a esta distancia del rival; sino erra
  const HAZARD_DMG = 14;                                                           // vida que saca una mina (más fuerte)
  const HP_REGEN = 1;                                                              // regeneración de vida por segundo
  const HEAL_RATE = 12;                                                            // velocidad de curación de la estrella (HP/s): la cura entra POR TIEMPO, no de golpe
  const SIZE_DMG_MAX = 0.5;                                                         // bonus de daño máximo por ser MÁS GRANDE que la víctima (+50%); 0 a igual tamaño
  const TURBO_DRAIN = 0.55, TURBO_RECHARGE = 0.4;                                  // carga del turbo (0..1/s): aguanta ~1.8 s, recarga ~2.5 s al SOLTAR
  const PAIR_CHANCE = 0.4;                                                         // probabilidad de que un spawn de enemiga sea una PAREJA (mismo color, 1 grande + 1 chica)
  // ── GOLPES → PEDAZOS: cada impacto (ataque conectado o mina) desprende uno o más "pedazos" que salen volando.
  //    Al morir, cada pedazo se DESVANECE o se convierte en ESTRELLA (re-comestible). Es el feedback visual del golpe. ──
  const CHUNK_DMG_PER = 12;                                                        // 1 pedazo por cada ~12 de daño recibido (mín 1)
  const CHUNK_MAX = 4;                                                             // tope de pedazos por golpe
  const CHUNK_STAR_CHANCE = 0.4;                                                   // probabilidad de que un pedazo termine en estrella (sino se desvanece)
  const CHUNK_LIFE = 1.1;                                                          // vida del pedazo volador (s)
  // ── MULTI-CABEZAS: algunas enemigas tienen cabezas EXTRA (cuellos que muerden por su cuenta). Un modelo
  //    unificado cubre 3 looks vía parámetros: 'cluster' (racimo al frente), 'hydra' (cuellos largos
  //    independientes desde un núcleo) y 'body' (cabezas repartidas a lo largo del cuerpo). ──
  const MULTIHEAD_CHANCE = 0.5;                                                    // probabilidad de que una enemiga (no-pareja) tenga cabezas extra
  const HEAD_LAYOUTS = ['cluster', 'hydra', 'body'];                               // looks disponibles (se elige al azar)
  // ── NIVELES (XP MIXTA): matar suma mucho, comer suma poco. Al llenar la barra subís de nivel y elegís 1 de 3
  //    mejoras (stats base + alguna pasiva). El umbral crece por nivel. ──
  const XP_KILL = 10, XP_EAT = 1;                                                  // XP por matar una enemiga / por comer una estrella
  const XP_BASE = 16, XP_GROWTH = 1.4;                                             // XP del nivel 1 y factor de crecimiento por nivel
  const HIT_SCORE = 1;                                                             // puntos por punto de daño que hacés (pegar suma score)
  const KILL_SCORE = 150;                                                          // bonus de score al matar una enemiga (+ su vida máxima → las grandes valen más)

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // ── ESTADO GLOBAL (al estilo del esqueleto del repo: los sprites lo leen directo) ──
  let W = 0, H = 0, dpr = 1;
  let screenX = 0, screenY = 0;                                                   // = W, H (alias para que las fórmulas de Snake.py calcen)
  let deltaT = 0, lastT = performance.now(), dtSmoothed = 1/60;
  let waveClock = 0;                                                              // reloj acumulado para la fase del wiggle visual
  let curR = 0;                                                                   // radio base por frame (= sper(0.01)); idéntico para toda pieza
  let girth = 1;                                                                  // factor de engorde por frame (crece con el largo); multiplica el radio del cuerpo
  let mouseX = 0, mouseY = 0;                                                     // punto de dirección (último puntero conocido)
  let sprint = false;                                                             // ×1.5 a la velocidad de TODA la serpiente (port de "mouseLeft")
  let showDebug = false;

  let snake = [];                                                                 // index === id; cola = último, cabeza = [0]
  let food = [];
  let hazards = [];                                                               // minas no comestibles: tocarlas te achican
  let treasures = [];                                                             // medusas bioluminiscentes (comestible nuevo: dan escudo + bonus)
  let seahorses = [];                                                             // caballitos de mar (boost de velocidad temporal)
  let enemies = [];                                                               // serpientes enemigas (IA: buscan comida, esquivan minas, evitan chocar)
  let chunks = [];                                                                // "pedazos" desprendidos al recibir un golpe (vuelan y se desvanecen o se vuelven estrella)
  let spritesToRemove = [];
  let manager = null;
  let WORLD_R = 0;                                                                // radio del lago (mundo circular), se fija en resize
  let camX = 0, camY = 0;                                                         // cámara (= posición de la cabeza); el mundo se dibuja trasladado
  let enemyGroupSeq = 0;                                                          // id incremental para parejas de enemigas
  let pairAlert = 0;                                                              // timer del aviso "apareció una pareja"
  let vL = 0, vR = 0, vT = 0, vB = 0;                                             // límites de la vista en coords de mundo (culling), se fijan por frame en el loop
  const inView = (x, y) => x >= vL && x <= vR && y >= vT && y <= vB;
  const ambient = [];                                                            // motas a la deriva (sensación de corriente)
  let currentAng = 0.7;                                                          // dirección de la corriente del lago (rota lentísimo)

  // ── HELPERS DE RESOLUCIÓN (idénticos a Snake.py) ──
  const xper = p => p * screenX;
  const yper = p => p * screenY;
  const sper = p => p * (screenX + screenY) / 2;
  const tscale = () => (screenX + screenY) / 2000;                               // los tamaños de texto eran absolutos a 1280×720 (suma 2000); acá escalan

  // ── HELPERS DE COLOR / GEOMETRÍA (port directo, con escalares para no asignar arrays) ──
  const clamp = v => Math.max(0, Math.min(255, v|0));
  const ri = (a, b) => a + Math.floor(Math.random() * (b - a + 1));              // randint inclusivo
  function randColorInRange(rL, rH, gL, gH, bL, bH) { return [ri(rL,rH), ri(gL,gH), ri(bL,bH)]; }
  function modifyColorPerc(c, off) { return [clamp(c[0]*off), clamp(c[1]*off), clamp(c[2]*off)]; }
  const rgb = c => `rgb(${c[0]},${c[1]},${c[2]})`;
  function getAngle2(prevAng, x1, y1, x2, y2) {
    let a = Math.atan2(y2-y1, x2-x1);
    if (a - prevAng < -Math.PI) a += TAU;
    if (a - prevAng >  Math.PI) a -= TAU;
    return a;
  }
  const rndRange = (a, b) => a + Math.random()*(b-a);

  // punto de aparición en coords de MUNDO: en un anillo alrededor de la cabeza (a tiro de cámara, pero no
  // encima) y siempre dentro del lago circular. Reemplaza el viejo rect en coords de pantalla.
  function randSpawnPoint(center) {
    const c = center || snake[0], hx = c ? c.x : 0, hy = c ? c.y : 0;
    const near = Math.min(W, H) * 0.18, far = Math.min(W, H) * 0.46;
    const a = Math.random()*TAU, d = rndRange(near, far);
    let x = hx + Math.cos(a)*d, y = hy + Math.sin(a)*d;
    const rr = Math.hypot(x, y), lim = WORLD_R - curR*5;                          // mantener adentro del lago
    if (rr > lim) { x = x/rr*lim; y = y/rr*lim; }
    return { x, y };
  }

  // velocidad del ataque a lo largo de la dirección del dash. Twin-smoothstep en AMBAS fases → velocidad y
  // aceleración ≈0 en cada borde (C1): mata el "tirón" del viejo salto de 0 a pico (eso era el wobble).
  //  · RETRACCIÓN (wind-up, se ve y a Franco le gusta): joroba hacia atrás 0→1→0, frena suave.
  //  · EMBESTIDA: envolvente asimétrica con el pico en STRIKE_PEAK (snap), que NUNCA cambia de signo → la cabeza
  //    sólo AVANZA (sin recoil/overshoot). El área de cada fase es EXACTAMENTE 0.5, así que el avance neto es
  //    cerrado: sper(LUNGE_SPEED_F)*LUNGE_TIME*0.5 hacia adelante, menos sper(WIND_SPEED_F)*LUNGE_WIND*0.5 atrás.
  function lungeVel(lungeT) {
    if (lungeT > LUNGE_TIME) {                                                     // RETRACCIÓN: lungeT∈(LUNGE_TIME, LUNGE_WIND+LUNGE_TIME]
      const wu = (LUNGE_WIND + LUNGE_TIME - lungeT) / LUNGE_WIND;                  // 0→1 a lo largo del wind-up
      const h = wu < 0.5 ? smoothstep(wu/0.5) : smoothstep((1-wu)/0.5);            // joroba 0→1→0 (pendiente 0 en 0/0.5/1)
      return -sper(WIND_SPEED_F) * h;
    }
    const s = 1 - lungeT / LUNGE_TIME, p = STRIKE_PEAK;                            // EMBESTIDA: s = 0→1 progreso
    const env = s < p ? smoothstep(s/p) : smoothstep((1-s)/(1-p));                 // 0→1 (pico en p) →0; C1, sin cambio de signo
    return sper(LUNGE_SPEED_F) * env;
  }
  // factor de locomoción durante la embestida ACTIVA: ~0.15 en el pico, 1 en los bordes y en toda la retracción.
  // Amortigua la locomoción/giro normal SÓLO en pleno golpe, para que el rumbo no pelee contra el vector fijo del
  // dash (2ª fuente de wobble, aparte del perfil de velocidad). Reusa la envolvente del strike (C0, sin const nueva).
  function lungeLoco(lungeT) {
    if (!(lungeT > 0 && lungeT <= LUNGE_TIME)) return 1;                          // sin lunge o en retracción: locomoción normal
    const s = 1 - lungeT/LUNGE_TIME, p = STRIKE_PEAK;
    const env = s < p ? smoothstep(s/p) : smoothstep((1-s)/(1-p));
    return 1 - 0.85*env;
  }

  // modificador de daño por DIFERENCIA DE TAMAÑO: +0% a igual tamaño, sube hasta maxB (def. SIZE_DMG_MAX) si el
  // que ataca es más grande que la víctima. Si es más chico, no penaliza (queda en 1). maxB lo sube una mejora.
  function sizeMod(aSize, vSize, maxB) { const m = maxB === undefined ? SIZE_DMG_MAX : maxB; return 1 + Math.min(m, Math.max(0, (aSize/vSize - 1) * m)); }

  // ¿el punto (tx,ty) está dentro del CONO de ataque de una cabeza en (hx,hy) mirando hacia hang? cos opcional
  // (coseno del semiángulo): por defecto ATTACK_COS, pero el jugador lo pasa más chico para un cono más ancho.
  function inAttackCone(hx, hy, hang, tx, ty, range, cos) {
    const c = cos === undefined ? ATTACK_COS : cos;
    const dx = tx-hx, dy = ty-hy, d = Math.hypot(dx, dy);
    if (d > range || d < 1e-3) return false;
    return (dx/d)*Math.cos(hang) + (dy/d)*Math.sin(hang) >= c;
  }

  // ¿la cabeza atacante en (hx,hy) CONECTA con el PUNTO DE ATAQUE (la CABEZA del rival) durante la embestida?
  // SÓLO la cabeza cuenta: rozar "otra parte" (el cuerpo) NO hace daño, y el golpe debe concretarse con el SALTO
  // alcanzando esa cabeza — no por estar en contacto con el cuerpo antes de saltar. El test corre sólo en la fase
  // de embestida (lungeT<=LUNGE_TIME). extraR = grosor del rival (a los grandes se les pega un toque más fácil).
  // (victimPieces queda para compatibilidad de llamadas; ya no se recorre el cuerpo.)
  function hitConnect(hx, hy, victimHead, victimPieces, extraR) {
    const hitR = sper(ATTACK_HIT_F) + extraR, dx = victimHead.x - hx, dy = victimHead.y - hy;
    return dx*dx + dy*dy < hitR*hitR;
  }

  // IMÁN: si el comestible está a tiro de la cabeza, se atrae hacia ella (más fuerte cuanto más cerca). Deja
  // una VELOCIDAD RESIDUAL: al salir del rango sigue moviéndose un toque y se frena suave (no se clava).
  function magnetPull(o) {
    if (o.mvx === undefined) { o.mvx = 0; o.mvy = 0; }
    const head = snake[0];
    if (head && !manager.gameOver) {
      const range = sper(MAGNET_RANGE) * manager.magnetMul;                       // mejora pasiva "Imán" agranda el radio
      const dx = head.x - o.x, dy = head.y - o.y, d = Math.hypot(dx, dy);
      if (d < range && d > 1e-3) {
        const k = 1 - d/range;                                                    // 0 en el borde del rango, 1 pegado a la cabeza
        const pull = sper(MAGNET_SPEED) * (0.25 + k*k);                           // arranca suave y acelera al acercarse
        o.mvx = dx/d * pull; o.mvy = dy/d * pull;                                 // refresca la velocidad mientras está en rango
      }
    }
    o.x += o.mvx * deltaT; o.y += o.mvy * deltaT;                                 // aplicar (residual al salir del rango)
    const fric = Math.exp(-deltaT / MAGNET_RESID_TC);
    o.mvx *= fric; o.mvy *= fric;
  }

  // Limita un comestible al borde del lago: si choca la orilla lo clava ahí y mata la velocidad radial saliente.
  function clampToLake(o) {
    const lim = WORLD_R - curR*2, rr = Math.hypot(o.x, o.y);
    if (rr > lim && rr > 1e-3) {
      const nx = o.x/rr, ny = o.y/rr;
      o.x = nx*lim; o.y = ny*lim;
      if (o.mvx !== undefined) { const vr = o.mvx*nx + o.mvy*ny; if (vr > 0) { o.mvx -= vr*nx; o.mvy -= vr*ny; } }
    }
  }

  // ── PEDAZOS (golpe → feedback visual): cada impacto desprende `count` pedazos que salen volando en torno a
  // `awayAng`, frenan en el agua y, al morir, se DESVANECEN o se vuelven ESTRELLA re-comestible (CHUNK_STAR_CHANCE).
  function spawnChunks(x, y, hue, awayAng, count, r) {
    for (let i = 0; i < count; i++) {
      const a = awayAng + rndRange(-0.95, 0.95), sp = sper(0.12) + Math.random()*sper(0.26);
      chunks.push({ x: x + rndRange(-r, r), y: y + rndRange(-r, r), vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
        r: r*rndRange(0.7, 1.15), hue, life: CHUNK_LIFE, maxLife: CHUNK_LIFE, ang: Math.random()*TAU,
        spin: rndRange(-7, 7), star: Math.random() < CHUNK_STAR_CHANCE });
    }
  }
  function updateChunks() {
    if (!chunks.length) return;
    const drag = Math.exp(-deltaT / 0.5);                                          // freno del agua
    const out = [];
    for (const c of chunks) {
      c.life -= deltaT;
      if (c.life <= 0) { if (c.star && !manager.gameOver) new Food(c.x, c.y); continue; } // al morir: estrella o nada
      if (!manager.pause) { c.x += c.vx*deltaT; c.y += c.vy*deltaT; c.vx *= drag; c.vy *= drag; c.ang += c.spin*deltaT; clampToLake(c); }
      out.push(c);
    }
    chunks = out;
  }
  function drawChunks() {
    if (!chunks.length) return;
    for (const c of chunks) {
      const a = c.life / c.maxLife;                                               // 1→0
      const toStar = c.star ? (1 - a) : 0;                                         // si va a ser estrella, vira a ámbar y "estrellea" al final
      const hue = c.hue + toStar*(45 - c.hue);
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = `hsla(${hue},95%,60%,${0.22*(0.4 + a)})`;
      ctx.beginPath(); ctx.arc(c.x, c.y, c.r*1.6, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = `hsla(${hue},85%,${52 + toStar*14}%,${0.45 + 0.5*a})`;
      ctx.beginPath(); ctx.arc(c.x, c.y, c.r*(0.6 + a*0.5), 0, TAU); ctx.fill();
      ctx.fillStyle = `hsla(${hue},100%,92%,${0.5*a})`;
      ctx.beginPath(); ctx.arc(c.x - c.r*0.3, c.y - c.r*0.3, c.r*0.3, 0, TAU); ctx.fill();
    }
  }

  // texto centrado / alineado (port de createText). alignment: 'center' | 'topleft' | 'topright'
  function createText(size, content, alignment, color, posX, posY) {
    const px = Math.round(size * tscale());
    ctx.font = px + "px 'Segoe UI', system-ui, sans-serif";
    ctx.textBaseline = (alignment === 'center') ? 'middle' : 'top';
    ctx.textAlign = alignment === 'topright' ? 'right' : (alignment === 'center' ? 'center' : 'left');
    ctx.fillStyle = rgb(color);
    ctx.fillText(content, posX, posY);
  }

  function removeSprites() {
    if (!spritesToRemove.length) return;
    const dead = new Set(spritesToRemove);
    food = food.filter(s => !dead.has(s));
    hazards = hazards.filter(s => !dead.has(s));
    treasures = treasures.filter(s => !dead.has(s));
    seahorses = seahorses.filter(s => !dead.has(s));
    spritesToRemove = [];
  }

  // ── primitivas de dibujo (style = color CSS ya armado, no se reconstruye por círculo) ──
  const WHITE = 'rgb(255,255,255)', DARKRED = 'rgb(100,0,0)';
  function circle(style, x, y, r) {
    ctx.fillStyle = style;
    ctx.beginPath(); ctx.arc(x, y, Math.max(0.5, r), 0, TAU); ctx.fill();
  }
  function line(style, x1, y1, x2, y2, w) {
    ctx.strokeStyle = style; ctx.lineWidth = w; ctx.lineCap = 'butt';
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }
  // cabeza de criatura genérica (cuerpo + sheen + 2 ojos con reflejo mirando hacia `ang`); la usan las cabezas extra
  function drawCreatureHead(x, y, ang, rad, hue, sat, light) {
    ctx.fillStyle = `hsl(${hue},${sat}%,${light}%)`;
    ctx.beginPath(); ctx.arc(x, y, rad, 0, TAU); ctx.fill();
    ctx.fillStyle = `hsla(${hue},100%,90%,0.5)`;
    ctx.beginPath(); ctx.arc(x - rad*0.3, y - rad*0.3, rad*0.34, 0, TAU); ctx.fill();
    const ca = Math.cos(ang), sa = Math.sin(ang), px = -sa, py = ca, eyeR = rad*0.42, pupR = rad*0.2;
    for (const sgn of [1, -1]) {
      const ex = x + ca*rad*0.36 + px*rad*0.5*sgn, ey = y + sa*rad*0.36 + py*rad*0.5*sgn;
      ctx.fillStyle = '#fff';            ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, TAU); ctx.fill();
      const lx = ex + ca*pupR*0.9, ly = ey + sa*pupR*0.9;
      ctx.fillStyle = '#0c1014';         ctx.beginPath(); ctx.arc(lx, ly, pupR, 0, TAU); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(lx - pupR*0.3, ly - pupR*0.3, pupR*0.36, 0, TAU); ctx.fill();
    }
  }

  // ════════════════ SNAKE PIECE ════════════════
  class SnakePiece {
    constructor(n, deployed) {
      this.id = this.z = n;
      this.vel = sper(SNAKE_SPEED);
      this.angVel = sper(0.01);
      this.ang = (this.id === 0) ? Math.random()*TAU : snake[this.id-1].ang;
      this.targetAng = this.ang;                                                 // dirección objetivo de la cabeza (control por rumbo)
      // COMBINACIÓN: el largo INICIAL nace ya DESPLEGADO (deployed=true → cada segmento a `link` detrás del
      // anterior, en línea), pero los que se agregan al COMER nacen APILADOS en la cola (deployed falsy) y se
      // van estirando al moverse, como antes. Desde un apilado total el seguidor sólo colapsa si TODA la
      // cadena arranca en el mismo punto; al comer sólo la cola nueva está apilada, así que se despliega bien.
      const ahead = this.id === 0 ? null : snake[this.id-1];
      const link0 = (curR || sper(0.01)) * 0.8;
      if (!ahead)         { this.x = 0; this.y = 0; }                             // cabeza: centro del MUNDO (la cámara la centra)
      else if (deployed)  { this.x = ahead.x - Math.cos(ahead.ang)*link0; this.y = ahead.y - Math.sin(ahead.ang)*link0; }
      else                { this.x = ahead.x; this.y = ahead.y; }                // "como antes": apilado en el de adelante
      this.wave_time = 0;
      this.wave_time_total = 0.2;
      // color FIJO por id (no depende del largo → comer NO recalcula color de toda la víbora). Gradiente
      // verde→cian que satura hacia la cola. Los 3 strings hsl se arman 1 sola vez acá, nunca por frame.
      const ct = Math.min(1, this.id / 60), chue = 145 + ct*55;
      this._glowStr  = `hsla(${chue},100%,55%,0.16)`;
      this._bodyStr  = `hsl(${chue},90%,56%)`;
      this._sheenStr = `hsla(${chue},100%,90%,0.5)`;
      snake.push(this);
    }

    process() {
      if (manager.gameOver || manager.pause) return;

      if (this.id === 0) {
        // CABEZA: control por DIRECCIÓN persistente. targetAng se fija SÓLO en cada input (ver aimAt en
        // los handlers de puntero); entre inputs la cabeza conserva el rumbo y va derecho — no orbita ni
        // recalcula hacia el punto, que queda sólo como guía visual. Para girar, das un nuevo input.
        this.vel = sper(SNAKE_SPEED);
        this.angVel = sper(0.01) * Math.max(0.3, 1 - (girth - 1) * AGILITY_DROP) * manager.turnMul; // pierde agilidad por engorde (clamp 0.3 para que girth alto no la anule); "Agilidad" la sube
        // girar hacia targetAng por el camino corto, clavando cuando ya está alineada
        let diff = this.targetAng - this.ang;
        diff = ((diff + Math.PI) % TAU + TAU) % TAU - Math.PI;
        let step = this.angVel * deltaT;
        const lungeActive = manager.lungeT > 0 && manager.lungeT <= LUNGE_TIME;
        if (lungeActive) {                                                        // en pleno golpe: ENCARAR el dash (la cabeza mira hacia donde embiste → head-on, no de costado)
          diff = Math.atan2(manager.lungeY, manager.lungeX) - this.ang;
          diff = ((diff + Math.PI) % TAU + TAU) % TAU - Math.PI;
          step = this.angVel * 4 * deltaT;                                        // gira rápido para encarar el golpe
        }
        this.ang += Math.abs(diff) <= step ? diff : Math.sign(diff) * step;
        this.ang = ((this.ang % TAU) + TAU) % TAU;
        // caballito: ×SPEED_BOOST_MULT la base, pero el multiplicador entra (y sale) en RAMPA rápida, no de golpe
        let sb = 1;
        if (manager.speedBoost > 0) {
          const RAMP = 0.4, up = Math.min(1, (SPEED_BOOST_TIME - manager.speedBoost) / RAMP), down = Math.min(1, manager.speedBoost / RAMP);
          sb = 1 + (SPEED_BOOST_MULT - 1) * Math.min(up, down);                   // sube en RAMP s, se mantiene, baja en los últimos RAMP s
        }
        const boost = (manager.boosting ? 1.5 : 1) * sb;                          // turbo (con carga) — ya no es el sprint directo
        const lf = lungeLoco(manager.lungeT);                                     // amortigua la locomoción normal en pleno golpe (el dash domina)
        this.x += Math.cos(this.ang) * this.vel * deltaT * boost * lf;
        this.y += Math.sin(this.ang) * this.vel * deltaT * boost * lf;
        if (manager.lungeT > 0) {                                                 // ataque: retracción → embestida; el daño SÓLO si CONECTA
          const v = lungeVel(manager.lungeT);                                    // perfil con easing (retracción → embestida)
          this.x += manager.lungeX*v*deltaT; this.y += manager.lungeY*v*deltaT;
          manager.lungeT -= deltaT;
          if (manager.lungeT <= LUNGE_TIME && !manager.atkHit) {                 // ventana de embestida: probar conexión cada frame (si erra, no pega)
            const e = manager.atkTarget;
            if (e && !e.dead && hitConnect(this.x, this.y, e.pieces[0], e.pieces, curR*e.sizeMul*e.g)) {
              manager.hitEnemy(e, PLAYER_DMG * manager.dmgMul * sizeMod(girth, e.sizeMul*e.g, SIZE_DMG_MAX + manager.sizeDmgBonus), this.ang);
              manager.atkHit = true;
            }
          }
        }
        this.checkHeadCol();
      } else {
        // CUERPO: seguidor de distancia FIJA. Se ubica a `link` detrás del segmento de adelante, en la
        // dirección actual. El espacio entre segmentos no depende de la velocidad (no se separa al
        // acelerar) ni del framerate, no puede colapsar y no serpentea. Como proceso cabeza→cola, toda
        // la cadena se reacomoda en un solo frame (incluidos los 10 que nacen apilados al comer).
        const ahead = snake[this.id-1];
        const link = curR * 0.8;
        let dx = this.x - ahead.x, dy = this.y - ahead.y;
        let d = Math.hypot(dx, dy);
        if (d < 1e-4) { dx = Math.cos(this.ang); dy = Math.sin(this.ang); d = 1; } // recién nacido apilado: separar según su ángulo
        this.x = ahead.x + dx/d * link;
        this.y = ahead.y + dy/d * link;
        this.ang = Math.atan2(-dy, -dx);                                          // mirando hacia el de adelante
      }

      // onda "respiración" que se propaga hacia la cola
      if (this.wave_time > 0) {
        this.wave_time = Math.max(this.wave_time - deltaT, 0);
        const next = snake[this.id+1];
        if (this.wave_time < this.wave_time_total*0.97 && this.wave_time > this.wave_time_total*0.5
            && next && next.wave_time === 0) {
          next.wave_time = this.wave_time_total;
        }
      }
    }

    draw() {
      const dAlpha = manager.dying ? this.deathAlpha : 1;                        // fade al romperse en game over
      if (dAlpha <= 0) return;                                                    // pedazo ya desvanecido
      ctx.globalAlpha = dAlpha;
      const baseR = curR * girth;                                                // engorda con el largo (más grande y gorda)
      let radius;
      if (this.id === 0 && snake.length > 80)      radius = baseR * 1.45;
      else if (this.id === 0 && snake.length > 40) radius = baseR * 1.25;
      else if (this.id === 0)                       radius = baseR * 1.12;        // cabeza siempre un toque más grande
      else                                          radius = baseR;

      // afinado progresivo hacia la cola
      const limit = snake.length - Math.min(snake.length/2, 20);
      if (this.id > limit) {
        const last = snake[snake.length-1];
        radius -= radius * ((this.id - limit) / (last.id - limit) * 0.55);
      }

      // pulso de "respiración" (al comer o al chocar una mina)
      let wavePulse = 0;
      if (this.wave_time > 0) {
        const wf = (this.wave_time_total - this.wave_time) / this.wave_time_total;
        wavePulse = Math.sin(Math.PI*wf);
        radius += baseR * (wavePulse * (this.id === 0 ? 3 : 1));
      }

      // wiggle visual lateral (NO toca this.x/this.y ni la colisión); atenuado cerca de la cabeza
      let drawX = this.x, drawY = this.y;
      if (this.id > 0 && !manager.dying) {
        const amp = baseR * WIG_AMP * Math.min(1, this.id / 4);
        const off = Math.sin(waveClock * WIG_SPEED - this.id * WIG_DENSITY) * amp;
        drawX += Math.cos(this.ang + Math.PI/2) * off;
        drawY += Math.sin(this.ang + Math.PI/2) * off;
      }

      // COLOR: los 3 strings hsl están pre-armados por id en el constructor (no dependen del largo, así
      // comer NO recalcula color de toda la víbora). Sólo el pulso (comer) y el destello (mina) arman
      // strings dinámicos, y eso afecta a pocos segmentos a la vez.
      const flash = manager.hitFlash > 0 ? manager.hitFlash / HAZARD_FLASH_TIME : 0;
      let glowStr = this._glowStr, bodyStr = this._bodyStr, sheenStr = this._sheenStr;
      if (flash > 0 || wavePulse > 0) {
        let hue = 145 + Math.min(1, this.id/60)*55, sat = 90, light = 56 + wavePulse*22;
        if (flash > 0) { hue = 0; sat = 95; light = 50 + flash*18; }
        glowStr  = `hsla(${hue},100%,55%,0.16)`;
        bodyStr  = `hsl(${hue},${sat}%,${light}%)`;
        sheenStr = `hsla(${hue},100%,90%,0.5)`;
      }

      // ── APÉNDICES MARINOS (aletas / cresta / cola), translúcidos: dan la silueta de serpiente de mar.
      // Baratos: triángulos/curvas con 'lighter' y sólo en algunos segmentos. this.ang apunta hacia ADELANTE
      // (hacia el segmento de adelante en el cuerpo / el rumbo en la cabeza); -(ca,sa) = hacia la cola.
      const ca2 = Math.cos(this.ang), sa2 = Math.sin(this.ang), nx = -sa2, ny = ca2;
      if (!manager.dying) {
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = sheenStr;
        if (this.id === 0) {                                                      // cresta/frills barriendo atrás a los lados de la cabeza
          for (const sgn of [1, -1]) {
            ctx.beginPath();
            ctx.moveTo(drawX + nx*sgn*radius*0.2, drawY + ny*sgn*radius*0.2);
            ctx.quadraticCurveTo(drawX - ca2*radius*0.5 + nx*sgn*radius*1.7, drawY - sa2*radius*0.5 + ny*sgn*radius*1.7,
                                 drawX - ca2*radius*1.7 + nx*sgn*radius*1.1, drawY - sa2*radius*1.7 + ny*sgn*radius*1.1);
            ctx.quadraticCurveTo(drawX - ca2*radius*1.5 + nx*sgn*radius*0.3, drawY - sa2*radius*1.5 + ny*sgn*radius*0.3,
                                 drawX - ca2*radius*0.7, drawY - sa2*radius*0.7);
            ctx.closePath(); ctx.fill();
          }
        } else if (this.id === snake.length - 1 && snake.length > 6) {            // aleta caudal (abanico en la punta)
          for (const sgn of [1, -1]) {
            ctx.beginPath();
            ctx.moveTo(drawX, drawY);
            ctx.lineTo(drawX - ca2*radius*2.6 + nx*sgn*radius*2.2, drawY - sa2*radius*2.6 + ny*sgn*radius*2.2);
            ctx.lineTo(drawX - ca2*radius*3.0 + nx*sgn*radius*0.4, drawY - sa2*radius*3.0 + ny*sgn*radius*0.4);
            ctx.closePath(); ctx.fill();
          }
        } else if (this.id > 0 && this.id % (snake.length > 160 ? 14 : 6) === 3) { // aletas laterales (más espaciadas en víboras largas)
          for (const sgn of [1, -1]) {
            ctx.beginPath();
            ctx.moveTo(drawX + ca2*radius*0.4 + nx*sgn*radius*0.2, drawY + sa2*radius*0.4 + ny*sgn*radius*0.2);
            ctx.lineTo(drawX - ca2*radius*0.6 + nx*sgn*radius*1.8, drawY - sa2*radius*0.6 + ny*sgn*radius*1.8);
            ctx.lineTo(drawX - ca2*radius*1.1 + nx*sgn*radius*0.3, drawY - sa2*radius*1.1 + ny*sgn*radius*0.3);
            ctx.closePath(); ctx.fill();
          }
        }
        ctx.globalCompositeOperation = 'source-over';
      }

      // cuerpo + brillo glossy. El glow ya NO es por segmento (era el mayor costo en mobile): ahora es
      // un solo stroke a lo largo de toda la víbora, dibujado en el loop antes de los cuerpos.
      ctx.fillStyle = bodyStr;
      ctx.beginPath(); ctx.arc(drawX, drawY, radius, 0, TAU); ctx.fill();
      if (this.id === 0 || snake.length < 160) {                                 // sheen: en víboras largas sólo la cabeza (mitad de fills, imperceptible)
        ctx.fillStyle = sheenStr;
        ctx.beginPath(); ctx.arc(drawX - radius*0.3, drawY - radius*0.3, radius*0.34, 0, TAU); ctx.fill();
      }

      if (this.id === 0) {
        // ojos con reflejo + pupila mirando hacia adelante
        const ca = Math.cos(this.ang), sa = Math.sin(this.ang);
        const px = Math.cos(this.ang + Math.PI/2), py = Math.sin(this.ang + Math.PI/2);
        const eyeR = radius*0.42, pupR = radius*0.2;
        for (const sgn of [1, -1]) {
          const ex = drawX + ca*radius*0.36 + px*radius*0.5*sgn, ey = drawY + sa*radius*0.36 + py*radius*0.5*sgn;
          ctx.fillStyle = '#fff';            ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, TAU); ctx.fill();
          const lx = ex + ca*pupR*0.9, ly = ey + sa*pupR*0.9;
          ctx.fillStyle = '#0c1014';         ctx.beginPath(); ctx.arc(lx, ly, pupR, 0, TAU); ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(lx - pupR*0.3, ly - pupR*0.3, pupR*0.36, 0, TAU); ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    }

    checkHeadCol() {
      const hx = this.x, hy = this.y, thr = curR*girth*2, thr2 = thr*thr;        // colisión escala con el engorde
      // mundo circular (lago): si la cabeza llega a la orilla, muerte. (Las serpientes NO mueren por chocarse
      // entre sí — el combate es por ataque/vida, ver manager.playerCombat / EnemySnake.combat.)
      if (hx*hx + hy*hy > (WORLD_R - curR)*(WORLD_R - curR)) { manager.die(); return; }
      // radio de agarre GENEROSO para comestibles: acorde al tamaño visual (estrella ~curR*1.55, medusa
      // ~curR*1.75) y SIN esperar a que termine de aparecer (si spawnea pegada, se come igual).
      const eatThr = curR*3.2, eatThr2 = eatThr*eatThr;
      for (const f of food) {
        if (f.grabbed) continue;
        const dx = f.x-hx, dy = f.y-hy;
        if (dx*dx + dy*dy < eatThr2) {
          f.grabbed = true;
          const amt = f.points / 20;                                             // fuel de crecimiento (5/10/15/20 según rareza)
          manager.score += f.points;                                             // puntos según el tipo (100/200/300/400)
          manager.fed += amt;                                                    // ENGORDE: el girth escala con la comida ACUMULADA (no con el largo)
          manager.pendingGrow += amt * LEN_GROW_FRAC;                            // largo reducido → deja de amontonarse sin espacio
          manager.healQueue += amt * manager.healMul;                            // CURA gradual ("Festín" la duplica)
          manager.addXP(XP_EAT);                                                 // XP mixta: comer suma poco
          this.wave_time = this.wave_time_total;
        }
      }
      for (const h of hazards) {                                                 // minas: no se comen ni matan; pegan fuerte + te arrancan un pedazo
        if (h.appear < 1) continue;                                             // no lastima mientras se materializa (telegrafía)
        const dx = h.x-hx, dy = h.y-hy;
        if (dx*dx + dy*dy < thr2) {
          spritesToRemove.push(h);                                              // la mina se consume (el manager respawnea otra lejos)
          manager.onHazardHit(h.x, h.y);
        }
      }
      for (const j of treasures) {                                               // medusa: escudo temporal + bonus + crecés un poco
        if (j.grabbed) continue;
        const dx = j.x-hx, dy = j.y-hy;
        if (dx*dx + dy*dy < eatThr2) { j.grabbed = true; manager.onJellyEat(j); }
      }
      for (const s of seahorses) {                                               // caballito: boost de velocidad + bonus
        if (s.grabbed) continue;
        const dx = s.x-hx, dy = s.y-hy;
        if (dx*dx + dy*dy < eatThr2) { s.grabbed = true; manager.onSeahorseEat(s); }
      }
    }
  }

  // ════════════════ FOOD (estrella giratoria con glow parpadeante) ════════════════
  class Food {
    constructor(atX, atY) {                                                       // (atX,atY) opcional: aparece ahí (drop al morir), salteando la búsqueda de posición
      this.z = -1;
      this.ang = Math.random()*TAU;
      this.glowCD = 1;
      this.grabbed = false;
      this.timer = 10;
      this.angVel = 0.9;                                                          // giro lento (acuático; la estrella es 4-simétrica: rápido estroboscopía)
      this.appear = 0;                                                           // animación de aparición (0→1)
      this.bob = Math.random()*TAU;                                              // fase de cabeceo (flota en el agua)
      this.driftAng = Math.random()*TAU;                                         // cada comestible deriva lento en SU dirección al azar
      const t = pickStarType();                                                  // tipo definido: ámbar 100 / verde 200 / violeta 300 / azul 400
      this.hue = t.hue; this.points = t.points;
      if (atX !== undefined) {                                                    // drop en una posición dada (al morir): sin búsqueda
        this.x = atX; this.y = atY;
      } else {
        // posición lejos del cuerpo, dentro del lago y a tiro de cámara. Reparte: a veces alrededor de un
        // enemigo (así también tienen qué comer), si no del jugador.
        const center = (enemies.length && Math.random() < 0.45) ? enemies[ri(0, enemies.length-1)].pieces[0] : snake[0];
        const minD = curR*10, minD2 = minD*minD;
        let reroll = true, guard = 0;
        while (reroll && guard++ < 40) {
          const p = randSpawnPoint(center); this.x = p.x; this.y = p.y;
          reroll = false;
          for (let i = 0; i < snake.length; i += 3) {                            // 1 de cada 3 (se solapan): evita O(N) caro al spawnear con cuerpo largo
            const dx = snake[i].x-this.x, dy = snake[i].y-this.y;
            if (dx*dx + dy*dy < minD2) { reroll = true; break; }
          }
        }
      }
      food.push(this);
    }

    process() {
      this.appear = Math.min(1, this.appear + deltaT / SPAWN_ANIM_TIME);
      if (!manager.gameOver && !manager.pause) {
        this.timer = Math.max(this.timer - deltaT, 0);
        this.bob += deltaT;
        const drift = sper(0.022);                                              // deriva lenta en su dirección random + leve cabeceo
        this.x += (Math.cos(this.driftAng) + Math.cos(this.bob)*0.25) * drift * deltaT;
        this.y += (Math.sin(this.driftAng) + Math.sin(this.bob*1.3)*0.25) * drift * deltaT;
        if (this.appear >= 1) magnetPull(this);                                  // a tiro de la cabeza se atrae sola (con velocidad residual)
        clampToLake(this);                                                       // no salir del lago: se limita al borde
      }
      this.glowCD = Math.max(this.glowCD - deltaT, 0);
      if (this.glowCD === 0) this.glowCD = this.timer <= 2 ? 0.2 : this.timer <= 5 ? 0.5 : 1;
      if (this.timer === 0 || this.grabbed) spritesToRemove.push(this);
      this.ang += this.angVel * deltaT;
    }

    draw() {
      const cx = this.x, cy = this.y, a = this.ang;
      const breath = 1 + Math.sin(waveClock*5 + this.ang)*0.12;
      const r = curR * 1.55 * breath * easeOutBack(this.appear);                 // escala de aparición (pop) — un poco más grande

      // urgencia: cuando está por expirar PARPADEA OSCURECIÉNDOSE (más rápido y más oscuro cuanto
      // menos tiempo queda) — contra el fondo negro se nota mucho más que aclarándose.
      let dim = 0;
      if (this.timer <= 5) {
        const urg = 1 - this.timer/5;                                            // 0 (5s) .. 1 (0s)
        dim = (0.5 + 0.5*Math.sin(waveClock*(7 + urg*18))) * (0.4 + urg*0.55);    // amplitud y frecuencia crecen con la urgencia
      }
      const hue = this.hue;                                                      // gema de color random
      const light = 64 - dim*54;                                                 // baja hacia oscuro al parpadear
      const fade  = (1 - dim*0.85) * Math.min(1, this.appear*1.4);               // incluye el fade-in de aparición

      // glow aditivo barato (SIN shadowBlur, que es carísimo en mobile y se redibuja cada frame):
      // 2 discos translúcidos con 'lighter'
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = `hsla(${hue},100%,55%,${0.20*fade})`;
      ctx.beginPath(); ctx.arc(cx, cy, r*1.5, 0, TAU); ctx.fill();
      ctx.fillStyle = `hsla(${hue},100%,62%,${0.30*fade})`;
      ctx.beginPath(); ctx.arc(cx, cy, r*0.9, 0, TAU); ctx.fill();
      // ESTRELLA DE 5 PUNTAS giratoria: UN solo path relleno (más barato que las 4 líneas de antes, y como
      // NO es 4-simétrica el giro se LEE bien sin estroboscopiar). a = this.ang la hace rotar.
      const SP = 5, outerR = r*1.5, innerR = r*0.62;
      ctx.beginPath();
      for (let i = 0; i < SP*2; i++) {
        const rr = (i % 2 === 0) ? outerR : innerR;
        const ang = a + i*Math.PI/SP - Math.PI/2;
        const x = cx + Math.cos(ang)*rr, y = cy + Math.sin(ang)*rr;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = `hsl(${hue},100%,${light}%)`; ctx.fill();                   // cuerpo de la estrella
      ctx.lineWidth = Math.max(1.5, r*0.12);                                      // rim brillante (con 'lighter' suma bloom)
      ctx.strokeStyle = `hsla(${hue},100%,${Math.max(30,light+22)}%,${0.95*fade})`; ctx.stroke();
      // brillo central (se apaga al oscurecer)
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = `rgba(255,255,255,${0.9*fade})`;
      ctx.beginPath(); ctx.arc(cx, cy, r*0.26, 0, TAU); ctx.fill();
    }
  }

  // ════════════════ HAZARD (mina — tocarla te achica y resta score, no mata) ════════════════
  class Hazard {
    constructor() {
      this.z = -1;
      this.ang = Math.random()*TAU;
      this.angVel = 1.0 * (Math.random() < 0.5 ? -1 : 1);                        // giro lento (8-simétrica: lento para no estroboscopiar)
      this.pulse = Math.random()*TAU;
      this.appear = 0;                                                           // animación de aparición (0→1)
      this.bob = Math.random()*TAU;
      // aparece lejos de la cabeza (para no matar de una) y separada del cuerpo y de otras minas
      const head = snake[0];
      const safe = curR*14, safe2 = safe*safe;
      const body = curR*4,  body2 = body*body;
      let ok = false, guard = 0;
      while (!ok && guard++ < 50) {
        const p = randSpawnPoint(); this.x = p.x; this.y = p.y;
        ok = true;
        if (head) { const dx = head.x-this.x, dy = head.y-this.y; if (dx*dx+dy*dy < safe2) { ok = false; continue; } }
        for (let i = 0; i < snake.length; i += 3) { const p = snake[i], dx = p.x-this.x, dy = p.y-this.y; if (dx*dx+dy*dy < body2) { ok = false; break; } } // 1 de cada 3
        if (!ok) continue;
        for (const h of hazards) { const dx = h.x-this.x, dy = h.y-this.y; if (dx*dx+dy*dy < safe2) { ok = false; break; } }
      }
      hazards.push(this);
    }
    process() {
      if (manager.pause) return;                                                 // sigue girando aun en game over (sólo se frena en pausa)
      this.appear = Math.min(1, this.appear + deltaT / SPAWN_ANIM_TIME);
      this.ang += this.angVel * deltaT;
      this.pulse += deltaT * 2.6;
      if (!manager.gameOver) {                                                    // deriva lenta con la corriente
        this.bob += deltaT;
        const drift = sper(0.01);
        this.x += (Math.cos(currentAng) + Math.cos(this.bob)*0.3) * drift * deltaT;
        this.y += (Math.sin(currentAng) + Math.sin(this.bob*1.2)*0.3) * drift * deltaT;
        clampToLake(this);                                                       // no salir del lago: se limita al borde (igual que las estrellas)
        const hd = snake[0];                                                     // si te alejaste mucho, esta mina se RECICLA: el manager spawnea otra cerca tuyo
        if (hd) { const dx = this.x-hd.x, dy = this.y-hd.y, far = Math.max(W,H)*1.15; if (dx*dx+dy*dy > far*far) spritesToRemove.push(this); }
      }
    }
    draw() {
      const cx = this.x, cy = this.y, a = this.ang;
      const sp = easeOutBack(this.appear);                                       // escala de aparición (pop)
      const spFade = Math.min(1, this.appear*1.4);
      const pulse = 1 + Math.sin(this.pulse)*0.12;
      const R0 = curR*1.55*pulse*sp, Ri = curR*0.8*sp;                           // punta y base de los pinchos
      const spikes = 8;
      ctx.save();
      ctx.globalAlpha = spFade;                                                  // fade-in de aparición sobre toda la mina
      // glow aditivo barato detrás de la mina (SIN shadowBlur, carísimo en mobile)
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(220,40,170,0.22)';
      ctx.beginPath(); ctx.arc(cx, cy, R0*1.15, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      ctx.beginPath();
      for (let i = 0; i < spikes*2; i++) {
        const rad = (i % 2 === 0) ? R0 : Ri;
        const ang = a + i*Math.PI/spikes;
        const x = cx + Math.cos(ang)*rad, y = cy + Math.sin(ang)*rad;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      const g = ctx.createRadialGradient(cx, cy, curR*0.2*sp, cx, cy, Math.max(0.01, R0)); // cuerpo oscuro
      g.addColorStop(0,   'rgb(110,28,110)');                                     // centro: magenta apagado
      g.addColorStop(0.55,'rgb(48,8,54)');                                        // medio: violeta oscuro
      g.addColorStop(1,   'rgb(10,2,16)');                                        // borde: casi negro
      ctx.fillStyle = g; ctx.fill();
      ctx.lineWidth = Math.max(1, curR*0.07*sp);                                  // borde brillante (con bloom) → mucho contraste sobre el cuerpo oscuro
      ctx.strokeStyle = 'rgba(255,110,215,0.9)'; ctx.stroke();
      // núcleo casi negro + "ojo" rojo palpitante + reflejo
      const eye = 0.85 + Math.sin(this.pulse)*0.15;
      ctx.fillStyle = 'rgb(14,3,18)'; ctx.beginPath(); ctx.arc(cx, cy, curR*0.52*sp, 0, TAU); ctx.fill();
      ctx.fillStyle = `rgb(255,${(40*eye)|0},${(70*eye)|0})`; ctx.beginPath(); ctx.arc(cx, cy, curR*0.24*sp, 0, TAU); ctx.fill();
      ctx.fillStyle = 'rgba(255,225,240,0.95)'; ctx.beginPath(); ctx.arc(cx - curR*0.08*sp, cy - curR*0.08*sp, curR*0.09*sp, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }

  // ════════════════ JELLY (medusa bioluminiscente — comestible nuevo: da ESCUDO temporal + bonus) ════════════════
  // Rosa luminosa, campana pulsante con flecos y tentáculos ondulantes que arrastra la corriente. Forma y
  // color muy distintos de la estrella ámbar (comida) y de la mina oscura/violeta. Comerla = inmunidad
  // (atravesás tu cuerpo) por unos segundos + bonus de score + crecés un poco.
  class Jelly {
    constructor() {
      this.z = -1;
      this.grabbed = false;
      this.appear = 0;
      this.timer = 14;                                                           // dura más que la comida (es premio raro)
      this.bob = Math.random()*TAU; this.pulse = Math.random()*TAU; this.swim = Math.random()*TAU;
      this.driftAng = Math.random()*TAU;                                         // deriva lento en su propia dirección random
      const minD = curR*12, minD2 = minD*minD;
      let reroll = true, guard = 0;
      while (reroll && guard++ < 40) {
        const p = randSpawnPoint(); this.x = p.x; this.y = p.y;
        reroll = false;
        for (let i = 0; i < snake.length; i += 3) { const dx = snake[i].x-this.x, dy = snake[i].y-this.y; if (dx*dx+dy*dy < minD2) { reroll = true; break; } }
      }
      treasures.push(this);
    }
    process() {
      this.appear = Math.min(1, this.appear + deltaT / SPAWN_ANIM_TIME);
      if (!manager.gameOver && !manager.pause) {
        this.timer = Math.max(this.timer - deltaT, 0);
        this.bob += deltaT; this.pulse += deltaT*1.8; this.swim += deltaT*2.2;
        const drift = sper(0.026);                                              // nada un poco más que la comida, en su dirección random
        this.x += (Math.cos(this.driftAng) + Math.cos(this.bob)*0.3) * drift * deltaT;
        this.y += (Math.sin(this.driftAng) + Math.sin(this.bob*1.2)*0.3) * drift * deltaT;
        if (this.appear >= 1) magnetPull(this);                                  // a tiro de la cabeza se atrae sola (con velocidad residual)
        clampToLake(this);                                                       // no salir del lago: se limita al borde
      }
      if (this.timer === 0 || this.grabbed) spritesToRemove.push(this);
    }
    draw() {
      const cx = this.x, cy = this.y, hue = 335;
      const sp = easeOutBack(this.appear);
      const fade = Math.min(1, this.appear*1.4) * (this.timer <= 4 ? (0.45 + 0.55*Math.abs(Math.sin(waveClock*6))) : 1); // parpadea al expirar
      const R = curR*1.75*sp*(1 + Math.sin(this.pulse)*0.16);                    // campana pulsante — un poco más grande
      const td = currentAng;                                                     // tentáculos barridos por la corriente
      const pdx = -Math.sin(td), pdy = Math.cos(td);                             // perpendicular a la corriente
      // tentáculos ondulantes (aditivos)
      ctx.globalCompositeOperation = 'lighter';
      ctx.lineCap = 'round';
      ctx.strokeStyle = `hsla(${hue},100%,75%,${0.5*fade})`;
      ctx.lineWidth = Math.max(1.5, R*0.12);
      for (let i = 0; i < 5; i++) {
        const off = (i-2)*R*0.32, sway = Math.sin(this.swim + i)*R*0.55;
        const bx = cx + pdx*off, by = cy + pdy*off;
        const mx = bx + Math.cos(td)*R*1.3 + pdx*sway,     my = by + Math.sin(td)*R*1.3 + pdy*sway;
        const ex = bx + Math.cos(td)*R*2.5 + pdx*sway*0.4, ey = by + Math.sin(td)*R*2.5 + pdy*sway*0.4;
        ctx.beginPath(); ctx.moveTo(bx, by); ctx.quadraticCurveTo(mx, my, ex, ey); ctx.stroke();
      }
      // halo de la campana
      ctx.fillStyle = `hsla(${hue},100%,62%,${0.30*fade})`;
      ctx.beginPath(); ctx.arc(cx, cy, R*1.8, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      // flecos del borde inferior (hacia la corriente)
      ctx.fillStyle = `hsla(${hue},100%,72%,${0.65*fade})`;
      for (let i = -2; i <= 2; i++) {
        const fx = cx + pdx*i*R*0.42 + Math.cos(td)*R*0.7, fy = cy + pdy*i*R*0.42 + Math.sin(td)*R*0.7;
        ctx.beginPath(); ctx.arc(fx, fy, R*0.24, 0, TAU); ctx.fill();
      }
      // campana (domo) translúcido con gradiente arriba
      const g = ctx.createRadialGradient(cx - Math.cos(td)*R*0.3, cy - Math.sin(td)*R*0.3, R*0.1, cx, cy, R);
      g.addColorStop(0,   `hsla(${hue},100%,92%,${0.95*fade})`);
      g.addColorStop(0.6, `hsla(${hue},100%,70%,${0.85*fade})`);
      g.addColorStop(1,   `hsla(${hue},90%,56%,${0.30*fade})`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.fill();
      // núcleo brillante (órganos bioluminiscentes)
      ctx.fillStyle = `rgba(255,238,250,${0.95*fade})`;
      ctx.beginPath(); ctx.arc(cx - Math.cos(td)*R*0.2, cy - Math.sin(td)*R*0.2, R*0.3, 0, TAU); ctx.fill();
    }
  }

  // ════════════════ SEAHORSE (caballito de mar — boost de velocidad temporal) ════════════════
  // Comerlo da un BOOST automático de 3× la velocidad base por unos segundos (corto, como el escudo) — sin
  // ningún indicador (se nota solo porque vas más rápido). Mismos puntos que la medusa. Color naranja-dorado.
  class Seahorse {
    constructor() {
      this.grabbed = false; this.appear = 0; this.timer = 12;
      this.bob = Math.random()*TAU; this.driftAng = Math.random()*TAU; this.points = 250;
      const minD = curR*12, minD2 = minD*minD;
      let reroll = true, guard = 0;
      while (reroll && guard++ < 40) {
        const p = randSpawnPoint(); this.x = p.x; this.y = p.y;
        reroll = false;
        for (let i = 0; i < snake.length; i += 3) { const dx = snake[i].x-this.x, dy = snake[i].y-this.y; if (dx*dx+dy*dy < minD2) { reroll = true; break; } }
      }
      seahorses.push(this);
    }
    process() {
      this.appear = Math.min(1, this.appear + deltaT / SPAWN_ANIM_TIME);
      if (!manager.gameOver && !manager.pause) {
        this.timer = Math.max(this.timer - deltaT, 0);
        this.bob += deltaT;
        const drift = sper(0.02);
        this.x += (Math.cos(this.driftAng) + Math.cos(this.bob)*0.3) * drift * deltaT;
        this.y += (Math.sin(this.driftAng) + Math.sin(this.bob*1.2)*0.3) * drift * deltaT;
        if (this.appear >= 1) magnetPull(this);
        clampToLake(this);
      }
      if (this.timer === 0 || this.grabbed) spritesToRemove.push(this);
    }
    draw() {
      const sp = easeOutBack(this.appear);
      const fade = Math.min(1, this.appear*1.4) * (this.timer <= 4 ? (0.45 + 0.55*Math.abs(Math.sin(waveClock*6))) : 1);
      const R = curR*1.7*sp, hue = 32;                                            // naranja-dorado
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(Math.sin(this.bob)*0.18);                                        // leve balanceo
      ctx.globalAlpha = fade;
      ctx.globalCompositeOperation = 'lighter';                                   // halo
      ctx.fillStyle = `hsla(${hue},100%,60%,0.28)`;
      ctx.beginPath(); ctx.arc(0, 0, R*1.7, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      // aleta dorsal
      ctx.fillStyle = `hsla(${hue},100%,72%,0.7)`;
      ctx.beginPath(); ctx.moveTo(-R*0.2, -R*0.1); ctx.quadraticCurveTo(-R*0.95, R*0.2, -R*0.18, R*0.55); ctx.closePath(); ctx.fill();
      // cuerpo curvo (cuello → panza → cola enroscada)
      ctx.strokeStyle = `hsl(${hue},88%,55%)`; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.lineWidth = R*0.72;
      ctx.beginPath();
      ctx.moveTo(0, -R*0.55);
      ctx.quadraticCurveTo(R*0.55, R*0.05, R*0.05, R*0.75);
      ctx.quadraticCurveTo(-R*0.5, R*1.15, R*0.25, R*1.4);                         // cola enroscando
      ctx.stroke();
      // cabeza + hocico hacia arriba
      ctx.fillStyle = `hsl(${hue},90%,58%)`;
      ctx.beginPath(); ctx.arc(0, -R*0.7, R*0.42, 0, TAU); ctx.fill();
      ctx.lineWidth = R*0.3;
      ctx.beginPath(); ctx.moveTo(0, -R*0.78); ctx.lineTo(R*0.66, -R*0.98); ctx.stroke();   // hocico
      // coronet (3 púas)
      ctx.fillStyle = `hsl(${hue},100%,66%)`;
      for (const dx of [-0.18, 0, 0.18]) { ctx.beginPath(); ctx.moveTo(dx*R, -R*1.02); ctx.lineTo(dx*R + R*0.04, -R*1.32); ctx.lineTo(dx*R - R*0.12, -R*1.04); ctx.closePath(); ctx.fill(); }
      // ojo + brillo
      ctx.fillStyle = '#0c1014'; ctx.beginPath(); ctx.arc(R*0.12, -R*0.74, R*0.1, 0, TAU); ctx.fill();
      ctx.fillStyle = 'rgba(255,240,210,0.95)'; ctx.beginPath(); ctx.arc(-R*0.08, -R*0.8, R*0.1, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // ════════════════ ENEMY SNAKE (serpiente con IA) ════════════════
  // Aparece DESDE FUERA del lago y nada hacia adentro; una vez integrada ya no sale (evita la orilla y, por
  // las dudas, se clampea). IA por steering (suma de vectores): busca la comida cercana, esquiva minas, evita
  // chocar al jugador / otras enemigas, y bordea la orilla. Tamaño (radio y largo) variado por instancia.
  class EnemySnake {
    constructor(opts) {
      opts = opts || {};
      this.hue = opts.hue !== undefined ? opts.hue : ENEMY_HUES[ri(0, ENEMY_HUES.length-1)];
      this.sizeMul = opts.sizeMul !== undefined ? opts.sizeMul : rndRange(0.7, 1.45); // grosor (la grande de una pareja es mayor)
      this.groupId = opts.groupId !== undefined ? opts.groupId : null;          // parejas comparten groupId (no se atacan ni se esquivan; van en grupo)
      this.leader = opts.leader || null;                                        // la chica ESCOLTA a la grande
      this.vel = sper(SNAKE_SPEED) * rndRange(0.8, 1.05);
      this.turnR = rndRange(2.7, 3.6);                                           // radio de giro MÍNIMO = turnR×grosor (no se enrosca encima)
      this.integrated = false;
      this.dead = false;
      this.hurt = 0;                                                             // destello al recibir daño
      this.roamT = 0; this.roamX = 0; this.roamY = 0;
      this.g = 1;
      this.wavePhase = Math.random()*TAU;
      this.aggro = rndRange(0.8, 1);                                             // MÁS agresivas: casi siempre comprometen al objetivo
      this.targetT = rndRange(0, 2); this.foe = null; this.foePlayer = false;
      this.chase = 1;
      this.maxHp = 50 * this.sizeMul; this.hp = this.maxHp;
      this.damage = ENEMY_DMG; this.attackCD = 0;
      this.lungeT = 0; this.lungeX = 0; this.lungeY = 0;
      this.atkFoe = null; this.atkPlayer = false; this.atkHit = false;           // objetivo del ataque en curso (daño al iniciar el dash)
      this.turbo = 1; this.boosting = false;                                     // turbo propio, MISMA mecánica que el jugador
      const len = Math.round(20 + (this.sizeMul - 0.7) * 55);                    // largo correlacionado con el tamaño
      const a = opts.entryAng !== undefined ? opts.entryAng : Math.random()*TAU; // (la pareja entra por el mismo lado)
      const R0 = WORLD_R * 1.12;
      this.ang = Math.atan2(-Math.sin(a), -Math.cos(a)) + rndRange(-0.4, 0.4);
      this.targetAng = this.ang;
      const hx = Math.cos(a)*R0, hy = Math.sin(a)*R0, link = curR*this.sizeMul*0.8;
      this.pieces = [];
      for (let i = 0; i < len; i++)
        this.pieces.push({ x: hx - Math.cos(this.ang)*link*i, y: hy - Math.sin(this.ang)*link*i, ang: this.ang, wt: 0 });
      this.extraHeads = [];                                                       // cabezas EXTRA (cuellos que muerden por su cuenta), según el layout
      this.coreHead = false;                                                      // si las cabezas extra salen del FRENTE (cluster/hydra), la cabeza base es un NÚCLEO sin ojos
      if (opts.headLayout) this.buildExtraHeads(opts.headLayout);
      enemies.push(this);
    }
    grow(n) { const last = this.pieces[this.pieces.length-1]; for (let i = 0; i < n && this.pieces.length < ENEMY_MAX_LEN; i++) this.pieces.push({ x: last.x, y: last.y, ang: last.ang, wt: 0 }); }
    startLunge(tx, ty) { const h = this.pieces[0], dx = tx-h.x, dy = ty-h.y, d = Math.hypot(dx, dy) || 1; this.lungeX = dx/d; this.lungeY = dy/d; this.lungeT = LUNGE_WIND + LUNGE_TIME; }
    // ── CABEZAS EXTRA: modelo unificado (cuellos que muerden solos). Un parámetro por cabeza define dónde se
    //    ancla al cuerpo (baseIdx), su largo (neckCount), su dirección de reposo (restOff/side) y cuánta
    //    LIBERTAD tiene para apuntar (freedom). De ahí salen los 3 looks: 'cluster', 'hydra' y 'body'. ──
    buildExtraHeads(layout) {
      this.layout = layout;
      this.coreHead = (layout === 'cluster' || layout === 'hydra');               // estas sacan las cabezas del frente → la base no lleva ojos (es de donde salen)
      const mk = (baseIdx, restOff, neckCount, freedom, side) => {
        const anchor = this.pieces[Math.min(baseIdx, this.pieces.length-1)];
        const h = { baseIdx, restOff, freedom, side, neckCount, ang: this.ang, targetAng: this.ang,
          x: anchor.x, y: anchor.y, neck: [], attackCD: rndRange(0, ATTACK_CD), lungeT: 0, lungeX: 0, lungeY: 0,
          atkPlayer: false, atkFoe: null, atkHit: false, wt: 0, bow: Math.random()*TAU };
        for (let i = 0; i < neckCount; i++) h.neck.push({ x: anchor.x, y: anchor.y });
        this.extraHeads.push(h);
      };
      if (layout === 'cluster') {                                                 // 2-3 cabezas en cuellos cortos, en abanico al FRENTE de un mismo cuerpo
        const n = ri(2, 3);
        for (let i = 0; i < n; i++) mk(1, (i - (n-1)/2)*0.6, 4, 0.95, 0);
      } else if (layout === 'hydra') {                                            // 2-3 cuellos LARGOS independientes desde el núcleo (mucha libertad → apuntan solos)
        const n = ri(2, 3);
        for (let i = 0; i < n; i++) mk(0, (i - (n-1)/2)*0.75, 8, 1.7, 0);
      } else if (layout === 'body') {                                             // cabezas repartidas a lo largo del cuerpo, saliendo a los lados (alternados)
        const n = ri(2, 4), span = Math.max(2, this.pieces.length - 5);
        for (let i = 0; i < n; i++) mk(3 + Math.floor((i+1)*span/(n+1)), 0, 3, 0.6, (i % 2 === 0) ? 1 : -1);
      }
    }
    startExtraLunge(h, tx, ty) { const dx = tx-h.x, dy = ty-h.y, d = Math.hypot(dx, dy) || 1; h.lungeX = dx/d; h.lungeY = dy/d; h.lungeT = LUNGE_WIND + LUNGE_TIME; h.attackCD = ATTACK_CD; h.wt = WAVE_TOTAL; }
    extraHeadHit(h) {                                                             // daño de una cabeza extra, SÓLO si la embestida conecta (hit-test)
      const mySize = this.sizeMul * this.g;
      if (h.atkPlayer && snake[0] && manager.immunity <= 0 && hitConnect(h.x, h.y, snake[0], snake, curR*girth)) {
        manager.hurtPlayer(this.damage * sizeMod(mySize, girth), this.ang, this); h.atkHit = true;
      } else if (h.atkFoe && !h.atkFoe.dead && hitConnect(h.x, h.y, h.atkFoe.pieces[0], h.atkFoe.pieces, curR*h.atkFoe.sizeMul*h.atkFoe.g)) {
        const f = h.atkFoe, dmg = this.damage * sizeMod(mySize, f.sizeMul*f.g);
        f.hp -= dmg; f.hurt = HAZARD_FLASH_TIME; if (f.pieces[0]) f.pieces[0].wt = WAVE_TOTAL;
        f.shedChunk(this.ang, Math.max(1, Math.min(CHUNK_MAX, Math.round(dmg/CHUNK_DMG_PER)))); if (f.hp <= 0) f.die();
        h.atkHit = true;
      }
    }
    processExtraHeads() {
      if (!this.extraHeads.length) return;
      const link = curR*this.sizeMul*0.8, range = sper(ATTACK_RANGE_F), det2 = (range*1.35)*(range*1.35);
      const ph = snake[0];
      for (const h of this.extraHeads) {
        if (h.wt > 0) h.wt = Math.max(h.wt - deltaT, 0);
        if (h.attackCD > 0) h.attackCD -= deltaT;
        const anchor = this.pieces[Math.min(h.baseIdx, this.pieces.length-1)];
        const bodyAng = anchor.ang;                                               // hacia adelante del cuerpo
        const restAng = bodyAng + (h.side ? h.side*1.4 : 0) + h.restOff;          // reposo: 'body' sale perpendicular; 'cluster'/'hydra' en abanico al frente
        const reach = link * (h.neck.length + 0.5);
        // objetivo: cabeza rival cerca → apunta hacia ella (limitado por su libertad); sino vuelve al reposo
        let tx = null, ty = null;
        if (ph && manager.immunity <= 0) { const dx = ph.x-h.x, dy = ph.y-h.y; if (dx*dx+dy*dy < det2) { tx = ph.x; ty = ph.y; } }
        if (tx === null) for (const e of enemies) {
          if (e === this || e.dead || (this.groupId !== null && e.groupId === this.groupId)) continue;
          const eh = e.pieces[0], dx = eh.x-h.x, dy = eh.y-h.y; if (dx*dx+dy*dy < det2) { tx = eh.x; ty = eh.y; break; }
        }
