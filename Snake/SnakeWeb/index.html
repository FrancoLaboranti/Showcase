    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = SEAFLOOR_TINT;                                               // capa AZULADA por ENCIMA → profundidad de mar (recortada al disco)
    ctx.fillRect(-WORLD_R, -WORLD_R, WORLD_R*2, WORLD_R*2);
    if (SEAFLOOR_PROCESS) {                                                       // viñeta de profundidad SÓLO en el look procesado (en test crudo se ve plano y completo)
      const vg = ctx.createRadialGradient(0, 0, WORLD_R*0.25, 0, 0, WORLD_R);
      vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(3,12,16,0.6)');
      ctx.fillStyle = vg; ctx.fillRect(-WORLD_R, -WORLD_R, WORLD_R*2, WORLD_R*2);
    }
    ctx.restore();
  }

  // ── LAGO: disco grande con gradiente teal y orilla. La cámara mantiene la cabeza en el centro, así que
  // cerca del borde se ve la orilla y afuera el agua profunda. ──
  function drawLake() {
    const g = ctx.createRadialGradient(0, 0, WORLD_R*0.05, 0, 0, WORLD_R);
    g.addColorStop(0,    'rgb(13,46,52)');                                        // centro: teal iluminado
    g.addColorStop(0.65, 'rgb(7,27,33)');
    g.addColorStop(1,    'rgb(4,15,19)');                                         // hacia la orilla: más oscuro
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, WORLD_R, 0, TAU); ctx.fill();
    ctx.lineWidth = Math.max(8, curR*2.2);                                        // halo de orilla (interior, tenue)
    ctx.strokeStyle = 'rgba(70,190,200,0.10)';
    ctx.beginPath(); ctx.arc(0, 0, WORLD_R - curR*1.4, 0, TAU); ctx.stroke();
    ctx.lineWidth = Math.max(3, curR*0.5);                                        // línea de orilla
    ctx.strokeStyle = 'rgba(40,130,140,0.55)';
    ctx.beginPath(); ctx.arc(0, 0, WORLD_R, 0, TAU); ctx.stroke();
  }

  // ── HUD: score lindo y destacado en la esquina superior izquierda (la der la ocupan los botones) ──
  function drawHUD() {
    if (manager.gameOver) return;
    const big = Math.round(36 * tscale()), small = Math.round(12 * tscale());
    const x = 16, y = 14;
    ctx.save();
    ctx.textBaseline = 'top'; ctx.textAlign = 'left';
    ctx.font = `700 ${small}px 'Segoe UI', system-ui, sans-serif`;               // etiqueta
    ctx.fillStyle = 'rgba(120,230,220,0.7)';
    ctx.fillText('SCORE', x + 2, y);
    ctx.font = `800 ${big}px 'Segoe UI', system-ui, sans-serif`;                 // número con glow (1 solo texto → shadowBlur barato)
    ctx.shadowColor = 'rgba(0,255,190,0.95)'; ctx.shadowBlur = 18;
    ctx.fillStyle = '#eafff6';
    ctx.fillText(String(manager.score), x, y + small + 3);
    ctx.shadowBlur = 0;
    // ── BARRA DE XP: cápsula redondeada, centrada arriba, llenando el hueco entre el score (izq) y los botones
    //    (der) con margen y simétrica respecto al centro. Sólo el NÚMERO de nivel debajo (sin "NIVEL", sin x/need). ──
    const scoreRight = x + ctx.measureText(String(manager.score)).width;         // borde derecho del score (fuente grande aún activa)
    const pr = document.getElementById('padMenu') ? document.getElementById('padMenu').getBoundingClientRect() : null;
    const mmR0 = Math.max(42, Math.min(W, H) * 0.10), mg = 16;                    // radio del minimapa (igual que drawMinimap)
    const by = (pr ? pr.bottom : 44) + 8;                                        // DEBAJO de los botones → despeja la cámara selfie en mobile
    const rightBound = (W - 14 - 2*mmR0) - mg;                                    // borde izquierdo del minimapa
    const hw = Math.max(60, Math.min(W/2 - (scoreRight + mg), rightBound - W/2)); // medio-ancho simétrico al centro, despejado del score y el minimapa
    const bw = hw*2, bx = W/2 - hw, bh = Math.max(7, 8*tscale()), rr = bh/2;
    const frac = manager.xpNeed ? Math.max(0, Math.min(1, manager.xp/manager.xpNeed)) : 0;
    rRect(bx, by, bw, bh, rr); ctx.fillStyle = 'rgba(10,30,34,0.55)'; ctx.fill(); // track
    if (frac > 0) {                                                              // relleno verde-azulado (en temática), recortado a la cápsula
      ctx.save(); rRect(bx, by, bw, bh, rr); ctx.clip();
      const g = ctx.createLinearGradient(bx, 0, bx + bw, 0);
      g.addColorStop(0, '#17e3c2'); g.addColorStop(1, '#3a9dff');
      ctx.fillStyle = g; ctx.fillRect(bx, by, bw*frac, bh);
      ctx.restore();
    }
    rRect(bx + 0.5, by + 0.5, bw - 1, bh - 1, rr); ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(130,235,225,0.30)'; ctx.stroke(); // borde fino
    ctx.font = `800 ${Math.round(13*tscale())}px 'Segoe UI', system-ui, sans-serif`; // sólo el NÚMERO de nivel, centrado debajo
    ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(190,255,240,0.92)';
    ctx.fillText(String(manager.level), W/2, by + bh + 4);
    // ── MODIFICADORES activos: lista de filas (ícono + valor) debajo del score; sólo los que difieren de la base ──
    const m = manager, rows = [];
    if (m.dmgMul           > 1)             rows.push(['⚔️', 'x' + m.dmgMul.toFixed(1)]);
    if (m.maxHp            > PLAYER_MAX_HP) rows.push(['❤️', String(Math.round(m.maxHp))]);
    if (m.regenMul         > 1)             rows.push(['➕', 'x' + m.regenMul.toFixed(1)]);
    if (m.sizeDmgBonus     > 0)             rows.push(['🦈', '+' + Math.round(m.sizeDmgBonus*100) + '%']);
    if (m.atkRangeMul      > 1)             rows.push(['🎯', 'x' + m.atkRangeMul.toFixed(1)]);
    if (m.atkConeBonus     > 0)             rows.push(['📐', '+' + Math.round(m.atkConeBonus*180/Math.PI) + '°']);
    if (m.turnMul          > 1)             rows.push(['🌀', 'x' + m.turnMul.toFixed(1)]);
    if (m.turboDrainMul    < 1)             rows.push(['⚡', '+' + Math.round((1/m.turboDrainMul - 1)*100) + '%']);
    if (m.turboRechargeMul > 1)             rows.push(['🔋', 'x' + m.turboRechargeMul.toFixed(1)]);
    if (m.lifesteal        > 0)             rows.push(['🩸', Math.round(m.lifesteal*100) + '%']);
    if (m.thorns           > 0)             rows.push(['🛡️', Math.round(m.thorns*100) + '%']);
    if (m.armor            > 0)             rows.push(['🪖', '-' + Math.round(m.armor*100) + '%']);
    if (m.healMul          > 1)             rows.push(['🍽️', 'x' + m.healMul.toFixed(0)]);
    if (m.magnetMul        > 1)             rows.push(['🧲', 'x' + m.magnetMul.toFixed(1)]);
    if (rows.length) {
      const fs = Math.round(12*tscale()), rowH = Math.round(fs*1.5);
      let ly = y + small + 3 + big + 12;                                          // arranca debajo del número de score
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.font = `600 ${fs}px 'Segoe UI', system-ui, sans-serif`;
      for (const [ico, val] of rows) {
        ctx.fillStyle = 'rgba(150,235,225,0.6)';  ctx.fillText(ico, x, ly);       // ícono tenue
        ctx.fillStyle = 'rgba(225,255,245,0.92)'; ctx.fillText(val, x + Math.round(fs*1.7), ly); // valor brillante
        ly += rowH;
      }
    }
    ctx.restore();                                                                // (la vida va sobre la cabeza como las otras; el turbo en el propio orbe)
  }

  // ── PEZ LINTERNA: oscurece TODA la escena (1 fill screen-space) y deja sólo el SEÑUELO + un CONO de luz.
  //    Va después del mundo (restore) y antes del HUD → atenúa el juego pero NO la barra/minimapa. Barato:
  //    1 fillRect + 2 gradientes radiales (cono recortado a triángulo + orbe), sin trabajo por-píxel. ──
  function drawAnglerDark() {
    const ab = bosses.find(b => !b.dead && b.type === 'angler'); if (!ab || manager.gameOver) return;
    const lit = ab.aphase === 'blackout' || ab.aphase === 'reposition';          // apagón total al reposicionar
    const arming = ab.aphase === 'windup' || ab.aphase === 'lunge';              // armando/embistiendo → el cono se pone ROJO (AVISO)
    const tgt = lit ? 0.9 : (arming ? 0.42 : 0.5);                              // fuera del apagón NO muy oscuro → las enemigas siguen visibles
    ab.darkA += (tgt - ab.darkA) * Math.min(1, deltaT*6);                        // ease suave del oscurecimiento
    ctx.fillStyle = `rgba(2,6,10,${ab.darkA})`; ctx.fillRect(0, 0, W, H);
    const glow = lit ? 0 : Math.min(1, (ANGLER_LURE_T - ab.aphaseT) / 0.3);       // ramp: el señuelo aparece a medida que se levanta el apagón (sin pop)
    if (glow <= 0) return;
    const sx = W/2 + (ab.lureX - camX), sy = H/2 + (ab.lureY - camY);            // mundo → pantalla (inverso del translate de la cámara)
    const len = sper(ANGLER_CONE_LEN_F);
    ctx.save(); ctx.globalCompositeOperation = 'lighter';                        // CONO: clip triangular + 1 gradiente
    ctx.beginPath(); ctx.moveTo(sx, sy);
    ctx.lineTo(sx + Math.cos(ab.ang - ANGLER_CONE_HALF)*len, sy + Math.sin(ab.ang - ANGLER_CONE_HALF)*len);
    ctx.lineTo(sx + Math.cos(ab.ang + ANGLER_CONE_HALF)*len, sy + Math.sin(ab.ang + ANGLER_CONE_HALF)*len);
    ctx.closePath(); ctx.clip();
    const coneHue = arming ? 8 : ab.hue, coneInt = arming ? 0.85 : 0.5;          // ROJO e intenso al armar/embestir (telegrafía clara del golpe)
    const cg = ctx.createRadialGradient(sx, sy, 0, sx, sy, len);
    cg.addColorStop(0, `hsla(${coneHue},95%,${arming ? 58 : 62}%,${coneInt*glow})`); cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg; ctx.fillRect(sx - len, sy - len, len*2, len*2);
    ctx.restore();
    ctx.save(); ctx.globalCompositeOperation = 'lighter';                        // ORB del señuelo: 1 gradiente chico + núcleo brillante
    const lr = sper(0.05)*(0.85 + 0.15*Math.sin(ab.lurePhase));
    const og = ctx.createRadialGradient(sx, sy, 0, sx, sy, lr);
    og.addColorStop(0, `hsla(${arming ? 8 : ab.hue},100%,${arming ? 70 : 80}%,${0.95*glow})`); og.addColorStop(1, 'rgba(0,0,0,0)'); // el orbe también vira a rojo al armar
    ctx.fillStyle = og; ctx.beginPath(); ctx.arc(sx, sy, lr, 0, TAU); ctx.fill();
    ctx.fillStyle = `rgba(230,255,255,${0.95*glow})`; ctx.beginPath(); ctx.arc(sx, sy, lr*0.18, 0, TAU); ctx.fill();
    ctx.restore();
  }

  // ── BARRA DE BOSS: cápsula full-width (de lado a lado) debajo de la barra de XP. Sólo durante la pelea.
  //    Nombre centrado arriba + fill en el color del jefe. ──
  function drawBossBar() {
    const b = bosses[0]; if (!b || manager.gameOver) return;
    const frac = Math.max(0, Math.min(1, b.hp/b.maxHp)), hue = 0;                // barra SIEMPRE ROJA (hue 0), sin importar el color del jefe
    const pm = document.getElementById('padMenu');
    const top = (pm ? pm.getBoundingClientRect().bottom : 44) + 8;               // = altura de la barra de XP (debajo de los botones)
    const xpBh = Math.max(7, 8*tscale());
    const bh = Math.max(13, H*0.024), mgn = Math.max(16, W*0.05), bx = mgn, bw = W - mgn*2;
    const by = top + xpBh + 24, rr = bh/2;                                       // debajo de la XP y su número de nivel
    ctx.save();
    ctx.font = `800 ${Math.round(13*tscale())}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = `hsl(${hue},90%,78%)`; ctx.shadowColor = `hsla(${hue},90%,60%,0.9)`; ctx.shadowBlur = 10;
    ctx.fillText(b.name, W/2, by - 5); ctx.shadowBlur = 0;
    rRect(bx, by, bw, bh, rr); ctx.fillStyle = 'rgba(22,6,16,0.72)'; ctx.fill(); // track
    if (frac > 0) {
      ctx.save(); rRect(bx, by, bw, bh, rr); ctx.clip();
      const g = ctx.createLinearGradient(bx, 0, bx + bw, 0);
      g.addColorStop(0, `hsl(${hue},85%,44%)`); g.addColorStop(1, `hsl(${hue},95%,66%)`);
      ctx.fillStyle = g; ctx.fillRect(bx, by, bw*frac, bh);
      ctx.fillStyle = 'rgba(255,255,255,0.13)'; ctx.fillRect(bx, by, bw*frac, bh*0.45); // brillo superior
      ctx.restore();
    }
    rRect(bx + 0.5, by + 0.5, bw - 1, bh - 1, rr); ctx.lineWidth = 1.5; ctx.strokeStyle = `hsla(${hue},90%,78%,0.5)`; ctx.stroke();
    ctx.restore();
  }

  // ── MINIMAPA: disco en la esquina sup-derecha (debajo de los botones) que muestra el lago entero y la
  // posición de la cabeza, las estrellas (con su color), las minas y la medusa. El mundo (radio WORLD_R) se
  // escala al radio del minimapa; el origen del mundo cae en el centro del minimapa. ──
  function drawMinimap() {
    if (manager.gameOver) return;
    const mmR = Math.max(42, Math.min(W, H) * 0.10);
    const mmx = W - 14 - mmR, mmy = 58 + mmR;                                     // sup-derecha, despejado de la fila de botones
    const scale = mmR / WORLD_R;
    ctx.save();
    ctx.beginPath(); ctx.arc(mmx, mmy, mmR, 0, TAU); ctx.clip();                  // recorte circular
    ctx.fillStyle = 'rgba(6,24,30,0.66)'; ctx.fillRect(mmx-mmR, mmy-mmR, mmR*2, mmR*2);
    const dot = (wx, wy, color, r) => {
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(mmx + wx*scale, mmy + wy*scale, r, 0, TAU); ctx.fill();
    };
    const stepB = Math.max(1, Math.ceil(snake.length / 80));                     // cuerpo (muestreado: ~80 puntos máx), debajo del resto
    for (let i = snake.length - 1; i >= 0; i -= stepB) dot(snake[i].x, snake[i].y, snake[i]._bodyStr, 1.5);
    for (const e of enemies) {                                                   // serpientes enemigas (su color)
      const es = Math.max(1, Math.ceil(e.pieces.length / 30));
      for (let i = e.pieces.length - 1; i >= 0; i -= es) dot(e.pieces[i].x, e.pieces[i].y, `hsl(${e.hue},80%,55%)`, 1.6);
      if (e.groupId !== null) {                                                  // PAREJA: anillo blanco palpitante para resaltarlas
        const pr = 4 + 1.6*Math.abs(Math.sin(waveClock*5));
        ctx.lineWidth = 1.6; ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.beginPath(); ctx.arc(mmx + e.pieces[0].x*scale, mmy + e.pieces[0].y*scale, pr, 0, TAU); ctx.stroke();
      }
    }
    for (const f of food)      dot(f.x, f.y, `hsl(${f.hue},${f.sat}%,${Math.min(72,f.light)}%)`, 2); // tono de la rareza (común whitish)
    for (const h of hazards)   dot(h.x, h.y, 'rgba(255,90,200,0.9)', 2);
    for (const j of treasures) dot(j.x, j.y, 'hsl(335,100%,72%)', 2.6);
    for (const s of seahorses) dot(s.x, s.y, 'hsl(32,100%,60%)', 2.6);
    for (const b of bosses) {                                                    // JEFE: punto grande pulsante + anillo en su color (siempre localizable)
      const pr = 4 + 2*Math.abs(Math.sin(waveClock*4));
      dot(b.x, b.y, `hsl(${b.hue},90%,62%)`, 3.4);
      ctx.lineWidth = 1.8; ctx.strokeStyle = `hsl(${b.hue},90%,78%)`;
      ctx.beginPath(); ctx.arc(mmx + b.x*scale, mmy + b.y*scale, pr, 0, TAU); ctx.stroke();
    }
    const head = snake[0];
    if (head) {                                                                  // cabeza: punto brillante con halo
      ctx.fillStyle = 'rgba(0,255,190,0.35)'; ctx.beginPath(); ctx.arc(mmx + head.x*scale, mmy + head.y*scale, 5, 0, TAU); ctx.fill();
      dot(head.x, head.y, '#eafff6', 2.6);
    }
    ctx.restore();
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(70,190,200,0.18)';                // glow de orilla
    ctx.beginPath(); ctx.arc(mmx, mmy, mmR-1, 0, TAU); ctx.stroke();
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(50,150,160,0.75)';                // borde
    ctx.beginPath(); ctx.arc(mmx, mmy, mmR, 0, TAU); ctx.stroke();
    if (pairAlert > 0) {                                                         // aviso al aparecer una pareja
      ctx.fillStyle = `rgba(255,255,255,${0.5 + 0.5*Math.abs(Math.sin(waveClock*7))})`;
      ctx.font = `700 ${Math.round(12*tscale())}px 'Segoe UI', system-ui, sans-serif`;
      ctx.textAlign = 'right'; ctx.textBaseline = 'top';
      ctx.fillText('⚠ dúo', mmx + mmR, mmy + mmR + 4);
    }
  }

  // ════════════════ INPUT ════════════════
  // En TOUCH la dirección la da la PALANCA hand-rolled (más abajo); tocar el campo NO dirige — sólo sirve para
  // acelerar con 2+ dedos y para reiniciar en game over. En DESKTOP el mouse dirige (la cabeza va hacia el
  // puntero) y mantener el botón acelera (port de "LMB held = sprint").
  function evtPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
  // Conteo de dedos a NIVEL WINDOW (no por elemento): el pointerup/cancel siempre llega a window aunque el
  // dedo se deslice fuera del elemento donde empezó, así NUNCA quedan punteros zombi (esa era la causa de que
  // el boost/dirección se trabaran tras varios toques). 2+ dedos = acelerar.
  const activeTouches = new Set();
  let mousePressed = false;                                                      // desktop: botón del mouse = acelerar
  function updateSprint() {                                                      // sprint = INTENCIÓN de acelerar; el turbo real (con carga) lo maneja manager.updateTurbo
    sprint = sprintBtnHeld || mousePressed || activeTouches.size >= 2;           // 2+ dedos (o botón, o mouse en desktop)
  }
  addEventListener('pointerdown', e => { if (e.pointerType !== 'mouse') { activeTouches.add(e.pointerId); updateSprint(); } });
  function dropTouch(e) { if (activeTouches.delete(e.pointerId)) updateSprint(); }
  addEventListener('pointerup', dropTouch);
  addEventListener('pointercancel', dropTouch);
  function aimAt(px, py) {                                                       // fija el RUMBO de la cabeza hacia el puntero — sólo mouse (desktop)
    const head = snake[0];
    if (!head || manager.gameOver) return;
    const dx = px - W/2, dy = py - H/2, dz = curR * 1.5;                          // cámara: la cabeza está SIEMPRE en el centro de pantalla → rumbo = centro→puntero
    if (dx*dx + dy*dy > dz*dz) head.targetAng = Math.atan2(dy, dx);              // ignora inputs pegados al centro (dirección ambigua)
  }

  canvas.addEventListener('pointerdown', e => {
    const p = evtPos(e);
    if (manager.gameOver) { manager.reset(); btnPause.classList.remove('on'); return; }  // tocá para reiniciar
    hint.style.opacity = '0';
    if (e.pointerType === 'mouse') {
      mouseX = p.x; mouseY = p.y; aimAt(p.x, p.y);                               // desktop: el mouse dirige
      mousePressed = true;
      updateSprint();
    }
  });
  canvas.addEventListener('pointermove', e => {
    if (e.pointerType === 'mouse') { const p = evtPos(e); mouseX = p.x; mouseY = p.y; aimAt(p.x, p.y); }
  });
  function endPointer(e) {
    if (e.pointerType === 'mouse') { mousePressed = false; updateSprint(); }
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ── BOTONES ──
  // tap en pointerdown (responde aunque otro dedo esté dirigiendo en el canvas), igual que BallsWeb.
  function tappable(el, fn) { el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); }); }
  // press-and-hold: mantener apretado el botón ⚡ acelera; soltar/salir lo corta. SÓLO listeners en el propio
  // elemento (igual que el holdBtn de TankWARS): nada a nivel document, así no se pisa con la palanca.
  let sprintBtnHeld = false;
  function pressable(el, onDown, onUp) {
    const down = e => { e.preventDefault(); onDown(); };
    const up   = () => onUp();
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
    el.addEventListener('pointerleave', up);
  }

  const btnSprint = document.getElementById('btnSprint');
  pressable(btnSprint,
    () => { sprintBtnHeld = true;  updateSprint(); },
    () => { sprintBtnHeld = false; updateSprint(); });

  const btnPause = document.getElementById('btnPause');
  tappable(btnPause, () => {
    if (manager.gameOver) return;
    manager.pause = !manager.pause; manager.pauseBlinkCD = 0;
    btnPause.classList.toggle('on', manager.pause);
  });

  tappable(document.getElementById('btnReset'), () => { manager.reset(); btnPause.classList.remove('on'); });

  const btnDebug = document.getElementById('btnDebug');
  tappable(btnDebug, () => { showDebug = !showDebug; btnDebug.classList.toggle('on', showDebug); });

  // ── PALANCA DE DIRECCIÓN (hand-rolled) — sólo touch ──
  // Palanca propia, SIN nipplejs: aparece donde tocás dentro de la zona (mitad izq × 1/3 inferior) y su
  // dirección fija el RUMBO de la cabeza (head.targetAng), persistente entre inputs. La clave de robustez es
  // setPointerCapture: TODOS los eventos de ese dedo (move/up/cancel) llegan siempre a la zona, vaya donde
  // vaya el dedo, así NUNCA queda colgada — ni aunque otro dedo esté en el orbe de boost. nipplejs en modo
  // dynamic perdía el pointerup con multitouch y dejaba la palanca pegada al centro.
  const IS_TOUCH = (window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches) || 'ontouchstart' in window;
  const JOY_BASE_R = 52, JOY_KNOB_R = 30, JOY_DEAD = 7;    // px CSS (el ctx ya está escalado por dpr)
  let joy = null;                                          // { id, ox, oy, kx, ky } mientras dirigís, o null en reposo
  const jZone = document.getElementById('jMove');
  const jRest = document.getElementById('jMoveRest');
  if (IS_TOUCH) {
    jZone.addEventListener('pointerdown', e => {
      if (e.pointerType === 'mouse') return;
      e.preventDefault();
      if (manager.gameOver) { manager.reset(); btnPause.classList.remove('on'); return; }   // tocá para reiniciar
      if (joy) return;                                     // ya hay un dedo dirigiendo; el 2º sólo cuenta para boost (window)
      try { jZone.setPointerCapture(e.pointerId); } catch {}
      const p = evtPos(e);
      joy = { id: e.pointerId, ox: p.x, oy: p.y, kx: p.x, ky: p.y };
      hint.style.opacity = '0';
      jRest.style.display = 'none';
    });
    jZone.addEventListener('pointermove', e => {
      if (!joy || e.pointerId !== joy.id) return;
      const p = evtPos(e);
      let dx = p.x - joy.ox, dy = p.y - joy.oy;
      const d = Math.hypot(dx, dy);
      if (d > JOY_BASE_R) { dx = dx/d*JOY_BASE_R; dy = dy/d*JOY_BASE_R; }   // el nub se clampa al borde de la base
      joy.kx = joy.ox + dx; joy.ky = joy.oy + dy;
      if (d > JOY_DEAD) { const head = snake[0]; if (head && !manager.gameOver) head.targetAng = Math.atan2(dy, dx); }
    });
    const endJoy = e => { if (joy && e.pointerId === joy.id) { joy = null; jRest.style.display = ''; } };
    jZone.addEventListener('pointerup', endJoy);
    jZone.addEventListener('pointercancel', endJoy);
    jZone.addEventListener('lostpointercapture', endJoy);
  } else {
    jZone.style.display = 'none';
    jRest.style.display = 'none';
  }
  // Dibuja la palanca ACTIVA sobre el canvas (la de reposo es el placeholder DOM .joyRest). Se llama en el loop.
  function drawJoystick() {
    if (!joy) return;
    ctx.beginPath(); ctx.arc(joy.ox, joy.oy, JOY_BASE_R, 0, TAU);          // base hundida
    ctx.fillStyle = 'rgba(0,255,140,0.06)'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,255,140,0.35)'; ctx.stroke();
    ctx.globalCompositeOperation = 'lighter';                              // nub con glow verde
    ctx.beginPath(); ctx.arc(joy.kx, joy.ky, JOY_KNOB_R, 0, TAU);
    const g = ctx.createRadialGradient(joy.kx, joy.ky - JOY_KNOB_R*0.3, JOY_KNOB_R*0.2, joy.kx, joy.ky, JOY_KNOB_R);
    g.addColorStop(0, 'rgba(170,255,210,0.9)'); g.addColorStop(1, 'rgba(0,220,130,0.5)');
    ctx.fillStyle = g; ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(190,255,220,0.8)'; ctx.stroke();
  }

  // ════════════════ NIVELES: pool + roll + overlay (las RAREZAS son la tabla unificada `RARITY`, definida arriba) ════════════════
  const LU_CHOICES = 4;                                                           // cartas por nivel (1 por fila, apiladas)
  const START_REROLLS = 1, GAIN_REROLL_EVERY = 5;                                 // rerolls al arrancar + 1 cada N niveles
  // MEJORAS: id, ico, terse(R)->label corta (con el número del tier), apply(m, RF, tier). minTier = piso de
  // rareza (pasivas no salen comunes). fixedRar = rareza fija. hpLow = sólo aparece si te falta vida.
  const UPGRADES = [
    // TODAS escalan el efecto BASELINE por RF (1 / 1.25 / 1.5 / 2 / 3 / 5 según rareza). terse muestra el número redondeado.
    { id:'dmg',   ico:'⚔️', desc:'Daño de tu mordida',      terse:R=>`+${Math.round(15*R.RF)}% ATK`,     apply:(m,RF)=>{ m.dmgMul += 0.15*RF; } },
    { id:'hp',    ico:'❤️', desc:'Vida máxima',             terse:R=>`+${Math.round(20*R.RF)} HP`,       apply:(m,RF)=>{ m.maxHp += 20*RF; m.hp = m.maxHp; } },
    { id:'regen', ico:'➕', desc:'Recuperás vida sola',     terse:R=>`+${Math.round(45*R.RF)}% REGEN`,   apply:(m,RF)=>{ m.regenMul += 0.45*RF; } },
    { id:'size',  ico:'🦈', desc:'+daño si sos más grande', terse:R=>`+${Math.round(18*R.RF)}% MORDIDA`, apply:(m,RF)=>{ m.sizeDmgBonus += 0.18*RF; } },
    { id:'range', ico:'🎯', desc:'Atacás de más lejos',     terse:R=>`+${Math.round(18*R.RF)}% ALCANCE`, apply:(m,RF)=>{ m.atkRangeMul += 0.18*RF; } },
    { id:'turn',  ico:'🌀', desc:'Girás más rápido',        terse:R=>`+${Math.round(15*R.RF)}% GIRO`,    apply:(m,RF)=>{ m.turnMul += 0.15*RF; } },
    { id:'turbA', ico:'⚡', desc:'El turbo dura más',        terse:R=>`TURBO +${Math.round(14*R.RF)}%`,   apply:(m,RF)=>{ m.turboDrainMul = Math.max(0.2, m.turboDrainMul * (1 - 0.14*RF)); } },
    { id:'turbR', ico:'🔋', desc:'El turbo recarga antes',  terse:R=>`RECARGA +${Math.round(35*R.RF)}%`, apply:(m,RF)=>{ m.turboRechargeMul += 0.35*RF; } },
    { id:'cone',  ico:'📐', desc:'Cono de ataque más ancho',terse:R=>`+${Math.round(7*R.RF)}° CONO`,     apply:(m,RF)=>{ m.atkConeBonus = Math.min(0.5, m.atkConeBonus + 0.12*RF); } },
    // pasivas (ÚNICAS; piso de rareza tier≥2 → no salen comunes; el valor escala con RF)
    { id:'leech',  ico:'🩸', desc:'Curás parte del daño que hacés', passive:true, minTier:2, terse:R=>`Robo ${Math.round(15*R.RF)}%`,    apply:(m,RF)=>{ m.lifesteal = Math.max(m.lifesteal, 0.15*RF); } },
    { id:'thorn',  ico:'🛡️', desc:'Devolvés daño al que te pega',   passive:true, minTier:2, terse:R=>`Espinas ${Math.round(30*R.RF)}%`,  apply:(m,RF)=>{ m.thorns = Math.max(m.thorns, 0.30*RF); } },
    { id:'armor',  ico:'🪖', desc:'Recibís menos daño',             passive:true, minTier:2, terse:R=>`Coraza -${Math.round(15*R.RF)}%`,  apply:(m,RF)=>{ m.armor = Math.min(0.75, Math.max(m.armor, 0.15*RF)); } },
    { id:'feast',  ico:'🍽️', desc:'Comer cura más',                 passive:true, minTier:2, terse:R=>`Festín +${Math.round(60*R.RF)}%`,  apply:(m,RF)=>{ m.healMul += 0.6*RF; } },
    { id:'magnet', ico:'🧲', desc:'Atraés la comida de lejos',      passive:true, minTier:2, terse:R=>`Imán +${Math.round(60*R.RF)}%`,    apply:(m,RF)=>{ m.magnetMul += 0.6*RF; } },
    // utilitaria: cura clutch (rareza fija, sólo si te falta vida)
    { id:'fullheal', ico:'✨', desc:'Te cura al máximo', fixedRar:'raro', hpLow:true, terse:R=>`CURA TOTAL`, apply:(m)=>{ m.hp = m.maxHp; } },
  ];
  function rollUpgrades() {                                                        // LU_CHOICES cartas distintas, cada una con su rareza sorteada
    const pool = UPGRADES.filter(u =>
      !(u.passive && manager.takenPassives.has(u.id)) &&
      !(u.hpLow && manager.hp > manager.maxHp * 0.6)
    );
    const out = [], used = new Set(); let guard = 0;
    while (out.length < LU_CHOICES && guard++ < 60) {
      const u = pool[ri(0, pool.length - 1)];
      if (used.has(u.id)) continue;
      let rar = rollRarity();
      if (u.fixedRar) rar = RARITY.find(R => R.id === u.fixedRar);
      else if (u.minTier && rar.tier < u.minTier) rar = RARITY[u.minTier - 1];     // piso de rareza (pasivas)
      used.add(u.id);
      out.push({ u, rar });
    }
    return out;
  }
  function rerollUpgrades() {                                                      // re-tira las cartas Y sus rarezas (no aplica, no cierra)
    if (manager.rerolls <= 0) return;
    manager.rerolls--;
    showUpgradeOverlay(rollUpgrades());
  }
  function showUpgradeOverlay(list) {
    const ov = document.getElementById('levelup');
    document.getElementById('luLvl').textContent = manager.level;
    // (el estado de los modificadores se muestra siempre en el HUD, debajo del score — ya no en el overlay)
    // CARTAS color-coded por rareza, label tersa + pill
    const cards = document.getElementById('luCards'); cards.innerHTML = '';
    list.forEach((entry, i) => {

      c.className = 'luCard' + (rar.tier >= 5 ? ' shine' : '');                    // legendario/mítico pulsan
      c.style.setProperty('--rc', rar.col);                                       // borde/pill por rareza (inline → soporta los 6 tiers)
      c.style.setProperty('--rg', rar.glow);                                      // glow/sombra por rareza
      c.style.animationDelay = (i*0.06) + 's';
      c.innerHTML = `<div class="luIco">${u.ico}</div><div class="luBody"><div class="luTerse">${u.terse(rar)}</div><div class="luDesc">${u.desc}</div></div><div class="luPill">${rar.label}</div>`;
      c.addEventListener('pointerdown', e => {

  document.getElementById('luReroll').addEventListener('pointerdown', e => { e.preventDefault(); rerollUpgrades(); });

  // ════════════════ LOOP ════════════════
  function loop(now) {
    if (typeof now !== 'number') now = performance.now();
    deltaT = Math.min(0.05, (now - lastT) / 1000);                               // dt real, clamp 50ms (igual que Snake.py)
    lastT = now;
    dtSmoothed = dtSmoothed*0.9 + deltaT*0.1;
    if (seafloorReady && manager.loadT > 0) manager.loadT = Math.max(0, manager.loadT - deltaT); // el fade-in arranca RECIÉN cuando la imagen de fondo terminó de cargar (antes: negro pleno, congelado)
    if (!manager.gameOver && !manager.pause) { waveClock += deltaT; currentAng += deltaT*0.02; } // wiggle + giro lentísimo de la corriente
    curR = sper(0.01);                                                           // radio base, 1 sola vez por frame
    girth = 1 + GIRTH_MAX * Math.min(1, manager.fed / GIRTH_FOOD);               // engorde según la COMIDA acumulada (no el largo): crecés a lo ancho al comer
    if (!manager.pause) manager.updateTurbo();                                   // carga/descarga del turbo del jugador (antes de mover); CONGELADO en pausa / elección de mejora: con la pantalla detenida no drena ni recarga (los 2 dedos sobre el overlay ya no gastan el boost)
    if (pairAlert > 0) pairAlert = Math.max(pairAlert - deltaT, 0);              // aviso de pareja en el minimapa
    if (manager.luFlash > 0) manager.luFlash = Math.max(0, manager.luFlash - deltaT*1.6); // flash de subida de nivel (decae aun en pausa)

    // ── PROCESO (lógica; no dibuja) ──
    if (!manager.gameOver) {
      // cabeza→cola: cada segmento lee la posición YA actualizada del de adelante → el movimiento se
      // propaga por TODA la cadena en un frame (independiente del fps). Cacheo n para no procesar las
      // piezas que la cabeza crea al comer este mismo frame.
      const n = snake.length;
      for (let i = 0; i < n; i++) snake[i].process();
    }
    for (const f of food) f.process();
    for (const h of hazards) h.process();
    for (const j of treasures) j.process();
    for (const s of seahorses) s.process();
    for (const e of enemies) e.process();
    if (enemies.some(e => e.dead)) enemies = enemies.filter(e => !e.dead);       // quitar las que murieron por choque (el manager respawnea desde afuera)
    for (const b of bosses) b.process();
    if (bosses.some(b => b.dead)) bosses = bosses.filter(b => !b.dead);          // jefe muerto → fuera (la barra desaparece)
    manager.updateParticles();
    if (manager.shockwave) { const s = manager.shockwave; s.life -= deltaT; s.r = s.r0 + s.r0*7*(1 - s.life/s.maxLife); if (s.life <= 0) manager.shockwave = null; } // onda de choque de muerte de jefe
    if (manager.deathGlow) { manager.deathGlow.life -= deltaT; if (manager.deathGlow.life <= 0) manager.deathGlow = null; }
    updateChunks();                                                              // pedazos voladores (golpes): mueven, frenan y se vuelven estrella o se desvanecen
    manager.process();
    updateAmbient();
    updateFishes();

    // mina: sacar segmentos de la cola DESPUÉS de procesar (popear durante el for dejaría índices undefined).
    if (manager.pendingShrink > 0) {
      const rem = Math.min(manager.pendingShrink, snake.length - 5);
      for (let i = 0; i < rem; i++) snake.pop();
      manager.pendingShrink = 0;
    }

    // ── CÁMARA: la cabeza queda SIEMPRE en el centro de la pantalla; el mundo se dibuja trasladado. En
    // muerte la cabeza no se mueve, así que la cámara queda congelada en el lugar donde se deshizo. ──
    const head = snake[0];
    if (head) { camX = head.x; camY = head.y; }
    // CULLING: límites de la vista en coords de mundo (+ margen), en los GLOBALES vL/vR/vT/vB (los usa también
    // el dibujo de los enemigos). Con la cámara pegada a la cabeza, en cuerpos largos la mayor parte cae fuera.
    const vm = curR*4; vL = camX - W/2 - vm; vR = camX + W/2 + vm; vT = camY - H/2 - vm; vB = camY + H/2 + vm;

    ctx.fillStyle = '#03080b'; ctx.fillRect(0, 0, W, H);                         // agua profunda fuera del lago
    ctx.save();
    ctx.translate(W/2 - camX, H/2 - camY);

    drawLake();
    drawSeaFloor();                                                             // corales/rocas bakeados sobre el piso del lago (debajo de todo lo vivo)
    drawAmbient();
    drawFishes();                                                               // pececitos ambientales (sobre el fondo, debajo de las criaturas y el jugador)
    for (const e of enemies) e.draw();                                          // serpientes enemigas (debajo del jugador y los objetos)
    for (const b of bosses) b.draw();                                           // jefe (criatura grande; el jugador y los objetos se dibujan encima)

    // GLOW del cuerpo: UN solo stroke aditivo a lo largo de toda la víbora (mucho más barato que N halos).
    // Si hay ESCUDO (medusa) se agrega un 2º stroke rosado, más ancho y tenue, sobre el mismo trazo → un
    // brillo de escudo que envuelve TODA la víbora (no sólo la cabeza). Pulsa suave.
    if (!manager.dying && snake.length > 1) {
      ctx.globalCompositeOperation = 'lighter';
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      // PERF: el stroke ANCHO está limitado por fillrate, no por vértices. En víboras largas DECIMAMOS el path
      // (1 de cada stepG): el trazo grueso tapa los huecos y se nota igual, pero hay muchos menos lineTo.
      const stepG = snake.length > 240 ? 3 : snake.length > 120 ? 2 : 1;
      ctx.beginPath();
      let pen = false;                                                           // culling: sólo trazo el tramo visible (corto el path en los huecos fuera de cámara)
      for (let i = 0; i < snake.length; i += stepG) {
        const e = snake[i];
        let x = e.x, y = e.y;
        if (e.id > 0) {                                                          // MISMO wiggle que el cuerpo, si no el glow va recto
          const off = Math.sin(waveClock*WIG_SPEED - e.id*WIG_DENSITY) * (curR*girth*WIG_AMP*Math.min(1, e.id/4));
          x += Math.cos(e.ang + Math.PI/2)*off;
          y += Math.sin(e.ang + Math.PI/2)*off;
        }
        if (inView(x, y)) { if (!pen) { ctx.moveTo(x, y); pen = true; } else ctx.lineTo(x, y); }
        else if (pen) { ctx.lineTo(x, y); pen = false; }                         // 1 punto extra al salir → el trazo llega al borde
      }
      if (manager.immunity > 0) {                                                // escudo: brillo rosado que TITILA alrededor de toda la víbora
        const ending = manager.immunity < 1.2;                                   // último tramo → titileo rápido y fuerte (aviso de que se termina)
        const t = Math.abs(Math.sin(waveClock*(ending ? 13 : 5)));               // 0..1
        const alpha = ending ? 0.10 + 0.95*t : 0.30 + 0.6*t;                     // UN solo stroke (antes 2 → mitad de fillrate): alpha más alto compensa
        ctx.strokeStyle = `hsla(335,100%,80%,${alpha})`;
        ctx.lineWidth = curR * girth * (2.6 + 0.7*t);                            // también late el grosor
        ctx.stroke();
      }
      ctx.strokeStyle = 'hsla(168,100%,55%,0.16)';                               // glow cian normal del cuerpo
      ctx.lineWidth = curR * girth * 2.7;
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    }

    // DIBUJO (en coords de mundo). En muerte NO se dibuja la víbora (se deshizo en partículas). Culling: se
    // saltean los segmentos fuera de cámara (la cabeza siempre se dibuja).
    if (!manager.dying) for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      if (s.id !== 0 && !inView(s.x, s.y)) continue;
      s.draw();
    }
    if (!manager.dying && snake[0]) {                                            // barra de vida del jugador sobre la cabeza (igual que las enemigas)
      const h = snake[0], rad = curR*girth*1.15, frac = Math.max(0, manager.hp/manager.maxHp);
      const bw = rad*3.4, bh = Math.max(3, rad*0.34), bx = h.x - bw/2, by = h.y - rad - bh*2.8;
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = `hsl(${110*frac},85%,54%)`; ctx.fillRect(bx, by, bw*frac, bh);
    }
    for (const h of hazards) h.draw();
    for (const f of food) f.draw();
    for (const j of treasures) j.draw();
    for (const s of seahorses) s.draw();
    drawChunks();                                                               // pedazos desprendidos por los golpes
    manager.drawParticles();                                                    // bursts de medusa + dispersión de muerte
    if (manager.shockwave) { const s = manager.shockwave, a = s.life/s.maxLife; ctx.globalCompositeOperation = 'lighter'; ctx.strokeStyle = `hsla(${s.hue},95%,68%,${0.6*a})`; ctx.lineWidth = sper(0.012)*(0.4+a); ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.stroke(); ctx.globalCompositeOperation = 'source-over'; } // onda de choque
    if (manager.deathGlow) { const g = manager.deathGlow, a = g.life/g.maxLife, gr = sper(0.12)*(1.4-a); const rg = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, gr); rg.addColorStop(0, `hsla(${g.hue},95%,65%,${0.45*a})`); rg.addColorStop(1, `hsla(${g.hue},95%,65%,0)`); ctx.globalCompositeOperation = 'lighter'; ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(g.x, g.y, gr, 0, TAU); ctx.fill(); ctx.globalCompositeOperation = 'source-over'; } // glow lento
    removeSprites();

    ctx.restore();

    // ── HUD / overlays (coords de PANTALLA, fuera de la cámara) ──
    drawAnglerDark();                                                           // PEZ LINTERNA: oscurece la escena (screen-space) + señuelo/cono; va ANTES del HUD para no tapar barra/minimapa
    // drawBossBar();                                                           // DESACTIVADA: la barra del jefe ahora va PROMINENTE sobre su cabeza (Boss.drawHpBar). Descomentá para tener también la de arriba.
    drawHUD();
    drawMinimap();
    manager.draw();                                                             // game over / pausa / debug
    if (manager.luFlash > 0) {                                                  // FLASH de subida de nivel: 1 gradiente radial teñido por la rareza elegida (barato)
      const g = ctx.createRadialGradient(W/2, H*0.42, 0, W/2, H*0.42, Math.max(W,H)*0.7);
      g.addColorStop(0, manager.flashGlow); g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save(); ctx.globalAlpha = manager.luFlash * 0.28; ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H); ctx.restore();
    }

    // punto-guía: en DESKTOP, en la posición del mouse (sólo visual). En touch alcanza con la palanca.
    if (!IS_TOUCH && !manager.gameOver) {
      const cr = Math.max(3, sper(0.006));
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.arc(mouseX, mouseY, cr*2.2, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.arc(mouseX, mouseY, cr, 0, TAU); ctx.fill();
    }
    if (IS_TOUCH) {                                                               // palanca (canvas): se funde con el intro aplicándole la opacidad del fade directamente
      const rev = manager.loadT > 0 ? 1 - Math.min(1, manager.loadT/LOAD_TIME) : 1;
      if (rev >= 1) drawJoystick();
      else { ctx.save(); ctx.globalAlpha = rev; drawJoystick(); ctx.restore(); }
    }

    const domCtl = [document.getElementById('btnSprint'), document.getElementById('jMoveRest')]; // controles DOM que flotan sobre el canvas: boost + palanca-EN-REPOSO (la activa es canvas y la funde el wrap de arriba)
    if (manager.loadT > 0) {                                                      // FADE-IN DESDE NEGRO al arrancar: negro pleno → transparente en LOAD_TIME (juego congelado mientras tanto)
      const a = Math.min(1, manager.loadT / LOAD_TIME);
      ctx.fillStyle = `rgba(0,0,0,${a})`; ctx.fillRect(0, 0, W, H);
      for (const el of domCtl) if (el) el.style.opacity = String(1 - a);          // boost + palanca en reposo se funden con la escena
    } else for (const el of domCtl) { if (el && el.style.opacity !== '' && el.style.opacity !== '1') el.style.opacity = ''; } // al terminar, restaurar (1 sola vez)

    requestAnimationFrame(loop);
  }

  // ── INIT ──
  resize();
  manager = new Manager();
  mouseX = xper(0.5); mouseY = yper(0.5);
  loop();

  const hint = document.getElementById('hint');
  setTimeout(() => hint.style.opacity = '0', 6000);
  </script>
  <script>

        return;
      }
      try { screen.orientation && screen.orientation.unlock && screen.orientation.unlock(); } catch {}
      location.href = '../../Arcade/';

  <script>
    (function() {
      const EMBEDDED = (window.self !== window.top);
      const btn = document.getElementById('btnFs');
      btn.addEventListener('click', () => {
        // Embebido: same-origin → llamamos requestFullscreen DIRECTO sobre el doc padre para
        // preservar el user-activation del tap. postMessage perdía la activación.
        if (EMBEDDED) {
          try {
            const topDoc = window.top.document;
            if (topDoc.fullscreenElement || topDoc.webkitFullscreenElement) {
              (topDoc.exitFullscreen || topDoc.webkitExitFullscreen).call(topDoc);
            } else {
              const el = topDoc.documentElement;
              const req = el.requestFullscreen || el.webkitRequestFullscreen;
              const p = req.call(el);
              if (p && p.catch) p.catch(() => {});
            }
          } catch (e) {
            try { window.parent.postMessage({ type: 'arcade:fullscreen' }, '*'); } catch (e2) {}
          }
          return;
        }
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      });
      document.addEventListener('fullscreenchange', () => {
        document.body.classList.toggle('fs-on', !!document.fullscreenElement || EMBEDDED);
      });
      // Embebido: la shell nos avisa su estado de FS para sincronizar el ícono.
      window.addEventListener('message', e => { if (e.data && e.data.type === 'arcade:fs-state') document.body.classList.toggle('fs-on', !!e.data.on); });
      if (EMBEDDED) document.body.classList.add('fs-on');
    })();
  </script>

</body>
</html>
