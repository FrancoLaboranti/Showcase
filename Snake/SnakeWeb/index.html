        if (this.appear >= 1) magnetPull(this);                                  // a tiro de la cabeza se atrae sola (con velocidad residual)
        clampToLake(this);                                                       // no salir del lago: se limita al borde
      }
      if (this.timer === 0 || this.grabbed) spritesToRemove.push(this);
    }
    draw() {
      const cx = this.x, cy = this.y, hue = 335;
      const sp = easeOutBack(this.appear);
      const fade = Math.min(1, this.appear*1.4) * (this.timer <= 4 ? (0.45 + 0.55*Math.abs(Math.sin(waveClock*6))) : 1); // parpadea al expirar
      const R = curR*1.75*sp*(1 + Math.sin(this.pulse)*0.16);                    // campana pulsante — un poco más grande
      const td = currentAng;                                                     // tentáculos barridos por la corriente
      const pdx = -Math.sin(td), pdy = Math.cos(td);                             // perpendicular a la corriente
      // tentáculos ondulantes (aditivos)
      ctx.globalCompositeOperation = 'lighter';
      ctx.lineCap = 'round';
      ctx.strokeStyle = `hsla(${hue},100%,75%,${0.5*fade})`;
      ctx.lineWidth = Math.max(1.5, R*0.12);
      for (let i = 0; i < 5; i++) {
        const off = (i-2)*R*0.32, sway = Math.sin(this.swim + i)*R*0.55;
        const bx = cx + pdx*off, by = cy + pdy*off;
        const mx = bx + Math.cos(td)*R*1.3 + pdx*sway,     my = by + Math.sin(td)*R*1.3 + pdy*sway;
        const ex = bx + Math.cos(td)*R*2.5 + pdx*sway*0.4, ey = by + Math.sin(td)*R*2.5 + pdy*sway*0.4;
        ctx.beginPath(); ctx.moveTo(bx, by); ctx.quadraticCurveTo(mx, my, ex, ey); ctx.stroke();
      }
      // halo de la campana
      ctx.fillStyle = `hsla(${hue},100%,62%,${0.30*fade})`;
      ctx.beginPath(); ctx.arc(cx, cy, R*1.8, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      // flecos del borde inferior (hacia la corriente)
      ctx.fillStyle = `hsla(${hue},100%,72%,${0.65*fade})`;
      for (let i = -2; i <= 2; i++) {
        const fx = cx + pdx*i*R*0.42 + Math.cos(td)*R*0.7, fy = cy + pdy*i*R*0.42 + Math.sin(td)*R*0.7;
        ctx.beginPath(); ctx.arc(fx, fy, R*0.24, 0, TAU); ctx.fill();
      }
      // campana (domo) translúcido con gradiente arriba
      const g = ctx.createRadialGradient(cx - Math.cos(td)*R*0.3, cy - Math.sin(td)*R*0.3, R*0.1, cx, cy, R);
      g.addColorStop(0,   `hsla(${hue},100%,92%,${0.95*fade})`);
      g.addColorStop(0.6, `hsla(${hue},100%,70%,${0.85*fade})`);
      g.addColorStop(1,   `hsla(${hue},90%,56%,${0.30*fade})`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.fill();
      // núcleo brillante (órganos bioluminiscentes)
      ctx.fillStyle = `rgba(255,238,250,${0.95*fade})`;
      ctx.beginPath(); ctx.arc(cx - Math.cos(td)*R*0.2, cy - Math.sin(td)*R*0.2, R*0.3, 0, TAU); ctx.fill();
    }
  }

  // ════════════════ SEAHORSE (caballito de mar — boost de velocidad temporal) ════════════════
  // Comerlo da un BOOST automático de 3× la velocidad base por unos segundos (corto, como el escudo) — sin
  // ningún indicador (se nota solo porque vas más rápido). Mismos puntos que la medusa. Color naranja-dorado.
  class Seahorse {
    constructor() {
      this.grabbed = false; this.appear = 0; this.timer = 12;
      this.bob = Math.random()*TAU; this.driftAng = Math.random()*TAU; this.points = 250;
      const minD = curR*12, minD2 = minD*minD;
      let reroll = true, guard = 0;
      while (reroll && guard++ < 40) {
        const p = randSpawnPoint(); this.x = p.x; this.y = p.y;
        reroll = false;
        for (let i = 0; i < snake.length; i += 3) { const dx = snake[i].x-this.x, dy = snake[i].y-this.y; if (dx*dx+dy*dy < minD2) { reroll = true; break; } }
      }
      seahorses.push(this);
    }
    process() {
      this.appear = Math.min(1, this.appear + deltaT / SPAWN_ANIM_TIME);
      if (!manager.gameOver && !manager.pause) {
        this.timer = Math.max(this.timer - deltaT, 0);
        this.bob += deltaT;
        const drift = sper(0.02);
        this.x += (Math.cos(this.driftAng) + Math.cos(this.bob)*0.3) * drift * deltaT;
        this.y += (Math.sin(this.driftAng) + Math.sin(this.bob*1.2)*0.3) * drift * deltaT;
        if (this.appear >= 1) magnetPull(this);
        clampToLake(this);
      }
      if (this.timer === 0 || this.grabbed) spritesToRemove.push(this);
    }
    draw() {
      const sp = easeOutBack(this.appear);
      const fade = Math.min(1, this.appear*1.4) * (this.timer <= 4 ? (0.45 + 0.55*Math.abs(Math.sin(waveClock*6))) : 1);
      const R = curR*1.7*sp, hue = 32;                                            // naranja-dorado
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(Math.sin(this.bob)*0.18);                                        // leve balanceo
      ctx.globalAlpha = fade;
      ctx.globalCompositeOperation = 'lighter';                                   // halo
      ctx.fillStyle = `hsla(${hue},100%,60%,0.28)`;
      ctx.beginPath(); ctx.arc(0, 0, R*1.7, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      // aleta dorsal
      ctx.fillStyle = `hsla(${hue},100%,72%,0.7)`;
      ctx.beginPath(); ctx.moveTo(-R*0.2, -R*0.1); ctx.quadraticCurveTo(-R*0.95, R*0.2, -R*0.18, R*0.55); ctx.closePath(); ctx.fill();
      // cuerpo curvo (cuello → panza → cola enroscada)
      ctx.strokeStyle = `hsl(${hue},88%,55%)`; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.lineWidth = R*0.72;
      ctx.beginPath();
      ctx.moveTo(0, -R*0.55);
      ctx.quadraticCurveTo(R*0.55, R*0.05, R*0.05, R*0.75);
      ctx.quadraticCurveTo(-R*0.5, R*1.15, R*0.25, R*1.4);                         // cola enroscando
      ctx.stroke();
      // cabeza + hocico hacia arriba
      ctx.fillStyle = `hsl(${hue},90%,58%)`;
      ctx.beginPath(); ctx.arc(0, -R*0.7, R*0.42, 0, TAU); ctx.fill();
      ctx.lineWidth = R*0.3;
      ctx.beginPath(); ctx.moveTo(0, -R*0.78); ctx.lineTo(R*0.66, -R*0.98); ctx.stroke();   // hocico
      // coronet (3 púas)
      ctx.fillStyle = `hsl(${hue},100%,66%)`;
      for (const dx of [-0.18, 0, 0.18]) { ctx.beginPath(); ctx.moveTo(dx*R, -R*1.02); ctx.lineTo(dx*R + R*0.04, -R*1.32); ctx.lineTo(dx*R - R*0.12, -R*1.04); ctx.closePath(); ctx.fill(); }
      // ojo + brillo
      ctx.fillStyle = '#0c1014'; ctx.beginPath(); ctx.arc(R*0.12, -R*0.74, R*0.1, 0, TAU); ctx.fill();
      ctx.fillStyle = 'rgba(255,240,210,0.95)'; ctx.beginPath(); ctx.arc(-R*0.08, -R*0.8, R*0.1, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // ════════════════ ENEMY SNAKE (serpiente con IA) ════════════════
  // Aparece DESDE FUERA del lago y nada hacia adentro; una vez integrada ya no sale (evita la orilla y, por
  // las dudas, se clampea). IA por steering (suma de vectores): busca la comida cercana, esquiva minas, evita
  // chocar al jugador / otras enemigas, y bordea la orilla. Tamaño (radio y largo) variado por instancia.
  class EnemySnake {
    constructor(opts) {
      opts = opts || {};
      this.hue = opts.hue !== undefined ? opts.hue : ENEMY_HUES[ri(0, ENEMY_HUES.length-1)];
      this.sizeMul = opts.sizeMul !== undefined ? opts.sizeMul : rndRange(0.7, 1.45); // grosor (la grande de una pareja es mayor)
      this.groupId = opts.groupId !== undefined ? opts.groupId : null;          // parejas comparten groupId (no se atacan ni se esquivan; van en grupo)
      this.leader = opts.leader || null;                                        // la chica ESCOLTA a la grande
      this.vel = sper(SNAKE_SPEED) * rndRange(0.8, 1.05);

            f.shedChunk(this.ang, Math.max(1, Math.min(CHUNK_MAX, Math.round(dmg/CHUNK_DMG_PER)))); if (f.hp <= 0) f.die();
            this.atkHit = true;
          }
        }
      }
      if (this.integrated) { const d = Math.hypot(head.x, head.y), lim = WORLD_R - r; if (d > lim) { head.x = head.x/d*lim; head.y = head.y/d*lim; } } // no sale del lago
      // cadena seguidora (distancia fija; espaciado BASE, no escala con el engorde, igual que el jugador)
      const link = rBase*0.8;
      for (let i = 1; i < this.pieces.length; i++) {
        const p = this.pieces[i], a = this.pieces[i-1];
        let dx = p.x-a.x, dy = p.y-a.y, d = Math.hypot(dx, dy);
        if (d < 1e-4) { dx = Math.cos(p.ang); dy = Math.sin(p.ang); d = 1; }
        p.x = a.x + dx/d*link; p.y = a.y + dy/d*link; p.ang = Math.atan2(-dy, -dx);
      }
      // onda de "respiración" que se propaga hacia la cola (idéntica al jugador)
      for (let i = 0; i < this.pieces.length; i++) {
        const p = this.pieces[i];
        if (p.wt > 0) {
          p.wt = Math.max(p.wt - deltaT, 0);
          const next = this.pieces[i+1];
          if (p.wt < WAVE_TOTAL*0.97 && p.wt > WAVE_TOTAL*0.5 && next && next.wt === 0) next.wt = WAVE_TOTAL;
        }
      }
      this.processExtraHeads();                                                 // cabezas extra (cuellos que muerden por su cuenta) — tras actualizar el cuerpo
      this.combat();                                                            // ataque por embestida (vida/daño), reemplaza la muerte por choque
      // comer (compite con el jugador) y chocar minas (se achica)
      const er2 = (r*2.6)*(r*2.6);
      for (const f of food) { if (f.grabbed || f.appear < 1) continue; const dx = f.x-head.x, dy = f.y-head.y; if (dx*dx+dy*dy < er2) { f.grabbed = true; this.grow(1 + (f.points/100)|0); head.wt = WAVE_TOTAL; } }
      const mr2 = (r*1.8)*(r*1.8);                                                // mina: daño UNA vez por contacto (gate con hurt) + arranca pedazo
      for (const h of hazards) { if (h.appear < 1) continue; const dx = h.x-head.x, dy = h.y-head.y; if (dx*dx+dy*dy < mr2) { if (this.hurt <= 0) { this.hp -= HAZARD_DMG; this.hurt = HAZARD_FLASH_TIME; head.wt = WAVE_TOTAL; this.shedChunk(Math.atan2(head.y-h.y, head.x-h.x), Math.max(1, Math.min(CHUNK_MAX, Math.round(HAZARD_DMG/CHUNK_DMG_PER)))); if (this.hp <= 0) this.die(); } break; } }
    }
    draw() {
      const r0 = curR*this.sizeMul*this.g, n = this.pieces.length;               // engorda con el largo (como el jugador)
      const flash = this.hurt > 0 ? this.hurt/HAZARD_FLASH_TIME : 0;
      const hue = flash > 0 ? 0 : this.hue, light = 52 + flash*20;
      const sheen = `hsla(${hue},100%,82%,0.5)`;
      // GLOW acuático (mismo look translúcido/luminoso que el jugador, en SU color): un solo trazo aditivo a lo
      // largo del cuerpo, DEBAJO de los segmentos. Decimado en cuerpos largos + culling por vista (barato).
      if (n > 1) {
        ctx.globalCompositeOperation = 'lighter';
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        const stepG = n > 120 ? 2 : 1;
        ctx.beginPath();
        let pen = false;
        for (let i = 0; i < n; i += stepG) {
          const p = this.pieces[i];
          let x = p.x, y = p.y;
          if (i > 0) { const off = Math.sin(waveClock*WIG_SPEED - i*WIG_DENSITY + this.wavePhase) * (r0*WIG_AMP*Math.min(1, i/4)); x += -Math.sin(p.ang)*off; y += Math.cos(p.ang)*off; }
          if (inView(x, y)) { if (!pen) { ctx.moveTo(x, y); pen = true; } else ctx.lineTo(x, y); }
          else if (pen) { ctx.lineTo(x, y); pen = false; }
        }
        ctx.strokeStyle = `hsla(${hue},100%,60%,0.16)`;
        ctx.lineWidth = r0 * 2.7;
        ctx.stroke();
        ctx.globalCompositeOperation = 'source-over';
      }
      // cuerpo cola→cabeza, con APÉNDICES marinos (aletas / cresta / cola) + ondulación + pulso, igual que el jugador
      for (let i = n - 1; i >= 0; i--) {
        const p = this.pieces[i];
        if (!inView(p.x, p.y)) continue;
        const ca2 = Math.cos(p.ang), sa2 = Math.sin(p.ang), nx = -sa2, ny = ca2;  // p.ang apunta hacia adelante; -(ca,sa) = hacia la cola
        const off = (i === 0) ? 0 : Math.sin(waveClock*WIG_SPEED - i*WIG_DENSITY + this.wavePhase) * (r0*WIG_AMP*Math.min(1, i/4)); // wiggle lateral
        const wx = p.x + nx*off, wy = p.y + ny*off;
        let rad = (i === 0) ? r0*1.15 : r0 * (1 - 0.4*(i/n));
        let wavePulse = 0;                                                        // onda de ensanche que recorre el cuerpo (idéntica al jugador)
        if (p.wt > 0) { const wf = (WAVE_TOTAL - p.wt)/WAVE_TOTAL; wavePulse = Math.sin(Math.PI*wf); rad += r0 * (wavePulse * (i === 0 ? 3 : 1)); }
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = sheen;
        if (i === 0) {                                                            // cresta/frills en la cabeza
          for (const sgn of [1, -1]) {
            ctx.beginPath();
            ctx.moveTo(wx + nx*sgn*rad*0.2, wy + ny*sgn*rad*0.2);
            ctx.quadraticCurveTo(wx - ca2*rad*0.5 + nx*sgn*rad*1.7, wy - sa2*rad*0.5 + ny*sgn*rad*1.7,
                                 wx - ca2*rad*1.7 + nx*sgn*rad*1.1, wy - sa2*rad*1.7 + ny*sgn*rad*1.1);
            ctx.quadraticCurveTo(wx - ca2*rad*1.5 + nx*sgn*rad*0.3, wy - sa2*rad*1.5 + ny*sgn*rad*0.3,
                                 wx - ca2*rad*0.7, wy - sa2*rad*0.7);
            ctx.closePath(); ctx.fill();
          }
        } else if (i === n - 1 && n > 6) {                                        // aleta caudal
          for (const sgn of [1, -1]) {
            ctx.beginPath(); ctx.moveTo(wx, wy);
            ctx.lineTo(wx - ca2*rad*2.6 + nx*sgn*rad*2.2, wy - sa2*rad*2.6 + ny*sgn*rad*2.2);
            ctx.lineTo(wx - ca2*rad*3.0 + nx*sgn*rad*0.4, wy - sa2*rad*3.0 + ny*sgn*rad*0.4);
            ctx.closePath(); ctx.fill();
          }
        } else if (i > 0 && i % 6 === 3) {                                        // aletas laterales
          for (const sgn of [1, -1]) {
            ctx.beginPath();
            ctx.moveTo(wx + ca2*rad*0.4 + nx*sgn*rad*0.2, wy + sa2*rad*0.4 + ny*sgn*rad*0.2);
            ctx.lineTo(wx - ca2*rad*0.6 + nx*sgn*rad*1.8, wy - sa2*rad*0.6 + ny*sgn*rad*1.8);
            ctx.lineTo(wx - ca2*rad*1.1 + nx*sgn*rad*0.3, wy - sa2*rad*1.1 + ny*sgn*rad*0.3);
            ctx.closePath(); ctx.fill();
          }
        }
        ctx.globalCompositeOperation = 'source-over';
        const lt = (i === 0 ? light+8 : light) + wavePulse*22;                    // la onda también aclara el segmento (como el jugador)
        ctx.fillStyle = `hsl(${hue},${flash>0?95:80}%,${lt}%)`;
        ctx.beginPath(); ctx.arc(wx, wy, rad, 0, TAU); ctx.fill();
        ctx.fillStyle = `hsla(${hue},100%,90%,0.5)`;                              // brillo glossy (como el jugador)
        ctx.beginPath(); ctx.arc(wx - rad*0.3, wy - rad*0.3, rad*0.34, 0, TAU); ctx.fill();
      }
      // cabeza: ojos con reflejo + pupila mirando hacia adelante (idéntico al jugador), con la cabeza inflada por la onda
      const h0 = this.pieces[0];
      if (inView(h0.x, h0.y)) {
        let rad = r0*1.15;
        if (h0.wt > 0) { const wf = (WAVE_TOTAL - h0.wt)/WAVE_TOTAL; rad += r0 * Math.sin(Math.PI*wf) * 3; }
        if (!this.coreHead) {                                                     // núcleo (cluster/hydra): no dibuja ojos donde salen las cabezas extra
          const ca = Math.cos(this.ang), sa = Math.sin(this.ang), px = Math.cos(this.ang + Math.PI/2), py = Math.sin(this.ang + Math.PI/2);
          const eyeR = rad*0.42, pupR = rad*0.2;
          for (const sgn of [1, -1]) {
            const ex = h0.x + ca*rad*0.36 + px*rad*0.5*sgn, ey = h0.y + sa*rad*0.36 + py*rad*0.5*sgn;
            ctx.fillStyle = '#fff';            ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, TAU); ctx.fill();
            const lx = ex + ca*pupR*0.9, ly = ey + sa*pupR*0.9;
            ctx.fillStyle = '#0c1014';         ctx.beginPath(); ctx.arc(lx, ly, pupR, 0, TAU); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(lx - pupR*0.3, ly - pupR*0.3, pupR*0.36, 0, TAU); ctx.fill();
          }
          const faceMood = this.hurt > 0 ? 2 : (this.lungeT > 0 ? 1 : 0);         // dolor al recibir golpe / enojo durante todo el ataque
          if (faceMood) drawFace(h0.x, h0.y, this.ang, rad, faceMood, `hsl(${hue},${flash>0?95:80}%,${light}%)`, 1 - this.hurt/HAZARD_FLASH_TIME); // párpado = color de la cabeza; progreso de dolor
        }
        // barra de VIDA sobre la cabeza (sólo si está dañada)
        if (this.hp < this.maxHp - 0.5) {
          const frac = Math.max(0, this.hp/this.maxHp), bw = r0*3.2, bh = Math.max(2.5, r0*0.32), bx = h0.x - bw/2, by = h0.y - rad - bh*2.6;
          ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, bh);
          ctx.fillStyle = `hsl(${110*frac},85%,52%)`; ctx.fillRect(bx, by, bw*frac, bh);
        }
      }
      // CABEZAS EXTRA: cuello (discos que se afinan del anchor a la cabeza) + cabeza con ojos. Encima del cuerpo.
      for (const eh of this.extraHeads) {
        if (!inView(eh.x, eh.y)) continue;
        const nn = eh.neck.length;
        for (let i = nn - 1; i >= 0; i--) {
          const t = i / nn, rr = r0 * (0.5 + 0.45*t);                              // afina del anchor (gordo) a la cabeza (fino)
          ctx.fillStyle = `hsl(${hue},${flash>0?95:75}%,${light-6}%)`;
          ctx.beginPath(); ctx.arc(eh.neck[i].x, eh.neck[i].y, rr, 0, TAU); ctx.fill();
        }
        let hrad = r0;
        if (eh.wt > 0) { const wf = (WAVE_TOTAL - eh.wt)/WAVE_TOTAL; hrad += r0 * Math.sin(Math.PI*wf) * 2; } // pulso al morder
        const ehMood = this.hurt > 0 ? 2 : (eh.lungeT > 0 ? 1 : 0);               // cada cabeza extra: enojo durante su ataque; dolor cuando la criatura recibe golpe
        drawCreatureHead(eh.x, eh.y, eh.ang, hrad, hue, flash>0?95:80, light+6, ehMood, 1 - this.hurt/HAZARD_FLASH_TIME);
      }
    }
  }

  // ════════════════ BOSSES ════════════════
  // Esqueleto pensado para sumar pez piedra / pez linterna como nuevos `type` reusando HP, barra y daño.
  // PEZ GLOBO: deriva lento hacia vos; cicla DESINFLADO (vulnerable, pegale) → INFLADO (púas, casi invulnerable,
  // te muerde si lo tocás). Le pegás con el DASH (igual que a las enemigas). Lo matás → lluvia de estrellas.
  let bosses = [];                                                               // a lo sumo 1 a la vez por ahora
  class Boss {
    constructor(type, hp) {
      const def = BOSS_TYPES[type] || BOSS_TYPES.puffer;
      this.type = type; this.dead = false;
      this.maxHp = hp; this.hp = hp; this.hurt = 0; this.spawnT = 0;
      const a = Math.random()*TAU, rr = WORLD_R * 1.08;                          // entra desde fuera del lago
      this.x = Math.cos(a)*rr; this.y = Math.sin(a)*rr; this.ang = a + Math.PI;
      this.integrated = false; this.bob = Math.random()*TAU;
      this.rF = def.rF; this.speedF = def.speedF; this.name = def.name; this.hue = def.hue;
      // PEZ GLOBO — this.inflate lo lee bodyR() para TODOS los tipos → debe arrancar en 0
      this.phase = 'deflated'; this.phaseT = PUFFER_DEFLATE_T; this.inflate = 0;
      // PEZ PIEDRA
      this.sphase = 'settling'; this.sphaseT = 0; this.tele = 0; this.wx = this.x; this.wy = this.y; this.armCD = 0; this.lvx = 0; this.lvy = 0; this.struck = false;
      // PEZ LINTERNA
      this.aphase = 'luring'; this.aphaseT = ANGLER_LURE_T; this.mouth = 0; this.lurePhase = Math.random()*TAU; this.lureX = this.x; this.lureY = this.y; this.darkA = 0; this.tx = this.x; this.ty = this.y; this.tpCD = ANGLER_TP_CD; this.bitten = false;
    }
    bodyR() { return sper(this.rF) * (1 + 0.42*this.inflate) * Math.min(1, 0.45 + this.spawnT*0.55); }
    hitZone() { return this.bodyR() * (this.inflate > 0.5 ? 1.5 : 1.0); }
    seekHead(h, factor) {                                                         // gira y avanza hacia el jugador (factor escala la velocidad → la pone cada estado)
      if (!h) return;
      const dx = h.x - this.x, dy = h.y - this.y;
      let d = Math.atan2(dy, dx) - this.ang; d = ((d+Math.PI)%TAU+TAU)%TAU - Math.PI;
      this.ang += d * Math.min(1, deltaT*1.5);
      const sp = sper(this.speedF) * factor * (this.integrated ? 1 : 1.7);
      this.x += Math.cos(this.ang)*sp*deltaT; this.y += Math.sin(this.ang)*sp*deltaT;
    }
    pickWander() {                                                                // PEZ PIEDRA: elige un nuevo punto del arrecife al que merodear
      const a = Math.random()*TAU, r = Math.random()*WORLD_R*0.85;
      this.wx = Math.cos(a)*r; this.wy = Math.sin(a)*r; this.sphaseT = STONE_WANDER_T;
    }
    process() {
      if (manager.gameOver || manager.pause) return;
      this.spawnT = Math.min(1, this.spawnT + deltaT*0.6);
      this.bob += deltaT;
      if (this.hurt > 0) this.hurt = Math.max(0, this.hurt - deltaT);
      const h = snake[0];
      if (this.type === 'puffer') this.procPuffer(h);
      else if (this.type === 'stone') this.procStone(h);
      else this.procAngler(h);
      const hd = Math.hypot(this.x, this.y) || 1;                                // SHARED: integración + clamp al lago
      if (!this.integrated && hd < WORLD_R - this.bodyR()) this.integrated = true;
      if (this.integrated) { const lim = WORLD_R - this.bodyR()*0.8; if (hd > lim) { this.x = this.x/hd*lim; this.y = this.y/hd*lim; } }
    }
    procPuffer(h) {                                                              // ciclo desinflado↔inflado + mordida de púas
      this.seekHead(h, this.phase === 'inflated' ? 0.4 : 1);
      this.phaseT -= deltaT;
      if (this.phase === 'deflated')  { this.inflate = Math.max(0, this.inflate - deltaT/PUFFER_DEFLATE_WIND); if (this.phaseT <= 0) { this.phase = 'inflating'; this.phaseT = PUFFER_INFLATE_WIND; } }
      else if (this.phase === 'inflating') { this.inflate = Math.min(1, this.inflate + deltaT/PUFFER_INFLATE_WIND); if (this.phaseT <= 0) { this.phase = 'inflated'; this.phaseT = PUFFER_INFLATE_T; } }
      else if (this.phase === 'inflated')  { this.inflate = 1; if (this.phaseT <= 0) { this.phase = 'deflating'; this.phaseT = PUFFER_DEFLATE_WIND; } }
      else { this.inflate = Math.max(0, this.inflate - deltaT/PUFFER_DEFLATE_WIND); if (this.phaseT <= 0) { this.phase = 'deflated'; this.phaseT = PUFFER_DEFLATE_T; } }
      if (h && this.inflate > 0.5 && manager.immunity <= 0 && manager.hitFlash <= 0) {
        const dx = h.x - this.x, dy = h.y - this.y, rr = this.hitZone() + curR*girth;
        if (dx*dx + dy*dy < rr*rr) manager.hurtPlayer(PUFFER_SPIKE_DMG, Math.atan2(dy, dx), null);
      }
    }
    procStone(h) {                                                               // PROWLER venenoso: MERODEA el arrecife → telegrafía → AGUIJONAZO (veneno, colisión barrida) → EXPUESTO → sigue merodeando
      if (this.sphase === 'settling') {                                          // entra al lago y empieza a merodear
        this.seekHead(h, 1);
        if ((Math.hypot(this.x, this.y) || 1) < WORLD_R*0.78) { this.integrated = true; this.sphase = 'prowl'; this.pickWander(); }
        return;
      }
      this.sphaseT -= deltaT;
      if (this.armCD > 0) this.armCD -= deltaT;
      if (this.sphase === 'prowl') {                                             // MERODEA hacia un waypoint; si te acercás un toque te PERSIGUE; carga si quedás muy cerca y el CD venció
        this.tele = Math.max(0, this.tele - deltaT*2);
        const hx = h ? h.x - this.x : 0, hy = h ? h.y - this.y : 0, hd2 = hx*hx + hy*hy;
        const chase = h && hd2 < sper(STONE_FOLLOW_F)*sper(STONE_FOLLOW_F);      // un toque cerca → seguir al jugador (como las otras enemigas)
        const tx = chase ? h.x : this.wx, ty = chase ? h.y : this.wy;
        const dx = tx - this.x, dy = ty - this.y, d = Math.hypot(dx, dy) || 1;   // nada hacia el objetivo (gira suave)
        let da = Math.atan2(dy, dx) - this.ang; da = ((da+Math.PI)%TAU+TAU)%TAU - Math.PI; this.ang += da * Math.min(1, deltaT*1.4);
        const sp = sper(chase ? STONE_CHASE_SPEED_F : STONE_PROWL_SPEED_F); this.x += Math.cos(this.ang)*sp*deltaT; this.y += Math.sin(this.ang)*sp*deltaT;
        if (!chase && (d < sper(0.05) || this.sphaseT <= 0)) this.pickWander();  // sólo re-elige waypoint si NO está persiguiendo
        if (chase && this.armCD <= 0 && hd2 < sper(STONE_DETECT_F)*sper(STONE_DETECT_F)) { this.sphase = 'telegraph'; this.sphaseT = STONE_TELE_T; this.ang = Math.atan2(hy, hx); } // muy cerca → carga el aguijonazo
      } else if (this.sphase === 'telegraph') {                                  // CARGA visible: se frena, apunta despacio (esquivable), espinas erectas. tele 0→1
        this.tele = 1 - this.sphaseT/STONE_TELE_T;
        if (h) { const a = Math.atan2(h.y - this.y, h.x - this.x); let d = a - this.ang; d = ((d+Math.PI)%TAU+TAU)%TAU - Math.PI; this.ang += d * Math.min(1, deltaT*3); }
        if (this.sphaseT <= 0) { this.sphase = 'strike'; this.sphaseT = STONE_STRIKE_T; const sp = sper(STONE_STRIKE_SPEED_F); this.lvx = Math.cos(this.ang)*sp; this.lvy = Math.sin(this.ang)*sp; this.struck = false; }
      } else if (this.sphase === 'strike') {                                     // AGUIJONAZO rápido: colisión BARRIDA (segmento prev→actual vs cabeza) → conecta aunque sea rapidísimo
        const px = this.x, py = this.y;                                         // posición ANTES de moverse este frame
        const k = Math.max(0, this.sphaseT/STONE_STRIKE_T);
        this.x += this.lvx*k*deltaT; this.y += this.lvy*k*deltaT;
        if (h && !this.struck && manager.immunity <= 0) {                       // UNA aplicación por embestida; respeta el escudo (si no, ni daño ni veneno)
          const rr = this.bodyR() + curR*girth;
          if (segPointDist2(px, py, this.x, this.y, h.x, h.y) < rr*rr) { this.struck = true; manager.hurtPlayer(STONE_VENOM_DMG, Math.atan2(h.y - this.y, h.x - this.x), null); manager.venom = Math.max(manager.venom, STONE_VENOM_T); } // conecta → daño + VENENO (bloquea tu regen)
        }
        if (this.sphaseT <= 0) { this.sphase = 'recover'; this.sphaseT = STONE_RECOVER_T; this.armCD = STONE_ARM_CD; } // erró o pinchó → EXPUESTO + enfría
      } else { this.tele = Math.max(0, this.tele - deltaT*2); if (this.sphaseT <= 0) { this.sphase = 'prowl'; this.pickWander(); } } // recover: EXPUESTO (única ventana de daño pleno), luego vuelve a merodear
    }
    procAngler(h) {                                                              // LINTERNA: acecha → TELEGRAFÍA (cono ROJO) → EMBESTIDA boca abierta = contraatacable → enfría. Golpe en plena embestida = aturdido y NO muerde
      this.lurePhase += deltaT*2.2;
      this.lureX = this.x + Math.cos(this.ang)*this.bodyR()*1.6;                  // señuelo: orbe colgado al frente de la boca
      this.lureY = this.y + Math.sin(this.ang)*this.bodyR()*1.6;
      this.aphaseT -= deltaT;
      if (this.tpCD > 0) this.tpCD -= deltaT;                                    // cooldown del teletransporte
      const dist = h ? Math.hypot(h.x - this.x, h.y - this.y) : 1e9;
      if (this.aphase === 'luring') {                                            // ACECHA de cerca, boca cerrada (blindado), hasta que entrás en rango y ARMA la embestida
        this.seekHead(h, 0.8); this.mouth = Math.max(0, this.mouth - deltaT/0.25);
        if (h && dist < sper(ANGLER_AGGRO_F)) { this.aphase = 'windup'; this.aphaseT = ANGLER_WINDUP_T; } // en rango → telegrafía (prioridad: si estás cerca, pelea)
        else if (h && (dist > sper(ANGLER_TP_FAR_F) || this.tpCD <= 0)) { this.aphase = 'blackout'; this.aphaseT = ANGLER_DARK_T; } // si no, reubica (te alejaste, o CD vencido estando lejos)
      } else if (this.aphase === 'windup') {                                     // TELEGRAFÍA: se frena, apunta despacio, RETROCEDE y abre la boca (aviso claro de la embestida)
        const k = 1 - this.aphaseT/ANGLER_WINDUP_T;                              // 0→1
        this.mouth = 0.35 + 0.3*k;                                              // boca entreabriéndose → ya vulnerable (boca abierta)

    }

    drawStone(R) {

    }

      this.turboDrainMul = 1; this.turboRechargeMul = 1;                          // turbo dura más / recarga más rápido
      this.atkRangeMul = 1; this.atkConeBonus = 0; this.turnMul = 1; this.sizeDmgBonus = 0; // alcance / cono / giro / bonus por tamaño
      this.lifesteal = 0; this.thorns = 0; this.armor = 0; this.magnetMul = 1;    // pasivas: robo de vida / espinas / coraza / imán
      // ── NIVELES (XP mixta + rarezas) ──
      this.xp = 0; this.level = 1; this.xpNeed = XP_BASE; this.choosing = false;  // choosing = eligiendo mejora (congela el juego)
      this.takenPassives = new Set();                                            // pasivas ya tomadas (no se repiten en el pool)
      this.rerolls = START_REROLLS;                                              // rebarajadas disponibles (1 + 1 cada GAIN_REROLL_EVERY niveles)
      this.luFlash = 0; this.flashGlow = 'rgba(120,230,220,0.5)';                // flash de pantalla al subir (decae en el loop) + su color (teñido por rareza)
    }
    addXP(n) { this.xp += n; if (this.xp >= this.xpNeed && !this.choosing) this.startLevelUp(); }
    startLevelUp() {
      this.xp -= this.xpNeed; this.level++;
      this.xpNeed = Math.round(XP_BASE * Math.pow(XP_GROWTH, this.level - 1) + XP_LINEAR * (this.level - 1)); // curva híbrida: siempre hay próximo nivel a la vista
      if (this.level % GAIN_REROLL_EVERY === 0) this.rerolls++;                   // +1 rebarajada cada N niveles
      this.choosing = true; this.pause = true;                                    // congela y abre el overlay de elección
      showUpgradeOverlay(rollUpgrades());
    }
    applyUpgrade(entry) {                                                         // entry = {u, rar}: pasa RF y tier al apply
      const { u, rar } = entry;
      u.apply(this, rar.RF, rar.tier);
      if (u.passive) this.takenPassives.add(u.id);
      this.choosing = false; this.pause = false;
      if (this.xp >= this.xpNeed) this.startLevelUp();                            // encadena si juntaste varios niveles de un saque
    }
    levelJuice(rar) {                                                             // juice al elegir: SÓLO flash de pantalla teñido (sin partículas: confundían con estrellas que aparecen)
      this.luFlash = 1; this.flashGlow = rar.glow;
    }
    hitEnemy(e, dmg, fromAng) {                                                   // el JUGADOR le pega a una enemiga (único camino → otorga XP y SCORE)
      if (!e || e.dead) return;
      e.hp -= dmg; e.hurt = HAZARD_FLASH_TIME; if (e.pieces[0]) e.pieces[0].wt = WAVE_TOTAL;
      e.shedChunk(fromAng, Math.max(1, Math.min(CHUNK_MAX, Math.round(dmg/CHUNK_DMG_PER))));
      this.score += Math.round(dmg * HIT_SCORE);                                 // PEGAR da puntos
      if (this.lifesteal > 0) this.healQueue += dmg * this.lifesteal;            // "Sanguijuela"
      if (e.hp <= 0) { this.score += KILL_SCORE + Math.round(e.maxHp); e.die(); this.addXP(XP_KILL + Math.round(e.maxHp*0.2)); } // MATAR da bonus de score y XP (grandes valen más)
    }
    hurtPlayer(dmg, fromAng, attacker) {                                          // una enemiga (o mina) le pega al jugador
      if (this.immunity > 0 || this.gameOver) return;                            // escudo bloquea
      dmg *= (1 - this.armor);                                                    // "Coraza"
      this.hp -= dmg; this.hitFlash = HAZARD_FLASH_TIME;
      if (snake[0]) snake[0].wave_time = snake[0].wave_time_total;
      this.shedPlayerChunk(fromAng, Math.max(1, Math.min(CHUNK_MAX, Math.round(dmg/CHUNK_DMG_PER))));
      if (this.thorns > 0 && attacker && !attacker.dead) this.hitEnemy(attacker, dmg*this.thorns, fromAng + Math.PI); // "Espinas"
      if (this.hp <= 0) this.die();
    }
    borderHurt() {                                                                // orilla del lago: daño POR TIEMPO (no de una). Ambiental → ignora el escudo de medusa, pero la "Coraza" igual ayuda.
      if (this.gameOver) return;
      this.hp -= BORDER_DPS * (1 - this.armor) * deltaT;
      this.hitFlash = Math.max(this.hitFlash, HAZARD_FLASH_TIME*0.6);            // destello rojo + cara de dolor sostenidos mientras roza la pared
      if (this.hp <= 0) { this.hp = 0; this.die(); }
    }
    shedPlayerChunk(awayAng, count) {                                             // golpe al jugador → arranca pedazos (se acortan de la cola; los pedazos vuelan desde la cabeza)
      const h = snake[0]; if (!h) return;
      this.pendingShrink += count;
      spawnChunks(h.x, h.y, 150, awayAng, count, curR*girth);
    }
    die() {
      if (this.gameOver) return;                                                  // una sola vez
      this.gameOver = true; this.dying = true; this.deathT = 0;
      // La víbora se DESHACE en partículas que se dispersan lento como en el agua y se desvanecen (en vez de
      // volar en pedazos). Cada segmento aporta unas pocas; en cuerpos largos se muestrea para acotar el total.
      this.deathParticles = [];
      const step = Math.max(1, Math.ceil(snake.length / 220));                    // más muestras
      const hx = snake[0] ? snake[0].x : 0, hy = snake[0] ? snake[0].y : 0;
      for (let i = 0; i < snake.length; i += step) {
        const e = snake[i];
        const hue = 145 + Math.min(1, e.id/60)*55;                                // hereda el color del segmento
        const per = (i === 0) ? 10 : 6;                                           // más partículas por segmento
        for (let k = 0; k < per; k++) {
          const a = Math.random()*TAU, sp = sper(0.06) + Math.random()*sper(0.22);// dispersión lenta (agua)
          const ox = (e.x - hx), oy = (e.y - hy);
          const out = Math.atan2(oy, ox) + (Math.random()-0.5);                   // empujón hacia afuera del centro
          const vx = Math.cos(a)*sp*0.6 + Math.cos(out)*sp*0.5;
          const vy = Math.sin(a)*sp*0.6 + Math.sin(out)*sp*0.5;
          const life = rndRange(0.9, DEATH_FADE);
          this.deathParticles.push({ x: e.x + rndRange(-curR,curR), y: e.y + rndRange(-curR,curR),
            vx, vy, r: curR*rndRange(0.4,1.1), life, maxLife: life, hue });
        }
      }
      // suelta ESTRELLAS a lo largo del cuerpo (más cuanto más larga la víbora), como las enemigas al morir
      const drops = Math.min(24, 4 + (snake.length/12|0));
      for (let k = 0; k < drops; k++) {
        const e = snake[Math.min(snake.length-1, (k*snake.length/drops)|0)];
        new Food(e.x + rndRange(-curR*2, curR*2), e.y + rndRange(-curR*2, curR*2));
      }
    }
    burst(x, y, hue, count) {                                                     // burst de partículas efímeras en (x,y) — usado al comer medusa/caballito
      for (let k = 0; k < count; k++) {
        const a = Math.random()*TAU, sp = sper(0.05) + Math.random()*sper(0.18), life = rndRange(0.4, 0.9);
        this.deathParticles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, r: curR*rndRange(0.3,0.8), life, maxLife: life, hue });
      }
    }
    onJellyEat(j) {
      spritesToRemove.push(j);
      this.immunity = JELLY_IMMUNITY;                                             // escudo: atravesás tu cuerpo un rato
      this.score += 250;                                                          // bonus mayor que una estrella (100); NO da segmentos (sólo escudo + score)
      if (snake[0]) snake[0].wave_time = snake[0].wave_time_total;
      this.burst(j.x, j.y, 335, 22);                                              // burst rosado
    }
    onSeahorseEat(s) {                                                            // caballito: BOOST de velocidad (3×) por unos segundos, sin indicador
      spritesToRemove.push(s);
      this.speedBoost = SPEED_BOOST_TIME;
      this.score += s.points;
      if (snake[0]) snake[0].wave_time = snake[0].wave_time_total;
      this.burst(s.x, s.y, 32, 20);                                              // burst naranja
    }
    updateTurbo() {                                                              // carga del turbo: se drena al acelerar, se RECARGA al soltar
      const wants = sprint;
      if (wants && this.turbo > 0) { this.turbo = Math.max(0, this.turbo - TURBO_DRAIN*this.turboDrainMul*deltaT); this.boosting = true; }
      else if (wants) { this.boosting = false; }                                 // sin carga: no acelera (soltar para recargar)
      else { this.turbo = Math.min(1, this.turbo + TURBO_RECHARGE*this.turboRechargeMul*deltaT); this.boosting = false; }
      // el PROPIO orbe es el indicador: se llena/vacía como un vaso (de abajo hacia arriba) con la carga.
      const b = document.getElementById('btnSprint');
      if (b) {
        const p = (Math.max(0, Math.min(1, this.turbo))*100).toFixed(1);
        const on = this.boosting ? 'rgba(120,255,190,0.95)' : 'rgba(0,230,140,0.85)', off = 'rgba(0,40,26,0.55)';
        b.style.background = `linear-gradient(to top, ${on} 0%, ${on} ${p}%, ${off} ${p}%, ${off} 100%)`;
        b.classList.toggle('on', this.boosting);
      }
    }
    onHazardHit(mx, my) {                                                         // mina: daño + pedazo (escudo/coraza vía hurtPlayer)
      const h = snake[0], ang = h ? Math.atan2(h.y - my, h.x - mx) : 0;          // el pedazo vuela en sentido contrario a la mina
      this.hurtPlayer(HAZARD_DMG, ang, null);                                     // sin atacante → no dispara espinas
    }
    process() {
      if (this.choosing) return;                                                 // eligiendo mejora: congela TODO (no drena escudo/boost ni spawnea)
      if (this.hitFlash > 0) this.hitFlash = Math.max(this.hitFlash - deltaT, 0);
      if (this.immunity > 0) this.immunity = Math.max(this.immunity - deltaT, 0);
      if (this.venom > 0) {                                                        // VENENO del pez piedra: DoT como el borde (respeta Coraza, ignora el escudo; se congela acá en pausa/elección)
        this.venom = Math.max(0, this.venom - deltaT);
        this.hp -= STONE_VENOM_DPS * (1 - this.armor) * deltaT;
        this.hitFlash = Math.max(this.hitFlash, HAZARD_FLASH_TIME*0.5);            // tinte de dolor sostenido mientras dura el veneno
        if (this.hp <= 0) { this.hp = 0; this.die(); }
      }
      if (this.speedBoost > 0) this.speedBoost = Math.max(this.speedBoost - deltaT, 0);
      if (this.healQueue > 0 && this.venom <= 0) {                               // cura pendiente (estrella + robo de vida "Sanguijuela"), gradual; el VENENO también la PAUSA (no sólo la regen) → ningún upgrade saltea el veneno
        const amt = Math.min(this.healQueue, HEAL_RATE*deltaT);
        this.hp = Math.min(this.maxHp, this.hp + amt); this.healQueue -= amt;
      }
      if (this.gameOver) { this.deathT += deltaT; return; }                      // durante la muerte: avanzar timer, no spawnear nada
      if (this.initCD > 0) this.initCD = Math.max(this.initCD - deltaT, 0);
      if (!snake.length) { for (let i = 0; i < 10; i++) new SnakePiece(i, true); this.immunity = 1; } // largo inicial DESPLEGADO + 1s de inmunidad
      if (this.initCD > 0) return;                                               // nada aparece hasta pasar el initCD inicial

      // COMBATE del jugador: si ACELERA (boost/sprint) con la cabeza de una enemiga en su cono, lanza la embestida
      // hacia la MÁS CERCANA en cono. El daño no es automático: cae sólo si el dash CONECTA (ver SnakePiece).
      if (this.attackCD > 0) this.attackCD -= deltaT;
      if (this.venom <= 0) this.hp = Math.min(this.maxHp, this.hp + HP_REGEN*this.regenMul*deltaT); // regen ("Regeneración"): BLOQUEADA mientras el VENENO del pez piedra esté activo
      const accel = this.boosting || this.speedBoost > 0;
      if (accel && this.attackCD <= 0 && snake[0]) {
        const h = snake[0], range = sper(ATTACK_RANGE_F)*this.atkRangeMul, cos = Math.cos(ATTACK_ANG + this.atkConeBonus);
        let best = null, bd = Infinity;
        for (const e of enemies) {
          const eh = e.pieces[0], dx = eh.x-h.x, dy = eh.y-h.y, d2 = dx*dx+dy*dy;
          if (d2 < bd && inAttackCone(h.x, h.y, h.ang, eh.x, eh.y, range, cos)) { bd = d2; best = e; }
        }
        let bestBoss = null;                                                      // los jefes también son blanco del dash (cuerpo grande → cono con alcance extra)
        for (const b of bosses) {
          if (b.dead) continue;
          const dx = b.x-h.x, dy = b.y-h.y, d2 = dx*dx+dy*dy;
          if (d2 < bd && inAttackCone(h.x, h.y, h.ang, b.x, b.y, range + b.bodyR(), cos)) { bd = d2; best = null; bestBoss = b; }
        }
        if (bestBoss) {
          const dx = bestBoss.x-h.x, dy = bestBoss.y-h.y, d = Math.hypot(dx, dy) || 1;
          this.lungeX = dx/d; this.lungeY = dy/d; this.lungeT = LUNGE_WIND + LUNGE_TIME; this.lungeDisp = 0; this.attackCD = ATTACK_CD;
          this.atkTarget = null; this.atkHit = false;                            // sin atkTarget enemigo → el hit-test de embestida prueba los jefes
          h.wave_time = h.wave_time_total;
        } else if (best) {
          const eh = best.pieces[0], dx = eh.x-h.x, dy = eh.y-h.y, d = Math.hypot(dx, dy) || 1;
          this.lungeX = dx/d; this.lungeY = dy/d; this.lungeT = LUNGE_WIND + LUNGE_TIME; this.lungeDisp = 0; this.attackCD = ATTACK_CD;
          this.atkTarget = best; this.atkHit = false;
          h.wave_time = h.wave_time_total;
        }
      }

      // crecimiento: materializar segmentos del contador de a pocos por frame → se despliegan solos en vez
      // de apilarse quietos al comer en ráfaga. (El engorde -girth- ya es continuo según el largo.)
      if (this.pendingGrow >= 1) {
        const add = Math.min(Math.floor(this.pendingGrow), GROW_DRIP);           // floor: guarda el remanente fraccionario (LEN_GROW_FRAC deja medios)
        for (let i = 0; i < add; i++) new SnakePiece(snake.length);
        this.pendingGrow -= add;
      }

      // comida: aparece de a una con un delay entre spawns. MÁS comida cuando hay enemigos (compensa el
      // consumo) → siempre hay suficiente en juego para el jugador y las enemigas.
      const targetFood = 4 + enemies.length*2;
      if (food.length < targetFood) {
        this.foodCD -= deltaT;
        if (this.foodCD <= 0) { new Food(); this.foodCD = FOOD_SPAWN_DELAY; }
      } else this.foodCD = FOOD_SPAWN_DELAY;

      // serpientes enemigas: mantener una población; aparecen desde fuera del lago (escalonadas)
      if (enemies.length < ENEMY_TARGET) {
        this.enemyCD -= deltaT;
        if (this.enemyCD <= 0) {
          if (Math.random() < PAIR_CHANCE && enemies.length <= ENEMY_TARGET - 2) {
            // PAREJA: mismo color, una grande + una chica (la escolta), mismo lado de entrada; no se atacan
            const hue = ENEMY_HUES[ri(0, ENEMY_HUES.length-1)], gid = ++enemyGroupSeq, ea = Math.random()*TAU;
            const big = new EnemySnake({ hue, sizeMul: rndRange(1.25, 1.5), groupId: gid, entryAng: ea });
            new EnemySnake({ hue, sizeMul: rndRange(0.7, 0.95), groupId: gid, leader: big, entryAng: ea + rndRange(-0.15, 0.15) });
            pairAlert = 4;                                                       // aviso en el minimapa
          } else {                                                              // enemiga suelta: a veces MULTI-CABEZA (cluster/hydra/body al azar)
            const opts = {};
            if (Math.random() < MULTIHEAD_CHANCE) opts.headLayout = HEAD_LAYOUTS[ri(0, HEAD_LAYOUTS.length-1)];
            new EnemySnake(opts);
          }
          this.enemyCD = rndRange(3, 7);
        }
      } else this.enemyCD = rndRange(3, 7);

      // BOSS cada 10 NIVELES, ROTANDO entre los 3 tipos (globo→piedra→linterna). Si subís varios niveles con un
      // jefe vivo, el siguiente espera a que muera (!bosses.length). La vida escala por cada jefe ya visto. Las
      // enemigas normales SIGUEN apareciendo (no es arena 1v1).
      if (this.level >= this.nextBossLevel && !bosses.length) {
        const type = BOSS_ROTATION[this.bossesSpawned % BOSS_ROTATION.length];
        bosses.push(new Boss(type, BOSS_HP_BASE + BOSS_HP_GROW*this.bossesSpawned));
        this.bossesSpawned++; this.nextBossLevel += BOSS_LEVEL_STEP;
      }

      // minas: ídem, con dificultad creciente (arranca en 5, sube con el score). Se reciclan al alejarte
      // (ver Hazard.process) → siempre hay densidad cerca tuyo, no podés irte a una zona vacía.
      const targetHaz = Math.min(MAX_HAZARDS, 5 + Math.floor(this.score / 320));
      if (hazards.length < targetHaz) {
        this.hazCD -= deltaT;
        if (this.hazCD <= 0) { new Hazard(); this.hazCD = HAZARD_SPAWN_DELAY; }
      } else this.hazCD = HAZARD_SPAWN_DELAY;

      // medusa: premio raro, de a una, con delay largo y aleatorio
      if (treasures.length < 1) {
        this.jellyCD -= deltaT;
        if (this.jellyCD <= 0) { new Jelly(); this.jellyCD = JELLY_SPAWN_DELAY + rndRange(0, 6); }
      } else this.jellyCD = JELLY_SPAWN_DELAY;

      // caballito de mar: ídem, de a uno
      if (seahorses.length < 1) {
        this.seahorseCD -= deltaT;
        if (this.seahorseCD <= 0) { new Seahorse(); this.seahorseCD = SEAHORSE_SPAWN_DELAY + rndRange(0, 6); }
      } else this.seahorseCD = SEAHORSE_SPAWN_DELAY;
    }
    updateParticles() {
      if (!this.deathParticles.length) return;
      const drag = Math.exp(-deltaT / 0.8);                                       // freno suave (resistencia del agua)
      const out = [];
      for (const p of this.deathParticles) {
        p.life -= deltaT;
        if (p.life <= 0) continue;
        p.x += p.vx * deltaT; p.y += p.vy * deltaT;
        p.vx *= drag; p.vy *= drag;
        out.push(p);
      }
      this.deathParticles = out;
    }
    drawParticles() {                                                            // dibujadas en coords de mundo (dentro de la cámara)
      if (!this.deathParticles.length) return;
      ctx.globalCompositeOperation = 'lighter';
      for (const p of this.deathParticles) {
        const a = p.life / p.maxLife;                                            // se desvanece y achica
        ctx.fillStyle = `hsla(${p.hue},100%,65%,${0.7*a})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r*(0.4 + a*0.8), 0, TAU); ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';
    }
    draw() {
      if (this.gameOver) {
        const t = Math.min(1, Math.max(0, (this.deathT - DEATH_TEXT_DELAY) / 0.7)); // aparición suave tras la rotura
        if (t > 0) {
          ctx.globalAlpha = t;
          createText(100, 'GAME OVER',          'center', [255,255,255], xper(0.5), yper(0.47));
          createText(50,  'SCORE: '+this.score, 'center', [120,255,220], xper(0.5), yper(0.6));
          createText(24,  'TOCÁ PARA REINICIAR','center', [255,90,120],  xper(0.5), yper(0.67));
          ctx.globalAlpha = 1;
        }
      }
      if (this.pause && !this.choosing) {                                         // mientras elegís mejora NO se muestra "PAUSA" (el overlay ya tapa la pantalla)
        this.pauseBlinkCD += deltaT;
        createText(100, this.pauseBlinkCD > 0.25 ? 'PAUSA' : '', 'center', [255,255,255], xper(0.5), yper(0.5));
        if (this.pauseBlinkCD > 0.5) this.pauseBlinkCD = 0;
      }
      if (showDebug) {                                                            // HUD estilo Pong: panel monoespaciado arriba a la izquierda.
        const lines = [
          'FPS: '   + Math.round(1/Math.max(1e-3,dtSmoothed)),
          'len: '   + snake.length,
          'minas: ' + hazards.length,
        ];
        const lh = 18, padX = 8, padY = 8, boxW = 132;
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(padX, padY, boxW, lh * lines.length + 8);
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = '13px ui-monospace, Menlo, Consolas, monospace';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        lines.forEach((s, i) => ctx.fillText(s, padX + 6, padY + 4 + i * lh));
      }
    }
    reset() {
      snake = []; food = []; hazards = []; treasures = []; seahorses = []; enemies = []; chunks = []; spritesToRemove = []; bosses = [];
      this.nextBossLevel = BOSS_FIRST_LEVEL; this.bossesSpawned = 0;
      this.venom = 0; this.shockwave = null; this.deathGlow = null;
      this.speedBoost = 0;
      this.gameOver = false; this.dying = false; this.deathT = 0; this.deathParticles = [];
      this.score = 0; this.initCD = 4; this.pause = false; this.loadT = LOAD_TIME;
      this.pendingGrow = 0; this.pendingShrink = 0; this.fed = 0;
      this.maxHp = PLAYER_MAX_HP; this.hp = this.maxHp;                           // las mejoras subían maxHp → volver a base
      this.attackCD = 0; this.lungeT = 0; this.lungeDisp = 0; this.atkTarget = null; this.atkHit = false; this.healQueue = 0;
      this.turbo = 1; this.boosting = false;
      // reset de mejoras + nivel
      this.dmgMul = 1; this.regenMul = 1; this.healMul = 1; this.turboDrainMul = 1; this.turboRechargeMul = 1;
      this.atkRangeMul = 1; this.atkConeBonus = 0; this.turnMul = 1; this.sizeDmgBonus = 0;
      this.lifesteal = 0; this.thorns = 0; this.armor = 0; this.magnetMul = 1;
      this.xp = 0; this.level = 1; this.xpNeed = XP_BASE; this.choosing = false; this.takenPassives.clear();
      this.rerolls = START_REROLLS; this.luFlash = 0;
      const ov = document.getElementById('levelup'); if (ov) ov.classList.remove('show');
      camX = 0; camY = 0; initAmbient();
    }
  }

  // ════════════════ RESIZE ════════════════
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 1.5);                           // capeado a 1.5: el render está limitado por fillrate; en celus 3× esto casi duplica FPS
    W = screenX = window.innerWidth;
    H = screenY = window.innerHeight;                                            // pantalla completa: sin barra, los controles flotan sobre el canvas
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    WORLD_R = sper(WORLD_FACTOR);                                                 // radio del lago (mundo circular)
    if (!ambient.length) initAmbient();
    if (!fishes.length) initFishes();                                             // cardumen ambiental (1 sola vez; sobrevive resizes)

  window.addEventListener('resize', resize);

  // ── AMBIENTE: motas a la deriva (sensación de corriente). Se mantienen alrededor de la cámara (envuelven
  // al salir de un box centrado en la cabeza) para densidad constante en pantalla, sin importar el zoom. ──
  function makeMote(x, y) {
    return { x, y, r: rndRange(0.4, 1.8), a: rndRange(0.05, 0.22), ph: Math.random()*TAU, sp: rndRange(0.4, 1.2) };
  }
  function initAmbient() {
    ambient.length = 0;
    const hx = snake[0] ? snake[0].x : 0, hy = snake[0] ? snake[0].y : 0;
    for (let i = 0; i < 46; i++) ambient.push(makeMote(hx + rndRange(-W*0.6, W*0.6), hy + rndRange(-H*0.6, H*0.6)));
  }
  function updateAmbient() {
    const hx = camX, hy = camY, bx = W*0.6, by = H*0.6;
    const cur = sper(0.02);                                                       // velocidad de la corriente (lenta)
    for (const m of ambient) {
      m.ph += deltaT;
      m.x += (Math.cos(currentAng)*m.sp + Math.cos(m.ph)*0.3) * cur * deltaT;
      m.y += (Math.sin(currentAng)*m.sp + Math.sin(m.ph*1.3)*0.3) * cur * deltaT;
      if (m.x < hx - bx) m.x += bx*2; else if (m.x > hx + bx) m.x -= bx*2;        // envolver para densidad constante

    }

  function drawAmbient() {
    ctx.globalCompositeOperation = 'lighter';

    }

  }

  // ── PECECITOS AMBIENTALES: cardumen decorativo y SUTIL (no es gameplay). Nadan hacia adelante, serpentean
  //    suave (wander), aletean la cola, y se envuelven alrededor de la cámara (densidad constante, como las motas). ──
  const FISH_COUNT = 11;
  const FISH_HUES = [45, 38, 30, 190, 205, 52];                                  // amarillo/naranja/cyan: paleta de pez de arrecife (como el de la foto)
  const FISH_FLEE_R = 0.20;                                                      // radio (× sper) en que una serpiente PELEANDO (dasheando) espanta a los peces
  const FISH_SCARE_TIME = 1.3;                                                   // segundos que siguen huyendo tras asustarse
  const FISH_FLEE_MULT = 3.2;                                                    // cuánto más rápido nadan asustados
  function makeFish(x, y) {
    return { x, y, ang: Math.random()*TAU, sp: rndRange(0.10, 0.22),             // rumbo + velocidad (× sper)
      size: sper(rndRange(0.011, 0.020)), hue: FISH_HUES[(Math.random()*FISH_HUES.length) | 0],
      a: rndRange(0.32, 0.55), ph: Math.random()*TAU, wf: rndRange(7, 12),        // alpha sutil + fase/freq del aleteo de cola
      ws: rndRange(0.5, 1.3), wph: Math.random()*TAU, scared: 0, fleeAng: 0 };    // wander + estado de SUSTO (huida del combate)
  }
  function initFishes() {
    fishes.length = 0;
    const hx = snake[0] ? snake[0].x : 0, hy = snake[0] ? snake[0].y : 0;
    for (let i = 0; i < FISH_COUNT; i++) fishes.push(makeFish(hx + rndRange(-W*0.6, W*0.6), hy + rndRange(-H*0.6, H*0.6)));
  }
  function updateFishes() {
    if (manager.gameOver || manager.pause || manager.loadT > 0) return;          // congelados en pausa/muerte/carga
    const hx = camX, hy = camY, bx = W*0.6, by = H*0.6, lim = WORLD_R - sper(0.02); // lim = no salir del círculo del lago
    const fr = sper(FISH_FLEE_R), fr2 = fr*fr;
    for (const f of fishes) {
      // ¿hay una serpiente PELEANDO (en pleno dash) cerca? → susto. Origen del combate = tx,ty.
      let tx = null, ty = null;
      if (manager.lungeT > 0 && snake[0]) { const dx=f.x-snake[0].x, dy=f.y-snake[0].y; if (dx*dx+dy*dy < fr2) { tx=snake[0].x; ty=snake[0].y; } }
      if (tx === null) for (const e of enemies) { if (e.lungeT > 0) { const eh=e.pieces[0], dx=f.x-eh.x, dy=f.y-eh.y; if (dx*dx+dy*dy < fr2) { tx=eh.x; ty=eh.y; break; } } }
      if (tx !== null) { f.scared = FISH_SCARE_TIME; f.fleeAng = Math.atan2(f.y-ty, f.x-tx); } // huir en dirección OPUESTA al combate
      f.ph += deltaT * f.wf;                                                     // aleteo de cola
      if (f.scared > 0) {                                                        // ASUSTADO: gira rápido lejos del combate, acelera, aletea más
        f.scared -= deltaT;
        let d = f.fleeAng - f.ang; d = ((d+Math.PI)%TAU+TAU)%TAU - Math.PI; f.ang += d * Math.min(1, deltaT*6);
        f.ph += deltaT * f.wf * 1.3;

        f.x += Math.cos(f.ang)*sp*deltaT; f.y += Math.sin(f.ang)*sp*deltaT;
      } else {                                                                   // tranquilo: serpenteo suave (wander)
        f.ang += Math.sin(waveClock*f.ws + f.wph) * 0.6 * deltaT;
        const sp = sper(f.sp);
        f.x += Math.cos(f.ang)*sp*deltaT; f.y += Math.sin(f.ang)*sp*deltaT;
      }
      if (f.x < hx - bx) f.x += bx*2; else if (f.x > hx + bx) f.x -= bx*2;       // envolver alrededor de la cámara (densidad constante)
      if (f.y < hy - by) f.y += by*2; else if (f.y > hy + by) f.y -= by*2;
      const dd = Math.hypot(f.x, f.y);                                           // CÍRCULO DEL LAGO: no salir → rebote hacia adentro
      if (dd > lim) { f.x = f.x/dd*lim; f.y = f.y/dd*lim; f.ang = Math.atan2(-f.y, -f.x) + rndRange(-0.5, 0.5); f.scared = 0; }
    }
  }
  function drawFishes() {
    for (const f of fishes) {

      ctx.beginPath(); ctx.ellipse(0, wig*s*0.12, s, s*0.5, 0, 0, TAU); ctx.fill();
      ctx.fillStyle = 'rgba(8,14,20,0.85)';                                       // OJO
      ctx.beginPath(); ctx.arc(s*0.55, -s*0.08, s*0.13, 0, TAU); ctx.fill();

  }

  // ── FONDO DEL MAR: corales/rocas BAKEADOS (blits). Se hornea un puñado de sprites (varios tipos × tonos)
  //    una sola vez en un canvas offscreen, y se esparcen ~110 instancias por el disco con posición FIJA en
  //    el mundo. Al dibujar se cullean a la vista y se les da un vaivén suave (corriente). Es el análogo del
  //    "render por blits bakeados" de Newton's Cradle: dibujar el coral cada frame sería carísimo. ──
  const CORAL_PX = 128;                                                          // resolución de bakeo de un coral simple (se escala al mundo al blitear)
  const REEF_PX = 192;                                                           // resolución de bakeo de un ARRECIFE compuesto (más motas → más resolución)
  function makeCoralSprite(type, hue, sat, light) {
    const S = (type === 'reef_a' || type === 'reef_b') ? REEF_PX : CORAL_PX, cv = document.createElement('canvas'); cv.width = S; cv.height = S;
    const g = cv.getContext('2d'), cx = S/2, cy = S/2;

      g.strokeStyle = lite; g.lineWidth = S*0.022;

        const mx = cx + Math.cos(a)*len*0.6, my = cy + Math.sin(a)*len*0.6;
        g.beginPath(); g.moveTo(cx, cy); g.lineTo(mx, my); g.lineTo(cx + Math.cos(a)*len, cy + Math.sin(a)*len); g.stroke();
        const fa = a + (Math.random() < 0.5 ? 0.5 : -0.5);                       // una bifurcación por rama
        g.beginPath(); g.moveTo(mx, my); g.lineTo(mx + Math.cos(fa)*len*0.4, my + Math.sin(fa)*len*0.4); g.stroke();

    } else if (type === 'anemone') {                                            // anémona: tentáculos ondulados radiales + centro que brilla (tono cálido)
      const n = 18; g.strokeStyle = base; g.lineWidth = S*0.035;

        const a = (i/n)*TAU, len = S*rndRange(0.28, 0.4);
        g.beginPath(); g.moveTo(cx, cy);
        for (let t = 0.25; t <= 1.001; t += 0.25) {
          const rr = len*t, wob = Math.sin(t*6 + i)*S*0.03;

        }
        g.stroke();
      }
      g.fillStyle = lite; g.beginPath(); g.arc(cx, cy, S*0.12, 0, TAU); g.fill();
      g.globalCompositeOperation = 'lighter'; g.fillStyle = glow;
      g.beginPath(); g.arc(cx, cy, S*0.18, 0, TAU); g.fill();
      g.globalCompositeOperation = 'source-over';
    } else if (type === 'reef_a' || type === 'reef_b') {                         // ARRECIFE: varias motas de coral compuestas en UN solo sprite (vista cenital) → un clump = 1 blit
      const motifs = type === 'reef_a' ? ['brain', 'branch', 'anemone'] : ['rock', 'branch', 'brain']; // SÓLO tipos simples (jamás 'reef_*' → recursión de 1 nivel, en bakeo)
      const k = 5 + (Math.random()*2 | 0);                                       // 5-6 motas por arrecife
      for (let i = 0; i < k; i++) {
        const a = (i/k)*TAU + rndRange(-0.3, 0.3), rr = S*rndRange(0.06, 0.26);
        const mx = cx + Math.cos(a)*rr, my = cy + Math.sin(a)*rr, ms = S*rndRange(0.30, 0.46);
        const sub = makeCoralSprite(motifs[(Math.random()*motifs.length) | 0], hue + rndRange(-14, 14), sat, Math.min(82, light + rndRange(-6, 8)));
        g.globalAlpha = rndRange(0.78, 0.95);
        g.drawImage(sub, mx - ms/2, my - ms/2, ms, ms);                          // compone motas pre-bakeadas en un solo lienzo
      }
      g.globalAlpha = 1;
    } else {                                                                     // 'rock': roca redondeada oscura con motas
      g.fillStyle = base; g.beginPath();
      const m = 9;
      for (let i = 0; i <= m; i++) { const a = (i/m)*TAU, rr = S*0.3*rndRange(0.7, 1.05), x = cx + Math.cos(a)*rr, y = cy + Math.sin(a)*rr; i === 0 ? g.moveTo(x, y) : g.lineTo(x, y); }
      g.closePath(); g.fill();
      g.fillStyle = lite;
      for (let i = 0; i < 5; i++) { g.beginPath(); g.arc(cx + rndRange(-S*0.18, S*0.18), cy + rndRange(-S*0.18, S*0.18), S*0.03, 0, TAU); g.fill(); }
    }

  }
  function initCorals() {                                                        // bakea los sprites y esparce las instancias (1 sola vez; posición fija en el mundo)
    coralSprites.length = 0; corals.length = 0;
    const palettes = [['brain',180,45,34], ['brain',280,38,40], ['branch',190,55,42], ['branch',330,42,46],
                      ['anemone',22,70,52], ['anemone',315,58,55], ['rock',200,12,22], ['rock',190,14,28],
                      ['reef_a',195,40,34], ['reef_b',205,18,26]];                // 8,9 = ARRECIFES compuestos
    for (const p of palettes) coralSprites.push(makeCoralSprite(p[0], p[1], p[2], p[3]));
    // CLUSTERS en vez de scatter uniforme: K centros de arrecife, y alrededor de cada uno apiño un arrecife
    // compuesto + 2-3 acentos sueltos con jitter gaussiano → "conjuntos" con piso desnudo entre medio. Cada
    // clump comparte una PROFUNDIDAD: más profundo = más transparente y un toque más chico (escorzo cenital).
    const REEF_IDX = [8, 9], SINGLE_IDX = [0, 1, 2, 3, 4, 5, 6, 7];
    const K = 16;                                                                 // número de arrecifes (subir para más densidad, sigue barato)
    const RLIM = WORLD_R * 0.93;                                                  // ningún coral cruza la orilla
    const gauss = () => (Math.random() + Math.random() + Math.random() - 1.5) / 1.5; // ~normal en [-1,1]
    for (let kc = 0; kc < K; kc++) {
      const ca = Math.random()*TAU, crr = Math.sqrt(Math.random())*(WORLD_R*0.85); // centro del clump (lejos de la orilla)
      const ccx = Math.cos(ca)*crr, ccy = Math.sin(ca)*crr, depth = Math.random(); // depth 0 somero (brillante) .. 1 profundo (transparente)
      const tierAl = 0.72 + (0.30 - 0.72)*depth, tierSz = 1.0 + (0.82 - 1.0)*depth, spread = sper(0.10);
      const push = (sp, scLo, scHi, sprMul) => {
        let x = ccx + gauss()*spread*sprMul, y = ccy + gauss()*spread*sprMul;
        const d = Math.hypot(x, y); if (d > RLIM) { x = x/d*RLIM; y = y/d*RLIM; } // clamp adentro del lago
        corals.push({ x, y, sp, rot: Math.random()*TAU, sc: rndRange(scLo, scHi)*tierSz,

      };
      push(REEF_IDX[(Math.random()*REEF_IDX.length) | 0], 1.2, 1.8, 0.4);         // arrecife central (pieza focal, jitter chico)
      const M = 2 + (Math.random()*2 | 0);                                        // 2-3 acentos sueltos alrededor
      for (let m = 0; m < M; m++) push(SINGLE_IDX[(Math.random()*SINGLE_IDX.length) | 0], 0.7, 1.6, 1.0);
    }
    corals.sort((a, b) => b.dp - a.dp);                                           // 1 sola vez: profundos primero, someros encima (Z cenital)
  }
  // ── FONDO DEL MAR (FOTO): seafloor.jpg horneada UNA vez (blur + desaturada/teal + oscura) y mirror-tileada
  //    por el piso del lago. El blur/desat/oscurecido vuelven irreconocibles los "landmarks" → tilea sin que se
  //    note la repetición. Si el archivo no está, seafloorTex queda null y se ve el gradiente del lago (fallback). ──
  const SEAFLOOR_PROCESS = false;                                                // false = FOTO CRUDA máxima calidad (test) · true = procesada (blur+desat+oscura, look "fondo")
  const SEAFLOOR_MODE = 'tile';                                                 // 'tile' = mosaico mirror a NITIDEZ NATIVA (repite, sin perder calidad) · 'cover' = 1 imagen a todo el mapa (blanda)
  const SEAFLOOR_TILE_SCALE = 1;                                                // 1 = PÍXEL-PERFECTO (baldosa = px nativos/dpr → 1 px imagen = 1 px pantalla, máxima nitidez). Subir = baldosas más grandes pero más blandas / menos repetición
  const SEAFLOOR_ALPHA = 0.3;                                                   // OPACIDAD de la foto (1 = sólida; bajar → más transparente, deja ver el lago teal por debajo)
  const SEAFLOOR_TINT = 'rgba(12,45,85,0.4)';                                  // capa AZULADA por ENCIMA → profundidad de mar (subí el alpha para más hondo/oscuro; cambiá el color para más/menos azul)
  const SEAFLOOR_TILE_PX = 256;                                                  // resolución del tile bakeado en modo procesado (chico → poca memoria; igual va borroso)
  const SEAFLOOR_MAX_PX = 2048;                                                  // TOPE del lado largo de la foto al cargar (la downscalea): una foto enorme (4000px) daba baldosa gigante = "media imagen" + ~48MB de RAM. Bajar = baldosa más chica / repite más / menos memoria
  function bakeSeafloor(img) {
    const S = SEAFLOOR_TILE_PX, cv = document.createElement('canvas'); cv.width = S; cv.height = S;
    const g = cv.getContext('2d');
    // BLUR iOS-safe (sin ctx.filter): bajar fuerte a un canvas chico y volver a subir suavizado
    const sm = document.createElement('canvas'); sm.width = 48; sm.height = 48;
    const sg = sm.getContext('2d'); sg.imageSmoothingEnabled = true;
    sg.drawImage(img, 0, 0, 1, 1);                                            // colapsa el detalle (corales → mancha)
    g.imageSmoothingEnabled = true; g.drawImage(sm, 0, 0, S, S);                // re-expande → blur fuerte y universal
    // DESATURAR + BAJO BRILLO + TINTE TEAL con UN overlay (source-over, sin blend modes → seguro en iOS)
    g.fillStyle = 'rgba(6,26,30,0.1)'; g.fillRect(0, 0, S, S);
    return cv;
  }
  function downscaleImg(img, maxPx) {                                            // downscalea la foto al cargar: baldosa razonable + memoria sana (la fuente enorme se libera)
    const iw = img.width || 1, ih = img.height || 1, s = Math.min(1, maxPx / Math.max(iw, ih));
    if (s >= 1) return img;                                                      // ya es chica → usar directo
    const w = Math.max(1, Math.round(iw*s)), h = Math.max(1, Math.round(ih*s));
    const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
    const g = cv.getContext('2d'); g.imageSmoothingEnabled = true; g.imageSmoothingQuality = 'high';
    g.drawImage(img, 0, 0, w, h);                                                // downscale de alta calidad (achicar nunca pixela)

  }
  function initSeafloor() {

    img.onload = () => { const src = downscaleImg(img, SEAFLOOR_MAX_PX); seafloorTex = SEAFLOOR_PROCESS ? bakeSeafloor(src) : src; ready(); }; // downscale; crudo = máxima calidad
    img.onerror = () => { seafloorTex = null; ready(); };                      // sin archivo → fallback (se ve el lago), igual destraba el fade
    setTimeout(ready, 4000);                                                   // safety: si la imagen cuelga, no quedarse en negro para siempre
    img.src = 'img.png?v=' + Date.now();                                        // CACHE-BUST: fuerza carga fresca cada vez. Al fijar la imagen final, ponelo 'img.png?v=1'.
  }
  function drawSeaFloor() {                                                      // dibuja la foto del fondo recortada al disco del lago. 2 modos: 'cover' (1 imagen) o 'tile' (mosaico)
    if (!seafloorTex) return;                                                    // fallback: el gradiente del lago (drawLake) queda visible

    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, WORLD_R, 0, TAU); ctx.clip();                 // recortado a la orilla del lago
    ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';        // mejor calidad de escalado
    ctx.globalAlpha = SEAFLOOR_ALPHA;                                            // transparencia de la foto: deja ver el gradiente del lago por debajo
    if (SEAFLOOR_MODE === 'cover') {                                             // UNA imagen estirada a TODO el mapa, en aspecto correcto (el sobrante lo recorta el disco)
      let dw = WORLD_R*2, dh = WORLD_R*2; if (ar > 1) dw = dh*ar; else dh = dw/ar;
      ctx.drawImage(seafloorTex, -dw/2, -dh/2, dw, dh);

      const TWx = (iw/dpr)*SEAFLOOR_TILE_SCALE, TWy = (ih/dpr)*SEAFLOOR_TILE_SCALE; // baldosa = px nativos / dpr → 1 px imagen = 1 px pantalla (sin upscaling = máxima nitidez)
      const ix0 = Math.floor(vL/TWx), ix1 = Math.floor(vR/TWx), iy0 = Math.floor(vT/TWy), iy1 = Math.floor(vB/TWy);
      for (let ix = ix0; ix <= ix1; ix++) for (let iy = iy0; iy <= iy1; iy++) {
