<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Fireworks</title>
<style>
  :root { --bar-height: 66px; }                                                  /* tweak to taste */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  /* Canvas occupies only the space ABOVE the bar — same layout as BallsWeb so the action buttons
     never sit on top of the playfield. Dimensions are set explicitly from JS each resize. */
  #c {
    display: block; position: absolute;
    top: 0; left: 0;
  }

  #hint {
    position: absolute; left: 0; right: 0; top: calc(10px + env(safe-area-inset-top));
    text-align: center; color: rgba(255,255,255,0.5);
    font-size: 13px; letter-spacing: 0.04em; pointer-events: none;
    transition: opacity 0.8s; z-index: 2; padding: 0 16px;
  }

  /* Bottom bar: the action buttons. Opaque-ish background so it reads as a bezel rather than a HUD. */
  #bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(var(--bar-height) + env(safe-area-inset-bottom));
    padding: 0 16px env(safe-area-inset-bottom);
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 3;
  }
  #ui {
    display: flex; gap: 8px;
  }
  #ui button {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none;
    transition: background 0.1s, transform 0.08s;
    padding: 0;
  }
  #ui button:active { background: rgba(255,255,255,0.22); transform: scale(0.92); }
  /* SVG icons: inherit color via currentColor so they tint with the toggled-on state. */
  #ui button svg { display: block; width: 22px; height: 22px; pointer-events: none; }
  #ui button.txt { font-weight: 700; font-size: 17px; letter-spacing: 0.02em; }
  /* visual indicator for toggled-on state */
  #ui button.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); }
  /* Pantalla completa: muestra "expandir" o "contraer" según body.fs-on (igual que CrazyTanks) */
  #btnFs .ic-exit { display: none; }
  body.fs-on #btnFs .ic-enter { display: none; }
  body.fs-on #btnFs .ic-exit  { display: block; }

  /* Info y pantalla completa: chicos, esquina abajo-derecha (fuera de #ui para no descentrar la fila).
     btnFs queda a la izquierda de btnDebug. */
  #btnDebug, #btnFs {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom) + 4px);
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
  }
  #btnDebug { right: 6px; }
  #btnFs    { right: 40px; }                                                     /* 28px del de info + 6px de borde + 6px de gap */
  #btnDebug svg, #btnFs svg { display: block; width: 14px; height: 14px; pointer-events: none; }
  #btnDebug:active, #btnFs:active { background: rgba(255,255,255,0.22); transform: scale(0.9); }
  #btnDebug.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); color: #fff; }
  /* Exit button — vuelta al menú raíz */
  #btnExit {
    position: absolute;
    left: 6px;
    bottom: calc(env(safe-area-inset-bottom) + 4px);
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.45);
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
    z-index: 10;
  }
  #btnExit svg { display: block; width: 14px; height: 14px; pointer-events: none; }
  #btnExit:active { background: rgba(240,90,95,0.28); border-color: rgba(240,90,95,0.55); color: #fff; transform: scale(0.9); }
  /* === Bar layout: exit-left, main-center, info/debug-right (refactor) === */
  #bar {
    display: grid !important;
    grid-template-columns: 1fr auto 1fr !important;
    justify-content: stretch !important;
  }
  #bar > #btnExit {
    position: static !important;
    left: auto !important; right: auto !important;
    top: auto !important; bottom: auto !important;
    justify-self: start;
  }
  #bar > #ui { justify-self: center; }
  #bar > #btnInfo, #bar > #btnDebug, #bar > #btnHome {
    position: static !important;
    left: auto !important; right: auto !important;
    top: auto !important; bottom: auto !important;
    justify-self: end;
  }

</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">tocá y arrastrá para lanzar · botones para más fuegos</div>
  <div id="bar">
  <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
<div id="ui">
      <button id="btnAuto" aria-label="auto" title="Show automático: tira fuegos solos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 13.7-5.6L20 8"/><path d="M20 3.5V8h-4.5"/><path d="M20 12a8 8 0 0 1-13.7 5.6L4 16"/><path d="M4 20.5V16h4.5"/></svg>
      </button>
      <button id="btnMulti" class="txt" aria-label="multi" title="×5: lanza 5 de una">×5</button>
      <button id="btnBlowOne" aria-label="reventar uno" title="Reventar de a uno (mantené apretado)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"/><path d="M12 3.5v3M12 17.5v3M3.5 12h3M17.5 12h3M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2"/></svg>
      </button>
      <button id="btnBlowAll" aria-label="reventar todo" title="Reventar todos los que estén volando">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="8.5" cy="9" r="1.7" fill="currentColor" stroke="none"/><path d="M8.5 4.5v2M8.5 11.5v2M4 9h2M11 9h2M6 6.5l1.3 1.3M9.7 10.2L11 11.5M11 6.5L9.7 7.8M7.3 10.2L6 11.5"/><circle cx="16.5" cy="15.5" r="1.3" fill="currentColor" stroke="none"/><path d="M16.5 12v1.6M16.5 17.4V19M13 15.5h1.6M18.4 15.5H20"/></svg>
      </button>
    </div>
    <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
    </button>
    <button id="btnDebug" aria-label="debug" title="Info / debug">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  FIREWORKS — port web fiel de Fireworks.py (V1) (Canvas, sin física externa).
  //  Cohetes que suben, deceleran y explotan; explosiones con 3 estilos de
  //  dibujo y una capa de recursión (chispas hijas).
  //  Diferencias con FireworksV2Web (el modelo): cohetes más grandes
  //  (FW_RADIUS_FRAC 0.005 vs 0.0015), lanzamiento "alto" más fuerte
  //  (2.4 vs 1.8) y cursor rojo más grande — los valores del .py V1.
  //  La pausa en el .py V1 es un no-op; acá la dejo funcional (mejor UX).
  // ════════════════════════════════════════════════════════════════════
  const TAU = Math.PI * 2;
  const ri  = (a, b) => a + Math.floor(Math.random() * (b - a + 1));               // randint inclusivo
  const rnd = (a, b) => a + Math.random() * (b - a);                               // uniform

  // ── TUNING KNOBS ──
  // Las fracciones son las mismas que Fireworks.py (sper(...) sobre (W+H)/2), así escalan con la pantalla.
  // El cohete tiene un OBJETIVO (dónde explota) y un TIEMPO al azar para llegar. Tres estilos de
  // trayectoria (ver makeFirework): 'arc' (balístico: sube fuerte y cae al objetivo), 'decel'
  // (sube rápido y frena al llegar) y 'direct' (sube casi recto y explota). Deja estela + chispas.
  const FW_RADIUS_FRAC   = 0.0045;   // radio de la cabeza del cohete (chico = delicado)
  const EXPLODE_TOP_FRAC = 0.08;     // banda donde explotan (fracción de H): desde acá (arriba)...
  const EXPLODE_MID_FRAC = 0.5;      // ...hasta la mitad de la pantalla
  const MIN_RISE_FRAC    = 0.15;     // subida mínima desde el toque (para que siempre suba algo)
  const LEAN_MAX         = 0.38;     // inclinación máx respecto a la vertical (rad) → vuelo menos derecho
  const FLIGHT_TIME      = [0.45, 1.6];   // s para llegar al objetivo (al azar) — rango amplio
  const ARC_GRAV_FRAC    = [1.0, 2.0];    // gravedad del estilo balístico (más alto = arco más alto, cae antes de explotar)
  const DUD_CHANCE       = 0.10;     // chance de que un cohete NO explote: queda cayendo y se apaga
  const DUD_GRAV_FRAC    = 0.5;      // gravedad de caída del cohete fallado (vía sper)
  const TRAIL_LEN        = 12;       // largo de la estela del cohete (en puntos)
  const EMBER_RATE       = 0.04;     // s entre chispas que larga el cohete al subir
  const EMBER_LIFE       = [0.2, 0.5];
  const EMBER_GRAV       = 0.4;      // gravedad suave de las chispas (vía sper)
  const EMBER_MAX        = 350;      // tope global de chispas

  // EXPLOSIÓN: simulación de partículas reales (cada chispa con velocidad, gravedad y fricción) +
  // motion-blur (el canvas no se limpia a negro puro, deja estelas de luz). Mucho más "trabajo de arte".
  const SPARK_SPEED_FRAC = 0.55;     // velocidad inicial base de las chispas (vía sper) → cuán grande abre
  const SPARK_DRAG       = 0.12;     // fricción: vel *= DRAG^dt por segundo (bajo = frena fuerte → envolvente)
  const SPARK_GRAV_FRAC  = 0.35;     // gravedad base de las chispas (vía sper)
  const SPARK_LIFE       = [0.7, 2.0];   // vida base (s) — rango amplio: bursts cortitos y otros que duran
  const SPARK_SIZE_FRAC  = 0.0038;   // radio base de una chispa (vía sper)
  const BURST_BIG_CHANCE = 0.3;      // prob de un burst notablemente más grande
  const BURST_BIG_MULT   = [1.5, 2.6];    // los grandes, bien grandes
  const BURST_SIZE_VAR   = [0.6, 1.3];    // variación de tamaño de los normales (más chicos ↔ más grandes)
  const MAX_SPARKS       = 2400;     // tope global de chispas (perf)
  const TRAIL_FADE       = 0.3;      // opacidad del negro por-frame: bajo = estelas largas que cuelgan, alto = limpia rápido (sin rastro al desaparecer)
  const BLOWALL_CAP      = 40;       // máx de cohetes que Q revienta de una (perf)

  const LAUNCH_INTERVAL  = 0.6;     // s entre cohetes mientras se mantiene apretado (más cooldown entre lanzamientos)
  const MULTI_COUNT      = 5;        // cohetes por disparo con el toggle ×5
  const AUTO_INTERVAL    = [0.4, 0.85];  // s entre cohetes del show automático (al azar)
  const BLOWONE_CD       = 0.12;     // s entre explosiones al mantener "reventar de a uno"
  const CURSOR_R_FRAC    = 0.01;     // marcador bajo cada dedo/cursor activo (V1: sper(0.01))

  // ── CANVAS ──
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = 1;

  const xper = p => p * W;
  const yper = p => p * H;
  const sper = p => p * (W + H) / 2;                                               // promedio de ejes, como en el .py

  const barEl = document.getElementById('bar');
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const barH = barEl.offsetHeight;                                             // incluye el safe-area-inset-bottom en iOS
    W = window.innerWidth;
    H = window.innerHeight - barH;                                               // el playfield ocupa sólo lo de arriba de la barra
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);

  // ── COLOR ──
  const clamp255 = v => Math.max(0, Math.min(255, v | 0));
  const randColorInRange = (rl, rh, gl, gh, bl, bh) => [ri(rl, rh), ri(gl, gh), ri(bl, bh)];
  const randColorGray = (lo, hi) => { const n = ri(lo, hi); return [n, n, n]; };
  const modifyColorPerc = (c, f) => [clamp255(c[0]*f), clamp255(c[1]*f), clamp255(c[2]*f)];
  const rgbStr = c => `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;

  // Paleta curada de pirotecnia (vívidos). El blanco cálido y el dorado dan los clásicos.
  const PALETTE = [
    [255, 70, 70],    // rojo
    [255, 140, 50],   // naranja
    [255, 210, 90],   // ámbar
    [255, 245, 235],  // blanco cálido
    [150, 255, 90],   // lima
    [70, 230, 140],   // esmeralda
    [70, 200, 255],   // celeste
    [120, 130, 255],  // azul
    [200, 120, 255],  // violeta
    [255, 100, 210],  // magenta
  ];
  const GOLD = [255, 200, 95];                                                     // dorado de sauces/palmeras
  const pickColor = () => PALETTE[ri(0, PALETTE.length - 1)];
  const mixWhite  = (c, amt) => [c[0]+(255-c[0])*amt, c[1]+(255-c[1])*amt, c[2]+(255-c[2])*amt];   // hacia el blanco caliente

  // Glow radial pre-renderizado y cacheado por color: el bloom de cada chispa es 1 drawImage de esta
  // textura (gaussiano suave) en vez de un arco plano o un gradiente por-frame → más lindo y barato.
  const _glowCache = new Map();
  function glowSprite(c) {
    const rgb = (c[0]|0) + ',' + (c[1]|0) + ',' + (c[2]|0);
    let s = _glowCache.get(rgb);
    if (s) return s;
    const S = 64; s = document.createElement('canvas'); s.width = S; s.height = S;
    const g = s.getContext('2d');
    const grd = g.createRadialGradient(S/2, S/2, 0, S/2, S/2, S/2);
    grd.addColorStop(0,    `rgba(${rgb},0.95)`);
    grd.addColorStop(0.35, `rgba(${rgb},0.35)`);
    grd.addColorStop(1,    `rgba(${rgb},0)`);
    g.fillStyle = grd; g.fillRect(0, 0, S, S);
    _glowCache.set(rgb, s);
    return s;
  }

  // Estrella/flare blanca pre-renderizada (núcleo + 2 púas): glint sutil en las chispas más brillantes.
  function _makeFlare() {
    const S = 64, c = document.createElement('canvas'); c.width = c.height = S;
    const g = c.getContext('2d'), m = S/2;
    const rg = g.createRadialGradient(m, m, 0, m, m, S*0.16);
    rg.addColorStop(0, 'rgba(255,255,255,1)'); rg.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = rg; g.beginPath(); g.arc(m, m, S*0.16, 0, TAU); g.fill();
    g.globalCompositeOperation = 'lighter';
    for (let k = 0; k < 2; k++) {                                                 // dos púas perpendiculares (cruz)
      g.save(); g.translate(m, m); g.rotate(k * Math.PI/2);
      const lg = g.createLinearGradient(-m, 0, m, 0);
      lg.addColorStop(0, 'rgba(255,255,255,0)'); lg.addColorStop(0.5, 'rgba(255,255,255,0.85)'); lg.addColorStop(1, 'rgba(255,255,255,0)');
      g.fillStyle = lg; g.fillRect(-m, -1, S, 2);
      g.restore();
    }
    return c;
  }
  const _flareSprite = _makeFlare();

  // ── ESTADO ──
  let fireworks = [];
  let sparks = [];                                                                // chispas de las explosiones (física real)
  let flashes = [];                                                               // destello central del estallido
  let embers = [];                                                                // chispas que largan los cohetes al subir
  let multiLaunch = false;                                                         // toggle ×5: lanza 5 por disparo
  let autoLaunch = false;                                                          // show automático: tira fuegos solos
  let autoCD = 0;                                                                  // cooldown del show automático
  let showDebug = false;
  let blowCD = 0;                                                                  // cooldown de "reventar de a uno"
  let blowOneHeld = false;                                                         // se mantiene apretado el botón de reventar uno

  // ════════════════ COHETE ════════════════
  function makeFirework(x, y) {
    // OBJETIVO en la mitad superior de la pantalla (banda absoluta): lanzando desde abajo (cerca de
    // los botones) el recorrido es largo. Siempre al menos MIN_RISE arriba del toque, con inclinación.
    let ty = yper(rnd(EXPLODE_TOP_FRAC, EXPLODE_MID_FRAC));
    ty = Math.min(ty, y - yper(MIN_RISE_FRAC));                                   // que siempre suba algo desde el toque
    ty = Math.max(ty, yper(EXPLODE_TOP_FRAC));                                    // sin pasar el margen de arriba
    const lean = Math.tan(rnd(-LEAN_MAX, LEAN_MAX));
    const tx = Math.max(xper(0.04), Math.min(xper(0.96), x + (y - ty) * lean));
    const T = rnd(FLIGHT_TIME[0], FLIGHT_TIME[1]);
    const style = ['arc', 'decel', 'direct'][ri(0, 2)];

    const fw = {
      sx: x, sy: y, tx, ty, x, y,
      duration: T, age: 0, style,
      radius: sper(FW_RADIUS_FRAC),
      color: pickColor(),
      trail: [], emberCD: 0,
      dud: Math.random() < DUD_CHANCE,                                            // mínima chance de no explotar
    };
    if (style === 'arc') {                                                        // balístico: resolver la v inicial para caer al objetivo en T
      fw.g  = sper(rnd(ARC_GRAV_FRAC[0], ARC_GRAV_FRAC[1]));
      fw.vx = (tx - x) / T;
      fw.vy = (ty - y) / T - 0.5 * fw.g * T;                                      // muy negativa → dispara fuerte hacia arriba
    }
    fireworks.push(fw);
    return fw;
  }

  function spawnEmber(fw, bright) {                                               // chispita que se desprende de la cola del cohete
    if (embers.length >= EMBER_MAX) return;
    const life = rnd(EMBER_LIFE[0], EMBER_LIFE[1]);
    embers.push({
      x: fw.x, y: fw.y,
      vx: rnd(-sper(0.015), sper(0.015)),
      vy: rnd(-sper(0.005), sper(0.03)),                                          // tienden a quedarse atrás / caer
      life, maxLife: life, cstr: rgbStr(fw.color),                                // string de color cacheado (no rebuild por frame)
      bright: bright === undefined ? 1 : bright,                                  // los duds que caen largan chispas cada vez más tenues
    });
  }

  function processFirework(fw, dt) {                                              // todo va por fw.age (segundos reales) — dt correcto
    if (fw.falling) {                                                            // dud: no explotó, cae mientras su luz se apaga
      fw.vy += fw.g * dt;
      fw.x += fw.vx * dt; fw.y += fw.vy * dt;
      const bottomY = H + sper(0.06);                                            // apagado proporcional a lo que falta hasta abajo
      fw.dim = Math.max(0, Math.min(1, (bottomY - fw.y) / (bottomY - fw.fallStartY)));
      fw.trail.push({ x: fw.x, y: fw.y });
      if (fw.trail.length > TRAIL_LEN) fw.trail.shift();
      fw.emberCD -= dt;
      if (fw.emberCD <= 0) { fw.emberCD = EMBER_RATE * 1.6; spawnEmber(fw, fw.dim); }  // chispas cada vez más tenues
      if (fw.y > bottomY) fw.dead = true;                                        // completó la caída → se elimina
      return;
    }

    fw.age += dt;
    const u = Math.min(1, fw.age / fw.duration);
    const px = fw.x, py = fw.y;
    if (fw.style === 'arc') {                                                     // posición balística: sube, frena, cae al objetivo
      fw.x = fw.sx + fw.vx * fw.age;
      fw.y = fw.sy + fw.vy * fw.age + 0.5 * fw.g * fw.age * fw.age;
    } else {                                                                      // interpolado start→target con curva
      const p = fw.style === 'decel' ? 1 - Math.pow(1 - u, 3)                     // sube rápido y frena al llegar
                                     : 1 - Math.pow(1 - u, 1.5);                  // 'direct': casi recto, explota arriba
      fw.x = fw.sx + (fw.tx - fw.sx) * p;
      fw.y = fw.sy + (fw.ty - fw.sy) * p;
    }
    if (dt > 0) { fw.vEstX = (fw.x - px) / dt; fw.vEstY = (fw.y - py) / dt; }      // velocidad actual (para arrancar la caída del dud)

    fw.trail.push({ x: fw.x, y: fw.y });                                          // estela
    if (fw.trail.length > TRAIL_LEN) fw.trail.shift();

    fw.emberCD -= dt;                                                             // va largando chispas
    if (fw.emberCD <= 0) { fw.emberCD = EMBER_RATE; spawnEmber(fw); }

    if (fw.age >= fw.duration) {                                                  // llegó al objetivo
      if (fw.dud) {                                                               // falló: no explota, queda cayendo desde su velocidad actual
        fw.falling = true;
        fw.fallStartY = fw.y;                                                     // referencia: el apagado se basa en lo que falta hasta abajo
        fw.dim = 1;
        fw.vx = fw.vEstX || 0;
        fw.vy = fw.vEstY || 0;
        fw.g  = sper(DUD_GRAV_FRAC);
      } else {
        fw.dead = true;
        spawnBurst(fw.x, fw.y, fw.radius, false, fw.color);
      }
    }
  }

  function drawFirework(fw) {
    const dim = fw.dim === undefined ? 1 : fw.dim;                                // duds que caen se van apagando
    const tr = fw.trail;
    ctx.strokeStyle = rgbStr(fw.color); ctx.lineCap = 'round';                    // constantes por cohete → fuera del loop
    for (let i = 1; i < tr.length; i++) {                                         // estela tenue (no debe brillar mucho en vuelo)
      const a = i / tr.length;                                                    // 1 = cerca de la cabeza
      ctx.globalAlpha = a * a * 0.22 * dim;
      ctx.lineWidth = Math.max(0.5, fw.radius * 1.5 * a);
      ctx.beginPath(); ctx.moveTo(tr[i-1].x, tr[i-1].y); ctx.lineTo(tr[i].x, tr[i].y); ctx.stroke();
    }
    const gr = fw.radius * 5;                                                     // glow suave de la cabeza (delicado)
    ctx.globalAlpha = 0.45 * dim;
    ctx.drawImage(glowSprite(fw.color), fw.x - gr, fw.y - gr, gr*2, gr*2);
    ctx.globalAlpha = 0.85 * dim;                                                 // cabeza
    ctx.fillStyle = rgbStr(mixWhite(fw.color, 0.4));
    ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius * 1.25, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawEmbers() {
    const er = sper(0.0018);
    for (const em of embers) {
      const a = em.life / em.maxLife;
      ctx.globalAlpha = a * 0.4 * (em.bright === undefined ? 1 : em.bright);
      ctx.fillStyle = em.cstr;
      ctx.beginPath(); ctx.arc(em.x, em.y, er * (0.5 + a), 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ════════════════ EXPLOSIÓN (partículas con física real) ════════════════
  // El estallido siembra N chispas con velocidad inicial según el PATRÓN; después cada chispa vuela
  // sola con gravedad + fricción, vira de blanco-caliente a su color y se apaga. El motion-blur del
  // loop (negro semi-transparente) dibuja las estelas de luz. Las chispas de 'crossette' re-estallan.
  function pickPattern() {
    const sr = Math.random();
    if      (sr < 0.20) return 'peony';
    else if (sr < 0.34) return 'chrysanthemum';
    else if (sr < 0.46) return 'ring';
    else if (sr < 0.58) return 'willow';
    else if (sr < 0.68) return 'palm';
    else if (sr < 0.77) return 'spiky';
    else if (sr < 0.86) return 'crossette';
    else if (sr < 0.94) return 'pistil';
    else                return 'glitter';
  }

  // Dirección al azar sobre la esfera unidad. Como la velocidad 2D usa (dx,dy) SIN normalizar, las
  // chispas cerca de los "polos" salen lento (quedan en el centro) y las del ecuador vuelan lejos →
  // la proyección de la esfera da un disco lleno y con volumen. dz queda como profundidad visual.
  function dir3() {
    const u = Math.random()*2 - 1, th = rnd(0, TAU), s = Math.sqrt(1 - u*u);
    return { dx: s*Math.cos(th), dy: s*Math.sin(th), dz: u };
  }
  function tiltDir(ax, ay, a) {                                                    // círculo en XY rotado en X e Y → anillo/elipse 3D
    let x = Math.cos(a), y = Math.sin(a), z = 0;
    let ny = y*Math.cos(ax) - z*Math.sin(ax), nz = y*Math.sin(ax) + z*Math.cos(ax); y = ny; z = nz;
    let nx = x*Math.cos(ay) + z*Math.sin(ay);  nz = -x*Math.sin(ay) + z*Math.cos(ay); x = nx; z = nz;
    return { dx: x, dy: y, dz: z };
  }

  function spawnSpark(x, y, vx, vy, color, o) {
    if (sparks.length >= MAX_SPARKS) return;
    sparks.push({
      x, y, vx, vy,
      g: o.g, drag: o.drag,
      life: o.life, maxLife: o.life,
      size: o.size, color,
      glow: glowSprite(color),                                                    // sprite cacheado 1 vez (evita lookup por frame)
      depth: o.depth === undefined ? 1 : o.depth,                                 // 0..1: 1 = adelante (más grande/brillante)
      flicker: o.flicker || 0, flickerPh: rnd(0, TAU),
      tw: o.flicker ? 0 : (Math.random() < 0.32 ? rnd(20, 34) : 0),               // ~1/3 titila al final de su vida (crackle)
      fadePow: o.fadePow || 1.2,
      bornHot: o.bornHot !== false,                                               // arranca blanco caliente y vira al color
      seed: !!o.seed, seedAt: o.seedAt || 0, seedColor: o.seedColor,
    });
  }

  function spawnBurst(x, y, radius, isChild, color) {
    color = color || pickColor();
    const pattern = isChild ? null : pickPattern();
    const big = !isChild && Math.random() < BURST_BIG_CHANCE;
    const sizeMul = (big ? rnd(BURST_BIG_MULT[0], BURST_BIG_MULT[1]) : rnd(BURST_SIZE_VAR[0], BURST_SIZE_VAR[1])) * (isChild ? 0.5 : 1);
    const V = sper(SPARK_SPEED_FRAC) * sizeMul;                                   // velocidad base
    const SZ = sper(SPARK_SIZE_FRAC) * (isChild ? 0.8 : 1);
    const G = sper(SPARK_GRAV_FRAC);

    flashes.push({ x, y, life: 0.13, maxLife: 0.13, color: mixWhite(color, 0.3), r: V * 0.16 });

    if (isChild) {                                                                // mini-explosión (crossette): pop chico y barato, sin patrones densos
      const n = ri(8, 16);
      for (let i = 0; i < n; i++) { const d = dir3(); spawnSpark(x, y, d.dx*V, d.dy*V, color,
        { g: G*0.7, drag: SPARK_DRAG, life: rnd(0.5, 1.0), size: SZ, depth: d.dz*0.5+0.5, fadePow: 1.3 }); }
      return;
    }

    switch (pattern) {
      case 'peony': {                                                             // bola redonda llena
        const n = ri(40, 105);
        for (let i = 0; i < n; i++) { const d = dir3(); spawnSpark(x, y, d.dx*V, d.dy*V, color,
          { g: G*0.7, drag: SPARK_DRAG, life: rnd(SPARK_LIFE[0], SPARK_LIFE[1]), size: SZ, depth: d.dz*0.5+0.5, fadePow: 1.4 }); }
        break;
      }
      case 'chrysanthemum': {                                                     // araña: poca fricción, estelas largas
        const n = ri(32, 76);
        for (let i = 0; i < n; i++) { const d = dir3(); spawnSpark(x, y, d.dx*V*1.1, d.dy*V*1.1, color,
          { g: G*0.85, drag: 0.5, life: rnd(1.2, 2.4), size: SZ*0.95, depth: d.dz*0.5+0.5, fadePow: 1.7 }); }
        break;
      }
      case 'ring': {                                                              // anillo/elipse inclinado
        const n = ri(44, 92), ax = rnd(0.3,1.3)*(Math.random()<0.5?-1:1), ay = rnd(0,TAU);
        for (let i = 0; i < n; i++) { const d = tiltDir(ax, ay, TAU*i/n); spawnSpark(x, y, d.dx*V, d.dy*V, color,
          { g: G*0.5, drag: SPARK_DRAG, life: rnd(0.9, 1.9), size: SZ, depth: d.dz*0.5+0.5 }); }
        break;
      }
      case 'willow': {                                                            // sauce dorado: cae mucho, vive mucho
        const wc = Math.random() < 0.7 ? GOLD : color;
        const n = ri(26, 62);
        for (let i = 0; i < n; i++) { const d = dir3(); spawnSpark(x, y, d.dx*V*0.7, d.dy*V*0.7, wc,
          { g: G*1.9, drag: 0.6, life: rnd(1.5, 3.0), size: SZ*0.9, depth: d.dz*0.5+0.5, fadePow: 0.9 }); }
        break;
      }
      case 'palm': {                                                              // frondas gruesas hacia arriba
        const wc = Math.random() < 0.6 ? GOLD : color;
        const fr = ri(5, 11);
        for (let f = 0; f < fr; f++) {
          const baseA = TAU*f/fr, bx = Math.cos(baseA), by = -Math.abs(Math.sin(baseA))*0.7 - 0.4;
          for (let s = 0, ns = ri(4, 10); s < ns; s++) {
            const jx = bx + rnd(-0.12,0.12), jy = by + rnd(-0.1,0.1), jz = rnd(-0.5,0.5), L = Math.hypot(jx,jy,jz) || 1;
            const sp = V * rnd(0.75, 1.3);
            spawnSpark(x, y, jx/L*sp, jy/L*sp, wc,
              { g: G*1.4, drag: 0.5, life: rnd(1.2, 2.6), size: SZ*1.25, depth: jz/L*0.5+0.5, fadePow: 1.1 });
          }
        }
        break;
      }
      case 'spiky': {                                                             // estrella: púas largas/cortas
        const n = ri(16, 42);
        for (let i = 0; i < n; i++) { const d = dir3(), sp = V * ((i%2===0) ? 1.2 : 0.6);
          spawnSpark(x, y, d.dx*sp, d.dy*sp, color, { g: G*0.55, drag: SPARK_DRAG, life: rnd(0.8, 1.7), size: SZ, depth: d.dz*0.5+0.5 }); }
        break;
      }
      case 'crossette': {                                                         // multi-break: cada chispa vuelve a estallar
        const sc = Math.random() < 0.5 ? pickColor() : color;
        const n = ri(6, 12);
        for (let i = 0; i < n; i++) { const d = dir3(), life = rnd(0.7, 1.0);
          spawnSpark(x, y, d.dx*V*0.8, d.dy*V*0.8, color,
            { g: G*0.6, drag: 0.4, life, size: SZ*1.1, depth: d.dz*0.5+0.5, seed: !isChild, seedAt: life*0.35, seedColor: sc }); }
        break;
      }
      case 'pistil': {                                                            // anillo + corazón denso de otro color
        const c2 = pickColor();
        const n = ri(32, 70), ax = rnd(0.3,1.1)*(Math.random()<0.5?-1:1), ay = rnd(0,TAU);
        for (let i = 0; i < n; i++) { const d = tiltDir(ax, ay, TAU*i/n); spawnSpark(x, y, d.dx*V, d.dy*V, color,
          { g: G*0.5, drag: SPARK_DRAG, life: rnd(0.9, 1.8), size: SZ, depth: d.dz*0.5+0.5 }); }
        const m = ri(20, 48);
        for (let i = 0; i < m; i++) { const d = dir3(); spawnSpark(x, y, d.dx*V*0.45, d.dy*V*0.45, c2,
          { g: G*0.6, drag: SPARK_DRAG, life: rnd(0.9, 1.3), size: SZ*0.9, depth: d.dz*0.5+0.5 }); }
        break;
      }
      case 'glitter': {                                                           // polvo titilante
        const n = ri(40, 95);
        for (let i = 0; i < n; i++) { const d = dir3(), sp = V * rnd(0.15, 1.0);
          spawnSpark(x, y, d.dx*sp, d.dy*sp, color,
            { g: G*0.5, drag: 0.25, life: rnd(0.7, 1.8), size: SZ*0.85, depth: d.dz*0.5+0.5, flicker: rnd(18, 30), fadePow: 0.8 }); }
        break;
      }
    }
  }

  function drawSpark(p) {
    const lf = Math.max(0, p.life / p.maxLife);                                   // 1 → 0
    let b = Math.pow(lf, p.fadePow);                                              // brillo
    if (p.flicker) b *= 0.3 + 0.7*Math.max(0, Math.sin(p.life*p.flicker + p.flickerPh));
    else if (p.tw && lf < 0.5) b *= 0.45 + 0.55*Math.max(0, Math.sin(p.life*p.tw + p.flickerPh));  // crackle final
    if (b <= 0.015) return;
    const dep = 0.6 + 0.4*p.depth;                                                // profundidad: adelante más grande/brillante
    const bd = b * dep;
    const r = Math.max(0.5, p.size * (0.5 + 0.5*lf) * dep);
    const gA = bd * 0.42;                                                         // glow gaussiano (sprite cacheado en p.glow)
    if (gA > 0.05) {
      const gr = r * 5;
      ctx.globalAlpha = Math.min(1, gA);
      ctx.drawImage(p.glow, p.x - gr, p.y - gr, gr*2, gr*2);
    }
    if (bd > 0.12) {                                                             // núcleo: sólo si aporta (el glow ya tapa a los tenues)
      const c0 = p.color;                                                         // mezcla a blanco combinada, inline (sin alocar arrays)
      const w = 0.35 + 0.65 * ((p.bornHot && lf > 0.6) ? (lf - 0.6) * 2.25 : 0);
      ctx.globalAlpha = Math.min(1, bd);
      ctx.fillStyle = 'rgb(' + ((c0[0]+(255-c0[0])*w)|0) + ',' + ((c0[1]+(255-c0[1])*w)|0) + ',' + ((c0[2]+(255-c0[2])*w)|0) + ')';
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, TAU); ctx.fill();
    }
    const fa = (bd - 0.72) / 0.28;                                              // glint tipo estrella sólo en las más brillantes
    if (fa > 0) {
      const fr = r * (3 + 5*Math.min(1, fa));
      ctx.globalAlpha = Math.min(0.6, fa * 0.55);
      ctx.drawImage(_flareSprite, p.x - fr, p.y - fr, fr*2, fr*2);
    }
  }

  function drawFlash(f) {
    const a = f.life / f.maxLife;                                                  // destello suave (mismo glow, tenue)
    const gr = f.r * (1.5 - a) * 2.2;
    ctx.globalAlpha = a * 0.32;
    ctx.drawImage(glowSprite(f.color), f.x - gr, f.y - gr, gr*2, gr*2);
  }

  // ════════════════ ACCIONES (= teclas Q / W del .py) ════════════════
  function blowAll() {                                                            // Q: reventar todos los cohetes en vuelo
    let n = 0;
    for (const fw of fireworks) {
      fw.dead = true;
      if (n++ < BLOWALL_CAP) spawnBurst(fw.x, fw.y, fw.radius, false, fw.color);
    }
  }
  function blowOne() {                                                            // reventar uno al azar (con cooldown)
    if (blowCD > 0 || !fireworks.length) return;
    const idx = ri(0, fireworks.length - 1);
    const fw = fireworks[idx];
    fw.dead = true;
    spawnBurst(fw.x, fw.y, fw.radius, false, fw.color);
    blowCD = BLOWONE_CD;
  }

  // ════════════════ INPUT ════════════════
  // Multi-touch: cada dedo/cursor activo lanza su propio chorro de cohetes con su propio cooldown.
  const pointers = new Map();                                                      // pointerId → { x, y, cd }
  function evtPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

  canvas.addEventListener('pointerdown', e => {
    canvas.setPointerCapture(e.pointerId);
    const p = evtPos(e);
    pointers.set(e.pointerId, { x: p.x, y: p.y, cd: 0 });                          // cd=0 → primer cohete al toque sale ya
  });
  canvas.addEventListener('pointermove', e => {
    const ps = pointers.get(e.pointerId);
    if (!ps) return;
    const p = evtPos(e); ps.x = p.x; ps.y = p.y;
  });
  function endPointer(e) { pointers.delete(e.pointerId); }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // botones — tap dispara en pointerdown (responde aunque haya un dedo ocupado en el canvas)
  function tappable(el, fn) { el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); }); }
  function toggle(el, get, set) {
    tappable(el, () => { set(!get()); el.classList.toggle('on', get()); });
  }

  toggle(document.getElementById('btnMulti'), () => multiLaunch, v => multiLaunch = v);
  const btnAuto = document.getElementById('btnAuto');
  tappable(btnAuto, () => { autoLaunch = !autoLaunch; autoCD = 0; btnAuto.classList.toggle('on', autoLaunch); });

  // Reventar de a uno: se mantiene apretado y sigue reventando con cooldown (no es un tap suelto).
  const btnBlowOne = document.getElementById('btnBlowOne');
  btnBlowOne.addEventListener('pointerdown', e => { e.preventDefault(); blowOneHeld = true; blowOne(); btnBlowOne.classList.add('on'); });
  const releaseBlowOne = () => { blowOneHeld = false; btnBlowOne.classList.remove('on'); };
  btnBlowOne.addEventListener('pointerup', releaseBlowOne);
  btnBlowOne.addEventListener('pointercancel', releaseBlowOne);
  btnBlowOne.addEventListener('pointerleave', releaseBlowOne);

  tappable(document.getElementById('btnBlowAll'), blowAll);

  const btnDebug = document.getElementById('btnDebug');
  tappable(btnDebug, () => { showDebug = !showDebug; btnDebug.classList.toggle('on', showDebug); });

  // Pantalla completa (igual que CrazyTanks): en mobile saca la barra del navegador. iOS Safari no
  // soporta la Fullscreen API en elementos → falla en silencio. El resize() se reengancha solo al cambiar.
  const fsTarget = document.documentElement;
  const _reqFs  = fsTarget.requestFullscreen || fsTarget.webkitRequestFullscreen;
  const _exitFs = document.exitFullscreen || document.webkitExitFullscreen;
  const isFs = () => !!(document.fullscreenElement || document.webkitFullscreenElement);
  function enterFs() { if (_reqFs) { const p = _reqFs.call(fsTarget); if (p && p.catch) p.catch(() => {}); } }
  function exitFs()  { if (_exitFs) _exitFs.call(document); }
  function syncFsIcon() { document.body.classList.toggle('fs-on', isFs()); }
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);
  tappable(document.getElementById('btnFs'), () => { isFs() ? exitFs() : enterFs(); });

  // ── LOOP ──
  let lastT = performance.now();
  let dtSmoothed = 1/60;
  function loop(now) {
    if (typeof now !== 'number') now = performance.now();
    const dt = Math.min(0.05, (now - lastT) / 1000);                              // dt real, clamp a 50ms como el deltaT del .py
    lastT = now;
    dtSmoothed = dtSmoothed * 0.9 + dt * 0.1;

    blowCD = Math.max(blowCD - dt, 0);
    if (blowOneHeld) blowOne();                                                   // reventar de a uno mientras se mantiene apretado (con cooldown)

    // lanzar desde cada dedo activo, con su cooldown
    for (const ps of pointers.values()) {
      ps.cd -= dt;
      if (ps.cd <= 0) {
        const n = multiLaunch ? MULTI_COUNT : 1;
        for (let i = 0; i < n; i++) makeFirework(ps.x, ps.y);
        ps.cd = LAUNCH_INTERVAL;
      }
    }

    if (autoLaunch) {                                                            // show automático: cohetes solos desde abajo, por cooldown
      autoCD -= dt;
      if (autoCD <= 0) {
        const ax = xper(rnd(0.12, 0.88)), n = multiLaunch ? MULTI_COUNT : 1;
        for (let i = 0; i < n; i++) makeFirework(ax + rnd(-xper(0.02), xper(0.02)), H);
        autoCD = rnd(AUTO_INTERVAL[0], AUTO_INTERVAL[1]);
      }
    }

    const wind = Math.sin(now * 0.00018) * sper(0.05) + Math.sin(now * 0.00041 + 1.7) * sper(0.025);  // brisa suave, deriva orgánica

    for (const fw of fireworks) processFirework(fw, dt);
    for (const p of sparks) {                                                     // física de cada chispa: fricción + gravedad + brisa
      const k = Math.pow(p.drag, dt);
      p.vx *= k; p.vy *= k;
      p.vy += p.g * dt;
      p.x += (p.vx + wind) * dt; p.y += p.vy * dt;
      p.life -= dt;
      if (p.seed && p.life <= p.seedAt) { p.seed = false; spawnBurst(p.x, p.y, 0, true, p.seedColor); }  // multi-break
    }
    for (const f of flashes) f.life -= dt;
    for (const em of embers) {                                                    // chispas que largan los cohetes al subir
      em.life -= dt;
      em.x += (em.vx + wind) * dt; em.y += em.vy * dt;
      em.vy += sper(EMBER_GRAV) * dt;                                             // caen suave
      em.vx *= Math.pow(0.2, dt);                                                 // fricción horizontal (framerate-indep)
    }
    fireworks = fireworks.filter(fw => !fw.dead);
    sparks = sparks.filter(p => p.life > 0);
    flashes = flashes.filter(f => f.life > 0);
    embers = embers.filter(em => em.life > 0);

    // render — motion blur: NO se limpia a negro puro, se pinta un negro semi-transparente que deja
    // las estelas de luz. Después todo aditivo ('lighter'), donde el orden no importa.
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0,0,0,' + TRAIL_FADE + ')';
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'lighter';
    drawEmbers();
    for (const fw of fireworks) drawFirework(fw);
    for (const f of flashes) drawFlash(f);
    for (const p of sparks) drawSpark(p);
    ctx.globalCompositeOperation = 'source-over';

    // marcador bajo cada dedo/cursor activo (como el cursor (100,0,0) del .py V1)
    ctx.fillStyle = 'rgb(100,0,0)';
    for (const ps of pointers.values()) {
      ctx.beginPath(); ctx.arc(ps.x, ps.y, sper(CURSOR_R_FRAC), 0, TAU); ctx.fill();
    }

    if (showDebug) drawDebugHUD();
    requestAnimationFrame(loop);
  }

  function drawDebugHUD() {
    const lines = [
      'FPS: ' + Math.round(1 / Math.max(1e-3, dtSmoothed)),
      'Cohetes: ' + fireworks.length,
      'Chispas: ' + sparks.length,
    ];
    const lh = 18, padX = 8, padY = 8, w = 120;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(padX, padY, w, lh * lines.length + 8);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = '13px ui-monospace, Menlo, Consolas, monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    lines.forEach((s, i) => ctx.fillText(s, padX + 6, padY + 4 + i * lh));
  }

  // ── INIT ──
  resize();
  loop();

  const hint = document.getElementById('hint');
  setTimeout(() => hint.style.opacity = '0', 5000);
  canvas.addEventListener('pointerdown', () => hint.style.opacity = '0', { once: true });
  </script>
  <script>
    document.getElementById('btnExit').addEventListener('click', () => {
      if (confirm('¿Salir al menú?')) location.href = '../../';
    });
  </script>
</body>
</html>
