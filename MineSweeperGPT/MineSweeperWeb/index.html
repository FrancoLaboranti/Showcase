<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MineSweeper</title>
<link rel="stylesheet" href="../../Arcade/arcade-shell.css">
<style>
  :root { --bar-height: 66px; }                                                  /* tweak to taste */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #14161d;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  /* Canvas occupies only the space ABOVE the bar — the board centers in that rect so it never sits
     behind the buttons. Dimensions are set explicitly from JS each resize. */
  #c {
    display: block; position: absolute;
    top: 0; left: 0;
  }

  #hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    max-width: min(88vw, 480px);
    background: rgba(10,12,18,0.78); border: 1px solid rgba(255,255,255,0.10);
    padding: 12px 20px; border-radius: 14px;
    text-align: center; color: rgba(255,255,255,0.92);
    font-size: 13px; letter-spacing: 0.04em; line-height: 1.45;
    pointer-events: none; transition: opacity 0.8s; z-index: 2;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }

  /* Cronómetro de la partida — arriba-izquierda, discreto. Arranca con la 1ª jugada, frena al terminar. */
  #timer {
    position: absolute;
    left: calc(12px + env(safe-area-inset-left)); top: calc(9px + env(safe-area-inset-top));
    display: flex; align-items: center; gap: 5px;
    color: rgba(255,255,255,0.5);
    font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: 0.03em;
    pointer-events: none; z-index: 2;
  }
  #timer svg { width: 14px; height: 14px; opacity: 0.85; }

  /* Bottom bar: action buttons (centered). Same shell as BallsWeb. */
  #bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(var(--bar-height) + env(safe-area-inset-bottom));
    padding: 0 16px env(safe-area-inset-bottom);
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 3;
  }
  #ui {
    display: flex; gap: 8px;
  }
  #ui button {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none;
    transition: background 0.1s, transform 0.08s;
    padding: 0;
  }
  #ui button:active { background: rgba(255,255,255,0.22); transform: scale(0.92); }
  #ui button svg { display: block; width: 22px; height: 22px; pointer-events: none; }
  #ui #btnDiff { position: relative; font-weight: 700; font-size: 13px; letter-spacing: -1px; overflow: visible; }
  #ui #btnDiff #diffKey { color: #ffd23f; }                                       /* estrellas doradas */
  /* multiplicador: medallón dorado "estampado" sobresaliendo de la esquina sup-der */
  #ui #btnDiff #diffMult {
    position: absolute; top: -5px; right: -5px;
    min-width: 19px; height: 19px; padding: 0 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 900; line-height: 1; letter-spacing: -0.02em;
    color: #5a3d00;
    background: radial-gradient(circle at 34% 28%, #ffe98a 0%, #ffce2e 55%, #e0a200 100%);
    border: 1.5px solid #8a5e00;
    border-radius: 10px;
    transform: rotate(-12deg);
    box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.5);
    text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    pointer-events: none;
  }
  #ui #btnDiff #diffMult:empty { display: none; }                                /* en clásico (sin multiplicador) no se muestra */
  /* toggled-on states */
  #ui #btnSound.on { background: rgba(120,200,255,0.26); border-color: rgba(120,200,255,0.55); }
  #ui #btnMode.on  { background: rgba(255,200,50,0.28); border-color: rgba(255,200,50,0.6); color: #ffd23f; }

  /* Mine counter — overlay anclado al marco del tablero (posición la fija placeHud() en JS). */
  #status {
    position: absolute;
    display: flex; align-items: center; gap: 5px;
    color: rgba(255,255,255,0.55);
    font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: 0.03em;
    pointer-events: none; z-index: 2;
  }
  #status svg { width: 14px; height: 14px; }
  /* Botones ✕/⛶/ⓘ + overlay de salida vienen de arcade-shell.css. */
  /* HUD de FPS — formato Pong: panel monoespaciado arriba a la izquierda, sin border-radius. */
  #fpsOverlay {
    position: absolute;
    left: calc(8px + env(safe-area-inset-left));
    top: calc(8px + env(safe-area-inset-top));
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 18px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.55);
    padding: 4px 6px;
    pointer-events: none;
    display: none;
    z-index: 9;
  }



</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="timer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 13V9"/><path d="M9 2h6"/></svg>
    <span id="timerText">0:00</span>
  </div>
  <div id="status">
    <span id="statusIcon"></span>
    <span id="statusCount">25</span>
  </div>
  <div id="hint">tocá una casilla para descubrirla · mantené apretado para poner una bandera 🚩</div>
  <div id="bar">
  <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
<div id="ui">
      <button id="btnMode"  aria-label="modo"       title="Modo: Clásico / Fiebre del Oro"></button>
      <button id="btnDiff"  aria-label="dificultad" title="Dificultad: Fácil / Medio / Difícil"><span id="diffKey">M</span><span id="diffMult"></span></button>
      <button id="btnSound" aria-label="sonido"     title="Sonido on/off"></button>
      <button id="btnReset" aria-label="reiniciar"  title="Reiniciar (R)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg>
      </button>
    </div>
    <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
    </button>
    <button id="btnInfo" aria-label="info" title="Info / FPS">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  MINESWEEPER — port web de MineSweeperGPT.py, con el shell mobile de BallsWeb.
  //  Mejoras sobre el .py: look "campo" moderno (césped/tierra + animación de
  //  destape en cascada), selector de dificultad, y sonido sintetizado WebAudio.
  //  Conserva la zona segura tras el 1er click; reparto de minas blue-noise (parejo, sin clusters).
  //  Tap rápido = descubrir · long-press / click derecho = bandera · R / botón = reset.
  // ════════════════════════════════════════════════════════════════════
  const TAU = Math.PI * 2;
  const ri = (a, b) => a + Math.floor(Math.random() * (b - a + 1));               // randint inclusivo
  const nowMs = () => performance.now();
  const easeOut = p => 1 - Math.pow(1 - p, 3);
  const easeOutBack = p => { const c = 1.9; return 1 + (c + 1) * Math.pow(p - 1, 3) + c * Math.pow(p - 1, 2); };

  // === DIFICULTADES (menos minas que el .py original de 40) ===
  const DIFFS = [
    { name: 'Fácil',   key: 'F', cols: 9,  rows: 9,  mines: 10, secs: 40,  gold: 10, mult: 1 },  // secs = límite oro · gold = pepitas · mult = puntos por pepita
    { name: 'Medio',   key: 'M', cols: 13, rows: 13, mines: 25, secs: 70,  gold: 20, mult: 2 },
    { name: 'Difícil', key: 'D', cols: 16, rows: 16, mines: 50, secs: 110, gold: 30, mult: 3 },
  ];
  let diffIndex = 1;                                                              // arranca en Medio
  let GRID_WIDTH = DIFFS[diffIndex].cols, GRID_HEIGHT = DIFFS[diffIndex].rows, MINES_COUNT = DIFFS[diffIndex].mines;

  // === PALETA (look moderno tipo "campo minado", subida de contraste) ===
  const GRASS_L = '#8fce4e', GRASS_D = '#7cbf3e';                                 // tapa sin descubrir (damero verde, +contraste entre cuadros)
  const DIRT_L  = '#e9cda2', DIRT_D  = '#dcbb89';                                 // tierra descubierta (damero tierra, cálida)
  const FRAME   = '#5f8a2e';                                                      // borde verde oscuro (resalta contra el césped)
  const BG0 = '#181b24', BG1 = '#10121a';                                         // fondo de la pantalla
  const NUMBER_COLORS = {                                                         // tonos vívidos para que salten sobre la tierra
    1: '#1565d8', 2: '#2e9e3a', 3: '#e5302a', 4: '#7d2cc0',
    5: '#ef7d00', 6: '#0aa6b8', 7: '#3a2f2f', 8: '#5b6b75',
  };

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // === GEOMETRÍA RESPONSIVE ===
  let W = 0, H = 0, dpr = 1;
  let tile = 40, boardW = 0, boardH = 0, offX = 0, offY = 0;
  const barEl = document.getElementById('bar');
  const timerEl = document.getElementById('timer');
  const statusEl = document.getElementById('status');
  const hint = document.getElementById('hint');
  let hintTimer = null;
  function showHint(txt) { hint.textContent = txt; hint.style.opacity = '1'; clearTimeout(hintTimer); hintTimer = setTimeout(() => hint.style.opacity = '0', 5000); }

  // Ancla el HUD (cronómetro / contador) a las esquinas superiores del MARCO del tablero, no a las
  // esquinas de la ventana. Si hay lugar arriba del marco los pone ahí; si la pantalla es ancha y el
  // tablero queda alto (poco margen arriba), los corre a los costados, siempre alineados al tope del marco.
  function placeHud() {
    const fpad = Math.round(tile * 0.16);
    const fL = offX - fpad, fT = offY - fpad, fR = offX + boardW + fpad;
    const gap = 8;
    const th = timerEl.offsetHeight || 22;
    timerEl.style.right = 'auto'; statusEl.style.left = 'auto';
    if (fT >= th + gap + 4) {                                                    // lugar arriba → esquinas superiores
      const top = fT - th - gap;
      timerEl.style.left = fL + 'px';            timerEl.style.top = top + 'px';
      statusEl.style.right = (W - fR) + 'px';    statusEl.style.top = top + 'px';
    } else {                                                                     // poco lugar arriba → a los costados, al tope del marco
      timerEl.style.left = 'auto'; timerEl.style.right = (W - fL + gap) + 'px'; timerEl.style.top = fT + 'px';
      statusEl.style.left = (fR + gap) + 'px';                                   statusEl.style.top = fT + 'px';
    }
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const barH = barEl.offsetHeight;                                             // includes safe-area-inset-bottom on iOS
    W = window.innerWidth;
    H = window.innerHeight - barH;                                              // board lives only above the bar
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // tablero cuadrado, centrado, lo más grande que entre (deja un margen para el marco)
    const pad = 18;
    tile = Math.floor(Math.min((W - pad * 2) / GRID_WIDTH, (H - pad * 2) / GRID_HEIGHT));
    boardW = tile * GRID_WIDTH;
    boardH = tile * GRID_HEIGHT;
    offX = Math.floor((W - boardW) / 2);
    offY = Math.floor((H - boardH) / 2);
    placeHud();
  }
  window.addEventListener('resize', resize);

  // === ESTADO ===
  let grid = [];                 // grid[y][x]
  let gridReady = false;         // minas colocadas (tras 1er click)
  let gameOver = false;
  let victory = false;
  let revealedCount = 0;
  let explodedTile = null;
  let endAt = 0;                 // timestamp del fin (para animar el banner)
  let timerStart = 0, timerRunning = false, timerEnd = 0;   // cronómetro: arranca en la 1ª jugada, frena al terminar
  let mode = 'classic';          // 'classic' | 'gold' (modo bonus: pocas minas + oro para juntar)
  let GOLD_COUNT = 0;            // pepitas a esparcir en modo oro
  let goldCollected = 0;         // oro juntado en la partida actual
  let goldTimeMs = 0;            // límite de tiempo (cuenta regresiva) del modo oro
  let goldMult = 1;             // puntos por pepita según dificultad (×1/×2/×3)
  let endReason = '';            // 'mine' | 'time' | 'win' — para elegir el cartel de fin
  let bonusPts = 0;             // bonus de puntos al juntar todo (mitad de los segundos restantes)
  let lastRecord = 0, isNewRecord = false;   // high-score (localStorage) de la dificultad actual en modo oro
  let coinFx = [], coinFxStart = 0, coinTickN = 0;   // animación: el tiempo restante vuela como monedas al centro

  function makeTile(x, y) {
    return { gx: x, gy: y, isMine: false, isGold: false, isRevealed: false, isFlagged: false, adjacent: 0, adjacentGold: 0, revealAt: 0, flagAt: 0, goldAt: 0 };
  }
  function reset() {
    gridReady = false; gameOver = false; victory = false; revealedCount = 0;
    explodedTile = null; endAt = 0;
    timerStart = 0; timerRunning = false; timerEnd = 0;
    goldCollected = 0; endReason = ''; bonusPts = 0; isNewRecord = false; coinFx = [];
    grid = [];
    for (let y = 0; y < GRID_HEIGHT; y++) {
      const row = [];
      for (let x = 0; x < GRID_WIDTH; x++) row.push(makeTile(x, y));
      grid.push(row);
    }
    updateStatus();
  }

  // vecinos (incluye la propia celda, igual que get_neighbors del .py con dx=dy=0)
  function neighbors(t) {
    const out = [];
    for (let dx = -1; dx <= 1; dx++)
      for (let dy = -1; dy <= 1; dy++) {
        const nx = t.gx + dx, ny = t.gy + dy;
        if (nx >= 0 && nx < GRID_WIDTH && ny >= 0 && ny < GRID_HEIGHT) out.push(grid[ny][nx]);
      }
    return out;
  }

  // amontonamiento local: cuántas minas ya tiene esta celda alrededor
  function neighborMineCount(t) {
    let n = 0;
    for (const nb of neighbors(t)) if (nb !== t && nb.isMine) n++;
    return n;
  }

  function placeMines(firstTile) {
    const safe = new Set(neighbors(firstTile));                                  // incluye firstTile (vecino propio)
    safe.add(firstTile);
    const candidates = [];
    for (const row of grid) for (const t of row) if (!safe.has(t)) candidates.push(t);

    // Reparto semi-parejo: la mayoría de las minas se ubican "blue-noise" (de varios samples elijo el
    // MENOS amontonado) para que no se formen tiras largas; pero una fracción SPREAD_BIAS se coloca al
    // PURO AZAR, así de vez en cuando caen un par pegadas (sin volver a los clusters grandes del .py).
    const SPREAD_BIAS = 0.4;                                                      // 0 = todo blue-noise (muy parejo) · 1 = todo azar (más clusters)
    let placed = 0, guard = 0;
    while (placed < MINES_COUNT && guard++ < 100000) {
      let pick = null;
      if (Math.random() < SPREAD_BIAS) {                                          // azar: permite adyacencias ocasionales
        const c = candidates[ri(0, candidates.length - 1)];
        if (!c.isMine) pick = c;
      } else {                                                                    // blue-noise suave: el menos amontonado de 4 samples
        let bestScore = 99;
        for (let i = 0; i < 4; i++) {
          const c = candidates[ri(0, candidates.length - 1)];
          if (c.isMine) continue;
          const score = neighborMineCount(c);
          if (score < bestScore) { pick = c; bestScore = score; if (score === 0) break; }
        }
      }
      if (pick && !pick.isMine) { pick.isMine = true; placed++; }
    }
    if (mode === 'gold') placeGold();
    calculateAdjacency();                                                        // tras el oro: cuenta minas Y oro adyacentes
    gridReady = true;
  }

  // Esparce GOLD_COUNT pepitas en celdas sin mina (Fisher-Yates parcial). El oro puede caer en celdas
  // numeradas: al renderizar mostramos la moneda y el número chiquito en la esquina, así no se pierde
  // la info de minas.
  function placeGold() {
    const cells = [];
    for (const row of grid) for (const t of row) if (!t.isMine) cells.push(t);
    for (let i = cells.length - 1; i > 0; i--) { const j = ri(0, i); const tmp = cells[i]; cells[i] = cells[j]; cells[j] = tmp; }
    const n = Math.min(GOLD_COUNT, cells.length);
    for (let i = 0; i < n; i++) cells[i].isGold = true;
  }

  function calculateAdjacency() {
    for (const row of grid)
      for (const t of row) {
        let m = 0, g = 0;
        for (const nb of neighbors(t)) { if (nb === t) continue; if (nb.isMine) m++; if (nb.isGold) g++; }
        t.adjacent = m;
        t.adjacentGold = g;
      }
  }

  // ¿hay oro SIN recoger en una celda vecina? (una pepita se recoge al revelar su celda). El "!" usa esto,
  // así se va desvaneciendo del mapa a medida que juntás las monedas.
  function goldPendingNear(t) {
    for (const nb of neighbors(t)) if (nb !== t && nb.isGold && !nb.isRevealed) return true;
    return false;
  }

  // destape con cascada (BFS): los 0 expanden a sus vecinos y el revealAt escalonado da el efecto de onda
  let revealSeq = 0;
  const CASCADE_MS = 14;
  function digFlood(start, now) {
    const queue = [start], queued = new Set([start]);
    while (queue.length) {
      const t = queue.shift();
      if (t.isFlagged || t.isRevealed) continue;
      t.isRevealed = true; t.revealAt = now + Math.min(revealSeq, 60) * CASCADE_MS; revealSeq++;
      revealedCount++;
      if (t.isGold) { goldCollected++; t.goldAt = t.revealAt; }                  // juntar pepita al destaparla
      if (t.adjacent === 0 && !t.isMine)
        for (const nb of neighbors(t))
          if (!nb.isRevealed && !nb.isFlagged && !nb.isGold && !queued.has(nb)) { queued.add(nb); queue.push(nb); }  // el oro NO se auto-destapa: hay que cavarlo
    }
  }
  function mineTotal() { let n = 0; for (const row of grid) for (const t of row) if (t.isMine) n++; return n; }
  function flagCount() { let n = 0; for (const row of grid) for (const t of row) if (t.isFlagged && !t.isRevealed) n++; return n; }

  function checkVictory() {
    const won = mode === 'gold'
      ? (GOLD_COUNT > 0 && goldCollected >= GOLD_COUNT)                          // bonus: ganás al juntar todas las pepitas
      : (revealedCount === GRID_WIDTH * GRID_HEIGHT - mineTotal());              // clásico: destapar todo lo que no es mina
    if (won) {
      victory = true; endReason = 'win'; endAt = nowMs();
      timerRunning = false; timerEnd = endAt;
      if (mode === 'gold') {                                                      // la mitad de los segundos que sobran se suman al puntaje
        const remainSec = Math.max(0, Math.ceil((goldTimeMs - (timerEnd - timerStart)) / 1000));
        bonusPts = Math.floor(remainSec / 2);
        if (bonusPts > 0) startCoinFx();                                          // el tiempo restante vuela como monedas al centro
      }
      for (const row of grid) for (const t of row) if (t.isMine) t.isFlagged = true;  // planta banderas en todas las minas
      if (mode === 'gold') commitScore();
      sndWin();
    }
  }

  // Puntaje final del modo oro = pepitas×mult (+ bonus si juntaste todo). Guarda récord por dificultad.
  // El multiplicador SÓLO cuenta si completás el nivel; si no, te llevás las pepitas crudas (×1).
  function goldScore() { return endReason === 'win' ? (goldCollected * goldMult + bonusPts) : goldCollected; }
  function commitScore() {
    const score = goldScore();
    const key = 'msw.gold.rec.' + DIFFS[diffIndex].key;
    let prev = 0;
    try { prev = parseInt(localStorage.getItem(key) || '0', 10) || 0; } catch (_) {}
    if (score > prev) { isNewRecord = true; lastRecord = score; try { localStorage.setItem(key, String(score)); } catch (_) {} }
    else { isNewRecord = false; lastRecord = prev; }
  }
  function recordLine() { return isNewRecord ? ('¡Nuevo récord! ' + lastRecord) : ('Récord ' + DIFFS[diffIndex].key + ': ' + lastRecord); }

  function processClick(gx, gy, rightClick) {
    if (gameOver || victory) return;
    if (gx < 0 || gx >= GRID_WIDTH || gy < 0 || gy >= GRID_HEIGHT) return;
    const t = grid[gy][gx];
    const now = nowMs();
    if (!gridReady) placeMines(t);                                              // 1er click (izq O der) coloca minas
    if (rightClick) {
      if (!t.isRevealed) { t.isFlagged = !t.isFlagged; t.flagAt = now; t.isFlagged ? sndFlag() : sndUnflag(); }
    } else {
      if (t.isRevealed || t.isFlagged) return;
      if (!timerStart) { timerStart = now; timerEnd = now; timerRunning = true; }  // arranca con la 1ª celda destapada
      if (t.isMine) {
        t.isRevealed = true; t.revealAt = now; explodedTile = t;
        gameOver = true; endReason = 'mine'; endAt = now;
        timerRunning = false; timerEnd = now;
        let k = 0;
        for (const row of grid) for (const mt of row) if (mt.isMine && !mt.isRevealed) { mt.isRevealed = true; mt.revealAt = now + (k++ % 12) * 35; }
        if (mode === 'gold') commitScore();
        sndBoom();
      } else {
        const before = goldCollected;
        revealSeq = 0; digFlood(t, now);
        const gained = goldCollected - before;
        if (gained > 0) sndCoin(gained); else sndReveal();                        // moneda si junté oro, click si no
        checkVictory();
      }
    }
    updateStatus();
  }

  // ════════════════ RENDER ════════════════
  const COVER_MS = 150;
  function pathRound(x, y, w, h, r) {
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, w, h, r);
    else { ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }
  }

  function drawMine(cx, cy, r, exploded) {
    if (exploded) { ctx.fillStyle = '#e8413a'; pathRound(cx - r * 1.7, cy - r * 1.7, r * 3.4, r * 3.4, r * 0.5); ctx.fill(); }
    ctx.fillStyle = '#2c2c2c';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#2c2c2c'; ctx.lineWidth = Math.max(1.5, r * 0.22); ctx.lineCap = 'round';
    for (let i = 0; i < 8; i++) {
      const a = i * TAU / 8, ca = Math.cos(a), sa = Math.sin(a);
      ctx.beginPath(); ctx.moveTo(cx + ca * r * 0.9, cy + sa * r * 0.9); ctx.lineTo(cx + ca * r * 1.5, cy + sa * r * 1.5); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath(); ctx.arc(cx - r * 0.32, cy - r * 0.32, r * 0.28, 0, TAU); ctx.fill();
  }
  function drawFlag(cx, cy, r) {
    const poleX = cx - r * 0.32;
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(cx - r * 0.6, cy + r * 0.72, r * 1.2, r * 0.3);                  // base
    ctx.fillRect(cx - r * 0.28, cy + r * 0.5, r * 0.56, r * 0.26);               // base superior
    ctx.fillRect(poleX, cy - r, r * 0.16, r * 1.7);                              // mástil
    ctx.fillStyle = '#e8413a';
    ctx.beginPath();
    ctx.moveTo(poleX + r * 0.16, cy - r * 0.95);
    ctx.lineTo(poleX + r * 0.16 + r * 0.95, cy - r * 0.52);
    ctx.lineTo(poleX + r * 0.16, cy - r * 0.08);
    ctx.closePath(); ctx.fill();
  }
  function drawWrongX(cx, cy, r) {
    ctx.strokeStyle = '#c62828'; ctx.lineWidth = Math.max(2, r * 0.22); ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.55, cy - r * 0.55); ctx.lineTo(cx + r * 0.55, cy + r * 0.55);
    ctx.moveTo(cx + r * 0.55, cy - r * 0.55); ctx.lineTo(cx - r * 0.55, cy + r * 0.55);
    ctx.stroke();
  }
  const GOLD_POP = 380, GOLD_FX = 650;
  // La MONEDA se dibuja con su celda (puede taparla una vecina, no importa). El EFECTO (halo/anillo/
  // chispas) se dibuja aparte en una pasada final, por encima de todo, así no lo tapan las celdas vecinas.
  function drawGoldCoin(cx, cy, r, t, now) {
    const age = t.goldAt ? (now - t.goldAt) : 1e9;
    const sc = age < GOLD_POP ? (0.2 + 0.8 * easeOutBack(age / GOLD_POP)) : 1;   // "pop" con rebote al aparecer
    const rr = r * sc;
    const grad = ctx.createRadialGradient(cx - rr * 0.32, cy - rr * 0.34, rr * 0.1, cx, cy, rr);
    grad.addColorStop(0, '#fff6c4'); grad.addColorStop(0.5, '#ffd23f'); grad.addColorStop(1, '#e09b00');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, rr, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#a9760a'; ctx.lineWidth = Math.max(1, rr * 0.14); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = Math.max(1, rr * 0.1);
    ctx.beginPath(); ctx.arc(cx, cy, rr * 0.6, Math.PI * 1.05, Math.PI * 1.65); ctx.stroke();   // arito interno
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(cx - rr * 0.32, cy - rr * 0.34, rr * 0.2, 0, TAU); ctx.fill();      // hotspot
  }
  function drawGoldFx(cx, cy, r, t, now) {
    const age = now - t.goldAt;
    if (age < 0 || age >= GOLD_FX) return;
    const fp = age / GOLD_FX, a = 1 - fp;
    // halo dorado
    const gr = r * (1.4 + 1.3 * fp);
    const halo = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, gr);
    halo.addColorStop(0, 'rgba(255,221,90,' + (0.5 * a).toFixed(3) + ')');
    halo.addColorStop(1, 'rgba(255,221,90,0)');
    ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(cx, cy, gr, 0, TAU); ctx.fill();
    // anillo expansivo + chispas
    ctx.save();
    ctx.globalAlpha = a;
    ctx.strokeStyle = '#fff7cc'; ctx.lineWidth = Math.max(1.5, r * 0.16 * a);
    ctx.beginPath(); ctx.arc(cx, cy, r * (1.0 + fp * 1.9), 0, TAU); ctx.stroke();
    for (let i = 0; i < 8; i++) {
      const ang = i * TAU / 8 + 0.35, dist = r * (0.7 + fp * 2.8);
      const sx = cx + Math.cos(ang) * dist, sy = cy + Math.sin(ang) * dist, sr = r * 0.18 * a;
      ctx.fillStyle = (i & 1) ? '#fff3b0' : '#ffd23f';
      ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.5, sr), 0, TAU); ctx.fill();
    }
    ctx.restore();
  }

  // En modo oro: si se agota la cuenta regresiva, termina la partida con lo que se haya juntado.
  function checkTime() {
    if (mode !== 'gold' || !timerRunning) return;
    if (nowMs() - timerStart >= goldTimeMs) {
      timerRunning = false; timerEnd = timerStart + goldTimeMs;
      gameOver = true; endReason = 'time'; endAt = nowMs(); explodedTile = null;
      for (const row of grid) for (const mt of row) if (mt.isMine && !mt.isRevealed) { mt.isRevealed = true; mt.revealAt = nowMs(); }
      commitScore();
      sndTime();
    }
  }

  function render(now) {
    checkTime();
    updateTimer();
    // fondo
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, BG0); g.addColorStop(1, BG1);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // marco del tablero con sombra
    const pad = Math.round(tile * 0.16);
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = tile * 0.5; ctx.shadowOffsetY = tile * 0.12;
    ctx.fillStyle = FRAME;
    pathRound(offX - pad, offY - pad, boardW + pad * 2, boardH + pad * 2, tile * 0.4);
    ctx.fill();
    ctx.restore();

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const r = tile * 0.26;

    for (const row of grid) for (const t of row) {
      const px = offX + t.gx * tile, py = offY + t.gy * tile;
      const cx = px + tile / 2, cy = py + tile / 2;
      const parity = (t.gx + t.gy) & 1;

      // base de tierra (lo que queda al destapar) + sombra interior arriba/izq = sensación de "cavado"
      ctx.fillStyle = parity ? DIRT_D : DIRT_L;
      ctx.fillRect(px, py, tile, tile);
      ctx.fillStyle = 'rgba(120,72,30,0.12)';
      ctx.fillRect(px, py, tile, Math.max(1, tile * 0.08));                        // borde superior hundido
      ctx.fillRect(px, py, Math.max(1, tile * 0.08), tile);                        // borde izquierdo hundido
      ctx.strokeStyle = 'rgba(90,55,20,0.12)'; ctx.lineWidth = 1;
      ctx.strokeRect(px + 0.5, py + 0.5, tile - 1, tile - 1);                      // separa celdas de tierra

      // contenido (visible al levantarse la tapa)
      if (t.isRevealed) {
        if (t.isMine) {
          if (t.isFlagged && (gameOver || victory)) drawFlag(cx, cy, tile * 0.3);  // mina bien marcada
          else drawMine(cx, cy, r, t === explodedTile);
        } else {
          // la moneda NO se dibuja acá: al revelarla se "agarra" (pop + onda + sube y se desvanece) en la pasada de efectos
          if (t.adjacent > 0) {                                                    // número de MINAS, centrado (default)
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.28)'; ctx.shadowBlur = tile * 0.05; ctx.shadowOffsetY = tile * 0.03;
            ctx.fillStyle = NUMBER_COLORS[t.adjacent];
            ctx.font = '800 ' + Math.round(tile * 0.64) + "px 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif";
            ctx.fillText(String(t.adjacent), cx, cy + tile * 0.05);
            ctx.restore();
          }
          // indicador de ORO sin recoger cerca: "!" dorado en la esquina sup-der. Dinámico: desaparece al juntar las pepitas vecinas.
          if (goldPendingNear(t)) {
            ctx.save();
            ctx.font = '900 ' + Math.round(tile * 0.24) + "px 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif";
            ctx.lineWidth = Math.max(1.5, tile * 0.03); ctx.strokeStyle = '#7a5300'; ctx.lineJoin = 'round';
            ctx.strokeText('!', px + tile * 0.86, py + tile * 0.18);
            ctx.fillStyle = '#ffce2e';
            ctx.fillText('!', px + tile * 0.86, py + tile * 0.18);
            ctx.restore();
          }
        }
      }

      // tapa de césped (animada al destapar)
      let amt = 1;
      if (t.isRevealed) {
        const p = Math.min(1, (now - t.revealAt) / COVER_MS);
        if (p >= 1) amt = 0; else amt = 1 - easeOut(Math.max(0, p));
      }
      if (amt > 0.001) {
        const s = tile * amt, x = cx - s / 2, y = cy - s / 2;
        ctx.globalAlpha = Math.min(1, amt * 1.6);
        ctx.fillStyle = parity ? GRASS_D : GRASS_L;
        ctx.fillRect(x, y, s, s);
        ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.fillRect(x, y, s, s * 0.16);          // brillo superior (bisel)
        ctx.fillStyle = 'rgba(0,0,0,0.12)';       ctx.fillRect(x, y + s * 0.84, s, s * 0.16); // sombra inferior
        ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, s - 1, s - 1);                                       // separa los cuadros de césped
        ctx.globalAlpha = 1;
        // bandera (sólo en celdas tapadas) con pop al plantarla
        if (t.isFlagged && !t.isRevealed) {
          let fr = tile * 0.3;
          if (t.flagAt) { const fp = Math.min(1, (now - t.flagAt) / 160); fr *= 0.55 + 0.45 * easeOutBack(fp); }
          drawFlag(cx, cy, fr);
        }
        if (gameOver && t.isFlagged && !t.isMine && !t.isRevealed) drawWrongX(cx, cy, tile * 0.3);
      }
    }

    // "agarre" de la pepita POR ENCIMA de todas las celdas: onda expansiva + moneda que sube y se desvanece.
    for (const row of grid) for (const t of row) {
      if (!(t.isGold && t.isRevealed && t.goldAt)) continue;
      const age = now - t.goldAt;
      if (age < 0 || age >= GOLD_FX) continue;                                    // tras el efecto, la moneda queda recogida (no se dibuja)
      const cx = offX + t.gx * tile + tile / 2, cy = offY + t.gy * tile + tile / 2;
      const p = age / GOLD_FX;
      drawGoldFx(cx, cy, r * 1.08, t, now);                                       // halo + onda expansiva + chispas
      const rise = tile * 0.5 * easeOut(p);                                       // sube "como si la agarrara"
      const alpha = p < 0.55 ? 1 : Math.max(0, 1 - (p - 0.55) / 0.45);            // se desvanece en el último tramo
      ctx.save();
      ctx.globalAlpha = alpha;
      drawGoldCoin(cx, cy - rise, r * 1.08, t, now);                              // pop (lo aplica drawGoldCoin por goldAt) + offset hacia arriba
      ctx.restore();
    }

    if (gameOver) {
      const goldTitle = endReason === 'time' ? '¡Tiempo!' : '¡Boom!';
      drawBanner(mode === 'gold' ? goldTitle : '¡Perdiste!', endReason === 'time' ? '#ffb300' : '#e8413a', now,
                 mode === 'gold' ? ('Oro juntado: ' + goldCollected + '/' + GOLD_COUNT) : null,
                 mode === 'gold' ? recordLine() : null);
    } else if (victory) {
      drawBanner(mode === 'gold' ? '¡Oro!' : '¡Ganaste!', mode === 'gold' ? '#ffcf33' : '#43a047', now,
                 null,
                 mode === 'gold' ? recordLine() : null,
                 mode === 'gold',                                                 // gold-win: línea "Oro {base} ^×mult + bonus" con medallón
                 true);                                                           // 😎 carita con lentes coronando el cartel
    }

    drawCoinFx(now);                                                             // monedas del tiempo restante volando al centro (por encima del cartel)

    requestAnimationFrame(render);
  }

  // El bonus de tiempo "se materializa": al completar, salen monedas del cronómetro y vuelan al centro.
  function startCoinFx() {
    coinFx = []; coinFxStart = nowMs(); coinTickN = 0;
    const tr = timerEl.getBoundingClientRect(), cr = canvas.getBoundingClientRect();
    const sx = tr.left + tr.width / 2 - cr.left, sy = tr.top + tr.height / 2 - cr.top;
    const N = Math.min(bonusPts, 14);                                            // tope visual de monedas (el bonus puede ser mayor)
    for (let i = 0; i < N; i++)
      coinFx.push({ sx: sx + (Math.random() * 16 - 8), sy: sy + (Math.random() * 10 - 5), delay: i * 85, landed: false });
  }
  function coinTick() { tone(720 + Math.min(coinTickN, 18) * 45, 0.07, 'triangle', 0.10); coinTickN++; }
  function drawCoinFx(now) {
    if (!coinFx.length) return;
    const tx = W / 2, ty = H / 2 - tile * 0.1, DUR = 780;
    for (const c of coinFx) {
      const t = now - coinFxStart - c.delay;
      if (t < 0) continue;
      const p = Math.min(1, t / DUR), e = easeOut(p);
      const x = c.sx + (tx - c.sx) * e;
      const y = c.sy + (ty - c.sy) * e - Math.sin(p * Math.PI) * tile * 0.7;      // arco hacia arriba
      drawGoldCoin(x, y, tile * 0.17, { goldAt: 0 }, now);
      if (p >= 1 && !c.landed) { c.landed = true; coinTick(); }
    }
    if (now - coinFxStart > DUR + (coinFx.length - 1) * 85 + 220) coinFx = [];    // limpiar cuando todas aterrizaron
  }

  // Medallón dorado del multiplicador (mismo look que el del botón), para usar como "potencia" del oro base.
  function drawMultMedallion(cx, cy, r, txt) {
    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(-0.21);
    const w = r * 2.7, h = r * 1.8;
    const g = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
    g.addColorStop(0, '#ffe98a'); g.addColorStop(0.55, '#ffce2e'); g.addColorStop(1, '#e0a200');
    ctx.fillStyle = g;
    pathRound(-w / 2, -h / 2, w, h, h * 0.5); ctx.fill();
    ctx.lineWidth = Math.max(1, r * 0.2); ctx.strokeStyle = '#8a5e00'; ctx.stroke();
    ctx.fillStyle = '#5a3d00';
    ctx.font = '900 ' + Math.round(r * 1.5) + "px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(txt, 0, r * 0.05);
    ctx.restore();
  }
  // Línea "{base} ^(×mult) + {bonus} = {total} 🪙": oro base, multiplicador como potencia (oculto en ×1), total y moneda.
  function goldWinSegs() {
    const showMult = goldMult > 1;
    return { base: String(GOLD_COUNT), b: ' + ' + bonusPts + ' = ' + (GOLD_COUNT * goldMult + bonusPts),
             mult: goldMult, showMult, medW: showMult ? tile * 0.66 : 0, coinW: tile * 0.46 };
  }
  function goldWinWidth(fSmall) { const s = goldWinSegs(); ctx.font = fSmall; return ctx.measureText(s.base).width + s.medW + ctx.measureText(s.b).width + s.coinW; }
  function drawGoldWinLine(y, fSmall) {
    const s = goldWinSegs(), f = Math.round(tile * 0.34);
    ctx.font = fSmall; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    const wbase = ctx.measureText(s.base).width, wb = ctx.measureText(s.b).width;
    let x = -(wbase + s.medW + wb + s.coinW) / 2;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(s.base, x, y); x += wbase;
    if (s.showMult) { drawMultMedallion(x + s.medW * 0.5, y - f * 0.5, tile * 0.2, '×' + s.mult); x += s.medW; }  // medallón potencia (no en Fácil)
    ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = fSmall;
    ctx.fillText(s.b, x, y); x += wb;
    drawGoldCoin(x + s.coinW * 0.5, y, tile * 0.16, { goldAt: 0 }, 0);            // monedita junto al total
    ctx.textAlign = 'center';
  }

  // Carita con lentes de sol (vector, cross-platform) para coronar el cartel de victoria.
  function drawCoolFace(cx, cy, r) {
    const g = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.32, r * 0.2, cx, cy, r);
    g.addColorStop(0, '#ffe45c'); g.addColorStop(1, '#f5b400');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.fill();
    ctx.lineWidth = Math.max(1, r * 0.06); ctx.strokeStyle = 'rgba(120,80,0,0.4)'; ctx.stroke();
    // lentes
    const lw = r * 0.55, lh = r * 0.4, gap = r * 0.14, ly = cy - r * 0.06;
    ctx.fillStyle = '#1a1a1a';
    pathRound(cx - gap / 2 - lw, ly - lh / 2, lw, lh, r * 0.12); ctx.fill();
    pathRound(cx + gap / 2, ly - lh / 2, lw, lh, r * 0.12); ctx.fill();
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = Math.max(2, r * 0.1); ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - gap / 2, ly - lh * 0.18); ctx.lineTo(cx + gap / 2, ly - lh * 0.18);              // puente
    ctx.moveTo(cx - gap / 2 - lw, ly - lh * 0.18); ctx.lineTo(cx - r * 0.95, cy - r * 0.32);          // patilla izq
    ctx.moveTo(cx + gap / 2 + lw, ly - lh * 0.18); ctx.lineTo(cx + r * 0.95, cy - r * 0.32);          // patilla der
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';                                                          // brillito en AMBOS lentes
    ctx.beginPath(); ctx.arc(cx - gap / 2 - lw * 0.7, ly - lh * 0.12, r * 0.07, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + gap / 2 + lw * 0.3, ly - lh * 0.12, r * 0.07, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#7a4e00'; ctx.lineWidth = Math.max(2, r * 0.1); ctx.lineCap = 'round';         // sonrisa
    ctx.beginPath(); ctx.arc(cx, cy + r * 0.2, r * 0.5, 0.12 * Math.PI, 0.88 * Math.PI); ctx.stroke();
  }

  function drawBanner(text, color, now, subtitle, extra, goldWin, face) {
    const p = Math.min(1, (now - endAt) / 350);
    const scale = 0.7 + 0.3 * easeOutBack(p);
    const sub = subtitle || 'tocá ↻ para jugar de nuevo';
    const fTitle = '800 ' + Math.round(tile * 1.0) + "px 'Segoe UI', system-ui, sans-serif";
    const fSmall = '600 ' + Math.round(tile * 0.34) + "px 'Segoe UI', system-ui, sans-serif";
    ctx.save();
    ctx.globalAlpha = p;
    ctx.translate(W / 2, H / 2);
    ctx.scale(scale, scale);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // ancho del cartel = la línea más larga
    ctx.font = fTitle; let bw = ctx.measureText(text).width;
    const subW = goldWin ? goldWinWidth(fSmall) : (ctx.font = fSmall, ctx.measureText(sub).width);
    ctx.font = fSmall; bw = Math.max(bw, subW, extra ? ctx.measureText(extra).width : 0);
    bw += tile * 1.1;
    const bh = extra ? tile * 2.7 : tile * 2.0;
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    pathRound(-bw / 2, -bh / 2, bw, bh, tile * 0.35); ctx.fill();
    ctx.fillStyle = color; ctx.font = fTitle;
    ctx.fillText(text, 0, extra ? -tile * 0.6 : -tile * 0.28);
    const subY = extra ? tile * 0.2 : tile * 0.55;
    if (goldWin) {
      drawGoldWinLine(subY, fSmall);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = fSmall;
      ctx.fillText(sub, 0, subY);
    }
    if (extra) {                                                                  // línea de récord (dorada si es nuevo)
      ctx.fillStyle = isNewRecord ? '#ffd23f' : 'rgba(255,255,255,0.55)';
      ctx.font = (isNewRecord ? '800 ' : '600 ') + Math.round(tile * 0.32) + "px 'Segoe UI', system-ui, sans-serif";
      ctx.fillText(extra, 0, tile * 0.78);
    }
    if (face) drawCoolFace(0, -bh / 2 - tile * 0.32, tile * 0.46);                // 😎 coronando el cartel (cara más chica)
    ctx.restore();
  }

  // === STATUS === (minas restantes en clásico · oro juntado en modo oro)
  const statusIconEl = document.getElementById('statusIcon');
  const statusCountEl = document.getElementById('statusCount');
  const ICON_MINE = '<svg viewBox="0 0 24 24" fill="rgb(232,65,58)"><circle cx="11" cy="14" r="7"/><rect x="10" y="3" width="2" height="5"/><path d="M12 5l4-2" stroke="rgb(232,65,58)" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';
  const ICON_COIN = '<svg viewBox="0 0 24 24" fill="#ffd23f"><circle cx="12" cy="12" r="8" stroke="#caa000" stroke-width="1.5"/><circle cx="12" cy="12" r="4" fill="none" stroke="#caa000" stroke-width="1.3"/></svg>';
  function updateStatus() {
    if (mode === 'gold') { statusIconEl.innerHTML = ICON_COIN; statusCountEl.textContent = goldCollected + '/' + GOLD_COUNT; }
    else                 { statusIconEl.innerHTML = ICON_MINE; statusCountEl.textContent = String(MINES_COUNT - flagCount()); }
  }

  // === CRONÓMETRO === (sube en clásico · cuenta regresiva en modo oro)
  const timerTextEl = document.getElementById('timerText');
  const TIMER_COLOR = 'rgba(255,255,255,0.5)';
  function updateTimer() {
    let ms, s;
    if (mode === 'gold') {
      const elapsed = timerStart ? ((timerRunning ? nowMs() : timerEnd) - timerStart) : 0;
      ms = Math.max(0, goldTimeMs - elapsed);                                     // tiempo restante
      s = Math.ceil(ms / 1000);
      timerEl.style.color = (timerStart && timerRunning && ms <= 10000) ? '#ff5a5a' : TIMER_COLOR;  // últimos 10 s en rojo
    } else {
      ms = timerStart ? ((timerRunning ? nowMs() : timerEnd) - timerStart) : 0;
      s = Math.floor(ms / 1000);
      timerEl.style.color = TIMER_COLOR;
    }
    timerTextEl.textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  // ════════════════ SONIDO (WebAudio sintetizado) ════════════════
  let actx = null, muted = false;
  function audioOn() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
  }
  function tone(freq, dur, type, gain, slideTo, delay) {
    if (!actx || muted) return;
    const t0 = actx.currentTime + (delay || 0);
    const o = actx.createOscillator(); o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g).connect(actx.destination); o.start(t0); o.stop(t0 + dur + 0.03);
  }
  function noiseBurst(dur, gain, fStart, fEnd) {
    if (!actx || muted) return;
    const t0 = actx.currentTime;
    const n = Math.floor(actx.sampleRate * dur);
    const buf = actx.createBuffer(1, n, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = actx.createBufferSource(); src.buffer = buf;
    const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(fStart, t0); lp.frequency.exponentialRampToValueAtTime(fEnd, t0 + dur);
    const g = actx.createGain(); g.gain.setValueAtTime(gain, t0); g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(lp).connect(g).connect(actx.destination); src.start(t0); src.stop(t0 + dur);
  }
  const sndReveal = () => { tone(360, 0.08, 'triangle', 0.10); tone(540, 0.06, 'sine', 0.05, null, 0.01); };
  const sndFlag   = () => { tone(680, 0.05, 'square', 0.08); tone(1020, 0.05, 'square', 0.05, null, 0.02); };
  const sndUnflag = () => { tone(420, 0.05, 'square', 0.07); };
  const sndBoom   = () => { noiseBurst(0.5, 0.5, 1400, 60); tone(150, 0.5, 'sine', 0.45, 38); };
  const sndWin    = () => { [523, 659, 784, 1047, 1319].forEach((f, i) => tone(f, 0.28, 'triangle', 0.16, null, i * 0.1)); };
  const sndTime   = () => { tone(440, 0.2, 'sawtooth', 0.18, 240); tone(240, 0.34, 'sawtooth', 0.18, 120, 0.14); };  // "se acabó el tiempo"
  const sndCoin   = (n) => { tone(880, 0.10, 'triangle', 0.14); tone(1320, 0.12, 'triangle', 0.12, null, 0.05); if (n > 2) tone(1760, 0.14, 'triangle', 0.10, null, 0.10); };  // moneda (arpegio si junté varias)

  // === INPUT (canvas) ===
  const LONG_MS = 230;
  const MOVE_TOL = () => tile * 0.6;
  let pressId = null, pressTile = null, pressX = 0, pressY = 0, longFired = false, pressTimer = null;

  function tileAt(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return { gx: Math.floor((clientX - rect.left - offX) / tile), gy: Math.floor((clientY - rect.top - offY) / tile) };
  }
  function tapAt(clientX, clientY) {
    // tocar el banner de fin = reiniciar
    if (gameOver || victory) { reset(); return true; }
    return false;
  }

  canvas.addEventListener('pointerdown', e => {
    audioOn();
    if (tapAt(e.clientX, e.clientY)) return;
    if (e.button === 2) {                                                       // click derecho (desktop) → bandera
      e.preventDefault();
      const { gx, gy } = tileAt(e.clientX, e.clientY);
      processClick(gx, gy, true);
      return;
    }
    if (pressId !== null) return;
    pressId = e.pointerId; longFired = false;
    pressX = e.clientX; pressY = e.clientY;
    pressTile = tileAt(e.clientX, e.clientY);
    canvas.setPointerCapture(e.pointerId);
    pressTimer = setTimeout(() => { longFired = true; processClick(pressTile.gx, pressTile.gy, true); }, LONG_MS);
  });
  canvas.addEventListener('pointermove', e => {
    if (e.pointerId !== pressId) return;
    if (Math.abs(e.clientX - pressX) > MOVE_TOL() || Math.abs(e.clientY - pressY) > MOVE_TOL()) {
      clearTimeout(pressTimer); pressTimer = null; pressId = null;
    }
  });
  function endPress(e) {
    if (e.pointerId !== pressId) return;
    clearTimeout(pressTimer); pressTimer = null; pressId = null;
    if (longFired) return;
    const { gx, gy } = tileAt(e.clientX, e.clientY);
    if (gx === pressTile.gx && gy === pressTile.gy) processClick(gx, gy, false);
  }
  canvas.addEventListener('pointerup', endPress);
  canvas.addEventListener('pointercancel', e => { if (e.pointerId === pressId) { clearTimeout(pressTimer); pressId = null; } });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // === BOTONES ===
  const btnDiff = document.getElementById('btnDiff');
  function applyDiff() {
    const d = DIFFS[diffIndex];
    GRID_WIDTH = d.cols; GRID_HEIGHT = d.rows;
    if (mode === 'gold') {                                                        // bonus: pocas minas + pepitas de oro, contrarreloj
      MINES_COUNT = Math.max(4, Math.round(d.mines * 0.4));
      GOLD_COUNT  = d.gold;
      goldTimeMs  = d.secs * 1000;
      goldMult    = d.mult;
    } else {
      MINES_COUNT = d.mines;
      GOLD_COUNT  = 0;
      goldTimeMs  = 0;
      goldMult    = 1;
    }
    document.getElementById('diffKey').textContent = '★'.repeat(diffIndex + 1);   // dificultad como estrellas (1/2/3)
    document.getElementById('diffMult').textContent = mode === 'gold' ? ('×' + d.mult) : '';   // badge esquina sup-der (sólo en oro)
    btnDiff.title = 'Dificultad: ' + d.name + (mode === 'gold' ? ' · oro ×' + d.mult : '');
    reset(); resize();
  }
  btnDiff.addEventListener('pointerdown', e => { e.preventDefault(); audioOn(); diffIndex = (diffIndex + 1) % DIFFS.length; applyDiff(); });

  // === MODO (Clásico / Fiebre del Oro) ===
  const MODE_ICON = {
    classic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="13.5" r="7.5"/><path d="M17.5 8.5l1.7-1.7a2.2 2.2 0 0 0 0-3.1l-1.4-1.4a2.2 2.2 0 0 0-3.1 0L13 4"/><path d="M21.5 2.5l-1.3 1.3"/></svg>',
    gold:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 7.3v9.4M14.4 9.2c0-1-1.1-1.7-2.4-1.7s-2.4.7-2.4 1.7 1.1 1.5 2.4 1.5 2.4.6 2.4 1.6-1.1 1.7-2.4 1.7-2.4-.7-2.4-1.7"/></svg>',
  };
  const btnMode = document.getElementById('btnMode');
  function refreshMode() {
    btnMode.innerHTML = MODE_ICON[mode];
    btnMode.classList.toggle('on', mode === 'gold');
    btnMode.title = mode === 'gold' ? 'Modo: Fiebre del Oro' : 'Modo: Clásico';
    showHint(mode === 'gold' ? 'Fiebre del oro contrarreloj · cavá donde haya "!" · esquivá las minas'
                             : 'tocá para descubrir · mantené apretado para poner bandera');
  }
  btnMode.addEventListener('pointerdown', e => { e.preventDefault(); audioOn(); mode = (mode === 'classic') ? 'gold' : 'classic'; refreshMode(); applyDiff(); });

  const SOUND_ICON = {
    on:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 9a3 3 0 0 1 0 6"/><path d="M18.5 6.5a7 7 0 0 1 0 11"/></svg>',
    off: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M22 9l-6 6M16 9l6 6"/></svg>',
  };
  const btnSound = document.getElementById('btnSound');
  function refreshSound() { btnSound.innerHTML = muted ? SOUND_ICON.off : SOUND_ICON.on; btnSound.classList.toggle('on', !muted); }
  btnSound.addEventListener('pointerdown', e => { e.preventDefault(); audioOn(); muted = !muted; refreshSound(); });

  document.getElementById('btnReset').addEventListener('pointerdown', e => { e.preventDefault(); audioOn(); reset(); });
  window.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') reset();
    // if (e.key === 'w' || e.key === 'W') autoWin();                            // DEBUG desactivado — descomentar para autowin
  });

  // DEBUG — autowin: arma el tablero, marca todo como completado y dispara la victoria (con bonus de tiempo).
  function autoWin() {
    audioOn();
    reset();
    placeMines(grid[0][0]);                                                      // coloca minas + oro (1ª celda como semilla)
    for (const row of grid) for (const t of row) if (!t.isMine) { t.isRevealed = true; t.revealAt = nowMs(); if (t.isGold) t.goldAt = nowMs(); }
    if (mode === 'gold') goldCollected = GOLD_COUNT;
    else revealedCount = GRID_WIDTH * GRID_HEIGHT - mineTotal();
    timerStart = nowMs() - (goldTimeMs || 90000) * 0.6; timerEnd = nowMs(); timerRunning = true;  // ~40% de tiempo restante → bonus
    updateStatus();
    checkVictory();
  }

  // === INIT ===
  refreshSound();
  refreshMode();                                                                 // icono de modo + hint inicial
  applyDiff();                                                                   // setea grid + label + reset + resize
  requestAnimationFrame(render);

  canvas.addEventListener('pointerdown', () => hint.style.opacity = '0', { once: true });
  </script>

  <!-- Shell del Arcade (exit + fullscreen + lock de orientación). data-orient: landscape/portrait/any. -->
  <script src="../../Arcade/arcade-shell.js" data-orient="portrait"></script>

  <div id="fpsOverlay">FPS: --</div>
  <script>
    (function() {
      let frameCount = 0, lastT = performance.now();
      const overlay = document.getElementById('fpsOverlay');
      function loop() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          const fps = Math.round(frameCount * 1000 / (now - lastT));
          if (overlay.style.display !== 'none') overlay.textContent = 'FPS: ' + fps;
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(loop);
      }
      loop();
      const btn = document.getElementById('btnInfo');
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        // El overlay arranca con display:none POR CSS — el style inline está vacío "", así que
        // comparamos con === 'block' (estado visible explícito) en vez de !== 'none' (que daba true
        // al inicio y se comía el primer tap).
        const showing = overlay.style.display === 'block';
        overlay.style.display = showing ? 'none' : 'block';
        btn.classList.toggle('on', !showing);
      });
    })();
  </script>
