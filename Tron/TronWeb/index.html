<!DOCTYPE html>
<html lang="es">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root { --bar-height: 66px; }                                                  /* tweak to taste */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Orbitron', 'Segoe UI', system-ui, sans-serif;
  }
  /* El canvas ocupa sólo el área SOBRE la barra; ahí vive la pista (la grilla de colisiones se
     dimensiona a este rect). Tamaños seteados explícito desde JS en cada resize. */
  #c {
    display: block; position: absolute;
    top: 0; left: 0;
  }

  #hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    max-width: min(88vw, 480px);
    background: rgba(10,12,18,0.78); border: 1px solid rgba(255,255,255,0.10);
    padding: 12px 20px; border-radius: 14px;
    text-align: center; color: rgba(255,255,255,0.92);
    font-size: 13px; letter-spacing: 0.04em; line-height: 1.45;
    pointer-events: none; transition: opacity 0.8s; z-index: 2;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }

  /* Barra inferior: gira al jugador humano (◄ ►) y ▶ arranca / reinicia. Mismo shell que BallsWeb. */
  #bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(var(--bar-height) + env(safe-area-inset-bottom));
    padding: 0 16px env(safe-area-inset-bottom);
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 3;
  }
  #ui { display: flex; gap: 8px; }
  #ui button {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none;
    transition: background 0.1s, transform 0.08s;
    padding: 0;
  }
  #ui button:active { background: rgba(255,255,255,0.22); transform: scale(0.92); }
  #ui button svg { display: block; width: 24px; height: 24px; pointer-events: none; }

  /* Reset (⟳): dentro de #ui, hereda el mismo estilo que las flechas. */
  /* Botones ✕/⛶/ⓘ + overlay de salida vienen de arcade-shell.css. */
  /* HUD de FPS — formato Pong: panel monoespaciado arriba a la izquierda, sin border-radius. */
  #fpsOverlay {
    position: absolute;
    left: calc(8px + env(safe-area-inset-left));
    top: calc(8px + env(safe-area-inset-top));
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 18px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.55);
    padding: 4px 6px;
    pointer-events: none;
    display: none;
    z-index: 9;
  }



</style>
</head>
<body>
  <!-- DEBUG temporal: muestra en pantalla cualquier error JS (para diagnosticar en mobile, donde no hay
       consola a mano). Registrado antes que el script principal, así caza también errores de parseo. -->
  <script>
  (function () {
    function show(msg) {
      var d = document.getElementById('__err');
      if (!d) {
        d = document.createElement('div');
        d.id = '__err';
        d.style.cssText = 'position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);' +
          'max-width:90vw;max-height:80vh;overflow:auto;z-index:99999;background:rgba(150,0,0,0.95);' +
          'border:1px solid rgba(255,255,255,0.4);border-radius:8px;' +
          'color:#fff;font:12px/1.4 monospace;padding:14px;white-space:pre-wrap;word-break:break-word;text-align:left;';
        (document.body || document.documentElement).appendChild(d);
      }
      d.textContent += msg + '\n';
    }
    window.addEventListener('error', function (e) {
      show((e.message || 'error') + '  @ ' + ((e.filename || '').split('/').pop()) + ':' + e.lineno + ':' + e.colno);
    });
    window.addEventListener('unhandledrejection', function (e) {
      show('promise: ' + (e.reason && (e.reason.message || e.reason)));
    });
  })();
  </script>
  <canvas id="c"></canvas>
  <div id="hint">tocá las opciones del menú y ▶ JUGAR · en juego: tocá los lados para doblar</div>
  <div id="bar">
  <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
<div id="ui">
      <button id="btnLeft"  aria-label="girar izquierda" title="Girar izquierda">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
      </button>
      <button id="btnRight" aria-label="girar derecha" title="Girar derecha">

      </button>
      <button id="btnMenu" aria-label="volver al menú" title="Volver al menú">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><path d="M18 9l-6 6M12 9l6 6"/></svg>

    <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>

    </button>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  TRON (v1) — port web fiel de Tron/Tron.py, con el shell mobile de BallsWeb.
  //  Light-cycles que dejan estela; morís si tu frente choca contra cualquier
  //  estela (incluida la propia). El campo hace wrap toroidal — no hay paredes.
  //
  //  El original detecta colisiones leyendo píxeles (windowSurface.get_at).
  //  Acá lo replicamos con una GRILLA DE OCUPACIÓN del tamaño del canvas
  //  (lectura O(1); el canvas se pinta en paralelo sólo para mostrar).
  // ════════════════════════════════════════════════════════════════════
  const ri = (a, b) => a + Math.floor(Math.random() * (b - a + 1));               // randint inclusivo (como random.randint)
  const TAU = Math.PI * 2;

  // ── TUNING ──
  const SPEED_MULT  = 1;                                                         // velocidad relativa al original (un poco más rápido)
  const HEAD_FADE   = 0.6;                                                         // seg que tarda la "cabeza" en bajar del brillo caliente al color base
  const HEAD_GLOW   = 16;                                                          // shadowBlur del núcleo de la cabeza
  const HEAD_DOT    = 2.8;                                                         // radio del núcleo blanco de la cabeza
  const TRAIL_BLOOM = 6;                                                           // px de desenfoque del halo neón de las estelas (0 = sin glow)
  const GRID_ALPHA  = 0.06;                                                        // opacidad de la grilla de fondo estilo arena (0 = sin grilla)
  const GRID_CELLS  = 22;                                                          // ~celdas a lo ancho del lado más corto
  const BG          = '#03060d';                                                   // fondo casi negro con leve tinte azul (arena Tron)

  // ── IA ── navega por anticipación (mide espacio libre adelante/izq/der) con ruido para que no sea
  // determinista, y mete giros erráticos ocasionales — pero nunca uno que sea muerte inmediata.
  const AI_DECIDE_CD = 0.04;                                                       // s entre decisiones (no cada frame, así no tiembla)
  const AI_LOOK      = 150;                                                        // px de anticipación al medir cuánto hay libre en una dirección
  const AI_JITTER    = 70;                                                         // px de ruido random sumado a cada medición (vuelve la navegación impredecible)
  const AI_PANIC     = 16;                                                         // si el frente tiene menos px libres que esto → dobla ya al lado más despejado
  const AI_GREED     = 80;                                                         // un costado debe superar al frente por esto (px) para doblar "por gusto"
  const AI_ERRATIC   = 0.07;                                                       // prob. por decisión de un giro errático (sólo si es seguro)

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // SCREEN_X/SCREEN_Y del original (1280×720) ahora son responsive = tamaño del canvas.
  let W = 0, H = 0, dpr = 1, scl = 1;                                              // scl = factor de fuente (los px del original eran sobre 1280×720)
  let grid = new Uint8Array(0);                                                    // ocupación: grid[y*W+x] = 1 si hay estela
  // Estela PERMANENTE (color base) horneada en un canvas offscreen; cada frame se blitea a la pantalla y
  // encima se dibuja la "cabeza" brillante de cada jugador, que se desvanece hasta el color base. Separar
  // las dos capas evita que el brillo se acumule (como el cartel viejo) — el overlay es transitorio.
  let trailCv = null, tctx = null;
  let glowCv = null, gctx = null;                                                 // buffer de glow a media resolución (bloom barato)

  const xper = p => p * W;
  const yper = p => p * H;

  // Lectura de ocupación con wrap toroidal y truncado tipo Python (floor + módulo positivo).
  function occ(fx, fy) {
    let xi = Math.floor(fx), yi = Math.floor(fy);
    xi = ((xi % W) + W) % W;
    yi = ((yi % H) + H) % H;
    return grid[yi * W + xi];
  }

  // vectores unitarios por dirección (0 arriba, 1 derecha, 2 abajo, 3 izquierda)
  const DIR_VEC = [[0,-1],[1,0],[0,1],[-1,0]];
  // anticipación: cuántos px hay libres hacia 'dir' desde (x,y), muestreando en pasos hasta maxPx.
  function clearDist(x, y, dir, maxPx) {
    const vx = DIR_VEC[dir][0], vy = DIR_VEC[dir][1];
    for (let s = 2; s <= maxPx; s += 2) {
      if (occ(x + vx * s, y + vy * s)) return s;
    }
    return maxPx;
  }
  // ¿girar a 'dir' NO es muerte inmediata? (frente despejado a 2 y 4 px)
  function safeAhead(x, y, dir) {
    const vx = DIR_VEC[dir][0], vy = DIR_VEC[dir][1];
    return occ(x + vx * 2, y + vy * 2) === 0 && occ(x + vx * 4, y + vy * 4) === 0;
  }
  // Estampa un punto de estela (≈ el círculo radio-1 del original): 3×3 en la grilla + cuadradito en canvas.
  // OJO: recorta (no envuelve) las celdas fuera de pantalla, igual que pygame.draw.circle. Si envolviera
  // con módulo, al cruzar un borde dejaría una estela fantasma en el lado opuesto —justo donde el jugador
  // reaparece— y moriría al wrappear. La colisión occ() sí envuelve (como el `% SCREEN` del original).
  // marca una celda 3×3 en la grilla (recorta fuera de pantalla, no envuelve — igual que pygame.draw.circle)
  function markCell(ix, iy) {
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const xi = ix + dx, yi = iy + dy;
        if (xi < 0 || xi >= W || yi < 0 || yi >= H) continue;
        grid[yi * W + xi] = 1;
      }
    }
  }
  // Pinta un TRAMO de estela. Con `connect` rasteriza una línea continua de (x0,y0) a (x1,y1) — así la
  // estela no queda entrecortada aunque se caigan frames (el jugador se mueve varios px por frame). Sin
  // connect (primer punto o wrap), estampa un solo punto en (x1,y1).
  function paintTrail(x0, y0, x1, y1, color, connect) {
    if (connect) {
      const steps = Math.max(1, Math.ceil(Math.hypot(x1 - x0, y1 - y0)));
      for (let s = 0; s <= steps; s++) {
        const u = s / steps;
        markCell(Math.floor(x0 + (x1 - x0) * u), Math.floor(y0 + (y1 - y0) * u));
      }
      tctx.strokeStyle = color; tctx.lineWidth = 3; tctx.lineCap = 'round'; tctx.lineJoin = 'round';
      tctx.beginPath(); tctx.moveTo(x0, y0); tctx.lineTo(x1, y1); tctx.stroke();
    } else {
      markCell(Math.floor(x1), Math.floor(y1));
      tctx.fillStyle = color; tctx.fillRect(Math.floor(x1) - 1, Math.floor(y1) - 1, 3, 3);
    }
  }

  function clearField() {
    grid.fill(0);
    tctx.clearRect(0, 0, W, H);                                                   // estela transparente (el halo neón se compone al blitear)
    ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
  }

  // fondo: casi negro + grilla tenue de arena (se redibuja cada frame, es barato)
  function drawBackground() {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
    if (GRID_ALPHA > 0) {
      const step = Math.max(24, Math.round(Math.min(W, H) / GRID_CELLS));
      ctx.strokeStyle = `rgba(60,170,255,${GRID_ALPHA})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = 0; x <= W; x += step) { ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, H); }
      for (let y = 0; y <= H; y += step) { ctx.moveTo(0, y + 0.5); ctx.lineTo(W, y + 0.5); }
      ctx.stroke();
    }
  }

  // degradé de la cabeza: t=0 (cola) → color base; t=1 (cabeza) → casi blanco caliente.
  function hot(base, t) {
    const wt = Math.max(0, t) * Math.max(0, t) * 0.75;                            // ease cuadrático hacia el blanco
    return [ base[0] + (255 - base[0]) * wt, base[1] + (255 - base[1]) * wt, base[2] + (255 - base[2]) * wt ];
  }

  const barEl = document.getElementById('bar');
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const barH = barEl.offsetHeight;
    W = Math.max(1, Math.floor(window.innerWidth));
    H = Math.max(1, Math.floor(window.innerHeight - barH));
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;                                            // blit de la pista base 1:1, sin desenfoque
    scl = Math.min(W / 1280, H / 720);                                            // mantiene el texto adentro como en el original
    grid = new Uint8Array(W * H);
    // canvas offscreen de la estela permanente (mismo tamaño en px de dispositivo que el visible)
    trailCv = trailCv || document.createElement('canvas');
    trailCv.width = canvas.width; trailCv.height = canvas.height;
    tctx = trailCv.getContext('2d');
    tctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // buffer de glow a MEDIA resolución: blurear acá (1/4 del área) es ~4× más barato que blurear la
    // pantalla completa cada frame — clave para no perder frames en mobile.
    glowCv = glowCv || document.createElement('canvas');
    glowCv.width = Math.max(1, Math.floor(canvas.width / 2));
    glowCv.height = Math.max(1, Math.floor(canvas.height / 2));
    gctx = glowCv.getContext('2d');
    // Cambiar de tamaño invalida la pista; volvemos al menú (la grilla vieja no sirve).
    backToMenu();
  }
  window.addEventListener('resize', resize);

  // ── COLORES neón estilo Tron (más saturados/contrastados que el original para que "brillen" sobre el
  // fondo): cyan + naranja (el dúo canónico de Tron) + verde + magenta. ──
  const PLAYER_COLORS = [ [0,240,255], [255,120,0], [120,255,30], [255,40,200] ];
  const rgb  = c => `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
  const rgba = (c, a) => `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
  const lerpC = (a, b, t) => [ a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t ];
  const FONT = "'Orbitron', 'Segoe UI', system-ui, sans-serif";                   // fuente tecno para todo el canvas

  function roundRectPath(x, y, w, h, r) {
    r = Math.min(r, h / 2, w / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
  }
  // texto centrado (port de create_text; siempre center). size en px del original → ×scl.
  // glow = shadowBlur opcional; boxColor = caja redondeada de fondo (para el botón JUGAR).
  function createText(size, content, color, fx, fy, glow = 0, boxColor = null) {
    const fp = Math.round(size * scl);
    ctx.font = `600 ${fp}px ${FONT}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const px = xper(fx), py = yper(fy);
    if (boxColor) {
      const w = ctx.measureText(content).width, pad = fp * 0.45;
      ctx.fillStyle = boxColor;
      roundRectPath(px - w / 2 - pad, py - fp * 0.7, w + pad * 2, fp * 1.4, fp * 0.35);
      ctx.fill();
    }
    if (glow > 0) { ctx.shadowColor = color; ctx.shadowBlur = glow; }
    ctx.fillStyle = color;
    ctx.fillText(content, px, py);
    ctx.shadowBlur = 0;
  }

  // ════════════════ PLAYER (port de la clase Player) ════════════════
  // directions[dir] = [vx, vy,  dx2,dy2,  scoutDx,scoutDy]
  //   [0,1] = velocidad (px/s, ×deltaT)         [2,3] = look-ahead inmediato (2 px) → muerte / IA
  //   [4,5] = scout que la IA randomiza (5..50 px) cada 2 s
  // NOTA: el original usaba look-ahead asimétrico (derecha/abajo a 1 px, arriba/izquierda a 2 px),
  // un ajuste al círculo radio-1 de pygame. Acá la estela es 3×3 (±1 px), así que un look-ahead de
  // 1 px caería sobre la propia estela y matarías al girar a derecha/abajo. Lo hacemos simétrico a
  // 2 px (> medio-ancho de la estela) para que nunca se lea a sí misma.
  function dirTemplate() {
    return {
      0: [0,-150, 0,-2, 0,0],   // arriba
      1: [150,0, 2,0, 0,0],     // derecha
      2: [0,150, 0,2, 0,0],     // abajo
      3: [-150,0, -2,0, 0,0],   // izquierda
    };
  }

  class Player {
    constructor(id, totalplayers, mode) {
      this.id = id;
      this.direction = 0;
      this.directions = dirTemplate();
      this.mode = mode;
      this.leftpressed = false;
      this.rightpressed = false;
      this.stop = false;
      this.alive = true;
      this.ai_incd = 0;                                                           // acumulador para la cadencia de decisión de la IA

      // todos arrancan en la MISMA fila (y = 0.95), repartidos en x — así con 4 jugadores no salen
      // desde alturas distintas, sino en paralelo desde abajo.
      const n = totalplayers;
      const startpos = {
        0: [ (n < 4 ? 0.75 : 0.8), 0.95 ],
        1: [ (n < 4 ? 0.25 : 0.2), 0.95 ],
        2: [ (n < 4 ? 0.5  : 0.6), 0.95 ],
        3: [ 0.4, 0.95 ],
      };
      this.colorArr = PLAYER_COLORS[id];
      this.color = rgb(this.colorArr);
      this.x = xper(startpos[id][0]);
      this.y = yper(startpos[id][1]);
      this.head = [];                                                             // cola reciente {x, y, age} para el degradé de brillo
      this.lastX = null; this.lastY = null;                                       // última posición estampada (para conectar la estela con línea)
    }

    // giro manual (botones / mitades de pantalla) — sólo el humano
    turnLeft()  { this.direction = (this.direction - 1 + 4) % 4; }
    turnRight() { this.direction = (this.direction + 1) % 4; }

    process(dt) {
      const d = this.directions;

      if (this.id === 0 || this.mode === 1) {
        // ── HUMANO ── latch igual que el original: un giro por pulsación.
        if (!this.leftpressed && keys[this.left])  { this.direction = (this.direction - 1 + 4) % 4; this.leftpressed = true; }
        if (!this.rightpressed && keys[this.right]) { this.direction = (this.direction + 1) % 4;     this.rightpressed = true; }
        if (!keys[this.left])  this.leftpressed = false;
        if (!keys[this.right]) this.rightpressed = false;
      } else {
        // ── IA por ANTICIPACIÓN + aleatoriedad ──
        // Decide a una cadencia fija (no cada frame, así no tiembla). Mide el espacio libre hacia
        // adelante / izquierda / derecha muestreando varios px (clearDist), y le suma ruido para que la
        // navegación no sea determinista. Tres comportamientos:
        //   · pánico: si el frente está casi tapado, dobla ya al lado más despejado;
        //   · errático: a veces dobla a un lado al azar — pero sólo si NO es muerte inmediata;
        //   · codicia: si un costado está bastante más abierto que el frente, dobla hacia ahí.
        // Si nada de eso aplica, sigue derecho (estelas largas y limpias).
        this.ai_incd += dt;
        if (this.ai_incd > AI_DECIDE_CD) {
          this.ai_incd = 0;
          const dir = this.direction, dL = (dir + 3) % 4, dR = (dir + 1) % 4;
          const fF = clearDist(this.x, this.y, dir, AI_LOOK);
          const sL = clearDist(this.x, this.y, dL, AI_LOOK) + ri(0, AI_JITTER);
          const sR = clearDist(this.x, this.y, dR, AI_LOOK) + ri(0, AI_JITTER);
          const openSide = sL >= sR ? dL : dR;
          const blockedSide = sL >= sR ? dR : dL;

          if (fF < AI_PANIC) {                                                     // peligro adelante → al lado más despejado (seguro)
            if (safeAhead(this.x, this.y, openSide)) this.direction = openSide;
            else if (safeAhead(this.x, this.y, blockedSide)) this.direction = blockedSide;
          } else if (Math.random() < AI_ERRATIC) {                                 // capricho errático, sólo si no es suicidio
            const side = Math.random() < 0.5 ? dL : dR;
            if (safeAhead(this.x, this.y, side)) this.direction = side;
          } else if (Math.max(sL, sR) > fF + AI_GREED) {                           // un costado mucho más abierto → doblar por gusto
            if (safeAhead(this.x, this.y, openSide)) this.direction = openSide;
          }
        }
      }

      // wrap toroidal en los bordes (idéntico al original)
      if (this.x > W) this.x = 0;
      if (this.x < 0) this.x = W;
      if (this.y > H) this.y = 0;
      if (this.y < 0) this.y = H;

      // muerte: COLISIÓN BARRIDA (no un solo punto). Muestreo todo el tramo que recorrerá la cycle este
      // frame —de 2px adelante hasta donde llega la cabeza + margen— así no salta por encima de una estela
      // fina cuando avanza varios px por frame.
      const dir = this.direction;
      if (!this.stop) {
        const ux = Math.sign(d[dir][0]), uy = Math.sign(d[dir][1]);
        const moveDist = Math.hypot(d[dir][0], d[dir][1]) * dt * SPEED_MULT;
        const reach = moveDist + 2;
        for (let s = 2; s <= reach; s += 1) {
          if (occ(this.x + ux * s, this.y + uy * s)) { this.alive = false; return; }
        }
        this.x += d[dir][0] * dt * SPEED_MULT;
        this.y += d[dir][1] * dt * SPEED_MULT;
        this.head.push({ x: this.x, y: this.y, age: 0 });                         // nuevo punto de cabeza (brillante)
      }
    }

    // estampa la estela base permanente (offscreen) conectando con la posición previa (línea continua);
    // si saltó por un wrap (distancia grande) o es el primer punto, estampa un punto suelto.
    draw() {
      const far = Math.min(W, H) * 0.5;
      const connect = this.lastX !== null && Math.hypot(this.x - this.lastX, this.y - this.lastY) <= far;
      paintTrail(this.lastX, this.lastY, this.x, this.y, this.color, connect);
      this.lastX = this.x; this.lastY = this.y;
    }

    // dibuja la cola reciente con degradé de brillo, CONECTANDO los puntos con segmentos (así no queda
    // entrecortada con frames bajos). Cola → color base; cabeza → casi blanca + núcleo con glow.
    drawHead(dt) {
      for (const h of this.head) h.age += dt;
      this.head = this.head.filter(h => h.age <= HEAD_FADE);
      if (!this.head.length) return;
      const far = Math.min(W, H) * 0.5;
      ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      for (let k = 1; k < this.head.length; k++) {
        const a = this.head[k - 1], b = this.head[k];
        if (Math.hypot(b.x - a.x, b.y - a.y) > far) continue;                     // no cruzar un wrap
        const t = 1 - b.age / HEAD_FADE;                                          // 1 = cabeza, 0 = cola (= color base)
        ctx.strokeStyle = rgb(hot(this.colorArr, t));
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      }
      if (this.alive && !this.stop) {                                             // núcleo blanco brillante en la punta
        const tip = this.head[this.head.length - 1];
        ctx.save();
        ctx.shadowColor = this.color; ctx.shadowBlur = HEAD_GLOW;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(tip.x, tip.y, HEAD_DOT, 0, TAU); ctx.fill();
        ctx.restore();
      }
    }
  }

  // ════════════════ DRIVER (menú + estado) ════════════════
  const gh = {
    menu: true,
    option: 0,            // fila seleccionada: 0 = N Players, 1 = modo (estilo CrazyTanks)
    players: 0,           // +2 → 2..4
    mode: 0,              // 0 = Player vs AI, 1 = Player vs Player
    keypressed: false,
  };
  let players = [];

  function aliveCount() { let n = 0; for (const p of players) if (p.alive) n++; return n; }

  function startGame() {
    const n = gh.players + 2;
    clearField();
    players = [];
    for (let i = 0; i < n; i++) players.push(new Player(i, n, gh.mode));
    bindControls();
    gh.menu = false;
  }
  function restart() { startGame(); }
  function backToMenu() {
    clearField();
    players = [];
    gh.menu = true;
    gh.keypressed = true;                                                          // evita que una tecla sostenida dispare el menú al instante
  }

  // mapeo de teclas por jugador (igual que el original): P1 ←/↓, P2 Q/W, P3 O/P, P4 V/B
  const CONTROLS = [
    ['ArrowLeft', 'ArrowDown'],
    ['KeyQ', 'KeyW'],
    ['KeyO', 'KeyP'],
    ['KeyV', 'KeyB'],
  ];
  function bindControls() {
    for (const p of players) { p.left = CONTROLS[p.id][0]; p.right = CONTROLS[p.id][1]; }
  }

  // ── MENÚ estilo CrazyTanks: cada fila es una opción que se TOCA para ciclar su valor (mitad izq/der
  // del toque = anterior/siguiente); la seleccionada se muestra entre ‹ › con glow; el hover del mouse
  // mueve la selección; y un botón ▶ JUGAR abajo arranca la partida. ──
  // Sólo se juega contra la IA → una sola opción (cantidad de jugadores) + JUGAR.
  // Layout COMPACTO centrado: tamaños y separaciones en px proporcionales a min(W,H) (no a la altura
  // total) — así no se desparrama en mobile y entra bien en cualquier orientación.
  let hoverY = -1;                                                                // y del mouse sobre el canvas (CSS px); -1 = sin hover
  function menuLayout() {
    const S = Math.min(W, H), cy = H * 0.47;
    return {
      titleY: cy - S * 0.135, titlePx: S * 0.17,
      divY:   cy - S * 0.045,
      optY:   cy + S * 0.035, optPx: S * 0.052,
      playY:  cy + S * 0.150, playPx: S * 0.052,
      tol:    S * 0.06,
    };
  }
  function menuChangeValue(delta) { gh.players = (gh.players + delta + 3) % 3; }
  function tapMenu(lx, ly) {                                                       // toque/click sobre el menú (coords del canvas)
    const L = menuLayout(), dir = lx < W * 0.5 ? -1 : 1;                          // mitad izq/der = anterior/siguiente
    if (Math.abs(ly - L.optY) < L.tol)       gh.players = (gh.players + dir + 3) % 3;
    else if (Math.abs(ly - L.playY) < L.tol) startGame();
  }

  function processMenu() {
    if (!gh.keypressed) {
      if (keys.ArrowLeft)  { menuChangeValue(-1); gh.keypressed = true; }
      if (keys.ArrowRight) { menuChangeValue(+1); gh.keypressed = true; }
      if (keys.Enter) startGame();
    }
    if (!keys.ArrowLeft && !keys.ArrowRight) gh.keypressed = false;
  }

  // Color de acento del menú: cicla SUAVE por la paleta neón con crossfade continuo (mejora del título de
  // V2, que saltaba de color al tocar el negro). Todo el menú late con este mismo color.
  function accentNow() {
    const n = PLAYER_COLORS.length;
    const t = (typeof T === 'number' && isFinite(T)) ? T : 0;                      // defensa: nunca indexar con NaN/negativo
    const pos = (((t / 3.4) % n) + n) % n;                                         // módulo siempre en [0, n)
    const i = Math.floor(pos), f = pos - i;
    const ff = f * f * (3 - 2 * f);                                                // smoothstep
    return lerpC(PLAYER_COLORS[i], PLAYER_COLORS[(i + 1) % n], ff);
  }

  // Título "TRON": halo radial + bloom multicapa + núcleo blanco caliente + tracking ancho. Respira.
  function drawTitle(yPx, fp, col) {
    fp = Math.round(fp);
    const px = W * 0.5, py = yPx;
    const breathe = 0.5 + 0.5 * Math.sin(T * 1.6);                                 // 0..1
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `900 ${fp}px ${FONT}`;
    ctx.letterSpacing = (fp * 0.10).toFixed(1) + 'px';

    // halo radial detrás (fuente de luz)
    const haloR = fp * 1.7;
    const g = ctx.createRadialGradient(px, py, 0, px, py, haloR);
    g.addColorStop(0, rgba(col, 0.16 + 0.12 * breathe));
    g.addColorStop(1, rgba(col, 0));
    ctx.fillStyle = g;
    ctx.fillRect(px - haloR, py - haloR, haloR * 2, haloR * 2);

    // bloom: pasadas con shadowBlur decreciente, todas del color de acento
    ctx.shadowColor = rgb(col);
    ctx.fillStyle = rgb(col);
    for (const blur of [40, 22, 0]) {
      ctx.shadowBlur = blur * (0.7 + 0.3 * breathe);
      ctx.fillText('TRON', px, py);
    }
    // núcleo blanco caliente
    ctx.shadowBlur = 12;
    ctx.fillStyle = `rgba(255,255,255,${0.5 + 0.3 * breathe})`;
    ctx.fillText('TRON', px, py);

    ctx.restore();
    ctx.letterSpacing = '0px';                                                     // que no contagie al resto del texto
  }

  // Fila de opción: seleccionada → color de acento, con ‹ › y glow; si no → gris apagado.
  function drawOption(label, yPx, selected, col, fp) {
    fp = Math.round(fp);
    const txt = selected ? '‹  ' + label + '  ›' : label;
    ctx.font = `600 ${fp}px ${FONT}`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (selected) { ctx.shadowColor = rgb(col); ctx.shadowBlur = 18; ctx.fillStyle = rgb(col); }
    else { ctx.fillStyle = 'rgb(120,128,142)'; }
    ctx.fillText(txt, W * 0.5, yPx); ctx.shadowBlur = 0;
  }

  // Botón ▶ JUGAR: píldora neón con borde + glow, late y se intensifica al hover.
  function drawPlay(yPx, col, fp) {
    fp = Math.round(fp);
    const hj = hoverY >= 0 && Math.abs(hoverY - yPx) < fp * 1.1, pulse = 0.6 + 0.4 * Math.sin(T * 4);
    const px = W * 0.5, text = '▶ JUGAR';
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `700 ${fp}px ${FONT}`;
    const w = ctx.measureText(text).width, padX = fp * 0.7, padY = fp * 0.42;
    const bw = w + padX * 2, bh = fp + padY * 2, bx = px - bw / 2, by = yPx - bh / 2;
    ctx.shadowColor = rgb(col); ctx.shadowBlur = hj ? 28 : 15;
    ctx.lineWidth = 2; ctx.strokeStyle = rgba(col, hj ? 0.95 : 0.7);
    roundRectPath(bx, by, bw, bh, bh * 0.5);
    ctx.fillStyle = rgba(col, hj ? 0.20 : 0.10);
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = hj ? 18 : 10;
    ctx.fillStyle = `rgba(255,255,255,${0.82 + 0.18 * pulse})`;
    ctx.fillText(text, px, yPx);
    ctx.restore();
  }

  function drawMenu() {
    drawBackground();                                                             // grilla de arena (mismo look que el juego)
    const L = menuLayout(), col = accentNow();

    drawTitle(L.titleY, L.titlePx, col);

    // divisor neón bajo el título
    const dw = Math.min(W * 0.55, 420);
    ctx.save();
    ctx.strokeStyle = rgba(col, 0.55); ctx.shadowColor = rgb(col); ctx.shadowBlur = 12; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W / 2 - dw / 2, L.divY); ctx.lineTo(W / 2 + dw / 2, L.divY); ctx.stroke();
    ctx.restore();

    drawOption((gh.players + 2) + ' Players', L.optY, true, col, L.optPx);
    drawPlay(L.playY, col, L.playPx);
  }

  function drawWinner() {
    const w = players.find(p => p.alive);
    if (!w) return;
    const name = 'Player ' + (w.id + 1);
    // Ahora el fondo se repinta cada frame (no se acumula), así que el glow es seguro. Caja translúcida
    // para que se lea sobre las estelas brillantes de atrás.
    createText(90, name + ' Wins!', w.color, 0.5, 0.45, 22, 'rgba(0,0,0,0.55)');
    createText(40, 'tocá o Enter para reiniciar', 'rgb(220,220,220)', 0.5, 0.58, 0, 'rgba(0,0,0,0.55)');
  }

  // ════════════════ INPUT ════════════════
  const keys = {};                                                                // e.code → bool
  function gameOver() { return !gh.menu && aliveCount() <= 1; }

  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (!gh.menu) {
      if (e.code === 'Escape') backToMenu();
      else if (e.code === 'Enter' && gameOver()) restart();
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Enter'].includes(e.code)) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  // Toque en el canvas: en menú toca la opción (mitad izq/der cicla su valor); en juego, tocar la mitad
  // izquierda dobla a la izquierda y la derecha dobla a la derecha; en game over reinicia.
  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    const lx = e.clientX - r.left, ly = e.clientY - r.top;
    if (gh.menu) {
      tapMenu(lx, ly);
    } else if (gameOver()) {
      restart();
    } else {
      const p0 = players.find(p => p.id === 0 && p.alive);
      if (p0) (lx < W * 0.5 ? p0.turnLeft() : p0.turnRight());
    }
  });
  // hover del mouse (desktop): sólo para iluminar el botón JUGAR al pasar el cursor
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    hoverY = e.clientY - r.top;
  });
  canvas.addEventListener('mouseleave', () => { hoverY = -1; });

  // botones de la barra. pointerdown (no click) para que respondan aun con otro toque activo (estilo BallsWeb).
  function tappable(el, fn) { el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); }); }
  function humanTurn(side) {
    const p0 = players.find(p => p.id === 0 && p.alive);
    if (p0) (side < 0 ? p0.turnLeft() : p0.turnRight());
  }
  // ◄ ►: en menú cambian el valor de la opción seleccionada; en juego doblan al humano.
  tappable(document.getElementById('btnLeft'),  () => { gh.menu ? menuChangeValue(-1) : humanTurn(-1); });
  tappable(document.getElementById('btnRight'), () => { gh.menu ? menuChangeValue(+1) : humanTurn(+1); });
  tappable(document.getElementById('btnMenu'), () => { if (!gh.menu) backToMenu(); });  // vuelve al menú

  // ════════════════ LOOP ════════════════
  // OJO mobile: NO inicializar lastT con performance.now() y después medir contra el timestamp de rAF —
  // en varios WebView de celular esos relojes tienen épocas distintas, y el primer (now - lastT) da un
  // negativo enorme → dt negativo → T negativo → accentNow() indexa PLAYER_COLORS[-1] = undefined → crash.
  // Se arregla midiendo siempre contra el MISMO reloj (el now que entra) y clampeando dt a [0, 0.05].
  let lastT = null;
  let T = 0;                                                                      // tiempo acumulado (seg) para los pulsos del menú
  function loop(now) {
    if (typeof now !== 'number') now = performance.now();
    if (lastT === null) lastT = now;
    let dt = (now - lastT) / 1000;
    lastT = now;
    if (!(dt >= 0) || dt > 0.05) dt = 0.01;                                       // descarta NaN / saltos raros / desfase de épocas
    T += dt;                                                                      // tiempo para los pulsos del menú

    if (gh.menu) {
      processMenu();
      drawMenu();
    } else {
      for (const p of players) {
        if (!p.alive) continue;
        p.process(dt);
        if (p.alive) p.draw();                                                    // estampa estela base sólo si sigue vivo tras el chequeo
      }
      // componer el frame: fondo + halo neón + estela nítida + cabezas brillantes.
      // Bloom BARATO: la estela se reduce a media resolución y se blurea ahí (1/4 del área); después se
      // re-estira con suavizado. Mucho más liviano que blurear la pantalla completa cada frame (mobile).
      drawBackground();
      if (TRAIL_BLOOM > 0) {
        gctx.setTransform(1, 0, 0, 1, 0, 0);
        gctx.clearRect(0, 0, glowCv.width, glowCv.height);
        gctx.filter = `blur(${TRAIL_BLOOM * 0.6}px)`;
        gctx.drawImage(trailCv, 0, 0, glowCv.width, glowCv.height);                // downscale + blur (área chica)
        gctx.filter = 'none';
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(glowCv, 0, 0, W, H);                                         // upscale suave → halo neón
        ctx.imageSmoothingEnabled = false;
      }
      ctx.drawImage(trailCv, 0, 0, W, H);                                          // estela nítida encima del halo
      for (const p of players) p.drawHead(dt);
      if (aliveCount() <= 1) {                                                     // game over: frenar a todos y mostrar ganador
        for (const p of players) p.stop = true;
        drawWinner();
      }
    }
    requestAnimationFrame(loop);
  }

  // ── INIT ──
  resize();
  loop();

  const hint = document.getElementById('hint');
  setTimeout(() => hint.style.opacity = '0', 6000);
  canvas.addEventListener('pointerdown', () => hint.style.opacity = '0', { once: true });
  </script>

  <!-- Shell del Arcade (exit + fullscreen + lock de orientación). data-orient: landscape/portrait/any. -->
  <script src="../../Arcade/arcade-shell.js" data-orient="landscape"></script>

  <div id="fpsOverlay">FPS: --</div>
  <script>
    (function() {
      let frameCount = 0, lastT = performance.now();
      const overlay = document.getElementById('fpsOverlay');
      function loop() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          const fps = Math.round(frameCount * 1000 / (now - lastT));
          if (overlay.style.display !== 'none') overlay.textContent = 'FPS: ' + fps;
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(loop);
      }
      loop();
      const btn = document.getElementById('btnInfo');
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        // El overlay arranca con display:none POR CSS — el style inline está vacío "", así que
        // comparamos con === 'block' (estado visible explícito) en vez de !== 'none' (que daba true
        // al inicio y se comía el primer tap).
        const showing = overlay.style.display === 'block';
        overlay.style.display = showing ? 'none' : 'block';
        btn.classList.toggle('on', !showing);
      });
    })();
  </script>


</body>
