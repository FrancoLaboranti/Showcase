<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pac-Man</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../Arcade/arcade-shell.css">
<style>
  :root { --bar-height: 66px; }             /* barra inferior fina estilo Tron V1 (sólo botones de utilidad) */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Press Start 2P', 'Courier New', monospace;
  }
  /* El canvas ocupa sólo el área SOBRE la barra inferior (UI estilo Tron V1). Tamaños seteados
     explícito desde JS en cada resize: W × (innerHeight − barH). */
  #c { display: block; position: absolute; top: 0; left: 0; }

  #hint {
    position: absolute; left: 0; right: 0; top: calc(10px + env(safe-area-inset-top));
    text-align: center; color: rgba(255,255,255,0.5);
    font-size: 11px; letter-spacing: 0.04em; pointer-events: none;
    transition: opacity 0.8s; z-index: 2; padding: 0 16px;
  }

  /* ── Barra inferior estilo Tron V1 ── fila centrada de botones de utilidad: ✕ salir · ⟳ · 🔊 · ⛶ · ⓘ.
     Mismo look que TronWeb (negro translúcido + borde superior). NO hay botones de movimiento:
     en desktop se juega con flechas/WASD y en mobile con swipe sobre el canvas. */
  #bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(var(--bar-height) + env(safe-area-inset-bottom));
    padding: 0 16px env(safe-area-inset-bottom);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: rgba(0,0,0,0.85);
    border-top: 1px solid rgba(255,225,80,0.18);
    z-index: 3;
  }
  /* el shell pone ✕/⛶/ⓘ con align-self:flex-end; los centramos verticalmente para alinearlos con ⟳/🔊 */
  #bar > #btnExit, #bar > #btnFs, #bar > #btnInfo { align-self: center; margin-bottom: 0; }

  /* Reset + Sonido (custom): círculos tenues como ✕/⛶/ⓘ, con acento amarillo en activo */
  #btnReset, #btnSound {
    width: 30px; height: 30px; border-radius: 50%; flex: 0 0 auto; align-self: center;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.55);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
  }
  #btnReset svg, #btnSound svg { display: block; width: 15px; height: 15px; pointer-events: none; }
  #btnReset:active, #btnSound:active { background: rgba(255,225,80,0.28); border-color: rgba(255,225,80,0.6); color: #fff; transform: scale(0.9); }
  #btnSound .ic-off { display: none; }
  #btnSound.off .ic-on  { display: none; }
  #btnSound.off .ic-off { display: block; }
  #fpsOverlay {
    position: absolute;
    left: calc(8px + env(safe-area-inset-left));
    top: calc(8px + env(safe-area-inset-top));
    font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px; line-height: 18px;
    color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.55); padding: 4px 6px;
    pointer-events: none; display: none; z-index: 9;
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">desktop: flechas o WASD · móvil: deslizá hacia una dirección · comete todos los puntos</div>
  <!-- Barra inferior fina estilo Tron V1 (orden centrado): ✕ salir · ⟳ reiniciar · 🔊 sonido · ⛶ pantalla · ⓘ info.
       Sin botones de movimiento: el control es flechas/WASD (desktop) o swipe sobre el canvas (móvil). -->
  <div id="bar">
    <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <button id="btnReset" aria-label="reiniciar" title="Reiniciar partida">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg>
    </button>
    <button id="btnSound" aria-label="sonido" title="Sonido on/off">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-on"><path d="M11 5L6 9H3v6h3l5 4V5z" fill="currentColor" stroke="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></g><g class="ic-off"><path d="M11 5L6 9H3v6h3l5 4V5z" fill="currentColor" stroke="none"/><path d="M16 9l5 5M21 9l-5 5"/></g></svg>
    </button>
    <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
    </button>
    <button id="btnInfo" aria-label="info" title="Info / FPS">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  PAC-MAN — juego con la UI de TRON V1 (barra inferior fina con botones de
  //  utilidad + arcade-shell; el canvas ocupa el área SOBRE la barra) y estética
  //  propia: laberinto de contornos neón azules horneados con glow, fuente arcade
  //  Press Start 2P, fantasmas clásicos con IA scatter/chase/frightened y sonidos
  //  sintetizados (WebAudio). El movimiento es por teclado (flechas/WASD) en desktop
  //  y por SWIPE sobre el canvas en mobile — no hay botones de dirección en la barra.
  //
  //  Movimiento por ARISTAS DE GRILLA: cada actor viaja del centro de un tile al
  //  centro del vecino (t: 0→1); las decisiones (doblar / IA) ocurren EXACTO en
  //  los centros → nunca hay bugs de "me pasé del cruce". El túnel usa tiles
  //  virtuales c = -1 / 28 que al llegar se envuelven al otro lado.
  // ════════════════════════════════════════════════════════════════════
  const ri  = (a, b) => a + Math.floor(Math.random() * (b - a + 1));              // randint inclusivo
  const TAU = Math.PI * 2;
  const FONT = "'Press Start 2P', 'Courier New', monospace";

  // ── TUNING ──
  const BASE        = 9.0;                                                       // velocidad 100% (tiles/seg)
  const TUNNEL_ROW  = 14;                                                        // fila del túnel (y de la casa)
  const WALL_COL    = '#2434f0';                                                 // azul del laberinto
  const WALL_GLOW   = '#3b4cff';
  const DOT_COL     = '#ffc7a8';                                                 // puntitos (durazno clásico)
  const PAC_COL     = '#ffe300';
  const GHOST_PTS   = [200, 400, 800, 1600];
  const FRUIT_PTS   = [100, 300, 500, 700, 1000, 3000, 5000];
  const FRUIT_NAMES = ['cereza', 'frutilla', 'naranja', 'manzana', 'melón', 'campana', 'llave'];

  // ── MAPA clásico 28×31. '#' pared · '.' punto · 'o' energizante · '-' puerta · ' ' pasillo/vacío ──
  const MAP = [
    '############################',
    '#............##............#',
    '#.####.#####.##.#####.####.#',
    '#o####.#####.##.#####.####o#',
    '#.####.#####.##.#####.####.#',
    '#..........................#',
    '#.####.##.########.##.####.#',
    '#.####.##.########.##.####.#',
    '#......##....##....##......#',
    '######.##### ## #####.######',
    '######.##### ## #####.######',
    '######.##          ##.######',
    '######.## ###--### ##.######',
    '######.## #      # ##.######',
    '      .   #      #   .      ',
    '######.## #      # ##.######',
    '######.## ######## ##.######',
    '######.##          ##.######',
    '######.## ######## ##.######',
    '######.## ######## ##.######',
    '#............##............#',
    '#.####.#####.##.#####.####.#',
    '#.####.#####.##.#####.####.#',
    '#o..##.......  .......##..o#',
    '###.##.##.########.##.##.###',
    '###.##.##.########.##.##.###',
    '#......##....##....##......#',
    '#.##########.##.##########.#',
    '#.##########.##.##########.#',
    '#..........................#',
    '############################',
  ];
  const COLS = 28, ROWS = 31;

  // ¿Se puede caminar a (c,r)? Tiles virtuales -1/28 en la fila del túnel = sí (wrap al llegar).
  function open(c, r) {
    if (r === TUNNEL_ROW && (c === -1 || c === COLS)) return true;
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
    const ch = MAP[r][c];
    return ch !== '#' && ch !== '-';
  }

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const barEl = document.getElementById('bar');                                  // barra inferior (Tron V1): el canvas vive ARRIBA de ella

  let W = 0, H = 0, dpr = 1, scl = 1;
  let ts = 16, ox = 0, oy = 0;                                                   // tile size + esquina del laberinto (px)
  let mazeCv = null, mazeFlashCv = null;                                         // laberinto horneado (azul / blanco para el flash)
  let pelletCv = null, pctx = null;                                              // puntitos horneados (se borran al comer)

  // ════════════════ ESTADO ════════════════
  const gh = {
    state: 'menu',            // menu | ready | play | dying | flash | gameover
    stateT: 0,                // tiempo dentro del estado actual
    firstReady: true,         // el primer READY de la partida dura más (jingle)
    score: 0, lives: 3, level: 1,
    high: +(localStorage.getItem('pacmanHigh') || 0),
    dotsLeft: 0, dotsEaten: 0,
    frightT: 0, combo: 0,     // energizante activo + multiplicador de fantasmas
    modeIdx: 0, modeT: 0,     // línea de tiempo scatter/chase
    pauseT: 0,                // freeze cortito al comer un fantasma
    fruit: null,              // {x, y, t} en tiles
    extraGiven: false,
  };
  let pac = null, ghosts = [];
  let dots = new Uint8Array(COLS * ROWS);                                        // 0 nada · 1 punto · 2 energizante
  let popups = [];                                                               // textos flotantes de puntaje

  // ── Specs por nivel (velocidades como fracción de BASE, fright en seg, releases de la casa) ──
  function lvlSpec(L) {
    return {
      pac:    L === 1 ? 0.80 : L < 5 ? 0.90 : 1.00,
      pacFr:  L === 1 ? 0.90 : L < 5 ? 0.95 : 1.00,
      ghost:  L === 1 ? 0.75 : L < 5 ? 0.85 : 0.95,
      ghostFr:L === 1 ? 0.50 : L < 5 ? 0.55 : 0.60,
      tunnel: L === 1 ? 0.40 : L < 5 ? 0.45 : 0.50,
      fright: Math.max(1, 6 - (L - 1)),
      release:[0, 0.6, Math.max(1.5, 4.5 - L * 0.5), Math.max(3, 7.5 - L * 0.5)],
      modes:  L < 2 ? [7, 20, 7, 20, 5, 20, 5, 1e9] : L < 5 ? [7, 20, 7, 20, 5, 1e9] : [5, 20, 5, 20, 5, 1e9],
    };
  }
  function fruitKind(L) { return L <= 2 ? L - 1 : Math.min(6, Math.floor((L - 3) / 2) + 2); }

  // ════════════════ AUDIO (sintetizado, sin assets) ════════════════
  let actx = null, master = null;
  let sirenOsc = null, sirenLfo = null, sirenLfoG = null, sirenGain = null, sirenMode = 'off';
  let muted = localStorage.getItem('pacmanMuted') === '1';
  function ensureAudio() {
    try {
      if (!actx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        actx = new AC();
        master = actx.createGain();
        master.gain.value = muted ? 0 : 1;
        master.connect(actx.destination);
      }
      if (actx.state === 'suspended') actx.resume();
    } catch (e) {}
  }
  function tone(f0, f1, dur, type = 'square', vol = 0.08, delay = 0) {
    if (!actx) return;
    try {
      const t0 = actx.currentTime + delay;
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(f0, t0);
      if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(30, f1), t0 + dur);
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      o.connect(g); g.connect(master);
      o.start(t0); o.stop(t0 + dur + 0.02);
    } catch (e) {}
  }
  let wakaFlip = false;
  function sndWaka()      { wakaFlip = !wakaFlip; wakaFlip ? tone(420, 180, 0.07, 'square', 0.05) : tone(180, 420, 0.07, 'square', 0.05); }
  function sndEnergizer() { tone(160, 520, 0.35, 'triangle', 0.12); }
  function sndEatGhost()  { tone(180, 1300, 0.32, 'sawtooth', 0.10); }
  function sndFruit()     { tone(880, 880, 0.08, 'square', 0.10); tone(1320, 1320, 0.10, 'square', 0.10, 0.09); }
  function sndDeath()     { tone(640, 90, 0.9, 'sawtooth', 0.12, 0.4); tone(220, 60, 0.22, 'square', 0.10, 1.35); tone(180, 50, 0.22, 'square', 0.10, 1.55); }
  function sndLife()      { for (let i = 0; i < 5; i++) tone(620 + i * 180, 620 + i * 180, 0.09, 'square', 0.08, i * 0.07); }
  function sndStart()     { [392, 523, 659, 784, 659, 784].forEach((f, i) => tone(f, f, 0.12, 'triangle', 0.10, i * 0.13)); }
  // Sirena de fondo: un triángulo con LFO en la frecuencia; cambia de carácter según el momento.
  function setSiren(mode) {
    sirenMode = mode;
    if (!actx) return;
    try {
      if (mode === 'off') {
        if (sirenOsc) { sirenOsc.stop(); sirenLfo.stop(); sirenOsc = null; sirenLfo = null; }
        return;
      }
      if (!sirenOsc) {
        sirenOsc = actx.createOscillator(); sirenOsc.type = 'triangle';
        sirenGain = actx.createGain(); sirenGain.gain.value = 0.03;
        sirenLfo = actx.createOscillator(); sirenLfo.type = 'sine';
        sirenLfoG = actx.createGain();
        sirenLfo.connect(sirenLfoG); sirenLfoG.connect(sirenOsc.frequency);
        sirenOsc.connect(sirenGain); sirenGain.connect(master);
        sirenOsc.start(); sirenLfo.start();
      }
      const t = actx.currentTime;
      if (mode === 'norm')        { sirenOsc.frequency.setTargetAtTime(320, t, 0.1);  sirenLfo.frequency.setTargetAtTime(0.9, t, 0.1); sirenLfoG.gain.setTargetAtTime(60, t, 0.1);  sirenGain.gain.setTargetAtTime(0.030, t, 0.1); }
      else if (mode === 'fright') { sirenOsc.frequency.setTargetAtTime(140, t, 0.05); sirenLfo.frequency.setTargetAtTime(5, t, 0.05);  sirenLfoG.gain.setTargetAtTime(50, t, 0.05); sirenGain.gain.setTargetAtTime(0.040, t, 0.05); }
      else if (mode === 'eyes')   { sirenOsc.frequency.setTargetAtTime(900, t, 0.05); sirenLfo.frequency.setTargetAtTime(7, t, 0.05);  sirenLfoG.gain.setTargetAtTime(120, t, 0.05); sirenGain.gain.setTargetAtTime(0.022, t, 0.05); }
    } catch (e) { sirenOsc = null; sirenLfo = null; }
  }
  function updateSiren() {
    const want = gh.state === 'play'
      ? (ghosts.some(g => g.state === 'eyes' || g.state === 'entering') ? 'eyes' : gh.frightT > 0 ? 'fright' : 'norm')
      : 'off';
    if (want !== sirenMode) setSiren(want);
  }

  // ════════════════ LABERINTO horneado (contornos con glow) ════════════════
  // Pared a efectos VISUALES: fuera del mapa cuenta como ABIERTO → el borde exterior también
  // dibuja su línea. Por cada arista expuesta de cada celda-pared se traza una línea inset `d`
  // hacia adentro; las puntas se extienden según el vecino (recto / esquina convexa / cóncava)
  // para que el contorno cierre perfecto. Las zonas macizas no dibujan nada adentro.
  function bakeMaze(strokeCol, glowCol, glowBlur) {
    const cv = document.createElement('canvas');
    cv.width = COLS * ts; cv.height = ROWS * ts;
    const m = cv.getContext('2d');
    const d = Math.max(2, ts * 0.30);
    const isW = (c, r) => (c >= 0 && c < COLS && r >= 0 && r < ROWS) && MAP[r][c] === '#';
    m.strokeStyle = strokeCol;
    m.lineWidth = Math.max(1.5, ts * 0.13);
    m.lineCap = 'round';
    if (glowBlur > 0) { m.shadowColor = glowCol; m.shadowBlur = glowBlur; }
    m.beginPath();
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (!isW(c, r)) continue;
      const x0 = c * ts, y0 = r * ts, x1 = x0 + ts, y1 = y0 + ts;
      const N = isW(c, r - 1), S = isW(c, r + 1), E = isW(c + 1, r), Wl = isW(c - 1, r);
      const NE = isW(c + 1, r - 1), NW = isW(c - 1, r - 1), SE = isW(c + 1, r + 1), SW = isW(c - 1, r + 1);
      if (!N) {
        const xs = !Wl ? x0 + d : (!NW ? x0 : x0 - d), xe = !E ? x1 - d : (!NE ? x1 : x1 + d);
        m.moveTo(xs, y0 + d); m.lineTo(xe, y0 + d);
      }
      if (!S) {
        const xs = !Wl ? x0 + d : (!SW ? x0 : x0 - d), xe = !E ? x1 - d : (!SE ? x1 : x1 + d);
        m.moveTo(xs, y1 - d); m.lineTo(xe, y1 - d);
      }
      if (!Wl) {
        const ys = !N ? y0 + d : (!NW ? y0 : y0 - d), ye = !S ? y1 - d : (!SW ? y1 : y1 + d);
        m.moveTo(x0 + d, ys); m.lineTo(x0 + d, ye);
      }
      if (!E) {
        const ys = !N ? y0 + d : (!NE ? y0 : y0 - d), ye = !S ? y1 - d : (!SE ? y1 : y1 + d);
        m.moveTo(x1 - d, ys); m.lineTo(x1 - d, ye);
      }
    }
    m.stroke();
    // puerta de la casa (rosa, sin glow)
    m.shadowBlur = 0;
    m.strokeStyle = '#ffb8de';
    m.lineWidth = Math.max(2, ts * 0.16);
    m.beginPath(); m.moveTo(13 * ts + ts * 0.08, 12.5 * ts); m.lineTo(15 * ts - ts * 0.08, 12.5 * ts); m.stroke();
    return cv;
  }
  function bakePellets() {
    pelletCv = document.createElement('canvas');
    pelletCv.width = COLS * ts; pelletCv.height = ROWS * ts;
    pctx = pelletCv.getContext('2d');
    pctx.fillStyle = DOT_COL;
    const s = Math.max(2, ts * 0.20);
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (dots[r * COLS + c] === 1) pctx.fillRect(c * ts + ts / 2 - s / 2, r * ts + ts / 2 - s / 2, s, s);
    }
  }
  function eatPelletAt(c, r) { pctx.clearRect(c * ts, r * ts, ts, ts); }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const barH = barEl.offsetHeight;                                             // alto real de la barra (incluye safe-area)
    W = Math.max(1, Math.floor(window.innerWidth));
    H = Math.max(1, Math.floor(window.innerHeight - barH));                      // canvas SOBRE la barra (Tron V1)
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    scl = Math.min(W / 480, H / 840);
    // laberinto centrado, con 2 filas de HUD arriba y 2 abajo
    ts = Math.max(8, Math.floor(Math.min(W / COLS, H / (ROWS + 4))));
    ox = Math.floor((W - COLS * ts) / 2);
    oy = Math.floor((H - (ROWS + 4) * ts) / 2 + 2 * ts);
    mazeCv = bakeMaze(WALL_COL, WALL_GLOW, ts * 0.5);
    mazeFlashCv = bakeMaze('#eef2ff', '#ffffff', 0);
    bakePellets();
  }
  window.addEventListener('resize', resize);

  // ════════════════ ACTORES (movimiento por aristas) ════════════════
  // posA: posición en tiles. Estados con guion (house/leaving/entering) usan sx/sy directos.
  function posA(a) {
    if (a.sx !== undefined && a.state !== 'grid' && a.state !== 'eyes') return { x: a.sx, y: a.sy };
    return { x: a.from.c + (a.to.c - a.from.c) * a.t + 0.5, y: a.from.r + (a.to.r - a.from.r) * a.t + 0.5 };
  }
  const DIRS = [{ x: 0, y: -1 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 1, y: 0 }];   // desempate clásico: ↑ ← ↓ →

  function resetActors() {
    const rel = lvlSpec(gh.level).release;
    pac = {
      from: { c: 14, r: 23 }, to: { c: 13, r: 23 }, t: 0.5,
      dirv: { x: -1, y: 0 }, desired: { x: -1, y: 0 },
      ang: Math.PI, dist: 0,
    };
    ghosts = [
      { id: 0, color: '#ff2222', corner: { c: 25, r: -2 }, state: 'grid',
        from: { c: 14, r: 11 }, to: { c: 13, r: 11 }, t: 0.5, dirv: { x: -1, y: 0 }, frightened: false },
      { id: 1, color: '#ffb8ff', corner: { c: 2, r: -2 },  state: 'house', sx: 14.0, sy: 14.5, bdir: -1, releaseT: rel[1],
        from: { c: 14, r: 14 }, to: { c: 14, r: 14 }, t: 1, dirv: { x: 0, y: -1 }, frightened: false },
      { id: 2, color: '#00ffff', corner: { c: 27, r: 33 }, state: 'house', sx: 12.0, sy: 14.8, bdir: 1, releaseT: rel[2],
        from: { c: 12, r: 14 }, to: { c: 12, r: 14 }, t: 1, dirv: { x: 0, y: -1 }, frightened: false },
      { id: 3, color: '#ffb852', corner: { c: 0, r: 33 },  state: 'house', sx: 16.0, sy: 14.8, bdir: 1, releaseT: rel[3],
        from: { c: 16, r: 14 }, to: { c: 16, r: 14 }, t: 1, dirv: { x: 0, y: -1 }, frightened: false },
    ];
    gh.frightT = 0; gh.combo = 0; gh.modeIdx = 0; gh.modeT = 0; gh.pauseT = 0;
    popups = [];
  }
  function resetLevel() {
    gh.dotsLeft = 0; gh.dotsEaten = 0; gh.fruit = null;
    dots.fill(0);
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const ch = MAP[r][c];
      if (ch === '.') { dots[r * COLS + c] = 1; gh.dotsLeft++; }
      else if (ch === 'o') { dots[r * COLS + c] = 2; gh.dotsLeft++; }
    }
    bakePellets();
    resetActors();
  }

  // ── PAC-MAN ──
  function pacSpeed() {
    const S = lvlSpec(gh.level);
    return BASE * (gh.frightT > 0 ? S.pacFr : S.pac);
  }
  function pacDecide() {
    const c = pac.from.c, r = pac.from.r, want = pac.desired;
    if (want && open(c + want.x, r + want.y)) pac.dirv = want;
    else if (pac.dirv && !open(c + pac.dirv.x, r + pac.dirv.y)) pac.dirv = null;
    if (pac.dirv) {
      pac.ang = Math.atan2(pac.dirv.y, pac.dirv.x);
      pac.to = { c: c + pac.dirv.x, r: r + pac.dirv.y };
      pac.t = 0;
    }
  }
  function updPac(dt) {
    const d = pac.desired;
    if (d && pac.dirv && d.x === -pac.dirv.x && d.y === -pac.dirv.y && pac.t < 1) {  // reversa instantánea
      const f = pac.from; pac.from = pac.to; pac.to = f; pac.t = 1 - pac.t;
      pac.dirv = d; pac.ang = Math.atan2(d.y, d.x);
    }
    if (pac.t >= 1) pacDecide();
    if (!pac.dirv) return;
    let dist = pacSpeed() * dt;
    while (dist > 1e-9 && pac.dirv) {
      const step = Math.min(dist, 1 - pac.t);
      pac.t += step; dist -= step; pac.dist += step;
      if (pac.t >= 1 - 1e-9) {
        let c = pac.to.c, r = pac.to.r;
        if (c < 0) c += COLS; else if (c >= COLS) c -= COLS;
        pac.from = { c, r }; pac.to = { c, r }; pac.t = 1;
        pacDecide();
      }
    }
  }

  // ── FANTASMAS ──
  function modePhase() { return gh.modeIdx % 2 === 0 ? 'scatter' : 'chase'; }
  function elroy() { return gh.dotsLeft <= 10 ? 2 : gh.dotsLeft <= 20 ? 1 : 0; }
  function ghostTarget(g) {
    if (g.state === 'eyes') return { c: 13, r: 11 };
    if (modePhase() === 'scatter' && !(g.id === 0 && elroy() > 0)) return g.corner;
    const pp = posA(pac);
    const pt = { c: Math.floor(pp.x), r: Math.floor(pp.y) };
    const pd = pac.dirv || { x: -1, y: 0 };
    if (g.id === 0) return pt;
    if (g.id === 1) return { c: pt.c + pd.x * 4, r: pt.r + pd.y * 4 };
    if (g.id === 2) {
      const bp = posA(ghosts[0]);
      const m = { c: pt.c + pd.x * 2, r: pt.r + pd.y * 2 };
      return { c: m.c * 2 - Math.floor(bp.x), r: m.r * 2 - Math.floor(bp.y) };
    }
    const gp = posA(g);
    const far = (gp.x - pp.x) ** 2 + (gp.y - pp.y) ** 2 > 64;
    return far ? pt : g.corner;
  }
  function ghostSpeed(g) {
    const S = lvlSpec(gh.level);
    if (g.state === 'eyes') return BASE * 1.8;
    const p = posA(g);
    const c = Math.floor(p.x);
    if (Math.floor(p.y) === TUNNEL_ROW && (c <= 5 || c >= 22)) return BASE * S.tunnel;
    if (g.frightened) return BASE * S.ghostFr;
    if (g.id === 0 && elroy() > 0) return BASE * (S.ghost + 0.05 * elroy());
    return BASE * S.ghost;
  }
  function ghostDecide(g) {
    const c = g.from.c, r = g.from.r;
    const rev = { x: -g.dirv.x, y: -g.dirv.y };
    const options = [];
    for (const d of DIRS) {
      if (d.x === rev.x && d.y === rev.y) continue;
      if (!open(c + d.x, r + d.y)) continue;
      options.push(d);
    }
    let pick;
    if (!options.length) pick = rev;
    else if (g.state === 'grid' && g.frightened) pick = options[ri(0, options.length - 1)];
    else {
      const t = ghostTarget(g);
      let best = Infinity;
      for (const d of options) {
        const dd = (c + d.x - t.c) ** 2 + (r + d.y - t.r) ** 2;
        if (dd < best - 1e-9) { best = dd; pick = d; }
      }
    }
    g.dirv = pick;
    g.to = { c: c + pick.x, r: r + pick.y };
    g.t = 0;
  }
  function reverseGhost(g) {
    if (g.state !== 'grid') return;
    const f = g.from; g.from = g.to; g.to = f; g.t = 1 - g.t;
    g.dirv = { x: -g.dirv.x, y: -g.dirv.y };
  }
  function updGhost(g, dt) {
    if (g.state === 'house') {
      g.releaseT -= dt;
      g.sy += g.bdir * dt * 1.6;
      if (g.sy > 15.0) { g.sy = 15.0; g.bdir = -1; }
      if (g.sy < 14.0) { g.sy = 14.0; g.bdir = 1; }
      if (g.releaseT <= 0) g.state = 'leaving';
      return;
    }
    if (g.state === 'leaving') {                                                 // centrarse y subir por la puerta
      const sp = 3.2 * dt;
      if (Math.abs(g.sx - 14) > 0.02) g.sx += Math.sign(14 - g.sx) * Math.min(sp, Math.abs(14 - g.sx));
      else {
        g.sx = 14; g.sy -= sp;
        if (g.sy <= 11.5) {
          g.sy = 11.5; g.state = 'grid';
          g.from = { c: 14, r: 11 }; g.to = { c: 13, r: 11 }; g.t = 0.5; g.dirv = { x: -1, y: 0 };
        }
      }
      return;
    }
    if (g.state === 'entering') {                                                // ojos: bajar a la casa y salir de nuevo
      const sp = 5 * dt;
      if (Math.abs(g.sx - 14) > 0.02) g.sx += Math.sign(14 - g.sx) * Math.min(sp, Math.abs(14 - g.sx));
      else { g.sx = 14; g.sy += sp; if (g.sy >= 14.5) { g.sy = 14.5; g.state = 'leaving'; } }
      return;
    }
    // grid / eyes: avanzar por aristas, decidiendo en cada centro
    let dist = ghostSpeed(g) * dt;
    while (dist > 1e-9) {
      const step = Math.min(dist, 1 - g.t);
      g.t += step; dist -= step;
      if (g.t >= 1 - 1e-9) {
        let c = g.to.c, r = g.to.r;
        if (c < 0) c += COLS; else if (c >= COLS) c -= COLS;
        g.from = { c, r }; g.t = 1;
        if (g.state === 'eyes' && r === 11 && (c === 13 || c === 14)) {          // llegó a la puerta
          g.state = 'entering'; g.sx = c + 0.5; g.sy = 11.5; g.frightened = false;
          return;
        }
        ghostDecide(g);
      }
    }
  }

  // ════════════════ REGLAS (comer, colisiones, niveles) ════════════════
  function addScore(n) {
    gh.score += n;
    if (!gh.extraGiven && gh.score >= 10000) { gh.extraGiven = true; gh.lives++; sndLife(); popup(14, 20.5, '+1 VIDA', '#ffe300'); }
    if (gh.score > gh.high) gh.high = gh.score;
  }
  function saveHigh() { try { localStorage.setItem('pacmanHigh', String(gh.high)); } catch (e) {} }
  function popup(x, y, txt, color) { popups.push({ x, y, txt, t: 0, color }); }

  function eatAt(c, r) {
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return;
    const v = dots[r * COLS + c];
    if (!v) return;
    dots[r * COLS + c] = 0;
    gh.dotsLeft--; gh.dotsEaten++;
    if (v === 1) { addScore(10); eatPelletAt(c, r); sndWaka(); }
    else {
      addScore(50); sndEnergizer();
      gh.frightT = lvlSpec(gh.level).fright; gh.combo = 0;
      for (const g of ghosts) {
        if (g.state === 'eyes' || g.state === 'entering') continue;
        g.frightened = true;
        reverseGhost(g);
      }
    }
    if (gh.dotsEaten === 70 || gh.dotsEaten === 170) gh.fruit = { x: 14, y: 17.5, t: 9 };
    if (gh.dotsLeft === 0) { gh.state = 'flash'; gh.stateT = 0; setSiren('off'); saveHigh(); }
  }

  function startDeath() {
    gh.state = 'dying'; gh.stateT = 0;
    setSiren('off'); sndDeath(); saveHigh();
  }
  function checkCollisions() {
    const pp = posA(pac);
    for (const g of ghosts) {
      if (g.state !== 'grid' && g.state !== 'leaving') continue;
      const gp = posA(g);
      if (Math.hypot(gp.x - pp.x, gp.y - pp.y) > 0.6) continue;
      if (g.frightened) {
        const pts = GHOST_PTS[Math.min(gh.combo, 3)];
        gh.combo++;
        addScore(pts);
        popup(gp.x, gp.y, String(pts), '#33ddff');
        sndEatGhost();
        g.frightened = false;
        if (g.state === 'grid') g.state = 'eyes';
        else { g.state = 'entering'; }                                           // lo comieron saliendo: vuelve a bajar
        gh.pauseT = 0.45;
      } else {
        startDeath();
        return;
      }
    }
  }

  // ════════════════ FLUJO DE PARTIDA ════════════════
  function startGame() {
    gh.score = 0; gh.lives = 3; gh.level = 1; gh.extraGiven = false;
    gh.firstReady = true;
    resetLevel();
    gh.state = 'ready'; gh.stateT = 0;
    ensureAudio(); sndStart();
    hideHint();
  }
  function backToMenu() {
    gh.state = 'menu'; gh.stateT = 0;
    setSiren('off'); saveHigh();
  }

  function updPlay(dt) {
    if (gh.pauseT > 0) { gh.pauseT -= dt; return; }                              // freeze al comer fantasma
    // línea de tiempo scatter/chase (pausada durante el fright)
    if (gh.frightT > 0) {
      gh.frightT -= dt;
      if (gh.frightT <= 0) { gh.frightT = 0; for (const g of ghosts) g.frightened = false; }
    } else {
      const modes = lvlSpec(gh.level).modes;
      gh.modeT += dt;
      if (gh.modeT >= modes[Math.min(gh.modeIdx, modes.length - 1)] && gh.modeIdx < modes.length - 1) {
        gh.modeIdx++; gh.modeT = 0;
        for (const g of ghosts) if (!g.frightened) reverseGhost(g);
      }
    }
    updPac(dt);
    const pp = posA(pac);
    eatAt(Math.floor(pp.x), Math.floor(pp.y));
    if (gh.state !== 'play') return;                                             // comió el último punto → flash
    if (gh.fruit) {
      gh.fruit.t -= dt;
      if (gh.fruit.t <= 0) gh.fruit = null;
      else if (Math.hypot(gh.fruit.x - pp.x, gh.fruit.y - pp.y) < 0.8) {
        const pts = FRUIT_PTS[fruitKind(gh.level)];
        addScore(pts);
        popup(gh.fruit.x, gh.fruit.y, String(pts), '#ff9ed2');
        sndFruit();
        gh.fruit = null;
      }
    }
    for (const g of ghosts) updGhost(g, dt);
    checkCollisions();
    updateSiren();
  }

  function update(dt) {
    gh.stateT += dt;
    for (const p of popups) p.t += dt;
    popups = popups.filter(p => p.t < 1);
    if (gh.state === 'play') updPlay(dt);
    else if (gh.state === 'ready') {
      if (gh.stateT >= (gh.firstReady ? 2.2 : 1.4)) {
        gh.firstReady = false;
        gh.state = 'play'; gh.stateT = 0;
        updateSiren();
      }
    } else if (gh.state === 'dying') {
      if (gh.stateT >= 2.3) {
        gh.lives--;
        if (gh.lives <= 0) { gh.state = 'gameover'; gh.stateT = 0; saveHigh(); }
        else { resetActors(); gh.state = 'ready'; gh.stateT = 0; }
      }
    } else if (gh.state === 'flash') {
      if (gh.stateT >= 2.2) {
        gh.level++;
        resetLevel();
        gh.state = 'ready'; gh.stateT = 0;
      }
    }
  }

  // ════════════════ DIBUJO ════════════════
  const px = x => ox + x * ts, py = y => oy + y * ts;

  function text(x, y, size, content, color, glow = 0, align = 'center') {
    ctx.font = `${Math.round(size)}px ${FONT}`;
    ctx.textAlign = align; ctx.textBaseline = 'middle';
    if (glow > 0) { ctx.shadowColor = color; ctx.shadowBlur = glow; }
    ctx.fillStyle = color;
    ctx.fillText(content, x, y);
    ctx.shadowBlur = 0;
  }

  function drawPacBody(x, y, r, ang, mouth) {
    ctx.fillStyle = PAC_COL;
    ctx.shadowColor = PAC_COL; ctx.shadowBlur = r * 0.6;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.arc(x, y, r, ang + mouth, ang - mouth);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  function drawPac(T) {
    const p = posA(pac);
    const r = ts * 0.62;
    let mouth = 0.08 + 0.42 * Math.abs(Math.sin(pac.dist * 7));
    if (gh.state === 'ready') mouth = 0.02;
    if (gh.state === 'dying') {
      const q = (gh.stateT - 0.5) / 1.2;
      if (q < 0) { drawWrapped(p, x => drawPacBody(x, py(p.y), r, pac.ang, 0.25)); return; }
      if (q > 1) {
        if (gh.stateT < 2.0) {                                                   // "pop" final: rayitos
          const e = (gh.stateT - 1.7) / 0.3, x = px(p.x), y = py(p.y);
          ctx.strokeStyle = `rgba(255,227,0,${1 - e})`; ctx.lineWidth = Math.max(1.5, ts * 0.1);
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const a = i / 8 * TAU + 0.4;
            ctx.moveTo(x + Math.cos(a) * r * (0.3 + e), y + Math.sin(a) * r * (0.3 + e));
            ctx.lineTo(x + Math.cos(a) * r * (0.6 + e * 1.2), y + Math.sin(a) * r * (0.6 + e * 1.2));
          }
          ctx.stroke();
        }
        return;
      }
      drawPacBody(px(p.x), py(p.y), r * (1 - q * 0.15), -Math.PI / 2, 0.25 + q * (Math.PI - 0.25));
      return;
    }
    drawWrapped(p, x => drawPacBody(x, py(p.y), r, pac.ang, mouth));
  }
  // cerca de los bordes del túnel dibuja la copia envuelta del otro lado
  function drawWrapped(p, fn) {
    fn(px(p.x));
    if (p.x < 1.5) fn(px(p.x + COLS));
    if (p.x > COLS - 1.5) fn(px(p.x - COLS));
  }

  function drawGhostBody(x, y, r, color, dir, mode, T) {
    // cuerpo: domo + faldón zigzag animado
    const yTop = y - r * 0.1;
    const yBase = y + r * 0.95;
    const body = mode === 'fright' ? '#2121de' : mode === 'flash' ? '#f3f3ff' : color;
    if (mode !== 'eyes') {
      ctx.fillStyle = body;
      ctx.shadowColor = body; ctx.shadowBlur = r * 0.45;
      ctx.beginPath();
      ctx.arc(x, yTop, r, Math.PI, 0);
      ctx.lineTo(x + r, yBase);
      const segs = 6, phase = Math.floor(T * 9) % 2;
      for (let i = 0; i <= segs; i++) {
        const sx = x + r - (2 * r * i / segs);
        const sy = yBase - (((i + phase) % 2) ? r * 0.22 : 0);
        ctx.lineTo(sx, sy);
      }
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    if (mode === 'fright' || mode === 'flash') {
      const fc = mode === 'flash' ? '#ff3b3b' : '#ffffff';
      ctx.fillStyle = fc;
      ctx.beginPath(); ctx.arc(x - r * 0.35, yTop, r * 0.14, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(x + r * 0.35, yTop, r * 0.14, 0, TAU); ctx.fill();
      ctx.strokeStyle = fc; ctx.lineWidth = Math.max(1.5, r * 0.12);
      ctx.beginPath();
      const mw = r * 1.1, mn = 4, my = y + r * 0.42;
      for (let i = 0; i <= mn * 2; i++) {
        const zx = x - mw / 2 + mw * i / (mn * 2);
        const zy = my + ((i % 2) ? -r * 0.12 : r * 0.12);
        i ? ctx.lineTo(zx, zy) : ctx.moveTo(zx, zy);
      }
      ctx.stroke();
    } else {
      // ojos blancos + pupilas mirando hacia dir
      const ex = r * 0.4, eyeY = yTop - r * 0.05;
      const dx = dir.x * r * 0.16, dy = dir.y * r * 0.16;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(x - ex, eyeY, r * 0.3, r * 0.38, 0, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + ex, eyeY, r * 0.3, r * 0.38, 0, 0, TAU); ctx.fill();
      ctx.fillStyle = '#2030e0';
      ctx.beginPath(); ctx.arc(x - ex + dx, eyeY + dy, r * 0.16, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(x + ex + dx, eyeY + dy, r * 0.16, 0, TAU); ctx.fill();
    }
  }
  function drawGhost(g, T) {
    const p = posA(g);
    const r = ts * 0.72;
    let mode = 'norm';
    if (g.state === 'eyes' || g.state === 'entering') mode = 'eyes';
    else if (g.frightened) mode = (gh.frightT < 1.8 && Math.floor(gh.frightT * 5) % 2 === 0) ? 'flash' : 'fright';
    drawWrapped(p, x => drawGhostBody(x, py(p.y), r, g.color, g.dirv, mode, T));
  }

  function drawFruitIcon(x, y, s, kind) {
    ctx.save();
    ctx.translate(x, y);
    if (kind === 0) {                                                            // cereza
      ctx.strokeStyle = '#9be36b'; ctx.lineWidth = s * 0.16;
      ctx.beginPath();
      ctx.moveTo(-s * 0.28, s * 0.1); ctx.quadraticCurveTo(-s * 0.1, -s * 0.7, s * 0.5, -s * 0.78);
      ctx.moveTo(s * 0.3, s * 0.22); ctx.quadraticCurveTo(s * 0.32, -s * 0.4, s * 0.5, -s * 0.78);
      ctx.stroke();
      ctx.fillStyle = '#ff3030';
      ctx.beginPath(); ctx.arc(-s * 0.3, s * 0.35, s * 0.4, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(s * 0.32, s * 0.45, s * 0.4, 0, TAU); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath(); ctx.arc(-s * 0.42, s * 0.24, s * 0.1, 0, TAU); ctx.fill();
    } else if (kind === 1) {                                                     // frutilla
      ctx.fillStyle = '#ff2e2e';
      ctx.beginPath();
      ctx.moveTo(0, s * 0.85);
      ctx.quadraticCurveTo(-s * 0.95, s * 0.1, -s * 0.5, -s * 0.35);
      ctx.quadraticCurveTo(0, -s * 0.6, s * 0.5, -s * 0.35);
      ctx.quadraticCurveTo(s * 0.95, s * 0.1, 0, s * 0.85);
      ctx.fill();
      ctx.fillStyle = '#7ddd4f';
      ctx.beginPath(); ctx.ellipse(0, -s * 0.42, s * 0.42, s * 0.2, 0, 0, TAU); ctx.fill();
      ctx.fillStyle = '#ffe9b0';
      for (const [qx, qy] of [[-0.25, 0.1], [0.2, 0.05], [0, 0.4], [-0.1, -0.12], [0.3, 0.35]])
        ctx.fillRect(qx * s - s * 0.05, qy * s - s * 0.05, s * 0.1, s * 0.1);
    } else if (kind === 2) {                                                     // naranja
      ctx.fillStyle = '#ff9020';
      ctx.beginPath(); ctx.arc(0, s * 0.12, s * 0.62, 0, TAU); ctx.fill();
      ctx.strokeStyle = '#7ddd4f'; ctx.lineWidth = s * 0.16;
      ctx.beginPath(); ctx.moveTo(0, -s * 0.4); ctx.quadraticCurveTo(s * 0.1, -s * 0.7, s * 0.4, -s * 0.7); ctx.stroke();
      ctx.fillStyle = '#5cb83c';
      ctx.beginPath(); ctx.ellipse(-s * 0.2, -s * 0.5, s * 0.25, s * 0.12, -0.5, 0, TAU); ctx.fill();
    } else if (kind === 3) {                                                     // manzana
      ctx.fillStyle = '#e62222';
      ctx.beginPath(); ctx.arc(-s * 0.22, s * 0.15, s * 0.45, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(s * 0.22, s * 0.15, s * 0.45, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(0, s * 0.3, s * 0.45, 0, TAU); ctx.fill();
      ctx.strokeStyle = '#7a4a22'; ctx.lineWidth = s * 0.14;
      ctx.beginPath(); ctx.moveTo(0, -s * 0.2); ctx.lineTo(s * 0.12, -s * 0.62); ctx.stroke();
      ctx.fillStyle = '#7ddd4f';
      ctx.beginPath(); ctx.ellipse(s * 0.3, -s * 0.5, s * 0.2, s * 0.1, 0.5, 0, TAU); ctx.fill();
    } else if (kind === 4) {                                                     // melón
      ctx.fillStyle = '#49c24c';
      ctx.beginPath(); ctx.arc(0, s * 0.05, s * 0.62, 0, TAU); ctx.fill();
      ctx.strokeStyle = '#2c8a30'; ctx.lineWidth = s * 0.1;
      for (const a of [-0.6, 0, 0.6]) {
        ctx.beginPath(); ctx.moveTo(a * s * 0.62, -s * 0.5); ctx.quadraticCurveTo(a * s * 0.9, s * 0.05, a * s * 0.62, s * 0.6); ctx.stroke();
      }
    } else if (kind === 5) {                                                     // campana
      ctx.fillStyle = '#ffd34d';
      ctx.beginPath();
      ctx.moveTo(-s * 0.55, s * 0.45);
      ctx.quadraticCurveTo(-s * 0.55, -s * 0.55, 0, -s * 0.6);
      ctx.quadraticCurveTo(s * 0.55, -s * 0.55, s * 0.55, s * 0.45);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(-s * 0.55, s * 0.45, s * 1.1, s * 0.16);
      ctx.beginPath(); ctx.arc(0, s * 0.7, s * 0.12, 0, TAU); ctx.fill();
    } else {                                                                     // llave
      ctx.strokeStyle = '#9fd8ff'; ctx.lineWidth = s * 0.16;
      ctx.beginPath(); ctx.arc(0, -s * 0.4, s * 0.26, 0, TAU); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -s * 0.14); ctx.lineTo(0, s * 0.7);
      ctx.moveTo(0, s * 0.3); ctx.lineTo(s * 0.3, s * 0.3);
      ctx.moveTo(0, s * 0.55); ctx.lineTo(s * 0.3, s * 0.55);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawHud() {
    const fp = Math.max(8, ts * 0.55);
    const yTop = oy - ts * 1.1;
    text(ox + ts * 0.2, yTop, fp, 'PUNTOS ' + gh.score, '#fff', 0, 'left');
    text(ox + COLS * ts - ts * 0.2, yTop, fp, 'RECORD ' + gh.high, '#ffb8de', 0, 'right');
    const yBot = oy + ROWS * ts + ts * 1.0;
    for (let i = 0; i < Math.min(5, gh.lives - 1); i++)
      drawPacBody(ox + ts * (1 + i * 1.5), yBot, ts * 0.5, Math.PI, 0.5);
    text(ox + COLS * ts * 0.5, yBot, fp, 'NIVEL ' + gh.level, 'rgba(255,255,255,0.65)');
    const kMax = fruitKind(gh.level);
    const nIcons = Math.min(3, gh.level);
    for (let i = 0; i < nIcons; i++)
      drawFruitIcon(ox + COLS * ts - ts * (0.9 + i * 1.6), yBot, ts * 0.5, Math.max(0, kMax - i));
  }

  function drawGame(T) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    // laberinto (en flash alterna azul/blanco)
    const flashing = gh.state === 'flash' && Math.floor(gh.stateT * 4) % 2 === 1;
    ctx.drawImage(flashing ? mazeFlashCv : mazeCv, ox, oy);
    if (gh.state !== 'flash') {
      ctx.drawImage(pelletCv, ox, oy);
      // energizantes (parpadean)
      if (Math.floor(T * 4) % 2 === 0 || gh.state !== 'play') {
        ctx.fillStyle = DOT_COL;
        ctx.shadowColor = DOT_COL; ctx.shadowBlur = ts * 0.5;
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
          if (dots[r * COLS + c] === 2) {
            ctx.beginPath(); ctx.arc(px(c + 0.5), py(r + 0.5), ts * 0.42, 0, TAU); ctx.fill();
          }
        }
        ctx.shadowBlur = 0;
      }
    }
    if (gh.fruit) drawFruitIcon(px(gh.fruit.x), py(gh.fruit.y), ts * 0.62, fruitKind(gh.level));
    if (gh.state !== 'flash' && !(gh.state === 'dying' && gh.stateT > 0.5)) {
      for (const g of ghosts) drawGhost(g, T);
    }
    if (gh.state !== 'gameover') drawPac(T);
    for (const p of popups) {
      text(px(p.x), py(p.y) - p.t * ts * 0.8, Math.max(8, ts * 0.5), p.txt, p.color, 6);
      ctx.globalAlpha = 1;
    }
    drawHud();
    if (gh.state === 'ready') text(px(14), py(17.5), Math.max(10, ts * 0.8), '¡LISTO!', PAC_COL, 12);
    if (gh.state === 'gameover') {
      text(px(14), py(14.5), Math.max(10, ts * 0.8), 'GAME OVER', '#ff3b3b', 14);
      text(px(14), py(17.5), Math.max(8, ts * 0.55), 'tocá o Enter para jugar de nuevo', '#ddd', 0);
    }
  }

  // ── MENÚ estilo TronV2: título glow + animación de persecución + botón JUGAR ──
  let playBox = null;
  function drawTitle(T) {
    const fp = Math.min(W / 8.5, H * 0.075);
    const x = W / 2, y = H * 0.22;
    const breathe = 0.5 + 0.5 * Math.sin(T * 1.6);
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `${Math.round(fp)}px ${FONT}`;
    const haloR = fp * 2.4;
    const g = ctx.createRadialGradient(x, y, 0, x, y, haloR);
    g.addColorStop(0, `rgba(255,227,0,${0.13 + 0.1 * breathe})`); g.addColorStop(1, 'rgba(255,227,0,0)');
    ctx.fillStyle = g; ctx.fillRect(x - haloR, y - haloR, haloR * 2, haloR * 2);
    ctx.shadowColor = PAC_COL; ctx.fillStyle = PAC_COL;
    for (const blur of [34, 18, 0]) { ctx.shadowBlur = blur * (0.7 + 0.3 * breathe); ctx.fillText('PAC-MAN', x, y); }
    ctx.shadowBlur = 10; ctx.fillStyle = `rgba(255,255,255,${0.35 + 0.25 * breathe})`;
    ctx.fillText('PAC-MAN', x, y);
    ctx.restore();
  }
  function drawChase(T) {
    // pac persiguiendo / perseguido en loop, comiendo una hilera de puntos
    const y = H * 0.42, r = Math.max(10, ts * 0.8);
    const span = W + r * 14;
    const xPac = ((T * W * 0.18) % span) - r * 7;
    ctx.save();
    ctx.fillStyle = DOT_COL;
    const gap = r * 2.2;
    for (let x = Math.ceil((xPac + r * 1.6) / gap) * gap; x < W + gap; x += gap)
      ctx.fillRect(x - r * 0.14, y - r * 0.14, r * 0.28, r * 0.28);
    drawPacBody(xPac, y, r, 0, 0.1 + 0.4 * Math.abs(Math.sin(T * 14)));
    const cols = ['#ff2222', '#ffb8ff', '#00ffff', '#ffb852'];
    for (let i = 0; i < 4; i++)
      drawGhostBody(xPac - r * (3 + i * 2.4), y, r * 0.95, cols[i], { x: 1, y: 0 }, 'norm', T);
    ctx.restore();
  }
  function drawMenu(T) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    // campo de puntitos tenue de fondo
    const step = Math.max(34, Math.round(Math.min(W, H) / 12));
    ctx.fillStyle = 'rgba(255,199,168,0.10)';
    for (let x = step / 2; x < W; x += step) for (let y = step / 2; y < H; y += step)
      ctx.fillRect(x - 1, y - 1, 2, 2);
    drawTitle(T);
    drawChase(T);
    text(W / 2, H * 0.55, Math.max(9, 13 * scl), 'RECORD  ' + gh.high, '#ffb8de', 0);
    // botón JUGAR (caja redondeada amarilla, como el de Tron)
    const fp = Math.max(12, 22 * scl);
    ctx.font = `${Math.round(fp)}px ${FONT}`;
    const tw = ctx.measureText('▶ JUGAR').width;
    const bw = tw + fp * 1.6, bh = fp * 2.2, bx = W / 2 - bw / 2, by = H * 0.68 - bh / 2;
    playBox = { x: bx, y: by, w: bw, h: bh };
    const pulse = 0.6 + 0.4 * Math.sin(T * 4);
    ctx.save();
    ctx.shadowColor = PAC_COL; ctx.shadowBlur = 16;
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,227,0,0.8)';
    ctx.fillStyle = 'rgba(255,227,0,0.12)';
    ctx.beginPath();
    const rr = bh / 2;
    ctx.moveTo(bx + rr, by); ctx.arcTo(bx + bw, by, bx + bw, by + bh, rr); ctx.arcTo(bx + bw, by + bh, bx, by + bh, rr);
    ctx.arcTo(bx, by + bh, bx, by, rr); ctx.arcTo(bx, by, bx + bw, by, rr); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 10;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(255,255,255,${0.8 + 0.2 * pulse})`;
    ctx.fillText('▶ JUGAR', W / 2, by + bh / 2);
    ctx.restore();
    text(W / 2, H * 0.86, Math.max(8, 10 * scl), 'deslizá o usá flechas/WASD', 'rgba(150,160,175,0.8)');
    text(W / 2, H * 0.86 + Math.max(14, 18 * scl), Math.max(8, 10 * scl), 'comé los puntos · esquivá fantasmas', 'rgba(150,160,175,0.6)');
  }

  // ════════════════ INPUT ════════════════
  const KEY_DIRS = {
    ArrowUp: { x: 0, y: -1 }, KeyW: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 }, KeyS: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, KeyA: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, KeyD: { x: 1, y: 0 },
  };
  window.addEventListener('keydown', e => {
    ensureAudio();
    const d = KEY_DIRS[e.code];
    if (d) {
      if (pac) pac.desired = d;
      e.preventDefault();
    }
    if (e.code === 'Enter' && (gh.state === 'menu' || gh.state === 'gameover')) startGame();
    if (e.code === 'Escape' && gh.state !== 'menu') backToMenu();
    if (e.code === 'Space') e.preventDefault();
  });

  // swipe: cualquier arrastre en la pantalla marca la dirección; el ancla se resetea al disparar,
  // así podés encadenar swipes sin levantar el dedo (estilo joystick).
  let swipe = null;
  canvas.addEventListener('pointerdown', e => {
    ensureAudio();
    hideHint();
    swipe = { id: e.pointerId, x: e.clientX, y: e.clientY, moved: false };
    if (gh.state === 'menu' && playBox) {
      const r = canvas.getBoundingClientRect();
      const lx = e.clientX - r.left, ly = e.clientY - r.top;
      if (lx >= playBox.x && lx <= playBox.x + playBox.w && ly >= playBox.y - 14 && ly <= playBox.y + playBox.h + 14) startGame();
    } else if (gh.state === 'gameover' && gh.stateT > 0.6) {
      startGame();
    }
  });
  canvas.addEventListener('pointermove', e => {
    if (!swipe || e.pointerId !== swipe.id) return;
    const dx = e.clientX - swipe.x, dy = e.clientY - swipe.y;
    const thr = Math.max(18, ts * 0.8);
    if (Math.hypot(dx, dy) < thr) return;
    const d = Math.abs(dx) > Math.abs(dy) ? { x: Math.sign(dx), y: 0 } : { x: 0, y: Math.sign(dy) };
    if (pac) pac.desired = d;
    swipe.x = e.clientX; swipe.y = e.clientY; swipe.moved = true;
  });
  const endSwipe = e => { if (swipe && e.pointerId === swipe.id) swipe = null; };
  canvas.addEventListener('pointerup', endSwipe);
  canvas.addEventListener('pointercancel', endSwipe);

  function tappable(el, fn) { el && el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); }); }
  tappable(document.getElementById('btnReset'), () => { ensureAudio(); if (gh.state !== 'menu') startGame(); });
  const btnSound = document.getElementById('btnSound');
  btnSound.classList.toggle('off', muted);
  tappable(btnSound, () => {
    muted = !muted;
    try { localStorage.setItem('pacmanMuted', muted ? '1' : '0'); } catch (e) {}
    btnSound.classList.toggle('off', muted);
    ensureAudio();
    if (master) master.gain.value = muted ? 0 : 1;
  });

  const hint = document.getElementById('hint');
  function hideHint() { hint.style.opacity = '0'; }
  setTimeout(hideHint, 6000);

  // ════════════════ LOOP ════════════════
  // dt medido contra el MISMO reloj (el now que entra) y clampeado — igual que TronV2.
  let lastT = null;
  let T = 0;
  function loop(now) {
    if (typeof now !== 'number') now = performance.now();
    if (lastT === null) lastT = now;
    let dt = (now - lastT) / 1000;
    lastT = now;
    if (!(dt >= 0) || dt > 0.05) dt = 0.01;
    T += dt;

    if (gh.state === 'menu') drawMenu(T);
    else { update(dt); drawGame(T); }

    requestAnimationFrame(loop);
  }

  // ── INIT ──
  resize();
  resetLevel();                                                                  // deja actores listos para el menú/ready
  loop();
  window.addEventListener('beforeunload', saveHigh);
  </script>

  <!-- Shell del Arcade (exit + fullscreen + lock de orientación). -->
  <script src="../../Arcade/arcade-shell.js" data-orient="portrait"></script>

  <div id="fpsOverlay">FPS: --</div>
  <script>
    (function () {
      let frameCount = 0, lastT = performance.now();
      const overlay = document.getElementById('fpsOverlay');
      const btnInfo = document.getElementById('btnInfo');
      let on = false;
      if (btnInfo) btnInfo.addEventListener('pointerdown', e => { e.preventDefault(); on = !on; overlay.style.display = on ? 'block' : 'none'; btnInfo.classList.toggle('on', on); });
      function tick() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          if (on) overlay.textContent = 'FPS: ' + Math.round(frameCount * 1000 / (now - lastT));
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(tick);
      }
      tick();
    })();
  </script>
</body>
</html>
