<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Balls</title>
<style>
  :root { --bar-height: 66px; }                                                  /* tweak to taste */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  /* Canvas occupies only the space ABOVE the bar — physics walls are sized to this rect, so balls
     can't fall behind the buttons. Dimensions are set explicitly from JS each resize. */
  #c {
    display: block; position: absolute;
    top: 0; left: 0;
  }

  #hint {
    position: absolute; left: 0; right: 0; top: calc(10px + env(safe-area-inset-top));
    text-align: center; color: rgba(255,255,255,0.5);
    font-size: 13px; letter-spacing: 0.04em; pointer-events: none;
    transition: opacity 0.8s; z-index: 2; padding: 0 16px;
  }

  /* Bottom bar: contains the count + the three action buttons. Opaque-ish background so it reads as a
     bezel rather than a HUD overlay. */
  #bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(var(--bar-height) + env(safe-area-inset-bottom));
    padding: 0 16px env(safe-area-inset-bottom);
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 3;
  }
  #ui {
    display: flex; gap: 8px;
  }
  #ui button {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none;
    transition: background 0.1s, transform 0.08s;
    padding: 0;
  }
  #ui button:active { background: rgba(255,255,255,0.22); transform: scale(0.92); }
  /* SVG icons: inherit color via currentColor so they tint with the toggled-on state. Sized per-button
     because each glyph has its own visual weight. */
  #ui button svg { display: block; width: 22px; height: 22px; pointer-events: none; }
  #ui #btnPin    svg { width: 19px; height: 19px; }
  #ui #btnMinus  svg, #ui #btnPlus svg { width: 24px; height: 24px; }
  #ui #btnReset  svg { width: 21px; height: 21px; }
  /* visual indicator for toggled-on state */
  #ui button.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); }

  /* Info: chico, en la esquina abajo-derecha. Lives outside #ui so the main row stays centered. */
  #btnDebug {
    position: absolute;
    right: 6px;
    bottom: calc(env(safe-area-inset-bottom) + 4px);
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
  }
  #btnDebug svg { display: block; width: 14px; height: 14px; pointer-events: none; }
  #btnDebug:active { background: rgba(255,255,255,0.22); transform: scale(0.9); }
  #btnDebug.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); color: #fff; }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">arrastrá para tirar · usá ↑ para saltar · +/− para las bolas</div>
  <div id="bar">
    <div id="ui">
      <button id="btnJump"  aria-label="saltar"  title="Saltar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 11l6-6 6 6"/></svg>
      </button>
      <button id="btnPin"   aria-label="fijar"   title="Fijar (chinche)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 3h8v1.5h-1.5v5l2.5 3.5v1h-5v6.5l-1 1-1-1v-6.5h-5v-1l2.5-3.5v-5H8z"/></svg>
      </button>
      <button id="btnWall"  aria-label="modo"    title="Modo de pared"></button>
      <button id="btnMinus" aria-label="quitar"  title="Quitar bola">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 12h12"/></svg>
      </button>
      <button id="btnPlus"  aria-label="agregar" title="Agregar bola">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 6v12M6 12h12"/></svg>
      </button>
      <button id="btnReset" aria-label="reiniciar" title="Reiniciar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg>
      </button>
    </div>
    <button id="btnDebug" aria-label="debug" title="Info / debug">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>

  <!-- Física. Vendorizado local (matter-js 0.19.0) — evita que un hipo del CDN deje el juego sin arrancar. -->
  <script src="matter.min.js"></script>
  <script>
  // ════════════════════════════════════════════════════════════════════
  //  BALLS — port web fiel del sandbox de pymunk.
  // ════════════════════════════════════════════════════════════════════
  const TAU = Math.PI * 2;
  const mod = (a, n) => ((a % n) + n) % n;
  const ri  = (a, b) => a + Math.floor(Math.random() * (b - a + 1)); // randint inclusivo
  const rnd = (a, b) => a + Math.random() * (b - a);

  // ── TUNING KNOBS ──
  const GRAVITY_Y        = 1.4;       // bumped from 1.0 → snappier falls without changing the rest of the feel
  const BALL_BALL_RESTITUTION = 0.3;   // ball↔ball — matches the pymunk pre_solve override; lower = sticky piles, higher = jittery
  const BALL_WALL_RESTITUTION = 0.65;  // ball↔wall — matches pymunk; Matter.js uses max(a, b) when combining, so wall=0.65 + ball=0.3 → collision uses 0.65
  const BALL_FRICTION    = 0.25;
  const BALL_FRICTION_AIR= 0.006;
  const R_MIN_FRAC       = 0.040;
  const R_MAX_FRAC       = 0.085;
  const COLLISION_RADIUS_MULT = 1.03; // collider radius vs. visual radius — bumped out a touch so balls leave a small visible gap at rest instead of touching pixel-tight
  const BALL_ALPHA       = 0.7;    // translucency of the ball BODY (base color sphere + under-glow). Lower = more glass-like. Specular hotspot stays opaque so the marble still has a sharp highlight.
  const PATTERN_ALPHA    = 1;      // translucency of the PATTERN overlay (stripes / dots / dot-rims). Higher than BALL_ALPHA so the pattern reads as solid paint sitting on top of the glass body.
  const MAX_BALLS        = 100;
  const INITIAL_BALLS    = 1;
  const GROWTH_RATE      = 250;    // px/s de la animación de crecer/encoger (como pymunk).

  const GRAB_GAIN        = 0.5;
  const GRAB_MAX_SPEED   = 55;
  const MOUSE_SMOOTH_TC  = 0.04;   // time constant (sec) of the pointer-velocity low-pass — port of pymunk's MOUSE_SMOOTH_TC. Frame-rate independent via smoothing = 1 - exp(-dt/TC).

  const JUMP_VELOCITY    = 22;
  const ANGULAR_DAMPING_TC = 0.8;  // time constant (sec) for extra angular-velocity decay. Matter.js's frictionAir damps linear+angular together; this knob lets us bleed spin faster without making the balls float. Lower = stops rotating sooner.
  const SHAKE_THRESHOLD  = 22;
  const SHAKE_COOLDOWN_MS= 600;

  // Sonido — todos canica, samples reales grabados por Franco en sounds/cuts/.
  const SND_MAX_PER_FRAME = 1;                                                    // hard ceiling para no saturar cuando se desplomen varias bolas a la vez
  const PITCH_JITTER     = 0.06;                                                  // ± random sobre playbackRate, naturaliza repetición de samples
  // Umbrales en matter velocity units (px/step, ~×60 = px/s).
  const VTHR_AUDIBLE     = 2.5;                                                   // por debajo no suena nada (vibración numérica)
  const VTHR_MED         = 6;                                                     // bajo→medio
  const VTHR_HARD        = 13;                                                    // medio→fuerte; arriba de esto suena MarbleClick a fondo
  // Roll loop: cuándo una bola "rueda" en el piso (sólo wallMode 1).
  const ROLL_MIN_HSPEED  = 4;                                                     // vy horizontal mínima para empezar a sonar
  const ROLL_FULL_HSPEED = 18;                                                    // vy horizontal donde el gain del roll llega al máximo

  // ── SETUP MATTER ──
  const { Engine, World, Bodies, Body, Composite, Query, Vector, Sleeping } = Matter;
  const engine = Engine.create();                                                  // no enableSleeping — Matter.js sleeping wasn't waking bodies reliably on grab/collision and balls were getting stuck dead
  engine.gravity.y = GRAVITY_Y;
  const world = engine.world;

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0, dpr = 1;
  let walls = [];
  let wallMode = 1;                                                                // 1 = all 4 walls (default), 2 = sides wrap + top/floor bounce, 3 = all wrap (no walls). Port of WALL_MODE from pymunk.
  const pinnedBodies = new Map();                                                  // body → {x, y} for every pinned ball; position+velocity overwritten each frame so they stay nailed. Grabbing a pinned ball unpins it automatically.
  let showDebug = false;                                                           // toggles the debug HUD (FPS, off-screen count)

  function buildWalls() {
    for (const w of walls) World.remove(world, w);
    walls = [];
    const t = 600;                                                                 // thick offscreen so a ball pushed past the edge stays inside the capsule and gets shoved back in — same intent as WALL_THICKNESS=100 in pymunk
    const opt = { isStatic: true, restitution: BALL_WALL_RESTITUTION, friction: 0.4 };
    if (wallMode === 1) {                                                          // mode 1: top + floor at the screen edge
      walls.push(Bodies.rectangle(W/2, -t/2,    W + 2*t, t, opt));
      walls.push(Bodies.rectangle(W/2, H + t/2, W + 2*t, t, opt));
    }
    if (wallMode === 1 || wallMode === 2) {                                        // side walls at the screen edge in mode 1 AND mode 2
      walls.push(Bodies.rectangle(-t/2, H/2,    t, H + 2*t, opt));
      walls.push(Bodies.rectangle(W + t/2, H/2, t, H + 2*t, opt));
    }
    World.add(world, walls);
  }
  const barEl = document.getElementById('bar');
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const barH = barEl.offsetHeight;                                             // includes the safe-area-inset-bottom padding on iOS
    W = window.innerWidth;
    H = window.innerHeight - barH;                                               // physics + canvas span only the area above the bar; floor wall lines up with the bar's top edge
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildWalls();
  }
  window.addEventListener('resize', resize);

  // ── COLOR ──
  const clamp = v => Math.max(0, Math.min(255, v|0));
  function hsv255(h, s, v) {
    const i = Math.floor(h*6), f = h*6 - i;
    const p = v*(1-s), q = v*(1-f*s), t = v*(1-(1-f)*s);
    const m = [[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]][i%6];
    return [Math.round(m[0]*255), Math.round(m[1]*255), Math.round(m[2]*255)];
  }
  const tint    = (c, t) => [clamp(c[0]*t), clamp(c[1]*t), clamp(c[2]*t)];
  const rgbStr  = (c, t=1) => `rgb(${clamp(c[0]*t)},${clamp(c[1]*t)},${clamp(c[2]*t)})`;

  // ════════════════ MÁSCARAS DE PATRÓN (port de Balls.py) ════════════════
  // Todas dibujan blanco en coords locales centradas en (0,0); el caller hace translate/rotate.
  function stripesFlat(m, r, n) {
    const spacing = (2*r)/n, bandW = spacing*0.5;
    for (let i = 0; i < n; i++) {
      const off = (i - (n-1)*0.5) * spacing;
      m.fillRect(off - bandW*0.5, -r, bandW, 2*r);
    }
  }
  function stripesSphere(m, r, n, fillRatio) {
    const phiStep = Math.PI/n, halfW = phiStep*0.5*fillRatio;
    for (let yy = -r; yy <= r; yy++) {
      const crossR = Math.sqrt(Math.max(0, r*r - yy*yy));
      for (let i = 0; i < n; i++) {
        const phiC = -Math.PI*0.5 + (i+0.5)*phiStep;
        const xL = Math.sin(phiC - halfW) * crossR;
        const xR = Math.sin(phiC + halfW) * crossR;
        if (xR > xL) m.fillRect(xL, yy, xR - xL, 1);
      }
    }
  }
  function stripesSpiral(m, r, nTurns, handed) {
    const bandR = r*0.11, nSteps = Math.max(120, Math.floor(r*nTurns*6));
    for (let i = 0; i <= nSteps; i++) {
      const t = i/nSteps, lat = -Math.PI*0.5 + t*Math.PI, lonBase = handed*t*nTurns*TAU;
      for (const lonOff of [0, Math.PI]) {
        const lonN = mod(lonBase + lonOff + Math.PI, TAU) - Math.PI;
        if (lonN < -Math.PI*0.5 || lonN > Math.PI*0.5) continue;
        const cosLat = Math.cos(lat), sinLat = Math.sin(lat);
        const cosLon = Math.cos(lonN), sinLon = Math.sin(lonN);
        const rEff = bandR * Math.max(0.25, cosLat*cosLon);
        m.beginPath(); m.arc(r*cosLat*sinLon, -r*sinLat, rEff, 0, TAU); m.fill();
      }
    }
  }
  function stripesPinwheel(m, r, n, angle, twist) {
    const period = TAU/n, halfPeriod = period*0.5, twoPiTwist = twist*TAU;
    for (let yy = -r; yy <= r; yy++) {
      const crossR = Math.sqrt(Math.max(0, r*r - yy*yy));
      const xMax = Math.ceil(crossR);
      let inStripe = false, runStart = -xMax;
      for (let xx = -xMax; xx <= xMax; xx++) {
        const rr = Math.hypot(xx, yy);
        let now = false;
        if (rr <= r) {
          const phase = Math.atan2(yy, xx) + angle + twoPiTwist*(rr/r);
          now = mod(phase, period) < halfPeriod;
        }
        if (now !== inStripe) {
          if (inStripe) m.fillRect(runStart, yy, xx - runStart, 1);
          runStart = xx; inStripe = now;
        }
      }
      if (inStripe) m.fillRect(runStart, yy, xMax - runStart + 1, 1);
    }
  }
  function dotsSphere(m, r, nDots) {
    const pos = [], centerR = r*0.28;
    m.beginPath(); m.arc(0, 0, centerR, 0, TAU); m.fill(); pos.push([0, 0, centerR]);
    const theta = 50*Math.PI/180, ringR2D = r*Math.sin(theta), ringDotR = centerR*Math.cos(theta);
    const rot = Math.random()*TAU;
    for (let i = 0; i < nDots; i++) {
      const a = rot + (i/nDots)*TAU, dx = Math.cos(a)*ringR2D, dy = Math.sin(a)*ringR2D;
      m.beginPath(); m.arc(dx, dy, ringDotR, 0, TAU); m.fill(); pos.push([dx, dy, ringDotR]);
    }
    return pos;
  }
  function dotsCandy(m, r, nDots) {
    const pos = [], safeR = r*0.85, minR = r*0.16, maxR = r*0.28;
    let att = 0;
    while (pos.length < nDots && att < 400) {
      att++;
      const rDot = rnd(minR, maxR), d = Math.sqrt(Math.random())*Math.max(0, safeR - rDot*0.4), a = Math.random()*TAU;
      const px = Math.cos(a)*d, py = Math.sin(a)*d;
      if (pos.every(q => Math.hypot(px-q[0], py-q[1]) > (rDot+q[2])*0.82)) {
        pos.push([px, py, rDot]);
        m.beginPath(); m.arc(px, py, rDot, 0, TAU); m.fill();
      }
    }
    return pos;
  }
  function dotsHex(m, r) {
    const pos = [], spacing = r*0.30, big = spacing*0.34, small = spacing*0.20;
    const cellW = spacing, cellH = spacing*Math.sqrt(3)*0.5, clipR = r - big*1.6;
    const bigParity = Math.floor(Math.random()*2);
    const nRows = Math.floor(r/cellH)+2, nCols = Math.floor(r/cellW)+2;
    for (let row = -nRows; row <= nRows; row++) {
      const rowOff = (row & 1) ? cellW*0.5 : 0;
      for (let col = -nCols; col <= nCols; col++) {
        const px = col*cellW + rowOff, py = row*cellH;
        if (px*px + py*py <= clipR*clipR) {
          const dotR = (((row+col) & 1) === bigParity) ? big : small;
          m.beginPath(); m.arc(px, py, dotR, 0, TAU); m.fill(); pos.push([px, py, dotR]);
        }
      }
    }
    return pos;
  }

  function drawMask(m, e, cx, cy, r) {
    // Render every pattern into a high supersample temp canvas, then blit it down with image smoothing
    // enabled — gives strong antialiasing for the scanline-based patterns (sphere/diamond/pinwheel) and
    // tightens the dotted ones too. SS=4 means 16× the pixels of a straight render; cost is per-bake
    // (one-time per ball), no per-frame impact. imageSmoothingQuality 'high' is the spec max — actual
    // "ultra" quality comes from increasing SS, not from the smoothing API.
    const SS = 7;
    const R = r * SS;
    const tmp = document.createElement('canvas');
    tmp.width = tmp.height = Math.ceil(2*R) + 4;
    const tc = tmp.getContext('2d');
    tc.fillStyle = '#fff';
    tc.translate(tmp.width*0.5, tmp.height*0.5);

    let localDots = null;
    switch (e.style) {
      case 'striped_flat':     tc.rotate(e.styleAngle); stripesFlat(tc, R, e.n); break;
      case 'striped_sphere':   tc.rotate(e.styleAngle); stripesSphere(tc, R, e.n, 0.5); break;
      case 'striped_spiral':   tc.rotate(e.styleAngle); stripesSpiral(tc, R, e.n, e.handed); break;
      case 'striped_diamond':  tc.rotate(e.styleAngle); stripesSphere(tc, R, e.n, 0.18); tc.rotate(Math.PI/3); stripesSphere(tc, R, e.n, 0.18); break;
      case 'striped_pinwheel': stripesPinwheel(tc, R, e.n, e.styleAngle, e.twist); break;
      case 'dotted_sphere':    localDots = dotsSphere(tc, R, e.nDots); break;
      case 'dotted_candy':     localDots = dotsCandy(tc, R, e.nDots); break;
      case 'dotted_hex':       localDots = dotsHex(tc, R); break;
    }

    const prevSmooth = m.imageSmoothingEnabled;
    const prevQuality = m.imageSmoothingQuality;
    m.imageSmoothingEnabled = true;
    m.imageSmoothingQuality = 'high';
    // Blit twice — the second pass pushes anti-aliased edge alpha closer to 1 so the pattern doesn't
    // look ghosted/transparent through its outline (source-over compounds: 0.5 → 0.75 → 0.875…).
    m.drawImage(tmp, cx - r - 1, cy - r - 1, tmp.width / SS, tmp.height / SS);
    m.drawImage(tmp, cx - r - 1, cy - r - 1, tmp.width / SS, tmp.height / SS);
    m.imageSmoothingEnabled = prevSmooth;
    m.imageSmoothingQuality = prevQuality;

    // Dot positions are in the SS-space — convert back to the final-canvas scale + global offset.
    return localDots ? localDots.map(([x,y,dr]) => [cx + x/SS, cy + y/SS, dr/SS]) : null;
  }

  // ════════════════ BAKE (esfera + patrón + hotspot), 1 vez por bola ════════════════
  function newOff(S) {
    const o = document.createElement('canvas');
    o.width = o.height = Math.ceil(S*dpr);
    const c = o.getContext('2d'); c.scale(dpr, dpr);
    return { o, c };
  }
  function paintSphere(o, cx, cy, r, color) {
    // Main lighting: light from upper-right (lx,ly = 0.35,-0.94 in pymunk units) → bright highlight up there,
    // deep shadow on the opposite side.
    const lx = cx + r*0.21, ly = cy - r*0.564;
    const grad = o.createRadialGradient(lx, ly, r*0.05, cx, cy, r);
    grad.addColorStop(0,   rgbStr(color, 1.65));
    grad.addColorStop(0.5, rgbStr(color, 1.0));
    grad.addColorStop(1,   rgbStr(color, 0.45));
    o.fillStyle = grad;
    o.beginPath(); o.arc(cx, cy, r, 0, TAU); o.fill();
  }
  function drawHotspot(o, cx, cy, specR) {
    const rCore = Math.max(2, specR);
    o.fillStyle = 'rgba(255,255,255,0.086)'; o.beginPath(); o.arc(cx, cy, rCore*3, 0, TAU); o.fill();
    o.fillStyle = 'rgba(255,255,255,0.216)'; o.beginPath(); o.arc(cx, cy, rCore*2, 0, TAU); o.fill();
    o.fillStyle = 'rgba(255,255,255,1)';     o.beginPath(); o.arc(cx, cy, rCore,   0, TAU); o.fill();
  }
  function bakeBall(e) {
    const r = Math.round(e.targetR), S = r*2 + 4, cx = S/2, cy = S/2;
    const { o, c } = newOff(S);

    // Body (color sphere) at BALL_ALPHA = translucent glass. Pattern (dot rims + overlay + under-glow)
    // at PATTERN_ALPHA = mostly opaque, so the decoration and the refracted-light bottom-spot read
    // clearly on top of the glass body. Hotspot + outer rim go on top with full alpha so the marble
    // still has a sharp specular highlight.
    c.globalAlpha = BALL_ALPHA;
    paintSphere(c, cx, cy, r, e.color);
    c.globalAlpha = PATTERN_ALPHA;

    if (e.style !== 'plain') {
      const mask = newOff(S);
      const dots = drawMask(mask.c, e, cx, cy, r);
      // rim oscuro alrededor de los lunares cuando el overlay es tenue (igual que pymunk)
      if (dots && Math.max(...e.overlay) < 200) {
        c.fillStyle = 'rgba(0,0,0,0.27)';
        for (const [px, py, dr] of dots) { c.beginPath(); c.arc(px, py, dr + Math.max(1, dr*0.07), 0, TAU); c.fill(); }
      }
      // overlay = esfera en overlayColor, recortada por la máscara (= BLEND_RGBA_MULT)
      const ov = newOff(S);
      paintSphere(ov.c, cx, cy, r, e.overlay);
      ov.c.globalCompositeOperation = 'destination-in';
      ov.c.drawImage(mask.o, 0, 0, S, S);
      ov.c.globalCompositeOperation = 'source-over';
      c.drawImage(ov.o, 0, 0, S, S);
    }
    c.globalAlpha = 1;

    drawHotspot(c, cx + r*0.21, cy - r*0.564, Math.max(2, r*0.06));
    c.strokeStyle = 'rgba(255,255,255,0.14)'; c.lineWidth = 1;
    c.beginPath(); c.arc(cx, cy, r - 0.5, 0, TAU); c.stroke();

    e.sprite = o; e.spriteHalf = S/2;
  }

  // ════════════════ BOLAS (objetos con estado growing/live/removing) ════════════════
  let balls = [];
  function liveCount() { let n = 0; for (const e of balls) if (e.state !== 'removing') n++; return n; }

  function makeBall(x, y) {
    if (liveCount() >= MAX_BALLS) return;
    const minDim = Math.min(W, H);
    const r = rnd(R_MIN_FRAC, R_MAX_FRAC) * minDim;

    // color + complementario potencial
    const hue = Math.random();
    const color = hsv255(hue, rnd(0.95, 1.0), rnd(0.95, 1.0));

    // estilo (mismas probabilidades y parámetros que Balls.py)
    const sr = Math.random();
    const e = { color, targetR: r, visR: 1, x, y, angle: 0, state: 'growing' };
    if      (sr < 0.1) { e.style='striped_flat';     e.styleAngle=rnd(0,Math.PI); e.n=ri(3,7); }
    else if (sr < 0.2) { e.style='striped_sphere';   e.styleAngle=rnd(0,Math.PI); e.n=ri(3,7); }
    else if (sr < 0.3) { e.style='striped_spiral';   e.styleAngle=rnd(0,TAU); e.n=ri(3,6); e.handed=Math.random()<0.5?-1:1; }
    else if (sr < 0.4) { e.style='striped_diamond';  e.styleAngle=rnd(0,Math.PI); e.n=ri(5,8); }
    else if (sr < 0.5) { e.style='striped_pinwheel'; e.styleAngle=rnd(0,TAU); e.n=ri(5,8); e.twist=rnd(0.6,1.2)*(Math.random()<0.5?-1:1); }
    else if (sr < 0.6) { e.style='dotted_sphere';    e.nDots=ri(5,8); }
    else if (sr < 0.7) { e.style='dotted_candy';     e.nDots=ri(6,12); }
    else if (sr < 0.8) { e.style='dotted_hex'; }
    else               { e.style='plain'; }

    // overlay color
    if (e.style === 'plain') e.overlay = null;
    else if (e.style === 'dotted_candy') e.overlay = tint(color, 1.8);
    else {
      const o = Math.random();
      if (o < 0.25) e.overlay = [255,255,255];                                      // white pattern: 25%
      else if (o < 0.50) e.overlay = [18, 18, 18];                                  // black pattern: 25% — genuine near-black, not a tint of the base color
      else e.overlay = hsv255(mod(hue+0.5, 1), 0.95, 1.0);                          // complementary hue (two-tone ball): 50%
    }

    bakeBall(e);

    // cuerpo (creado ya, pero se agrega al mundo recién cuando termina de crecer)
    const body = Bodies.circle(x, y, r * COLLISION_RADIUS_MULT, {
      restitution: BALL_BALL_RESTITUTION, friction: BALL_FRICTION,
      frictionAir: BALL_FRICTION_AIR, density: 0.001,
    });
    e.body = body;
    balls.push(e);
    return e;
  }

  function addBall() {
    audioResume();
    makeBall(rnd(W*0.15, W*0.85), rnd(H*0.12, H*0.4));
  }
  function removeBall() {
    // la última 'live' que no esté agarrada (las pineadas SÍ se pueden remover — se desclavan al irse)
    for (let i = balls.length - 1; i >= 0; i--) {
      const e = balls[i];
      if (e.state === 'live' && !isGrabbedBody(e.body)) {
        if (pinnedBodies.has(e.body)) {
          Body.setStatic(e.body, false);                                           // restore dynamic before removal so the body state is consistent
          pinnedBodies.delete(e.body);
          document.getElementById('btnPin').classList.toggle('on', pinnedBodies.size > 0);
        }
        e.x = e.body.position.x; e.y = e.body.position.y; e.angle = e.body.angle;
        World.remove(world, e.body); e.state = 'removing';
        return;
      }
    }
  }
  function reset() {
    audioResume();
    const n = liveCount() || INITIAL_BALLS;                                        // preserve the current population (only fall back to INITIAL_BALLS if somehow there are none alive)
    for (const e of balls) { stopRollNode(e); if (e.state === 'live') World.remove(world, e.body); }
    balls = [];
    for (const ps of pointers.values()) ps.grab = null;                            // drop any grabs but keep the active pointer entries so currently-held fingers keep working
    pinnedBodies.clear();
    document.getElementById('btnPin').classList.remove('on');
    for (let i = 0; i < n; i++)
      makeBall(rnd(W*0.1, W*0.9), rnd(H*0.1, H*0.5));
  }

  function updateGrowth(dt) {
    const step = GROWTH_RATE * dt;                                                 // dt-driven so growth/shrink runs at the same wall-clock speed regardless of frame rate
    for (const e of balls) {
      if (e.state === 'growing') {
        e.visR += step;
        if (e.visR >= e.targetR) { e.visR = e.targetR; e.state = 'live'; World.add(world, e.body); }
      } else if (e.state === 'removing') {
        e.visR -= step;
      }
    }
    balls = balls.filter(e => {
      if (e.state === 'removing' && e.visR <= 1) { stopRollNode(e); return false; }
      return true;
    });
  }

  function wrapBalls() {
    // Teleport balls that left the playfield in the wrap-active axes — pymunk has no native wrapping either; same idea.
    if (wallMode === 1) return;                                                    // mode 1: all walls present, no wrap
    for (const e of balls) {
      if (e.state !== 'live') continue;
      if (pinnedBodies.has(e.body)) continue;
      const r = e.body.circleRadius;
      const p = e.body.position;
      let nx = p.x, ny = p.y;
      // mode 2: vertical wrap (top/floor open). mode 3: wrap in both axes.
      if (wallMode === 2 || wallMode === 3) {
        if (ny < -r) ny = H + r;
        else if (ny > H + r) ny = -r;
      }
      if (wallMode === 3) {
        if (nx < -r) nx = W + r;
        else if (nx > W + r) nx = -r;
      }
      if (nx !== p.x || ny !== p.y) Body.setPosition(e.body, { x: nx, y: ny });
    }
  }

  function drawGlowRing(x, y, r, color) {
    // 6-layer halo at 1.10× radius, brightened color, alpha sweeping outer→inner. Port of the
    // pymunk grabbed-ball glow ring — visual confirmation of which ball is being held.
    const outerR = r * 1.10;
    const layers = 6;
    const halo = tint(color, 1.7);
    for (let i = 0; i < layers; i++) {
      const u = i / (layers - 1);
      const rL = outerR - (outerR - r) * u;
      const alpha = (90 + 130 * u) / 255;
      ctx.fillStyle = `rgba(${halo[0]},${halo[1]},${halo[2]},${alpha})`;
      ctx.beginPath(); ctx.arc(x, y, rL, 0, TAU); ctx.fill();
    }
  }
  function drawBall(e) {
    let x, y, ang, scale;
    if (e.state === 'live') { x = e.body.position.x; y = e.body.position.y; ang = e.body.angle; scale = 1; }
    else { x = e.x; y = e.y; ang = e.angle; scale = e.visR / e.targetR; }
    if (isGrabbedBody(e.body)) drawGlowRing(x, y, e.targetR * scale, e.color);
    const h = e.spriteHalf * scale;
    ctx.save();
    ctx.translate(x, y); ctx.rotate(ang);
    ctx.drawImage(e.sprite, -h, -h, h*2, h*2);
    ctx.restore();
  }

  // ── SALTO ──
  function jumpAll() {
    for (const e of balls) {
      if (e.state !== 'live') continue;
      if (isGrabbedBody(e.body)) continue;
      if (pinnedBodies.has(e.body)) continue;                                      // pinned balls don't jump — and even though they're static, setVelocity would shift positionPrev and leak as a kick when unpinned
      Body.setVelocity(e.body, { x: e.body.velocity.x, y: -JUMP_VELOCITY });
    }
  }

  // ── INPUT ──
  // Multi-touch: every active pointer (finger / mouse) has its own state in `pointers`, and each one
  // can independently grab and throw a ball. No master "grab" singleton.
  const pointers = new Map();                                                      // pointerId → { x, y, vx, vy, lastMoveT, grab }

  function evtPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

  function grabbedBodySet() {
    const s = new Set();
    for (const ps of pointers.values()) if (ps.grab) s.add(ps.grab.body);
    return s;
  }
  function isGrabbedBody(body) {
    for (const ps of pointers.values()) if (ps.grab && ps.grab.body === body) return true;
    return false;
  }
  function tryGrabAt(p, exclude) {
    // Allow grabbing pinned bodies (they're static, so we'd normally filter them out — but the user
    // needs a way to select them so the pin button can release them).
    const hits = Query.point(Composite.allBodies(world), p).filter(b => (!b.isStatic || pinnedBodies.has(b)) && !exclude.has(b));
    if (!hits.length) return null;
    const body = hits[hits.length - 1];
    return { body, offX: body.position.x - p.x, offY: body.position.y - p.y };
  }

  canvas.addEventListener('pointerdown', e => {
    audioResume(); enableMotion();
    canvas.setPointerCapture(e.pointerId);
    const p = evtPos(e);
    const ps = { x: p.x, y: p.y, vx: 0, vy: 0, lastMoveT: performance.now(), grab: null };
    pointers.set(e.pointerId, ps);
    ps.grab = tryGrabAt(p, grabbedBodySet());                                       // first ball under this finger (excluding ones held by other fingers)
  });
  canvas.addEventListener('pointermove', e => {
    const ps = pointers.get(e.pointerId);
    if (!ps) return;
    const p = evtPos(e);
    // Frame-rate independent low-pass per pointer: smoothing = 1 - exp(-dt/TC), same shape as the pymunk
    // mouseVx/Vy filter. vx/vy is px/sec.
    const now = performance.now();
    const dt = Math.max(0.001, Math.min(0.1, (now - ps.lastMoveT) / 1000));
    ps.lastMoveT = now;
    const rawVx = (p.x - ps.x) / dt;
    const rawVy = (p.y - ps.y) / dt;
    const k = 1 - Math.exp(-dt / MOUSE_SMOOTH_TC);
    ps.vx += (rawVx - ps.vx) * k;
    ps.vy += (rawVy - ps.vy) * k;
    ps.x = p.x; ps.y = p.y;
    // Held-touch grab: if this finger isn't holding anything yet but is passing over a free ball, grab it.
    if (!ps.grab) ps.grab = tryGrabAt(p, grabbedBodySet());
  });
  function endPointer(e) {
    const ps = pointers.get(e.pointerId);
    if (!ps) return;
    pointers.delete(e.pointerId);
    if (ps.grab && !ps.grab.body.isStatic) {
      // vx/vy are px/sec; matter velocity is "displacement per step", so multiply by current loop dt.
      // Pinned (static) bodies skip the throw — releasing a finger on a pinned ball doesn't fling it.
      const k = dtSmoothed;
      Body.setVelocity(ps.grab.body, { x: ps.vx * k, y: ps.vy * k });
      Body.setAngularVelocity(ps.grab.body, (ps.vx / ps.grab.body.circleRadius) * k);
    }
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('contextmenu', e => { e.preventDefault(); });            // only suppress the OS context menu on long-press / right-click — jump is now the explicit button

  // botones (con mantener-apretado en +/−)
  // Touch capture implícito: cuando ponés un dedo en un botón el browser lo "captura", entonces los
  // pointermove/leave no dispararían aunque arrastres fuera. releasePointerCapture libera eso para que
  // los moves fluyan al elemento debajo; además trackeamos bounds en document.pointermove para parar
  // cuando el dedo se sale del botón (drag-off cancela el hold, como pediste).
  function holdable(el, fn) {
    let iv = null, pid = null;
    const stop = () => {
      if (iv) { clearInterval(iv); iv = null; }
      pid = null;
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', stop);
      document.removeEventListener('pointercancel', stop);
    };
    const onMove = e => {
      if (e.pointerId !== pid) return;
      const r = el.getBoundingClientRect();
      if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) stop();
    };
    const start = e => {
      e.preventDefault(); audioResume();
      pid = e.pointerId;
      try { el.releasePointerCapture(e.pointerId); } catch {}
      fn();
      iv = setInterval(fn, 60);
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', stop);
      document.addEventListener('pointercancel', stop);
    };
    el.addEventListener('pointerdown', start);
  }
  // Single-tap helper: fires on pointerdown so the button responds while another finger is busy on
  // the canvas (e.g. holding a ball). click events get suppressed by the browser when there's an
  // active pointer in another element, hence the manual pointerdown wiring.
  function tappable(el, fn) {
    el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); });
  }
  holdable(document.getElementById('btnPlus'), addBall);
  holdable(document.getElementById('btnMinus'), removeBall);
  tappable(document.getElementById('btnReset'), reset);
  tappable(document.getElementById('btnJump'), jumpAll);

  // Wall mode: cycles 1 → 2 → 3 → 1. SVG per modo (encapsulado / túnel / abriéndose).
  // Rebuilds the wall set on each tap.
  const WALL_ICONS = {
    // 1 = caja completa (rect cerrado)
    1: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="4" y="5" width="16" height="14" rx="1.5"/></svg>',
    // 2 = dos paredes laterales (túnel, techo y piso abiertos)
    2: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M7 4v16M17 4v16"/></svg>',
    // 3 = 4 flechas en diagonal desde el centro hacia afuera (abriéndose / wrap)
    3: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 10 4 4M4 9V4h5M14 10l6-6M15 4h5v5M10 14l-6 6M4 15v5h5M14 14l6 6M20 15v5h-5"/></svg>',
  };
  const btnWall = document.getElementById('btnWall');
  btnWall.innerHTML = WALL_ICONS[wallMode];
  tappable(btnWall, () => {
    wallMode = (wallMode % 3) + 1;
    btnWall.innerHTML = WALL_ICONS[wallMode];
    buildWalls();
    if (wallMode !== 1) stopAllRolls();                                            // sin piso, no hay rolls que seguir
  });

  // Pin: tap toggles the pinned state of each currently-grabbed ball. Pinning makes the body STATIC
  // (Matter.js treats it as a wall — other balls bounce off without budging it, even under heavy pile
  // weight). The grab is released on pin so the finger is free. Unpinning restores the dynamic body
  // and KEEPS the grab so you can drag it away immediately. Tap with nothing grabbed is a no-op.
  // Other ways to clear pins: reset, or minus to remove the ball.
  const btnPin = document.getElementById('btnPin');
  tappable(btnPin, () => {
    for (const ps of pointers.values()) {
      if (!ps.grab) continue;
      const body = ps.grab.body;
      if (pinnedBodies.has(body)) {
        Body.setStatic(body, false);                                               // back to dynamic — mass/inertia restored by Matter.js
        Body.setVelocity(body, { x: 0, y: 0 });                                    // matter.js setStatic(false) doesn't reset positionPrev, so any leftover from before the pin (or numerical drift) leaks back as a velocity kick on unpin. Force a clean zero.
        Body.setAngularVelocity(body, 0);
        pinnedBodies.delete(body);
      } else {
        Body.setStatic(body, true);                                                // mass/inertia → ∞; the solver can't move it
        pinnedBodies.set(body, { x: body.position.x, y: body.position.y });
        ps.grab = null;
      }
    }
    btnPin.classList.toggle('on', pinnedBodies.size > 0);
  });

  // Debug HUD toggle.
  const btnDebug = document.getElementById('btnDebug');
  tappable(btnDebug, () => {
    showDebug = !showDebug;
    btnDebug.classList.toggle('on', showDebug);
  });

  // ── ACELERÓMETRO (requiere HTTPS / WebView de la app) ──
  let motionReady = false, lastShake = 0;
  function enableMotion() {
    if (motionReady) return; motionReady = true;
    const DME = window.DeviceMotionEvent;
    if (DME && typeof DME.requestPermission === 'function')
      DME.requestPermission().then(s => { if (s === 'granted') window.addEventListener('devicemotion', onMotion); }).catch(()=>{});
    else if (DME) window.addEventListener('devicemotion', onMotion);
  }
  function onMotion(e) {
    const a = e.accelerationIncludingGravity; if (!a) return;
    const mag = Math.hypot(a.x||0, a.y||0, a.z||0);
    if (mag > SHAKE_THRESHOLD && performance.now() - lastShake > SHAKE_COOLDOWN_MS) { lastShake = performance.now(); jumpAll(); }
  }

  // ════════════════ SONIDO ════════════════
  // Sistema de samples reales — todas canicas. Files en sounds/cuts/. Cada "bucket" tiene N variantes
  // numeradas (ej: MarbleLowClick.mp3, MarbleLowClick2.mp3, …); cuando hay que tocar uno se pickea
  // random del pool del bucket. Buffers se cargan async al primer audioResume() (autoplay policy).
  let actx = null;
  const SOUND_DIR = 'sounds/';
  // bucket → cuántas variantes esperar (sin sufijo + sufijo numérico 2..N)
  const SOUND_BUCKETS = {
    MarbleClick:       1,
    MarbleLowClick:    6,
    MarblesInHand:     5,
    MarblesInHandB:    3,
    ShortBounceEnd:    1,
    ShortDoubleBounce: 1,
    LongRoll:          1,
  };
  const soundBuffers = {};                                                         // bucket → AudioBuffer[]
  let samplesLoading = false;
  // Cooldowns por bucket: clicks fuertes con más espacio (no saturar), bag con menos (queremos densidad
  // cuando el grabbed está revolviendo una pila).
  const BUCKET_COOLDOWN = {
    MarbleClick:       80,
    MarbleLowClick:    120,
    MarblesInHand:     100,
    MarblesInHandB:    100,
    ShortBounceEnd:    90,
    ShortDoubleBounce: 70,
  };
  const lastBucketT = {};
  let sndThisFrame = 0;

  async function loadSamples() {
    if (samplesLoading || !actx) return;
    samplesLoading = true;
    for (const [bucket, count] of Object.entries(SOUND_BUCKETS)) {
      soundBuffers[bucket] = soundBuffers[bucket] || [];
      for (let i = 0; i < count; i++) {
        if (soundBuffers[bucket][i]) continue;
        const suffix = i === 0 ? '' : String(i + 1);                               // archivo: Name.mp3, Name2.mp3, Name3.mp3, …
        try {
          const r = await fetch(`${SOUND_DIR}${bucket}${suffix}.mp3`);
          if (!r.ok) continue;
          const arr = await r.arrayBuffer();
          soundBuffers[bucket][i] = await actx.decodeAudioData(arr);
        } catch (_) { /* missing variant: pool just queda más chico */ }
      }
      soundBuffers[bucket] = soundBuffers[bucket].filter(Boolean);                 // compactar huecos así random pickea uniforme
    }
  }

  function audioResume() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    loadSamples();
  }

  // pitch modulation por tamaño: chica = más aguda, grande = más grave. Multiplicador sobre playbackRate.
  function pitchForBall(b) {
    const minDim = Math.min(W, H);
    const r = b.circleRadius / COLLISION_RADIUS_MULT;                              // radio visual (deshace el inflado del collider)
    const sizeNorm = (r/minDim - R_MIN_FRAC) / (R_MAX_FRAC - R_MIN_FRAC);          // 0=chica, 1=grande
    return 1.0 + (0.5 - sizeNorm) * 0.35;                                          // 1.175 (chica) … 0.825 (grande)
  }

  function playBuffer(buf, gain, pitch) {
    const g = actx.createGain(); g.gain.value = gain; g.connect(actx.destination);
    const src = actx.createBufferSource(); src.buffer = buf;
    src.playbackRate.value = pitch;
    src.connect(g); src.start(actx.currentTime);
  }

  function tryPlay(bucket, intensity, basePitch) {
    if (!actx) return;
    const pool = soundBuffers[bucket];
    if (!pool || !pool.length) return;
    const now = performance.now();
    if (now - (lastBucketT[bucket] || 0) < (BUCKET_COOLDOWN[bucket] || 50)) return;
    if (sndThisFrame >= SND_MAX_PER_FRAME) return;
    const buf = pool[Math.floor(Math.random() * pool.length)];
    const pitch = (basePitch || 1) * (1 + (Math.random()*2 - 1) * PITCH_JITTER);
    const gain = Math.max(0.1, Math.min(1, intensity)) * 0.5;
    playBuffer(buf, gain, pitch);
    lastBucketT[bucket] = now;
    sndThisFrame++;
  }

  Matter.Events.on(engine, 'collisionStart', ev => {
    for (const pair of ev.pairs) {
      const { bodyA, bodyB } = pair;
      const vrel = Vector.magnitude(Vector.sub(bodyA.velocity, bodyB.velocity));
      if (vrel < VTHR_AUDIBLE) continue;

      const grabbed = isGrabbedBody(bodyA) || isGrabbedBody(bodyB);
      const wallHit = bodyA.isStatic || bodyB.isStatic;
      // Para pitch: usamos la bola (más chica gana — más aguda).
      let pitchBody;
      if (wallHit) pitchBody = bodyA.isStatic ? bodyB : bodyA;
      else pitchBody = (bodyA.circleRadius <= bodyB.circleRadius) ? bodyA : bodyB;
      const pitch = pitchForBall(pitchBody);

      // Los sonidos InHand NO se dispararan acá — viven en updateBagSounds(), que cuenta cuántas bolas
      // toca el grabbed cada frame y sólo dispara cuando el contador ≥ BAG_MIN_CONTACTS. Mientras tanto
      // los clicks fuertes/suaves siguen el flujo normal igual que para bolas libres.
      const intensity = (vrel - VTHR_AUDIBLE) / (VTHR_HARD - VTHR_AUDIBLE);
      if (false && vrel >= VTHR_HARD && !grabbed) {                                // MarbleClick DESACTIVADO de momento — todo hit fuerte cae a MarbleLowClick. Restaurar quitando `false &&`.
        tryPlay('MarbleClick', Math.min(1, intensity), pitch);
      } else if (vrel >= VTHR_MED) {
        tryPlay('MarbleLowClick', intensity, pitch);
      } else {
        // baja velocidad: el sample específico depende de qué chocó.
        if (wallHit) {
          tryPlay('MarbleLowClick', intensity * 0.7, pitch);                      // ShortBounceEnd desactivado de momento — todo wall-hit a baja velocidad usa MarbleLowClick suave
        } else {
          tryPlay('MarbleLowClick', intensity * 0.7, pitch);                       // ShortDoubleBounce desactivado de momento — bola-bola a baja velocidad usa MarbleLowClick suave
        }
      }
    }
  });

  // ── ROLL LOOP ──
  // Sample LongRoll en loop continuo por bola que esté "rodando" en el piso (sólo wallMode 1).
  // Cada bola tiene un nodo {src, gain}; el gain se modula con la velocidad horizontal y se atenúa
  // cuando deja de rodar. Cleanup en remove/reset/cambio de wallMode.
  const ROLL_NEAR_FLOOR_FRAC = 0.4;                                                // ventana vertical: dentro de r*0.4 del piso cuenta como "en el piso"
  const ROLL_ATTACK_TC = 0.08;                                                     // segundos para subir el volumen
  const ROLL_RELEASE_TC = 0.18;                                                    // segundos para bajarlo

  function stopRollNode(e) {
    if (!e || !e.rollNode) return;
    try { e.rollNode.src.stop(); } catch {}
    try { e.rollNode.src.disconnect(); } catch {}
    try { e.rollNode.gain.disconnect(); } catch {}
    e.rollNode = null;
  }
  function stopAllRolls() { for (const e of balls) stopRollNode(e); }

  function updateRollSounds(dt) {
    if (!actx || !soundBuffers.LongRoll || !soundBuffers.LongRoll.length) return;
    const buf = soundBuffers.LongRoll[0];
    for (const e of balls) {
      const b = e.body;
      if (e.state !== 'live' || b.isStatic) { stopRollNode(e); continue; }
      const r = b.circleRadius;
      const distToFloor = H - b.position.y - r;                                    // 0 = tocando piso, >0 = arriba, <0 = pasado
      const onFloor = wallMode === 1 && distToFloor < r * ROLL_NEAR_FLOOR_FRAC && distToFloor > -r * 1.5;
      const hSpeed = Math.abs(b.velocity.x);
      const rolling = onFloor && hSpeed > ROLL_MIN_HSPEED;
      if (rolling) {
        if (!e.rollNode) {
          const src = actx.createBufferSource();
          src.buffer = buf; src.loop = true;
          src.playbackRate.value = pitchForBall(b);
          const gain = actx.createGain(); gain.gain.value = 0;
          src.connect(gain).connect(actx.destination);
          try { src.start(); } catch {}
          e.rollNode = { src, gain };
        }
        const t = Math.min(1, (hSpeed - ROLL_MIN_HSPEED) / (ROLL_FULL_HSPEED - ROLL_MIN_HSPEED));
        const target = t * 0.35;                                                   // tope de gain del roll para no tapar los clicks
        const k = 1 - Math.exp(-dt / ROLL_ATTACK_TC);
        e.rollNode.gain.gain.value += (target - e.rollNode.gain.gain.value) * k;
      } else if (e.rollNode) {
        const k = 1 - Math.exp(-dt / ROLL_RELEASE_TC);
        e.rollNode.gain.gain.value *= 1 - k;
        if (e.rollNode.gain.gain.value < 0.002) stopRollNode(e);
      }
    }
  }

  // ── BAG SOUNDS ──
  // InHand sólo suena cuando la bola grabbed está tocando ≥ BAG_MIN_CONTACTS bolas no-estáticas al mismo
  // tiempo (estado "metiste la mano en la bolsa, hay revoltijo"). Corremos el conteo cada frame usando
  // engine.pairs.list (los pares activos que mantiene matter.js); pickea bucket A/B random y deja que
  // tryPlay aplique su cooldown.
  const BAG_MIN_CONTACTS = 4;
  function updateBagSounds() {
    if (!actx) return;
    for (const ps of pointers.values()) {
      if (!ps.grab) continue;
      const b = ps.grab.body;
      if (b.isStatic) continue;
      let n = 0;
      for (const p of engine.pairs.list) {
        if (!p.isActive) continue;
        const other = p.bodyA === b ? p.bodyB : (p.bodyB === b ? p.bodyA : null);
        if (other && !other.isStatic) n++;
      }
      if (n >= BAG_MIN_CONTACTS) {
        const bucket = Math.random() < 0.65 ? 'MarblesInHand' : 'MarblesInHandB';
        tryPlay(bucket, Math.min(1, 0.5 + n / 16), pitchForBall(b));               // gain crece con la cantidad de contactos
      }
    }
  }

  // ── LOOP ──
  let lastT = performance.now();
  let dtSmoothed = 1/60;                                                           // for the FPS readout
  function loop(now) {
    if (typeof now !== 'number') now = performance.now();
    const dt = Math.min(0.05, (now - lastT) / 1000);                               // real dt in seconds, clamped to 50ms (= 20 fps min) so a window-blur freeze doesn't explode the physics
    lastT = now;
    dtSmoothed = dtSmoothed*0.9 + dt*0.1;
    sndThisFrame = 0;

    // Chase each grabbed ball toward its owning finger's position. Multi-touch: one chase per pointer.
    // Pinned bodies are static and stay nailed — they show the grab glow but don't move until the
    // pin button releases them.
    for (const ps of pointers.values()) {
      if (!ps.grab) continue;
      const b = ps.grab.body;
      if (b.isStatic) continue;
      const tx = ps.x + ps.grab.offX, ty = ps.y + ps.grab.offY;
      let vx = (tx - b.position.x)*GRAB_GAIN, vy = (ty - b.position.y)*GRAB_GAIN;
      const sp = Math.hypot(vx, vy);
      if (sp > GRAB_MAX_SPEED) { vx *= GRAB_MAX_SPEED/sp; vy *= GRAB_MAX_SPEED/sp; }
      Body.setVelocity(b, { x: vx, y: vy });
      Body.setAngularVelocity(b, 0);
    }

    // Pin: no per-frame override needed — pinned bodies are STATIC in matter.js (see btnPin handler).
    // Static bodies inherently ignore forces and collisions.

    updateGrowth(dt);
    Engine.update(engine, dt * 1000);                                              // matter.js wants milliseconds; passing the real dt keeps physics in step with wall-clock
    updateRollSounds(dt);
    updateBagSounds();

    // extra angular damping — exponential decay independent of frictionAir
    const angDecay = Math.exp(-dt / ANGULAR_DAMPING_TC);
    for (const e of balls) {
      if (e.state !== 'live') continue;
      if (e.body.isStatic) continue;
      if (isGrabbedBody(e.body)) continue;
      Body.setAngularVelocity(e.body, e.body.angularVelocity * angDecay);
    }

    wrapBalls();

    ctx.clearRect(0, 0, W, H);
    for (const e of balls) drawBall(e);
    if (showDebug) drawDebugHUD();
    requestAnimationFrame(loop);
  }

  function drawDebugHUD() {
    const liveBalls = balls.filter(e => e.state === 'live');
    const lines = [
      'FPS: ' + Math.round(1/Math.max(1e-3, dtSmoothed)),
      'Balls: ' + liveBalls.length,
      'Pinned: ' + pinnedBodies.size,
    ];
    const lh = 18, padX = 8, padY = 8;
    const statsW = 110;

    // Top-10 speeds bar chart — port of the pymunk debug overlay. Matter.js velocity es por step;
    // multiplico ×60 para mostrar algo cercano a px/s (asumiendo target 60fps), igual que Balls.py.
    const top = liveBalls
      .map(e => ({ e, sp: Math.hypot(e.body.velocity.x, e.body.velocity.y) }))
      .sort((a, b) => b.sp - a.sp)
      .slice(0, 10);
    const labelW = 28, barW = 160, barH = 11, rowGap = 16, speedW = 56;
    const chartX = padX;                                                           // chart a la izquierda
    const chartY = padY;
    const chartW = 8 + labelW + barW + 6 + speedW;

    // stats a la derecha del chart (o pegado al borde izquierdo si no hay bolas)
    const statsX = top.length ? (chartX + chartW + 8) : padX;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(statsX, padY, statsW, lh*lines.length + 8);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = '13px ui-monospace, Menlo, Consolas, monospace';
    ctx.textBaseline = 'top';
    lines.forEach((s, i) => ctx.fillText(s, statsX + 6, padY + 4 + i*lh));

    if (!top.length) return;
    const chartH = 22 + rowGap*top.length;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(chartX, chartY, chartW, chartH);
    const topSp = Math.max(1, top[0].sp);
    ctx.fillStyle = 'rgba(200,200,200,0.9)';
    ctx.font = '11px ui-monospace, Menlo, Consolas, monospace';
    ctx.fillText('Top ' + top.length + '  (max ' + (topSp*60).toFixed(0) + ' px/s)', chartX + 6, chartY + 4);
    for (let i = 0; i < top.length; i++) {
      const { e, sp } = top[i];
      const y = chartY + 20 + i*rowGap;
      ctx.fillStyle = 'rgba(200,200,200,0.85)';
      ctx.fillText('#' + (i+1), chartX + 4, y);
      const bx = chartX + 4 + labelW;
      ctx.fillStyle = 'rgba(50,50,50,0.9)';
      ctx.fillRect(bx, y, barW, barH);
      const fillW = Math.min(barW, barW * sp / topSp);
      if (fillW > 0) {
        ctx.fillStyle = rgbStr(e.color, 1);
        ctx.fillRect(bx, y, fillW, barH);
      }
      ctx.fillStyle = 'rgba(220,220,220,0.85)';
      ctx.fillText((sp*60).toFixed(0), bx + barW + 6, y);
    }
  }

  // ── INIT ──
  resize();
  for (let i = 0; i < INITIAL_BALLS; i++) makeBall(rnd(W*0.1, W*0.9), rnd(H*0.1, H*0.5));
  loop();

  const hint = document.getElementById('hint');
  setTimeout(() => hint.style.opacity = '0', 5000);
  canvas.addEventListener('pointerdown', () => hint.style.opacity = '0', { once: true });
  </script>
</body>
</html>
