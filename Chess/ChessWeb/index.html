    game.grid[tc][tr] = piece;
    piece.hasMoved = true;
    if (extra.promotion) {
      const promoted = newPiece(piece.color, 'Q');
      promoted.hasMoved = true;
      game.grid[tc][tr] = promoted;
    }

    game.lastMove = [fc, fr, tc, tr];
    game.enPassant = newEp;
    game.turn = (game.turn === 'w') ? 'b' : 'w';

    const hasMove = anyLegalMove(game.grid, game.turn, game.enPassant);
    const isCheck = inCheck(game.grid, game.turn);
    const repCount = recordPosition();
    const insufficient = hasInsufficientMaterial(game.grid);

    if (!hasMove) {
      game.status = isCheck ? 'checkmate' : 'stalemate';
      game.gameOver = true;
      play('end');
    } else if (insufficient) {
      game.status = 'insufficient';
      game.gameOver = true;
      play('end');
    } else if (repCount >= 3) {
      game.status = 'repetition';
      game.gameOver = true;
      play('end');
    } else {
      game.status = isCheck ? 'check' : '';
      if (isCheck)             play('check');
      else if (extra.promotion) play('promotion');
      else if (extra.castle)    play('castle');
      else if (wasCapture)      play('capture');
      else                      play('move');
    }
    pushHistory();
  }

  // ════════════════════════════════════════════════════════════════════
  //  Heurística táctica — decide si darle más tiempo a la IA.
  //  Una posición se considera "táctica" si:
  //   - el lado a mover está en jaque (forzado a responder)
  //   - hay promoción disponible
  //   - hay una captura ganadora (pieza menos valiosa toma una más valiosa)
  //   - hay una captura sobre una pieza enemiga no defendida (pieza colgada)
  //  Las funciones del engine (inCheck, allLegalMoves, squareAttacked,
  //  PIECE_VALUES) viven en scope global porque el bloque ai-engine se
  //  inyecta como <script>.
  // ════════════════════════════════════════════════════════════════════
  function isTacticalPosition(grid, color, ep) {
    if (inCheck(grid, color)) return true;
    const enemy = color === 'w' ? 'b' : 'w';
    const moves = allLegalMoves(grid, color, ep);
    for (const [fc, fr, tc, tr, extra] of moves) {
      if (extra && extra.promotion) return true;
      const isEp = extra && extra.en_passant;
      const target = grid[tc][tr];
      if (!target && !isEp) continue;
      const attacker = grid[fc][fr];
      const tv = isEp ? PIECE_VALUES.P : PIECE_VALUES[target.kind];
      const av = PIECE_VALUES[attacker.kind];
      if (tv > av) return true;
      if (!squareAttacked(grid, tc, tr, enemy)) return true;
    }
    return false;
  }

  // ════════════════════════════════════════════════════════════════════
  //  AI worker — corre la búsqueda en un Web Worker (off-main-thread)
  //  para que la UI siga respondiendo (botones de historial, menú,
  //  reset, render del tablero) mientras la IA piensa.
  //
  //  Para enchufar Stockfish.js: reemplazar el WORKER_URL de arriba
  //  por un worker que cargue stockfish.js. El protocolo de mensajes
  //  acá es {grid, color, ep, ...} → {move, depth}; con Stockfish
  //  conviene cambiar a FEN + parsear `bestmove` UCI.
  // ════════════════════════════════════════════════════════════════════
  async function triggerAI() {
    if (game.aiWorking) return;
    game.aiWorking = true;
    game.aiThinking = true;
    const epSnap = game.enPassant ? [game.enPassant[0], game.enPassant[1]] : null;
    const colorSnap = game.turn;
    const genSnap = game.gen;

    // ¿Posición táctica? → le damos el doble de tiempo para pensar.
    const tactical = isTacticalPosition(game.grid, colorSnap, epSnap);
    const budgetMs = tactical ? AI_TIME_BUDGET_MS * AI_TACTICAL_MULT : AI_TIME_BUDGET_MS;
    game.aiTactical = tactical;

    const applyResult = (move, depth, seldepth, engineName) => {
      game.aiThinking = false;
      game.aiWorking = false;
      if (genSnap !== game.gen || !currentPlayerIsAI() || game.gameOver || !move) return;
      game.aiEngineName = engineName;
      if (game.animation) {
        game.pendingAI = { move, depth, seldepth, engineName };
      } else {
        game.aiLastDepth = depth;
        game.aiLastSeldepth = seldepth;
        const [fc, fr, tc, tr, extra] = move;
        makeMove(fc, fr, tc, tr, extra, true);
      }
    };

    // ── Path 1: Stockfish vía UCI (mucho más fuerte) ──
    if (stockfishReady && stockfishWorker) {
      try {
        const fen = buildFen(game.grid, colorSnap, epSnap);
        const sfResult = await askStockfish(fen, budgetMs);
        if (sfResult && sfResult.uci) {
          const move = parseUciMove(sfResult.uci, game.grid, epSnap);
          applyResult(move, sfResult.depth || 0, sfResult.seldepth || 0, 'Stockfish');
          return;
        }
        // Stockfish devolvió null o falló — caemos al interno
      } catch (err) {
        console.warn('Stockfish falló, cayendo al motor interno', err);
      }
    }

    // ── Path 2: Motor interno (negamax + α-β en un Worker propio) ──
    let worker;
    try {
      worker = new Worker(WORKER_URL);
    } catch (err) {
      console.error('Worker creation failed:', err);
      applyResult(null, 0, 0, '');
      return;
    }
    game.aiWorker = worker;

    worker.onmessage = (e) => {
      const result = e.data;
      worker.terminate();
      if (game.aiWorker === worker) game.aiWorker = null;
      if (result && result.error) { console.error('AI worker exception:', result.error); applyResult(null, 0, 0, ''); return; }
      applyResult(result && result.move, (result && result.depth) || 0, 0, 'Interno');
    };
    worker.onerror = (err) => {
      console.error('AI worker error:', err.message || err);
      try { worker.terminate(); } catch {}
      if (game.aiWorker === worker) game.aiWorker = null;
      applyResult(null, 0, 0, '');
    };

    try {
      worker.postMessage({
        grid: game.grid,
        color: colorSnap,
        ep: epSnap,
        maxDepth: AI_MAX_DEPTH,
        timeBudgetMs: budgetMs,
      });
    } catch (err) {
      console.error('Worker postMessage failed:', err);
      try { worker.terminate(); } catch {}
      applyResult(null, 0, 0, '');
    }
  }

  function killAIWorker() {
    if (game.aiWorker) {
      game.aiWorker.terminate();
      game.aiWorker = null;
    }
    game.aiThinking = false;
    game.aiWorking = false;
  }

  // ════════════════════════════════════════════════════════════════════
  //  RENDERING
  // ════════════════════════════════════════════════════════════════════
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = 1;
  let boardSize = 0, boardX = 0, boardY = 0, cellSize = 0;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    // visualViewport es más confiable en mobile Safari (compensa la toolbar
    // dinámica y el safe-area). Caemos a innerHeight si no existe.
    const viewportH = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    const barH = document.getElementById('bar').offsetHeight || 0;
    W = window.innerWidth;
    H = Math.max(160, viewportH - barH);
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    // Layout: status arriba, strip horizontal (relojes + capturas) sobre el tablero,
    // labels abajo. Sin paneles laterales — todo se agrupa arriba.
    // Proporciones mínimas garantizan que entren 2 filas de capturas + reloj.
    const statusReserve = 52;    // status text (y≈22) + depth info (y≈48)
    const stripReserve  = 72;    // alto FIJO del strip (2 filas de piezas + reloj)
    const stripGap      = 18;    // aire entre strip y borde del tablero
    const topReserve    = statusReserve + stripReserve + stripGap;
    const bottomReserve = 72;    // labels a-h + aire EXTRA contra la barra inferior
    const sideReserve   = 24;    // margen lateral mínimo
    const availH = Math.max(160, H - topReserve - bottomReserve);
    const availW = Math.max(160, W - sideReserve * 2);
    boardSize = Math.min(availH, availW);
    cellSize  = boardSize / 8;
    boardX = (W - boardSize) / 2;
    boardY = topReserve + (availH - boardSize) / 2;
  }
  window.addEventListener('resize', resize);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', resize);
  }

  function cellToScreen(c, r) {
    const sc = game.flip ? (7 - c) : c;
    const sr = game.flip ? (7 - r) : r;
    return [boardX + sc * cellSize, boardY + sr * cellSize];
  }
  function pixelToSquare(px, py) {
    const sc = Math.floor((px - boardX) / cellSize);
    const sr = Math.floor((py - boardY) / cellSize);
    if (sc < 0 || sc > 7 || sr < 0 || sr > 7) return null;
    return [game.flip ? (7 - sc) : sc, game.flip ? (7 - sr) : sr];
  }

  // ── Sprite caching: bakear cada pieza una vez a un canvas offscreen ──
  // Permite usar source-atop para el specular highlight sin pintar el fondo,
  // y deja el drawing per-frame en un solo drawImage por pieza.
  const pieceSprites = {};
  let lastSpriteSize = 0;
  let lastSpriteDpr  = 0;

  function bakePiece(c, kind, color, cx, cy, size) {
    const ch = PIECE_CHARS[kind];
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.font = `${Math.floor(size * 0.92)}px "Segoe UI Symbol", "Arial Unicode MS", "DejaVu Sans", serif`;

    // 1) Sombra proyectada — pieza en color oscuro con shadow nativo (offset Y > 0)
    c.save();
    c.shadowColor = 'rgba(0,0,0,0.55)';
    c.shadowBlur = size * 0.14;
    c.shadowOffsetY = size * 0.08;
    c.fillStyle = color === 'w' ? '#2c2c38' : '#04040a';
    c.fillText(ch, cx, cy);
    c.restore();

    // 2) Outline 8-direccional para un borde crisp y suave
    const outlineColor = color === 'w' ? '#0d0d16' : '#fbfbfe';
    const off = Math.max(1, size * 0.042);
    c.fillStyle = outlineColor;
    for (const [dx, dy] of [[-off,0],[off,0],[0,-off],[0,off],
                            [-off*0.7,-off*0.7],[off*0.7,-off*0.7],[-off*0.7,off*0.7],[off*0.7,off*0.7]]) {
      c.fillText(ch, cx + dx, cy + dy);
    }

    // 3) Cuerpo principal con gradiente vertical fuerte (top claro → bottom oscuro)
    let grad;
    if (color === 'w') {
      grad = c.createLinearGradient(0, cy - size*0.42, 0, cy + size*0.42);
      grad.addColorStop(0,    '#ffffff');
      grad.addColorStop(0.30, '#f2f2f8');
      grad.addColorStop(0.65, '#c4c4d4');
      grad.addColorStop(1,    '#888896');
    } else {
      grad = c.createLinearGradient(0, cy - size*0.42, 0, cy + size*0.42);
      grad.addColorStop(0,    '#6a6a78');
      grad.addColorStop(0.35, '#34343e');
      grad.addColorStop(0.75, '#101018');
      grad.addColorStop(1,    '#040408');
    }
    c.fillStyle = grad;
    c.fillText(ch, cx, cy);

    // 4) Reflejo arriba-izquierda — clippeado al silhouette con source-atop.
    //    Blancas: highlight claro (luz blanca).
    //    Negras: "brillo oscuro" — sombra suave en la misma zona, da look glossy noir.
    c.save();
    c.globalCompositeOperation = 'source-atop';
    const hl = c.createRadialGradient(
      cx - size*0.20, cy - size*0.28, 0,
      cx - size*0.20, cy - size*0.28, size*0.48
    );
    if (color === 'w') {
      hl.addColorStop(0,   'rgba(255,255,255,0.65)');
      hl.addColorStop(0.4, 'rgba(255,255,255,0.18)');
      hl.addColorStop(1,   'rgba(255,255,255,0)');
    } else {
      hl.addColorStop(0,   'rgba(0,0,0,0.255)');
      hl.addColorStop(0.4, 'rgba(0,0,0,0.22)');
      hl.addColorStop(1,   'rgba(0,0,0,0)');
    }
    c.fillStyle = hl;
    c.fillRect(cx - size*0.6, cy - size*0.6, size*1.2, size*1.2);
    c.restore();

    // 5) Reflejo inferior sutil — un "fake ambient occlusion" interior para dar peso
    c.save();
    c.globalCompositeOperation = 'source-atop';
    const ao = c.createLinearGradient(0, cy, 0, cy + size*0.45);
    if (color === 'w') {
      ao.addColorStop(0, 'rgba(0,0,0,0)');
      ao.addColorStop(1, 'rgba(0,0,0,0.18)');
    } else {
      ao.addColorStop(0, 'rgba(0,0,0,0)');
      ao.addColorStop(1, 'rgba(0,0,0,0.45)');
    }
    c.fillStyle = ao;
    c.fillRect(cx - size*0.5, cy, size, size*0.5);
    c.restore();
  }

  function bakeSpriteAt(kind, color, baseSize) {
    try {
      if (!(baseSize > 0) || !(dpr > 0)) return null;
      const dim = Math.ceil(baseSize * 1.35);
      const px  = Math.ceil(dim * dpr);
      if (px <= 0 || px > 4096) return null;            // límite defensivo
      const off = document.createElement('canvas');
      off.width = off.height = px;
      const c = off.getContext('2d');
      if (!c) return null;
      c.scale(dpr, dpr);
      c.imageSmoothingEnabled = true;
      c.imageSmoothingQuality = 'high';
      bakePiece(c, kind, color, dim/2, dim/2, baseSize);
      return { canvas: off, dim };
    } catch (err) {
      console.warn('bakeSpriteAt failed:', err);
      return null;
    }
  }

  function rebuildPieceSprites(baseSize) {
    lastSpriteSize = baseSize;
    lastSpriteDpr  = dpr;
    for (const color of ['w', 'b']) {
      for (const kind of ['K','Q','R','B','N','P']) {
        const s = bakeSpriteAt(kind, color, baseSize);
        if (s) pieceSprites[color + kind] = s;
      }
    }
  }

  // Cache de sprites pequeños (capturas) — bakeados a su tamaño NATURAL
  // así no perdemos definición al downscalear desde un sprite grande de tablero.
  // Indexado por tamaño redondeado para evitar re-bakeos por sub-px.
  const smallSpriteCache = new Map();    // key = `${color}${kind}@${roundedSize}@${dpr}`
  let lastSmallSpriteDpr = 0;

  function getSmallSprite(kind, color, size) {
    if (dpr !== lastSmallSpriteDpr) { smallSpriteCache.clear(); lastSmallSpriteDpr = dpr; }
    const rounded = Math.round(size);
    if (!(rounded > 0)) return null;
    const key = color + kind + '@' + rounded;
    let s = smallSpriteCache.get(key);
    if (s === undefined) {
      s = bakeSpriteAt(kind, color, rounded);
      smallSpriteCache.set(key, s);     // guardamos incluso null para no re-intentar cada frame
    }
    return s;
  }

  function drawPiece(kind, color, cx, cy, size) {
    if (cellSize > 0 && (Math.abs(cellSize - lastSpriteSize) >= 0.5 || dpr !== lastSpriteDpr)) {
      rebuildPieceSprites(cellSize);
    }
    let sprite = pieceSprites[color + kind];
    if (!sprite && cellSize > 0) {
      rebuildPieceSprites(cellSize);
      sprite = pieceSprites[color + kind];
    }
    if (!sprite) {
      // Último fallback: glifo Unicode plano. Garantiza que SE VEA la pieza.
      ctx.save();
      ctx.font = `${Math.floor(size * 0.92)}px "Segoe UI Symbol", "Arial Unicode MS", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = color === 'w' ? '#f0f0f5' : '#101018';
      ctx.fillText(PIECE_CHARS[kind] || '?', cx, cy);
      ctx.restore();
      return;
    }
    const scale = size / (lastSpriteSize || size);
    const t = sprite.dim * scale;
    ctx.drawImage(sprite.canvas, cx - t/2, cy - t/2, t, t);
  }

  function drawBoard() {
    const view = isViewingHistory() ? game.history[game.historyIndex] : {
      grid: game.grid, turn: game.turn, lastMove: game.lastMove, status: game.status, captured: game.captured,
    };
    const viewing = isViewingHistory();

    // ── Marco de madera con gradiente + sombra proyectada ──
    const FRAME = Math.max(8, cellSize * 0.12);
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur = 28;
    ctx.shadowOffsetY = 12;
    const frameGrad = ctx.createLinearGradient(
      boardX - FRAME, boardY - FRAME,
      boardX + boardSize + FRAME, boardY + boardSize + FRAME);
    if (viewing) {
      frameGrad.addColorStop(0, '#7a5a30');
      frameGrad.addColorStop(0.5, '#9c7644');
      frameGrad.addColorStop(1, '#5e4022');
    } else {
      frameGrad.addColorStop(0, '#3b2a1c');
      frameGrad.addColorStop(0.5, '#5c4128');
      frameGrad.addColorStop(1, '#2a1d12');
    }
    ctx.fillStyle = frameGrad;
    ctx.fillRect(boardX - FRAME, boardY - FRAME, boardSize + FRAME*2, boardSize + FRAME*2);
    ctx.restore();

    // Borde interno (línea fina más clara para "biselar" el marco)
    ctx.strokeStyle = 'rgba(255,235,200,0.18)';
    ctx.lineWidth = 1;
    ctx.strokeRect(boardX - 0.5, boardY - 0.5, boardSize + 1, boardSize + 1);

    // ── Casillas con paleta más cálida ──
    const LIGHT = '#ecd9b3', DARK = '#a87c52';
    for (let sc = 0; sc < 8; sc++) for (let sr = 0; sr < 8; sr++) {
      const c = game.flip ? (7 - sc) : sc, r = game.flip ? (7 - sr) : sr;
      ctx.fillStyle = ((c + r) & 1) === 0 ? LIGHT : DARK;
      ctx.fillRect(boardX + sc * cellSize, boardY + sr * cellSize, cellSize, cellSize);
    }

    // ── Vignette muy sutil en el centro del tablero para profundidad ──
    const vGrad = ctx.createRadialGradient(
      boardX + boardSize/2, boardY + boardSize/2, boardSize * 0.2,
      boardX + boardSize/2, boardY + boardSize/2, boardSize * 0.75);
    vGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vGrad.addColorStop(1, 'rgba(0,0,0,0.10)');
    ctx.fillStyle = vGrad;
    ctx.fillRect(boardX, boardY, boardSize, boardSize);

    // ── Highlight última jugada — flat amarillo translúcido ──
    if (view.lastMove) {
      ctx.fillStyle = 'rgba(246,236,120,0.40)';
      const [fc, fr, tc, tr] = view.lastMove;
      const [fx, fy] = cellToScreen(fc, fr);
      const [tx, ty] = cellToScreen(tc, tr);
      ctx.fillRect(fx, fy, cellSize, cellSize);
      ctx.fillRect(tx, ty, cellSize, cellSize);
    }

    // ── Rey en jaque — flat rojo translúcido ──
    if (view.status === 'check' || view.status === 'checkmate') {
      const k = findKing(view.grid, view.turn);
      if (k) {
        const [kx, ky] = cellToScreen(k[0], k[1]);
        ctx.fillStyle = 'rgba(220,60,60,0.50)';
        ctx.fillRect(kx, ky, cellSize, cellSize);
      }
    }

    // ── Selección — flat verde translúcido ──
    if (!viewing && game.selected) {
      const [sx, sy] = cellToScreen(game.selected[0], game.selected[1]);
      ctx.fillStyle = 'rgba(120,210,120,0.45)';
      ctx.fillRect(sx, sy, cellSize, cellSize);
    }

    // Piezas — saltamos la celda destino de la animación (la dibujamos interpolada después)
    const skip = new Set();
    if (!viewing && game.animation) {
      skip.add(game.animation.toC + ',' + game.animation.toR);
      if (game.animation.rookAnim) skip.add(game.animation.rookAnim.toC + ',' + game.animation.rookAnim.toR);
    }
    if (!viewing && game.dragging && game.dragFrom) skip.add(game.dragFrom[0] + ',' + game.dragFrom[1]);

    for (let c = 0; c < 8; c++) for (let r = 0; r < 8; r++) {
      const p = view.grid[c][r];
      if (!p) continue;
      if (skip.has(c + ',' + r)) continue;
      const [x, y] = cellToScreen(c, r);
      drawPiece(p.kind, p.color, x + cellSize/2, y + cellSize/2, cellSize);
    }

    // Pieza animada
    if (!viewing && game.animation) {
      const a = game.animation;
      const t = Math.min(1, (performance.now() - a.startTime) / a.duration);
      const te = 1 - (1 - t) * (1 - t);
      const [fx, fy] = cellToScreen(a.fromC, a.fromR);
      const [tx, ty] = cellToScreen(a.toC, a.toR);
      const cx = fx + (tx - fx) * te, cy = fy + (ty - fy) * te;
      drawPiece(a.kind, a.color, cx + cellSize/2, cy + cellSize/2, cellSize);
      if (a.rookAnim) {
        const ra = a.rookAnim;
        const [rfx, rfy] = cellToScreen(ra.fromC, ra.fromR);
        const [rtx, rty] = cellToScreen(ra.toC, ra.toR);
        const rcx = rfx + (rtx - rfx) * te, rcy = rfy + (rty - rfy) * te;
        drawPiece('R', a.color, rcx + cellSize/2, rcy + cellSize/2, cellSize);
      }
    }

    // ── Targets legales — dots/rings verdes flat ──
    if (!viewing && !game.animation) {
      ctx.save();
      for (const [tc, tr, extra] of game.legal) {
        const [x, y] = cellToScreen(tc, tr);
        const cx = x + cellSize/2, cy = y + cellSize/2;
        const target = game.grid[tc][tr];
        ctx.beginPath();
        if (target || extra.en_passant) {
          ctx.strokeStyle = 'rgba(80,220,80,0.85)';
          ctx.lineWidth = Math.max(2, cellSize * 0.07);
          ctx.arc(cx, cy, cellSize * 0.46, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          ctx.fillStyle = 'rgba(80,220,80,0.7)';
          ctx.arc(cx, cy, cellSize * 0.14, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    // Pieza arrastrada — un poco más grande, con shadow extra para "levantarla"
    if (!viewing && game.dragging && game.dragFrom) {
      const p = game.grid[game.dragFrom[0]][game.dragFrom[1]];
      if (p) {
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = cellSize * 0.25;
        ctx.shadowOffsetY = cellSize * 0.08;
        drawPiece(p.kind, p.color, pointerX, pointerY, cellSize * 1.08);
        ctx.restore();
      }
    }

    // ── Labels a-h, 1-8 — color cálido (color del marco) ──
    ctx.fillStyle = 'rgba(240,225,195,0.85)';
    ctx.font = `600 ${Math.max(11, Math.floor(cellSize * 0.18))}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const labelOff = FRAME * 0.55;
    for (let i = 0; i < 8; i++) {
      const fileC = game.flip ? (7 - i) : i;
      const rankR = game.flip ? (7 - i) : i;
      ctx.fillText('abcdefgh'[fileC], boardX + i * cellSize + cellSize/2, boardY + boardSize + labelOff);
      ctx.fillText(String(8 - rankR), boardX - labelOff, boardY + i * cellSize + cellSize/2);
    }

    // Aislamos cada call: si drawTopBar tira, drawTopStatus tiene que correr
    // igual (el texto de turno/depth no debe desaparecer porque falló una pieza).
    try { drawTopBar(view.captured); } catch (e) { console.error('drawTopBar:', e); }
    try { drawTopStatus(view);       } catch (e) { console.error('drawTopStatus:', e); }
  }

  const CAPTURE_ROWS = 2;        // siempre 2 filas, las cols se calculan dinámicamente

  function drawTopBar(viewCaptured) {
    // Barra horizontal arriba del tablero. Las piezas se dibujan en 2 filas
    // pegadas al reloj — TODAS las capturas, ordenadas por valor decreciente.
    //   [♛ ♜ ♜ ♝ ♝ ♞][Black clock][White clock][♕ ♖ ♖ ♗ ♗ ♘]
    //   [♞ ♟ ♟ ♟ ♟ ♟ ♟ ♟]                                  [♘ ♟ ♟ ♟ ♟ ♟ ♟ ♟]
    const order = { Q: 5, R: 4, B: 3, N: 2, P: 1, K: 0 };
    const black = (viewCaptured || []).filter(p => p.color === 'b').map(p => p.kind).sort((a, b) => order[b] - order[a]);
    const white = (viewCaptured || []).filter(p => p.color === 'w').map(p => p.kind).sort((a, b) => order[b] - order[a]);

    const minStripTop = 56;                  // tope: justo debajo de status + depth info
    const maxStripH   = 72;                  // techo para 2 filas de capturas + reloj
    const gapToBoard  = 18;                  // separación entre strip y tablero
    const stripBottom = boardY - gapToBoard;
    const available   = stripBottom - minStripTop;
    const stripH      = Math.min(maxStripH, available);
    if (stripH < 56) return;                 // proporción mínima — no hay aire para 2 filas
    const stripTop    = stripBottom - stripH;

    // Relojes compactos pegados en el centro — más chicos que el strip,
    // centrados verticalmente, así no dominan visualmente.
    const clockW = Math.min(60, Math.max(50, boardSize * 0.13));
    const clockH = Math.min(42, stripH - 12);
    const clockGap = 4;
    const center = boardX + boardSize / 2;
    const leftClockCx  = center - clockW/2 - clockGap/2;
    const rightClockCx = center + clockW/2 + clockGap/2;
    const clockTop = stripTop + (stripH - clockH) / 2;

    drawClock(leftClockCx,  clockTop, clockH, clockW, 'b');
    drawClock(rightClockCx, clockTop, clockH, clockW, 'w');

    // Piezas: 2 filas tienen que entrar en stripH
    const pieceSize = Math.max(18, Math.min(26, stripH * 0.42));
    const innerPad  = 10;

    // Negras a la izquierda de los relojes: Q pegada al reloj negro → expanden a la izq
    const blackAnchor = leftClockCx - clockW/2 - innerPad;
    const blackLimit  = boardX + 4;
    renderCapturesOutward(black, 'b', blackAnchor, blackLimit, stripTop + stripH/2, pieceSize, 'left');

    // Blancas a la derecha de los relojes: Q pegada al reloj blanco → expanden a la der
    const whiteAnchor = rightClockCx + clockW/2 + innerPad;
    const whiteLimit  = boardX + boardSize - 4;
    renderCapturesOutward(white, 'w', whiteAnchor, whiteLimit, stripTop + stripH/2, pieceSize, 'right');
  }

  function renderCapturesOutward(kinds, color, anchorX, limitX, cy, size, dir) {
    // Las piezas se acomodan EMPEZANDO en anchorX (lado de la reina) y se
    // expanden hacia limitX en CAPTURE_ROWS filas. Todas las capturas se dibujan
    // (las más valiosas ya vienen al frente). Si el span aprieta, achicamos spacing.
    if (!kinds.length) return;
    const span = Math.abs(limitX - anchorX);
    if (span < size) return;
    const visible = kinds.length;
    // Cols = mitad redondeada hacia arriba, así llenamos primero la fila pegada al reloj
    const cols    = Math.ceil(visible / CAPTURE_ROWS);
    const natural = size * 0.78;
    const spacing = Math.max(size * 0.38, Math.min(natural, span / cols));
    const sign    = dir === 'left' ? -1 : 1;
    const rowOff  = size * 0.50;
    for (let i = 0; i < visible; i++) {
      const row = Math.floor(i / cols);
      if (row >= CAPTURE_ROWS) break;             // safety net
      const col = i % cols;
      const cx = anchorX + sign * (col + 0.5) * spacing;
      const py = cy + (row === 0 ? -rowOff : rowOff);
      drawPiece(kinds[i], color, cx, py, size);
    }
  }

  function drawClock(cx, top, height, width, color) {
    const isActive = (game.state === 'play' && !game.gameOver
                      && !isViewingHistory() && game.turn === color);
    const ms = color === 'w' ? game.clockW : game.clockB;
    const lowTime = ms < 30 * 1000;
    const x = cx - width/2;

    // ── Cuadrante: el ACTIVO tiene fondo blanco/claro (= "encendido"),
    //    el INACTIVO tiene fondo oscuro (= "apagado"). El fondo se PASA al
    //    otro reloj cuando cambia el turno, como un chess clock real.
    const bgColor     = isActive ? '#f4f4f8' : '#1a1a22';
    const strokeColor = isActive ? '#ffb83a' : '#33333e';
    ctx.fillStyle = bgColor;
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = isActive ? 2.6 : 1;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, top, width, height, 8);
    else ctx.rect(x, top, width, height);
    ctx.fill();
    ctx.stroke();

    // ── Texto: contraste con el fondo ──
    const textColor = lowTime
      ? '#ff3838'
      : (isActive ? '#181820' : '#7a7a86');
    ctx.fillStyle = textColor;
    ctx.font = `900 ${Math.floor(height * 0.42)}px Bahnschrift, "Segoe UI Black", Oswald, Impact, "Arial Black", sans-serif`;
    if ('letterSpacing' in ctx) ctx.letterSpacing = '0.04em';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(formatClock(ms), cx, top + height/2);
    if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';
  }

  function drawTopStatus(view) {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.45)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 1;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const viewing = isViewingHistory();
    const bigFont = (px) => `300 ${px}px "Segoe UI", sans-serif`;
    const banner  = (px) => `600 ${px}px "Segoe UI", sans-serif`;

    if (viewing) {
      const idx = game.historyIndex, total = game.history.length - 1;
      const txt = idx === 0
        ? 'Posición inicial · END vuelve al presente'
        : `Viendo movida ${idx} de ${total}  ·  ← → navegar  ·  END = al presente`;
      ctx.fillStyle = '#e8d878';
      ctx.font = bigFont(Math.max(14, Math.min(20, Math.floor(W * 0.018))));
      ctx.fillText(txt, W / 2, 24);
    } else if (view.status === 'checkmate') {
      const winner = view.turn === 'w' ? 'Negras' : 'Blancas';
      ctx.fillStyle = '#ff6464';
      ctx.font = banner(Math.max(22, Math.min(32, Math.floor(W * 0.028))));
      ctx.fillText('JAQUE MATE — Ganan ' + winner, W / 2, 28);
    } else if (view.status === 'stalemate') {
      ctx.fillStyle = '#e8d864';
      ctx.font = banner(Math.max(22, Math.min(32, Math.floor(W * 0.028))));
      ctx.fillText('AHOGADO — Tablas', W / 2, 28);
    } else if (view.status === 'repetition') {
      ctx.fillStyle = '#e8d864';
      ctx.font = banner(Math.max(22, Math.min(32, Math.floor(W * 0.028))));
      ctx.fillText('TABLAS POR REPETICIÓN', W / 2, 28);
    } else if (view.status === 'insufficient') {
      ctx.fillStyle = '#e8d864';
      ctx.font = banner(Math.max(22, Math.min(32, Math.floor(W * 0.028))));
      ctx.fillText('TABLAS POR FALTA DE MATERIAL', W / 2, 28);
    } else if (view.status === 'timeout') {
      // El jugador que se quedó sin tiempo es el del turno actual (la vista lo congela)
      const winner = view.turn === 'w' ? 'Negras' : 'Blancas';
      ctx.fillStyle = '#ff6464';
      ctx.font = banner(Math.max(22, Math.min(32, Math.floor(W * 0.028))));
      ctx.fillText('TIEMPO AGOTADO — Ganan ' + winner, W / 2, 28);
    } else {
      let txt = view.turn === 'w' ? 'Turno: Blancas' : 'Turno: Negras';
      let color = '#ececf0';
      if (game.aiThinking) {
        // Animación de puntos "Pensando . . ."
        const dots = '.'.repeat(1 + Math.floor((performance.now() / 350) % 3));
        txt += '   ·   Pensando' + dots;
        color = '#c8c8ff';
      } else if (view.status === 'check') {
        txt += '   ·   JAQUE';
        color = '#ff8a8a';
      }
      ctx.fillStyle = color;
      ctx.font = bigFont(Math.max(14, Math.min(22, Math.floor(W * 0.022))));
      ctx.fillText(txt, W / 2, 24);
    }
    ctx.restore();

    // Modo a la derecha — chip estilo pill
    if (W > 500) {
      let mode;
      if (game.aiBoth)              mode = 'IA vs IA';
      else if (!game.aiColor)       mode = '2 Jugadores';
      else                          mode = 'vs IA · ' + (game.humanColor === 'w' ? 'Blancas' : 'Negras');
      ctx.font = `500 ${Math.max(11, Math.min(13, Math.floor(W * 0.013)))}px "Segoe UI", sans-serif`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'right';
      const padX = 10, padY = 4;
      const txtW = ctx.measureText(mode).width;
      const chipW = txtW + padX*2, chipH = 22;
      const chipX = W - 12 - chipW, chipY = 16 - chipH/2;
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(chipX, chipY, chipW, chipH, 11);
      else ctx.rect(chipX, chipY, chipW, chipH);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = 'rgba(220,220,235,0.85)';
      ctx.fillText(mode, W - 12 - padX, 16);
    }

    // Depth secundario + nombre del motor
    // depth   = profundidad nominal de iterative deepening
    // seldepth = profundidad máxima alcanzada con extensiones / quiescence (siempre ≥ depth)
    const fmtDepth = (d, sd) => sd > 0 && sd > d ? (d + '/' + sd) : String(d);
    if (!viewing && !game.gameOver) {
      ctx.font = `400 ${Math.max(10, Math.min(13, Math.floor(W * 0.012)))}px "Segoe UI", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if (game.aiThinking) {
        // Línea en vivo: motor + depth (si ya lo reportó) o "pensando..."
        // Stockfish stream-ea depth via UCI; el motor interno sólo reporta al final,
        // entonces durante su primera pensada mostramos solo el indicador animado.
        const motorLive = game.aiEngineName || (stockfishReady ? 'Stockfish' : 'Interno');
        const dots = '.'.repeat(1 + Math.floor((performance.now() / 400) % 3));
        let line;
        if (game.aiLastDepth > 0) {
          line = motorLive + ' · depth ' + fmtDepth(game.aiLastDepth, game.aiLastSeldepth);
        } else {
          line = motorLive + ' · pensando' + dots;
        }
        if (game.aiTactical) line += ' · táctica';
        ctx.fillStyle = 'rgba(180,200,240,0.7)';
        ctx.fillText(line, W / 2, 48);
      } else if (game.aiLastDepth > 0) {
        // Última jugada de la IA — depth final de la búsqueda
        const motor = game.aiEngineName || 'IA';
        ctx.fillStyle = 'rgba(160,180,210,0.65)';
        ctx.fillText('Última jugada · ' + motor + ' · depth ' + fmtDepth(game.aiLastDepth, game.aiLastSeldepth), W / 2, 48);
      }
    }
  }

  // ════════════════════════════════════════════════════════════════════
  //  INPUT — pointer events (unifica mouse + touch)
  // ════════════════════════════════════════════════════════════════════
  let pointerX = 0, pointerY = 0, pointerDown = false;
  let pressOriginSq = null;

  canvas.addEventListener('pointerdown', e => {
    if (game.state !== 'play') return;
    canvas.setPointerCapture(e.pointerId);
    const rect = canvas.getBoundingClientRect();
    pointerX = e.clientX - rect.left;
    pointerY = e.clientY - rect.top;
    pointerDown = true;
    handlePress();
    e.preventDefault();
  });
  canvas.addEventListener('pointermove', e => {
    const rect = canvas.getBoundingClientRect();
    pointerX = e.clientX - rect.left;
    pointerY = e.clientY - rect.top;
  });
  canvas.addEventListener('pointerup', e => {
    if (game.state !== 'play') return;
    pointerDown = false;
    handleRelease();
    e.preventDefault();
  });
  canvas.addEventListener('pointercancel', () => { pointerDown = false; game.dragging = false; game.dragFrom = null; });

  function handlePress() {
    if (game.gameOver || isViewingHistory() || game.aiThinking || game.animation) return;
    if (currentPlayerIsAI()) return;
    const sq = pixelToSquare(pointerX, pointerY);
    if (!sq) { game.selected = null; game.legal = []; game.dragging = false; return; }
    const [c, r] = sq;
    // ¿clic sobre un destino legal? — mover (click-click, anima)
    if (game.selected) {
      for (const [tc, tr, extra] of game.legal) {
        if (tc === c && tr === r) {
          makeMove(game.selected[0], game.selected[1], tc, tr, extra, true);
          game.selected = null; game.legal = []; game.dragging = false;
          return;
        }
      }
    }
    // ¿clic sobre pieza propia? — seleccionar + arrancar drag
    const p = game.grid[c][r];
    if (p && p.color === game.turn) {
      game.selected = [c, r];
      game.legal = genLegalMoves(game.grid, c, r, game.enPassant);
      game.dragging = true;
      game.dragFrom = [c, r];
      pressOriginSq = [c, r];
    } else {
      game.selected = null; game.legal = []; game.dragging = false;
    }
  }

  function handleRelease() {
    if (!game.dragging) return;
    game.dragging = false;
    const from = game.dragFrom;
    game.dragFrom = null;
    if (!from) return;
    const sq = pixelToSquare(pointerX, pointerY);
    if (!sq) return;
    const [c, r] = sq;
    if (c === from[0] && r === from[1]) return;   // soltó en mismo lugar → queda en click-click mode
    for (const [tc, tr, extra] of game.legal) {
      if (tc === c && tr === r) {
        makeMove(from[0], from[1], tc, tr, extra, false);   // drag → snap (no anima)
        game.selected = null; game.legal = [];
        return;
      }
    }
    // Soltó en cualquier otra cosa (incluida otra pieza propia) → cancelar.
    // El cambio de selección a otra pieza propia sólo ocurre vía click, no vía drag.
    game.selected = null; game.legal = [];
  }

  // Teclado: flechas + R + N (desktop)
  window.addEventListener('keydown', e => {
    if (game.state !== 'play') return;
    if (e.key === 'ArrowLeft')      historyBack();
    else if (e.key === 'ArrowRight') historyForward();
    else if (e.key === 'Home')       historyFirst();
    else if (e.key === 'End')        historyLast();
    else if (e.key === 'r' || e.key === 'R') resetBoard();
    else if (e.key === 'n' || e.key === 'N') backToMenu();
  });

  function historyBack()    { if (game.historyIndex > 0) { game.historyIndex--; clearSelection(); } }
  function historyForward() { if (game.historyIndex < game.history.length - 1) { game.historyIndex++; clearSelection(); } }
  function historyFirst()   { game.historyIndex = 0; clearSelection(); }
  function historyLast()    { game.historyIndex = game.history.length - 1; clearSelection(); }
  function clearSelection() { game.selected = null; game.legal = []; game.dragging = false; game.dragFrom = null; }

  // Botones del menú
  document.querySelectorAll('#menu button').forEach(b => {
    b.addEventListener('click', () => startGame(b.dataset.mode));
  });
  document.getElementById('btnFirst').addEventListener('click', historyFirst);
  document.getElementById('btnLast').addEventListener('click', historyLast);
  document.getElementById('btnReset').addEventListener('click', resetBoard);
  document.getElementById('btnMenu').addEventListener('click', backToMenu);

  // Auto-repeat para los botones de avance/retroceso de a 1: dispara una vez
  // al press, después de 400ms empieza a repetir cada 70ms mientras se mantenga
  // apretado (mouse o touch). Replica el comportamiento de las flechas de teclado.
  function attachAutoRepeat(btn, action) {
    let initialT = 0, intervalT = 0;
    const stop = () => {
      clearTimeout(initialT); initialT = 0;
      clearInterval(intervalT); intervalT = 0;
    };
    const start = (e) => {
      e.preventDefault();
      action();
      stop();
      initialT = setTimeout(() => {
        intervalT = setInterval(action, 70);
      }, 400);
    };
    btn.addEventListener('pointerdown', start);
    btn.addEventListener('pointerup',    stop);
    btn.addEventListener('pointercancel', stop);
    btn.addEventListener('pointerleave', stop);
  }
  attachAutoRepeat(document.getElementById('btnPrev'), historyBack);
  attachAutoRepeat(document.getElementById('btnNext'), historyForward);

  // ════════════════════════════════════════════════════════════════════
  //  MAIN LOOP
  // ════════════════════════════════════════════════════════════════════
  function loop() {
    try {
      tickClock();
      // Limpia animación cuando expira
      if (game.animation && performance.now() - game.animation.startTime >= game.animation.duration) {
        game.animation = null;
      }
      // Aplica jugada de IA pendiente cuando termina la animación
      if (!game.animation && game.pendingAI) {
        const r = game.pendingAI; game.pendingAI = null;
        if (currentPlayerIsAI() && !game.gameOver && r.move) {
          game.aiLastDepth = r.depth;
          game.aiLastSeldepth = r.seldepth || 0;
          if (r.engineName) game.aiEngineName = r.engineName;
          const [fc, fr, tc, tr, extra] = r.move;
          makeMove(fc, fr, tc, tr, extra, true);
        }
      }
      // Disparar IA cuando le toca
      if (game.state === 'play' && currentPlayerIsAI() && !game.aiThinking && !game.aiWorking
          && !game.gameOver && !game.animation && !game.pendingAI) {
        triggerAI();
      }
      if (game.state === 'play') {
        ctx.clearRect(0, 0, W, H);
        drawBoard();
      }
    } catch (err) {
      // No matar el render loop por una excepción de pintado — el juego sigue.
      console.error('render loop error:', err);
    }
    requestAnimationFrame(loop);
  }

  resize();
  loop();

  // Ocultar hint después de 5s o al primer toque
  const hint = document.getElementById('hint');
  setTimeout(() => hint.style.opacity = '0', 5000);
  canvas.addEventListener('pointerdown', () => hint.style.opacity = '0', { once: true });
  </script>
  <script>
    document.getElementById('btnExit').addEventListener('click', () => {
      if (confirm('¿Salir al menú?')) location.href = '../../';
    });
  </script>
  <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
  </button>
  <script>
    (function() {
      const btn = document.getElementById('btnFs');
      btn.addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      });
      document.addEventListener('fullscreenchange', () => {
        document.body.classList.toggle('fs-on', !!document.fullscreenElement);
      });
    })();
  </script>
  <button id="btnInfo" aria-label="info" title="Info / FPS">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
  </button>
  <div id="fpsOverlay">FPS: --</div>
  <script>
    (function() {
      let frameCount = 0, lastT = performance.now();
      const overlay = document.getElementById('fpsOverlay');
      function loop() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          const fps = Math.round(frameCount * 1000 / (now - lastT));
          if (overlay.style.display !== 'none') overlay.textContent = 'FPS: ' + fps;
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(loop);
      }
      loop();
      const btn = document.getElementById('btnInfo');
      btn.addEventListener('click', () => {
        const showing = overlay.style.display !== 'none';
        overlay.style.display = showing ? 'none' : 'block';
        btn.classList.toggle('on', !showing);
      });
    })();
  </script>


</body>
