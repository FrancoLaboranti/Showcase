<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Chess</title>
<style>
  :root { --bar-height: 48px; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #eee;
    background:
      radial-gradient(ellipse at 30% 0%, #2a2532 0%, transparent 60%),
      radial-gradient(ellipse at 70% 100%, #1f2230 0%, transparent 60%),
      linear-gradient(180deg, #131318 0%, #0d0d12 100%);
  }
  #c {
    display: block; position: absolute;
    top: 0; left: 0;
  }

  /* Menú inicial — overlay HTML para que sea fácil de tappear en mobile */
  #menu {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(60,55,80,0.5) 0%, transparent 55%),
      linear-gradient(180deg, #18161e 0%, #0e0d12 100%);
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  #menu h1 {
    font-size: clamp(40px, 8vw, 64px);
    font-weight: 200;
    letter-spacing: 0.22em;
    margin-bottom: 4px;
    background: linear-gradient(180deg, #fff 0%, #b0b0c4 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 18px rgba(120,140,200,0.18);
  }
  #menu .sub {
    font-size: 13px;
    color: rgba(220,220,235,0.42);
    margin-bottom: 40px;
    letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 500;
  }
  #menu button {
    width: 100%; max-width: 360px;
    padding: 16px 24px; margin: 5px 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.015) 100%);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    color: #f4f4f8;
    border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
    font-family: inherit; font-size: 15px; font-weight: 500; letter-spacing: 0.02em;
    cursor: pointer; touch-action: manipulation;
    transition: all 0.18s ease;
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 4px 14px rgba(0,0,0,0.18);
  }
  #menu button:hover {
    background: linear-gradient(180deg, rgba(140,180,140,0.20) 0%, rgba(90,130,90,0.10) 100%);
    border-color: rgba(180,220,180,0.32);
    transform: translateY(-1px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 6px 22px rgba(0,0,0,0.32);
  }
  #menu button:active { transform: translateY(0) scale(0.985); }
  #menu .engine-line {
    margin-top: 26px;
    font-size: 11px; letter-spacing: 0.10em;
    color: rgba(150,180,150,0.55);
    font-weight: 500;
  }

  /* Barra de controles inferior — glassmorphism */
  #bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(var(--bar-height) + env(safe-area-inset-bottom));
    padding: 0 12px env(safe-area-inset-bottom);
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,10,16,0.72);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border-top: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 -1px 0 rgba(255,255,255,0.03) inset, 0 -8px 24px rgba(0,0,0,0.2);
    z-index: 3;
    gap: 8px;
  }
  #bar button {
    height: 34px; min-width: 38px; padding: 0 11px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.10);
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
    color: #f0f0f4; font-family: inherit; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: manipulation;
    transition: all 0.14s ease;
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
  }
  #bar button:hover {
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
    border-color: rgba(255,255,255,0.20);
  }
  #bar button:active { background: rgba(255,255,255,0.22); transform: scale(0.94); }
  #bar button.icon { padding: 0 9px; }
  #bar button svg { display: block; width: 15px; height: 15px; pointer-events: none; }
  #bar .sep { width: 1px; height: 22px; background: rgba(255,255,255,0.10); margin: 0 4px; }

  #hint {
    position: absolute; left: 0; right: 0; top: calc(10px + env(safe-area-inset-top));
    text-align: center; color: rgba(255,255,255,0.45);
    font-size: 12px; letter-spacing: 0.08em;
    pointer-events: none;
    transition: opacity 0.8s; z-index: 2; padding: 0 16px;
  }
  /* Exit button — vuelta al menú raíz */
  #btnExit {
    position: absolute;
    left: 6px;
    bottom: calc(env(safe-area-inset-bottom) + 4px);
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.45);
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
    z-index: 10;
  }
  #btnExit svg { display: block; width: 14px; height: 14px; pointer-events: none; }
  #btnExit:active { background: rgba(240,90,95,0.28); border-color: rgba(240,90,95,0.55); color: #fff; transform: scale(0.9); }
  /* === Bar layout: exit-left, main-center, info/debug-right (refactor) === */
  #bar {
    display: grid !important;
    grid-template-columns: 1fr auto 1fr !important;
    justify-content: stretch !important;
  }
  #bar > #btnExit {
    position: static !important;
    left: auto !important; right: auto !important;
    top: auto !important; bottom: auto !important;
    justify-self: start;
  }
  #bar > #ui { justify-self: center; }
  #bar > #btnInfo, #bar > #btnDebug, #bar > #btnHome {
    position: static !important;
    left: auto !important; right: auto !important;
    top: auto !important; bottom: auto !important;
    justify-self: end;
  }
  /* Pantalla completa — esquina arriba-der, flotante. */
  #btnFs {
    position: absolute;
    right: 6px;
    top: calc(env(safe-area-inset-top) + 6px);
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.45);
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
    z-index: 10;
  }
  #btnFs svg { display: block; width: 14px; height: 14px; pointer-events: none; }
  #btnFs:active { background: rgba(255,255,255,0.22); transform: scale(0.9); }
  #btnFs .ic-exit { display: none; }
  body.fs-on #btnFs .ic-enter { display: none; }
  body.fs-on #btnFs .ic-exit  { display: block; }
  /* Info (FPS) — esquina abajo-der, flotante. */
  #btnInfo {
    position: absolute;
    right: 6px;
    bottom: calc(env(safe-area-inset-bottom) + 4px);
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.45);
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
    z-index: 10;
  }
  #btnInfo svg { display: block; width: 14px; height: 14px; pointer-events: none; }
  #btnInfo:active, #btnInfo.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); color: #fff; }
  #fpsOverlay {
    position: absolute;
    right: 40px;
    bottom: calc(env(safe-area-inset-bottom) + 8px);
    font-family: monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.6);
    padding: 3px 8px;
    border-radius: 4px;
    pointer-events: none;
    display: none;
    z-index: 9;
  }



</style>
<script>/* arcade-embed-shim: corre embebido en la shell del Arcade (iframe) */
(function () {
  if (window.self === window.top) return;            // sólo embebido
  var noop = function () { return Promise.resolve(); };
  try { Element.prototype.requestFullscreen = noop; } catch (e) {}
  try { Element.prototype.webkitRequestFullscreen = noop; } catch (e) {}
  // El "salir al menú" del juego: en vez de navegar (recargaría el menú dentro del iframe),
  // avisamos a la shell por postMessage. Capturamos el click antes que el handler del juego.
  window.addEventListener('click', function (e) {
    var ex = e.target && e.target.closest && e.target.closest('#btnExit, #btnHome');
    if (!ex) return;
    e.preventDefault(); e.stopImmediatePropagation();
    try { parent.postMessage({ type: 'arcade:exit' }, '*'); } catch (x) {}
  }, true);
})();
</script>

<body>
  <canvas id="c"></canvas>

  <div id="menu">
    <h1>AJEDREZ</h1>
    <div class="sub">Elegí cómo jugar</div>
    <button data-mode="pvp">2 Jugadores</button>
    <button data-mode="w">Jugar con Blancas (vs IA)</button>
    <button data-mode="b">Jugar con Negras (vs IA)</button>
    <button data-mode="aiva">IA vs IA (espectador)</button>
    <div class="engine-line" id="engineLine">Cargando Stockfish…</div>
  </div>

  <div id="bar" style="display:none">
  <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
<button id="btnFirst" class="icon" title="Posición inicial" aria-label="inicio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 6l-6 6 6 6M19 6l-6 6 6 6"/></svg>
    </button>
    <button id="btnPrev" class="icon" title="Anterior" aria-label="anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
    </button>
    <button id="btnNext" class="icon" title="Siguiente" aria-label="siguiente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </button>
    <button id="btnLast" class="icon" title="Posición actual" aria-label="ultimo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 6l6 6-6 6M5 6l6 6-6 6"/></svg>
    </button>
    <div class="sep"></div>
    <button id="btnReset" title="Reiniciar partida">Reiniciar</button>
    <button id="btnMenu"  title="Volver al menú">Menú</button>
  </div>

  <div id="hint">Arrastrá o clic-clic para mover · Las flechas navegan el historial</div>

  <!-- Engine + AI: vive en text/plain (no se ejecuta en el parse) y se carga DOS veces:
       una vía (0,eval) en el main thread (mismas funciones que antes), y otra como Blob URL
       en un Web Worker para que la IA piense sin congelar la UI. -->
  <script id="ai-engine" type="text/plain">
  const PIECE_VALUES = { P:100, N:320, B:330, R:500, Q:900, K:0 };

  // ════════════════════════════════════════════════════════════════════
  //  CHESS ENGINE
  // ════════════════════════════════════════════════════════════════════

  // grid es column-major: grid[c][r]. c=file (0=a,7=h), r=rank desde arriba (0=rank 8, 7=rank 1).
  // Piece = { color:'w'|'b', kind:'K|Q|R|B|N|P', hasMoved:bool }

  function newPiece(color, kind) { return { color, kind, hasMoved: false }; }
  function pieceAt(grid, c, r)   { return (c>=0 && c<8 && r>=0 && r<8) ? grid[c][r] : null; }
  function copyGrid(g)           { return g.map(col => col.slice()); }   // shallow — comparte refs

  function initialGrid() {
    const g = Array.from({length: 8}, () => Array(8).fill(null));
    for (let c = 0; c < 8; c++) {
      g[c][6] = newPiece('w', 'P');
      g[c][1] = newPiece('b', 'P');
    }
    const back = ['R','N','B','Q','K','B','N','R'];
    for (let c = 0; c < 8; c++) {
      g[c][7] = newPiece('w', back[c]);
      g[c][0] = newPiece('b', back[c]);
    }
    return g;
  }

  function genPseudoMoves(grid, c, r, ep) {
    const p = grid[c][r];
    if (!p) return [];
    const moves = [];
    if (p.kind === 'P') {
      const dir = p.color === 'w' ? -1 : 1;
      const startRow = p.color === 'w' ? 6 : 1;
      const promoRow = p.color === 'w' ? 0 : 7;
      if (pieceAt(grid, c, r+dir) === null) {
        moves.push([c, r+dir, (r+dir === promoRow) ? {promotion:true} : {}]);
        if (r === startRow && pieceAt(grid, c, r+2*dir) === null) {
          moves.push([c, r+2*dir, {double_push: true}]);
        }
      }
      for (const dc of [-1, 1]) {
        const nc = c+dc, nr = r+dir;
        const t = pieceAt(grid, nc, nr);
        if (t && t.color !== p.color) {
          moves.push([nc, nr, (nr === promoRow) ? {promotion:true} : {}]);
        }
        if (ep && ep[0] === nc && ep[1] === nr) {
          moves.push([nc, nr, {en_passant: true}]);
        }
      }
    } else if (p.kind === 'N') {
      for (const [dc, dr] of [[1,2],[2,1],[-1,2],[-2,1],[1,-2],[2,-1],[-1,-2],[-2,-1]]) {
        const nc = c+dc, nr = r+dr;
        if (nc>=0 && nc<8 && nr>=0 && nr<8) {
          const t = grid[nc][nr];
          if (!t || t.color !== p.color) moves.push([nc, nr, {}]);
        }
      }
    } else if (p.kind === 'K') {
      for (let dc = -1; dc <= 1; dc++) for (let dr = -1; dr <= 1; dr++) {
        if (dc === 0 && dr === 0) continue;
        const nc = c+dc, nr = r+dr;
        if (nc>=0 && nc<8 && nr>=0 && nr<8) {
          const t = grid[nc][nr];
          if (!t || t.color !== p.color) moves.push([nc, nr, {}]);
        }
      }
    } else {
      const dirs = [];
      if (p.kind === 'B' || p.kind === 'Q') dirs.push([1,1],[-1,1],[1,-1],[-1,-1]);
      if (p.kind === 'R' || p.kind === 'Q') dirs.push([1,0],[-1,0],[0,1],[0,-1]);
      for (const [dc, dr] of dirs) {
        let nc = c+dc, nr = r+dr;
        while (nc>=0 && nc<8 && nr>=0 && nr<8) {
          const t = grid[nc][nr];
          if (!t) moves.push([nc, nr, {}]);
          else { if (t.color !== p.color) moves.push([nc, nr, {}]); break; }
          nc += dc; nr += dr;
        }
      }
    }
    return moves;
  }

  function squareAttacked(grid, c, r, byColor) {
    const pawnFromDr = byColor === 'w' ? 1 : -1;
    for (const dc of [-1, 1]) {
      const p = pieceAt(grid, c+dc, r+pawnFromDr);
      if (p && p.color === byColor && p.kind === 'P') return true;
    }
    for (const [dc, dr] of [[1,2],[2,1],[-1,2],[-2,1],[1,-2],[2,-1],[-1,-2],[-2,-1]]) {
      const p = pieceAt(grid, c+dc, r+dr);
      if (p && p.color === byColor && p.kind === 'N') return true;
    }
    for (let dc = -1; dc <= 1; dc++) for (let dr = -1; dr <= 1; dr++) {
      if (dc === 0 && dr === 0) continue;
      const p = pieceAt(grid, c+dc, r+dr);
      if (p && p.color === byColor && p.kind === 'K') return true;
    }
    for (const [dc, dr] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      let nc = c+dc, nr = r+dr;
      while (nc>=0 && nc<8 && nr>=0 && nr<8) {
        const p = grid[nc][nr];
        if (p) { if (p.color === byColor && (p.kind === 'R' || p.kind === 'Q')) return true; break; }
        nc += dc; nr += dr;
      }
    }
    for (const [dc, dr] of [[1,1],[-1,1],[1,-1],[-1,-1]]) {
      let nc = c+dc, nr = r+dr;
      while (nc>=0 && nc<8 && nr>=0 && nr<8) {
        const p = grid[nc][nr];
        if (p) { if (p.color === byColor && (p.kind === 'B' || p.kind === 'Q')) return true; break; }
        nc += dc; nr += dr;
      }
    }
    return false;
  }

  function findKing(grid, color) {
    for (let c = 0; c < 8; c++) for (let r = 0; r < 8; r++) {
      const p = grid[c][r];
      if (p && p.color === color && p.kind === 'K') return [c, r];
    }
    return null;
  }

  function inCheck(grid, color) {
    const k = findKing(grid, color);
    if (!k) return false;
    return squareAttacked(grid, k[0], k[1], color === 'w' ? 'b' : 'w');
  }

  function simulateMove(grid, fc, fr, tc, tr, extra) {
    const g = copyGrid(grid);
    let piece = g[fc][fr];
    g[fc][fr] = null;
    if (extra.en_passant)     g[tc][fr] = null;
    if (extra.castle) {
      if (tc === 6)      { g[5][tr] = g[7][tr]; g[7][tr] = null; }
      else if (tc === 2) { g[3][tr] = g[0][tr]; g[0][tr] = null; }
    }
    if (extra.promotion) piece = newPiece(piece.color, 'Q');
    g[tc][tr] = piece;
    return g;
  }

  function genLegalMoves(grid, c, r, ep) {
    const p = grid[c][r];
    if (!p) return [];
    const pseudo = genPseudoMoves(grid, c, r, ep);

    // Castling — agregamos pseudo-moves del rey solo si todavía no se movió
    if (p.kind === 'K' && !p.hasMoved) {
      const rank = p.color === 'w' ? 7 : 0;
      if (c === 4 && r === rank) {
        const enemy = p.color === 'w' ? 'b' : 'w';
        if (!squareAttacked(grid, 4, rank, enemy)) {
          const rk = grid[7][rank];
          if (rk && rk.kind === 'R' && rk.color === p.color && !rk.hasMoved
              && !grid[5][rank] && !grid[6][rank]
              && !squareAttacked(grid, 5, rank, enemy)
              && !squareAttacked(grid, 6, rank, enemy)) {
            pseudo.push([6, rank, {castle: true}]);
          }
          const rq = grid[0][rank];
          if (rq && rq.kind === 'R' && rq.color === p.color && !rq.hasMoved
              && !grid[1][rank] && !grid[2][rank] && !grid[3][rank]
              && !squareAttacked(grid, 3, rank, enemy)
              && !squareAttacked(grid, 2, rank, enemy)) {
            pseudo.push([2, rank, {castle: true}]);
          }
        }
      }
    }

    const legal = [];
    for (const [tc, tr, extra] of pseudo) {
      const ng = simulateMove(grid, c, r, tc, tr, extra);
      if (!inCheck(ng, p.color)) legal.push([tc, tr, extra]);
    }
    return legal;
  }

  function anyLegalMove(grid, color, ep) {
    for (let c = 0; c < 8; c++) for (let r = 0; r < 8; r++) {
      const p = grid[c][r];
      if (p && p.color === color && genLegalMoves(grid, c, r, ep).length > 0) return true;
    }
    return false;
  }

  function allLegalMoves(grid, color, ep) {
    const out = [];
    for (let c = 0; c < 8; c++) for (let r = 0; r < 8; r++) {
      const p = grid[c][r];
      if (p && p.color === color) {
        for (const [tc, tr, extra] of genLegalMoves(grid, c, r, ep)) out.push([c, r, tc, tr, extra]);
      }
    }
    return out;
  }

  // FEN completo (incluye contadores fake 0 1). Usado por la integración Stockfish UCI.
  function buildFen(grid, turn, ep) {
    const rows = [];
    for (let r = 0; r < 8; r++) {
      let row = '', empty = 0;
      for (let c = 0; c < 8; c++) {
        const p = grid[c][r];
        if (!p) empty++;
        else { if (empty) { row += empty; empty = 0; } row += (p.color === 'w' ? p.kind : p.kind.toLowerCase()); }
      }
      if (empty) row += empty;
      rows.push(row);
    }
    const pieces = rows.join('/');
    let castle = '';
    const wk = grid[4][7];
    if (wk && wk.kind === 'K' && wk.color === 'w' && !wk.hasMoved) {
      const r1 = grid[7][7]; if (r1 && r1.kind === 'R' && r1.color === 'w' && !r1.hasMoved) castle += 'K';
      const r2 = grid[0][7]; if (r2 && r2.kind === 'R' && r2.color === 'w' && !r2.hasMoved) castle += 'Q';
    }
    const bk = grid[4][0];
    if (bk && bk.kind === 'K' && bk.color === 'b' && !bk.hasMoved) {
      const r1 = grid[7][0]; if (r1 && r1.kind === 'R' && r1.color === 'b' && !r1.hasMoved) castle += 'k';
      const r2 = grid[0][0]; if (r2 && r2.kind === 'R' && r2.color === 'b' && !r2.hasMoved) castle += 'q';
    }
    const epS = ep ? ('abcdefgh'[ep[0]] + (8 - ep[1])) : '-';
    return pieces + ' ' + turn + ' ' + (castle || '-') + ' ' + epS + ' 0 1';
  }

  // UCI move ("e2e4" o "e7e8q") → tupla (fc,fr,tc,tr,extra) compatible con makeMove.
  // Busca el match en gen_legal_moves para recuperar las flags (castle/en_passant/promotion).
  function parseUciMove(uci, grid, ep) {
    if (!uci || uci.length < 4) return null;
    const fc = uci.charCodeAt(0) - 97;
    const fr = 7 - (parseInt(uci[1], 10) - 1);
    const tc = uci.charCodeAt(2) - 97;
    const tr = 7 - (parseInt(uci[3], 10) - 1);
    const legal = genLegalMoves(grid, fc, fr, ep);
    for (const [c, r, extra] of legal) {
      if (c === tc && r === tr) return [fc, fr, tc, tr, extra];
    }
    return null;
  }

  // Clave para repetición triple — board + turno + enroque + en-passant
  function positionKey(grid, turn, ep) {
    let s = '';
    for (let r = 0; r < 8; r++) {
      let empty = 0;
      for (let c = 0; c < 8; c++) {
        const p = grid[c][r];
        if (!p) { empty++; }
        else { if (empty) { s += empty; empty = 0; } s += (p.color === 'w' ? p.kind : p.kind.toLowerCase()); }
      }
      if (empty) s += empty;
      s += '/';
    }
    s += turn;
    let castle = '';
    const wk = grid[4][7];
    if (wk && wk.kind === 'K' && wk.color === 'w' && !wk.hasMoved) {
      const rr = grid[7][7]; if (rr && rr.kind === 'R' && rr.color === 'w' && !rr.hasMoved) castle += 'K';
      const rq = grid[0][7]; if (rq && rq.kind === 'R' && rq.color === 'w' && !rq.hasMoved) castle += 'Q';
    }
    const bk = grid[4][0];
    if (bk && bk.kind === 'K' && bk.color === 'b' && !bk.hasMoved) {
      const rr = grid[7][0]; if (rr && rr.kind === 'R' && rr.color === 'b' && !rr.hasMoved) castle += 'k';
      const rq = grid[0][0]; if (rq && rq.kind === 'R' && rq.color === 'b' && !rq.hasMoved) castle += 'q';
    }
    s += castle || '-';
    s += ep ? ('abcdefgh'[ep[0]] + (8-ep[1])) : '-';
    return s;
  }

  function hasInsufficientMaterial(grid) {
    const white = [], black = [], wbsq = [], bbsq = [];
    for (let c = 0; c < 8; c++) for (let r = 0; r < 8; r++) {
      const p = grid[c][r];
      if (!p || p.kind === 'K') continue;
      if (p.kind === 'P' || p.kind === 'R' || p.kind === 'Q') return false;
      if (p.color === 'w') { white.push(p.kind); if (p.kind === 'B') wbsq.push((c+r) & 1); }
      else                 { black.push(p.kind); if (p.kind === 'B') bbsq.push((c+r) & 1); }
    }
    if (!white.length && !black.length) return true;
    if (!white.length && black.length === 1 && (black[0] === 'B' || black[0] === 'N')) return true;
    if (!black.length && white.length === 1 && (white[0] === 'B' || white[0] === 'N')) return true;
    if (white.length === 1 && white[0] === 'B' && black.length === 1 && black[0] === 'B' && wbsq[0] === bbsq[0]) return true;
    return false;
  }

  // ════════════════════════════════════════════════════════════════════
  //  AI — negamax + alpha-beta + iterative deepening
  //  (Para enchufar Stockfish.js: descomentar el bloque del worker en _aiWorker.
  //  Necesita stockfish.js cargado como Web Worker; ~1MB de WASM.)
  // ════════════════════════════════════════════════════════════════════

  function evaluate(grid) {
    let score = 0;
    for (let c = 0; c < 8; c++) for (let r = 0; r < 8; r++) {
      const p = grid[c][r];
      if (!p) continue;
      let val = PIECE_VALUES[p.kind];
      if (p.kind === 'N' || p.kind === 'B') {
        const centerDist = Math.max(Math.abs(c - 3.5), Math.abs(r - 3.5));
        val += Math.floor((3.5 - centerDist) * 6);
      } else if (p.kind === 'P') {
        val += (p.color === 'w' ? (6 - r) : (r - 1)) * 5;
        if (c === 3 || c === 4) val += 6;
      } else if (p.kind === 'K') {
        if (c >= 2 && c <= 5 && r >= 2 && r <= 5) val -= 10;
      }
      score += (p.color === 'w' ? val : -val);
    }
    return score;
  }

  function moveOrderKey(grid, mv) {
    const [fc, fr, tc, tr, extra] = mv;
    let s = 0;
    const target = grid[tc][tr];
    if (target) s += PIECE_VALUES[target.kind] * 10 - PIECE_VALUES[grid[fc][fr].kind];
    if (extra.promotion) s += 800;
    if (extra.en_passant) s += 100;
    return s;
  }

  class TimeoutSignal extends Error {}

  function negamax(grid, depth, alpha, beta, color, ep, deadline) {
    if (performance.now() >= deadline) throw new TimeoutSignal();
    if (depth === 0) return evaluate(grid) * (color === 'w' ? 1 : -1);
    const moves = allLegalMoves(grid, color, ep);
    if (!moves.length) {
      if (inCheck(grid, color)) return -100000 - depth;
      return 0;
    }
    moves.sort((a, b) => moveOrderKey(grid, b) - moveOrderKey(grid, a));
    let best = -Infinity;
    const opp = color === 'w' ? 'b' : 'w';
    for (const [fc, fr, tc, tr, extra] of moves) {
      const ng = simulateMove(grid, fc, fr, tc, tr, extra);
      let newEp = null;
      const piece = grid[fc][fr];
      if (piece.kind === 'P' && extra.double_push) newEp = [fc, (fr + tr) >> 1];
      const score = -negamax(ng, depth - 1, -beta, -alpha, opp, newEp, deadline);
      if (score > best) best = score;
      if (best > alpha) alpha = best;
      if (alpha >= beta) break;
    }
    return best;
  }

  function searchRoot(grid, color, ep, depth, deadline, hint) {
    const moves = allLegalMoves(grid, color, ep);
    if (!moves.length) return null;
    moves.sort((a, b) => moveOrderKey(grid, b) - moveOrderKey(grid, a));
    if (hint) {
      const i = moves.findIndex(m => m[0]===hint[0]&&m[1]===hint[1]&&m[2]===hint[2]&&m[3]===hint[3]);
      if (i > 0) { const h = moves.splice(i, 1)[0]; moves.unshift(h); }
    }
    let bestScore = -Infinity, bestMove = null;
    let alpha = -Infinity;
    const beta = Infinity;
    const opp = color === 'w' ? 'b' : 'w';
    for (const mv of moves) {
      if (performance.now() >= deadline) throw new TimeoutSignal();
      const [fc, fr, tc, tr, extra] = mv;
      const ng = simulateMove(grid, fc, fr, tc, tr, extra);
      let newEp = null;
      const piece = grid[fc][fr];
      if (piece.kind === 'P' && extra.double_push) newEp = [fc, (fr + tr) >> 1];
      const score = -negamax(ng, depth - 1, -beta, -alpha, opp, newEp, deadline);
      if (score > bestScore) { bestScore = score; bestMove = mv; }
      if (score > alpha) alpha = score;
    }
    return bestMove;
  }

  function findBestMove(grid, color, ep, maxDepth, timeBudgetMs) {
    const deadline = performance.now() + timeBudgetMs;
    const moves = allLegalMoves(grid, color, ep);
    if (!moves.length) return { move: null, depth: 0 };
    moves.sort((a, b) => moveOrderKey(grid, b) - moveOrderKey(grid, a));
    let best = moves[0], depthReached = 0;
    for (let d = 1; d <= maxDepth; d++) {
      try {
        const mv = searchRoot(grid, color, ep, d, deadline, best);
        if (mv) { best = mv; depthReached = d; }
      } catch (e) {
        if (e instanceof TimeoutSignal) break;
        throw e;
      }
      if (performance.now() >= deadline) break;
    }
    return { move: best, depth: depthReached };
  }

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  CHESS — port web de Chess.py.
  //  Motor interno (sin Stockfish — el .exe no corre en browser).
  //
  //  ARQUITECTURA AI WORKER: el motor + búsqueda viven en el bloque
  //  <script id="ai-engine" type="text/plain"> de arriba. Acá lo
  //  cargamos en el main thread con (0,eval) y armamos una segunda
  //  copia como Blob URL para el Web Worker. La búsqueda corre en
  //  el worker, el main thread queda libre para renderizar y manejar
  //  input mientras la IA piensa.
  // ════════════════════════════════════════════════════════════════════
  const PIECE_CHARS = { K:'♚', Q:'♛', R:'♜', B:'♝', N:'♞', P:'♟' };
  const AI_TIME_BUDGET_MS = 3000;     // tope blando por jugada de la IA
  const AI_TACTICAL_MULT  = 2;        // multiplicador cuando la posición es táctica (jaque, captura ganadora, promoción, pieza colgada)
  const AI_MAX_DEPTH      = 10;       // techo de iterative deepening (solo motor interno)
  const MOVE_ANIM_MS      = 180;      // duración slide-animation
  const SOUND_VOLUME      = 0.18;     // master gain de los SFX (0 = mudo, 1 = full)
  const CLOCK_INITIAL_MS  = 15 * 60 * 1000;   // 15 minutos por jugador
  // Stockfish.js asm.js single-file — primero intentamos el archivo local
  // (mismo origen, anda en iOS Safari y otros browsers estrictos con Workers
  // cross-origin). Si no está, caemos al CDN. Si tampoco carga el CDN, motor interno.
  const STOCKFISH_URLS = [
    'stockfish.js',
    'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js',
  ];

  const __engineSrc = document.getElementById('ai-engine').textContent;
  // Inyectamos como <script> real: ejecuta en scope global y las funciones quedan
  // accesibles para el main thread. Más confiable que (0,eval) entre browsers.
  const __engineScript = document.createElement('script');
  __engineScript.textContent = __engineSrc;
  document.head.appendChild(__engineScript);

  const __workerSrc = __engineSrc + `
    self.onmessage = function(e) {
      try {
        const { grid, color, ep, maxDepth, timeBudgetMs } = e.data;
        const result = findBestMove(grid, color, ep, maxDepth, timeBudgetMs);
        self.postMessage(result);
      } catch (err) {
        self.postMessage({ error: String(err) });
      }
    };
  `;
  const WORKER_URL = URL.createObjectURL(new Blob([__workerSrc], { type: 'application/javascript' }));

  // ════════════════════════════════════════════════════════════════════
  //  STOCKFISH.JS LOADER (CDN, asm.js single-file)
  //  Si carga OK queda como motor principal — mucho más fuerte que el
  //  interno. Si falla (offline, CSP, network) usamos el interno.
  // ════════════════════════════════════════════════════════════════════
  let stockfishWorker = null;
  let stockfishReady = false;
  let stockfishPending = null;       // { resolve, depth: int (current best depth seen) }

  function updateEngineLine(msg, color) {
    const el = document.getElementById('engineLine');
    if (!el) return;
    el.textContent = msg;
    if (color) el.style.color = color;
  }

  function tryStockfishUrl(url, label, onFail) {
    let sf;
    try {
      sf = new Worker(url);
    } catch (err) {
      console.warn('Stockfish: no se pudo crear el Worker desde', url, err);
      onFail();
      return;
    }
    let settled = false;
    sf.onmessage = (e) => {
      const line = String(e.data || '');
      if (line === 'uciok')          sf.postMessage('isready');
      else if (line === 'readyok')   {
        settled = true;
        stockfishReady = true;
        updateEngineLine('Motor: Stockfish (' + label + ') · ' + (AI_TIME_BUDGET_MS/1000) + 's por jugada',
                         'rgba(140,220,140,0.65)');
      }
      else if (line.startsWith('info ')) {
        if (stockfishPending) {
          const md = line.match(/\bdepth (\d+)/);
          if (md) {
            stockfishPending.depth = parseInt(md[1], 10);
            game.aiLastDepth = stockfishPending.depth;   // live depth update
          }
          const ms = line.match(/\bseldepth (\d+)/);
          if (ms) {
            stockfishPending.seldepth = parseInt(ms[1], 10);
            game.aiLastSeldepth = stockfishPending.seldepth;
          }
        }
      } else if (line.startsWith('bestmove ')) {
        const uci = line.split(/\s+/)[1];
        const pending = stockfishPending;
        stockfishPending = null;
        if (pending) pending.resolve({ uci, depth: pending.depth, seldepth: pending.seldepth || 0 });
      }
    };
    sf.onerror = (err) => {
      console.warn('Stockfish: error en runtime con', url, err.message || err);
      try { sf.terminate(); } catch {}
      if (!settled) { onFail(); return; }
      stockfishReady = false;
      stockfishWorker = null;
      updateEngineLine('Motor: Interno (Stockfish falló)', 'rgba(220,180,100,0.6)');
      if (stockfishPending) { stockfishPending.resolve(null); stockfishPending = null; }
    };
    stockfishWorker = sf;
    sf.postMessage('uci');
    // Si no llega "uciok"/"readyok" en 5s, asumimos que esta URL falló
    setTimeout(() => {
      if (!settled) {
        try { sf.terminate(); } catch {}
        if (stockfishWorker === sf) stockfishWorker = null;
        onFail();
      }
    }, 5000);
  }

  function initStockfish() {
    let idx = 0;
    const tryNext = () => {
      if (idx >= STOCKFISH_URLS.length) {
        updateEngineLine('Motor: Interno (Stockfish no disponible)', 'rgba(220,180,100,0.6)');
        return;
      }
      const url = STOCKFISH_URLS[idx++];
      const label = url.startsWith('http') ? 'CDN' : 'local';
      tryStockfishUrl(url, label, tryNext);
    };
    tryNext();
  }

  function askStockfish(fen, timeMs) {
    return new Promise((resolve) => {
      if (!stockfishReady || !stockfishWorker) { resolve(null); return; }
      if (stockfishPending) {            // defensivo — no debería pasar
        stockfishPending.resolve(null);
      }
      stockfishPending = { resolve, depth: 0, seldepth: 0 };
      stockfishWorker.postMessage('position fen ' + fen);
      stockfishWorker.postMessage('go movetime ' + timeMs);
    });
  }

  initStockfish();

  // ════════════════════════════════════════════════════════════════════
  //  SOUND (Web Audio API — sintetizado, sin assets)
  // ════════════════════════════════════════════════════════════════════
  let actx = null;
  let masterGain = null;
  const sounds = {};

  function ensureAudio() {
    if (actx) return;
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return; }
    masterGain = actx.createGain();
    masterGain.gain.value = SOUND_VOLUME;
    masterGain.connect(actx.destination);
    buildSounds();
  }

  function makeBuffer(durationMs, sampleFn) {
    const sr = actx.sampleRate;
    const n = Math.floor(sr * durationMs / 1000);
    const buf = actx.createBuffer(1, n, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < n; i++) data[i] = sampleFn(i, n, sr);
    return buf;
  }

  function makeClick(durationMs, volume, freq) {
    return makeBuffer(durationMs, (i, n, sr) => {
      const env = Math.exp(-i / (n * 0.18));
      const t = i / sr;
      const tone = freq ? Math.sin(2 * Math.PI * freq * t) : 0;
      const noise = Math.random() * 2 - 1;
      const sample = freq ? (tone * 0.6 + noise * 0.4) : noise;
      return sample * env * volume;
    });
  }

  function makeChord(freqs, durationMs, volume) {
    return makeBuffer(durationMs, (i, n, sr) => {
      const t = i / sr;
      const env = Math.sin(Math.PI * i / n);
      let v = 0;
      for (const f of freqs) v += Math.sin(2 * Math.PI * f * t);
      return (v / freqs.length) * env * volume;
    });
  }

  function buildSounds() {
    sounds.move      = makeClick(60,  0.35, 420);
    sounds.capture   = makeClick(120, 0.50, 180);
    sounds.check     = makeChord([880, 1100], 220, 0.30);
    sounds.castle    = makeChord([300, 450],  180, 0.40);
    sounds.promotion = makeChord([600, 900, 1200], 280, 0.35);
    sounds.end       = makeChord([220, 280, 350], 600, 0.50);
  }

  function play(name) {
    if (!actx || !sounds[name] || !masterGain) return;
    const src = actx.createBufferSource();
    src.buffer = sounds[name];
    src.connect(masterGain);   // pasa por el master gain global (= SOUND_VOLUME)
    src.start();
  }

  // ════════════════════════════════════════════════════════════════════
  //  GAME STATE
  // ════════════════════════════════════════════════════════════════════
  const game = {
    state: 'menu',          // 'menu' | 'play'
    mode: null,             // 'pvp' | 'w' | 'b' | 'aiva'
    aiColor: null,          // 'w' | 'b' | null
    humanColor: null,
    aiBoth: false,
    flip: false,
    grid: initialGrid(),
    turn: 'w',
    lastMove: null,
    enPassant: null,
    status: '',             // '' | 'check' | 'checkmate' | 'stalemate' | 'repetition' | 'insufficient'
    gameOver: false,
    captured: [],           // [{color, kind}, ...]
    positionCounts: new Map(),

    historyIndex: 0,
    selected: null,
    legal: [],
    dragging: false,

  function recordPosition() {
    const key = positionKey(game.grid, game.turn, game.enPassant);
    const n = (game.positionCounts.get(key) || 0) + 1;
    game.positionCounts.set(key, n);
    return n;
  }

  // ── Reloj ──
  // Decrementa el reloj del jugador a mover. Si llega a 0, declara timeout.
  // Al hacer un movimiento (turno cambia), automáticamente arranca el otro
  // reloj porque siempre tickea el del game.turn actual — eso es lo que hace
  // un reloj de ajedrez real cuando apretás el botón.
  function tickClock() {
    const now = performance.now();
    if (game.state === 'play' && !game.gameOver
        && !isViewingHistory() && game.clockLastTick > 0) {
      const dt = now - game.clockLastTick;
      if (game.turn === 'w') game.clockW = Math.max(0, game.clockW - dt);
      else                   game.clockB = Math.max(0, game.clockB - dt);
      if (game.clockW <= 0 || game.clockB <= 0) {
        game.status = 'timeout';
        game.gameOver = true;
        play('end');
        if (game.aiWorker) { game.aiWorker.terminate(); game.aiWorker = null; }
      }
    }
    game.clockLastTick = now;
  }

  function formatClock(ms) {
    ms = Math.max(0, ms);
    const total = Math.ceil(ms / 1000);
    const m = Math.floor(total / 60);
    const s = total % 60;
    return m + ':' + s.toString().padStart(2, '0');
  }

  function pushHistory() {
    game.history.push({
      grid: copyGrid(game.grid),
      turn: game.turn,
      lastMove: game.lastMove,
      status: game.status,
      gameOver: game.gameOver,
      captured: game.captured.slice(),

  function isViewingHistory() { return game.historyIndex < game.history.length - 1; }
  function currentPlayerIsAI() {
    if (game.aiBoth) return true;

  function resetBoard() {
    game.gen++;

    game.mode = mode;

    else if (mode === 'w')   { game.aiColor = 'b';  game.humanColor = 'w';  game.flip = false; }

    document.getElementById('bar').style.display  = 'none';

  function makeMove(fc, fr, tc, tr, extra, animate=true) {
    const piece = game.grid[fc][fr];
    const capturedPiece = extra.en_passant ? game.grid[tc][fr] : game.grid[tc][tr];
    const wasCapture = capturedPiece !== null;

        fromC: fc, fromR: fr, toC: tc, toR: tr,

        startTime: performance.now(),
        duration: MOVE_ANIM_MS,
        rookAnim: null,
      };
      if (extra.castle) {
        const rookFromC = (tc === 6) ? 7 : 0;
        const rookToC   = (tc === 6) ? 5 : 3;
        game.animation.rookAnim = { fromC: rookFromC, fromR: tr, toC: rookToC, toR: tr };
      }
    } else {
      game.animation = null;
    }

    let newEp = null;
    if (piece.kind === 'P' && extra.double_push) newEp = [fc, (fr + tr) >> 1];
    if (extra.en_passant) game.grid[tc][fr] = null;
    if (extra.castle) {
      if (tc === 6)      { const r = game.grid[7][tr]; game.grid[7][tr] = null; game.grid[5][tr] = r; r.hasMoved = true; }
      else if (tc === 2) { const r = game.grid[0][tr]; game.grid[0][tr] = null; game.grid[3][tr] = r; r.hasMoved = true; }
    }
