<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- PWA / "agregar a pantalla de inicio": abre sin barra del navegador (display standalone) -->
<meta name="theme-color" content="#05060a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Orbitron', 'Segoe UI', system-ui, sans-serif;
  }
  /* El canvas tiene resolución LÓGICA fija 1280×720 (igual que el pygame original) y se escala con
     letterbox para entrar en la pantalla — así toda la geometría porcentual y los umbrales de física
     dependientes de SCREEN_X se comportan idénticos al juego de escritorio. */
  #c { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

  #hint {
    position: absolute; left: 0; right: 0; top: calc(8px + env(safe-area-inset-top));
    text-align: center; color: rgba(255,255,255,0.5);
    font-size: 13px; letter-spacing: 0.04em; pointer-events: none;
    transition: opacity 0.8s; z-index: 5; padding: 0 16px;
  }

  /* ── Controles en pantalla (touch). En desktop el teclado sigue siendo el camino principal; estos
     botones quedan disponibles igual. Cada botón es un elemento independiente con su propio pointer
     capture, así el multi-touch (girar + acelerar al mismo tiempo) funciona. ── */
  /* Margen horizontal FIJO (sin safe-area): en fullscreen el env(safe-area-inset-left/right) del notch
     metía un margen extra que corría el joystick hacia adentro. El inferior sí respeta el safe-area (home bar). */
  .pad { position: absolute; bottom: calc(6px + env(safe-area-inset-bottom)); z-index: 4; display: flex; gap: 8px; }
  #padL { left: 8px; flex-direction: row; align-items: flex-end; }
  #padR { right: 8px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .row { display: flex; gap: 8px; align-items: center; }
  .btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.08s, transform 0.06s, box-shadow 0.12s, border-color 0.12s;
  }
  /* se ilumina al pasar el mouse por encima */
  .btn:hover { background: rgba(120,200,255,0.16); border-color: rgba(120,200,255,0.6); box-shadow: 0 0 14px rgba(120,200,255,0.6); }
  .btn:active, .btn.on { background: rgba(120,200,255,0.30); border-color: rgba(120,200,255,0.55); transform: scale(0.93); }
  .btn svg { display: block; width: 16px; height: 16px; pointer-events: none; }
  .btn.fire { width: 30px; height: 30px; background: rgba(255,90,60,0.18); border-color: rgba(255,90,60,0.5); position: relative; overflow: hidden; }
  .btn.fire svg { width: 13px; height: 13px; }
  .btn.fire:hover { background: rgba(255,90,60,0.32); border-color: rgba(255,90,60,0.8); box-shadow: 0 0 14px rgba(255,90,60,0.65); }
  .btn.fire:active { background: rgba(255,90,60,0.42); }
  #cdRing { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; }
  /* Joysticks (nipplejs). Cada zona aloja un joystick estático centrado; el movimiento se bloquea por eje
     (jThrottle = vertical = acelerador, jSteer = horizontal = dirección). El look se estiliza abajo. */
  /* Contenedor NO-flex del joystick: evita el cálculo de posición erróneo de nipplejs cuando el padre es flex. */
  .joywrap { display: block; width: 84px; height: 84px; }
  /* La zona se ajusta casi al tamaño del joystick (size 80) para que no quede hueco vacío a los lados. */
  .joy { width: 84px; height: 84px; position: relative; touch-action: none; }
  /* Estilizado del joystick de nipplejs: base hundida con glow + nub con relieve celeste */
  .nipple .back {
    background: radial-gradient(circle at 50% 38%, rgba(255,255,255,0.10), rgba(255,255,255,0.03) 70%) !important;
    border: 1px solid rgba(120,200,255,0.35);
    box-shadow: inset 0 2px 14px rgba(0,0,0,0.5), 0 0 16px rgba(120,200,255,0.25);
    opacity: 1 !important;
  }
  .nipple .front {
    background: radial-gradient(circle at 50% 35%, rgba(160,220,255,0.95), rgba(120,200,255,0.55) 70%) !important;
    border: 1px solid rgba(180,228,255,0.8);
    box-shadow: 0 3px 10px rgba(0,0,0,0.5), 0 0 16px rgba(120,200,255,0.6);
    opacity: 1 !important;
  }
  /* Botones de menú (esquina sup-der): Enter / Esc */
  #padMenu { position: absolute; top: calc(8px + env(safe-area-inset-top)); right: calc(10px + env(safe-area-inset-right)); z-index: 4; display: flex; gap: 8px; }
  #padMenu .btn { width: 30px; height: 30px; }
  #padMenu .btn svg { width: 14px; height: 14px; }
  /* Ícono de pantalla completa: muestra "expandir" o "contraer" según el estado (body.fs-on) */
  #btnFs .ic-exit { display: none; }
  body.fs-on #btnFs .ic-enter { display: none; }
  body.fs-on #btnFs .ic-exit  { display: block; }

  /* Aviso de orientación: el juego es vertical. Se muestra (vía JS) cuando la pantalla está apaisada. */
  #rotate {
    position: absolute; inset: 0; z-index: 20; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 22px;
    background: #05060a; color: rgba(255,255,255,0.85);
    text-align: center; padding: 24px;
  }
  #rotate svg { width: 88px; height: 88px; color: #78c8ff; animation: rotatehint 2.2s ease-in-out infinite; }
  #rotate p { font-size: 19px; letter-spacing: 0.06em; line-height: 1.5; }
  @keyframes rotatehint { 0%, 55%, 100% { transform: rotate(0deg); } 25%, 40% { transform: rotate(-90deg); } }
  /* Exit button — vuelta al menú raíz */
  #btnExit {
    position: absolute;
    left: 6px;
    bottom: calc(env(safe-area-inset-bottom) + 4px);
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.45);
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
    z-index: 10;
  }
  #btnExit svg { display: block; width: 14px; height: 14px; pointer-events: none; }
  #btnExit:active { background: rgba(240,90,95,0.28); border-color: rgba(240,90,95,0.55); color: #fff; transform: scale(0.9); }
  /* Info (FPS) — esquina abajo-der, flotante. */
  #btnInfo {
    position: absolute;
    right: 6px;
    bottom: calc(env(safe-area-inset-bottom) + 4px);
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.45);
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
    z-index: 10;
  }
  #btnInfo svg { display: block; width: 14px; height: 14px; pointer-events: none; }
  #btnInfo:active, #btnInfo.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); color: #fff; }
  #fpsOverlay {
    position: absolute;
    right: 40px;
    bottom: calc(env(safe-area-inset-bottom) + 8px);
    font-family: monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.6);
    padding: 3px 8px;
    border-radius: 4px;
    pointer-events: none;
    display: none;
    z-index: 9;
  }

</style>
<script>/* arcade-embed-shim: corre embebido en la shell del Arcade (iframe) */
(function () {
  if (window.self === window.top) return;            // sólo embebido
  var noop = function () { return Promise.resolve(); };
  try { Element.prototype.requestFullscreen = noop; } catch (e) {}
  try { Element.prototype.webkitRequestFullscreen = noop; } catch (e) {}
  // El "salir al menú" del juego: en vez de navegar (recargaría el menú dentro del iframe),
  // avisamos a la shell por postMessage. Capturamos el click antes que el handler del juego.
  window.addEventListener('click', function (e) {
    var ex = e.target && e.target.closest && e.target.closest('#btnExit, #btnHome');
    if (!ex) return;
    e.preventDefault(); e.stopImmediatePropagation();
    try { parent.postMessage({ type: 'arcade:exit' }, '*'); } catch (x) {}
  }, true);
})();
</script>

<body>
  <canvas id="c"></canvas>
  <div id="hint">joysticks: acelerar (izq) · dirección (der) · 🔴 disparar · teclado: flechas/WASD + espacio</div>

  <!-- Pad izquierdo: joystick de acelerador (eje vertical) + disparar.
       El joystick va envuelto en un contenedor NO-flex (.joywrap): si su padre directo es flex, nipplejs
       calcula mal la posición del nub (sobre todo con un hermano al lado, como el botón de disparo). -->
  <div id="padL" class="pad">
    <div class="joywrap"><div class="joy" id="jThrottle" aria-label="acelerador"></div></div>
    <button class="btn fire" data-k="SPACE" aria-label="disparar"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="7"/></svg><span id="cdRing"></span></button>
  </div>

  <!-- Pad derecho: joystick de dirección (eje horizontal, proporcional) -->
  <div id="padR" class="pad">
    <div class="joywrap"><div class="joy" id="jSteer" aria-label="dirección"></div></div>
  </div>

  <!-- Aviso: girá el teléfono a horizontal -->
  <div id="rotate">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2.5"/><line x1="10.5" y1="19" x2="13.5" y2="19" stroke-width="2"/></svg>
    <p>Girá el teléfono<br>CrazyTanks se juega en horizontal</p>
  </div>

  <!-- Botones de esquina: pantalla completa + atrás/salir (el menú se opera tocando las opciones directamente) -->
  <div id="padMenu">
    <button class="btn" id="btnFs" aria-label="pantalla completa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg></button>
    <button class="btn" data-k="ESCAPE" aria-label="atrás"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><path d="M18 9l-6 6M12 9l6 6"/></svg></button>
  </div>

<script src="matter.min.js"></script>
<script src="nipplejs.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════
//  CRAZYTANKS — port web del juego de carreras. Se juega en LANDSCAPE (teléfono horizontal).
// ════════════════════════════════════════════════════════════════════

// ── DIMENSIÓN LÓGICA — 1280×720 (16:9, las dimensiones originales de los mapas) ──
const SCREEN_X = 1280;
const SCREEN_Y = 720;

// ── TUNING ──
// El pygame original corría SIN cap de FPS, así que sus incrementos de vel/ang_vel por-frame
// (vel += 2.5, vel *= 0.9975, etc.) asumían cientos de frames/seg. En el navegador con rAF (~60fps)
// eso hace que el tanque tarde segundos en acelerar. SIM_FPS es el framerate de referencia: los
// incrementos se escalan por (deltaT * SIM_FPS), así la respuesta es ágil e INDEPENDIENTE del
// framerate, manteniendo la misma velocidad terminal. Subilo = más ágil; bajalo = más pesado.
const SIM_FPS = 200;
// Multiplicador del giro de la IA: qué tan RÁPIDO llega al giro máximo (respuesta/snappiness).
const TURN_MULT = 1.5;
// Tope de la velocidad de giro EFECTIVA. Evita que acumule rotación de más al mantener apretado el giro.
// ~4 ≈ el giro tope del juego original. Bajalo si querés que doblen más suave. (No afecta el spin de bombas.)
const ANG_VEL_MAX = 4;
// Giro del JUGADOR: directo y proporcional a la palanca/tecla (rad/s a deflexión máxima). A diferencia de
// la IA, NO acumula inercia de giro → responde al instante y frena al instante al soltar (tracción total).
// Subilo = dobla más cerrado/responsivo. (El spin-out de bombas sigue usando ang_vel, intacto.)
const PLAYER_TURN = 5.5;

// ── HELPERS DE RESOLUCIÓN / COLOR / GEOMETRÍA (port directo) ──
const xper = p => p * SCREEN_X;
const yper = p => p * SCREEN_Y;
const ri = (a, b) => a + Math.floor(Math.random() * (b - a + 1));      // randint inclusivo
const rnd = (a, b) => a + Math.random() * (b - a);                     // uniform
const clamp255 = v => Math.max(0, Math.min(255, v));

function randcolorGray(mincap, maxcap) { const v = ri(mincap, maxcap); return [v, v, v]; }
function modifyColor(color, offset)     { return color.map(c => clamp255(c + offset)); }
function modifyColorPerc(color, factor) { return color.map(c => clamp255(c * factor)); }
const rgb = c => `rgb(${Math.round(clamp255(c[0]))},${Math.round(clamp255(c[1]))},${Math.round(clamp255(c[2]))})`;

function getangle(p1, p2) { return Math.atan2(p2[1] - p1[1], p2[0] - p1[0]); }
function getangle2(prevAng, p1, p2) {                                   // wrap continuo cruzando ±π
  let angle = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]);
  if (angle - prevAng < -Math.PI) angle += Math.PI * 2;
  if (angle - prevAng >  Math.PI) angle -= Math.PI * 2;
  return angle;
}
function getdist(p1, p2) { return Math.hypot(p1[0] - p2[0], p1[1] - p2[1]); }
function rectColision(r1, r2) {
  return (r1[0] + r1[2] > r2[0] && r1[0] < r2[0] + r2[2] &&
          r1[1] + r1[3] > r2[1] && r1[1] < r2[1] + r2[3]);
}

// ── DISPOSITIVO TÁCTIL ──
// En mobile (sin mouse) no tiene sentido el modo dos jugadores (comparten un solo teclado), así que se
// oculta esa opción del menú y se fuerza un jugador. En PC se mantiene. Heurística estándar: puntero
// grueso + sin hover = teléfono/tablet.
const IS_TOUCH = (window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches) || 'ontouchstart' in window;

// ── CANVAS ──
// La pista llena toda la pantalla (escala no-uniforme). Como el juego es horizontal, en el celular
// apaisado el estiramiento es mínimo. Si la pantalla está vertical se muestra el aviso "girá el teléfono".
const canvas = document.getElementById('c');
const mainCtx = canvas.getContext('2d');
let ctx = mainCtx;                                                     // se intercambia temporalmente al hornear el fondo
let dpr = 1, scaleX = 1, scaleY = 1, cssW = 0, cssH = 0;

// Fondo estático horneado por pista (piso + deco + meta + paredes + motivos). Se dibuja una vez y se
// blitea cada frame en vez de re-dibujar cientos de figuras — clave para los FPS en mobile.
let bgCanvas = null, bgReady = false, bgTrack = -1, bgW = 0, bgH = 0;

let lastVW = 0, lastVH = 0;                                            // disparadores del poll (innerWidth/Height crudos)
function resize() {
  lastVW = window.innerWidth; lastVH = window.innerHeight;
  dpr  = Math.min(window.devicePixelRatio || 1, 2);
  // El canvas llena su contenedor por CSS (position:fixed; inset:0; 100%/100%). Leemos su tamaño REAL
  // renderizado (clientWidth/Height) en vez de innerWidth: en fullscreen el navegador a veces reporta
  // innerWidth sin la zona del notch, y dimensionar el canvas con eso dejaba una franja negra al costado.
  cssW = canvas.clientWidth  || window.innerWidth;
  cssH = canvas.clientHeight || window.innerHeight;
  scaleX = cssW / SCREEN_X;
  scaleY = cssH / SCREEN_Y;
  canvas.width  = Math.floor(cssW * dpr);                             // solo el buffer; el tamaño visual lo fija el CSS
  canvas.height = Math.floor(cssH * dpr);
  document.getElementById('rotate').style.display = (cssH > cssW) ? 'flex' : 'none';
}
window.addEventListener('resize', resize);

// ── TEXTO. Fuente arcade Orbitron + glow opcional + caja redondeada. ──
const FONT_FAMILY = "'Orbitron', 'Segoe UI', sans-serif";
const B_font = 112, M_font = 48, S_font = 22, RS_font = 14;            // px (Orbitron es más ancha que freesansbold)
function roundRectPath(x, y, w, h, r) {
  r = Math.min(r, h/2, w/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
}
function createText(fontPx, content, colorText, colorRect, posx, posy, glow = 0) {
  content = String(content);
  const weight = fontPx >= B_font ? 900 : 700;
  ctx.font = `${weight} ${fontPx}px ${FONT_FAMILY}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = (fontPx * 0.04).toFixed(1) + 'px';
  if (colorRect) {                                                     // bgcolor del render de pygame, ahora redondeado
    const w = ctx.measureText(content).width, pad = fontPx * 0.28;
    ctx.fillStyle = rgb(colorRect);
    roundRectPath(posx - w/2 - pad, posy - fontPx*0.62, w + pad*2, fontPx*1.24, fontPx*0.22);
    ctx.fill();
  }
  if (glow > 0) { ctx.shadowColor = rgb(colorText); ctx.shadowBlur = glow; }
  ctx.fillStyle = rgb(colorText);
  ctx.fillText(content, posx, posy);
  ctx.shadowBlur = 0;
  ctx.letterSpacing = '0px';
}

// ── PALETAS DE TEMA (estables; el original re-randomizaba los índices 3/4 cada frame = basura: un alloc
//    de array + 2 randoms por pared por frame, y un parpadeo feo. Acá son fijas y el "brillo" tecno/lava
//    sale de los motivos animados, no de ruido RGB). theme = track // 2.
const THEME_WALL  = [[20,110,45], [205,184,120], [236,240,248], [46,78,140], [62,50,54]];
const THEME_FLOOR = [[58,60,64],  [34,31,16],    [40,42,48],    [10,15,30],  [28,18,16]];  // [0]=ASFALTO (pedido)

// ════════════════ DATOS DE PISTAS (literales inline, port mecánico) ════════════════
// Paredes: rectángulos [x, y, w, h] por pista.
const WALL_MAPS = [
  // 0 PARK
  [[0,0,xper(0.01),yper(1)],[0,0,xper(1),xper(0.01)],[xper(1)-xper(0.01),0,xper(0.02),yper(1)],[0,yper(1)-xper(0.01),xper(1),xper(0.02)],[xper(0.15),yper(0.25),xper(0.7),yper(0.5)]],
  // 1 HALLWAYS
  [[0,0,xper(0.01),yper(1)],[0,0,xper(1),xper(0.01)],[xper(1)-xper(0.01),0,xper(0.02),yper(1)],[0,yper(1)-xper(0.01),xper(1),xper(0.02)],[xper(0.15),yper(0.25),xper(0.02),yper(0.5)],
   [xper(0.15),yper(0.23),xper(0.7),xper(0.02)],[xper(0.3),yper(0.49),xper(0.7),xper(0.02)],[xper(0.15),yper(0.75),xper(0.7),xper(0.02)]],
  // 2 MESSY
  [[0,0,xper(0.01),yper(1)],[0,0,xper(1),xper(0.01)],[xper(1)-xper(0.01),0,xper(0.02),yper(1)],[0,yper(1)-xper(0.01),xper(1),xper(0.02)],[xper(0.15),yper(0.8),xper(0.7),xper(0.02)],
   [xper(0.1),yper(0.6),xper(0.1),xper(0.05)],[xper(0.12),yper(0.22),xper(0.03),yper(0.2)],[xper(0.34),yper(0.38),xper(0.03),yper(0.4)],[xper(0.28),yper(0.08),xper(0.07),yper(0.15)],
   [xper(0.49),yper(0.1),xper(0.03),yper(0.35)],[xper(0.52),yper(0.6),xper(0.2),xper(0.03)],[xper(0.71),yper(0.03),xper(0.06),yper(0.56)],[xper(0.83),yper(0.2),xper(0.05),yper(0.59)]],
  // 3 PORTAL

const TANK_COLORS = [[150,0,0],[50,50,255],[75,0,75],[200,155,0]];
const TANK_CONTROLS = [['UP','DOWN','LEFT','RIGHT','SPACE'], ['W','S','A','D','LCTRL']];
const TRACK_NAMES = ['Park','Hallways','Messy','Portal','Zig Zag','Smiley','Twain Portals','Snail','Combined','Boxes'];
const COLOR_NAMES = ['Red','Blue','Purple','Yellow'];

// ════════════════ ESTADO GLOBAL + LISTAS DE SPRITES ════════════════
let deltaT = 0;
const keys = {};
let sprites = [], trackpoints = [], walls = [], tanks = [], bombs = [];

function addSprite(s) { sprites.push(s); return s; }
function removeFromList(arr, item) { const i = arr.indexOf(item); if (i >= 0) arr.splice(i, 1); }

// ════════════════ FÍSICA (Matter.js) ════════════════
// Motor 2D rígido sin gravedad (es top-down). Los tanques son cuerpos dinámicos, las paredes estáticas
// → las colisiones tanque-pared y tanque-tanque las resuelve el motor (deslizan/empujan, no se traban).
// El manejo es "arcade sobre física": un motor de velocidad objetivo + dirección por velocidad angular.
const { Engine, Composite, Bodies, Body } = Matter;
const engine = Engine.create();
engine.gravity.x = 0; engine.gravity.y = 0;
const world = engine.world;
const PHYS_STEP = 1000 / 60;                 // paso fijo (las velocidades quedan en px/frame a 60fps)
// — Tuning del manejo (px/frame y rad/frame a 60fps; subí/bajá a gusto) —
const TANK_SPEED   = 9.5;                    // velocidad máx adelante (~570 px/s)
const TANK_REVERSE = 5.5;                    // velocidad máx atrás
const TANK_ACCEL   = 0.10;                   // suavizado hacia la velocidad objetivo (0..1): más alto = más ágil
const TANK_TURN    = 0.070;                  // giro del jugador a dirección máxima (rad/frame, ~4.2 rad/s)
const AI_TURN_K    = 3.0;                    // qué tan fuerte la IA corrige el rumbo hacia el waypoint
const clampN = (v, a, b) => Math.max(a, Math.min(b, v));

function clearPhysics() { Composite.clear(world, false); }   // saca todos los cuerpos (al rearmar/salir de carrera)

// ════════════════ TANK ════════════════
class Tank {
  constructor(i, playermode, track, racelength, difficulty) {
    this.id = i;
    this.radius = xper(0.0115);
    this.vel = 0; this.ang_vel = 0; this.psteer = 0;
    this.shoot_cooling = 0;
    this.lap_progress = 0; this.pre_lap_progress = 0;
    this.lap_checkpoint = 0; this.laps = 0;
    this.track = track; this.rank = 0; this.racetime = 0;
    this.racelength = racelength === 0 ? 10 : racelength === 1 ? 20 : 40;
    this.start = false; this.pause = false; this.finished = false;
    this.wrongway = false;
    this.wrongwayalert_timer = 1; this.wrongwayalert_cooling = 0; this.wrongwayalert_showing = 0;
    this.ai = this.id === 0 ? false : (this.id === 1 && playermode === 1) ? false : true;
    this.ai_difficulty = difficulty;
    this.ai_timer = 1; this.ai_cooling = 1; this.ai_acel = 0; this.ai_turn = 0; this.ai_shoot = 0;
    this.showhitbox = false;

    [this.start_x, this.start_y, this.start_ang] = startposFor(this.track, this.id);
    this.x = this.start_x; this.y = this.start_y; this.ang = this.start_ang;
    this.color = TANK_COLORS[this.id];

    if (!this.ai) [this.forward, this.reverse, this.left, this.right, this.shoot] = TANK_CONTROLS[this.id];

    // Cuerpo físico: rectángulo redondeado (mejor ramming que un círculo, sin engancharse en esquinas).
    const r = this.radius;
    this.body = Bodies.rectangle(this.x, this.y, r * 2.0, r * 1.6, {
      angle: this.ang, frictionAir: 0.05, friction: 0.02, restitution: 0.3,
      chamfer: { radius: r * 0.45 }, label: 'tank',
    });
    Composite.add(world, this.body);

    tanks.push(this);
  }

  process() {
    if (!(this.start && !this.pause)) return;

    this.pre_lap_progress = this.lap_progress;
    this.shoot_cooling = Math.max(this.shoot_cooling - deltaT, 0);

    if (!this.finished) { this.rank = tanks.length; this.racetime += deltaT; }

    let steer = 0, throttle = 0;                                       // ∈ [-1, 1]

    if (!this.ai) {
      // Dirección y acelerador: el teclado da ±1 (full); el joystick (sólo jugador 1) suma su valor
      // PROPORCIONAL (cercanía al centro → intensidad). Ambos terminan en [-1, 1].
      steer    = (keys[this.right]   ? 1 : 0) - (keys[this.left]    ? 1 : 0);
      throttle = (keys[this.forward] ? 1 : 0) - (keys[this.reverse] ? 1 : 0);
      if (this.id === 0) { steer += lever.steer; throttle += lever.throttle; }   // jugador 1 también con joysticks
      steer    = clampN(steer, -1, 1);
      throttle = clampN(throttle, -1, 1);
      if (keys[this.shoot] && this.shoot_cooling === 0) {
        addSprite(new Bomb(this.color, this.radius, this.x, this.y, this.ang, this.vel));
        this.shoot_cooling = 2;
      }
    } else {
      this.ai_cooling += deltaT;
      if (this.ai_cooling > this.ai_timer) {
        const d = this.ai_difficulty;
        this.ai_acel  = d === 0 ? rnd(0.8,0.85) : d === 1 ? rnd(0.85,0.92) : d === 2 ? rnd(0.92,0.97) : rnd(0.97,1);
        this.ai_shoot = d === 0 ? ri(0,19) : d === 1 ? ri(0,9) : d === 2 ? ri(0,4) : ri(0,1);
        this.ai_cooling = 0;
      }
    }

    let closest_point = null, closest_dist = xper(0.3);

    if (trackpoints.length) {
      for (const point of trackpoints) {
        const point_dist = getdist([this.x, this.y], [point.x, point.y]);
        if (point_dist < closest_dist) { closest_dist = point_dist; closest_point = point; }
      }

      if (closest_point) {
        closest_point.color = modifyColorPerc(this.color, 1.5);
        this.lap_progress = closest_point.id * 100 / trackpoints.length;

        if (this.ai) {
          const target_point = trackpoints[(closest_point.id + 8) % trackpoints.length];
          target_point.color = [0, 150, 0];
          const point_ang = getangle2(this.ang, [this.x, this.y], [target_point.x, target_point.y]);
          let diff = point_ang - this.ang;                             // rumbo relativo al waypoint adelantado
          while (diff >  Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          steer    = clampN(diff * AI_TURN_K, -1, 1);                  // gira proporcional al error de rumbo
          throttle = (Math.abs(diff) < Math.PI / 8 ? 1 : 0.55) * this.ai_acel * (this.finished ? 0.6 : 1);
          if (this.ai_shoot === 0 && this.shoot_cooling === 0 && !this.finished) {
            addSprite(new Bomb(this.color, this.radius, this.x, this.y, this.ang, this.vel));
            this.shoot_cooling = 2;
          }
        }
      }
    }

    // ── Aplicar al cuerpo Matter ──
    const b = this.body;
    // Dirección: velocidad angular directa cuando hay input (feel responsivo, sin inercia); si no, amortiguar
    // (deja que los choques/bombas impriman spin y se vaya frenando).
    if (Math.abs(steer) > 0.001) Body.setAngularVelocity(b, steer * TANK_TURN);
    else                          Body.setAngularVelocity(b, b.angularVelocity * 0.85);
    // Motor: velocidad objetivo a lo largo del heading; suavizado hacia ella (cede ante colisiones del motor).
    const target = throttle > 0 ? TANK_SPEED * throttle : throttle < 0 ? -TANK_REVERSE * (-throttle) : 0;
    const fx = Math.cos(b.angle), fy = Math.sin(b.angle);
    Body.setVelocity(b, { x: b.velocity.x + (fx * target - b.velocity.x) * TANK_ACCEL,
                          y: b.velocity.y + (fy * target - b.velocity.y) * TANK_ACCEL });

    if (this.lap_progress > 0 && this.lap_progress < 5) this.lap_checkpoint = 1;
    if (this.lap_progress > 95 && this.lap_progress < 100 && this.lap_checkpoint === 1) this.lap_checkpoint = 2;
    if (this.lap_progress === 0) {
      if (this.lap_checkpoint === 2 && !this.finished) this.laps += 1;
      this.lap_checkpoint = 0;
    }

    // Ranking (la colisión tanque-tanque ya la resuelve Matter; acá solo se calcula la posición en carrera).
    for (const tank of tanks) {
      if (tank === this) continue;
      if (!this.finished && !tank.finished) {
        if (this.laps > tank.laps) this.rank -= 1;
        else if (this.laps === tank.laps && this.lap_progress > tank.lap_progress && this.lap_checkpoint !== 0) this.rank -= 1;
        else if (this.laps === tank.laps && this.lap_progress <= tank.lap_progress && tank.lap_checkpoint === 0) this.rank -= 1;
      }
    }

    if (closest_point !== null && closest_point.id !== 0) {
      if (this.lap_progress < this.pre_lap_progress) this.wrongway = true;
      if (this.lap_progress > this.pre_lap_progress) this.wrongway = false;
    }

    if (this.laps === this.racelength) { this.finished = true; this.ai = true; }
  }

  draw() {
    const r = this.radius, fin = this.finished;

    // sombra suave debajo del tanque → profundidad
    ctx.save();
    ctx.globalAlpha = 0.22; ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(this.x + r*0.12, this.y + r*0.22, r*1.05, r*0.92, 0, 0, TAU); ctx.fill();
    ctx.restore();

    paintTank(this.x, this.y, this.ang, r, this.color, 1, fin);

    if (this.showhitbox) strokeRect(this.x-r*0.75, this.y-r*0.75, r*1.5, r*1.5, [255,255,0]);

    const rankFont = SCREEN_X < 1000 ? RS_font : S_font;
    if (this.racetime > 1) {
      const rk = this.rank === 1 ? '1st' : this.rank === 2 ? '2nd' : this.rank === 3 ? '3rd' : '4th';
      createText(rankFont, `${rk} - ${Math.min(this.laps+1, this.racelength)}/${this.racelength}`, modifyColor(this.color,100), modifyColor(this.color,-50),
        xper(0.07 + (this.rank-1)*0.135), yper(0.04));
    }
    if (fin) {
      const rk = this.rank === 1 ? '1st!' : this.rank === 2 ? '2nd!' : this.rank === 3 ? '3rd' : '4th';
      createText(rankFont, rk, modifyColor(this.color,150), null, this.x, this.y - r*2, 10);
    }

    if (this.wrongway) {
      if (!this.pause) this.wrongwayalert_cooling += deltaT;
      if (this.wrongwayalert_cooling > this.wrongwayalert_timer) {
        createText(rankFont, 'Wrong Way!', modifyColor(this.color,150), null, this.x, this.y + r*1.5, 8);
        if (!this.pause) this.wrongwayalert_showing += deltaT;
        if (this.wrongwayalert_showing > this.wrongwayalert_timer) { this.wrongwayalert_cooling = 0; this.wrongwayalert_showing = 0; }
      }
    }
  }
}

// ════════════════ BOMB ════════════════
class Bomb {
  constructor(tankColor, tankRadius, tankX, tankY, tankAng, tankVel) {
    this.color = tankColor; this.radius = tankRadius * 0.3;
    this.x = tankX; this.y = tankY; this.ang = tankAng;
    this.vel = Math.max(tankVel * 2, 1000);
    this.pause = false;
    bombs.push(this);
  }
  process() {
    if (this.pause) return;
    this.x += Math.cos(this.ang) * this.vel * deltaT;
    this.y += Math.sin(this.ang) * this.vel * deltaT;

    for (const tank of tanks) {
      if (tank.color !== this.color && !tank.finished &&
          rectColision([this.x-this.radius*0.75, this.y-this.radius*0.75, this.radius*1.5, this.radius*1.5],
                        [tank.x-tank.radius*0.75, tank.y-tank.radius*0.75, tank.radius*1.5, tank.radius*1.5])) {
        // spin-out: trompo violento + casi frena (sobre el cuerpo físico)
        Body.setAngularVelocity(tank.body, (ri(0,1) === 0 ? -1 : 1) * 0.5);
        Body.setVelocity(tank.body, { x: tank.body.velocity.x * 0.1, y: tank.body.velocity.y * 0.1 });
        removeFromList(bombs, this); removeFromList(sprites, this);
        return;
      }
    }
    if (this.x > SCREEN_X+this.radius || this.x < 0-this.radius || this.y > SCREEN_Y+this.radius || this.y < 0-this.radius) {
      removeFromList(bombs, this); removeFromList(sprites, this);
    }
  }
  draw() {
    const tx = Math.cos(this.ang), ty = Math.sin(this.ang), r = this.radius;
    ctx.save();
    // estela
    for (let t = 4; t >= 1; t--) {
      ctx.globalAlpha = 0.14 * (1 - t/5);
      drawCircle(this.x - tx*r*t*1.5, this.y - ty*r*t*1.5, r*(1.1 - t*0.12), modifyColorPerc(this.color, 1.4));
    }
    // glow
    ctx.globalAlpha = 0.35;
    drawCircle(this.x, this.y, r*2.4, modifyColorPerc(this.color, 1.6));
    ctx.globalAlpha = 1;
    drawCircle(this.x, this.y, r, modifyColorPerc(this.color, 1.6));
    drawCircle(this.x, this.y, r*0.5, [255, 255, 230]);                // núcleo brillante
    ctx.restore();
  }
}

// ════════════════ WALL ════════════════
class Wall {
  constructor(i, track, color) {
    this.id = i; this.track = track; this.color = color;
    [this.x, this.y, this.width, this.height] = WALL_MAPS[this.track][this.id];
    // Cuerpo estático: la colisión contra tanques la resuelve Matter (deslizan, no se traban).
    this.body = Bodies.rectangle(this.x + this.width / 2, this.y + this.height / 2, this.width, this.height,
      { isStatic: true, friction: 0.02, label: 'wall' });
    Composite.add(world, this.body);
    walls.push(this);
  }
  process() {}                                                          // la física la maneja Matter
  draw() {
    if (bgReady) return;                                               // ya está en el fondo horneado
    const col = THEME_WALL[this.color];
    fillRect(this.x, this.y, this.width, this.height, col);
    decorateWall(this);                                                // motivos temáticos (árboles/cactus/cubos/lava/…)
    // bevel: highlight arriba/izquierda + borde oscuro → las paredes leen como volumen
    drawLine([this.x, this.y + 0.5], [this.x + this.width, this.y + 0.5], modifyColorPerc(col, 1.45), 1);
    drawLine([this.x + 0.5, this.y], [this.x + 0.5, this.y + this.height], modifyColorPerc(col, 1.25), 1);
    strokeRect(this.x + 0.5, this.y + 0.5, this.width - 1, this.height - 1, modifyColorPerc(col, 0.45), 1);
  }
}

// ════════════════ TRACKPOINT ════════════════
class TrackPoint {
  constructor(i, track) {
    this.id = i; this.track = track;
    this.color = [50, 50, 50]; this.show = false;
    [this.x, this.y] = TRACKPOINT_MAPS[this.track][this.id];
    trackpoints.push(this);
  }
  process() {}
  draw() {
    if (this.show) drawCircle(this.x, this.y, xper(0.005), this.color);
    this.color = [50, 50, 50];
    if (bgReady) return;                                               // meta + largada ya están en el fondo horneado

    // Bandera de meta/salida: damero que llena la banda completa y abarca TODA la raya (largo 2*fl[0]).
    const fl = FINISHLINES[this.track];
    if (this.id === 0) {
      const W = [255, 255, 255];
      if ([0,1,4,5,7,8,9].includes(this.track)) {                      // meta VERTICAL (la raya corre en y; ancho de banda = fl[1])
        const x0 = this.x - fl[1], len = 2*fl[0], top = this.y - fl[0];
        const sq = fl[1] / 2, rows = Math.max(1, Math.round(len / sq)), cell = len / rows;
        for (let r = 0; r < rows; r++)
          for (let c = 0; c < 2; c++)
            if ((r + c) % 2 === 0) fillRect(x0 + c*sq, top + r*cell, sq, cell, W);
        drawLine([this.x, top], [this.x, top + len], W, 2);
        drawLine([x0, top], [x0, top + len], W, 2);
      } else {                                                         // meta HORIZONTAL (la raya corre en x; alto de banda = 2*fl[1])
        const y0 = this.y - fl[1], len = 2*fl[0], left = this.x - fl[0];
        const sq = fl[1], cols = Math.max(1, Math.round(len / sq)), cell = len / cols;
        for (let c = 0; c < cols; c++)
          for (let r = 0; r < 2; r++)
            if ((c + r) % 2 === 0) fillRect(left + c*cell, y0 + r*sq, cell, sq, W);
        drawLine([left, this.y + fl[1]], [left + len, this.y + fl[1]], W, 2);
        drawLine([left, this.y - fl[1]], [left + len, this.y - fl[1]], W, 2);
      }
    }

    if (this.id === trackpoints.length - 1) {
      for (const tank of tanks) {
        const sx = tank.start_x, sy = tank.start_y, r = tank.radius, W = [255,255,255];
        if (tank.start_ang === 0) {
          drawLine([sx+r, sy-r], [sx+r, sy+r], W, 2);
          drawLine([sx+r/2, sy+r], [sx+r, sy+r], W, 2);
          drawLine([sx+r/2, sy-r], [sx+r, sy-r], W, 2);
        }
        if (tank.start_ang === Math.PI) {
          drawLine([sx-r, sy-r], [sx-r, sy+r], W, 2);
          drawLine([sx-r/2, sy+r], [sx-r, sy+r], W, 2);
          drawLine([sx-r/2, sy-r], [sx-r, sy-r], W, 2);
        }
        if (tank.start_ang === Math.PI/2) {
          drawLine([sx-r, sy+r], [sx+r, sy+r], W, 2);
          drawLine([sx-r, sy+r], [sx-r, sy+r/2], W, 2);
          drawLine([sx+r, sy+r], [sx+r, sy+r/2], W, 2);
        }
        if (tank.start_ang === -Math.PI/2) {
          drawLine([sx-r, sy-r], [sx+r, sy-r], W, 2);
          drawLine([sx-r, sy-r], [sx-r, sy-r/2], W, 2);
          drawLine([sx+r, sy-r], [sx+r, sy-r/2], W, 2);
        }
      }
    }
  }
}

// ════════════════ MAIN HANDLER (menús + estado) ════════════════
const MAP_COUNTS = [[5,128],[8,204],[13,163],[19,255],[10,203],[12,157],[17,257],[10,204],[15,264],[12,125]];

class MainHandler {
  constructor() {
    this.menu = true; this.menulevel = 0; this.option = 0;
    this.playermode = 0; this.laps = 1; this.difficulty = 1; this.track = 0;
    this.choose_option = [0,1,2];
    this.keypressed = false; this.f1_pressed = false; this.f2_pressed = false;
    this.tournament = false;
    this.confirmQuit = false;                                          // pide confirmación antes de salir al menú
    this.tank_points = [0,0,0,0]; this.tank_times = [0,0,0,0];
  }

  process() {
    [this.nWalls, this.nTrackpoints] = MAP_COUNTS[this.track];

    if (this.menu) {
      if (this.menulevel === 0) this.choose_option = [0,1,2];
      if (this.menulevel === 1 && !this.tournament) this.choose_option = [0,1,2,3];

      if (!this.keypressed) {
        if (keys.UP || keys.DOWN) {
          const d = keys.UP ? -1 : 1;
          if (this.menulevel === 1) {                                  // navega solo entre las filas visibles (en táctil se saltea "jugadores")
            const opts = this.menuOpts();
            const idx = Math.max(0, opts.indexOf(this.option));
            this.option = opts[(idx + d + opts.length) % opts.length];
          } else {
            const len = this.choose_option.length;
            this.option = (this.option + d + len) % len;
          }
          this.keypressed = true;
        }
        if (keys.LEFT) {
          if (this.menulevel === 1) {
            if (this.option === 0) this.playermode = (this.playermode - 1 + 2) % 2;
            if (this.option === 1) this.laps = (this.laps - 1 + 3) % 3;
            if (this.option === 2) this.difficulty = (this.difficulty - 1 + 4) % 4;
            if (this.option === 3) this.track = (this.track - 1 + 10) % 10;
          }
          this.keypressed = true;
        }
        if (keys.RIGHT) {
          if (this.menulevel === 1) {
            if (this.option === 0) this.playermode = (this.playermode + 1) % 2;
            if (this.option === 1) this.laps = (this.laps + 1) % 3;
            if (this.option === 2) this.difficulty = (this.difficulty + 1) % 4;
            if (this.option === 3) this.track = (this.track + 1) % 10;
          }
          this.keypressed = true;
        }
        if (keys.RETURN) {
          if (this.menulevel === 0) this.pickOption0(this.option);
          else if (this.menulevel === 1) this.startRace();
          this.keypressed = true;
        }
        if (keys.ESCAPE) {
          if (this.menulevel === 1) {
            this.menulevel = 0; this.option = this.tournament ? 1 : 0;
            this.playermode = 0; this.laps = 1; this.difficulty = 1; this.track = 0;
            this.keypressed = true;
          }
          // menulevel 0 ESC = quit (no-op en web)
        }
      }
      if (!keys.LEFT && !keys.RIGHT && !keys.UP && !keys.DOWN && !keys.ESCAPE && !keys.RETURN) this.keypressed = false;

    } else {
      if (!this.keypressed) {
        if (!this.confirmQuit && keys.ESCAPE) {
          this.confirmQuit = true; this.keypressed = true;             // ESC abre el cartel de confirmación
        } else if (this.confirmQuit && keys.ESCAPE) {
          this.confirmQuit = false; this.keypressed = true;            // ESC de nuevo = cancelar (seguir jugando)
        } else if (this.confirmQuit && keys.RETURN) {                  // ENTER = confirmar salida al menú
          this.confirmExit();
          this.keypressed = true;
        }
      }
      if (!this.f1_pressed && keys.F1) { for (const t of tanks) t.showhitbox = !t.showhitbox; this.f1_pressed = true; }
      if (!this.f2_pressed && keys.F2) { for (const p of trackpoints) p.show = !p.show; this.f2_pressed = true; }
      if (!keys.F1) this.f1_pressed = false;
      if (!keys.F2) this.f2_pressed = false;
      if (!keys.ESCAPE && !keys.RETURN) this.keypressed = false;
    }
  }

  // — acciones reutilizables (teclado y toque comparten estas) —
  pickOption0(opt) {                                                   // menulevel 0: elegir New Race / Tournament / Exit
    this.option = opt;
    if (opt === 0) { this.menulevel = 1; this.tournament = false; this.option = this.menuOpts()[0]; }
    if (opt === 1) { this.menulevel = 1; this.tournament = true;  this.option = this.menuOpts()[0]; }
    // opt 2 = Exit (no-op en web)
  }
  startRace() {                                                        // menulevel 1: arrancar la carrera
    if (IS_TOUCH) this.playermode = 0;                                 // en táctil siempre un jugador
    clearPhysics();                                                    // mundo limpio antes de crear los cuerpos
    const [nW, nT] = MAP_COUNTS[this.track];
    for (let i = 0; i < nT; i++) addSprite(new TrackPoint(i, this.track));
    for (let i = 0; i < nW; i++) addSprite(new Wall(i, this.track, Math.floor(this.track/2)));
    for (let i = 0; i < 4; i++) addSprite(new Tank(i, this.playermode, this.track, this.laps, this.difficulty));
    addSprite(new AuxiliaryHandler(this.playermode, this.laps, this.track, this.difficulty, this.tournament, this.tank_points, this.tank_times));
    this.menu = false;
  }
  confirmExit() {                                                      // confirmar salida de carrera al menú
    for (const s of sprites.slice()) if (s !== this) removeFromList(sprites, s);
    clearPhysics(); trackpoints.length = 0; walls.length = 0; tanks.length = 0; bombs.length = 0;
    if (sprites.length === 1) {
      this.menulevel = 0; this.option = 0; this.playermode = 0; this.laps = 1; this.difficulty = 1; this.track = 0;
      this.menu = true; this.confirmQuit = false;
      this.tank_points = [0,0,0,0]; this.tank_times = [0,0,0,0];
    }
  }
  // hover del mouse → mueve la selección a la opción debajo del cursor (mismo mapa de filas que tapMenu)
  hoverFocus(ly) {
    const near = (f) => Math.abs(ly - yper(f)) < yper(0.05);
    if (this.menulevel === 0) {
      if (near(0.5)) this.option = 0; else if (near(0.6)) this.option = 1; else if (near(0.7)) this.option = 2;
    } else {
      for (const { opt, y } of this.menuRowDefs()) if (near(y)) { this.option = opt; return; }
    }
  }
  // toque/click sobre el menú (coords lógicas)
  tapMenu(lx, ly) {
    const near = (frac) => Math.abs(ly - yper(frac)) < yper(0.05);
    const dir = lx < xper(0.5) ? -1 : 1;                               // mitad izq/der = anterior/siguiente
    if (this.menulevel === 0) {
      if (near(0.5)) this.pickOption0(0);
      else if (near(0.6)) this.pickOption0(1);
      else if (near(0.7)) this.pickOption0(2);
    } else {
      for (const { opt, y } of this.menuRowDefs()) {
        if (!near(y)) continue;
        this.option = opt;
        if (opt === 0)      this.playermode = (this.playermode + dir + 2) % 2;
        else if (opt === 1) this.laps       = (this.laps + dir + 3) % 3;
        else if (opt === 2) this.difficulty = (this.difficulty + dir + 4) % 4;
        else if (opt === 3) { if (!this.tournament) this.track = (this.track + dir + 10) % 10; }
        return;
      }
      if (near(0.88)) this.startRace();                                // botón JUGAR
    }
  }

  // Opciones del setup (menulevel 1) según dispositivo: en táctil se omite "jugadores" (opt 0).
  menuOpts() { return IS_TOUCH ? [1, 2, 3] : [0, 1, 2, 3]; }
  // Filas del setup con su posición Y, centradas verticalmente según cuántas haya (3 en táctil, 4 en PC).
  menuRowDefs() {
    const opts = this.menuOpts(), span = 0.1, mid = 0.6, y0 = mid - span*(opts.length - 1)/2;
    return opts.map((opt, i) => ({ opt, y: y0 + i*span }));
  }

  draw() {
    if (this.menu) {
      // color neón que pulsa suave (antes parpadeaba random cada frame)
      const pulse = 0.5 + 0.5*Math.sin(T*2.2);
      const menucolor = [150 + 105*pulse, 12 + 26*pulse, 205 + 50*(0.5 + 0.5*Math.sin(T*2.2 + 2))];
      fillScreen(modifyColorPerc(menucolor, 0.08));

      // tanques fantasma orbitando de fondo (boludez ambiente para los 4 colores)
      for (let i = 0; i < 4; i++) {
        const a = T*0.35 + i*Math.PI/2;
        const cx = SCREEN_X*0.5 + Math.cos(a)*SCREEN_X*0.33;
        const cy = SCREEN_Y*0.5 + Math.sin(a)*SCREEN_Y*0.34;
        paintTank(cx, cy, a + Math.PI/2, xper(0.022), TANK_COLORS[i], 0.16);
      }

      const dim = [140, 80, 150], lock = [70, 70, 80];
      // el hover ya mueve la selección (hoverFocus), así que basta con estilar la opción seleccionada:
      // así el hover dispara EXACTAMENTE los mismos efectos que la selección (color, glow y los < >).
      const sel = on => on ? menucolor : dim;
      const gl  = on => on ? 14 : 5;
      if (this.menulevel === 0) {
        createText(B_font, 'CrazyTanks', menucolor, null, xper(0.5), yper(0.22), 28);
        createText(M_font, 'New Race',   sel(this.option === 0), null, xper(0.5), yper(0.5), gl(this.option === 0));
        createText(M_font, 'Tournament', sel(this.option === 1), null, xper(0.5), yper(0.6), gl(this.option === 1));
        createText(M_font, 'Exit',       sel(this.option === 2), null, xper(0.5), yper(0.7), gl(this.option === 2));
      }
      if (this.menulevel === 1) {
        const tn = TRACK_NAMES[this.track], diffNames = ['Easy','Normal','Hard','Very Hard'];
        const lapsName = this.laps === 0 ? 'Short (10 laps)' : this.laps === 1 ? 'Normal (20 laps)' : 'Long (40 laps)';
        const wrap = (on, s) => on ? `< ${s} >` : s;
        const labelFor = opt => opt === 0 ? (this.playermode === 0 ? 'Single Player' : 'Two Players')
                              : opt === 1 ? lapsName
                              : opt === 2 ? `Difficulty: ${diffNames[this.difficulty]}`
                              : `Map: ${tn}`;
        createText(B_font, 'CrazyTanks', menucolor, null, xper(0.5), yper(0.2), 28);
        for (const { opt, y } of this.menuRowDefs()) {
          const on = this.option === opt;
          const col = opt === 3 ? (on ? menucolor : (this.tournament ? lock : dim)) : sel(on);
          createText(M_font, wrap(on, labelFor(opt)), col, null, xper(0.5), yper(y), gl(on));
        }
        // botón JUGAR (tocá/click para arrancar) — pulsa, y se ilumina al hover
        const hj = rowHover(0.88), playPulse = 0.6 + 0.4*Math.sin(T*4);
        createText(M_font, '▶ JUGAR', [120 + 120*playPulse, 230, 150], modifyColorPerc(menucolor, hj ? 0.32 : 0.12), xper(0.5), yper(0.88), hj ? 30 : 16);
      }
    }
    // en carrera el fondo (piso+deco+meta+paredes) se blitea horneado desde el loop — nada que hacer acá
  }
}

// ════════════════ AUXILIARY HANDLER (cuenta regresiva, pausa, scoring) ════════════════
class AuxiliaryHandler {
  constructor(playermode, laps, track, difficulty, tournament, tankpoints, tanktimes) {
    this.playermode = playermode; this.laps = laps; this.track = track; this.difficulty = difficulty;
    this.racestart_timer = 5; this.racestart_cooling = 0;
    this.playerfinished = [false, false, false, false];
    this.racefinished = false; this.post_race_option = 0;
    this.p_pressed = false; this.enter_pressed = false; this.pause = false;
    this.tournament = tournament;
    this.points_for_rank = [4,3,2,1];
    this.tank_points = tankpoints; this.tank_times = tanktimes;
    this.table_timer = 3; this.table_cooldown = 0;
    this.pointsaccounted = false; this.randombool = false; this.tournamentfinished = false;
  }

  process() {
    [this.nWalls, this.nTrackpoints] = MAP_COUNTS[this.track];

    if (!this.racefinished) {
      this.racestart_cooling += deltaT;
      if (this.racestart_cooling > this.racestart_timer - 1) {
        for (const tank of tanks) { tank.start = true; if (tank.finished) this.playerfinished[tank.id] = tank.finished; }
      }

      if (this.playermode === 0 && this.playerfinished[0]) for (const tank of tanks) { tank.finished = true; tank.ai = true; }
      if (this.playermode === 0 && this.playerfinished[1] && this.playerfinished[2] && this.playerfinished[3]) for (const tank of tanks) { tank.finished = true; tank.ai = true; }
      if (this.playermode === 1 && this.playerfinished[0] && this.playerfinished[1]) for (const tank of tanks) { tank.finished = true; tank.ai = true; }
      if (this.playermode === 1 && this.playerfinished[0] && this.playerfinished[2] && this.playerfinished[3]) for (const tank of tanks) { tank.finished = true; tank.ai = true; }
      if (this.playermode === 1 && this.playerfinished[1] && this.playerfinished[2] && this.playerfinished[3]) for (const tank of tanks) { tank.finished = true; tank.ai = true; }

      if (this.playerfinished[0] && this.playerfinished[1] && this.playerfinished[2] && this.playerfinished[3]) this.racefinished = true;

      if (this.racestart_cooling > this.racestart_timer) {
        if (!this.p_pressed && keys.P) {
          for (const tank of tanks) tank.pause = !tank.pause;
          for (const bomb of bombs) bomb.pause = !bomb.pause;
          this.pause = !this.pause; this.p_pressed = true;
        }
        if (!keys.P) this.p_pressed = false;
      }

    } else {
      if (!this.tournament) {
        if (keys.UP) this.post_race_option = 0;
        if (keys.DOWN) this.post_race_option = 1;
        if (keys.RETURN) {
          if (this.post_race_option === 0) this._rebuildRace();
          if (this.post_race_option === 1) this._backToMenu(false);
        }
      } else {
        this.table_cooldown += deltaT;

        if (this.table_cooldown > this.table_timer && !this.pointsaccounted) {
          if (keys.RETURN) {
            for (const tank of tanks) {
              this.tank_points[tank.id] += this.points_for_rank[tank.rank - 1];
              this.tank_times[tank.id] += tank.racetime + tank.racetime * 0.01 * (tank.rank - 1);
            }
            this.pointsaccounted = true; this.enter_pressed = true;
          }
        }

        if (this.pointsaccounted) {
          if (this.track === 9) { this.tournamentfinished = true; this.post_race_option = 1; }
          if (keys.UP && !this.tournamentfinished) this.post_race_option = 0;
          if (keys.DOWN) this.post_race_option = 1;
          if (!this.enter_pressed && keys.RETURN) {
            if (this.post_race_option === 0) this._tournamentNext();
            if (this.post_race_option === 1) this._backToMenu(true);
          }
          if (!keys.RETURN) this.enter_pressed = false;
        }
      }
    }
  }

  // Rematch (carrera simple): limpia todo salvo MainHandler+self, re-crea, se remueve.
  _rebuildRace() {
    const main = sprites[0];
    for (const s of sprites.slice()) if (s !== main && s !== this) removeFromList(sprites, s);
    clearPhysics(); trackpoints.length = 0; walls.length = 0; tanks.length = 0; bombs.length = 0;
    if (sprites.length === 2) {
      for (let i = 0; i < this.nTrackpoints; i++) addSprite(new TrackPoint(i, this.track));
      for (let i = 0; i < this.nWalls; i++) addSprite(new Wall(i, this.track, Math.floor(this.track/2)));
      for (let i = 0; i < 4; i++) addSprite(new Tank(i, this.playermode, this.track, this.laps, this.difficulty));
      addSprite(new AuxiliaryHandler(this.playermode, this.laps, this.track, this.difficulty, this.tournament, this.tank_points, this.tank_times));
      removeFromList(sprites, this);
    }
  }

  _backToMenu(tournament) {
    const main = sprites[0];
    for (const s of sprites.slice()) if (s !== main && s !== this) removeFromList(sprites, s);
    clearPhysics(); trackpoints.length = 0; walls.length = 0; tanks.length = 0; bombs.length = 0;
    if (sprites.length === 2) {
      main.menulevel = 0; main.option = 0; main.playermode = 0; main.laps = 1; main.difficulty = 1; main.track = 0;
      main.menu = true; main.keypressed = true;
      if (tournament) { main.tank_points = [0,0,0,0]; main.tank_times = [0,0,0,0]; }
      removeFromList(sprites, this);
    }
  }

  _tournamentNext() {
    const main = sprites[0];
    if (!this.randombool) { main.track += 1; this.randombool = true; }
    for (const s of sprites.slice()) if (s !== main && s !== this) removeFromList(sprites, s);
    trackpoints.length = 0; walls.length = 0; tanks.length = 0;
    if (sprites.length === 2) {
      [this.nWalls, this.nTrackpoints] = MAP_COUNTS[this.track + 1];
      for (let i = 0; i < this.nTrackpoints; i++) addSprite(new TrackPoint(i, this.track + 1));
      for (let i = 0; i < this.nWalls; i++) addSprite(new Wall(i, this.track + 1, Math.floor((this.track+1)/2)));
      for (let i = 0; i < 4; i++) addSprite(new Tank(i, this.playermode, this.track + 1, this.laps, this.difficulty));
      addSprite(new AuxiliaryHandler(this.playermode, this.laps, this.track + 1, this.difficulty, this.tournament, this.tank_points, this.tank_times));
      removeFromList(sprites, this);
    }
  }

  // hover del mouse → mueve la selección post-carrera a la opción debajo del cursor
  hoverFocus(ly) {
    if (!this.racefinished) return;
    const near = (f) => Math.abs(ly - yper(f)) < yper(0.05);
    if (!this.tournament) {
      if (near(0.55)) this.post_race_option = 0; else if (near(0.65)) this.post_race_option = 1;
    } else if (this.pointsaccounted && !this.tournamentfinished) {
      if (near(0.75)) this.post_race_option = 0; else if (near(0.85)) this.post_race_option = 1;
    }
  }
  // toque/click sobre la pantalla de fin de carrera (coords lógicas)
  tap(lx, ly) {
    if (!this.racefinished) return;
    const near = (frac) => Math.abs(ly - yper(frac)) < yper(0.05);
    if (!this.tournament) {
      if (near(0.55)) { this.post_race_option = 0; this._rebuildRace(); }
      else if (near(0.65)) { this.post_race_option = 1; this._backToMenu(false); }
    } else if (!this.pointsaccounted) {
      if (this.table_cooldown > this.table_timer) {                    // tocar = anotar puntos (= ENTER)
        for (const tank of tanks) {
          this.tank_points[tank.id] += this.points_for_rank[tank.rank - 1];
          this.tank_times[tank.id] += tank.racetime + tank.racetime * 0.01 * (tank.rank - 1);
        }
        this.pointsaccounted = true; this.enter_pressed = true;
      }
    } else {
      if (this.tournamentfinished) { if (near(0.85)) this._backToMenu(true); }
      else if (near(0.75)) { this.post_race_option = 0; this._tournamentNext(); }
      else if (near(0.85)) { this.post_race_option = 1; this._backToMenu(true); }
    }
  }

  draw() {
    const c = this.racestart_cooling;
    if (c > 1 && c < this.racestart_timer) {
      let txt = '', seg = 0;
      if (c < 1.7)              { txt = '3!';   seg = 1; }
      else if (c > 2 && c < 2.7) { txt = '2!';  seg = 2; }
      else if (c > 3 && c < 3.7) { txt = '1!';  seg = 3; }
      else if (c > 4 && c < 5)   { txt = 'GO!!'; seg = 4; }
      if (txt) {
        const into = c - seg, scale = 1 + 0.35 * Math.max(0, 1 - into/0.28), isGo = txt === 'GO!!';
        ctx.save();
        ctx.translate(xper(0.5), yper(0.5)); ctx.scale(scale, scale);
        createText(B_font, txt, isGo ? [120,255,140] : [255,255,255], null, 0, 0, isGo ? 44 : 30);
        ctx.restore();
      }
    }

    // el hover mueve la selección (hoverFocus), así la opción bajo el mouse muestra el estilo seleccionado
    const selGlow = on => on ? 12 : 0;

    if (this.racefinished) {
      if (!this.tournament) {
        for (const tank of tanks) if (tank.rank === 1)
          createText(B_font, `¡${COLOR_NAMES[tank.id]} Wins!`, modifyColor(tank.color,75), null, xper(0.5), yper(0.35), 30);
        createText(M_font, 'Rematch',      this.post_race_option === 0 ? [255,255,255] : [150,150,150], null, xper(0.5), yper(0.55), selGlow(this.post_race_option === 0));
        createText(M_font, 'Back to Menu', this.post_race_option === 1 ? [255,255,255] : [150,150,150], null, xper(0.5), yper(0.65), selGlow(this.post_race_option === 1));
      } else {
        if (this.table_cooldown < this.table_timer) {
          for (const tank of tanks) if (tank.rank === 1)
            createText(B_font, `¡${COLOR_NAMES[tank.id]} Wins!`, modifyColor(tank.color,75), null, xper(0.5), yper(0.5), 30);
        } else {
          // panel redondeado semi-transparente
          ctx.save();
          ctx.globalAlpha = 0.84;
          roundRectPath(xper(0.25), yper(0.25), xper(0.5), yper(0.4), 18); ctx.fillStyle = rgb([10,10,18]); ctx.fill();
          ctx.restore();
          roundRectPath(xper(0.25), yper(0.25), xper(0.5), yper(0.4), 18); ctx.strokeStyle = rgb([255,255,255]); ctx.lineWidth = 3; ctx.stroke();
          for (let i = 0; i < 3; i++) {
            const yy = yper(0.35 + (i === 1 ? 0.1 : i === 2 ? 0.2 : 0));
            ctx.globalAlpha = 0.35; drawLine([xper(0.27), yy], [xper(0.73), yy], [200,200,220], 1); ctx.globalAlpha = 1;
          }

          const tf = 32;
          for (const tank of tanks) {
            let tourneyrank = tanks.length;
            let pos_in_table = yper(0.6);
            let points;

            if (this.tank_points[tank.id] > 0) {
              for (const tank2 of tanks) {
                if (tank2 !== tank) {
                  if (this.tank_points[tank.id] > this.tank_points[tank2.id]) { tourneyrank -= 1; pos_in_table -= yper(0.1); }
                  if (this.tank_points[tank.id] === this.tank_points[tank2.id] && this.tank_times[tank.id] < this.tank_times[tank2.id]) { tourneyrank -= 1; pos_in_table -= yper(0.1); }
                }
              }
              points = !this.pointsaccounted ? `${this.tank_points[tank.id]} + ${this.points_for_rank[tank.rank-1]}` : this.tank_points[tank.id];
            } else {
              tourneyrank = tank.id === 0 ? '1' : tank.id === 1 ? '2' : tank.id === 2 ? '3' : '4';
              pos_in_table = tank.id === 0 ? yper(0.3) : tank.id === 1 ? yper(0.4) : tank.id === 2 ? yper(0.5) : yper(0.6);
              points = `0 + ${this.points_for_rank[tank.rank-1]}`;
            }

            createText(tf, `${tourneyrank}°`, this.pointsaccounted ? modifyColor(tank.color,75) : [255,255,255], null, xper(0.31), pos_in_table);
            createText(tf, `${points} pts.`, modifyColor(tank.color,75), null, xper(0.67), pos_in_table);
            if (this.pointsaccounted && this.tournamentfinished && tourneyrank === 1)
              createText(M_font, `¡${COLOR_NAMES[tank.id]} is the Champion!`, randcolorGray(55,255), null, xper(0.5), yper(0.16), 22);
            if (!this.pointsaccounted) {
              const rk = tank.rank === 1 ? '1st!' : tank.rank === 2 ? '2nd!' : tank.rank === 3 ? '3rd' : '4th';
              createText(28, rk, modifyColor(tank.color,75), null, xper(0.55), pos_in_table);
            }

            paintTank(xper(0.42), pos_in_table, -Math.PI/2, tank.radius, tank.color, 1, false);
          }
        }

        if (this.pointsaccounted) {
          createText(M_font, this.tournamentfinished ? '' : 'Continue', this.post_race_option === 0 ? [255,255,255] : [150,150,150], null, xper(0.5), yper(0.75), selGlow(this.post_race_option === 0));
          createText(M_font, this.tournamentfinished ? 'Back to Menu' : 'Exit Tournament', this.post_race_option === 1 ? [255,255,255] : [150,150,150], null, xper(0.5), yper(0.85), selGlow(this.post_race_option === 1));
        }
      }
    }

    if (this.pause) {
      ctx.save(); ctx.globalAlpha = 0.45; ctx.fillStyle = '#000'; ctx.fillRect(0, 0, SCREEN_X, SCREEN_Y); ctx.restore();
      createText(B_font, 'PAUSE', randcolorGray(155,255), null, xper(0.5), yper(0.5), 22);
    }
  }
}

// ════════════════ PRIMITIVAS DE DIBUJO (en coords lógicas) ════════════════
function fillScreen(color) { ctx.fillStyle = rgb(color); ctx.fillRect(0, 0, SCREEN_X, SCREEN_Y); }
function fillRect(x, y, w, h, color) { ctx.fillStyle = rgb(color); ctx.fillRect(x, y, w, h); }
function strokeRect(x, y, w, h, color, lw = 1) { ctx.strokeStyle = rgb(color); ctx.lineWidth = lw; ctx.strokeRect(x, y, w, h); }
function drawCircle(x, y, r, color, lw = 0) {
  ctx.beginPath(); ctx.arc(x, y, Math.max(0, r), 0, Math.PI*2);
  if (lw > 0) { ctx.strokeStyle = rgb(color); ctx.lineWidth = lw; ctx.stroke(); }
  else { ctx.fillStyle = rgb(color); ctx.fill(); }
}
function drawLine(p1, p2, color, lw = 1) {
  ctx.strokeStyle = rgb(color); ctx.lineWidth = Math.max(1, lw); ctx.lineCap = 'butt';
  ctx.beginPath(); ctx.moveTo(p1[0], p1[1]); ctx.lineTo(p2[0], p2[1]); ctx.stroke();
}

// ════════════════ TANQUE REUTILIZABLE (carrera, tabla de torneo, menú ambiente) ════════════════
// Mismo render de treads+cuerpo del original, extraído para no duplicarlo. `alpha` permite fantasmas
// translúcidos (tanques de fondo en el menú); `finished` aplica el tinte apagado.
function paintTank(x, y, ang, r, color, alpha = 1, finished = false) {
  ctx.save();
  if (alpha !== 1) ctx.globalAlpha = alpha;
  const a0 = ctx.globalAlpha;
  const tint = finished ? (c => modifyColorPerc(c, 0.4)) : (c => c);    // tinte apagado al terminar la carrera
  const cos = Math.cos(ang), sin = Math.sin(ang);

  // Sombra de apoyo: da profundidad y "despega" el tanque del piso.
  ctx.globalAlpha = a0 * 0.30; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(x + r*0.13, y + r*0.18, r*1.12, r*0.98, ang, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = a0;

  // Orugas / cuerpo: bandas perpendiculares al avance (look de treads del original).
  const lines = 17;
  for (let layer = 0; layer < 2; layer++) {
    for (let i = 0; i < lines; i++) {
      const px = x + Math.cos(ang + Math.PI/2) * (-r + 2*r*(i/lines) + ((r*2)/lines - 1)/2);
      const py = y + Math.sin(ang + Math.PI/2) * (-r + 2*r*(i/lines) + ((r*2)/lines - 1)/2);
      const length = Math.abs(i - Math.floor(lines/2)) < lines*0.2 ? r*0.7 : r;
      const col = layer === 0 ? tint(modifyColor(color,-50)) : tint(color);
      const lw  = layer === 0 ? Math.max(Math.trunc((r*5)/lines - 1), 1) : Math.max(Math.trunc((r*2)/lines - 1), 1);
      drawLine([px + cos*-length, py + sin*-length], [px + cos*length, py + sin*length], col, lw);
    }
  }

  // Cañón: base oscura ancha + caño claro fino + boca redondeada.
  const bx = x + cos*r*1.7, by = y + sin*r*1.7;
  drawLine([x, y], [bx, by], tint(modifyColor(color,-40)), Math.max(2, Math.trunc(r*0.44)));
  drawLine([x, y], [bx, by], tint(modifyColor(color,15)),  Math.max(1, Math.trunc(r*0.22)));
  drawCircle(bx, by, r*0.18, tint(modifyColor(color,-25)));

  // Torreta: base + domo claro + borde, con un brillo (gloss) arriba-izquierda.
  drawCircle(x, y, r*0.64, tint(modifyColor(color,-25)));
  drawCircle(x, y, r*0.5,  tint(modifyColor(color,60)));
  drawCircle(x, y, r*0.5,  tint(modifyColor(color,15)), Math.max(1, r*0.07));
  ctx.globalAlpha = a0 * 0.5;
  drawCircle(x - r*0.16, y - r*0.18, r*0.17, [255,255,255]);
  ctx.globalAlpha = a0;

  ctx.restore();
}

// ════════════════ DECORACIÓN AMBIENTE (rellena los espacios vacíos de cada pista) ════════════════
// Generada UNA vez por pista con un PRNG sembrado → posiciones estables (no parpadea entre frames).
// El "tema" (track//2) define el flavor: pasto, arena, nieve, tecno, lava.
const TAU = Math.PI * 2;

function getDeco(track) {
  if (decoCache[track]) return decoCache[track];
  const rng = mulberry32(((track + 1) * 2654435761) >>> 0);
  const theme = Math.floor(track / 2);
  const items = [];
  for (let i = 0; i < 80; i++) {
    const x = rng() * SCREEN_X, y = rng() * SCREEN_Y, s = 0.5 + rng();
    let shape, col, alpha, r, extra = 0;
    if (theme === 0) {                                                // ASFALTO: grava clara, grietas oscuras, manchas de aceite (nada de pasto)
      const k = rng();
      if (k < 0.5)       { shape = 'gravel'; col = [105+rng()*55, 108+rng()*55, 116+rng()*55]; alpha = 0.18 + rng()*0.16; r = xper(0.0032)*s; }
      else if (k < 0.82) { shape = 'crack';  col = [16+rng()*14, 17+rng()*14, 21+rng()*14];    alpha = 0.34 + rng()*0.24; r = xper(0.02)*s;  extra = rng()*TAU; }
      else               { shape = 'oil';    col = [10+rng()*10, 11+rng()*10, 14+rng()*10];    alpha = 0.26 + rng()*0.18; r = xper(0.013)*s; extra = rng()*TAU; }
    }
    else if (theme === 1) { shape = 'dot';   col = modifyColor([150,132,72], -Math.floor(rng()*40)); alpha = 0.30 + rng()*0.20; r = xper(0.0045)*s; }
    else if (theme === 2) { shape = 'cross'; col = [150+rng()*40, 168+rng()*40, 200+rng()*35];        alpha = 0.22 + rng()*0.16; r = xper(0.0045)*s; }
    else if (theme === 3) { shape = 'ring';  col = [60+rng()*70, 150+rng()*70, 230];                  alpha = 0.24 + rng()*0.20; r = xper(0.0075)*s; }
    else                  { shape = 'ember'; col = [225+rng()*30, 95+rng()*60, 25+rng()*35];          alpha = 0.26 + rng()*0.20; r = xper(0.0045)*s; }

function drawDeco(track) {
  const { theme, items } = getDeco(track);
  // grilla tenue para dar sensación de "arena"
  const g = BASE_THEME[theme];
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = rgb(theme === 2 ? [120,120,140] : modifyColorPerc(g, 1.6));
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let gx = 0; gx <= SCREEN_X; gx += xper(0.0625)) { ctx.moveTo(gx, 0); ctx.lineTo(gx, SCREEN_Y); }
  for (let gy = 0; gy <= SCREEN_Y; gy += yper(0.111)) { ctx.moveTo(0, gy); ctx.lineTo(SCREEN_X, gy); }
  ctx.stroke();
  // scatter temático
  for (const it of items) {

      ctx.lineTo(it.x - dx*0.2 - dy*0.18, it.y - dy*0.2 + dx*0.18);
      ctx.lineTo(it.x + dx*0.3 + dy*0.12, it.y + dy*0.3 - dx*0.12);
      ctx.lineTo(it.x + dx, it.y + dy);
      ctx.stroke();
    } else if (it.shape === 'oil') {
      ctx.fillStyle = rgb(it.col);
      ctx.beginPath(); ctx.ellipse(it.x, it.y, it.r, it.r*0.7, it.extra, 0, TAU); ctx.fill();
    } else if (it.shape === 'dot') {
      drawCircle(it.x, it.y, it.r, it.col);
    } else if (it.shape === 'cross') {
      ctx.strokeStyle = rgb(it.col); ctx.lineWidth = Math.max(1, it.r*0.4); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(it.x-it.r, it.y); ctx.lineTo(it.x+it.r, it.y); ctx.moveTo(it.x, it.y-it.r); ctx.lineTo(it.x, it.y+it.r); ctx.stroke();
    } else if (it.shape === 'ring') {
      ctx.strokeStyle = rgb(it.col); ctx.lineWidth = Math.max(1, it.r*0.32);
      ctx.beginPath(); ctx.arc(it.x, it.y, it.r, 0, TAU); ctx.stroke();
    } else {
      drawCircle(it.x, it.y, it.r*1.9, it.col);
      drawCircle(it.x, it.y, it.r*0.6, modifyColorPerc(it.col, 1.5));

  // viñeta: oscurece sutilmente los bordes del piso → profundidad
  const vg = ctx.createRadialGradient(SCREEN_X/2, SCREEN_Y/2, SCREEN_Y*0.32, SCREEN_X/2, SCREEN_Y/2, SCREEN_Y*0.95);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.34)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, SCREEN_X, SCREEN_Y);
}

// ════════════════ MOTIVOS SOBRE LOS OBSTÁCULOS (temática por bioma) ════════════════
// Posiciones generadas una vez por pared (PRNG sembrado, cacheado en w._motifs). El tamaño del motivo
// escala con el grosor de la pared, así los bordes finos quedan como textura y los bloques como "bosque".
function getWallMotifs(w) {
  if (w._motifs) return w._motifs;
  const theme = Math.floor(w.track / 2);
  const rng = mulberry32(((w.track*131 + w.id*977 + 7) >>> 0));
  const thick = Math.min(w.width, w.height);
  const mr = Math.min(thick * 0.42, xper(0.02));
  const cell = mr * 2.6, CAP = 40;                                     // tope de motivos/pared (perf en mobile)
  let cols = Math.max(1, Math.round(w.width / cell));
  let rows = Math.max(1, Math.round(w.height / cell));
  cols = Math.min(cols, CAP);
  rows = Math.min(rows, Math.max(1, Math.floor(CAP / cols)));
  const list = [];
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    list.push({
      x: w.x + (c + 0.5) * w.width / cols + (rng()-0.5) * (w.width/cols) * 0.4,
      y: w.y + (r + 0.5) * w.height / rows + (rng()-0.5) * (w.height/rows) * 0.4,
      r: mr * (0.75 + rng()*0.5), k: rng(), ph: rng()*TAU,
    });
  }
  w._motifs = { theme, list };
  return w._motifs;
}
function drawWallMotif(m, theme) {
  const r = m.r;
  if (theme === 0) {                                                   // PARQUE: árboles y arbustos
    drawCircle(m.x + r*0.18, m.y + r*0.2, r*1.05, [12,45,22]);
    if (m.k < 0.55) {
      drawCircle(m.x, m.y, r, [30,88,42]);
      drawCircle(m.x - r*0.28, m.y - r*0.28, r*0.52, [70,150,82]);
      drawCircle(m.x, m.y, r*0.16, [80,55,35]);
    } else {
      for (let i = 0; i < 4; i++) { const a = i*1.7 + m.ph; drawCircle(m.x + Math.cos(a)*r*0.45, m.y + Math.sin(a)*r*0.45, r*0.5, i%2 ? [40,110,55] : [55,135,68]); }
    }
  } else if (theme === 1) {                                            // DESIERTO: pirámides, cactus, dunas
    if (m.k < 0.4) {
      ctx.fillStyle = rgb([205,175,115]); ctx.beginPath(); ctx.moveTo(m.x-r, m.y+r); ctx.lineTo(m.x+r, m.y+r); ctx.lineTo(m.x, m.y-r); ctx.closePath(); ctx.fill();
      ctx.fillStyle = rgb([150,118,68]);  ctx.beginPath(); ctx.moveTo(m.x-r, m.y+r); ctx.lineTo(m.x, m.y-r); ctx.lineTo(m.x, m.y+r); ctx.closePath(); ctx.fill();
    } else if (m.k < 0.72) {
      ctx.strokeStyle = rgb([70,120,55]); ctx.lineCap = 'round'; ctx.lineWidth = Math.max(1, r*0.5);
      ctx.beginPath();
      ctx.moveTo(m.x, m.y+r*0.85); ctx.lineTo(m.x, m.y-r*0.85);
      ctx.moveTo(m.x, m.y); ctx.lineTo(m.x-r*0.55, m.y-r*0.25);
      ctx.moveTo(m.x, m.y+r*0.25); ctx.lineTo(m.x+r*0.55, m.y-r*0.15);
      ctx.stroke();
    } else {
      ctx.strokeStyle = rgb([175,150,95]); ctx.lineWidth = Math.max(1, r*0.22); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(m.x, m.y + r*0.6, r, Math.PI*1.15, Math.PI*1.85); ctx.stroke();
    }
  } else if (theme === 2) {                                            // NIEVE: tótems, árboles secos, fogatas
    if (m.k < 0.4) {
      const cols = [[200,70,60], [70,150,160], [210,180,90]];
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = rgb(cols[i]); ctx.fillRect(m.x-r*0.55, m.y-r + i*r*0.7, r*1.1, r*0.62);
        ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1; ctx.strokeRect(m.x-r*0.55, m.y-r + i*r*0.7, r*1.1, r*0.62);
      }
    } else if (m.k < 0.72) {
      ctx.strokeStyle = rgb([90,70,55]); ctx.lineWidth = Math.max(1, r*0.18); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(m.x, m.y+r); ctx.lineTo(m.x, m.y-r*0.4);
      for (let i = 0; i < 4; i++) { const a = -Math.PI/2 + (i-1.5)*0.7; ctx.moveTo(m.x, m.y-r*0.1); ctx.lineTo(m.x + Math.cos(a)*r*0.9, m.y + Math.sin(a)*r*0.9); }
      ctx.stroke();
    } else {
      ctx.strokeStyle = rgb([90,60,40]); ctx.lineWidth = Math.max(1, r*0.18);
      ctx.beginPath(); ctx.moveTo(m.x-r*0.6, m.y+r*0.4); ctx.lineTo(m.x+r*0.6, m.y+r*0.5); ctx.moveTo(m.x-r*0.6, m.y+r*0.5); ctx.lineTo(m.x+r*0.6, m.y+r*0.4); ctx.stroke();
      const fl = 0.8 + 0.2*Math.sin(T*9 + m.ph);
      ctx.globalAlpha = 0.85; drawCircle(m.x, m.y, r*0.55*fl, [255,150,40]); drawCircle(m.x, m.y-r*0.15, r*0.3*fl, [255,230,140]); ctx.globalAlpha = 1;
    }
  } else if (theme === 3) {                                            // TECNO: cubos con detalles luminosos
    const pulse = 0.55 + 0.45*Math.sin(T*3 + m.ph), edge = [80 + 120*pulse, 200, 255];
    ctx.fillStyle = rgb([18,34,70]); ctx.fillRect(m.x-r*0.8, m.y-r*0.8, r*1.6, r*1.6);
    ctx.globalAlpha = 0.30*pulse; ctx.strokeStyle = rgb(edge); ctx.lineWidth = r*0.5;   // halo (glow barato, sin shadowBlur)
