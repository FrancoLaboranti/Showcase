    ctx.globalAlpha = 1; ctx.lineWidth = Math.max(1, r*0.16);
    ctx.strokeRect(m.x-r*0.8, m.y-r*0.8, r*1.6, r*1.6);
    ctx.beginPath(); ctx.moveTo(m.x-r*0.8, m.y); ctx.lineTo(m.x+r*0.8, m.y); ctx.moveTo(m.x, m.y-r*0.8); ctx.lineTo(m.x, m.y+r*0.8); ctx.stroke();
  } else {                                                             // LAVA: roca con hollín + vetas de lava/fuego
    drawCircle(m.x, m.y, r, [55,50,50]);
    ctx.globalAlpha = 0.6; drawCircle(m.x - r*0.3, m.y - r*0.3, r*0.4, [25,22,22]); ctx.globalAlpha = 1;
    const glow = 0.6 + 0.4*Math.sin(T*5 + m.ph);
    const vein = () => { ctx.beginPath(); ctx.moveTo(m.x-r*0.7, m.y+r*0.5); ctx.lineTo(m.x-r*0.1, m.y-r*0.1); ctx.lineTo(m.x+r*0.3, m.y+r*0.2); ctx.lineTo(m.x+r*0.8, m.y-r*0.5); ctx.stroke(); };
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.35*glow; ctx.strokeStyle = rgb([255,120,30]); ctx.lineWidth = Math.max(1, r*0.5); vein();   // halo
    ctx.globalAlpha = 1; ctx.strokeStyle = rgb([255, 90 + 60*glow, 20]); ctx.lineWidth = Math.max(1, r*0.18); vein();
  }
}
function decorateWall(w) {
  const { theme, list } = getWallMotifs(w);
  ctx.save();
  ctx.beginPath(); ctx.rect(w.x, w.y, w.width, w.height); ctx.clip();   // recorta los motivos a la pared
  for (const m of list) drawWallMotif(m, theme);
  ctx.restore();
}

// ════════════════ INPUT (teclado + botones touch) ════════════════
const KEYMAP = {
  ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT',
  Space: 'SPACE', KeyW: 'W', KeyS: 'S', KeyA: 'A', KeyD: 'D',
  ControlLeft: 'LCTRL', Enter: 'RETURN', Escape: 'ESCAPE', KeyP: 'P', KeyF: 'F', F1: 'F1', F2: 'F2',
};
window.addEventListener('keydown', e => {
  const name = KEYMAP[e.code];
  if (name) { keys[name] = true; if (['UP','DOWN','LEFT','RIGHT','SPACE','F1','F2'].includes(name)) e.preventDefault(); }
});
window.addEventListener('keyup', e => { const name = KEYMAP[e.code]; if (name) keys[name] = false; });

// Botones en pantalla → mismo objeto `keys`. Cada botón captura su propio puntero (multi-touch).
for (const el of document.querySelectorAll('[data-k]')) {
  const name = el.dataset.k;
  const press   = e => { e.preventDefault(); keys[name] = true;  el.classList.add('on'); try { el.setPointerCapture(e.pointerId); } catch {} };
  const release = e => { e.preventDefault(); keys[name] = false; el.classList.remove('on'); };
  el.addEventListener('pointerdown', press);
  el.addEventListener('pointerup', release);
  el.addEventListener('pointercancel', release);
  el.addEventListener('pointerleave', release);
}

// ── JOYSTICKS (nipplejs) → alimentan al jugador 1. throttle/steer ∈ [-1, 1]; vuelven a 0 al soltar. ──
// Los dos joysticks se mueven LIBRES en cualquier dirección, pero cada uno usa solo UNA componente:
//   izq (acelerador) → vector.y (adelante/atrás)   ·   der (dirección) → vector.x (izquierda/derecha)
// data.vector ya viene normalizado a [-1,1] → la intensidad es proporcional a la cercanía al centro.
// vector.y es + hacia ARRIBA. La otra componente se ignora, así moverlo en diagonal no molesta.
const lever = { throttle: 0, steer: 0 };
const clamp1 = v => Math.max(-1, Math.min(1, v));
// dynamicPage:true → nipplejs recalcula la posición real del joystick en CADA toque (clave: los pads se
// ocultan en el menú con display:none, lo que invalida la posición cacheada y hacía que el vector saliera
// siempre hacia abajo-derecha desde la esquina). Con esto el centro es el del joystick, no la esquina.
const JOY_OPTS = { mode: 'static', position: { left: '50%', top: '50%' }, size: 80, restJoystick: true, fadeTime: 0, dynamicPage: true, color: 'rgba(120,200,255,0.7)' };
// Referencia RELATIVA: el punto donde agarrás el stick es el neutro. Solo cuenta el movimiento DESDE ese
// punto, así tomarlo un poco descentrado NO aplica input de una (no doblás/acelerás sin querer al agarrar).
let jThrottle = null, jSteer = null, throttleRef = null, steerRef = null;
function setupJoysticks() {
  // Recrea los joysticks desde cero. Necesario tras entrar/salir de fullscreen o rotar: nipplejs cachea
  // la geometría al crearlos, así que un cambio de viewport dejaba los controles descolocados.
  if (jThrottle) { try { jThrottle.destroy(); } catch {} }
  if (jSteer)    { try { jSteer.destroy(); }    catch {} }
  lever.throttle = 0; lever.steer = 0; throttleRef = null; steerRef = null;
  jThrottle = nipplejs.create({ ...JOY_OPTS, zone: document.getElementById('jThrottle') });
  jSteer    = nipplejs.create({ ...JOY_OPTS, zone: document.getElementById('jSteer') });
  jThrottle.on('start', () => { throttleRef = null; });
  jThrottle.on('move',  (e, d) => { if (throttleRef === null) throttleRef = d.vector.y; lever.throttle = clamp1(d.vector.y - throttleRef); });
  jThrottle.on('end',   () => { lever.throttle = 0; throttleRef = null; });
  jSteer.on('start', () => { steerRef = null; });
  jSteer.on('move',  (e, d) => { if (steerRef === null) steerRef = d.vector.x; lever.steer = clamp1(d.vector.x - steerRef); });
  jSteer.on('end',   () => { lever.steer = 0; steerRef = null; });
}
setupJoysticks();

// ── PANTALLA COMPLETA. En mobile saca la barra del navegador. iOS Safari NO soporta la Fullscreen API
//    en elementos arbitrarios → ahí falla en silencio (la alternativa es "agregar a pantalla de inicio",
//    que con los metas PWA abre sin barra). El botón está en la esquina sup-der, al lado del de atrás. ──
const fsTarget = document.documentElement;
const _reqFs  = fsTarget.requestFullscreen || fsTarget.webkitRequestFullscreen;
const _exitFs = document.exitFullscreen || document.webkitExitFullscreen;
function isFs()    { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function enterFs() { if (_reqFs)  { const p = _reqFs.call(fsTarget); if (p && p.catch) p.catch(() => {}); } }
function exitFs()  { if (_exitFs) _exitFs.call(document); }
function toggleFs(){ isFs() ? exitFs() : enterFs(); }
function syncFsIcon() { document.body.classList.toggle('fs-on', isFs()); }
// Al entrar/salir de fullscreen (o rotar) el viewport cambia → re-ajustar el canvas y RECREAR los
// joysticks, que si no quedan descolocados con la geometría vieja. Diferido un frame para que el layout
// ya esté aplicado cuando nipplejs mida.
function onViewportChange() { syncFsIcon(); requestAnimationFrame(() => { resize(); setupJoysticks(); }); }
document.addEventListener('fullscreenchange', onViewportChange);
document.addEventListener('webkitfullscreenchange', onViewportChange);
window.addEventListener('orientationchange', onViewportChange);
const btnFs = document.getElementById('btnFs');
btnFs.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); toggleFs(); });

// (El auto-fullscreen en el primer toque se quitó: se comía el primer tap. La pantalla completa ahora es
//  solo manual, con el botón de la esquina sup-der.)

// Toque/click directo sobre el canvas → opera el menú, el cartel de confirmación y la pantalla de
// fin de carrera. (El teclado sigue funcionando en paralelo en desktop.)
canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  const lx = (e.clientX - rect.left) / scaleX;
  const ly = (e.clientY - rect.top) / scaleY;
  const main = sprites[0];
  if (!main) return;
  if (main.menu) { main.tapMenu(lx, ly); return; }
  if (main.confirmQuit) {                                              // mitad izq = Sí (salir), mitad der = No
    if (Math.abs(ly - yper(0.56)) < yper(0.08)) {
      if (lx < xper(0.5)) main.confirmExit(); else main.confirmQuit = false;
    }
    return;
  }
  const aux = sprites[sprites.length - 1];                            // AuxiliaryHandler (fin de carrera)
  if (aux && aux.tap) aux.tap(lx, ly);
});

// Hover del mouse sobre el canvas (coords lógicas) → ilumina la opción debajo del cursor.
// Sólo con mouse (en touch no hay hover persistente).
const hover = { x: -1, y: -1, on: false };
canvas.addEventListener('pointermove', e => {
  if (e.pointerType && e.pointerType !== 'mouse') { hover.on = false; return; }
  const rect = canvas.getBoundingClientRect();
  hover.x = (e.clientX - rect.left) / scaleX;
  hover.y = (e.clientY - rect.top) / scaleY;
  hover.on = true;
  // hover = foco: la opción debajo del mouse pasa a estar "seleccionada" (dispara todos sus efectos)
  const main = sprites[0];
  if (!main) return;
  if (main.menu) main.hoverFocus(hover.y);
  else { const aux = sprites[sprites.length - 1]; if (aux && aux.hoverFocus) aux.hoverFocus(hover.y); }
});
canvas.addEventListener('pointerleave', () => { hover.on = false; });
function rowHover(frac) { return hover.on && Math.abs(hover.y - yper(frac)) < yper(0.05); }

// Hornea el fondo estático de la pista en un canvas offscreen (una vez por pista). Intercambia el ctx
// global temporalmente para reusar fillScreen/drawDeco/Wall.draw/TrackPoint.draw tal cual.
function bakeBackground(track) {
  bgReady = false;                                                     // mientras está en false, Wall/TrackPoint SÍ dibujan
  bgW = canvas.width; bgH = canvas.height;
  if (!bgCanvas) bgCanvas = document.createElement('canvas');
  bgCanvas.width = bgW; bgCanvas.height = bgH;
  const bc = bgCanvas.getContext('2d');
  bc.setTransform(scaleX * dpr, 0, 0, scaleY * dpr, 0, 0);
  ctx = bc;
  fillScreen(THEME_FLOOR[Math.floor(track / 2)]);
  drawDeco(track);
  for (const tp of trackpoints) tp.draw();                             // meta + grilla de largada (debajo)
  for (const w of walls) w.draw();                                     // paredes + motivos (encima)
  ctx = mainCtx;
  bgTrack = track; bgReady = true;
}

// ════════════════ LOOP PRINCIPAL ════════════════
let lastT = performance.now();
let showFPS = false, fKeyPrev = false, dtSmoothed = 1/60;              // overlay de FPS (tecla F)
let T = 0;                                                             // tiempo acumulado para animaciones (menú, cuenta regresiva)
const padL = document.getElementById('padL'), padR = document.getElementById('padR');
let padsShown = false;   // arranca oculto (en el menú / desktop)
function loop(now) {
  if (typeof now !== 'number') now = performance.now();
  deltaT = Math.min((now - lastT) / 1000, 0.05);                       // clamp 50ms, igual que el original
  lastT = now;
  T += deltaT;
  dtSmoothed = dtSmoothed * 0.9 + deltaT * 0.1;
  if (keys.F && !fKeyPrev) showFPS = !showFPS;                         // toggle por flanco
  fKeyPrev = !!keys.F;

  // Auto-resize: algunos navegadores móviles no disparan 'resize' al rotar y el aviso "girá el teléfono"
  // quedaba pegado. Re-evaluar acá lo arregla de forma robusta (también ajusta address-bar, etc).
  if (window.innerWidth !== lastVW || window.innerHeight !== lastVH) resize();

  // Limpiar a negro
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cssW, cssH);

  const main0 = sprites[0];
  if (main0 && !main0.menu) {
    // fondo estático horneado (se re-hornea sólo si cambió la pista o el tamaño del canvas)
    if (!bgReady || bgTrack !== main0.track || bgW !== canvas.width || bgH !== canvas.height) bakeBackground(main0.track);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.drawImage(bgCanvas, 0, 0);                                     // blit 1:1 en píxeles de dispositivo
  } else {
    bgReady = false;                                                   // en menú: invalidar para re-hornear al volver a carrera
  }

  // Transform a coords lógicas, escala para llenar la pantalla (landscape)
  ctx.setTransform(scaleX * dpr, 0, 0, scaleY * dpr, 0, 0);

  // process + draw por sprite. Paredes y trackpoints ya están en el fondo horneado → su draw es no-op.
  for (const sprite of sprites.slice()) { sprite.process(); sprite.draw(); }

  // ── Paso de física (Matter) ── Los process() de arriba ya aplicaron las velocidades a los cuerpos;
  // acá se integran y se espeja el resultado a this.x/y/ang (lo que lee toda la lógica de juego y el draw).
  // Paso fijo (60fps de referencia, así las velocidades quedan en px/frame). No corre en menú ni en pausa.
  const racing = tanks.length > 0;
  if (racing && main0 && !main0.menu && !tanks[0].pause) {
    Engine.update(engine, PHYS_STEP);
    for (const t of tanks) {
      const b = t.body, r = t.radius;
      let px = b.position.x, py = b.position.y, wrapped = false;       // wrap de pantalla (como el original)
      if (px > SCREEN_X + r) { px = -r; wrapped = true; } else if (px < -r) { px = SCREEN_X + r; wrapped = true; }
      if (py > SCREEN_Y + r) { py = -r; wrapped = true; } else if (py < -r) { py = SCREEN_Y + r; wrapped = true; }
      if (wrapped) Body.setPosition(b, { x: px, y: py });
      t.x = b.position.x; t.y = b.position.y; t.ang = b.angle;
      t.vel = Math.hypot(b.velocity.x, b.velocity.y) * 60;             // px/s (para la velocidad de salida de las bombas)
    }
  }

  if (showFPS) createText(S_font, 'FPS: ' + Math.round(1 / Math.max(1e-3, dtSmoothed)), [255,255,0], null, xper(0.93), yper(0.03));

  // Confirmación de salida al menú (ESC en carrera) — encima de todo. Tocá Sí / No.
  if (sprites[0] && sprites[0].confirmQuit) {
    ctx.save(); ctx.globalAlpha = 0.62; ctx.fillStyle = '#000'; ctx.fillRect(0, 0, SCREEN_X, SCREEN_Y); ctx.restore();
    const overSi = hover.on && Math.abs(hover.y - yper(0.56)) < yper(0.08) && hover.x < xper(0.5);
    const overNo = hover.on && Math.abs(hover.y - yper(0.56)) < yper(0.08) && hover.x >= xper(0.5);
    createText(M_font, '¿Volver al menú?', [255,255,255], null, xper(0.5), yper(0.4), 18);
    createText(M_font, 'SÍ', [255,150,140], modifyColorPerc([255,90,60], overSi ? 0.5 : 0.25), xper(0.38), yper(0.56), overSi ? 26 : 14);
    createText(M_font, 'NO', [150,210,255], modifyColorPerc([120,200,255], overNo ? 0.45 : 0.22), xper(0.62), yper(0.56), overNo ? 26 : 14);
  }

  // Los joysticks solo en táctil (en desktop se juega con teclado). En carrera se muestran; en el menú no.
  const showPads = IS_TOUCH && !(sprites[0] && sprites[0].menu);
  if (showPads !== padsShown) {
    padsShown = showPads;
    padL.style.display = showPads ? 'flex' : 'none';
    padR.style.display = showPads ? 'flex' : 'none';
    if (showPads) setupJoysticks();   // recrea con el layout actual al mostrarse (geometría fresca para nipplejs)
  }

  updateFireCooldown();
  requestAnimationFrame(loop);
}

// Cooldown circular en el botón de disparar (jugador 1): sector oscuro que se achica al recargar.
const cdRing = document.getElementById('cdRing');
function updateFireCooldown() {
  const p = tanks[0];
  const cd = (p && !p.ai) ? p.shoot_cooling / 2 : 0;                   // 0..1 restante (cooldown = 2s)
  cdRing.style.background = cd > 0.001
    ? `conic-gradient(rgba(0,0,0,0.55) ${cd*360}deg, rgba(0,0,0,0) 0deg)`
    : 'transparent';
}

// ── INIT ──
resize();
padL.style.display = 'none'; padR.style.display = 'none';   // arrancan ocultos; el loop los muestra solo en táctil + carrera
addSprite(new MainHandler());
loop();

const hint = document.getElementById('hint');
setTimeout(() => hint.style.opacity = '0', 6000);
window.addEventListener('keydown', () => hint.style.opacity = '0', { once: true });
</script>
  <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
  <script>
    document.getElementById('btnExit').addEventListener('click', () => {
      if (confirm('¿Salir al menú?')) location.href = '../../';
    });
  </script>
  <button id="btnInfo" aria-label="info" title="Info / FPS">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
  </button>
  <div id="fpsOverlay">FPS: --</div>
  <script>
    (function() {
      let frameCount = 0, lastT = performance.now();
      const overlay = document.getElementById('fpsOverlay');
      function loop() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          const fps = Math.round(frameCount * 1000 / (now - lastT));
          if (overlay.style.display !== 'none') overlay.textContent = 'FPS: ' + fps;
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(loop);
      }
      loop();
      const btn = document.getElementById('btnInfo');
      btn.addEventListener('click', () => {
        const showing = overlay.style.display !== 'none';
        overlay.style.display = showing ? 'none' : 'block';
        btn.classList.toggle('on', !showing);
      });
    })();
  </script>

</body>
</html>
