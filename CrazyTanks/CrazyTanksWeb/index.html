<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- PWA / "agregar a pantalla de inicio": abre sin barra del navegador (display standalone) -->
<meta name="theme-color" content="#05060a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CrazyTanks">
<title>CrazyTanks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&family=Russo+One&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Orbitron', 'Segoe UI', system-ui, sans-serif;
  }
  /* El canvas tiene resolución LÓGICA fija 1280×720 (igual que el pygame original) y se escala con
     letterbox para entrar en la pantalla — así toda la geometría porcentual y los umbrales de física
     dependientes de SCREEN_X se comportan idénticos al juego de escritorio. */
  #c { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

  #hint { display: none; }   /* cartelito de inicio oculto a propósito */

  /* ── Controles en pantalla (touch). En desktop el teclado sigue siendo el camino principal; estos
     botones quedan disponibles igual. Cada botón es un elemento independiente con su propio pointer
     capture, así el multi-touch (girar + acelerar al mismo tiempo) funciona. ── */
  /* Margen horizontal FIJO (sin safe-area): en fullscreen el env(safe-area-inset-left/right) del notch
     metía un margen extra que corría el joystick hacia adentro. El inferior sí respeta el safe-area (home bar). */
  .pad { position: absolute; bottom: calc(6px + env(safe-area-inset-bottom)); z-index: 4; display: flex; gap: 8px; }
  .col { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .row { display: flex; gap: 8px; align-items: center; }
  .btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.04);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.08s, transform 0.06s, box-shadow 0.12s, border-color 0.12s;
  }
  /* se ilumina al pasar el mouse por encima */
  .btn:hover { background: rgba(120,200,255,0.16); border-color: rgba(120,200,255,0.6); box-shadow: 0 0 14px rgba(120,200,255,0.6); }
  .btn:active, .btn.on { background: rgba(120,200,255,0.30); border-color: rgba(120,200,255,0.55); transform: scale(0.93); }
  .btn svg { display: block; width: 16px; height: 16px; pointer-events: none; }
  /* Joystick ÚNICO de movimiento (hand-rolled): se agarra en cualquier punto del lado izquierdo de la
     pantalla y aparece centrado en el dedo. El vector marca el rumbo; el disparo es automático. */
  #jMove { position: fixed; left: 0; bottom: 0; width: 48%; height: 86%; z-index: 4; touch-action: none; }
  /* Botones de acción (abajo-derecha): nitro (boost) arriba, disparo (misil) abajo. */
  #actBtns { position: fixed; right: calc(12px + env(safe-area-inset-right)); bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #actBtns .btn { width: 54px; height: 54px; position: relative; }
  #actBtns .btn svg { width: 22px; height: 22px; }
  .btn.fireBtn  { background: rgba(255,90,60,0.18);  border-color: rgba(255,90,60,0.5); overflow: hidden; }
  .btn.fireBtn:active, .btn.fireBtn.on   { background: rgba(255,90,60,0.45);  border-color: rgba(255,120,90,0.8); box-shadow: 0 0 14px rgba(255,90,60,0.6); }
  /* Carga del disparo: relleno rojo que sube; la bomba queda NEGRA (como el nitro/pickups) sobre la parte cargada y BLANCA mientras carga. */
  #fireFill { position: absolute; inset: 0; pointer-events: none; }
  #actBtns .btn svg.fbomb { position: absolute; inset: 0; width: 100%; height: 100%; }
  .fbLight { color: #fff; }
  .fbDark  { color: #0a2337; }
  .btn.nitroBtn { background: rgba(80,220,255,0.16); border-color: rgba(80,220,255,0.5); color: #aef0ff; overflow: hidden; }
  .btn.nitroBtn:active, .btn.nitroBtn.on { background: rgba(80,220,255,0.42); border-color: rgba(140,235,255,0.85); box-shadow: 0 0 14px rgba(80,220,255,0.6); }
  /* Carga del nitro: relleno vertical que DIVIDE el botón. La llama queda NEGRA (como los pickups) sobre la parte cargada y celeste sobre la vacía. */
  #nitroFill { position: absolute; inset: 0; pointer-events: none; }
  #actBtns .btn svg.nflame { position: absolute; inset: 0; width: 100%; height: 100%; }
  .nfLight { color: #aef0ff; }
  .nfDark  { color: #0a2337; }
  #nitroRing, #fireRing { position: absolute; inset: -3px; border-radius: 50%; pointer-events: none; }
  /* (Estilo del nub: ahora inline en createJoystick; estas reglas .nipple quedan sin uso pero inofensivas.) */
  .nipple .back {
    background: radial-gradient(circle at 50% 38%, rgba(255,255,255,0.10), rgba(255,255,255,0.03) 70%) !important;
    border: 1px solid rgba(120,200,255,0.35);
    box-shadow: inset 0 2px 14px rgba(0,0,0,0.5), 0 0 16px rgba(120,200,255,0.25);
    opacity: 1 !important;
  }
  .nipple .front {
    background: radial-gradient(circle at 50% 35%, rgba(160,220,255,0.95), rgba(120,200,255,0.55) 70%) !important;
    border: 1px solid rgba(180,228,255,0.8);
    box-shadow: 0 3px 10px rgba(0,0,0,0.5), 0 0 16px rgba(120,200,255,0.6);
    opacity: 1 !important;
  }
  /* Botones de esquina (fullscreen + atrás): posicionados individualmente para replicar el ORDEN y el
     espaciado de Pong → de afuera hacia adentro: salir(8) · info(46) · pantalla(84) · atrás(122) · pausa(160). */
  #btnFs, #btnBack {
    position: absolute; top: calc(8px + env(safe-area-inset-top));
    width: 30px; height: 30px; z-index: 4;
  }
  #btnFs   { right: calc(84px + env(safe-area-inset-right)); }
  #btnBack { right: calc(122px + env(safe-area-inset-right)); }
  #btnFs svg, #btnBack svg { width: 14px; height: 14px; }
  /* Ícono de pantalla completa: muestra "expandir" o "contraer" según el estado (body.fs-on) */
  #btnFs .ic-exit { display: none; }
  body.fs-on #btnFs .ic-enter { display: none; }
  body.fs-on #btnFs .ic-exit  { display: block; }

  /* Aviso de orientación: el juego es vertical. Se muestra (vía JS) cuando la pantalla está apaisada. */
  #rotate {
    position: absolute; inset: 0; z-index: 20; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 22px;
    background: #05060a; color: rgba(255,255,255,0.85);
    text-align: center; padding: 24px;
  }
  #rotate svg { width: 88px; height: 88px; color: #78c8ff; animation: rotatehint 2.2s ease-in-out infinite; }
  #rotate p { font-size: 19px; letter-spacing: 0.06em; line-height: 1.5; }
  @keyframes rotatehint { 0%, 55%, 100% { transform: rotate(0deg); } 25%, 40% { transform: rotate(-90deg); } }
  /* Exit button — pegado a la esquina superior derecha (el más al borde) */
  #btnExit {
    position: absolute;
    right: calc(8px + env(safe-area-inset-right));
    top: calc(8px + env(safe-area-inset-top));
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
    z-index: 10;
  }
  #btnExit svg { display: block; width: 14px; height: 14px; pointer-events: none; }
  #btnExit:active { background: rgba(240,90,95,0.28); border-color: rgba(240,90,95,0.55); color: #fff; transform: scale(0.9); }
  /* Info (FPS) — arriba a la derecha, al lado del de salir (a su izquierda). */
  #btnInfo {
    position: absolute;
    right: calc(46px + env(safe-area-inset-right));
    top: calc(8px + env(safe-area-inset-top));
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
    z-index: 10;
  }
  #btnInfo svg { display: block; width: 14px; height: 14px; pointer-events: none; }
  #btnInfo:active, #btnInfo.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); color: #fff; }
  /* Pausa — como en Pong: extremo IZQUIERDO del cluster de esquina (a la izquierda de fullscreen/atrás). Sólo en carrera (display lo maneja __setPauseUI). */
  #btnPause {
    position: absolute;
    right: calc(160px + env(safe-area-inset-right));
    top: calc(8px + env(safe-area-inset-top));
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.85);
    display: none; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.1s, transform 0.08s;
    z-index: 10;
  }
  #btnPause svg { display: block; width: 13px; height: 13px; pointer-events: none; }
  #btnPause:active { transform: scale(0.9); }
  #btnPause.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); color: #fff; }
  /* HUD de FPS — formato Pong: panel monoespaciado arriba a la izquierda, sin border-radius. */
  #fpsOverlay {
    position: absolute;
    left: calc(8px + env(safe-area-inset-left));
    top: calc(8px + env(safe-area-inset-top));
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 18px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.55);
    padding: 4px 6px;
    pointer-events: none;
    display: none;
    z-index: 9;
  }

</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">joystick = move · red button (bomb) = fire · cyan button (flame) = nitro (grab the cyan orbs) · keyboard: arrows + space + shift</div>

  <!-- Zona de movimiento: joystick ÚNICO y DINÁMICO. Tocá en cualquier punto del lado izquierdo y la
       palanca aparece ahí. El vector marca el rumbo del tanque. -->
  <div id="jMove" aria-label="mover"></div>

  <!-- Botones de acción (abajo-derecha): nitro (llama, celeste) arriba, disparo (BOMBA, rojo) abajo.
       Íconos propios de CrazyTanks (no los de TankWARS: ni misil ni rayo). -->
  <div id="actBtns">
    <button class="btn nitroBtn" id="btnNitro" aria-label="nitro" title="Nitro">
      <span id="nitroFill"></span>
      <svg class="nflame nfLight" viewBox="0 0 54 54" fill="currentColor" stroke="none"><path transform="translate(10 11.5) scale(1.4)" d="M12.5 2c.6 3-1.4 4-1.4 6.3 0 1 .7 1.7 1.6 1.7 1.2 0 1.7-1 1.6-2.2 1.7 1.3 2.7 3.4 2.7 5.5a5.5 5.5 0 0 1-11 0c0-2.7 1.7-4.6 3-6.1C10.9 5.3 11.8 3.7 12.5 2z"/></svg>
      <svg class="nflame nfDark" viewBox="0 0 54 54" fill="currentColor" stroke="none"><path transform="translate(10 11.5) scale(1.4)" d="M12.5 2c.6 3-1.4 4-1.4 6.3 0 1 .7 1.7 1.6 1.7 1.2 0 1.7-1 1.6-2.2 1.7 1.3 2.7 3.4 2.7 5.5a5.5 5.5 0 0 1-11 0c0-2.7 1.7-4.6 3-6.1C10.9 5.3 11.8 3.7 12.5 2z"/></svg>
    </button>
    <button class="btn fireBtn" id="btnFire" aria-label="disparar" title="Disparar">
      <span id="fireFill"></span>
      <svg class="fbomb fbLight" viewBox="0 0 54 54" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><g transform="translate(8.8 10.9) scale(1.4)"><circle cx="10.5" cy="14.5" r="6.5" fill="currentColor" stroke="none"/><path d="M15 9.5 18 6.5" stroke-width="2"/><circle cx="18.8" cy="5.6" r="1.7" fill="currentColor" stroke="none"/><path d="M20.5 3.6 21.7 2.6M20.2 6.4 21.6 6.7M17.6 3.3 17.2 1.9" stroke-width="1.4"/></g></svg>
      <svg class="fbomb fbDark" viewBox="0 0 54 54" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><g transform="translate(8.8 10.9) scale(1.4)"><circle cx="10.5" cy="14.5" r="6.5" fill="currentColor" stroke="none"/><path d="M15 9.5 18 6.5" stroke-width="2"/><circle cx="18.8" cy="5.6" r="1.7" fill="currentColor" stroke="none"/><path d="M20.5 3.6 21.7 2.6M20.2 6.4 21.6 6.7M17.6 3.3 17.2 1.9" stroke-width="1.4"/></g></svg>
    </button>
  </div>


  <!-- Aviso: girá el teléfono a horizontal -->
  <div id="rotate">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2.5"/><line x1="10.5" y1="19" x2="13.5" y2="19" stroke-width="2"/></svg>
    <p>Girá el teléfono<br>CrazyTanks se juega en horizontal</p>
  </div>

  <!-- Botones de esquina (orden Pong, de afuera hacia adentro): salir · info · PANTALLA · ATRÁS · pausa.
       Posicionados individualmente (no agrupados) para igualar tamaño y espaciado al cluster de Pong. -->
  <button class="btn" id="btnFs" aria-label="pantalla completa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg></button>
  <button class="btn" id="btnBack" data-k="ESCAPE" aria-label="atrás"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><path d="M18 9l-6 6M12 9l6 6"/></svg></button>

<script src="matter.min.js"></script>
<script>
// ════════════════════════════════════════════════════════════════════
//  CRAZYTANKS — port web del juego de carreras. Se juega en LANDSCAPE (teléfono horizontal).
// ════════════════════════════════════════════════════════════════════

// ── DIMENSIÓN LÓGICA — 1280×720 (16:9, las dimensiones originales de los mapas) ──
const SCREEN_X = 1280;
const SCREEN_Y = 720;
// Las 10 pistas originales se agrandan a un mundo MAP_SCALE× (con cámara que sigue al jugador). El diseño
// es el mismo, sólo escalado: el tanque se ve igual en pantalla y el mapa es más grande. Subí/bajá a gusto.
const MAP_SCALE = 2;

// ── TUNING ──
// El pygame original corría SIN cap de FPS, así que sus incrementos de vel/ang_vel por-frame
// (vel += 2.5, vel *= 0.9975, etc.) asumían cientos de frames/seg. En el navegador con rAF (~60fps)
// eso hace que el tanque tarde segundos en acelerar. SIM_FPS es el framerate de referencia: los
// incrementos se escalan por (deltaT * SIM_FPS), así la respuesta es ágil e INDEPENDIENTE del
// framerate, manteniendo la misma velocidad terminal. Subilo = más ágil; bajalo = más pesado.
const SIM_FPS = 200;
// Multiplicador del giro de la IA: qué tan RÁPIDO llega al giro máximo (respuesta/snappiness).
const TURN_MULT = 1.5;
// Tope de la velocidad de giro EFECTIVA. Evita que acumule rotación de más al mantener apretado el giro.
// ~4 ≈ el giro tope del juego original. Bajalo si querés que doblen más suave. (No afecta el spin de bombas.)
const ANG_VEL_MAX = 4;
// Giro del JUGADOR: directo y proporcional a la palanca/tecla (rad/s a deflexión máxima). A diferencia de
// la IA, NO acumula inercia de giro → responde al instante y frena al instante al soltar (tracción total).
// Subilo = dobla más cerrado/responsivo. (El spin-out de bombas sigue usando ang_vel, intacto.)
const PLAYER_TURN = 5.5;

// ── HELPERS DE RESOLUCIÓN / COLOR / GEOMETRÍA (port directo) ──
const xper = p => p * SCREEN_X;
const yper = p => p * SCREEN_Y;
const ri = (a, b) => a + Math.floor(Math.random() * (b - a + 1));      // randint inclusivo
const rnd = (a, b) => a + Math.random() * (b - a);                     // uniform
const clamp255 = v => Math.max(0, Math.min(255, v));

function randcolorGray(mincap, maxcap) { const v = ri(mincap, maxcap); return [v, v, v]; }
function modifyColor(color, offset)     { return color.map(c => clamp255(c + offset)); }
function modifyColorPerc(color, factor) { return color.map(c => clamp255(c * factor)); }
const rgb = c => `rgb(${Math.round(clamp255(c[0]))},${Math.round(clamp255(c[1]))},${Math.round(clamp255(c[2]))})`;

function getangle2(prevAng, p1, p2) {                                   // wrap continuo cruzando ±π
  let angle = Math.atan2(p2[1] - p1[1], p2[0] - p1[0]);
  if (angle - prevAng < -Math.PI) angle += Math.PI * 2;
  if (angle - prevAng >  Math.PI) angle -= Math.PI * 2;
  return angle;
}
function getdist(p1, p2) { return Math.hypot(p1[0] - p2[0], p1[1] - p2[1]); }

// ── DISPOSITIVO TÁCTIL ──
// En mobile (sin mouse) no tiene sentido el modo dos jugadores (comparten un solo teclado), así que se
// oculta esa opción del menú y se fuerza un jugador. En PC se mantiene. Heurística estándar: puntero
// grueso + sin hover = teléfono/tablet.
const IS_TOUCH = (window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches) || 'ontouchstart' in window;

// ── CANVAS ──
// La pista llena toda la pantalla (escala no-uniforme). Como el juego es horizontal, en el celular
// apaisado el estiramiento es mínimo. Si la pantalla está vertical se muestra el aviso "girá el teléfono".
const canvas = document.getElementById('c');
const mainCtx = canvas.getContext('2d');
let ctx = mainCtx;                                                     // se intercambia temporalmente al hornear el fondo
let dpr = 1, scaleX = 1, scaleY = 1, cssW = 0, cssH = 0;

// Fondo estático horneado por pista (piso + deco + meta + paredes + motivos). Se dibuja una vez y se
// blitea cada frame en vez de re-dibujar cientos de figuras — clave para los FPS en mobile.
let bgCanvas = null, bgReady = false, bgTrack = -1, bgW = 0, bgH = 0;
let mmCanvas = null, mmKey = '';                                      // minimapa: paredes horneadas (no se redibujan cada frame)
let mmStatic = null;                                                  // minimapa: invariantes por pista (geometría, gradiente, endpoints de meta) cacheados

// ── MUNDO + CÁMARA ──
// Cada pista vive en un mundo de W×H unidades lógicas. Default = pantalla (1280×720) → la pista entra
// entera y NO hay cámara (idéntico al comportamiento viejo). Las pistas GRANDES (las que genera el skill
// de niveles) declaran un mundo mayor en WORLDS[track] y entonces se activa la cámara que sigue al jugador.
// La "ventana" visible siempre es de SCREEN_X×SCREEN_Y unidades del mundo (mismo zoom que antes), y se
// scrollea dentro del mundo grande.
const WORLDS = {};                                                    // { [track]: [w, h] } — sólo pistas grandes (se llenan abajo)
const THEMES = {};                                                    // override de tema por pista (las generadas fijan el suyo)
const TRACK_POLY = {};                                                // { [track]: {outer, inner, theme} } → dibujo SUAVE del corredor
const TRACK_DECO_SEED = {};                                           // semilla de deco/escenografía por pista (el slot AUTO la re-sortea cada gen)
const BIG_START = {};                                                 // largadas por pista generada: { [track]: [[x,y,ang]×4] }
const BIG_VERTICAL = {};                                              // meta vertical? por pista generada (default: horizontal)
let dbgView = false;                                                  // overlay de DEBUG (botón info): cajas de colisión + waypoints
window.__setDbg = v => { dbgView = v; };                              // puente desde el handler del botón info (script aparte, abajo del body)
let uiPauseReq = false;                                               // pedido de pausa del botón de UI (estilo Pong); lo consume el AuxiliaryHandler
window.__uiTogglePause = () => { uiPauseReq = true; };                // puente desde el handler del botón de pausa (script al final del body)
// Torneo: 10 carreras con mapas autogenerados, temática GARANTIZADA en este orden (verde,desierto,nieve,tecno,lava ×2).
const TOURNEY_THEMES = [0, 1, 2, 3, 4, 5];                            // un bioma cada uno, EN ORDEN: parque · desierto · nieve · tecno · lava · parque-noche
const TOURNEY_RACES = TOURNEY_THEMES.length;                          // 6
const TABLE_STEP1 = 2.2;                                              // tabla del torneo: cuánto dura el PASO 1 (posición previa + "x + n") antes de pasar a los totales
function themeOf(track) { return THEMES[track] !== undefined ? THEMES[track] : Math.floor(track / 2) % 6; }   // %6: ahora hay 6 temas (5 = parque de noche con lluvia)
function worldW(track) { return (WORLDS[track] && WORLDS[track][0]) || SCREEN_X; }
function worldH(track) { return (WORLDS[track] && WORLDS[track][1]) || SCREEN_Y; }
function isBigWorld(track) { return worldW(track) > SCREEN_X || worldH(track) > SCREEN_Y; }
let camX = 0, camY = 0;                                               // esquina sup-izq de la vista (coords del mundo)
function updateCamera(track) {
  if (!isBigWorld(track)) { camX = 0; camY = 0; return; }
  const ww = worldW(track), hh = worldH(track);
  const p = tanks.find(t => !t.ai) || tanks[0];
  const px = p ? p.x : ww / 2, py = p ? p.y : hh / 2;
  camX = Math.max(0, Math.min(px - SCREEN_X / 2, ww - SCREEN_X));     // centra en el jugador, clamp al mundo
  camY = Math.max(0, Math.min(py - SCREEN_Y / 2, hh - SCREEN_Y));
}

let lastVW = 0, lastVH = 0;                                            // disparadores del poll (innerWidth/Height crudos)
function resize() {
  lastVW = window.innerWidth; lastVH = window.innerHeight;
  dpr  = Math.min(window.devicePixelRatio || 1, 2);
  // El canvas llena su contenedor por CSS (position:fixed; inset:0; 100%/100%). Leemos su tamaño REAL
  // renderizado (clientWidth/Height) en vez de innerWidth: en fullscreen el navegador a veces reporta
  // innerWidth sin la zona del notch, y dimensionar el canvas con eso dejaba una franja negra al costado.
  cssW = canvas.clientWidth  || window.innerWidth;
  cssH = canvas.clientHeight || window.innerHeight;
  scaleX = cssW / SCREEN_X;
  scaleY = cssH / SCREEN_Y;
  canvas.width  = Math.floor(cssW * dpr);                             // solo el buffer; el tamaño visual lo fija el CSS
  canvas.height = Math.floor(cssH * dpr);
  // Embebido en la shell del Arcade: la shell rota el iframe por CSS para garantizar landscape,
  // así que el cartel de "gira el teléfono" NUNCA se muestra (resize() puede ver cssH>cssW por
  // un instante durante transiciones de FS y dejarlo trabado).
  const isEmbedded = (window.self !== window.top);
  document.getElementById('rotate').style.display = (!isEmbedded && cssH > cssW) ? 'flex' : 'none';
}
window.addEventListener('resize', resize);

// ── TEXTO. Fuente arcade Orbitron + glow opcional + caja redondeada. ──
const FONT_FAMILY = "'Orbitron', 'Segoe UI', sans-serif";
const B_font = 112, M_font = 48, S_font = 22, RS_font = 14;            // px (Orbitron es más ancha que freesansbold)
function roundRectPath(x, y, w, h, r) {
  r = Math.min(r, h/2, w/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
}
function createText(fontPx, content, colorText, colorRect, posx, posy, glow = 0) {
  content = String(content);
  const weight = fontPx >= B_font ? 900 : 700;
  ctx.font = `${weight} ${fontPx}px ${FONT_FAMILY}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = (fontPx * 0.04).toFixed(1) + 'px';
  if (colorRect) {                                                     // bgcolor del render de pygame, ahora redondeado
    const w = ctx.measureText(content).width, pad = fontPx * 0.28;
    ctx.fillStyle = rgb(colorRect);
    roundRectPath(posx - w/2 - pad, posy - fontPx*0.62, w + pad*2, fontPx*1.24, fontPx*0.22);
    ctx.fill();
  }
  if (glow > 0) { ctx.shadowColor = rgb(colorText); ctx.shadowBlur = glow; }
  ctx.fillStyle = rgb(colorText);
  ctx.fillText(content, posx, posy);
  ctx.shadowBlur = 0;
  ctx.letterSpacing = '0px';
}

// posiciones de salida por pista/tanque [x, y, ang]
// Camina la polilínea de waypoints HACIA ATRÁS desde la meta (tp[0]) una distancia `dist` (coords de mundo).
// Devuelve [x, y, ang] sobre el centro de la pista mirando en el sentido de carrera → la grilla sigue las
// curvas y nunca cae fuera del circuito, sea cual sea la cantidad de tanques.
function pointBackAlong(tp, dist) {
  const n = tp.length; let i = 0, rem = dist;
  while (i < n * 2) {
    const a = tp[((-i) % n + n) % n], b = tp[((-i - 1) % n + n) % n];
    const seg = Math.hypot(a[0] - b[0], a[1] - b[1]) || 1;
    if (seg > 1200) { i++; continue; }                                // costura del wrap (portal): saltar sin consumir distancia
    if (rem <= seg) {
      const f = rem / seg;
      return [a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f, Math.atan2(a[1] - b[1], a[0] - b[0])];
    }
    rem -= seg; i++;
  }
  const a = tp[0], b = tp[n - 1];
  return [a[0], a[1], Math.atan2(a[1] - b[1], a[0] - b[0])];
}

const GRID_COLS = 3;                                                  // tanques por fila (3 entra en los pasillos angostos de las originales)
function startposFor(track, id) {
  const tp = TRACKPOINT_MAPS[track];                                  // ya en coords de mundo (originales escaladas + generadas)
  const col = id % GRID_COLS, row = Math.floor(id / GRID_COLS);
  // Parrilla ESCALONADA siguiendo el centro de la pista: cada columna arranca un poco más atrás (diagonal) y
  // las filas bien separadas → queda aire entre tanques. Como las originales tienen pasillos angostos, si una
  // posición cae en pared la ACERCAMOS al centro (el centerline siempre está libre) hasta que entre.
  const [cx, cy, ang] = pointBackAlong(tp, 85 + row * 98 + col * 30);
  const px = -Math.sin(ang), py = Math.cos(ang);                      // perpendicular al sentido de carrera
  let side = (col - (GRID_COLS - 1) / 2) * 52;                        // separación lateral dentro de la fila
  let x = cx + px * side, y = cy + py * side, guard = 0;
  while (Math.abs(side) > 1 && pointInWall(x, y) && guard++ < 14) {   // nudge hacia el centro si pisa pared
    side *= 0.6; x = cx + px * side; y = cy + py * side;
  }
  return [x, y, ang];
}

function assignRaceSkins(nTanks) {
  const pool = SKINS.map((_, i) => i).filter(i => i !== playerSkinIdx);
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  raceSkins = [SKINS[playerSkinIdx]];
  for (let i = 1; i < nTanks; i++) raceSkins.push(SKINS[pool[(i - 1) % pool.length]]);
}

const NITRO_PICK  = 0.25;                    // carga que da cada ítem (1/4 del tanque)
const NITRO_MAX   = 1;
// — Manejo por BIOMA: índice = themeOf(track). Columnas = [latGrip, spd, turn]. —
// latGrip = AGARRE LATERAL (fracción de la velocidad de costado que se MATA por frame): ALTO = agarra (NO derrapa), BAJO = DERRAPA.
// spd = multiplicador de TANK_SPEED (velocidad máx); turn = multiplicador de TANK_TURN. El PICKUP adelante es TANK_ACCEL (igual para todos).
const THEME_HANDLING = [
  // latGrip, spd,  turn
  [0.09,  1.00,  1.00],   // 0 pasto/parque — neutro, derrape leve
  [0.40,  1.00,  0.96],   // 1 desierto/arena — AGARRA fuerte (casi no derrapa), ya NO es lento
  [0.01,  1.05,  1.08],   // 2 nieve — DERRAPA MUCHO: la nariz gira pero el cuerpo sigue de largo
  [0.20,  1.10,  1.15],   // 3 tecno/azul — slot-car: agarrado, rápido y preciso
  [0.06,  1.15,  1.20],   // 4 lava/rojo — suelto y nervioso, el más rápido
  [0.15,  1.40,  1.00],   // 5 parque de noche — IDÉNTICO al pasto (se maneja igual que el parque verde)
];
const TANK_MAX_VEL = TANK_SPEED * 4;         // techo duro anti-tunneling (px/frame): muy por encima de lava+nitro (~24) y debajo del grosor de pared (~90) → sólo frena casos patológicos, NO toca el nitro normal
// — Colisión de BORDE EXACTO (polígono dinámico): rects finos ROTADOS que calcan la curva dibujada del corredor —
const WALL_CHAIN  = true;                    // true = colisión de BORDE EXACTO (cadena de rects rotados que calcan la curva), también en portal. false = scanline (revert instantáneo).
const CHAIN_THICK = 40;                       // grosor de pared de la cadena (anti-tunneling: 30 + radio tanque ~20 > paso máx ~26)
const CHAIN_DEV   = 2;                         // fidelidad: la colisión queda a ≤ este nº de px de la curva dibujada. BAJO = curvas finas (más cuerpos, sólo donde hay curvatura) / ALTO = curvas que cortan (menos cuerpos). Las rectas se fusionan igual.
const CHAIN_SEGMAX = 170;                      // tope de LARGO de cada rect de la cadena (mundo). Matter 0.19 usa Detector = sweep-and-prune en X: un rect LARGO (recta/diagonal) tiene un AABB enorme que el sweep no puede saltear → degenera a O(n²) y mata los FPS. Cortar las rectas largas mantiene cada AABB chico (el sweep saltea bien) sin perder el borde exacto. BAJO = más cuerpos chicos / ALTO = menos cuerpos pero AABB grande (caro).
const CHAIN_JOIN  = 0.5;                       // cuánto se EXTIENDE cada rect más allá de su tramo (en unidades de thick) para solapar al vecino y no dejar huecos. En curvas MUY cerradas los tramos son cortos y este sobrante hacía que las paredes SOBRESALIERAN del borde dibujado (abanico). 0.5 = la mitad → menos protrusión; los tramos cortos igual se solapan. Más bajo = menos sobresale pero arriesga huecos en esquinas.
const PICKUP_COUNT = 6;                      // ítems de nitro presentes en la pista a la vez
const PICKUP_FADE  = 0.35;                   // duración (s) de la animación de aparecer/desaparecer
const PICKUP_FLASH = 0.55;                   // duración (s) del destello celeste sobre el tanque al agarrar nitro
const clampN = (v, a, b) => Math.max(a, Math.min(b, v));

function clearPhysics() { Composite.clear(world, false); }   // saca todos los cuerpos (al rearmar/salir de carrera)

// ════════════════ TANK ════════════════
class Tank {
  constructor(i, track, racelength, difficulty) {
    this.id = i;
    this.radius = xper(0.016);                                        // más grande
    this.vel = 0; this.ang_vel = 0; this.psteer = 0; this.spin_timer = 0; this.spin_dir = 1; this.pickup_flash = 0;
    this.shoot_cooling = 0;
    this.nitro = this.id === 0 ? NITRO_MAX * 0.5 : 0;                 // el jugador arranca con MEDIO boost; la IA en 0 (se junta con ítems de la pista)
    const _D = AI_DIFF[difficulty] || AI_DIFF[2];                     // perfil de IA de esta carrera (clamp defensivo a Normal)
    this.nitro_thresh = _D.nitro >= 1 ? 2 : clampN(_D.nitro + rnd(-0.12, 0.12), 0.2, 0.95);  // umbral de nitro con variación de "personalidad"; ≥1 ⇒ no usa nitro
    this.ai_turnmul = _D.turn;                                        // pericia en curva (mult sobre AI_TURN_K): bajo = corrige flojo, abre las curvas
    this.nitro_engaged = false;                                        // IA: ¿está soltando el nitro ahora? (histéresis)
    this.boosting = false;                                             // ¿bosteando este frame? (para el jet azul de nitro)
    this.lap_progress = 0; this.pre_lap_progress = 0;
    this.lap_checkpoint = 0; this.laps = 0;
    this.track = track; this.rank = 0; this.racetime = 0;
    this.racelength = racelength === 0 ? 3 : racelength === 1 ? 5 : 10;   // Corto = 3, Normal = 5, Largo = 10
    this.start = false; this.pause = false; this.finished = false;
    this.finishPos = 0;                                               // posición de llegada (se congela al cruzar la meta)
    this.wrongway = false;
    this.wrongwayalert_timer = 1; this.wrongwayalert_cooling = 0; this.wrongwayalert_showing = 0;
    this.ai = this.id !== 0;                                          // sólo el tanque 0 es el jugador
    this.ai_difficulty = difficulty;
    this.ai_timer = 1; this.ai_cooling = 1; this.ai_acel = 0; this.ai_turn = 0; this.ai_shoot = 0;
    this.ai_lat = 0; this.ai_lat_target = 0; this.stuck_timer = 0;     // desvío lateral (línea de carrera) + detección de trabado
    this.tp_idx = -1;                                                  // último waypoint más cercano (búsqueda incremental)
    this.showhitbox = false;

    [this.start_x, this.start_y, this.start_ang] = startposFor(this.track, this.id);
    this.x = this.start_x; this.y = this.start_y; this.ang = this.start_ang;
    this.skin = raceSkins[this.id] || SKINS[this.id % SKINS.length];   // skin (color + librea) asignada para esta carrera
    this.color = this.skin.color;

    if (!this.ai) [this.forward, this.reverse, this.left, this.right, this.shoot] = TANK_CONTROLS;

    // Cuerpo físico: rectángulo redondeado (mejor ramming que un círculo, sin engancharse en esquinas).
    const r = this.radius;
    this.body = Bodies.rectangle(this.x, this.y, r * 2.5, r * 1.45, {  // alargado: largo (adelante) > ancho (lateral)
      angle: this.ang, frictionAir: TANK_AIRDRAG, friction: 0.02, restitution: 0.3,
      chamfer: { radius: r * 0.35 }, label: 'tank',
    });
    Composite.add(world, this.body);

    tanks.push(this);
  }

  process() {
    if (!(this.start && !this.pause)) return;

    this.pre_lap_progress = this.lap_progress;
    this.shoot_cooling = Math.max(this.shoot_cooling - deltaT, 0);

    if (!this.finished) this.racetime += deltaT;                     // el rank lo calcula updateRanks() (con histéresis)

    let steer = 0, throttle = 0;                                       // ∈ [-1, 1]

    if (!this.ai) {
      // Dirección y acelerador: el teclado da ±1 (full); el joystick (sólo jugador 1) suma su valor
      // PROPORCIONAL (cercanía al centro → intensidad). Ambos terminan en [-1, 1].
      steer    = (keys[this.right]   ? 1 : 0) - (keys[this.left]    ? 1 : 0);
      throttle = (keys[this.forward] ? 1 : 0) - (keys[this.reverse] ? 1 : 0);
      if (this.id === 0 && moveStick.active) {                        // palanca única (mobile): rumbo + acelerador
        let diff = moveStick.ang - this.ang;                          // error de rumbo hacia donde apuntás
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        steer    = diff * MOVE_STEER_K;                               // girá hacia el rumbo apuntado
        throttle = moveStick.mag;                                     // acelerá según cuánto empujás
      }
      steer    = clampN(steer, -1, 1);
      throttle = clampN(throttle, -1, 1);
      // Disparo MANUAL hacia adelante (botón de disparo / barra espaciadora). El botón sólo controla al jugador 1.
      const wantFire = keys[this.shoot] || (this.id === 0 && btnState.fire);
      if (wantFire && this.shoot_cooling === 0) {
        addSprite(new Bomb(this.color, this.radius, this.x, this.y, this.ang, this.vel));
        this.shoot_cooling = 2;
      }
    } else {
      this.ai_cooling += deltaT;
      if (this.ai_cooling > this.ai_timer) {
        const D = AI_DIFF[this.ai_difficulty] || AI_DIFF[2];
        this.ai_acel  = rnd(D.acel[0], D.acel[1]);                    // banda de acelerador en recta (escala la velocidad punta)
        this.ai_shoot = ri(0, D.shoot);                              // 0 ⇒ dispara este ciclo; prob. = 1/(shoot+1)
        this.ai_lat_target = rnd(-1, 1);                              // nueva "línea": a veces abre, a veces se cierra
        this.ai_cooling = 0;
      }
    }

    let closest_point = null, closest_d2 = xper(0.3) * xper(0.3);     // compara distancia AL CUADRADO (evita Math.hypot en hot loop)

    if (trackpoints.length) {
      // Búsqueda INCREMENTAL: el waypoint más cercano casi siempre está a ±7 del último conocido →
      // 15 chequeos en vez de recorrer los ~250 de la pista, por tanque y por frame (clave con 16 tanques).
      const nTP = trackpoints.length;
      if (this.tp_idx >= 0 && this.tp_idx < nTP) {
        for (let k = -7; k <= 7; k++) {
          const p = trackpoints[((this.tp_idx + k) % nTP + nTP) % nTP];
          const ddx = p.x - this.x, ddy = p.y - this.y, d2 = ddx * ddx + ddy * ddy;
          if (d2 < closest_d2) { closest_d2 = d2; closest_point = p; }
        }
      }
      if (!closest_point) {                                            // spawn / trompo / empujón largo: escaneo completo
        for (const p of trackpoints) {
          const ddx = p.x - this.x, ddy = p.y - this.y, d2 = ddx * ddx + ddy * ddy;
          if (d2 < closest_d2) { closest_d2 = d2; closest_point = p; }
        }
      }

      if (closest_point) {
        this.tp_idx = closest_point.id;
        if (dbgView) closest_point.color = modifyColorPerc(this.color, 1.5);   // tinte del waypoint de debug (sólo con el overlay activo)
        this.lap_progress = closest_point.id * 100 / trackpoints.length;

        if (this.ai) {
          const n = trackpoints.length;
          const target_point = trackpoints[(closest_point.id + AI_LOOKAHEAD) % n];
          if (dbgView) target_point.color = [0, 150, 0];               // waypoint objetivo de la IA en verde (debug)

          // Línea de carrera variable: apunta a un punto DESVIADO del centro (perpendicular al tramo), suavizado.
          this.ai_lat += (this.ai_lat_target - this.ai_lat) * Math.min(1, deltaT * 1.5);
          const np = trackpoints[(target_point.id + 1) % n];
          const tdx = np.x - target_point.x, tdy = np.y - target_point.y, tl = Math.hypot(tdx, tdy) || 1;
          let aimx = target_point.x - (tdy / tl) * this.ai_lat * AI_LANE;
          let aimy = target_point.y + (tdx / tl) * this.ai_lat * AI_LANE;

          // ¿Trabada? (acelera pero casi no se mueve). Vuelve al CENTRO del waypoint actual; si insiste, marcha atrás.
          const speed = Math.hypot(this.body.velocity.x, this.body.velocity.y);
          if (!this.finished && speed < AI_STUCK_SPD) this.stuck_timer += deltaT;
          else this.stuck_timer = Math.max(0, this.stuck_timer - deltaT * 2.5);
          let reversing = false;
          if (this.stuck_timer > AI_STUCK_T) {                         // destrabar: apuntar al centro del waypoint donde está
            aimx = closest_point.x; aimy = closest_point.y;
            if (this.stuck_timer > AI_REVERSE_T) reversing = true;     // muy trabada: retroceder girando
            if (this.stuck_timer > AI_REVERSE_T + 0.7) this.stuck_timer = 0;
          }

          // Pistas con PORTAL (wrap): si el objetivo quedó del otro lado de la costura, apuntarlo
          // "desenrollado" (±tamaño del mundo, en X y/o Y) para que siga derecho hacia el borde y cruce.
          if (TRACK_WRAP[this.track]) {
            const ww2 = worldW(this.track), hh2 = worldH(this.track);
            if (aimx - this.x >  ww2 / 2) aimx -= ww2;
            else if (aimx - this.x < -ww2 / 2) aimx += ww2;
            if (aimy - this.y >  hh2 / 2) aimy -= hh2;
            else if (aimy - this.y < -hh2 / 2) aimy += hh2;
          }

          let point_ang = Math.atan2(aimy - this.y, aimx - this.x);     // = getangle2(this.ang,[x,y],[aim]) inline (sin allocs de arrays por tanque/frame)
          if (point_ang - this.ang < -Math.PI) point_ang += Math.PI * 2;
          if (point_ang - this.ang >  Math.PI) point_ang -= Math.PI * 2;
          let diff = point_ang - this.ang;
          while (diff >  Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          steer    = clampN(diff * AI_TURN_K * this.ai_turnmul, -1, 1); // gira proporcional al error de rumbo (× pericia de la dificultad)
          if (reversing) { throttle = -0.6; steer = -steer; }          // retrocede girando al revés para zafar de la pared
          else throttle = (Math.abs(diff) < Math.PI / 8 ? 1 : 0.55) * this.ai_acel * (this.finished ? 0.6 : 1);
          if (this.ai_shoot === 0 && this.shoot_cooling === 0 && !this.finished) {
            addSprite(new Bomb(this.color, this.radius, this.x, this.y, this.ang, this.vel));
            this.shoot_cooling = 2;
          }
        }
      }
    }

    // ── Aplicar al cuerpo Matter ──
    const b = this.body;
    this.boosting = false;                                             // se prende abajo sólo si bostea (apagado durante el trompo)
    if (this.spin_timer > 0) {
      // TROMPO por impacto de bomba: gira sin control y frena, ignorando el input por un rato.
      this.spin_timer -= deltaT;
      Body.setAngularVelocity(b, this.spin_dir * SPIN_RATE);
      _vScratch.x = b.velocity.x * 0.9; _vScratch.y = b.velocity.y * 0.9; Body.setVelocity(b, _vScratch);
      if (this.spin_timer <= 0 && closest_point) {                    // al terminar: encarar la DIRECCIÓN DE CARRERA (no quedar mirando para cualquier lado)
        const nTP = trackpoints.length, aim = trackpoints[(closest_point.id + 4) % nTP];
        let ax = aim.x - this.x, ay = aim.y - this.y;
        if (TRACK_WRAP[this.track]) {                                  // desenrollar a través de la costura del portal
          const ww2 = worldW(this.track), hh2 = worldH(this.track);
          if (ax >  ww2/2) ax -= ww2; else if (ax < -ww2/2) ax += ww2;
          if (ay >  hh2/2) ay -= hh2; else if (ay < -hh2/2) ay += hh2;
        }
        Body.setAngle(b, Math.atan2(ay, ax));
        Body.setAngularVelocity(b, 0);
      }
    } else {
      const H = THEME_HANDLING[themeOf(this.track)];                  // manejo del bioma [grip, spd, turn]; fijo por carrera, lookup barato
      // Dirección: velocidad angular directa cuando hay input (feel responsivo, sin inercia); si no, amortiguar.
      if (Math.abs(steer) > 0.001) Body.setAngularVelocity(b, steer * TANK_TURN * H[2]);  // turn del bioma (afecta jugador e IA: cornering coherente por pista)
      else                          Body.setAngularVelocity(b, b.angularVelocity * 0.85);
      // NITRO: boost de velocidad hacia adelante mientras se usa y haya carga.
      // La IA NO lo usa apenas lo junta: acumula hasta su umbral y recién lo suelta en RECTA (poco giro);
      // lo corta al entrar en curva y lo retoma en la próxima recta si le queda carga.
      let wantBoost;
      if (this.ai) {
        const straight = Math.abs(steer) < 0.28;
        if (!this.nitro_engaged && this.nitro >= this.nitro_thresh && straight) this.nitro_engaged = true;
        if (this.nitro <= 0.02 || !straight) this.nitro_engaged = false;
        wantBoost = this.nitro_engaged;
      } else {
        wantBoost = (this.id === 0 && btnState.nitro) || keys.SHIFT;
      }
      let boostMult = 1;
      if (wantBoost && this.nitro > 0 && throttle > 0) { boostMult = NITRO_MULT; this.nitro = Math.max(0, this.nitro - NITRO_DRAIN * deltaT); }
      this.boosting = boostMult > 1;                                    // prende el jet azul de nitro (efecto visual)
      // Motor: velocidad objetivo a lo largo del heading; suavizado hacia ella.
      const target = (throttle > 0 ? TANK_SPEED * H[1] * throttle : throttle < 0 ? -TANK_REVERSE * (-throttle) : 0) * boostMult;  // spd del bioma (sólo adelante; reversa intacta para destrabar)
      const fx = Math.cos(b.angle), fy = Math.sin(b.angle);
      // Motor con DERRAPE DESACOPLADO: la componente ADELANTE (sobre el heading) se acerca al target a TANK_ACCEL
      // (rápido = todos ágiles); la LATERAL (perpendicular) sólo decae por latGrip (H[0]) → bajo = sigue deslizando = DERRAPE.
      const vfwd = b.velocity.x * fx + b.velocity.y * fy;                                // proyección de la velocidad sobre el heading
      const vlatx = b.velocity.x - vfwd * fx, vlaty = b.velocity.y - vfwd * fy;          // resto = velocidad lateral
      const nf = vfwd + (target - vfwd) * TANK_ACCEL, latSurv = 1 - H[0];                // adelante → target; la lateral sobrevive (1 − latGrip)
      _vScratch.x = fx * nf + vlatx * latSurv;
      _vScratch.y = fy * nf + vlaty * latSurv;
      const sp2 = _vScratch.x * _vScratch.x + _vScratch.y * _vScratch.y;                 // techo de velocidad (anti-tunneling); en juego normal NO se activa
      if (sp2 > TANK_MAX_VEL * TANK_MAX_VEL) { const k = TANK_MAX_VEL / Math.sqrt(sp2); _vScratch.x *= k; _vScratch.y *= k; }
      Body.setVelocity(b, _vScratch);                                                    // una sola escritura (clampeado si hizo falta)
    }

    if (this.lap_progress > 0 && this.lap_progress < 5) this.lap_checkpoint = 1;
    if (this.lap_progress > 95 && this.lap_progress < 100 && this.lap_checkpoint === 1) this.lap_checkpoint = 2;
    if (this.lap_progress === 0) {
      if (this.lap_checkpoint === 2 && !this.finished) this.laps += 1;
      this.lap_checkpoint = 0;
    }

    if (closest_point !== null && closest_point.id !== 0) {
      if (this.lap_progress < this.pre_lap_progress) this.wrongway = true;
      if (this.lap_progress > this.pre_lap_progress) this.wrongway = false;
    }

    if (this.laps === this.racelength && !this.finished) { this.finished = true; this.ai = true; this.finishPos = ++raceFinishCount; }
  }

  draw() {
    const r = this.radius, fin = this.finished;
    if (this.pickup_flash > 0) this.pickup_flash = Math.max(0, this.pickup_flash - deltaT);

    // Culling: si el tanque está fuera de la cámara no se dibuja (clave para 16 tanques en mobile).
    // La cámara mapea world→pantalla como (x - camX): un punto se ve si (x - camX) ∈ [0, SCREEN_X].
    const sxp = this.x - camX, syp = this.y - camY, m = r * 3;
    if ((sxp < -m || sxp > SCREEN_X + m || syp < -m || syp > SCREEN_Y + m) && this.id !== 0) return;

    // Destello de nitro: halo celeste DETRÁS del tanque (se desvanece).
    if (this.pickup_flash > 0) {
      const f = this.pickup_flash / PICKUP_FLASH;                     // 1 → 0
      ctx.save();
      ctx.globalAlpha = 0.45 * f; drawCircle(this.x, this.y, r*1.7, [120, 230, 255]);
      ctx.globalAlpha = 0.25 * f; drawCircle(this.x, this.y, r*2.4, [120, 230, 255]);
      ctx.restore();
    }

    // NITRO en uso: jet azul DETRÁS del tanque (barato: sólo formas inmediatas, sin partículas ni allocs; sólo mientras bostea).
    if (this.boosting) {
      const fl = 0.78 + 0.22 * Math.sin(T * 32 + this.id * 1.7);       // parpadeo (desfasado por tanque)
      const back = -r * 1.2;                                           // cola del tanque (eje local -x)
      ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.ang);
      ctx.globalAlpha = 0.28 * fl; drawCircle(back - r*0.7, 0, r*1.5, [70, 150, 255]);    // glow exterior azul
      ctx.globalAlpha = 0.55 * fl; drawCircle(back - r*0.3, 0, r*0.95, [150, 225, 255]);  // glow interior celeste
      ctx.globalAlpha = 0.9; ctx.fillStyle = 'rgba(70,150,255,0.9)';                      // llama externa (azul)
      ctx.beginPath(); ctx.moveTo(back, -r*0.55); ctx.lineTo(back - r*2.1*fl, 0); ctx.lineTo(back, r*0.55); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(185,242,255,0.95)';                                            // núcleo (celeste claro)
      ctx.beginPath(); ctx.moveTo(back, -r*0.28); ctx.lineTo(back - r*1.2*fl, 0); ctx.lineTo(back, r*0.28); ctx.closePath(); ctx.fill();
      ctx.globalAlpha = 1; ctx.restore();
    }

    // Cuerpo via sprite cacheado (rápido): solo translate+rotate+drawImage.
    const spr = tankSpriteFor(this.skin, r, fin);
    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.ang);
    ctx.drawImage(spr.cv, -spr.half, -spr.half, spr.half * 2, spr.half * 2);
    ctx.restore();

    // Destello de nitro: onda expansiva celeste ENCIMA (crece y se desvanece).
    if (this.pickup_flash > 0) {
      const f = this.pickup_flash / PICKUP_FLASH;
      ctx.save();
      ctx.globalAlpha = 0.8 * f; ctx.strokeStyle = 'rgba(160,238,255,1)'; ctx.lineWidth = Math.max(1.5, r*0.16);
      ctx.beginPath(); ctx.arc(this.x, this.y, r*(1.1 + 1.7*(1-f)), 0, TAU); ctx.stroke();
      ctx.restore();
    }

    if (this.showhitbox || dbgView) {                                  // caja de colisión: el cuerpo físico real (Matter), rotado
      ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.ang);
      ctx.strokeStyle = 'rgba(0,235,255,0.95)'; ctx.lineWidth = 1.5;
      ctx.strokeRect(-r*1.25, -r*0.725, r*2.5, r*1.45);
      ctx.restore();
    }

    // El puntero del jugador y el texto de posición final se dibujan en un PASO APARTE (drawTankOverlays),
    // después de TODOS los tanques, para que no los tape ningún sprite (z-order).
    const rankFont = SCREEN_X < 1000 ? RS_font : S_font;
    if (this.id === 0 && this.racetime > 1) {
      // tarjeta de posición SOLO del jugador: fija arriba-izquierda (translate(cam) la despega del scroll).
      ctx.save(); ctx.translate(camX, camY);
      drawPosCard(this.rank, tanks.length, this.color, this.laps, this.racelength, this.skin);
      ctx.restore();
    }

    if (this.wrongway) {
      if (!this.pause) this.wrongwayalert_cooling += deltaT;

// ════════════════ BOMB ════════════════
class Bomb {
  constructor(tankColor, tankRadius, tankX, tankY, tankAng, tankVel) {
    this.color = tankColor; this.radius = tankRadius * 0.3;
    this.x = tankX; this.y = tankY; this.ang = tankAng;
    this.vel = Math.max(tankVel * 2.2, 1300);                         // un poco más rápido que antes
    this.pause = false;
    bombs.push(this);
  }
  process() {
    if (this.pause) return;

    this.y += Math.sin(this.ang) * this.vel * deltaT;

      if (tank.color === this.color || tank.finished) continue;
      const lim = (this.radius + tank.radius) * 0.75;                  // mismo AABB que antes, sin alocar arrays
      if (Math.abs(this.x - tank.x) < lim && Math.abs(this.y - tank.y) < lim) {

        tank.spin_timer = SPIN_TIME; tank.spin_dir = (ri(0,1) === 0 ? -1 : 1);
        _vScratch.x = tank.body.velocity.x * 0.15; _vScratch.y = tank.body.velocity.y * 0.15; Body.setVelocity(tank.body, _vScratch);
        removeFromList(bombs, this); removeFromList(sprites, this);
        return;

    const tr = sprites[0] ? sprites[0].track : 0, WW = worldW(tr), HH = worldH(tr);
    // La bomba se ELIMINA al salir del mundo — también en pistas con PORTAL (ya NO se envuelve). Antes la
    // envolvíamos y podía quedar cruzando el portal en loop infinito (lo que parecía "la IA sigue disparando").
    if (this.x > WW + this.radius || this.x < -this.radius || this.y > HH + this.radius || this.y < -this.radius) {
      removeFromList(bombs, this); removeFromList(sprites, this);
    }

    const tx = Math.cos(this.ang), ty = Math.sin(this.ang), r = this.radius;
    ctx.save();
    // estela
    for (let t = 4; t >= 1; t--) {
      ctx.globalAlpha = 0.14 * (1 - t/5);
      drawCircle(this.x - tx*r*t*1.5, this.y - ty*r*t*1.5, r*(1.1 - t*0.12), modifyColorPerc(this.color, 1.4));
    }

    drawCircle(this.x, this.y, r*2.4, modifyColorPerc(this.color, 1.6));
    ctx.globalAlpha = 1;
    drawCircle(this.x, this.y, r, modifyColorPerc(this.color, 1.6));
    drawCircle(this.x, this.y, r*0.5, [255, 255, 230]);                // núcleo brillante

}

// ════════════════ ÍTEM DE NITRO ════════════════

// ════════════════ WALL ════════════════
class Wall {
  constructor(i, track, color) {
    this.id = i; this.track = track; this.color = color;
    const e = WALL_MAPS[this.track][this.id];
    // Cuerpo estático: la colisión contra tanques la resuelve Matter (deslizan, no se traban).
    if (e.length === 5) {                                              // [cx,cy,w,h,ang] = pared ROTADA (cadena de borde exacto)
      const [cx, cy, w, h, ang] = e;
      this.x = cx - w / 2; this.y = cy - h / 2; this.width = w; this.height = h; this.angle = ang;
      this.body = Bodies.rectangle(cx, cy, w, h, { isStatic: true, friction: 0.02, label: 'wall', angle: ang });
    } else {                                                           // [x,y,w,h] = AABB (scanline, legacy + bordes del mundo)
      [this.x, this.y, this.width, this.height] = e;
      this.body = Bodies.rectangle(this.x + this.width / 2, this.y + this.height / 2, this.width, this.height,
        { isStatic: true, friction: 0.02, label: 'wall' });
    }
    Composite.add(world, this.body);
    walls.push(this);
  }
  process() {}                                                          // la física la maneja Matter
  draw() {
    if (this.angle !== undefined) return;                              // paredes rotadas (cadena) NUNCA se dibujan: la pista se dibuja con el carve suave
    if (bgReady) return;                                               // ya está en el fondo horneado
    const col = THEME_WALL[this.color];
    const x = this.x, y = this.y, w = this.width, h = this.height;
    // Relleno con gradiente vertical → cada bloque lee como pared extruida (no plano).
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, rgb(modifyColorPerc(col, 1.20)));
    g.addColorStop(0.5, rgb(col));
    g.addColorStop(1, rgb(modifyColorPerc(col, 0.76)));
    ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
    decorateWall(this);                                                // motivos temáticos (árboles/cactus/cubos/lava/…)
    // Bevel "tile" en relieve: lip claro arriba/izquierda, sombra abajo/derecha, contorno oscuro fino.
    const lw = Math.max(1.5, Math.min(w, h) * 0.05);
    drawLine([x, y + lw/2],         [x + w, y + lw/2],         modifyColorPerc(col, 1.55), lw);   // lip superior
    drawLine([x + lw/2, y],         [x + lw/2, y + h],         modifyColorPerc(col, 1.35), lw);   // lip izquierdo
    drawLine([x + w - lw/2, y],     [x + w - lw/2, y + h],     modifyColorPerc(col, 0.55), lw);   // sombra derecha
    drawLine([x, y + h - lw/2],     [x + w, y + h - lw/2],     modifyColorPerc(col, 0.5),  lw);   // sombra inferior
    strokeRect(x + 0.5, y + 0.5, w - 1, h - 1, modifyColorPerc(col, 0.38), 1);                    // contorno
  }
}

// ════════════════ TRACKPOINT ════════════════
class TrackPoint {
  constructor(i, track) {
    this.id = i; this.track = track;
    this.color = [50, 50, 50]; this.show = false;
    [this.x, this.y] = TRACKPOINT_MAPS[this.track][this.id];
    trackpoints.push(this);
  }
  process() {}
  debugDraw() {                                                        // F2: circulito de debug (sólo cuando show)
    drawCircle(this.x, this.y, xper(0.005), this.color);
    this.color = [50, 50, 50];
  }
  draw() {                                                             // sólo se llama al HORNEAR el fondo (meta/damero)
    if (bgReady || this.id !== 0) return;
    // Bandera de meta/salida: damero PERPENDICULAR al sentido de carrera → si la largada cae en una curva, la
    // raya se dibuja en diagonal (antes era siempre vertical/horizontal y quedaba torcida respecto a la pista).
    const fl = FINISHLINES[this.track], m = TRACKPOINT_MAPS[this.track], n = m.length;
    let tx = 0, ty = 0;                                                // tangente promediada alrededor de la largada
    for (let k = 1; k <= 3; k++) {
      const f = m[k % n], b = m[(n - k) % n], dx = f[0]-b[0], dy = f[1]-b[1];
      if (Math.hypot(dx, dy) < 1200) { tx += dx; ty += dy; }            // saltea la costura del portal
    }
    if (tx === 0 && ty === 0) tx = 1;
    const ang = Math.atan2(ty, tx), W = [255, 255, 255];
    const asym = FINISH_ASYM[this.track];                             // autogeneradas: alcance medido a CADA pared (cubre toda la calle en curva/ancho variable)
    const halfP = asym ? asym[0] : fl[0], halfM = asym ? asym[1] : fl[0], halfW = fl[1];   // +perp / −perp / medio-espesor
    const total = halfP + halfM, rows = Math.max(2, Math.round(total / halfW)), cell = total / rows;
    ctx.save();
    ctx.translate(this.x, this.y); ctx.rotate(ang);                   // marco local: +x = avance, +y = a lo ancho de la pista (=+perp)
    ctx.fillStyle = rgb(W);
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < 2; c++)
        if ((r + c) % 2 === 0) ctx.fillRect(-halfW + c*halfW, -halfM + r*cell, halfW, cell);
    ctx.strokeStyle = rgb(W); ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-halfW, -halfM); ctx.lineTo(-halfW, halfP);
    ctx.moveTo( halfW, -halfM); ctx.lineTo( halfW, halfP);
    ctx.stroke();
    ctx.restore();
  }
}

// ════════════════ MAIN HANDLER (menús + estado) ════════════════

for (let t = 0; t < 10; t++) {
  WORLDS[t] = [SCREEN_X * MAP_SCALE, SCREEN_Y * MAP_SCALE];

  TRACKPOINT_MAPS[t] = TRACKPOINT_MAPS[t].map(p => [p[0] * MAP_SCALE, p[1] * MAP_SCALE]);
  FINISHLINES[t] = FINISHLINES[t].map(v => v * MAP_SCALE);

      // así el hover dispara EXACTAMENTE los mismos efectos que la selección (color, glow y los < >).
      const sel = on => on ? menucolor : dim;
      const gl  = on => on ? 14 : 5;
      if (this.menulevel === 0) {
        createText(B_font, 'CrazyTanks', menucolor, null, xper(0.5), yper(0.22), 28);
        createText(M_font, 'New Race',   sel(this.option === 0), null, xper(0.5), yper(0.5), gl(this.option === 0));
        createText(M_font, 'Tournament', sel(this.option === 1), null, xper(0.5), yper(0.6), gl(this.option === 1));
      }
      if (this.menulevel === 1) {
        const diffNames = ['Very Easy','Easy','Normal','Hard','Very Hard'];
        const biomeNames = ['Random','Park','Desert','Snow','Techno','Lava','Night Rain'];   // 0=Aleatorio, 1..6 = temas 0..5
        const lapsName = this.laps === 0 ? 'Short (3 laps)' : this.laps === 1 ? 'Normal (5 laps)' : 'Long (10 laps)';
        const wrap = (on, s) => on ? `< ${s} >` : s;
        const labelFor = opt => opt === 1 ? lapsName
                              : opt === 2 ? `Difficulty: ${diffNames[this.difficulty]}`
                              : opt === 3 ? `Biome: ${biomeNames[this.biome]}`
                              : `Tank: ${SKINS[playerSkinIdx].name}`;
        createText(B_font, this.tournament ? 'Tournament' : 'New Race', menucolor, null, xper(0.5), yper(0.2), 28);
        for (const { opt, y } of this.menuRowDefs()) {
          const on = this.option === opt;
          createText(M_font, wrap(on, labelFor(opt)), sel(on), null, xper(0.5), yper(y), gl(on));
          if (opt === 4) {                                              // tanque elegido dibujado JUSTO al lado del texto (mido el ancho del label centrado)
            const label = wrap(on, labelFor(opt));
            ctx.save(); ctx.font = `700 ${M_font}px ${FONT_FAMILY}`; ctx.letterSpacing = (M_font*0.04).toFixed(1) + 'px';
            const tw = ctx.measureText(label).width; ctx.restore();
            paintTank(xper(0.5) + tw/2 + xper(0.035), yper(y), 0, xper(0.02), SKINS[playerSkinIdx].color, 1, false, SKINS[playerSkinIdx]);
          }
        }
        // botón PLAY (tocá/click para arrancar) — pulsa, y se ilumina al hover
        const hj = rowHover(0.85), playPulse = 0.6 + 0.4*Math.sin(T*4);
        createText(M_font, '▶ PLAY', [120 + 120*playPulse, 230, 150], null, xper(0.5), yper(0.85), hj ? 30 : 16);
      }
      if (this.menulevel === 2) this.drawPicker(menucolor);
    }
    // en carrera el fondo (piso+deco+meta+paredes) se blitea horneado desde el loop — nada que hacer acá
  }
}

// ════════════════ AUXILIARY HANDLER (cuenta regresiva, pausa, scoring) ════════════════
class AuxiliaryHandler {
  constructor(laps, track, difficulty, tournament, tankpoints, tanktimes, raceIdx = 0) {
    this.laps = laps; this.track = track; this.difficulty = difficulty;
    this.racestart_timer = 5; this.racestart_cooling = 0;
    this.playerfinished = Array(TANK_COUNT).fill(false);
    this.racefinished = false; this.post_race_option = 0;
    this.p_pressed = false; this.enter_pressed = false; this.pause = false;
    this.tournament = tournament;
    this.raceIdx = raceIdx;                                            // qué carrera del torneo (0..TOURNEY_RACES-1)
    this.tank_points = tankpoints; this.tank_times = tanktimes;
    this.table_timer = 3; this.table_cooldown = 0;
    this.pointsaccounted = false; this.tournamentfinished = false;
    this.prevPoints = null; this.prevTimes = null; this.gained = null;   // snapshot ANTES de sumar (paso 1: "x + n" y la posición que venía)
  }
  // puntos por puesto: 1° = N, último = 1 (N = cantidad de tanques)
  pointsForRank(rank) { return Math.max(1, tanks.length - (rank - 1)); }

  process() {
    [this.nWalls, this.nTrackpoints] = MAP_COUNTS[this.track];

    if (!this.racefinished) {
      this.racestart_cooling += deltaT;
      if (this.racestart_cooling > this.racestart_timer - 1) {
        for (const tank of tanks) { tank.start = true; if (tank.finished) this.playerfinished[tank.id] = tank.finished; }
      }

      // La carrera termina cuando el JUGADOR (tanque 0) cruza su última vuelta, O cuando ya terminaron TODAS
      // las IA (aunque al jugador le falten vueltas).
      const aisDone = tanks.length > 1 && tanks.every(t => t.id === 0 || t.finished);
      if (this.playerfinished[0] || aisDone) {
        // a los que NO llegaron se les fija la posición por su rank actual (orden de carrera) → no se renombran después.
        for (const tank of tanks.slice().sort((a, b) => a.rank - b.rank))
          if (!tank.finished) { tank.finished = true; tank.ai = true; tank.finishPos = ++raceFinishCount; }
        this.racefinished = true;
      }

      if (this.racestart_cooling > this.racestart_timer) {
        let toggle = false;
        if (!this.p_pressed && keys.P) { toggle = true; this.p_pressed = true; }   // tecla P (desktop)
        if (!keys.P) this.p_pressed = false;
        if (uiPauseReq) { toggle = true; uiPauseReq = false; }                      // botón de pausa (UI, estilo Pong)
        if (toggle) {
          for (const tank of tanks) tank.pause = !tank.pause;
          for (const bomb of bombs) bomb.pause = !bomb.pause;
          this.pause = !this.pause;
        }
      } else uiPauseReq = false;                                                    // descartar pedido durante la cuenta regresiva

    } else {
      if (!this.tournament) {
        this.post_race_option = 0;                                      // único botón: Rematch (salir = X de la esquina)
        if (keys.RETURN) this._rebuildRace();
      } else {
        this.table_cooldown += deltaT;
        // tras el cartel "Gana X" se anotan los puntos UNA vez y se muestra la tabla de posiciones (16 tanques).
        if (this.table_cooldown > this.table_timer && !this.pointsaccounted) {
          this.prevPoints = this.tank_points.slice();                   // totales ANTES de esta carrera (paso 1: "x + n" y la posición que venía)
          this.prevTimes = this.tank_times.slice();
          this.gained = Array(TANK_COUNT).fill(0);
          for (const tank of tanks) {
            const g = this.pointsForRank(tank.rank);
            this.gained[tank.id] = g;
            this.tank_points[tank.id] += g;
            this.tank_times[tank.id] += tank.racetime + tank.racetime * 0.01 * (tank.rank - 1);
          }
          this.pointsaccounted = true; this.enter_pressed = true;
          if (this.raceIdx >= TOURNEY_RACES - 1) this.tournamentfinished = true;
        }
        if (this.pointsaccounted) {
          this.post_race_option = 0;
          const inStep2 = this.table_cooldown > this.table_timer + TABLE_STEP1;   // recién tras mostrar el PASO 1 se puede avanzar
          if (!this.enter_pressed && keys.RETURN && inStep2) {
            if (!this.tournamentfinished) this._tournamentNext();
            else if (this.table_cooldown > this.table_timer + TABLE_STEP1 + 1.2) this._backToMenu(true);   // Back to Menu con delay anti-tap
          }
          if (!keys.RETURN) this.enter_pressed = false;
        }
      }
    }
  }

  // Rematch (carrera simple): limpia todo salvo MainHandler+self, re-crea, se remueve.
  _rebuildRace() {                                                    // revancha de carrera LIBRE (el torneo usa _tournamentNext)
    const main = sprites[0];
    regenAutoTrack(main.biome === 0 ? undefined : main.biome - 1); this.track = AUTO_TRACK; [this.nWalls, this.nTrackpoints] = MAP_COUNTS[this.track];   // revancha = mapa nuevo (mismo bioma elegido)
    raceFinishCount = 0;
    for (const s of sprites.slice()) if (s !== main && s !== this) removeFromList(sprites, s);
    clearPhysics(); trackpoints.length = 0; walls.length = 0; tanks.length = 0; bombs.length = 0; pickups.length = 0;
    if (sprites.length === 2) {
      for (let i = 0; i < this.nTrackpoints; i++) new TrackPoint(i, this.track);
      for (let i = 0; i < this.nWalls; i++) new Wall(i, this.track, themeOf(this.track));
      assignRaceSkins(TANK_COUNT);                                     // re-randomiza la IA en cada revancha
      for (let i = 0; i < TANK_COUNT; i++) addSprite(new Tank(i, this.track, this.laps, this.difficulty));
      addSprite(new AuxiliaryHandler(this.laps, this.track, this.difficulty, this.tournament, this.tank_points, this.tank_times));
      removeFromList(sprites, this);
    }
  }

  _backToMenu(tournament) {
    const main = sprites[0];
    for (const s of sprites.slice()) if (s !== main && s !== this) removeFromList(sprites, s);
    clearPhysics(); trackpoints.length = 0; walls.length = 0; tanks.length = 0; bombs.length = 0; pickups.length = 0;
    if (sprites.length === 2) {
      main.menulevel = 0; main.option = 0; main.track = 0;            // laps/difficulty PERSISTEN (como el tanque) al volver al menú
      main.menu = true; main.keypressed = true;
      if (tournament) { main.tank_points = Array(TANK_COUNT).fill(0); main.tank_times = Array(TANK_COUNT).fill(0); main.tourneyRace = 0; }
      removeFromList(sprites, this);
    }
  }

  _tournamentNext() {                                                 // siguiente carrera del torneo: mapa autogenerado con la temática del orden
    const main = sprites[0];
    raceFinishCount = 0;
    const nextIdx = this.raceIdx + 1;
    main.tourneyRace = nextIdx;
    regenAutoTrack(TOURNEY_THEMES[nextIdx]); main.track = AUTO_TRACK;
    for (const s of sprites.slice()) if (s !== main && s !== this) removeFromList(sprites, s);
    clearPhysics();                                                   // sin esto las paredes/tanques viejos quedaban como colliders fantasma
    trackpoints.length = 0; walls.length = 0; tanks.length = 0; bombs.length = 0; pickups.length = 0;
    if (sprites.length === 2) {
      const [nW, nT] = MAP_COUNTS[main.track];
      for (let i = 0; i < nT; i++) new TrackPoint(i, main.track);
      for (let i = 0; i < nW; i++) new Wall(i, main.track, themeOf(main.track));
      raceSkins = main.tourneySkins;                                  // 16 colores FIJOS toda la copa
      for (let i = 0; i < TANK_COUNT; i++) addSprite(new Tank(i, main.track, this.laps, this.difficulty));
      addSprite(new AuxiliaryHandler(this.laps, main.track, this.difficulty, this.tournament, this.tank_points, this.tank_times, nextIdx));
      removeFromList(sprites, this);
    }
  }

  // hover del mouse → mueve la selección post-carrera a la opción debajo del cursor
  hoverFocus(ly) { this.post_race_option = 0; }                        // un solo botón → siempre seleccionado
  // toque/click sobre la pantalla de fin de carrera (coords lógicas)
  tap(lx, ly) {
    if (!this.racefinished) return;
    const near = (frac) => Math.abs(ly - yper(frac)) < yper(0.05);
    if (!this.tournament) {
      if (near(0.55)) this._rebuildRace();                             // ↻ Rematch
    } else if (this.pointsaccounted && this.table_cooldown > this.table_timer + TABLE_STEP1) {   // recién en el PASO 2 (totales contados) se puede avanzar
      if (this.tournamentfinished) { if (this.table_cooldown > this.table_timer + TABLE_STEP1 + 1.2 && near(0.86)) this._backToMenu(true); }   // Back to Menu con delay
      else if (near(0.84)) this._tournamentNext();                     // ▶ Next race
    }
  }

  draw() {
    ctx.save(); ctx.translate(camX, camY);                            // HUD fijo a pantalla (neutraliza el scroll de la cámara)
    const c = this.racestart_cooling;
    if (c > 1 && c < this.racestart_timer) {
      let txt = '', seg = 0;
      if (c < 1.7)              { txt = '3!';   seg = 1; }
      else if (c > 2 && c < 2.7) { txt = '2!';  seg = 2; }
      else if (c > 3 && c < 3.7) { txt = '1!';  seg = 3; }
      else if (c > 4 && c < 5)   { txt = 'GO!!'; seg = 4; }
      if (txt) {
        const into = c - seg, scale = 1 + 0.35 * Math.max(0, 1 - into/0.28), isGo = txt === 'GO!!';
        ctx.save();
        ctx.translate(xper(0.5), yper(0.5)); ctx.scale(scale, scale);
        createText(B_font, txt, isGo ? [120,255,140] : [255,255,255], null, 0, 0, isGo ? 44 : 30);
        ctx.restore();
      }
    }

    // el hover mueve la selección (hoverFocus), así la opción bajo el mouse muestra el estilo seleccionado
    const selGlow = on => on ? 12 : 0;

    if (this.racefinished) {
      if (!this.tournament) {
        for (const tank of tanks) if (tank.rank === 1)
          createText(B_font, `${tankName(tank)} Wins!`, modifyColor(tank.color,75), null, xper(0.5), yper(0.35), 30);
        createText(M_font, '↻ Rematch', [255,255,255], null, xper(0.5), yper(0.55), selGlow(true));   // (para salir: la X de la esquina)
      } else {
        if (this.table_cooldown < this.table_timer) {
          for (const tank of tanks) if (tank.rank === 1)
            createText(B_font, `¡${tankName(tank)} Wins!`, modifyColor(tank.color,75), null, xper(0.5), yper(0.5), 30);
        } else {
          // ── TABLA DE POSICIONES del torneo (16 tanques en 2 columnas de 8) — DOS PASOS:
          //    PASO 1 (~TABLE_STEP1 s): la posición que VENÍAS, cada uno con "x + n" (puntos previos + los de esta carrera).
          //    PASO 2: totales ya contados, reordenado (la tabla de siempre). ──
          const step1 = this.prevPoints && this.table_cooldown < this.table_timer + TABLE_STEP1;
          const pts = step1 ? this.prevPoints : this.tank_points;        // ordena por la tabla del paso correspondiente
          const tms = step1 ? (this.prevTimes || this.tank_times) : this.tank_times;

          ctx.save(); ctx.globalAlpha = 0.88;
          roundRectPath(xper(0.06), yper(0.05), xper(0.88), yper(0.9), 18); ctx.fillStyle = rgb([10,10,18]); ctx.fill();
          ctx.restore();
          roundRectPath(xper(0.06), yper(0.05), xper(0.88), yper(0.9), 18); ctx.strokeStyle = rgb([255,255,255]); ctx.lineWidth = 2.5; ctx.stroke();

          const order = tanks.slice().sort((a, b) => pts[b.id] - pts[a.id] || tms[a.id] - tms[b.id]);
          const champ = order[0];
          if (this.tournamentfinished && !step1)
            createText(M_font, `${tankName(champ)} — CHAMPION!`, modifyColor(champ.color, 85), null, xper(0.5), yper(0.115), 20);
          else
            createText(Math.round(M_font*0.78), `Race ${this.raceIdx + 1} / ${TOURNEY_RACES} · ${step1 ? 'Round points' : 'Standings'}`, [225,230,240], null, xper(0.5), yper(0.115), 4);

          const rf = Math.round(S_font * 0.92);
          for (let i = 0; i < order.length; i++) {
            const tank = order[i], left = i < 8, y = yper(0.20 + (i % 8) * 0.072), isPlayer = tank.id === 0;
            const xr = left ? xper(0.15) : xper(0.58), xi = left ? xper(0.23) : xper(0.66), xp = left ? xper(0.41) : xper(0.84);
            if (isPlayer) { ctx.save(); ctx.globalAlpha = 0.20; ctx.fillStyle = rgb(modifyColor(tank.color, 40)); roundRectPath(xr - xper(0.035), y - yper(0.03), xper(0.31), yper(0.06), 7); ctx.fill(); ctx.restore(); }
            createText(rf, `${i + 1}°`, isPlayer ? [255,255,255] : [205,210,225], null, xr, y, isPlayer ? 5 : 0);
            const spr = tankSpriteFor(tank.skin, tank.radius, false), sz = spr.half * 2 * 0.78;   // sprite CACHEADO (no paintTank ×16/frame → no baja FPS)
            ctx.drawImage(spr.cv, xi - sz/2, y - sz/2, sz, sz);
            const ptsText = step1 ? `${this.prevPoints[tank.id]} + ${this.gained[tank.id]}` : `${this.tank_points[tank.id]} pts`;
            createText(rf, ptsText, modifyColor(tank.color, 78), null, xp, y, 0);
          }

          if (!step1) {                                                  // el botón para avanzar recién aparece en el PASO 2
            if (!this.tournamentfinished)
              createText(Math.round(M_font*0.92), '▶ Next race', [255,255,255], null, xper(0.5), yper(0.84), selGlow(true));
            else if (this.table_cooldown > this.table_timer + TABLE_STEP1 + 1.2)   // copa terminada: "Back to Menu" con delay para no salir sin querer
              createText(M_font, 'Back to Menu', [255,255,255], null, xper(0.5), yper(0.86), selGlow(true));
          }
        }
      }
    }

    if (this.pause) {
      ctx.save(); ctx.globalAlpha = 0.45; ctx.fillStyle = '#000'; ctx.fillRect(0, 0, SCREEN_X, SCREEN_Y); ctx.restore();
      createText(B_font, 'PAUSE', randcolorGray(155,255), null, xper(0.5), yper(0.5), 22);
    }
    ctx.restore();                                                     // cierra el translate(cam) del HUD
  }
}

// ════════════════ PRIMITIVAS DE DIBUJO (en coords lógicas) ════════════════
function fillScreen(color) { ctx.fillStyle = rgb(color); ctx.fillRect(0, 0, SCREEN_X, SCREEN_Y); }
function fillRect(x, y, w, h, color) { ctx.fillStyle = rgb(color); ctx.fillRect(x, y, w, h); }
function strokeRect(x, y, w, h, color, lw = 1) { ctx.strokeStyle = rgb(color); ctx.lineWidth = lw; ctx.strokeRect(x, y, w, h); }
function drawCircle(x, y, r, color, lw = 0) {
  ctx.beginPath(); ctx.arc(x, y, Math.max(0, r), 0, Math.PI*2);
  if (lw > 0) { ctx.strokeStyle = rgb(color); ctx.lineWidth = lw; ctx.stroke(); }
  else { ctx.fillStyle = rgb(color); ctx.fill(); }
}
function drawLine(p1, p2, color, lw = 1) {
  ctx.strokeStyle = rgb(color); ctx.lineWidth = Math.max(1, lw); ctx.lineCap = 'butt';
  ctx.beginPath(); ctx.moveTo(p1[0], p1[1]); ctx.lineTo(p2[0], p2[1]); ctx.stroke();
}

// ════════════════ LIBREAS (cada tanque = un "sponsor" con patrón y color de acento propios) ════════════════
// Una por color de tanque. `p` = patrón dibujado sobre el casco (recortado a su forma); `a` = color de acento.
// `p` = patrón sobre el casco; `a` = 2º color (cubre buena parte → bicolor real); `a2` = 3º color (aro torreta + remate).
// Dibuja el patrón de la librea `L` ({p,a,a2}) sobre el casco local (origen en el centro, +x = adelante), recortado al casco.
function drawLivery(L, HL, HW, r, tint, a0) {
  const acc = rgb(tint(L.a));
  ctx.save();
  roundRectPath(-HL, -HW, HL*2, HW*2, r*0.26); ctx.clip();
  ctx.fillStyle = acc; ctx.strokeStyle = acc; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  switch (L.p) {
    case 'centerStripe': ctx.fillRect(-HL, -HW*0.4, HL*2, HW*0.8); break;
    case 'twinStripe':   ctx.fillRect(-HL, -HW*0.66, HL*2, HW*0.3); ctx.fillRect(-HL, HW*0.36, HL*2, HW*0.3); break;
    case 'checker': {
      const cols = 7, rows = 4, cw = (HL*2)/cols, ch = (HW*2)/rows;
      for (let i=0;i<cols;i++) for (let j=0;j<rows;j++) if ((i+j)%2===0) ctx.fillRect(-HL+i*cw, -HW+j*ch, cw+0.6, ch+0.6);
      break; }
    case 'hazard': {
      ctx.lineWidth = r*0.2;
      for (let xx=-HL-HW*2; xx<HL+HW; xx+=r*0.5) { ctx.beginPath(); ctx.moveTo(xx, -HW); ctx.lineTo(xx+HW*2, HW); ctx.stroke(); }
      break; }
    case 'chevron': {
      ctx.lineWidth = r*0.16;
      for (let k=0;k<4;k++){ const cx=-HL*0.75 + k*HL*0.52; ctx.beginPath(); ctx.moveTo(cx,-HW*0.85); ctx.lineTo(cx+HW*0.75,0); ctx.lineTo(cx,HW*0.85); ctx.stroke(); }
      break; }
    case 'flames': {
      for (const s of [-1,1]) { ctx.beginPath(); ctx.moveTo(-HL, s*HW); ctx.lineTo(HL*0.15, s*HW*0.5);
        ctx.lineTo(-HL*0.25, s*HW*0.18); ctx.lineTo(HL*0.05, 0); ctx.lineTo(-HL, 0); ctx.closePath(); ctx.fill(); }
      break; }
    case 'carbon': {
      ctx.globalAlpha = a0*0.32; ctx.lineWidth = Math.max(0.6, r*0.04);
      for (let xx=-HL; xx<HL+HW*2; xx+=r*0.18){ ctx.beginPath(); ctx.moveTo(xx,-HW); ctx.lineTo(xx-HW*2,HW); ctx.stroke(); ctx.beginPath(); ctx.moveTo(xx-HW*2,-HW); ctx.lineTo(xx,HW); ctx.stroke(); }
      break; }
    case 'dots': {
      const sp=r*0.46; for(let xx=-HL+sp*0.5; xx<HL; xx+=sp) for(let yy=-HW+sp*0.35; yy<HW; yy+=sp){ ctx.beginPath(); ctx.arc(xx,yy,r*0.13,0,TAU); ctx.fill(); }
      break; }
    case 'bolt': {
      ctx.lineWidth=r*0.18; ctx.beginPath(); ctx.moveTo(-HL*0.85,-HW*0.55); ctx.lineTo(-HL*0.15,-HW*0.12);
      ctx.lineTo(-HL*0.4,HW*0.05); ctx.lineTo(HL*0.75,HW*0.45); ctx.stroke(); break; }
    case 'tiger': {
      ctx.lineWidth=r*0.12; for(let k=0;k<6;k++){ const cx=-HL*0.85 + k*HL*0.36; ctx.beginPath(); ctx.moveTo(cx,-HW); ctx.quadraticCurveTo(cx+HW*0.45,0,cx,HW); ctx.stroke(); }
      break; }
    case 'splitDiag': { ctx.beginPath(); ctx.moveTo(-HL,-HW); ctx.lineTo(HL,-HW); ctx.lineTo(-HL,HW); ctx.closePath(); ctx.fill(); break; }
    case 'rally': {
      ctx.fillRect(-HL,-HW*0.98, HL*2, HW*0.3); ctx.fillRect(-HL, HW*0.68, HL*2, HW*0.3);
      ctx.fillRect(HL*0.42,-HW, HL*0.22, HW*2); break; }
    case 'edgeTrim': { ctx.lineWidth=r*0.16; roundRectPath(-HL+r*0.13,-HW+r*0.13, HL*2-r*0.26, HW*2-r*0.26, r*0.2); ctx.stroke(); break; }
    case 'noseFade': {
      const ng=ctx.createLinearGradient(HL,0,-HL*0.25,0); ng.addColorStop(0, acc); ng.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=ng; ctx.fillRect(-HL,-HW,HL*2,HW*2); break; }
    case 'diagStripes': {
      ctx.lineWidth=r*0.16; for(let xx=-HL-HW*2; xx<HL+HW; xx+=r*0.62){ ctx.beginPath(); ctx.moveTo(xx,-HW); ctx.lineTo(xx+HW*2,HW); ctx.stroke(); } break; }
    case 'gridLines': {
      ctx.globalAlpha=a0*0.5; ctx.lineWidth=Math.max(0.6,r*0.05);
      for(let xx=-HL; xx<HL; xx+=r*0.3){ ctx.beginPath(); ctx.moveTo(xx,-HW); ctx.lineTo(xx,HW); ctx.stroke(); }
      for(let yy=-HW; yy<HW; yy+=r*0.3){ ctx.beginPath(); ctx.moveTo(-HL,yy); ctx.lineTo(HL,yy); ctx.stroke(); } break; }
  }
  ctx.restore();
}

// ════════════════ TANQUE REUTILIZABLE (carrera, tabla de torneo, menú ambiente) ════════════════
// Mismo render de treads+cuerpo del original, extraído para no duplicarlo. `alpha` permite fantasmas
// translúcidos (tanques de fondo en el menú); `finished` aplica el tinte apagado. `livery` ({p,a,a2}) pinta la
// librea del sponsor (patrón + acentos); null = casco liso.
// Cuerpo del tanque en coords LOCALES (origen=centro, +x=adelante). La CTM ya debe estar posicionada/rotada.
function paintTankBody(r, color, livery, finished, a0) {
  const tint = finished ? (c => modifyColorPerc(c, 0.45)) : (c => c);
  const body = tint(color), dark = tint(modifyColor(color, -55)), darker = tint(modifyColor(color, -95)), light = tint(modifyColor(color, 65));
  const rr = (px, py, w, h, rad, c) => { roundRectPath(px, py, w, h, rad); ctx.fillStyle = (typeof c === 'string') ? c : rgb(c); ctx.fill(); };
  // Proporción ALARGADA: largo (adelante = x) > ancho (lateral = y).
  const HL = r*1.25, HW = r*0.62;                                     // medio-largo / medio-ancho del casco
  // Orugas: dos bandas oscuras a lo largo, con tacos.
  for (const s of [-1, 1]) {
    rr(-HL - r*0.08, s*(HW + r*0.12) - r*0.26, HL*2 + r*0.16, r*0.52, r*0.14, darker);
    ctx.fillStyle = rgb(dark);
    for (let i = 0; i < 8; i++) ctx.fillRect(-HL + (HL*2)*(i+0.5)/8 - r*0.045, s*(HW + r*0.12) - r*0.23, r*0.09, r*0.46);
  }
  // Casco: rectángulo redondeado alargado con gradiente (luz arriba) + borde oscuro.
  const hg = ctx.createLinearGradient(0, -HW, 0, HW);
  hg.addColorStop(0, rgb(light)); hg.addColorStop(0.55, rgb(body)); hg.addColorStop(1, rgb(dark));
  rr(-HL, -HW, HL*2, HW*2, r*0.26, hg);
