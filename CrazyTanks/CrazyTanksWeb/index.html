  if (livery) drawLivery(livery, HL, HW, r, tint, a0);
  roundRectPath(-HL, -HW, HL*2, HW*2, r*0.26); ctx.strokeStyle = rgb(darker); ctx.lineWidth = Math.max(1, r*0.08); ctx.stroke();
  // Detalle: placa frontal (glacis) + líneas de panel transversales + tornillos en las esquinas.
  rr(HL - r*0.5, -HW + r*0.06, r*0.42, HW*2 - r*0.12, r*0.1, dark);
  ctx.strokeStyle = rgb(modifyColor(color, -75)); ctx.lineWidth = Math.max(1, r*0.05);
  ctx.beginPath();
  for (const px of [-r*0.55, -r*0.05, r*0.45]) { ctx.moveTo(px, -HW + r*0.08); ctx.lineTo(px, HW - r*0.08); }
  ctx.stroke();
  ctx.fillStyle = rgb(darker);
  for (const sx of [-HL + r*0.22, HL - r*0.22]) for (const sy of [-HW + r*0.18, HW - r*0.18]) { ctx.beginPath(); ctx.arc(sx, sy, r*0.065, 0, Math.PI*2); ctx.fill(); }
  // Cañón cónico + boca (largo, hacia adelante).
  rr(r*0.1, -r*0.15, r*1.7, r*0.3, r*0.07, dark);
  rr(r*0.1, -r*0.08, r*1.45, r*0.16, r*0.05, body);
  drawCircle(r*1.86, 0, r*0.2, darker); drawCircle(r*1.86, 0, r*0.11, [10,10,12]);
  // Torreta: domo con gradiente radial + borde + escotilla + brillo.
  const tg = ctx.createRadialGradient(-r*0.14, -r*0.16, r*0.04, 0, 0, r*0.58);
  tg.addColorStop(0, rgb(light)); tg.addColorStop(1, rgb(dark));
  drawCircle(0, 0, r*0.56, darker);
  ctx.beginPath(); ctx.arc(0, 0, r*0.46, 0, Math.PI*2); ctx.fillStyle = tg; ctx.fill();
  drawCircle(r*0.08, r*0.04, r*0.24, dark); drawCircle(r*0.08, r*0.04, r*0.24, darker, Math.max(1, r*0.05));
  ctx.globalAlpha = a0 * 0.6; drawCircle(-r*0.16, -r*0.18, r*0.14, [255,255,255]); ctx.globalAlpha = a0;
  // Aro de acento del sponsor (3er color) en el borde de la torreta (ata la librea al diseño).
  if (livery) {
    ctx.strokeStyle = rgb(tint(livery.a2 || livery.a)); ctx.lineWidth = Math.max(1, r*0.08);
    ctx.beginPath(); ctx.arc(0, 0, r*0.5, 0, Math.PI*2); ctx.stroke();
  }
}

function paintTank(x, y, ang, r, color, alpha = 1, finished = false, livery = null) {
  ctx.save();
  if (alpha !== 1) ctx.globalAlpha = alpha;
  const a0 = ctx.globalAlpha;
  // Sombra de apoyo (mundo) → profundidad.
  ctx.globalAlpha = a0 * 0.26; ctx.fillStyle = '#000';

  ctx.globalAlpha = a0;
  ctx.translate(x, y); ctx.rotate(ang);                                // coords locales: adelante = +x
  paintTankBody(r, color, livery, finished, a0);
  ctx.restore();
}

// ── Cache de sprites de tanque: en carrera hay hasta 16 tanques; redibujar todo el detalle ×16/frame mata
// el mobile. Renderizamos cada (skin, estado) UNA vez a un canvas offscreen (a resolución de dispositivo) y
// después solo hacemos drawImage rotado. Se reconstruye si cambia la escala/dpr.
let tankSpriteScale = 0;

function tankSpriteFor(skin, r, finished) {
  const s = scaleX * dpr;
  if (s !== tankSpriteScale) { tankSprites.clear(); tankSpriteScale = s; }
  const key = (skin ? SKINS.indexOf(skin) : -1) + (finished ? 'f' : 'n');
  let spr = tankSprites.get(key);
  if (spr) return spr;
  const half = r * 2.25;                                               // cubre cañón + sombra
  const dim = Math.max(1, Math.ceil(half * 2 * s));

  const c2 = cv.getContext('2d');

  c2.setTransform(s, 0, 0, s, half * s, half * s);                     // origen=centro; 1 unidad lógica = s px (nítido)
  c2.globalAlpha = 0.26; c2.fillStyle = '#000';                        // sombra centrada (rota con el tanque)
  c2.beginPath(); c2.ellipse(r*0.1, r*0.18, r*1.4, r*0.85, 0, 0, Math.PI*2); c2.fill(); c2.globalAlpha = 1;
  paintTankBody(r, skin ? skin.color : [180,180,190], skin, finished, 1);

}

function ordinalSuffix(n) {
  const v = n % 100; if (v >= 11 && v <= 13) return 'th';
  return n % 10 === 1 ? 'st' : n % 10 === 2 ? 'nd' : n % 10 === 3 ? 'rd' : 'th';
}

// Tarjeta de posición del JUGADOR (única, arriba-izquierda). Número grande en Russo One + datos en Rajdhani.
function drawPosCard(rank, total, color, laps, racelength, livery = null) {
  const x = xper(0.014), y = yper(0.024), w = xper(0.185), h = yper(0.15), rad = h * 0.16;
  const medal = rank === 1 ? [255,215,90] : rank === 2 ? [215,220,230] : rank === 3 ? [210,140,75] : [150,160,175];
  ctx.save();
  ctx.textBaseline = 'alphabetic';

  // panel con sombra + gradiente
  ctx.shadowColor = 'rgba(0,0,0,0.55)'; ctx.shadowBlur = 18; ctx.shadowOffsetY = 4;
  roundRectPath(x, y, w, h, rad);
  const g = ctx.createLinearGradient(x, y, x, y + h);
  g.addColorStop(0, 'rgba(22,25,36,0.92)'); g.addColorStop(1, 'rgba(8,9,15,0.92)');
  ctx.fillStyle = g; ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // barra de acento (color del jugador) arriba
  ctx.save(); roundRectPath(x, y, w, h, rad); ctx.clip();
  const bar = ctx.createLinearGradient(x, y, x + w, y);
  bar.addColorStop(0, rgb(color)); bar.addColorStop(1, rgb(modifyColorPerc(color, 0.35)));
  ctx.fillStyle = bar; ctx.fillRect(x, y, w, h * 0.07); ctx.restore();

  // borde con glow del color del jugador

  ctx.lineWidth = 2; ctx.strokeStyle = rgb(modifyColor(color, 40));
  ctx.shadowColor = rgb(color); ctx.shadowBlur = 10; ctx.stroke(); ctx.shadowBlur = 0;

  // divisor entre POSICIÓN y VUELTA
  const midx = x + w * 0.54;
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(midx, y + h * 0.24); ctx.lineTo(midx, y + h * 0.70); ctx.stroke();   // hasta 0.70 → deja libre la fila inferior para nombre + mini-tanque

  ctx.textAlign = 'left';
  // ── POSICIÓN ──
  ctx.fillStyle = 'rgba(200,206,220,0.6)';
  ctx.letterSpacing = '2px';
  ctx.font = `700 ${Math.round(h * 0.15)}px 'Rajdhani', sans-serif`;
  ctx.fillText('POSICIÓN', x + w * 0.08, y + h * 0.28);
  ctx.letterSpacing = '0px';

  const numStr = String(rank), numX = x + w * 0.07;
  ctx.font = `${Math.round(h * 0.48)}px 'Russo One', sans-serif`;
  ctx.fillStyle = rgb(medal);
  ctx.shadowColor = rgb(medal); ctx.shadowBlur = rank === 1 ? 14 : 6;
  ctx.fillText(numStr, numX, y + h * 0.74); ctx.shadowBlur = 0;
  const numW = ctx.measureText(numStr).width;
  ctx.font = `700 ${Math.round(h * 0.17)}px 'Rajdhani', sans-serif`;
  ctx.fillStyle = rgb(medal); ctx.fillText(ordinalSuffix(rank), numX + numW + 3, y + h * 0.46);
  ctx.fillStyle = 'rgba(190,196,210,0.7)'; ctx.fillText('/ ' + total, numX + numW + 3, y + h * 0.7);

  // ── VUELTA ──
  ctx.fillStyle = 'rgba(200,206,220,0.6)';
  ctx.letterSpacing = '2px';
  ctx.font = `700 ${Math.round(h * 0.15)}px 'Rajdhani', sans-serif`;
  ctx.fillText('VUELTA', midx + w * 0.06, y + h * 0.28);
  ctx.letterSpacing = '0px';
  ctx.font = `700 ${Math.round(h * 0.34)}px 'Rajdhani', sans-serif`;
  ctx.fillStyle = '#eef1f7';
  ctx.fillText(Math.min(laps + 1, racelength) + '/' + racelength, midx + w * 0.06, y + h * 0.66);

  // ── NOMBRE del tanque + mini-tanque (abajo-derecha, agrupados). TODO clippeado al rectángulo → nada se sale. ──
  ctx.save();
  roundRectPath(x, y, w, h, rad); ctx.clip();
  const tcx = x + w - h * 0.24, tcy = y + h * 0.82, tsz = h * 0.10;             // mini-tanque BIEN adentro (antes sobresalía por el borde derecho)
  if (livery && livery.name) {                                                 // nombre del tanque: más grande y LLAMATIVO (Russo One + glow del color), CENTRADO al lado del tanque
    const nameR = tcx - h * 0.30, nameL = x + w * 0.06, ncx = (nameL + nameR) / 2;
    ctx.font = `${Math.round(h * 0.185)}px 'Russo One', sans-serif`;
    ctx.fillStyle = rgb(modifyColor(color, 95));
    ctx.shadowColor = rgb(color); ctx.shadowBlur = 9;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(livery.name, ncx, tcy);
    ctx.shadowBlur = 0; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }
  paintTank(tcx, tcy, 0, tsz, color, 1, false, livery);                        // mini-tanque con la librea del jugador
  ctx.restore();
  ctx.restore();
}

// ════════════════ DECORACIÓN AMBIENTE (rellena los espacios vacíos de cada pista) ════════════════
// Generada UNA vez por pista con un PRNG sembrado → posiciones estables (no parpadea entre frames).
// El "tema" (track//2) define el flavor: pasto, arena, nieve, tecno, lava.
const TAU = Math.PI * 2;

  const seed = decoSeedFor(track);

  const rng = mulberry32(seed);
  const theme = themeOf(track);
  const items = [];
  const N = Math.round(80 * (ww * hh) / (SCREEN_X * SCREEN_Y));        // densidad constante: más mundo = más deco

    const x = rng() * ww, y = rng() * hh, s = 0.5 + rng();
    let shape, col, alpha, r, extra = 0;
    if (theme === 0 || theme === 5) {                                 // ASFALTO: grava clara, grietas oscuras, manchas de aceite (parque y parque-noche)
      const k = rng();
      if (k < 0.5)       { shape = 'gravel'; col = [105+rng()*55, 108+rng()*55, 116+rng()*55]; alpha = 0.18 + rng()*0.16; r = xper(0.0032)*s; }
      else if (k < 0.82) { shape = 'crack';  col = [16+rng()*14, 17+rng()*14, 21+rng()*14];    alpha = 0.34 + rng()*0.24; r = xper(0.02)*s;  extra = rng()*TAU; }
      else               { shape = 'oil';    col = [10+rng()*10, 11+rng()*10, 14+rng()*10];    alpha = 0.26 + rng()*0.18; r = xper(0.013)*s; extra = rng()*TAU; }
    }
    else if (theme === 1) { shape = 'dot';   col = modifyColor([150,132,72], -Math.floor(rng()*40)); alpha = 0.30 + rng()*0.20; r = xper(0.0045)*s; }
    else if (theme === 2) { shape = 'cross'; col = [150+rng()*40, 168+rng()*40, 200+rng()*35];        alpha = 0.22 + rng()*0.16; r = xper(0.0045)*s; }
    else if (theme === 3) { shape = 'wires'; col = [70+rng()*60, 160+rng()*60, 235];                  alpha = 0.22 + rng()*0.18; r = xper(0.013)*s;  extra = rng()*TAU; }
    else                  { shape = 'ember'; col = [225+rng()*30, 95+rng()*60, 25+rng()*35];          alpha = 0.26 + rng()*0.20; r = xper(0.0045)*s; }
    items.push({ x, y, r, shape, col, alpha, extra });

function drawDeco(track, ww = SCREEN_X, hh = SCREEN_Y) {
  const { theme, items } = getDeco(track, ww, hh);
  // (la grilla de fondo se SACÓ — quedaba dibujada siempre)
  // scatter temático
  for (const it of items) {
    ctx.globalAlpha = it.alpha;
    if (it.shape === 'gravel') {
      drawCircle(it.x, it.y, it.r, it.col);
    } else if (it.shape === 'crack') {
      ctx.strokeStyle = rgb(it.col); ctx.lineWidth = Math.max(1, it.r*0.1); ctx.lineCap = 'round';

    } else if (it.shape === 'dot') {

      ctx.strokeStyle = rgb(it.col); ctx.lineWidth = Math.max(1, it.r*0.16); ctx.lineCap = 'round';

      ctx.stroke();
      drawCircle(it.x - dx, it.y - dy, Math.max(1, it.r*0.13), it.col); drawCircle(it.x + dx, it.y + dy, Math.max(1, it.r*0.13), it.col);   // conectores
    } else {
      drawCircle(it.x, it.y, it.r*1.9, it.col);

  const vr = Math.hypot(ww, hh) * 0.5;
  const vg = ctx.createRadialGradient(ww/2, hh/2, Math.min(ww,hh)*0.32, ww/2, hh/2, vr);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.34)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, ww, hh);
}

// ════════════════ ESCENOGRAFÍA TEMÁTICA DEL INFIELD (GRANDE, reconocible y 100% HORNEADA) ════════════════
// Decoración grande por bioma: parque (árboles/arbustos/flores), desierto (dunas/pirámides/cactus),
// nieve (muñecos/piedras), tecno (edificios/cables), lava (lagos/ríos/brasas). Se dibuja en la CAPA de PARED
// (el infield) ANTES de calar el corredor → lo que cae sobre la pista lo borra el carve, la calle queda limpia.
// Se hornea UNA vez por mapa: costo por frame = 0 (se blitea con el resto del fondo).
const SCENERY_DENSITY = [17, 12, 12, 6.5, 8, 17];                     // items por pantalla-equivalente, por tema (subido = más detalle) · [5]=parque noche (igual que parque)
const sceneryCache = {};
function getScenery(track, ww, hh) {

  const theme = themeOf(track), rng = mulberry32((seed ^ 0x5bd1e995) >>> 0), af = (ww * hh) / (1280 * 720);
  const N = Math.round(SCENERY_DENSITY[theme] * af), items = [];

  const lines = [];                                                    // tendidos de cables (tecno): cadenas de postes
  if (theme === 3) {
    const chains = Math.max(2, Math.round(1.6 * af));
    for (let c = 0; c < chains; c++) {
      const horiz = rng() < 0.5, n = 3 + Math.floor(rng()*4), x0 = rng()*ww, y0 = rng()*hh, step = 180 + rng()*170, pts = [];
      for (let k = 0; k < n; k++) pts.push(horiz ? [x0 + k*step, y0 + (rng()-0.5)*40] : [x0 + (rng()-0.5)*40, y0 + k*step]);

// sombra proyectada (offset abajo-derecha) → ilusión de altura en vista cenital
function shadowBlob(x, y, r, a) { ctx.globalAlpha = a; ctx.fillStyle = '#000'; ctx.beginPath(); ctx.ellipse(x + r*0.18, y + r*0.22, r*1.02, r*0.92, 0, 0, TAU); ctx.fill(); ctx.globalAlpha = 1; }

  const r = 20 + s*16;

  drawCircle(x, y, r, _pc([12, 45, 22]));                            // contorno oscuro
  drawCircle(x + r*0.46, y + r*0.2, r*0.5, _pc([20, 64, 32]));

  const r = 11 + s*9;

    for (let i = 0, n = cap(FX_SAND_DENS); i < n; i++) d.sand.push({ x: rng() * ww, y: rng() * hh, len: 10 + rng() * 16, a: 0.12 + rng() * 0.16, fa: 4 + rng() * 10, ph: rng() * TAU });   // rayas CORTAS
    for (let i = 0, n = cap(FX_BUG_DENS); i < n; i++) { const p = fxAlongTrack(rng, 258); if (!p) continue; const kind = Math.floor(rng() * 3); d.bugs.push({ x: p.x, y: p.y, ph: rng() * TAU, sp: 0.8 + rng() * 0.8, face: rng() < 0.5 ? 1 : -1, sz: kind === 2 ? 5.5 + rng() * 3.5 : 4 + rng() * 2.5, kind, rng: 1.5 + rng() * 3 }); }   // MUY chiquitos (los tanques son grandes); rng=vaivén también chico   // kind 0 escarabajo, 1 escorpión, 2 serpiente; casi quietos (rng chico, sp lento) y face FIJO → no cruzan la pantalla
  } else if (theme === 4) {                                            // LAVA: lluvia de fuego (mundo, global) + luces parpadeantes al borde + diablitos EN GRUPO (con patas)
    for (let i = 0, nf = cap(FX_FIRE_DENS); i < nf; i++) d.fire.push({ x: rng() * ww, y: rng() * hh, r: 1.5 + rng() * 2.4, a: 0.30 + rng() * 0.30, sx: 7 + rng() * 18, sy: 6 + rng() * 14, ws: 0.6 + rng() * 1.1, vy: 20 + rng() * 90, ph: rng() * TAU, ph2: rng() * TAU, fk: 4 + rng() * 8 });   // cenizas prendidas: tamaño/alpha/vaivén XY/velocidad-vaivén/ascenso propio/titileo variados
    for (let i = 0, nl = cap(9); i < nl; i++) { const p = fxAlongTrack(rng, 248); if (p) d.lights.push({ x: p.x, y: p.y, ph: rng() * TAU, sp: 6 + rng() * 11, sz: 8 + rng() * 8 }); }   // off-road (no en el medio de la pista), bordeando
    for (let g = 0, ng = Math.max(2, Math.min(cap(3), 6)); g < ng; g++) {
      const c = fxAlongTrack(rng, 262); if (!c) continue;
      for (let k = 0, nk = 2 + Math.floor(rng() * 3); k < nk; k++)      // 2-4 diablitos amontonados
        d.devils.push({ x: c.x + (rng() - 0.5) * 80, y: c.y + (rng() - 0.5) * 60, ph: rng() * TAU, sp: 3.2 + rng() * 2.4, face: rng() < 0.5 ? 1 : -1, sz: 14 + rng() * 8 });
    }
  } else if (theme === 3) {                                            // TECNO: tribunas chicas al costado (BIEN off-road, no en la pista)
    for (let i = 0, ns = cap(6); i < ns; i++) { const p = fxAlongTrack(rng, 300); if (!p) continue; if (d.stands.some(st => Math.hypot(st.x - p.x, st.y - p.y) < 150)) continue; d.stands.push({ x: p.x, y: p.y, ph: rng() * TAU, w: 88, rows: 4 }); }   // TODAS del mismo tamaño; ≥150 entre sí → NO se enciman
  } else if (theme === 2) {                                            // NIEVE: muñecos que tiran bolas (al borde, off-road incluso en pistas anchas)
    for (let i = 0, nm = cap(7); i < nm; i++) { const p = fxAlongTrack(rng, 262); if (p) d.snowmen.push({ x: p.x, y: p.y, cd: 1.0 + rng() * 2.6, ph: rng() * TAU, sz: 17 + rng() * 7, thr: 0 }); }   // off-road validado (no dentro de la pista)
  } else if (theme === 5) {                                            // PARQUE DE NOCHE: lluvia (mundo, global) — mismas partículas que el fuego pero como agua
    for (let i = 0, n = cap(FX_RAIN_DENS); i < n; i++) d.rain.push({ x: rng() * ww, y: rng() * hh, len: 16 + rng() * 26, w: 1 + rng() * 1.4, a: 0.10 + rng() * 0.16, ph: rng() * TAU });
  }
  fxData = d; return d;
}

// ── GAMEPLAY (sólo nieve): muñecos tiran bolas; las bolas vuelan y al pegarle al jugador lo hacen derrapar + trompo corto ──
function fxSnowballHit(t, s) {
  const b = t.body, L = Math.hypot(s.vx, s.vy) || 1;
  _vScratch.x = b.velocity.x * 0.6 + (s.vx / L) * SNOWBALL_KNOCK;       // knockback en la dirección de la bola (parte queda lateral → derrape)
  _vScratch.y = b.velocity.y * 0.6 + (s.vy / L) * SNOWBALL_KNOCK;
  Body.setVelocity(b, _vScratch);
  t.spin_timer = Math.max(t.spin_timer, SPIN_TIME * 0.55);             // trompo corto (más leve que el disparo)
  t.spin_dir = ri(0, 1) === 0 ? -1 : 1;
}
function updateAmbientFx(track) {
  ensureFx(track);
  const d = fxData; if (!d) return;
  const p = tanks[0];                                                  // los muñecos apuntan SÓLO al jugador (lo pedido: "que te tiren bolas"), no a la IA
  if (d.theme === 2 && d.snowmen.length && p && p.start && !p.finished) {   // p.start: recién con la carrera EMPEZADA (no durante la cuenta regresiva)
    for (const m of d.snowmen) {
      if (m.thr > 0) m.thr -= deltaT;
      m.cd -= deltaT;
      if (m.cd <= 0) {
        const sx = m.x - camX, sy = m.y - camY;                        // sólo tira si está (casi) en pantalla y a tiro (justo)
        const onScreen = sx > -100 && sx < SCREEN_X + 100 && sy > -100 && sy < SCREEN_Y + 100;
        const dist = Math.hypot(m.x - p.x, m.y - p.y);
        if (onScreen && dist < SNOW_THROW_RANGE && dist > 70) {
          const lead = dist / SNOWBALL_SPD;                            // apunta un poco adelante del jugador
          const tx = p.x + p.body.velocity.x * 60 * lead * 0.65, ty = p.y + p.body.velocity.y * 60 * lead * 0.65;
          let dx = tx - m.x, dy = ty - m.y; const L = Math.hypot(dx, dy) || 1;
          fxSnowballs.push({ x: m.x, y: m.y - m.sz * 0.6, vx: dx / L * SNOWBALL_SPD, vy: dy / L * SNOWBALL_SPD, life: 2.4 });
          m.thr = 0.35; m.cd = rnd(2.0, 4.2);
        } else m.cd = rnd(0.4, 1.0);                                   // no estaba a tiro → reintentar pronto
      }
    }
  }
  if (fxSnowballs.length) {                                            // mover bolas + colisión (corre siempre; el pool sólo existe en nieve)
    const ww = worldW(track), hh = worldH(track);
    for (let i = fxSnowballs.length - 1; i >= 0; i--) {
      const s = fxSnowballs[i];
      s.x += s.vx * deltaT; s.y += s.vy * deltaT; s.life -= deltaT;
      if (p && !p.finished && Math.hypot(s.x - p.x, s.y - p.y) < p.radius * 1.2) { fxSnowballHit(p, s); fxSnowballs.splice(i, 1); continue; }
      if (s.life <= 0 || s.x < -50 || s.x > ww + 50 || s.y < -50 || s.y > hh + 50) fxSnowballs.splice(i, 1);
    }
  }
}

// ── DIBUJO (todo culleado; hojas/arena/bichos en coords del MUNDO → viento global, no acompañan al jugador) ──
function drawAmbientFx(track) {
  const d = ensureFx(track), theme = d.theme;
  ctx.save();
  if (theme === 0) fxDrawLeaves(d);
  else if (theme === 1) { fxDrawSand(d); for (const bg of d.bugs) fxDrawBug(bg); }
  else if (theme === 4) { fxLavaGlow(); for (const l of d.lights) fxDrawLavaLight(l); for (const dv of d.devils) fxDrawDevil(dv); fxDrawFire(d); }
  else if (theme === 3) { for (const st of d.stands) fxDrawStand(st); }
  else if (theme === 2) { for (const m of d.snowmen) fxDrawSnowman(m); for (const s of fxSnowballs) fxDrawSnowball(s); }
  else if (theme === 5) {                                              // PARQUE DE NOCHE: oscurecido azulado constante + relámpagos blancos + lluvia (mismos flashes que tenía la lava)
    ctx.fillStyle = 'rgb(6,10,26)'; ctx.globalAlpha = 0.20; ctx.fillRect(camX - 2, camY - 2, SCREEN_X + 4, SCREEN_Y + 4); ctx.globalAlpha = 1;   // velo de NOCHE
    fxLightning('rgb(228,236,255)');                                   // relámpago frío (lo levanta de golpe)
    fxDrawRain(d);                                                     // lluvia encima de todo
  }
  ctx.globalAlpha = 1; ctx.lineCap = 'butt';
  ctx.restore();
}
// RELÁMPAGOS dramáticos (lo que antes hacía la lava): destellos secos, IRREGULARES y espaciados (~4-7s),
// con dobles ocasionales en los fuertes. `col` = color del flash (blanco/azulado para la tormenta). Pinta toda la escena.
function fxLightning(col) {
  const clock = T * 0.19 + 0.40 * Math.sin(T * 0.11) + 0.25 * Math.sin(T * 0.067 + 1.3);   // reloj de velocidad variable → intervalos irregulares
  const k = Math.floor(clock), frac = clock - k;
  const hr = Math.sin(k * 91.37) * 43758.5453, rnd = hr - Math.floor(hr);           // fuerza POR flash (estable, sin Math.random por-frame)
  const hr2 = Math.sin(k * 53.21 + 2.4) * 24634.6345, rnd2 = hr2 - Math.floor(hr2); // ¿doble? + separación del 2º
  const peak = 0.10 + rnd * 0.16;
  let flash = Math.exp(-frac * (52 + rnd * 22)) * peak;               // ataque seco + caída MUY rápida (chispazo)
  if (rnd > 0.62) { const f2 = frac - (0.010 + rnd2 * 0.022); if (f2 > 0) flash = Math.max(flash, Math.exp(-f2 * 56) * peak * (0.6 + rnd2 * 0.35)); }   // dobles sólo en los fuertes
  if (flash > 0.002) { ctx.fillStyle = col; ctx.globalAlpha = Math.min(0.34, flash); ctx.fillRect(camX - 2, camY - 2, SCREEN_X + 4, SCREEN_Y + 4); }
  ctx.globalAlpha = 1;                                                 // reset incondicional (es función reusable)
}
// LAVA: resplandor NARANJA sutil y CONSTANTE — titileo intermitente de fondo (brasa), nunca apagado, sin relámpagos dramáticos.
function fxLavaGlow() {
  const flick = 0.5 + 0.5 * Math.sin(T * 2.1) * Math.sin(T * 0.83 + 1.1);   // pulso lento e IRREGULAR (producto de sinusoides → no periódico obvio)
  const jit = 0.5 + 0.5 * Math.sin(T * 8.5 + 0.6);                          // parpadeo rápido de brasa
  const a = 0.035 + 0.055 * flick + 0.022 * jit;                           // ~0.035 .. 0.11 — SIEMPRE presente, sube y baja (intermitente sutil)
  ctx.fillStyle = 'rgb(255,104,30)'; ctx.globalAlpha = Math.min(0.12, a);  // más ANARANJADO (antes rojo) y constante
  ctx.fillRect(camX - 2, camY - 2, SCREEN_X + 4, SCREEN_Y + 4);
  ctx.globalAlpha = 1;
}
function fxDrawLeaves(d) {                                             // hojas a la deriva — viento GLOBAL en el mundo (wrap a bordes del mundo), culleadas
  const ww = d.ww, hh = d.hh;
  for (const lf of d.leaves) {
    const wob = Math.sin(T * lf.fs + lf.ph);
    const wx = ((lf.x + LEAF_WX * T) % ww + ww) % ww + wob * lf.fa;
    const wy = ((lf.y + LEAF_WY * T) % hh + hh) % hh + Math.cos(T * lf.fs * 0.8 + lf.ph) * lf.fa;
    const sx = wx - camX, sy = wy - camY;
    if (sx < -30 || sx > SCREEN_X + 30 || sy < -30 || sy > SCREEN_Y + 30) continue;
    const col = lf.hue < 0.5 ? [50 + lf.hue * 110, 115 + lf.hue * 70, 38] : [165, 120 - (lf.hue - 0.5) * 120, 42];
    ctx.save(); ctx.translate(wx, wy); ctx.rotate(lf.rot + T * 0.6 + wob * 0.5);
    ctx.globalAlpha = 0.55; ctx.fillStyle = rgb(col);
    ctx.beginPath(); ctx.ellipse(0, 0, lf.sz, lf.sz * 0.5, 0, 0, TAU); ctx.fill();
    ctx.strokeStyle = rgb(modifyColorPerc(col, 0.55)); ctx.lineWidth = Math.max(0.6, lf.sz * 0.13);   // nervadura + pecíolo (detalle de hoja)
    ctx.beginPath(); ctx.moveTo(-lf.sz * 0.85, 0); ctx.lineTo(lf.sz * 1.25, lf.sz * 0.12); ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
function fxDrawSand(d) {                                               // arena volando — viento GLOBAL en el mundo (wrap), culleada
  const ww = d.ww, hh = d.hh;
  ctx.lineCap = 'butt'; ctx.strokeStyle = 'rgb(120,92,50)'; ctx.lineWidth = 3;   // polvo OSCURO, rayas CORTAS y GRUESAS, extremos rectos (sin punta/grano)
  for (const s of d.sand) {
    const wx = ((s.x + SAND_WX * T) % ww + ww) % ww;
    const wy = ((s.y + SAND_WY * T) % hh + hh) % hh + Math.sin(T * 2 + s.ph) * s.fa;
    const sx = wx - camX, sy = wy - camY;
    if (sx < -80 || sx > SCREEN_X + 30 || sy < -30 || sy > SCREEN_Y + 30) continue;
    ctx.globalAlpha = s.a;
    ctx.beginPath(); ctx.moveTo(wx, wy); ctx.lineTo(wx - s.len, wy + 1); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function fxDrawFire(d) {                                               // LAVA: CENIZAS PRENDIDAS volando — brasas que flotan/suben lento (mundo, global, wrap), se mecen y TITILAN, culleadas
  const ww = d.ww, hh = d.hh;
  ctx.globalCompositeOperation = 'lighter';                            // brillo ADITIVO → las brasas suman luz (glow), no tapan
  for (const f of d.fire) {
    // deriva global lenta + vaivén por-partícula en X e Y (vuelo errático) + ascenso propio (vy)
    const wx = ((f.x + FIRE_WX * T) % ww + ww) % ww + Math.sin(T * f.ws + f.ph) * f.sx;
    const wy = ((f.y + (FIRE_WY - f.vy) * T) % hh + hh) % hh + Math.cos(T * f.ws * 0.8 + f.ph2) * f.sy;
    const sx = wx - camX, sy = wy - camY;
    if (sx < -20 || sx > SCREEN_X + 20 || sy < -20 || sy > SCREEN_Y + 20) continue;
    const fl = 0.32 + 0.68 * Math.abs(Math.sin(T * f.fk + f.ph));      // titileo FUERTE (a veces casi se apaga → brasa "prendida")
    const a = f.a * fl;
    ctx.globalAlpha = a * 0.5; ctx.fillStyle = 'rgb(255,108,16)'; ctx.beginPath(); ctx.arc(wx, wy, f.r * 2.2, 0, TAU); ctx.fill();   // halo naranja (resplandor)
    ctx.globalAlpha = a;       ctx.fillStyle = 'rgb(255,226,150)'; ctx.beginPath(); ctx.arc(wx, wy, f.r * 0.9, 0, TAU); ctx.fill();   // núcleo amarillo (punto brillante)
  }
  ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
}
function fxDrawRain(d) {                                               // LLUVIA — gotas cayendo, viento GLOBAL en el mundo (wrap), culleada. Misma base que el fuego pero AGUA (raya fría, sin glow)
  const ww = d.ww, hh = d.hh;
  ctx.lineCap = 'butt'; ctx.strokeStyle = 'rgb(150,178,214)';
  for (const r of d.rain) {
    const wx = ((r.x + RAIN_WX * T) % ww + ww) % ww;
    const wy = ((r.y + RAIN_WY * T) % hh + hh) % hh;
    const sx = wx - camX, sy = wy - camY;
    if (sx < -30 || sx > SCREEN_X + 30 || sy < -40 || sy > SCREEN_Y + 30) continue;
    ctx.globalAlpha = r.a; ctx.lineWidth = r.w;
    ctx.beginPath(); ctx.moveTo(wx, wy); ctx.lineTo(wx - RAIN_DX * r.len, wy - RAIN_DY * r.len); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}
function fxDrawBug(bg) {                                               // bicho del desierto (escarabajo / escorpión / serpiente). Face FIJO + vaivén chico → no cruza la pantalla.
  const bx = bg.x + Math.sin(T * bg.sp + bg.ph) * bg.rng, by = bg.y + Math.cos(T * bg.sp * 0.8 + bg.ph) * bg.rng * 0.5;
  const sx = bx - camX, sy = by - camY;
  if (sx < -40 || sx > SCREEN_X + 40 || sy < -40 || sy > SCREEN_Y + 40) return;
  const s = bg.sz;
  ctx.save(); ctx.translate(bx, by); ctx.scale(bg.face, 1);
  if (bg.kind === 2) fxBugSnake(s, bg);
  else if (bg.kind === 1) fxBugScorpion(s, bg);
  else fxBugBeetle(s, bg);
  ctx.restore(); ctx.lineCap = 'butt'; ctx.lineJoin = 'miter';
}
function fxBugBeetle(s, bg) {                                          // escarabajo: 6 patas, élitros con surco, pronoto, antenas, reflejo
  const lw = Math.sin(T * bg.sp * 5 + bg.ph) * s * 0.13;
  ctx.strokeStyle = 'rgb(38,28,18)'; ctx.lineWidth = Math.max(1, s * 0.09); ctx.lineCap = 'round';
  ctx.beginPath();
  for (let i = -1; i <= 1; i++) { const px = i * s * 0.3; ctx.moveTo(px, -s * 0.16); ctx.lineTo(px - s * 0.26 + lw, -s * 0.46); ctx.moveTo(px, s * 0.16); ctx.lineTo(px - s * 0.26 - lw, s * 0.46); }
  ctx.moveTo(s * 0.42, -s * 0.08); ctx.lineTo(s * 0.72, -s * 0.3); ctx.moveTo(s * 0.42, s * 0.08); ctx.lineTo(s * 0.72, s * 0.3);   // antenas
  ctx.stroke();
  ctx.fillStyle = 'rgb(34,28,22)'; ctx.beginPath(); ctx.ellipse(0, 0, s * 0.52, s * 0.36, 0, 0, TAU); ctx.fill();   // élitros
  ctx.fillStyle = 'rgb(24,20,16)'; ctx.beginPath(); ctx.ellipse(s * 0.4, 0, s * 0.2, s * 0.22, 0, 0, TAU); ctx.fill();   // pronoto/cabeza
  ctx.strokeStyle = 'rgb(74,60,40)'; ctx.lineWidth = Math.max(1, s * 0.05);                  // surco central de los élitros
  ctx.beginPath(); ctx.moveTo(s * 0.26, 0); ctx.lineTo(-s * 0.48, 0); ctx.stroke();
  ctx.fillStyle = 'rgba(170,150,110,0.5)'; ctx.beginPath(); ctx.ellipse(-s * 0.14, -s * 0.13, s * 0.13, s * 0.06, -0.5, 0, TAU); ctx.fill();   // reflejo
}
function fxBugScorpion(s, bg) {                                        // escorpión: 8 patas, pinzas, cuerpo segmentado, cola curva con aguijón
  const lw = Math.sin(T * bg.sp * 5 + bg.ph) * s * 0.11, tw = Math.sin(T * bg.sp * 1.6 + bg.ph) * s * 0.12;
  ctx.strokeStyle = 'rgb(86,62,32)'; ctx.lineWidth = Math.max(1, s * 0.08); ctx.lineCap = 'round';
  ctx.beginPath();
  for (let i = 0; i < 4; i++) { const px = -s * 0.16 + i * s * 0.2; ctx.moveTo(px, -s * 0.12); ctx.lineTo(px - s * 0.2 + lw, -s * 0.4); ctx.moveTo(px, s * 0.12); ctx.lineTo(px - s * 0.2 - lw, s * 0.4); }
  ctx.moveTo(s * 0.34, -s * 0.1); ctx.lineTo(s * 0.6, -s * 0.26); ctx.moveTo(s * 0.34, s * 0.1); ctx.lineTo(s * 0.6, s * 0.26);   // brazos de las pinzas
  ctx.stroke();
  ctx.fillStyle = 'rgb(104,76,40)';
  ctx.beginPath(); ctx.ellipse(s * 0.66, -s * 0.28, s * 0.13, s * 0.08, 0.5, 0, TAU); ctx.ellipse(s * 0.66, s * 0.28, s * 0.13, s * 0.08, -0.5, 0, TAU); ctx.fill();   // pinzas
  ctx.beginPath(); ctx.ellipse(0, 0, s * 0.4, s * 0.25, 0, 0, TAU); ctx.ellipse(s * 0.3, 0, s * 0.18, s * 0.17, 0, 0, TAU); ctx.fill();   // cuerpo + cabeza
  ctx.strokeStyle = 'rgb(104,76,40)'; ctx.lineWidth = Math.max(2, s * 0.15); ctx.lineCap = 'round';   // cola curvada
  ctx.beginPath(); ctx.moveTo(-s * 0.38, 0); ctx.quadraticCurveTo(-s * 0.95, -s * 0.05, -s * 0.7 + tw, -s * 0.62); ctx.stroke();
  ctx.fillStyle = 'rgb(132,98,50)'; ctx.beginPath(); ctx.arc(-s * 0.7 + tw, -s * 0.68, s * 0.1, 0, TAU); ctx.fill();   // aguijón
}
function fxBugSnake(s, bg) {                                           // serpiente: cuerpo ondulante (la cola culebrea, la cabeza casi quieta), lengua bífida
  const N = 8, body = s * 1.55, amp = s * 0.42;                        // CENTRADA en su punto (no se estira hacia la pista)
  let hx = 0, hy = 0;
  ctx.strokeStyle = 'rgb(150,120,58)'; ctx.lineWidth = Math.max(2, s * 0.42); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i < N; i++) { const t = i / (N - 1), x = (0.5 - t) * body, y = Math.sin(T * bg.sp * 1.8 + bg.ph + i * 0.85) * amp * t; if (i === 0) { ctx.moveTo(x, y); hx = x; hy = y; } else ctx.lineTo(x, y); }
  ctx.stroke();
  ctx.strokeStyle = 'rgb(196,168,96)'; ctx.lineWidth = Math.max(1, s * 0.12); ctx.setLineDash([s * 0.3, s * 0.3]);   // patrón dorsal
  ctx.beginPath();
  for (let i = 0; i < N; i++) { const t = i / (N - 1), x = (0.5 - t) * body, y = Math.sin(T * bg.sp * 1.8 + bg.ph + i * 0.85) * amp * t; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }
  ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = 'rgb(162,132,66)'; ctx.beginPath(); ctx.ellipse(hx, hy, s * 0.32, s * 0.24, 0, 0, TAU); ctx.fill();   // cabeza
  ctx.fillStyle = '#1a1410'; ctx.beginPath(); ctx.arc(hx + s * 0.12, hy - s * 0.08, s * 0.045, 0, TAU); ctx.arc(hx + s * 0.12, hy + s * 0.08, s * 0.045, 0, TAU); ctx.fill();   // ojos
  if (Math.sin(T * 3.3 + bg.ph) > 0.55) { ctx.strokeStyle = 'rgb(200,40,40)'; ctx.lineWidth = Math.max(1, s * 0.05); ctx.lineCap = 'round';   // lengua bífida (flick)
    ctx.beginPath(); ctx.moveTo(hx + s * 0.3, hy); ctx.lineTo(hx + s * 0.52, hy - s * 0.05); ctx.moveTo(hx + s * 0.44, hy); ctx.lineTo(hx + s * 0.52, hy + s * 0.06); ctx.stroke(); }

function fxDrawLavaLight(l) {                                          // luz parpadeante (parpadeo irregular)

// Línea PUNTEADA por el centro de la pista (sobre los waypoints): blanca en parque, azul en tecno. Horneada en el
// piso ANTES de calar el corredor → se ve sólo sobre la calle. Corta en la costura del portal (saltos > 1200).
function drawCenterMarks(track) {
  const theme = themeOf(track);
  if (theme !== 0 && theme !== 3 && theme !== 5) return;
  const wp = TRACKPOINT_MAPS[track]; if (!wp || wp.length < 2) return;
  ctx.save();
  ctx.strokeStyle = (theme === 0 || theme === 5) ? 'rgba(255,255,255,0.5)' : 'rgba(70,170,255,0.6)';
  ctx.lineWidth = 3; ctx.lineCap = 'butt'; ctx.setLineDash([26, 32]);
  ctx.beginPath();
  let started = false;
  for (let i = 0; i < wp.length; i++) {
    const a = wp[i], b = wp[(i + 1) % wp.length];
    if (Math.hypot(b[0] - a[0], b[1] - a[1]) > 1200) { started = false; continue; }   // costura del portal → cortar la línea
    if (!started) { ctx.moveTo(a[0], a[1]); started = true; }
    ctx.lineTo(b[0], b[1]);

  ctx.setLineDash([]); ctx.restore();

// ════════════════ MOTIVOS SOBRE LOS OBSTÁCULOS (temática por bioma) ════════════════
// Posiciones generadas una vez por pared (PRNG sembrado, cacheado en w._motifs). El tamaño del motivo
// escala con el grosor de la pared, así los bordes finos quedan como textura y los bloques como "bosque".
function getWallMotifs(w) {
  if (w._motifs) return w._motifs;
  const theme = themeOf(w.track);
  const rng = mulberry32(((w.track*131 + w.id*977 + 7) >>> 0));
  const thick = Math.min(w.width, w.height);
  const mr = Math.min(thick * 0.42, xper(0.02));
  const cell = mr * 2.6, CAP = 40;                                     // tope de motivos/pared (perf en mobile)
  let cols = Math.max(1, Math.round(w.width / cell));
  let rows = Math.max(1, Math.round(w.height / cell));
  cols = Math.min(cols, CAP);
  rows = Math.min(rows, Math.max(1, Math.floor(CAP / cols)));
  const list = [];
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    list.push({
      x: w.x + (c + 0.5) * w.width / cols + (rng()-0.5) * (w.width/cols) * 0.4,
      y: w.y + (r + 0.5) * w.height / rows + (rng()-0.5) * (w.height/rows) * 0.4,
      r: mr * (0.75 + rng()*0.5), k: rng(), ph: rng()*TAU,

    if (m.k < 0.55) {
      drawCircle(m.x, m.y, r, _pc([30,88,42]));
      drawCircle(m.x - r*0.28, m.y - r*0.28, r*0.52, _pc([70,150,82]));

}

// ════════════════ INPUT (teclado + botones touch) ════════════════
const KEYMAP = {
  ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT',
  Space: 'SPACE', KeyW: 'W', KeyS: 'S', KeyA: 'A', KeyD: 'D',
  ControlLeft: 'LCTRL', Enter: 'RETURN', Escape: 'ESCAPE', KeyP: 'P', KeyF: 'F', F1: 'F1', F2: 'F2',
  ShiftLeft: 'SHIFT', ShiftRight: 'SHIFT',
};
window.addEventListener('keydown', e => {
  const name = KEYMAP[e.code];
  if (name) { keys[name] = true; if (['UP','DOWN','LEFT','RIGHT','SPACE','F1','F2'].includes(name)) e.preventDefault(); }
});
window.addEventListener('keyup', e => { const name = KEYMAP[e.code]; if (name) keys[name] = false; });

// Botones en pantalla → mismo objeto `keys`. Cada botón captura su propio puntero (multi-touch).
for (const el of document.querySelectorAll('[data-k]')) {
  const name = el.dataset.k;
  const press   = e => { e.preventDefault(); keys[name] = true;  el.classList.add('on'); try { el.setPointerCapture(e.pointerId); } catch {} };
  const release = e => { e.preventDefault(); keys[name] = false; el.classList.remove('on'); };
  el.addEventListener('pointerdown', press);
  el.addEventListener('pointerup', release);
  el.addEventListener('pointercancel', release);
  el.addEventListener('pointerleave', release);
}

// ── BOTONES DE ACCIÓN (mantener apretado): disparo / nitro. Alimentan al jugador 1. ──
const btnState = { fire: false, nitro: false };
function holdBtn(id, key) {
  const el = document.getElementById(id); if (!el) return;
  const down = e => { e.preventDefault(); btnState[key] = true;  el.classList.add('on'); try { el.setPointerCapture(e.pointerId); } catch {} };
  const up   = e => { e.preventDefault(); btnState[key] = false; el.classList.remove('on'); };
  el.addEventListener('pointerdown', down);
  el.addEventListener('pointerup', up);
  el.addEventListener('pointercancel', up);
  el.addEventListener('pointerleave', up);
}
holdBtn('btnFire', 'fire');
holdBtn('btnNitro', 'nitro');

// ── PALANCA ANALÓGICA hand-rolled (reemplaza nipplejs) ──
// Aparece donde tocás dentro de su zona y se dibuja con DOM (base + nub). Robusta ante multitouch vía
// setPointerCapture: TODOS los eventos del dedo (move/up/cancel) vuelven siempre a la zona, vaya donde vaya
// el dedo → nunca queda colgada, ni con otro dedo en un botón. Escribe en vivo en `out`: { active, x, y,
// ang, mag } en coords pantalla (+ abajo); x/y ∈ [-1,1], mag ∈ [0,1]. nipplejs en 'dynamic' perdía el
// pointerup con multitouch y dejaba el nub pegado al centro.
function createJoystick(zoneEl, opts) {
  opts = opts || {};
  const BASE_R = opts.baseR || 52, KNOB_R = opts.knobR || 30, DEAD = opts.dead || 7, aDead = opts.activeDead || 0;
  const REST = opts.restMargin || 150;                               // posición de REPOSO: REST px desde la esq inf-izq
  const out = opts.target || { active: false, x: 0, y: 0, ang: 0, mag: 0 };
  const base = document.createElement('div'), knob = document.createElement('div');
  base.style.cssText = 'position:fixed;border-radius:50%;pointer-events:none;z-index:6;display:none;width:'+(BASE_R*2)+'px;height:'+(BASE_R*2)+'px;margin:'+(-BASE_R)+'px 0 0 '+(-BASE_R)+'px;';
  knob.style.cssText = 'position:fixed;border-radius:50%;pointer-events:none;z-index:7;display:none;width:'+(KNOB_R*2)+'px;height:'+(KNOB_R*2)+'px;margin:'+(-KNOB_R)+'px 0 0 '+(-KNOB_R)+'px;';
  document.body.appendChild(base); document.body.appendChild(knob);
  // COLOR DINÁMICO (= color del tanque del jugador, vía opts.colorFn): fondo/borde/glow de base y nub
  const applyColor = col => {
    const c = col || [120,200,255], b3 = c.map(v => Math.round(v)).join(','), k3 = modifyColor(c, 55).join(','), kb3 = modifyColor(c, 95).join(',');
    base.style.background = 'radial-gradient(circle at 50% 38%,rgba('+b3+',0.13),rgba('+b3+',0.03) 70%)';
    base.style.border = '1px solid rgba('+b3+',0.42)';
    base.style.boxShadow = 'inset 0 2px 14px rgba(0,0,0,0.5),0 0 16px rgba('+b3+',0.3)';
    knob.style.background = 'radial-gradient(circle at 50% 35%,rgba('+k3+',0.95),rgba('+b3+',0.6) 70%)';
    knob.style.border = '1px solid rgba('+kb3+',0.85)';
    knob.style.boxShadow = '0 3px 10px rgba(0,0,0,0.5),0 0 16px rgba('+b3+',0.6)';
  };
  let lastColKey = '';
  const applyColorIfNeeded = () => { const col = opts.colorFn ? opts.colorFn() : null; const key = col ? col.join(',') : 'def'; if (key !== lastColKey) { applyColor(col); lastColKey = key; } };
  applyColor(null);
  let id = null, ox = 0, oy = 0, idleWanted = false;
  const showRest = () => { const dx0 = REST, dy0 = window.innerHeight - REST; base.style.left = dx0+'px'; base.style.top = dy0+'px'; knob.style.left = dx0+'px'; knob.style.top = dy0+'px'; base.style.display = 'block'; knob.style.display = 'block'; };
  const hideAll = () => { base.style.display = 'none'; knob.style.display = 'none'; };
  out.idle = show => {                                                // el loop la llama: muestra la palanca EN REPOSO (default, esq inf-izq) cuando hay carrera y no se la está tocando
    idleWanted = show;
    if (id !== null) return;                                          // tocando → manda el dedo, no piso la posición
    if (show) { applyColorIfNeeded(); showRest(); } else hideAll();
  };
  zoneEl.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' || id !== null) return;
    e.preventDefault();
    id = e.pointerId; ox = e.clientX; oy = e.clientY;
    try { zoneEl.setPointerCapture(id); } catch {}
    applyColorIfNeeded();
    base.style.left = ox+'px'; base.style.top = oy+'px'; base.style.display = 'block';
    knob.style.left = ox+'px'; knob.style.top = oy+'px'; knob.style.display = 'block';
    out.active = aDead <= 0; out.x = 0; out.y = 0; out.mag = 0;
    if (opts.onStart) opts.onStart();
  });
  zoneEl.addEventListener('pointermove', e => {
    if (e.pointerId !== id) return;
    let dx = e.clientX - ox, dy = e.clientY - oy;
    const d = Math.hypot(dx, dy);
    if (d > BASE_R) { dx = dx/d*BASE_R; dy = dy/d*BASE_R; }            // el nub se clampa al borde de la base
    knob.style.left = (ox+dx)+'px'; knob.style.top = (oy+dy)+'px';
    out.mag = Math.min(1, d / BASE_R); out.x = dx / BASE_R; out.y = dy / BASE_R;
    if (d > DEAD) out.ang = Math.atan2(dy, dx);
    out.active = out.mag > aDead;
  });
  const end = e => {
    if (e.pointerId !== id) return;
    id = null; out.active = false; out.x = 0; out.y = 0; out.mag = 0;
    if (idleWanted) showRest(); else hideAll();                       // VOLVER al reposo (default) en vez de ocultar
    if (opts.onEnd) opts.onEnd();
  };
  zoneEl.addEventListener('pointerup', end);
  zoneEl.addEventListener('pointercancel', end);
  zoneEl.addEventListener('lostpointercapture', end);
  return out;
}

// ── JOYSTICK ÚNICO de movimiento (hand-rolled) → alimenta al jugador 1. ──
// Una sola palanca omnidireccional: su vector marca el RUMBO deseado (ang) y la intensidad (mag = acelerador).
const moveStick = { active: false, ang: 0, mag: 0, x: 0, y: 0 };
if (IS_TOUCH) createJoystick(document.getElementById('jMove'),
  { target: moveStick, activeDead: 0.15, restMargin: 150, colorFn: () => (tanks[0] ? tanks[0].color : null) });   // color del tanque del jugador; reposo a 150px de la esq inf-izq
function setupJoysticks() {}   // compat: la palanca hand-rolled se crea una vez y se posiciona sola (nada que recrear al rotar)

// ── PANTALLA COMPLETA. En mobile saca la barra del navegador. iOS Safari NO soporta la Fullscreen API
//    en elementos arbitrarios → ahí falla en silencio (la alternativa es "agregar a pantalla de inicio",
//    que con los metas PWA abre sin barra). El botón está en la esquina sup-der, al lado del de atrás. ──
const EMBEDDED = (window.self !== window.top);
const fsTarget = document.documentElement;
const _reqFs  = fsTarget.requestFullscreen || fsTarget.webkitRequestFullscreen;
const _exitFs = document.exitFullscreen || document.webkitExitFullscreen;
function isFs()    { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function enterFs() { if (_reqFs)  { const p = _reqFs.call(fsTarget); if (p && p.catch) p.catch(() => {}); } }
function exitFs()  { if (_exitFs) _exitFs.call(document); }
function toggleFs(){ isFs() ? exitFs() : enterFs(); }
// Embebido en la shell del Arcade: same-origin → llamamos requestFullscreen DIRECTO sobre el doc
// padre para preservar el user-activation del tap. postMessage perdía la activación.
function toggleFsEmbedded() {
  try {
    const topDoc = window.top.document;
    if (topDoc.fullscreenElement || topDoc.webkitFullscreenElement) {
      (topDoc.exitFullscreen || topDoc.webkitExitFullscreen).call(topDoc);
    } else {
      const el = topDoc.documentElement;
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      const p = req.call(el);
      if (p && p.catch) p.catch(() => {});
    }
  } catch (e) {
    try { window.parent.postMessage({ type: 'arcade:fullscreen' }, '*'); } catch (e2) {}
  }
}
function syncFsIcon() { document.body.classList.toggle('fs-on', isFs() || EMBEDDED); }
// Al entrar/salir de fullscreen (o rotar) el viewport cambia → re-ajustar el canvas y RECREAR los
// joysticks, que si no quedan descolocados con la geometría vieja. Diferido un frame para que el layout
// ya esté aplicado cuando nipplejs mida.
function onViewportChange() { syncFsIcon(); requestAnimationFrame(() => { resize(); setupJoysticks(); }); }
document.addEventListener('fullscreenchange', onViewportChange);
document.addEventListener('webkitfullscreenchange', onViewportChange);
window.addEventListener('orientationchange', onViewportChange);
// Embebido: la shell nos avisa su estado de FS para sincronizar el ícono.
window.addEventListener('message', e => { if (e.data && e.data.type === 'arcade:fs-state') document.body.classList.toggle('fs-on', !!e.data.on); });
syncFsIcon();
const btnFs = document.getElementById('btnFs');
btnFs.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); EMBEDDED ? toggleFsEmbedded() : toggleFs(); });

// (El auto-fullscreen en el primer toque se quitó: se comía el primer tap. La pantalla completa ahora es
//  solo manual, con el botón de la esquina sup-der.)

// Toque/click directo sobre el canvas → opera el menú, el cartel de confirmación y la pantalla de
// fin de carrera. (El teclado sigue funcionando en paralelo en desktop.)
canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  const lx = (e.clientX - rect.left) / scaleX;
  const ly = (e.clientY - rect.top) / scaleY;
  const main = sprites[0];
  if (!main) return;
  if (main.menu) { main.tapMenu(lx, ly); return; }
  if (main.confirmQuit) {                                              // mitad izq = Sí (salir), mitad der = No
    if (Math.abs(ly - yper(0.56)) < yper(0.08)) {
      if (lx < xper(0.5)) main.confirmExit(); else main.confirmQuit = false;
    }
    return;
  }
  const aux = sprites.find(s => s instanceof AuxiliaryHandler);       // fin de carrera (NO sprites[last]: los pickups se appendean después)
  if (aux) aux.tap(lx, ly);
});

// Hover del mouse sobre el canvas (coords lógicas) → ilumina la opción debajo del cursor.
// Sólo con mouse (en touch no hay hover persistente).
const hover = { x: -1, y: -1, on: false };
canvas.addEventListener('pointermove', e => {
  if (e.pointerType && e.pointerType !== 'mouse') { hover.on = false; return; }
  const rect = canvas.getBoundingClientRect();
  hover.x = (e.clientX - rect.left) / scaleX;
  hover.y = (e.clientY - rect.top) / scaleY;
  hover.on = true;
  // hover = foco: la opción debajo del mouse pasa a estar "seleccionada" (dispara todos sus efectos)
  const main = sprites[0];
  if (!main) return;
  if (main.menu) main.hoverFocus(hover.y, hover.x);
  else { const aux = sprites.find(s => s instanceof AuxiliaryHandler); if (aux) aux.hoverFocus(hover.y); }
});
canvas.addEventListener('pointerleave', () => { hover.on = false; });
function rowHover(frac) { return hover.on && Math.abs(hover.y - yper(frac)) < yper(0.05); }

// Hornea el fondo estático de la pista en un canvas offscreen (una vez por pista). Intercambia el ctx
// global temporalmente para reusar fillScreen/drawDeco/Wall.draw/TrackPoint.draw tal cual.
// Camino cerrado SUAVE por una poligonal (curvas cuadráticas por los puntos medios → esquinas redondeadas).
function smoothPath(p) {
  const n = p.length, mid = i => [(p[i][0]+p[(i+1)%n][0])/2, (p[i][1]+p[(i+1)%n][1])/2];
  const m0 = mid(n-1); ctx.moveTo(m0[0], m0[1]);
  for (let i = 0; i < n; i++) { const m = mid(i); ctx.quadraticCurveTo(p[i][0], p[i][1], m[0], m[1]); }
  ctx.closePath();
}
// Corredor del mapa AUTOGENERADO: pinta TODO pared y CALA el corredor de cada copia desplazada — así lo
// que sale por un borde aparece por el otro. Soporta cualquier topología: portales en X, en Y o ambos.
function drawCorridorCarve(poly, ww, hh, track) {
  const wallc = THEME_WALL[poly.theme], edge = modifyColor(wallc, -45), hi = modifyColor(wallc, 35);
  const tmp = document.createElement('canvas'); tmp.width = bgW; tmp.height = bgH;
  const tc = tmp.getContext('2d');
  tc.setTransform(scaleX * dpr * bgK, 0, 0, scaleY * dpr * bgK, 0, 0);
  const prev = ctx; ctx = tc;
  ctx.fillStyle = rgb(wallc); ctx.fillRect(0, 0, ww, hh);             // capa pared (= infield) completa...
  drawScenery(track, ww, hh);                                        // ...escenografía GRANDE sobre el infield (lo que pise el corredor lo borra el carve)
  ctx.globalCompositeOperation = 'destination-out';
  for (const c of poly.copies) {                                      // ...calar el corredor suave de cada copia
    ctx.beginPath(); smoothPath(c.outer); smoothPath(c.inner); ctx.fill('evenodd');
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.lineJoin = 'round';
  for (const c of poly.copies) {                                      // bevel: highlight + línea oscura en ambos bordes
    ctx.strokeStyle = rgb(hi);   ctx.lineWidth = Math.max(2, xper(0.0035));
    ctx.beginPath(); smoothPath(c.outer); ctx.stroke(); ctx.beginPath(); smoothPath(c.inner); ctx.stroke();
    ctx.strokeStyle = rgb(edge); ctx.lineWidth = Math.max(1.5, xper(0.002));
    ctx.beginPath(); smoothPath(c.outer); ctx.stroke(); ctx.beginPath(); smoothPath(c.inner); ctx.stroke();
  }
  ctx = prev;                                                          // compositar la capa pared sobre el horneado
  ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.drawImage(tmp, 0, 0); ctx.restore();
}
// Corredor SUAVE de las pistas generadas: rellena lo de afuera del outer y lo de adentro del inner, con
// curvas (sin escalones). La colisión sigue siendo las tiras de pared (invisibles). theme = color de pared.
function drawSmoothCorridor(poly, ww, hh) {
  const wallc = THEME_WALL[poly.theme], edge = modifyColor(wallc, -45), hi = modifyColor(wallc, 35);
  ctx.fillStyle = rgb(wallc);
  ctx.beginPath(); ctx.rect(0, 0, ww, hh); smoothPath(poly.outer); ctx.fill('evenodd');   // afuera del outer
  ctx.beginPath(); smoothPath(poly.inner); ctx.fill();                                     // adentro del inner
  // bordes (bevel): highlight fino + línea oscura en ambos contornos
  ctx.lineJoin = 'round';
  ctx.strokeStyle = rgb(hi);   ctx.lineWidth = Math.max(2, xper(0.0035)); ctx.beginPath(); smoothPath(poly.outer); ctx.stroke(); ctx.beginPath(); smoothPath(poly.inner); ctx.stroke();
  ctx.strokeStyle = rgb(edge); ctx.lineWidth = Math.max(1.5, xper(0.002)); ctx.beginPath(); smoothPath(poly.outer); ctx.stroke(); ctx.beginPath(); smoothPath(poly.inner); ctx.stroke();
}

// Tope de memoria del fondo horneado (~38MB): los mundos GRANDES se hornean a menor resolución (bgK<1) y
// se escalan al blitear — sin esto, 4800×3000 a resolución de celu serían >100MB de canvas.
const BG_MAX_PIXELS = 4096 * 2400;
let bgK = 1;
function bgScaleFor(ww, hh) { return Math.min(1, Math.sqrt(BG_MAX_PIXELS / (ww * scaleX * dpr * hh * scaleY * dpr))); }
function bakeBackground(track) {
  bgReady = false;                                                     // mientras está en false, Wall/TrackPoint SÍ dibujan
  const ww = worldW(track), hh = worldH(track), poly = TRACK_POLY[track];
  bgK = bgScaleFor(ww, hh);
  bgW = Math.ceil(ww * scaleX * dpr * bgK); bgH = Math.ceil(hh * scaleY * dpr * bgK);   // cubre TODO el mundo (a escala bgK)
  if (!bgCanvas) bgCanvas = document.createElement('canvas');
  bgCanvas.width = bgW; bgCanvas.height = bgH;
  const bc = bgCanvas.getContext('2d');
  bc.setTransform(scaleX * dpr * bgK, 0, 0, scaleY * dpr * bgK, 0, 0);
  ctx = bc;
  // try/finally: pase lo que pase, ctx VUELVE al canvas principal. Si un draw tira excepción y ctx queda
  // apuntando al offscreen, todo el render posterior iría al buffer → pantalla negra permanente.
  try {
    fillRect(0, 0, ww, hh, THEME_FLOOR[themeOf(track)]);
    drawDeco(track, ww, hh);
    drawCenterMarks(track);                                            // línea punteada del centro (parque blanco / tecno azul) — DEBAJO de la meta
    for (const tp of trackpoints) tp.draw();                           // meta + grilla de largada — POR ENCIMA de la punteada
    if (poly && poly.copies) drawCorridorCarve(poly, ww, hh, track);   // mapa autogenerado (con o sin portales)
    else if (poly) drawSmoothCorridor(poly, ww, hh);                   // 5 circuitos curados: paredes SUAVES (curvas)
    else for (const w of walls) w.draw();                             // pistas originales: paredes con motivos
    bgTrack = track; bgReady = true;
  } finally {
    ctx = mainCtx;
  }
}

// Ranking con HISTÉRESIS: mantiene un orden estable y solo intercambia dos tanques cuando el de atrás
// supera al de adelante por un margen (RANK_EPS vueltas) → no parpadea cuando van casi emparejados.
let rankOrder = [];
const RANK_EPS = 0.02;                                                // ~2% de vuelta de ventaja para adelantar
function updateRanks() {
  if (rankOrder.length !== tanks.length || rankOrder.some(t => tanks.indexOf(t) < 0)) rankOrder = tanks.slice();
  // Los TERMINADOS quedan congelados por su orden de llegada (prog enorme decreciente con finishPos) → no se
  // reordenan más; los que corren se ordenan por progreso real (con histéresis para no parpadear).
  const prog = t => t.finished ? 1e6 - t.finishPos : (t.laps + t.lap_progress / 100);
  for (let i = 0; i < rankOrder.length - 1; i++) {
    const a = rankOrder[i], b = rankOrder[i+1];
    const eps = (a.finished || b.finished) ? 0 : RANK_EPS;            // sin margen cuando hay un terminado → asienta ya
    if (prog(b) > prog(a) + eps) { rankOrder[i] = b; rankOrder[i+1] = a; }
  }
  for (let i = 0; i < rankOrder.length; i++) rankOrder[i].rank = i + 1;
}

// ════════════════ LOOP PRINCIPAL ════════════════
let lastT = performance.now();
let T = 0;                                                             // tiempo acumulado para animaciones (menú, cuenta regresiva)
const jMoveZone = document.getElementById('jMove');
const actBtns = document.getElementById('actBtns'), nitroFill = document.getElementById('nitroFill'), fireFill = document.getElementById('fireFill');
const nfDark = document.querySelector('#btnNitro .nfDark'), fbDark = document.querySelector('#btnFire .fbDark');
const btnFireEl = document.getElementById('btnFire'), btnNitroEl = document.getElementById('btnNitro');
let padsShown = false, btnsShown = false;   // arrancan ocultos (en el menú)

// Paredes del minimapa horneadas a un canvas chico (silueta del mundo). Se reconstruye solo al cambiar de pista.
function minimapWallsImg(tr, mmW, mmH, sc, accent) {
  const key = tr + '|' + Math.round(mmW * 10) + '|' + walls.length + '|' + decoSeedFor(tr);   // re-hornea al cambiar de pista o al REGENERAR (cambia el seed → cambian escenografía/props)
  if (mmCanvas && mmKey === key) return mmCanvas;
  const SS = 2, cw = Math.max(1, Math.ceil(mmW * SS)), ch = Math.max(1, Math.ceil(mmH * SS));
  if (!mmCanvas) mmCanvas = document.createElement('canvas');
  mmCanvas.width = cw; mmCanvas.height = ch;
  const c = mmCanvas.getContext('2d');
  c.clearRect(0, 0, cw, ch);
  const theme = themeOf(tr), wallC = THEME_WALL[theme] || [120,120,120], floorC = THEME_FLOOR[theme] || [40,42,48];
  const poly = TRACK_POLY[tr], ww = worldW(tr), hh = worldH(tr);
  const prev = ctx; ctx = c;                                          // OJO: swap de ctx al canvas del minimapa → restaurar SIEMPRE (try/finally)
  try {
    ctx.save();
    ctx.setTransform(sc * SS, 0, 0, sc * SS, 0, 0);                   // mundo → mini (dibujo en coords del MUNDO)
    if (poly) {                                                        // auto/curado: refleja la PALETA real del bioma + escenografía + props
      const rings = poly.copies || [{ outer: poly.outer, inner: poly.inner }];
      ctx.globalAlpha = 0.85; ctx.fillStyle = rgb(wallC); ctx.fillRect(0, 0, ww, hh);   // INFIELD/OUTFIELD = color de PARED del bioma
      const scn = getScenery(tr, ww, hh);                              // ESCENOGRAFÍA: puntitos (textura del infield); los que pisen la calle los tapa el piso (como el carve real)
      ctx.globalAlpha = 0.5; ctx.fillStyle = rgb(modifyColorPerc(wallC, 0.5));
      for (const it of scn.items) { ctx.beginPath(); ctx.arc(it.x, it.y, 13 + it.s * 12, 0, TAU); ctx.fill(); }
      ctx.globalAlpha = 0.95; ctx.fillStyle = rgb(floorC);             // CALLE = color de PISO del bioma (banda outer\inner)
      for (const r of rings) { ctx.beginPath(); smoothPath(r.outer); smoothPath(r.inner); ctx.fill('evenodd'); }
      const fd = ensureFx(tr);                                         // PROPS visibles al costado de la pista (lo que se ve)
      if (fd) {
        ctx.globalAlpha = 0.92;
        const dots = (arr, col, rW) => { if (!arr.length) return; ctx.fillStyle = rgb(col); for (const o of arr) { ctx.beginPath(); ctx.arc(o.x, o.y, rW, 0, TAU); ctx.fill(); } };
        dots(fd.lights, [255, 150, 60], 15);                           // luces de lava (naranja)
        dots(fd.devils, [220, 60, 50], 13);                            // diablitos (rojo)
        dots(fd.snowmen, [236, 242, 250], 17);                         // muñecos (blanco)
        ctx.fillStyle = 'rgb(150,200,255)'; for (const o of fd.stands) ctx.fillRect(o.x - 17, o.y - 12, 34, 24);   // tribunas (cuadradito azul)
      }
    } else {                                                          // originales 0-9 (sin TRACK_POLY): relleno por rects de pared (legacy)
      ctx.globalAlpha = 0.6; ctx.fillStyle = rgb(wallC);
      for (const w of walls) { if (w.angle !== undefined) continue; ctx.fillRect(w.x, w.y, Math.max(8, w.width), Math.max(8, w.height)); }
    }
    ctx.restore();
  } finally { ctx = prev; }
  mmKey = key;
  return mmCanvas;
}
// ── MINIMAPA (basado en el de Snake): recuadro arriba-derecha con la forma del mundo, los tanques (jugador
// resaltado), los ítems de nitro y el recuadro de la cámara. Se dibuja en coords de PANTALLA (fijo). ──
function drawMinimap() {
  const main0 = sprites[0];
  if (!main0 || main0.menu || !tanks.length) return;
  const tr = main0.track, ww = worldW(tr), hh = worldH(tr);
  // Geometría + gradiente + endpoints de meta del minimapa son INVARIANTES por pista (SCREEN_X/Y son
  // constantes; xper/yper no dependen del resize). Se recomputaban cada frame: gradiente (alloc + 2 stops),
  // modifyColor (alloc de array) y la trig de la línea de meta (loop + 2 hypot). Cacheamos por pista.
  let ms = mmStatic;
  if (!ms || ms.tr !== tr) {
    const mmW = xper(0.17), mmH = mmW * (hh / ww);                     // mismo aspecto que el mundo
    const mmX = SCREEN_X - mmW - xper(0.012), mmY = yper(0.10);        // arriba-derecha, arrimado a los botones de la esquina
    const sc = mmW / ww, rad = yper(0.018);
    const mx = wx => mmX + wx * sc, my = wy => mmY + wy * sc;
    const accent = modifyColor(THEME_WALL[themeOf(tr)] || [120,120,120], 55);
    const bg = ctx.createLinearGradient(mmX, mmY, mmX, mmY + mmH);
    bg.addColorStop(0, 'rgba(12,16,22,0.78)'); bg.addColorStop(1, 'rgba(5,7,11,0.82)');
    let fin = null;                                                    // endpoints de la línea de meta (coords pantalla)
    const fwp = TRACKPOINT_MAPS[tr];
    if (fwp && fwp.length > 1) {
      let ftx = 0, fty = 0; const fn = fwp.length;
      for (let k = 1; k <= 3; k++) { const f = fwp[k % fn], bb = fwp[(fn - k) % fn], dx = f[0]-bb[0], dy = f[1]-bb[1]; if (Math.hypot(dx, dy) < 1200) { ftx += dx; fty += dy; } }
      const fmag = Math.hypot(ftx, fty) || 1, pxn = -fty/fmag, pyn = ftx/fmag;   // perpendicular unitario al sentido de carrera
      const fa = FINISH_ASYM[tr], hl = fa ? Math.max(fa[0], fa[1]) : (FINISHLINES[tr] ? FINISHLINES[tr][0] : 150);
      fin = { ax: mx(fwp[0][0] + pxn*hl), ay: my(fwp[0][1] + pyn*hl), bx: mx(fwp[0][0] - pxn*hl), by: my(fwp[0][1] - pyn*hl) };
    }
    ms = mmStatic = { tr, mmW, mmH, mmX, mmY, sc, rad, accent, bg, fin };
  }
  const mmW = ms.mmW, mmH = ms.mmH, mmX = ms.mmX, mmY = ms.mmY, sc = ms.sc, rad = ms.rad, accent = ms.accent;
  const mx = wx => mmX + wx * sc, my = wy => mmY + wy * sc;
  ctx.save();
  // panel redondeado con gradiente + recorte
  roundRectPath(mmX, mmY, mmW, mmH, rad);
  ctx.fillStyle = ms.bg; ctx.fill();
  ctx.save(); roundRectPath(mmX, mmY, mmW, mmH, rad); ctx.clip();
  // paredes: horneadas UNA vez por pista a un canvas chico (antes se redibujaban ~200 rects por frame → mataba el mobile)
  ctx.drawImage(minimapWallsImg(tr, mmW, mmH, sc, accent), mmX, mmY, mmW, mmH);
  // recuadro de la cámara (lo que ves) — sutil
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.2;
  ctx.strokeRect(mx(camX), my(camY), SCREEN_X*sc, SCREEN_Y*sc);
  // LÍNEA DE META/LARGADA (referencia): perpendicular a la pista en el waypoint 0, BLANCA sólida.
  if (ms.fin) {
    const ax = ms.fin.ax, ay = ms.fin.ay, bx = ms.fin.bx, by = ms.fin.by;
    ctx.lineCap = 'round';
    ctx.setLineDash([]); ctx.strokeStyle = 'rgba(255,255,255,0.98)'; ctx.lineWidth = 3.6;
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
    ctx.lineCap = 'butt';
  }
  // ítems de nitro (celestes con glow)
  for (const p of pickups) {
    ctx.globalAlpha = 0.35; ctx.fillStyle = 'rgba(90,220,255,1)'; ctx.beginPath(); ctx.arc(mx(p.x), my(p.y), 4.5, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1; ctx.beginPath(); ctx.arc(mx(p.x), my(p.y), 2.2, 0, TAU); ctx.fill();
  }
  // tanques: punto con halo; el jugador con anillo pulsante
  const pulse = 0.6 + 0.4 * Math.sin(T * 4);
  for (const t of tanks) {
    const dx = mx(t.x), dy = my(t.y);
    ctx.globalAlpha = 0.3; ctx.fillStyle = rgb(modifyColor(t.color, 80)); ctx.beginPath(); ctx.arc(dx, dy, t.ai ? 4 : 6, 0, TAU); ctx.fill();
    ctx.globalAlpha = 1; ctx.beginPath(); ctx.arc(dx, dy, t.ai ? 3 : 3.6, 0, TAU); ctx.fill();
    if (!t.ai) { ctx.strokeStyle = `rgba(255,255,255,${0.5 + 0.5*pulse})`; ctx.lineWidth = 1.6; ctx.beginPath(); ctx.arc(dx, dy, 5 + 2*pulse, 0, TAU); ctx.stroke(); }
  }
  ctx.restore();
  // marco con glow del color del tema
  ctx.strokeStyle = `rgba(${accent[0]},${accent[1]},${accent[2]},0.28)`; ctx.lineWidth = 5; roundRectPath(mmX, mmY, mmW, mmH, rad); ctx.stroke();
  ctx.strokeStyle = `rgba(${accent[0]},${accent[1]},${accent[2]},0.85)`; ctx.lineWidth = 1.8; roundRectPath(mmX, mmY, mmW, mmH, rad); ctx.stroke();
  ctx.restore();
}

// Encima de TODOS los tanques (z-order): puntero del jugador (no tapado por otros) + posición final congelada.
function drawTankOverlays() {
  const rankFont = SCREEN_X < 1000 ? RS_font : S_font;
  for (const t of tanks) {
    const r = t.radius, sx = t.x - camX, sy = t.y - camY, m = r * 3.5;
    if (sx < -m || sx > SCREEN_X + m || sy < -m || sy > SCREEN_Y + m) continue;   // fuera de cámara
    if (t.finished) {
      const rk = t.finishPos + ordinalSuffix(t.finishPos) + (t.finishPos === 1 ? '!' : '');
      createText(rankFont, rk, modifyColor(t.color, 150), null, t.x, t.y - r * 2.1, 10);
    } else if (t.id === 0) {
      const bob = Math.sin(T * 4) * r * 0.12, ty = t.y - r * 2.0 + bob, s = r * 0.5;
      ctx.save();
      ctx.fillStyle = rgb(t.color); ctx.strokeStyle = 'rgba(0,0,0,0.65)'; ctx.lineWidth = Math.max(1.2, r * 0.09);
      ctx.beginPath(); ctx.moveTo(t.x - s, ty - s); ctx.lineTo(t.x + s, ty - s); ctx.lineTo(t.x, ty + s * 0.8);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.globalAlpha = 0.85; drawCircle(t.x, ty - s * 0.35, s * 0.28, [255, 255, 255]);
      ctx.restore();
    }
  }
}

function frame(now) {
  ctx = mainCtx;                                                       // DEFENSIVO: si un horneado anterior dejó ctx apuntando al canvas offscreen (excepción a mitad de bakeBackground), reseteá. Sin esto TODO el render iría al buffer → pantalla negra permanente.
  if (typeof now !== 'number') now = performance.now();
  deltaT = Math.min((now - lastT) / 1000, 0.05);                       // clamp 50ms, igual que el original
  lastT = now;
  T += deltaT;

  // Auto-resize: algunos navegadores móviles no disparan 'resize' al rotar y el aviso "girá el teléfono"
  // quedaba pegado. Re-evaluar acá lo arregla de forma robusta (también ajusta address-bar, etc).
  if (window.innerWidth !== lastVW || window.innerHeight !== lastVH) resize();

  // Canvas oculto (iframe del Arcade en display:none al entrar/salir de otros juegos) → tamaño 0. Saltar el
  // frame (no hornear un fondo 0×0) e invalidar el horneado para rehacerlo al volver. Sin esto el re-ingreso
  // podía quedar trabado con la pantalla en negro.
  if (!canvas.width || !canvas.height || !cssW || !cssH) { bgReady = false; return; }

  // Limpiar a negro
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cssW, cssH);

  const main0 = sprites[0];
  if (main0 && !main0.menu) {
    updateCamera(main0.track);                                        // sigue al jugador (cam 0,0 si la pista entra en pantalla)
    // fondo estático horneado (se re-hornea sólo si cambió la pista o la escala del canvas)
    const ww0 = worldW(main0.track), hh0 = worldH(main0.track);
    const k = bgScaleFor(ww0, hh0);
    const ew = Math.ceil(ww0 * scaleX * dpr * k), eh = Math.ceil(hh0 * scaleY * dpr * k);
    if (!bgReady || bgTrack !== main0.track || bgW !== ew || bgH !== eh) bakeBackground(main0.track);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    const sx = camX * scaleX * dpr * bgK, sy = camY * scaleY * dpr * bgK;   // región visible del mundo (en px del horneado)
    ctx.drawImage(bgCanvas, sx, sy, canvas.width * bgK, canvas.height * bgK, 0, 0, canvas.width, canvas.height);
  } else {
    bgReady = false; camX = 0; camY = 0;                              // en menú: invalidar para re-hornear al volver a carrera
    fxTrack = -2; fxSnowballs.length = 0;                             // invalidar FX: rematch en la MISMA pista re-arma muñecos/cooldowns y limpia bolas viejas
  }

  // Transform a coords del MUNDO, con la cámara restada (para pistas chicas camX=camY=0 → idéntico a antes)
  ctx.setTransform(scaleX * dpr, 0, 0, scaleY * dpr, -camX * scaleX * dpr, -camY * scaleY * dpr);

  // process + draw por sprite (paredes/waypoints YA NO están acá: viven horneados en el fondo).
  // El AuxiliaryHandler NO dibuja acá: su overlay (cuenta regresiva / tabla de torneo / pausa) va al FINAL,
  // por ENCIMA del minimapa y los punteros (antes la tabla quedaba tapada por ellos).
  for (const sprite of sprites.slice()) { sprite.process(); if (!(sprite instanceof AuxiliaryHandler) && !(sprite instanceof Bomb)) sprite.draw(); }   // las bombas NO acá: se dibujan al final, por ENCIMA de todo lo in-game
  if (tanks.length) drawTankOverlays();                               // puntero + posición final POR ENCIMA de los tanques
  if (dbgView && tanks.length) {                                      // DEBUG (botón info): cajas de colisión del MAPA + waypoints
    ctx.strokeStyle = 'rgba(0,235,255,0.5)'; ctx.lineWidth = 1.5;
    for (const w of walls) { const cx = w.x + w.width/2, cy = w.y + w.height/2; if (cx-camX < -60 || cx-camX > SCREEN_X+60 || cy-camY < -60 || cy-camY > SCREEN_Y+60) continue;
      if (w.angle !== undefined) { ctx.save(); ctx.translate(cx, cy); ctx.rotate(w.angle); ctx.strokeRect(-w.width/2, -w.height/2, w.width, w.height); ctx.restore(); }
      else ctx.strokeRect(w.x, w.y, w.width, w.height); }
    for (const tp of trackpoints) tp.debugDraw();                     // waypoints: misma lógica que el viejo F2 (circulito que se tiñe con la línea de carrera)
  }

  if (main0 && !main0.menu) drawAmbientFx(main0.track);                // EFECTOS AMBIENTE animados por tema (baratos, culleados) — POR ENCIMA de los tanques
  for (const b of bombs) b.draw();                                     // DISPAROS por ENCIMA de todo lo in-game (ambiente, tanques, escenografía); el overlay del HUD/pausa va después

  // ── Paso de física (Matter) ── Los process() de arriba ya aplicaron las velocidades a los cuerpos;
  // acá se integran y se espeja el resultado a this.x/y/ang (lo que lee toda la lógica de juego y el draw).
  // Paso fijo (60fps de referencia, así las velocidades quedan en px/frame). No corre en menú ni en pausa.
  const racing = tanks.length > 0;
  const pauseShow = racing && main0 && !main0.menu;                    // hay carrera en curso (no menú)
  if (window.__setPauseUI) window.__setPauseUI(pauseShow, pauseShow && tanks[0].pause);   // muestra el botón de pausa sólo en carrera (estilo Pong)
  if (racing && main0 && !main0.menu && !tanks[0].pause) {
    Engine.update(engine, PHYS_STEP);
    const ww = worldW(main0.track), hh = worldH(main0.track);
    for (const t of tanks) {
      const b = t.body, r = t.radius;
      let px = b.position.x, py = b.position.y, moved = false;
      // wrap al BORDE DEL MUNDO (las pistas cerradas tienen paredes de borde → nunca llegan; las de portales
      // sí cruzan por los huecos y aparecen del otro lado, igual que el original pero a escala del mundo).
      if (px > ww + r) { px = -r; moved = true; } else if (px < -r) { px = ww + r; moved = true; }
      if (py > hh + r) { py = -r; moved = true; } else if (py < -r) { py = hh + r; moved = true; }
      if (moved) { _vScratch.x = px; _vScratch.y = py; Body.setPosition(b, _vScratch); }
      t.x = b.position.x; t.y = b.position.y; t.ang = b.angle;
      t.vel = Math.hypot(b.velocity.x, b.velocity.y) * 60;             // px/s (para la velocidad de salida de las bombas)
    }
    ensureNitroPickups();                                             // mantiene los ítems de nitro en la pista
    updateRanks();                                                    // posiciones estables (con histéresis)
    updateAmbientFx(main0.track);                                     // gameplay de efectos (nieve: muñecos tiran bolas → derrape/trompo) + mover bolas
  }

  // HUD del loop (minimapa + FPS): fijo a pantalla → translate(cam) neutraliza el scroll de la cámara.
  ctx.save(); ctx.translate(camX, camY);
  drawMinimap();
  // (FPS + cantidad de paredes 'W' van en el cartel de la IZQUIERDA, que toggea el botón info — debug unificado)
  ctx.restore();

  // Overlay del AuxiliaryHandler (cuenta regresiva / TABLA del torneo / pausa) — POR ENCIMA del HUD y todo lo demás.
  { const aux = sprites.find(s => s instanceof AuxiliaryHandler); if (aux) aux.draw(); }

  // Confirmación de salida al menú (ESC en carrera) — encima de TODO (incluida la tabla). Tocá Sí / No.
  if (sprites[0] && sprites[0].confirmQuit) {
    ctx.save(); ctx.translate(camX, camY);
    ctx.save(); ctx.globalAlpha = 0.62; ctx.fillStyle = '#000'; ctx.fillRect(0, 0, SCREEN_X, SCREEN_Y); ctx.restore();
    const overSi = hover.on && Math.abs(hover.y - yper(0.56)) < yper(0.08) && hover.x < xper(0.5);
    const overNo = hover.on && Math.abs(hover.y - yper(0.56)) < yper(0.08) && hover.x >= xper(0.5);
    createText(M_font, 'Back to menu?', [255,255,255], null, xper(0.5), yper(0.4), 18);
    createText(M_font, 'YES', [255,255,255], null, xper(0.38), yper(0.56), overSi ? 26 : 14);
    createText(M_font, 'NO', [255,255,255], null, xper(0.62), yper(0.56), overNo ? 26 : 14);
    ctx.restore();
  }

  // Los joysticks solo en táctil (en desktop se juega con teclado). En carrera se muestran; en el menú no.
  const inRace = !!sprites[0] && !sprites[0].menu && !sprites[0].confirmQuit;
  // La PALANCA de movimiento sólo en táctil (en desktop se maneja con teclado). Al TERMINAR la carrera (el
  // tanque del jugador ya cruzó / quedó finished) se apaga: el tanque pasa a IA y no quiero que la palanca
  // se siga dibujando como si todavía estuviera manejando. El display:none suelta el dedo (lostpointercapture).
  const showJoy = IS_TOUCH && inRace && !(tanks[0] && tanks[0].finished);
  if (showJoy !== padsShown) {
    padsShown = showJoy;
    jMoveZone.style.display = showJoy ? 'block' : 'none';
    if (showJoy) setupJoysticks();   // no-op (la palanca hand-rolled ya existe); se mantiene por compatibilidad
  }
  if (moveStick.idle) moveStick.idle(showJoy);                        // palanca dibujada EN REPOSO por default (esq inf-izq) cuando hay carrera; reposiciona en resize
  // Los BOTONES de disparo/nitro se muestran SIEMPRE en carrera (también en desktop) como indicadores de
  // cooldown/carga; en desktop se usan con teclado pero se ven igual.
  if (inRace !== btnsShown) { btnsShown = inRace; actBtns.style.display = inRace ? 'flex' : 'none'; }
  // Medidores del jugador en los botones: cooldown del disparo (rojo) y carga de nitro (celeste).
  // Usamos el tanque 0 SIEMPRE (aunque al terminar la carrera pase a ai): así los botones no se "apagan" de golpe
  // al finalizar — mantienen su estado real (siguen cargando si venían en cd, o quedan como están).
  const p = tanks[0], pl = p || null;
  if (fireFill) {
    const ch = pl ? Math.max(0, 1 - pl.shoot_cooling / 2) : 0;         // carga del disparo: 0 (recién disparó) → 1 (listo). cooldown = 2s
    fireFill.style.background = ch > 0.001                             // relleno rojo de abajo hacia arriba, corte DURO en el nivel de carga
      ? `linear-gradient(to top, rgba(255,90,60,0.92) ${ch*100}%, transparent ${ch*100}%)`
      : 'transparent';
    if (fbDark) fbDark.style.clipPath = `inset(${(1 - ch) * 100}% 0 0 0)`;   // bomba NEGRA sólo sobre la parte cargada (blanca mientras carga)
    if (btnFireEl) btnFireEl.style.opacity = (ch > 0.001) ? '1' : '0.4';     // visible cargando/listo, tenue apenas disparó
  }
  if (nitroFill) {
    const n = pl ? pl.nitro : 0;
    nitroFill.style.background = n > 0.001                                                        // relleno cyan de abajo hacia arriba, corte DURO en el nivel de carga
      ? `linear-gradient(to top, rgba(80,220,255,0.92) ${n*100}%, transparent ${n*100}%)`
      : 'transparent';
    if (nfDark) nfDark.style.clipPath = `inset(${(1 - n) * 100}% 0 0 0)`;                          // llama oscura SÓLO sobre la parte cargada (de abajo)
    if (btnNitroEl) btnNitroEl.style.opacity = '1';                                                // sin estado "apagado": vacío y con carga se ven igual (sólo cambia el relleno)
  }

}
// Loop resiliente: si frame() tira una excepción (transición de tamaño, estado raro al re-entrar desde el
// Arcade, etc.) NO debe matar el rAF — si no, el loop muere y la pantalla queda congelada/negra con los
// botones DOM vivos. El catch loguea una vez por mensaje y SIEMPRE re-agenda el próximo frame.
function loop(now) {
  try { frame(now); }
  catch (e) { if (window.__loopErr !== '' + e) { console.error('CrazyTanks frame error:', e); window.__loopErr = '' + e; } }
  requestAnimationFrame(loop);
}

// Al volver a esta pestaña/iframe (re-ingreso desde el Arcade): re-medir y forzar re-horneado del fondo.
document.addEventListener('visibilitychange', () => { if (!document.hidden) { resize(); bgReady = false; } });
window.addEventListener('pageshow', () => { resize(); bgReady = false; });

// ── INIT ──
resize();
jMoveZone.style.display = 'none'; actBtns.style.display = 'none';   // arrancan ocultos; el loop los muestra solo en táctil + carrera
addSprite(new MainHandler());
loop();

const hint = document.getElementById('hint');
setTimeout(() => hint.style.opacity = '0', 6000);
window.addEventListener('keydown', () => hint.style.opacity = '0', { once: true });
</script>
  <button id="btnExit" aria-label="exit" title="Exit">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
  <script>
    document.getElementById('btnExit').addEventListener('click', () => {
      // Embebido en la shell del Arcade: postMessage para volver al menú sin recargar el iframe.
      // Suelto: navegamos directo (sin confirm — mismo patrón que el resto de los juegos).
      if (window.self !== window.top) {
        try { window.parent.postMessage({ type: 'arcade:exit' }, '*'); } catch (e) {}
        return;
      }
      try { screen.orientation && screen.orientation.unlock && screen.orientation.unlock(); } catch {}
      location.href = '../../Arcade/';
    });
  </script>
  <button id="btnInfo" aria-label="info" title="Info / FPS">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
  </button>
  <div id="fpsOverlay">FPS: --</div>
  <button id="btnPause" aria-label="pausa" title="Pausa">
    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
  </button>
  <script>
    // Botón de pausa (estilo Pong): toggle vía puente; visible sólo en carrera; .on mientras está pausado.
    (function() {
      const btn = document.getElementById('btnPause');
      let shown = false;
      window.__setPauseUI = (racing, paused) => {
        if (racing !== shown) { btn.style.display = racing ? 'flex' : 'none'; shown = racing; }
        btn.classList.toggle('on', !!paused);
      };
      btn.addEventListener('pointerdown', e => { e.preventDefault(); if (window.__uiTogglePause) window.__uiTogglePause(); });
    })();
  </script>
  <script>
    (function() {
      let frameCount = 0, lastT = performance.now();
      const overlay = document.getElementById('fpsOverlay');
      function loop() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          const fps = Math.round(frameCount * 1000 / (now - lastT));
          if (overlay.style.display !== 'none') { const w = (typeof walls !== 'undefined') ? walls.length : 0; overlay.textContent = 'FPS: ' + fps + '  W: ' + w; }
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(loop);
      }
      loop();
      const btn = document.getElementById('btnInfo');
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        // El overlay arranca con display:none POR CSS — el style inline está vacío "", así que
        // comparamos con === 'block' (estado visible explícito) en vez de !== 'none' (que daba true
        // al inicio y se comía el primer tap).
        const showing = overlay.style.display === 'block';
        overlay.style.display = showing ? 'none' : 'block';
        btn.classList.toggle('on', !showing);
        if (window.__setDbg) window.__setDbg(!showing);                // muestra/oculta cajas de colisión + waypoints junto con el FPS
      });
    })();
  </script>
