<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pong</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bar-height: 66px;
    /* fuente display (arcade/geométrica) con fallback al stack de sistema si no hay red */
    --font: 'Orbitron', 'Segoe UI', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #03040a;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: var(--font);
  }
  /* Canvas a pantalla completa (sin barra inferior) — la UI son botones de esquina + menú en canvas,
     al estilo CrazyTanks. */
  #c { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

  #hint {
    position: absolute; bottom: calc(10px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    max-width: min(88vw, 480px);
    background: rgba(10,12,18,0.78); border: 1px solid rgba(255,255,255,0.10);
    padding: 12px 20px; border-radius: 14px;
    text-align: center; color: rgba(255,255,255,0.92);
    font-family: 'Segoe UI', system-ui, sans-serif;   /* sans legible para la frase larga */
    font-size: 13px; letter-spacing: 0.04em; line-height: 1.45;
    pointer-events: none; transition: opacity 0.8s; z-index: 2;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }

  /* ── UI de esquina (estilo CrazyTanks): sin barra inferior; botones chicos camuflados arriba a la
     derecha. El menú y el setup se operan en el canvas. ── */
  .cbtn {
    position: absolute; top: calc(8px + env(safe-area-inset-top));
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.55);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0; z-index: 10;
    transition: background 0.1s, transform 0.08s, border-color 0.12s, color 0.12s;
  }
  .cbtn svg { display: block; width: 15px; height: 15px; pointer-events: none; }
  .cbtn:focus { outline: none; }
  /* hover SÓLO con mouse real: en touch, :hover se queda "pegado" tras el toque (efecto de último
     seleccionado). Con (hover: hover) los teléfonos no lo aplican. */
  @media (hover: hover) { .cbtn:hover { color: #fff; border-color: rgba(120,200,255,0.5); } }
  .cbtn:active { transform: scale(0.9); }
  /* cluster derecho, de afuera hacia adentro: ✕ salir · ⓘ info · ⛶ pantalla · ⮌ atrás · ⏸ pausa */
  #btnExit  { right: calc(8px + env(safe-area-inset-right)); }
  #btnInfo  { right: calc(46px + env(safe-area-inset-right)); }
  #btnFull  { right: calc(84px + env(safe-area-inset-right)); }
  #btnBack  { right: calc(122px + env(safe-area-inset-right)); }
  #btnPause { right: calc(160px + env(safe-area-inset-right)); }
  #btnExit:active { background: rgba(240,90,95,0.28); border-color: rgba(240,90,95,0.55); color: #fff; }
  #btnInfo.on     { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); color: #fff; }
  /* atrás: visible en setup del menú y en partido. pausa: sólo en partido. (clases las pone syncUI) */
  #btnBack, #btnPause { display: none; }
  body.canback #btnBack  { display: flex; }
  body.playing #btnPause { display: flex; }
  /* ícono fullscreen: expandir / contraer según body.fs-on */
  #btnFull .ic-exit { display: none; }
  body.fs-on #btnFull .ic-enter { display: none; }
  body.fs-on #btnFull .ic-exit  { display: block; }

  /* Pads de control (mobile): dos botones APILADOS (arriba = subir, abajo = bajar), en las esquinas
     inferiores. Sólo durante el partido y en pantalla táctil. padR = jugador 1 · padL = jugador 2 (2P). */
  .pad {
    position: absolute; z-index: 5; touch-action: none;
    display: none; flex-direction: column; gap: 6px;
    bottom: calc(env(safe-area-inset-bottom) + 4px);
  }
  #padL { left: calc(6px + env(safe-area-inset-left)); }
  #padR { right: calc(6px + env(safe-area-inset-right)); }
  body.touch.playing #padR      { display: flex; }   /* jugador 1 siempre */
  body.touch.playing.two #padL  { display: flex; }   /* jugador 2 sólo en 2P */
  .ctl {
    width: 124px; height: 50px; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; padding: 0;
    transition: background 0.08s, transform 0.06s;
  }
  .ctl svg { display: block; width: 32px; height: 32px; pointer-events: none; }
  /* al apretar, el relleno toma el color de la paleta que controla: derecha = jugador 1 (cian),
     izquierda = jugador 2 (magenta, sólo 2P). */
  .ctl.held { transform: scale(0.94); }
  #padR .ctl.held { background: rgba(90,225,255,0.30);  border-color: rgba(90,225,255,0.6); }
  #padL .ctl.held { background: rgba(255,95,205,0.30); border-color: rgba(255,95,205,0.6); }

  /* Aviso de orientación: Pong se juega en HORIZONTAL. Se muestra (vía JS) cuando la pantalla está vertical. */
  #rotate {
    position: absolute; inset: 0; z-index: 50; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 22px;
    background: #05060a; color: rgba(255,255,255,0.85);
    text-align: center; padding: 24px;
  }
  #rotate svg { width: 88px; height: 88px; color: #78c8ff; animation: rotatehint 2.2s ease-in-out infinite; }
  #rotate p { font-size: 18px; letter-spacing: 0.05em; line-height: 1.6; }
  @keyframes rotatehint { 0%, 55%, 100% { transform: rotate(0deg); } 25%, 40% { transform: rotate(-90deg); } }

</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">tocá una opción del menú · en partido: ↑/↓ (W/S en 2P)</div>

  <!-- UI de esquina (estilo CrazyTanks), de afuera hacia adentro: salir · info · pantalla · atrás · pausa -->
  <button class="cbtn" id="btnExit" aria-label="salir" title="Salir">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
  <button class="cbtn" id="btnInfo" aria-label="info" title="Info (FPS)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
  </button>
  <button class="cbtn" id="btnFull" aria-label="pantalla completa" title="Pantalla completa">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
  </button>
  <button class="cbtn" id="btnBack" aria-label="atrás" title="Atrás / salir al menú">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><path d="M18 9l-6 6M12 9l6 6"/></svg>
  </button>
  <button class="cbtn" id="btnPause" aria-label="pausa" title="Pausa">
    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
  </button>

  <!-- Controles de movimiento (mobile, sólo en partido). izq sube · der baja.
       padR = jugador 1 (derecha) · padL = jugador 2 (izquierda, sólo 2P). -->
  <div class="pad" id="padL" aria-label="control jugador 2">
    <button class="ctl" data-side="L" data-dir="up" aria-label="subir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 15l7-7 7 7"/></svg></button>
    <button class="ctl" data-side="L" data-dir="dn" aria-label="bajar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l7 7 7-7"/></svg></button>
  </div>
  <div class="pad" id="padR" aria-label="control jugador 1">
    <button class="ctl" data-side="R" data-dir="up" aria-label="subir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 15l7-7 7 7"/></svg></button>
    <button class="ctl" data-side="R" data-dir="dn" aria-label="bajar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l7 7 7-7"/></svg></button>
  </div>

  <!-- Aviso: girá el teléfono a horizontal -->
  <div id="rotate">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2.5"/><line x1="10.5" y1="19" x2="13.5" y2="19" stroke-width="2"/></svg>
    <p>Girá el teléfono<br>Pong se juega en horizontal</p>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  PONG — port web del Pong.py (Pygame → Canvas 2D), mismo formato que
  //  BallsWeb/TatetiWeb. Paletas izq/der (fiel al original), física
  //  dt-based escalada a la resolución, modo fuego con rachas.
  //
  //  Mapeo de jugadores (igual que el original):
  //   · Jugador 1 = paleta DERECHA  (teclado ↑/↓ · táctil: mitad derecha)
  //   · Jugador 2 = paleta IZQUIERDA (teclado W/S · táctil: mitad izquierda
  //                  · o CPU en modo 1 jugador)
  // ════════════════════════════════════════════════════════════════════
  const TAU = Math.PI * 2;
  const rnd  = (a, b) => a + Math.random() * (b - a);
  const clampN = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  // ── TUNING KNOBS (todo en fracciones de pantalla / segundos) ──
  const PADDLE_H_FRAC   = 0.25;    // alto paleta (fracción de H)
  const PADDLE_H_MAX_FRAC = 0.25;  // tope de alto relativo a min(W,H) — evita paletas larguísimas en celu/portrait
  const PADDLE_W_FRAC   = 0.02;   // ancho paleta (fracción de W)
  const PADDLE_MARGIN_FRAC = 0.025;// separación de la paleta al borde (fracción de W)
  const BALL_R_FRAC     = 0.017;   // radio pelota (fracción de min(W,H))

  const VX0_FRAC        = 0.55;    // vx inicial del saque (W/s)
  const VX_MAX_FRAC     = 1.50;    // tope |vx| (W/s)
  const VY0_FRAC        = 0.35;    // vy inicial del saque (H/s)
  const VY_MAX_FRAC     = 1.25;    // tope |vy| (H/s)

  const PADDLE_SPEED_FRAC = 1.20;  // velocidad máx de paleta (H/s)
  const FIRE_SPEED_MULT = 1.45;    // paleta en llamas se mueve más rápido
  const ACCEL_TC        = 0.07;    // constante de tiempo de aceleración (teclado)

  const BOUNCE_ACCEL    = 1.05;    // vx ×1.05 en cada rebote con paleta
  const FIRE_BALL_MULT  = 1.25;    // vx extra cuando pega una paleta en llamas
  const WALL_ACCEL      = 1.10;    // vy ×1.10 al rebotar techo/piso (anti-estancamiento)
  const SPIN_DIV        = 2.1;     // english: vy += velPaleta / SPIN_DIV (más chico = más ángulo con el golpe; igual lo capa VY_MAX)
  const FIRE_SPIN_DIV   = 2.8;     // english extra en llamas
  const SLOW_PADDLE_FRAC= 0.25;    // si |velPaleta| < esto (H/s) → amansa el ángulo (vy ×0.5)

  const FIRE_STREAK     = 2;       // racha para prenderse fuego
  const SERVE_DELAY     = 0.7;     // pausa (s) antes de lanzar el saque

  // IA (modo 1 jugador) — juega con intención: predice el rebote, se posiciona y "tira" angulando
  // la pelota lejos del rival. Buena pero no perfecta (error de puntería + despistes ocasionales).
  // AI_BASE = valores de la CPU "equilibrada" (magenta). Cada contrincante (OPPONENTS, abajo) parte
  // de acá y pisa algunas claves para tener una PERSONALIDAD distinta. La config efectiva vive en `A`.
  const AI_BASE = {
    SPEED_MULT:   0.98,   // velocidad de la CPU vs el jugador (<1 = un poco más lenta)
    ERROR_FRAC:   0.06,   // error de puntería (fracción de H) que se suma al objetivo
    REACT_FRAC:   0.80,   // reacciona apenas la pelota cruza esta fracción de W hacia ella (proactiva)
    FLICK_TIME:   0.18,   // seg antes del impacto en que empieza a "barrer" la paleta para angular el tiro
    AIM_FRAC:     0.30,   // durante el barrido, cuánto se permite alejar del punto de impacto (fracción de paleta)
    MIX_CHANCE:   0.30,   // a veces apunta al lado random en vez de lejos del rival (impredecible)
    SMART_MIN:    2.5,    // duración (s) mínima de un período bueno (predice + angula)
    SMART_MAX:    5.0,    // máxima → pasado esto SIEMPRE entra a un período "dumb" (juega mal, como el original)
    DUMB_MIN:     0.7,    // duración (s) de un período malo
    DUMB_MAX:     1.8,
    DUMB_SPEED:   0.55,   // qué tan lenta se vuelve durante un período malo
    DUMB_DEADZONE:0.11,   // dead-zone (fracción de H): en período malo sólo se mueve si la pelota está lejos
    IDLE_AMP:     0.045,  // amplitud del vaivén suave (fracción de min(W,H)) para no quedarse muerta
    IDLE_FREQ:    2.2,    // velocidad del vaivén suave (rad/s)
    AWAKE_MIN:    4.0,    // seg despierta entre siestas (se queda LITERALMENTE dormida sin moverse)
    AWAKE_MAX:    9,
    SLEEP_MIN:    0.8,    // duración de la siesta
    SLEEP_MAX:    2.0,
  };
  // Contrincantes (modo 1 jugador): color de la paleta + overrides de IA → cada uno juega distinto.
  // glow = color del resplandor (para el negro, que es oscuro, usa un gris claro para que se vea).
  const OPPONENTS = [
    // Magenta — equilibrada (la de siempre): sin overrides.
    { name: 'Magenta', letter: 'M', col: [255, 95, 205], glow: [255, 95, 205], ai: {} },
    // Verde — agresiva/tryhard: rápida, precisa, reacciona temprano, angula mucho, casi no se despista ni duerme.
    { name: 'Verde', letter: 'V', col: [80, 230, 140], glow: [90, 245, 150], ai: {
      SPEED_MULT: 1.08, ERROR_FRAC: 0.025, REACT_FRAC: 0.92, MIX_CHANCE: 0.45, FLICK_TIME: 0.22,
      SMART_MIN: 4, SMART_MAX: 7, DUMB_MIN: 0.4, DUMB_MAX: 0.9, DUMB_SPEED: 0.7,
      AWAKE_MIN: 8, AWAKE_MAX: 14, SLEEP_MIN: 0.4, SLEEP_MAX: 0.9 } },
    // Negro — el muro/defensivo: muy precisa posicionándose pero casi nunca angula (devuelve plano), no duerme.
    { name: 'Negro', letter: 'N', col: [58, 60, 76], glow: [185, 195, 215], ai: {
      SPEED_MULT: 1.05, ERROR_FRAC: 0.02, REACT_FRAC: 0.95, MIX_CHANCE: 0.05, FLICK_TIME: 0.10, AIM_FRAC: 0.18,
      SMART_MIN: 6, SMART_MAX: 10, DUMB_MIN: 0.3, DUMB_MAX: 0.6, DUMB_SPEED: 0.8, IDLE_AMP: 0.02,
      AWAKE_MIN: 14, AWAKE_MAX: 22, SLEEP_MIN: 0.3, SLEEP_MAX: 0.6 } },
    // Amarillo — errático/payaso: tira para cualquier lado, mucho vaivén, se despista y duerme seguido. Fácil/gracioso.
    { name: 'Amarillo', letter: 'A', col: [255, 225, 70], glow: [255, 235, 90], ai: {
      SPEED_MULT: 0.95, ERROR_FRAC: 0.09, MIX_CHANCE: 0.7, IDLE_AMP: 0.09, IDLE_FREQ: 3.2,
      SMART_MIN: 1.5, SMART_MAX: 3, DUMB_MIN: 1.2, DUMB_MAX: 2.6, DUMB_SPEED: 0.45,
      AWAKE_MIN: 2.5, AWAKE_MAX: 5, SLEEP_MIN: 1.0, SLEEP_MAX: 2.2 } },
    // Celeste — principiante tranquilo: lenta, reacciona tarde, error grande, dead-zone amplia. Fácil.
    { name: 'Celeste', letter: 'C', col: [120, 210, 255], glow: [140, 220, 255], ai: {
      SPEED_MULT: 0.85, ERROR_FRAC: 0.11, REACT_FRAC: 0.62, FLICK_TIME: 0.12, MIX_CHANCE: 0.2,
      DUMB_DEADZONE: 0.16, DUMB_SPEED: 0.4, SMART_MIN: 2, SMART_MAX: 4, DUMB_MIN: 1.0, DUMB_MAX: 2.2,
      AWAKE_MIN: 3.5, AWAKE_MAX: 7, SLEEP_MIN: 1.0, SLEEP_MAX: 2.0 } },
  ];
  const SCORE_LABELS    = ['5', '10', '20', '40', '∞'];
  const WIN_POINTS      = [5, 10, 20, 40, null];   // null = práctica (sin fin)

  // ── ESTADO ──
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let bgCanvas = null;             // fondo estático (gradiente + grilla) horneado una vez por resize y blitteado
  let W = 0, H = 0, dpr = 1;
  let portrait = false;   // true = pantalla vertical → se muestra el aviso y se congela el juego (Pong va en horizontal)

  // settings
  let twoPlayers = false;          // false = 1 jugador (CPU paleta izq)
  let ptsIdx = 1;                  // índice en WIN_POINTS (arranca en 10)
  let fireEnabled = true;
  let oppIdx = 0;                  // contrincante elegido (índice en OPPONENTS) — sólo importa en 1 jugador
  let A = { ...AI_BASE };          // config de IA efectiva del contrincante actual
  function applyOpponent() { A = { ...AI_BASE, ...OPPONENTS[oppIdx].ai }; }

  // DESAFÍO: jugás 1 game (a 10) contra cada rival en orden fácil → difícil. Ganás → siguiente; perdés → fin.
  let challenge = false, challengeIdx = 0;
  const CHALLENGE_ORDER = [3, 4, 0, 1, 2];   // Amarillo → Celeste → Magenta → Verde → Negro

  // match
  let state = 'menu';              // 'menu' | 'play' | 'paused' | 'over'
  let menulevel = 0;               // 0 = elegir modo · 1 = setup (rival/puntos/fuego)
  let menuOption = 0;              // fila seleccionada dentro del nivel actual
  let confirmQuit = false;         // overlay "¿salir al menú?" durante el partido
  let winner = 0;                  // 1 = jug.1 (der), 2 = jug.2 (izq)
  let j1score = 0, j2score = 0;
  let j1racha = 0, j2racha = 0;
  let j1pulse = 0, j2pulse = 0;    // 1→0: "golpe" visual del marcador al sumar (se nota el punto)
  let showDebug = false;

  // paletas (cy = centro vertical en px, vel = velocidad px/s). freezeT/powerFireT: timers de powers (modo ladrillos)
  const right = { cy: 0, vel: 0, onFire: false, freezeT: 0, powerFireT: 0 };  // jugador 1
  const left  = { cy: 0, vel: 0, onFire: false, freezeT: 0, powerFireT: 0 };  // jugador 2 / CPU

  // ── MODO LADRILLOS (Pong + Breakout) ──
  let bricksMode = false;
  let balls = [];                  // varias bolas: {x,y,vx,vy,fire,last,trail,px,py,rx,ry,delay}
  let bricks = [];                 // ladrillos sobre la red: {x,y,w,h,power}
  let drops = [];                  // tokens de poder que caen al lado del que rompió: {x,y,vx,vy,type,side,windup,trail}
  const BRICK_BALLS = 3;           // bolas simultáneas al arrancar
  const BRICK_BALLS_MAX = 6;       // tope (con el power de bola extra)
  const BRICK_SPEED = 0.72;        // las bolas van un poco más lentas en este modo
  const BRICK_POWER_CHANCE = 0.3;  // proba de que un ladrillo sea "con poder" (marcado en dorado)
  const BRICK_ROWS = 9;            // ladrillos apilados a lo largo de toda la red

  // pelota
  let bx = 0, by = 0, bvx = 0, bvy = 0, serveCD = 0;
  let fireball = false, firetrail = false;
  // 3 elementos que se prenden fuego independientemente cuando la pelota encendida los toca:
  let fireTop = false, fireBot = false, fireNet = false;   // borde arriba · borde abajo · red del centro

  // color de fuego que titila (se recomputa cada frame)
  let FIRE = 'rgb(255,180,0)';

  // fuentes: display (arcade) para títulos/marcador, sans legible para texto denso
  const FONT    = "'Orbitron', 'Segoe UI', system-ui, sans-serif";
  const FONT_UI = "'Segoe UI', system-ui, sans-serif";

  // partículas de fuego (brasas + chispas) — se emiten desde la pelota y paletas encendidas
  const embers = [];
  const sparks = [];                       // chispas neón de impacto (rebotes), con color propio
  const ballTrail = [];                    // posiciones recientes de la pelota para la estela
  const TRAIL_LEN = 26;   // más puntos: la física ahora corre a 120 Hz, así la estela mantiene su largo

  // ── PALETA NEÓN (look futurista) ──
  const NEON_P1   = [90, 225, 255];        // cian — jugador 1 (paleta derecha)
  const NEON_P2   = [255, 95, 205];        // magenta — jugador 2 / CPU (paleta izquierda)
  const NEON_BALL = [195, 245, 255];       // pelota
  const NEON_GRID = [70, 140, 210];        // grilla de fondo
  const rgba = (c, a) => `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${a == null ? 1 : a})`;
  // color efectivo de la paleta izquierda: en 2P es el jugador 2 (magenta); en 1P, el contrincante elegido.
  // `glow` puede diferir del cuerpo (p.ej. el negro tiene cuerpo oscuro pero resplandor gris claro).
  const leftCol  = () => twoPlayers ? NEON_P2 : OPPONENTS[oppIdx].col;
  const leftGlow = () => twoPlayers ? NEON_P2 : OPPONENTS[oppIdx].glow;

  // ── GETTERS DE GEOMETRÍA (dependientes de la resolución actual) ──
  const paddleH = () => Math.min(PADDLE_H_FRAC * H, PADDLE_H_MAX_FRAC * Math.min(W, H));
  const paddleW = () => Math.max(8, PADDLE_W_FRAC * W);
  const paddleMargin = () => PADDLE_MARGIN_FRAC * W;
  const ballR   = () => Math.max(5, BALL_R_FRAC * Math.min(W, H));
  const vxMax   = () => VX_MAX_FRAC * W;
  const vyMax   = () => VY_MAX_FRAC * H;
  const paddleSpeed = () => PADDLE_SPEED_FRAC * H;
  const leftX  = () => paddleMargin();                       // borde izq de la paleta izquierda
  const rightX = () => W - paddleMargin() - paddleW();       // borde izq de la paleta derecha

  // ── SAQUE / RESET ──
  function serve(dir) {
    bx = W / 2;
    by = rnd(ballR(), H - ballR());
    bvx = dir * VX0_FRAC * W * rnd(0.85, 1.15);
    bvy = rnd(-1, 1) * VY0_FRAC * H * 0.6;
    serveCD = SERVE_DELAY;
    fireball = false; firetrail = false; fireTop = false; fireBot = false; fireNet = false;
    ballTrail.length = 0;                              // sin estela cruzando la cancha al sacar
    prevBx = bx; prevBy = by; rbx = bx; rby = by;      // sin streak de interpolación tras el reset
  }
  function newMatch() {
    j1score = 0; j2score = 0; j1racha = 0; j2racha = 0;
    right.cy = left.cy = H / 2;
    right.vel = left.vel = 0;
    updateFireStates();
    winner = 0;
    state = 'play';
    serve(Math.random() < 0.5 ? -1 : 1);
  }
  function updateFireStates() {
    right.onFire = fireEnabled && j1racha >= FIRE_STREAK;
    left.onFire  = fireEnabled && j2racha >= FIRE_STREAK;
  }

  function scorePoint(scorer) {
    if (scorer === 1) { j1score++; j1racha++; j2racha = 0; j1pulse = 1; }
    else              { j2score++; j2racha++; j1racha = 0; j2pulse = 1; }
    fireball = false; firetrail = false; fireTop = false; fireBot = false; fireNet = false;
    updateFireStates();
    const cond = WIN_POINTS[ptsIdx];
    if (cond != null && (j1score >= cond || j2score >= cond)) {
      winner = scorer;
      state = 'over';
    } else {
      // saque hacia el que recibió el punto en contra (jug. que falló)
      serve(scorer === 1 ? -1 : 1);
    }
  }

  // ── FÍSICA ──
  function updatePaddle(p, dt, isCPU, isRight) {
    let maxSpd = paddleSpeed() * (p.onFire ? FIRE_SPEED_MULT : 1);
    if (isCPU) maxSpd *= A.SPEED_MULT * aiSpeedScale;
    if (isCPU && aiSleeping) { p.vel = 0; return; }   // dormida: no hace NADA (sobreescribe el resto)
    if (isCPU) {
      if (aiFlickVel !== 0) {
        // BARRIDO del tiro: velocidad fija en la dirección elegida, manteniéndose dentro de una
        // ventana alrededor del punto de impacto para no dejar pasar la pelota. Garantiza que la
        // paleta esté en movimiento en el contacto → la pelota sale angulada (no plana).
        p.vel = aiFlickVel;
        p.cy += p.vel * dt;
        const span = paddleH() * A.AIM_FRAC;
        p.cy = clampN(p.cy, aiBaseY - span, aiBaseY + span);
      } else {
        // CPU posicionándose: persigue aiTarget
        const want = aiTarget - p.cy;
        const step = clampN(want, -maxSpd * dt, maxSpd * dt);
        p.vel = step / dt;
        p.cy += step;
      }
    } else {
      // humano: botones de hold (sube/baja) + teclado, con aceleración suave
      const b = isRight ? pad.R : pad.L;
      let dir = 0;
      if (isRight) { if (keys.has('arrowup') || b.up) dir -= 1; if (keys.has('arrowdown') || b.dn) dir += 1; }
      else         { if (keys.has('w')       || b.up) dir -= 1; if (keys.has('s')         || b.dn) dir += 1; }
      const targetVel = dir * maxSpd;
      const k = 1 - Math.exp(-dt / ACCEL_TC);
      p.vel += (targetVel - p.vel) * k;
      p.cy += p.vel * dt;
    }
    const half = paddleH() / 2;
    if (p.cy < half)     { p.cy = half;     p.vel = 0; }
    if (p.cy > H - half) { p.cy = H - half; p.vel = 0; }
  }

  // IA de la paleta izquierda (modo 1 jugador). Predice dónde va a llegar la pelota reflejando
  // los rebotes en techo/piso y la devuelve CON INTENCIÓN: se posiciona y, justo antes del impacto,
  // barre la paleta para mandar la pelota lejos del rival. No juega perfecto (error + despistes).
  let aiTarget = 0, aiError = 0, aiAimDir = 1, aiWasApproaching = false;
  let aiFlickVel = 0, aiBaseY = 0;        // barrido del tiro: velocidad fija + centro alrededor del cual cubre
  let aiMode = 'smart', aiModeCD = 3;     // ciclo bueno/malo (ver constantes AI_SMART/AI_DUMB)
  let aiSpeedScale = 1;                   // 1 normal, <1 durante período malo (lo lee updatePaddle)
  let aiSleeping = false, aiSleepCD = 5;  // siesta: dormida sin moverse (sobreescribe el movimiento)

  // extrapola la y de la pelota hasta la cara de la paleta izquierda, reflejando en techo/piso.
  function predictBallY() {
    const r = ballR();
    const faceX = leftX() + paddleW() + r;
    if (bvx >= 0) return null;                 // no viene hacia la CPU
    const dx = bx - faceX;
    if (dx <= 0) return by;
    const tHit = dx / Math.abs(bvx);
    let y = by + bvy * tHit;
    const lo = r, hi = H - r, span = hi - lo;  // reflejar dentro de [r, H-r] (rebote triangular)
    if (span > 0) {
      let m = (y - lo) % (2 * span);
      if (m < 0) m += 2 * span;
      y = m <= span ? lo + m : lo + (2 * span - m);
    }
    return y;
  }

  // vaivén suave (seno) para que la paleta respire sin teletransportarse — amplitud chica.
  function idleSway() {
    return Math.sin(performance.now() / 1000 * A.IDLE_FREQ) * A.IDLE_AMP * Math.min(W, H);
  }

  function updateAI(dt) {
    // SIESTA: alterna períodos despierta/dormida. Sólo togglea el flag; el resto de la lógica
    // (ciclos, predicción, posicionamiento) sigue procesándose igual — updatePaddle es quien
    // sobreescribe el movimiento a 0 mientras duerme.
    aiSleepCD -= dt;
    if (aiSleepCD <= 0) {
      aiSleeping = !aiSleeping;
      aiSleepCD = aiSleeping ? rnd(A.SLEEP_MIN, A.SLEEP_MAX) : rnd(A.AWAKE_MIN, A.AWAKE_MAX);
    }

    // CICLO bueno/malo: el timer fuerza un período "dumb" cada tanto (juega mal como el original).
    aiModeCD -= dt;
    if (aiModeCD <= 0) {
      if (aiMode === 'smart') { aiMode = 'dumb';  aiModeCD = rnd(A.DUMB_MIN, A.DUMB_MAX); }
      else                    { aiMode = 'smart'; aiModeCD = rnd(A.SMART_MIN, A.SMART_MAX); }
    }
    aiFlickVel = 0;

    if (aiMode === 'dumb') {
      // PERÍODO MALO: no predice, sigue la y ACTUAL de la pelota con dead-zone y lento, sin angular.
      // Contra una pelota que rebota llega tarde/al lugar equivocado → pierde puntos, bien humano.
      aiSpeedScale = A.DUMB_SPEED;
      aiWasApproaching = false;
      if (bvx < 0 && Math.abs(by - left.cy) > A.DUMB_DEADZONE * H) aiTarget = by;
      else aiTarget = left.cy + idleSway();                  // si no, se queda (apenas respira)
      return;
    }

    // PERÍODO BUENO
    aiSpeedScale = 1;
    const approaching = bvx < 0 && bx < W * A.REACT_FRAC;   // viene y ya cruzó el umbral de reacción
    if (approaching) {
      // al empezar un intercambio entrante, elige hacia dónde devolver: lejos del rival (intención),
      // con una chance de tirar al azar para no ser predecible.
      if (!aiWasApproaching) {
        aiAimDir = right.cy < H / 2 ? 1 : -1;                // rival arriba → manda abajo (y viceversa)
        if (Math.random() < A.MIX_CHANCE) aiAimDir = Math.random() < 0.5 ? -1 : 1;
        aiError = rnd(-1, 1) * A.ERROR_FRAC * Math.min(W, H);  // sesgo de puntería fijo para este intercambio
      }
      aiWasApproaching = true;
      const pred = predictBallY();
      aiBaseY = (pred == null ? by : pred) + aiError;
      const faceX = leftX() + paddleW() + ballR();
      const tHit = Math.max(0, (bx - faceX) / Math.abs(bvx || 1));
      const span = paddleH() * A.AIM_FRAC;
      if (tHit < A.FLICK_TIME && Math.abs(left.cy - aiBaseY) <= span) {
        // YA posicionada y a punto de pegar: BARRE la paleta a velocidad fija en la dirección del tiro.
        // Como el spin sale de la velocidad de la paleta, la pelota sale angulada y fuerte (no plana).
        // Sólo si ya llegó: si está lejos, sigue persiguiendo (abajo) — sin teletransporte.
        aiFlickVel = aiAimDir * paddleSpeed() * A.SPEED_MULT;
      } else {
        aiTarget = aiBaseY;                                  // posicionarse (si no llega a tiempo, pierde: justo)
      }
    } else {
      aiWasApproaching = false;
      // pelota alejándose → se adelanta hacia el centro pero del lado al que tiró, con vaivén suave.
      const anchor = bvx > 0 ? H / 2 + aiAimDir * H * 0.12 : left.cy;
      aiTarget = anchor + idleSway();
    }
  }

  function paddleHit(p, isRight) {
    const pw = paddleW(), ph = paddleH(), r = ballR();
    const px = isRight ? rightX() : leftX();
    const movingInto = isRight ? bvx > 0 : bvx < 0;
    if (!movingInto) return;
    const overlapX = bx + r > px && bx - r < px + pw;
    const overlapY = by + r > p.cy - ph / 2 && by - r < p.cy + ph / 2;
    if (!(overlapX && overlapY)) return;

    // sacar la pelota del cuerpo de la paleta (evita que se trabe en el borde)
    bx = isRight ? px - r : px + pw + r;

    if (p.onFire) {
      bvx *= FIRE_BALL_MULT;
      bvy += p.vel / FIRE_SPIN_DIV;
      fireball = true; firetrail = true;
    } else {
      firetrail = false;
    }
    if (Math.abs(p.vel) < SLOW_PADDLE_FRAC * H) bvy *= 0.5;   // paleta casi quieta → rebote manso
    bvx = -bvx * BOUNCE_ACCEL;
    bvy += p.vel / SPIN_DIV;
    bvx = clampN(bvx, -vxMax(), vxMax());
    // chispas en el color de la paleta (naranja si está en llamas)
    const col = p.onFire ? [255, 170, 40] : (isRight ? NEON_P1 : leftGlow());
    burst(bx, by, col, 12, Math.min(W, H) * 0.6, ballR() * 0.5, 0.4);
  }

  function updateBall(dt) {
    if (serveCD > 0) { serveCD -= dt; return; }   // congelada en el saque
    const r = ballR();
    bx += bvx * dt;
    by += bvy * dt;
    ballTrail.push({ x: bx, y: by });                 // estela
    if (ballTrail.length > TRAIL_LEN) ballTrail.shift();

    // techo / piso — si la pelota viene encendida, prende ese borde
    if (by > H - r) { by = H - r; bvy = -Math.abs(bvy) * WALL_ACCEL; burst(bx, H, fireball ? [255, 170, 40] : NEON_P1, 7, Math.min(W, H) * 0.5, r * 0.4, 0.3); if (fireball) fireBot = true; }
    if (by < r)     { by = r;     bvy =  Math.abs(bvy) * WALL_ACCEL; burst(bx, 0, fireball ? [255, 170, 40] : NEON_P1, 7, Math.min(W, H) * 0.5, r * 0.4, 0.3); if (fireball) fireTop = true; }

    paddleHit(right, true);
    paddleHit(left, false);
    bvy = clampN(bvy, -vyMax(), vyMax());

    // red de fuego: la pelota encendida cruza el centro
    if (fireball && Math.abs(bx - W / 2) < 0.02 * W) fireNet = true;
    if (!fireball) { fireTop = false; fireBot = false; fireNet = false; }

    // puntos: la pelota sale por un borde (sin chispas: no es un rebote, la pelota se va)
    if (bx - r > W)  scorePoint(2);   // sale por la derecha → falló jug.1 → punto jug.2
    else if (bx + r < 0) scorePoint(1); // sale por la izquierda → falló jug.2 → punto jug.1
  }

  // ════════════ MODO LADRILLOS ════════════
  // Varias bolas + un clúster de ladrillos en el centro. Romper un ladrillo suma 1 punto al ÚLTIMO que
  // tocó esa bola y le da un power al azar. Gana por puntos totales (a 10), no por goles: las bolas que
  // se van por un lado reaparecen sin sumar. 1 jugador (der) contra la CPU (izq).
  function makeBall(dir) {
    const r = ballR();
    return { x: W / 2, y: rnd(r, H - r), vx: dir * VX0_FRAC * W * rnd(0.8, 1.1) * BRICK_SPEED,
             vy: rnd(-1, 1) * VY0_FRAC * H * 0.6 * BRICK_SPEED, fire: false, last: 0,
             trail: [], px: W / 2, py: H / 2, rx: W / 2, ry: H / 2, entry: 0 };
  }
  function respawnBall(b) {
    const r = ballR();
    b.x = W / 2; b.y = rnd(r, H - r);
    b.vx = (Math.random() < 0.5 ? -1 : 1) * VX0_FRAC * W * rnd(0.8, 1.1) * BRICK_SPEED;
    b.vy = rnd(-1, 1) * VY0_FRAC * H * 0.6 * BRICK_SPEED;
    b.fire = false; b.last = 0; b.trail.length = 0; b.px = b.x; b.py = b.y; b.entry = 0;
  }
  function setupBricks() {
    bricks = [];
    const bw = W * 0.026, gap = H * 0.012;            // compacto: poco espacio entre ladrillos
    const top = H * 0.05, avail = H * 0.9;            // a lo largo de casi toda la red
    const bh = (avail - (BRICK_ROWS - 1) * gap) / BRICK_ROWS;
    const x = W / 2 - bw / 2;
    for (let i = 0; i < BRICK_ROWS; i++) {
      // power = null (normal) | 'fire' (naranja) | 'ball' (cian). El color del ladrillo ya anticipa el token.
      const power = Math.random() < BRICK_POWER_CHANCE ? (Math.random() < 0.5 ? 'fire' : 'ball') : null;
      bricks.push({ x, y: top + i * (bh + gap), w: bw, h: bh, power });
    }
  }
  function startBricks() {
    bricksMode = true; challenge = false; twoPlayers = false; ptsIdx = 1;   // a 10 puntos
    oppIdx = 0; applyOpponent();
    j1score = 0; j2score = 0;
    right.cy = left.cy = H / 2; right.vel = left.vel = 0;
    right.onFire = left.onFire = false;
    right.freezeT = left.freezeT = 0; right.powerFireT = left.powerFireT = 0;
    fireball = false; fireTop = fireBot = fireNet = false;
    setupBricks();
    balls = []; for (let i = 0; i < BRICK_BALLS; i++) balls.push(makeBall(i % 2 ? -1 : 1));
    drops = [];
    winner = 0; confirmQuit = false; state = 'play';
    embers.length = 0; sparks.length = 0;
    syncUI();
  }
  // CPU: persigue la bola entrante más cercana (reusa el "chase" de updatePaddle vía aiTarget).
  function bricksAI() {
    aiSleeping = false; aiFlickVel = 0; aiSpeedScale = 1;
    let best = null, bestX = Infinity;
    for (const b of balls) if (b.vx < 0 && b.x < bestX) { bestX = b.x; best = b; }
    aiTarget = best ? best.y + rnd(-1, 1) * A.ERROR_FRAC * Math.min(W, H) * 0.5 : H / 2;
  }
  function stepBricks(dt) {
    for (const p of [right, left]) {
      if (p.freezeT > 0) p.freezeT -= dt;
      if (p.powerFireT > 0) { p.powerFireT -= dt; p.onFire = p.powerFireT > 0; }
    }
    bricksAI();
    updatePaddle(right, dt, false, true);
    updatePaddle(left, dt, true, false);
    for (const b of balls) { b.px = b.x; b.py = b.y; stepBall(b, dt); }
  }
  function stepBall(b, dt) {
    const r = ballR();
    if (b.entry > 0) {                                   // dash diagonal de entrada (rápido); al terminar normaliza
      b.entry -= dt;
      if (b.entry <= 0) {
        const target = VX0_FRAC * W * BRICK_SPEED, sp = Math.hypot(b.vx, b.vy) || 1;
        b.vx *= target / sp; b.vy *= target / sp;        // misma dirección, velocidad del modo
      }
    }
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.trail.push({ x: b.x, y: b.y }); if (b.trail.length > 16) b.trail.shift();
    if (b.y > H - r) { b.y = H - r; b.vy = -Math.abs(b.vy) * WALL_ACCEL; }
    if (b.y < r)     { b.y = r;     b.vy =  Math.abs(b.vy) * WALL_ACCEL; }
    paddleHitBall(b, right, true);
    paddleHitBall(b, left, false);
    if (b.entry <= 0) b.vy = clampN(b.vy, -vyMax() * BRICK_SPEED, vyMax() * BRICK_SPEED);   // no frenar el dash
    for (const k of bricks) if (b.x + r > k.x && b.x - r < k.x + k.w && b.y + r > k.y && b.y - r < k.y + k.h) { breakBrick(k, b); break; }
    // gol: si la bola sale por un lado, punto para el RIVAL (sin power) y reaparece. NO corta la ronda:
    // la ronda sólo termina cuando alguien llega al total de puntos.
    if (b.x - r > W)      { addBrickPoint(2); respawnBall(b); }   // salió por la derecha → punto jug.2
    else if (b.x + r < 0) { addBrickPoint(1); respawnBall(b); }   // salió por la izquierda → punto jug.1
  }
  function paddleHitBall(b, p, isRight) {
    const pw = paddleW(), ph = paddleH(), r = ballR();
    const px = isRight ? rightX() : leftX();
    const movingInto = isRight ? b.vx > 0 : b.vx < 0;
    if (!movingInto) return;
    if (!(b.x + r > px && b.x - r < px + pw)) return;
    if (!(b.y + r > p.cy - ph / 2 && b.y - r < p.cy + ph / 2)) return;
    b.x = isRight ? px - r : px + pw + r;
    b.vx = -b.vx * BOUNCE_ACCEL;
    b.vy += p.vel / SPIN_DIV;
    if (p.onFire) { b.vx *= FIRE_BALL_MULT; b.fire = true; }
    b.vx = clampN(b.vx, -vxMax() * BRICK_SPEED, vxMax() * BRICK_SPEED);
    b.vy = clampN(b.vy, -vyMax() * BRICK_SPEED, vyMax() * BRICK_SPEED);
    b.last = isRight ? 1 : 2;                            // quién tocó por última vez (para el punto/power)
    const col = p.onFire ? [255, 170, 40] : (isRight ? NEON_P1 : leftGlow());
    burst(b.x, b.y, col, 8, Math.min(W, H) * 0.5, r * 0.5, 0.35);
  }
  function breakBrick(k, b) {
    // reflejar la bola por el lado de menor penetración
    const r = ballR(), cx = k.x + k.w / 2, cy = k.y + k.h / 2;
    const dx = b.x - cx, dy = b.y - cy;
    const penX = (k.w / 2 + r) - Math.abs(dx), penY = (k.h / 2 + r) - Math.abs(dy);
    if (penX < penY) { b.x += (dx < 0 ? -1 : 1) * penX; b.vx = (dx < 0 ? -1 : 1) * Math.abs(b.vx); }
    else             { b.y += (dy < 0 ? -1 : 1) * penY; b.vy = (dy < 0 ? -1 : 1) * Math.abs(b.vy); }
    const bcol = k.power === 'fire' ? [255, 150, 40] : k.power === 'ball' ? [120, 220, 255] : [150, 210, 255];
    burst(cx, cy, bcol, 18, Math.min(W, H) * 0.7, r * 0.6, 0.5);
    bricks.splice(bricks.indexOf(k), 1);
    // los ladrillos NO suman puntos (eso es sólo por goles). El de color SUELTA un token (fuego/bola)
    // que cae hacia el lado del que la tocó — hay que atraparlo con la paleta.
    if ((b.last === 1 || b.last === 2) && k.power) spawnDrop(cx, cy, b.last, k.power);
    if (!bricks.length) setupBricks();                  // reaparece la columna → la ronda sigue
  }
  function addBrickPoint(scorer) {
    if (scorer === 1) { j1score++; j1pulse = 1; } else { j2score++; j2pulse = 1; }
    const cond = WIN_POINTS[ptsIdx];
    if (cond != null && (j1score >= cond || j2score >= cond)) { winner = scorer; state = 'over'; }
  }
  // ── DROPS DE PODER (hay que atraparlos con la paleta) ──
  const dropR = () => Math.max(9, Math.min(W, H) * 0.022);
  function spawnDrop(x, y, side, type) {                 // side = quién rompió (1 der / 2 izq); type del ladrillo
    const dir = side === 1 ? 1 : -1;                     // cae hacia el lado del que rompió
    drops.push({ x, y, vx: dir * W * 0.16, vy: rnd(-1, 1) * H * 0.04, type, side, windup: 0.45, trail: [] });
  }
  function updateDrops(dt) {
    const r = dropR();
    for (let i = drops.length - 1; i >= 0; i--) {
      const d = drops[i];
      if (d.windup > 0) { d.windup -= dt; continue; }    // anticipación: quieto/pulsando antes de salir
      d.trail.push({ x: d.x, y: d.y }); if (d.trail.length > 10) d.trail.shift();
      d.x += d.vx * dt; d.y += d.vy * dt;
      if (d.y < r) { d.y = r; d.vy = Math.abs(d.vy); }
      if (d.y > H - r) { d.y = H - r; d.vy = -Math.abs(d.vy); }
      const p = d.side === 1 ? right : left, pw = paddleW(), ph = paddleH();
      const px = d.side === 1 ? rightX() : leftX();
      const reached = d.side === 1 ? d.x + r >= px : d.x - r <= px + pw;   // llegó al plano de la paleta
      if (reached) {
        if (d.y + r > p.cy - ph / 2 && d.y - r < p.cy + ph / 2) {          // ¡atrapado!
          applyDrop(d.side, d.type);
          burst(d.x, d.y, d.type === 'fire' ? [255, 170, 40] : [120, 220, 255], 14, Math.min(W, H) * 0.6, r * 0.5, 0.4);
          drops.splice(i, 1); continue;
        }
      }
      if (d.x < -r * 3 || d.x > W + r * 3) drops.splice(i, 1);             // se pasó de largo → perdido
    }
  }
  function applyDrop(side, type) {
    const self = side === 1 ? right : left;
    if (type === 'fire') { self.powerFireT = 10; return; }   // paleta en llamas 10s
    // bola extra: sale de TU lado hacia el rival con un DASH DIAGONAL rápido (animación de entrada),
    // sin importar dónde esté la paleta. Tras el dash se normaliza a la velocidad del modo.
    if (balls.length >= BRICK_BALLS_MAX) return;
    const dir = side === 1 ? -1 : 1, r = ballR();
    const nb = makeBall(dir);
    nb.x = side === 1 ? rightX() - r * 2 : leftX() + paddleW() + r * 2;
    nb.y = self.cy;
    const fast = VX0_FRAC * W * 2.0 * BRICK_SPEED;          // dash: ~2× la velocidad normal
    nb.vx = dir * fast;
    nb.vy = (Math.random() < 0.5 ? -1 : 1) * fast * 0.85;   // fuerte componente vertical → diagonal + rebote
    nb.last = side; nb.entry = 0.34;                        // dura el dash; al terminar se normaliza
    nb.px = nb.x; nb.py = nb.y; nb.rx = nb.x; nb.ry = nb.y;
    balls.push(nb);
  }
  function emitFireBricks() {
    const r = ballR(), s = Math.min(W, H);
    for (const [p, isR] of [[right, true], [left, false]]) {
      if (!p.onFire) continue;
      const pw = paddleW(), cx = (isR ? rightX() : leftX()) + pw / 2, ph = paddleH();
      if (Math.random() < 0.6) spawnEmber(cx + rnd(-1, 1) * pw * 0.4, p.cy + rnd(-ph / 2, ph / 2),
        rnd(-1, 1) * s * 0.05, -rnd(s * 0.1, s * 0.3), rnd(0.3, 0.6), rnd(pw * 0.5, pw * 1.2), 2);
    }
    for (const b of balls) {
      if (!b.fire) continue;
      for (let i = 0; i < 2; i++) spawnEmber(b.x + rnd(-r, r) * 0.6, b.y + rnd(-r, r) * 0.6,
        -b.vx * 0.12 + rnd(-1, 1) * s * 0.2, -b.vy * 0.12 + rnd(-1, 1) * s * 0.2,
        rnd(0.2, 0.5), rnd(r * 0.4, r * 0.8), 0);
    }
  }
  function drawBricks() {
    const s = Math.min(W, H), t = performance.now() / 1000;
    for (const k of bricks) {
      const rr = Math.min(k.w, k.h) * 0.25;
      ctx.save();
      if (k.power) {
        // ladrillo CON PODER: color según el token que suelta (naranja=fuego, cian=bola), con glow y
        // un núcleo que pulsa → se ve qué da antes de romperlo.
        const pul = 0.6 + 0.4 * Math.sin(t * 5);
        const col = k.power === 'fire' ? [255, 150, 40] : [120, 220, 255];
        ctx.shadowColor = rgba(col, 0.9); ctx.shadowBlur = s * 0.025 * pul;
        ctx.fillStyle = rgba(col, 0.22 + 0.14 * pul);
        roundRect(k.x, k.y, k.w, k.h, rr); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = rgba(col, 0.95); ctx.lineWidth = Math.max(1.5, s * 0.0035);
        roundRect(k.x, k.y, k.w, k.h, rr); ctx.stroke();
        ctx.fillStyle = `rgba(255,255,255,${0.5 + 0.45 * pul})`;       // núcleo pulsante (indicador)
        ctx.beginPath(); ctx.arc(k.x + k.w / 2, k.y + k.h / 2, Math.min(k.w, k.h) * 0.26, 0, TAU); ctx.fill();
      } else {
        ctx.shadowColor = 'rgba(120,200,255,0.5)'; ctx.shadowBlur = s * 0.02;
        ctx.fillStyle = 'rgba(150,210,255,0.16)';
        roundRect(k.x, k.y, k.w, k.h, rr); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(185,225,255,0.85)'; ctx.lineWidth = Math.max(1.5, s * 0.003);
        roundRect(k.x, k.y, k.w, k.h, rr); ctx.stroke();
      }
      ctx.restore();
    }
  }
  // tokens de poder cayendo hacia el lado del que rompió (hay que atraparlos)
  function drawDrops() {
    const tt = performance.now() / 1000;
    for (const d of drops) {
      const r = dropR();
      const wob = d.windup > 0 ? (1 - d.windup / 0.45) : 1;
      const sc = 0.45 + 0.55 * Math.min(1, wob * 1.3);    // escala-in durante la anticipación
      const pul = 0.6 + 0.4 * Math.sin(tt * 8);
      const col = d.type === 'fire' ? [255, 150, 40] : [120, 220, 255];
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.lineCap = 'round';
      for (let i = 1; i < d.trail.length; i++) {           // estela "llegando"
        const t = i / d.trail.length, a = d.trail[i - 1], c = d.trail[i];
        ctx.strokeStyle = rgba(col, 0.18 * t); ctx.lineWidth = r * 1.2 * t;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(c.x, c.y); ctx.stroke();
      }
      const g = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, r * 2.6 * sc);
      g.addColorStop(0, rgba(col, 0.7 * pul)); g.addColorStop(1, rgba(col, 0));
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(d.x, d.y, r * 2.6 * sc, 0, TAU); ctx.fill();
      if (d.windup > 0) {                                  // anillo de anticipación antes de salir
        ctx.strokeStyle = rgba(col, 0.5 * pul); ctx.lineWidth = r * 0.3;
        ctx.beginPath(); ctx.arc(d.x, d.y, r * (1.9 + 0.6 * pul), 0, TAU); ctx.stroke();
      }
      ctx.globalCompositeOperation = 'source-over';
      // chip CUADRADO redondeado (forma distinta a las bolas, que son redondas) + ícono según el tipo
      const sz = r * sc * 1.7;
      ctx.fillStyle = rgba(col, 0.95);
      roundRect(d.x - sz / 2, d.y - sz / 2, sz, sz, sz * 0.28); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = Math.max(1, r * 0.12);
      roundRect(d.x - sz / 2, d.y - sz / 2, sz, sz, sz * 0.28); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      if (d.type === 'fire') {                            // ícono llama: triángulo apuntando arriba
        ctx.beginPath();
        ctx.moveTo(d.x, d.y - sz * 0.26);
        ctx.lineTo(d.x + sz * 0.22, d.y + sz * 0.22);
        ctx.lineTo(d.x - sz * 0.22, d.y + sz * 0.22);
        ctx.closePath(); ctx.fill();
      } else {                                            // ícono bola: aro
        ctx.lineWidth = Math.max(1.5, r * 0.18); ctx.strokeStyle = 'rgba(255,255,255,0.95)';
        ctx.beginPath(); ctx.arc(d.x, d.y, sz * 0.26, 0, TAU); ctx.stroke();
      }
      ctx.restore();
    }
  }
  function drawBallObj(b) {
    const r = ballR(), x = b.rx, y = b.ry;
    const col = b.fire ? [255, 180, 50] : NEON_BALL;
    ctx.globalCompositeOperation = 'lighter';
    ctx.lineCap = 'round';
    for (let i = 1; i < b.trail.length; i++) {
      const t = i / b.trail.length, a = b.trail[i - 1], c = b.trail[i];
      ctx.strokeStyle = rgba(col, 0.12 * t); ctx.lineWidth = r * 2 * (0.3 + 0.7 * t);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(c.x, c.y); ctx.stroke();
    }
    const gr = r * 2.2, g = ctx.createRadialGradient(x, y, 0, x, y, gr);
    if (b.fire) { g.addColorStop(0, 'rgba(255,220,150,0.6)'); g.addColorStop(1, 'rgba(255,60,0,0)'); }
    else { g.addColorStop(0, rgba(NEON_BALL, 0.55)); g.addColorStop(1, rgba(NEON_P1, 0)); }
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, gr, 0, TAU); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    const cg = ctx.createRadialGradient(x - r * 0.35, y - r * 0.35, r * 0.05, x, y, r);
    if (b.fire) { cg.addColorStop(0, '#fffdf2'); cg.addColorStop(0.5, 'rgba(255,196,80,1)'); cg.addColorStop(1, 'rgba(214,96,12,1)'); }
    else { cg.addColorStop(0, '#fff'); cg.addColorStop(0.5, rgba(NEON_BALL, 1)); cg.addColorStop(1, 'rgba(64,150,200,1)'); }
    ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
  }

  // ── INPUT ──
  const keys = new Set();
  addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    keys.add(k);
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
    if (state === 'menu') { if (!e.repeat) handleMenuKey(k); return; }   // navegación del menú
    if (k === 'escape') { onBack(); return; }                           // ESC: abre/cierra "¿salir?"
    if (confirmQuit) { if (k === 'enter' || k === ' ') backToMenu(); return; }  // confirmar salida
    if (k === 'p') togglePause();
    if ((k === 'enter' || k === ' ') && state === 'over') overAdvance();
  });
  addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));
  addEventListener('blur', () => keys.clear());

  // Botones de control (hold): izquierda = sube, derecha = baja. R = jugador 1, L = jugador 2.
  const pad = { R: { up: false, dn: false }, L: { up: false, dn: false } };
  function holdCtl(el) {
    const side = el.dataset.side, dir = el.dataset.dir === 'up' ? 'up' : 'dn';
    const set = v => { pad[side][dir] = v; el.classList.toggle('held', v); };
    el.addEventListener('pointerdown', e => { e.preventDefault(); try { el.setPointerCapture(e.pointerId); } catch {} set(true); });
    el.addEventListener('pointerup', () => set(false));
    el.addEventListener('pointercancel', () => set(false));
  }
  document.querySelectorAll('.ctl').forEach(holdCtl);

  // Detección de PC (sin pantalla táctil): ahí se juega con teclado. Los pads se muestran/ocultan por
  // CSS según body.touch.playing — acá sólo seteamos la clase.
  const isTouch = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches)
                  || 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  document.body.classList.toggle('touch', isTouch);

  // Toque directo en el canvas: opera el menú (elegir/ajustar), confirma salida, reinicia (fin de
  // partida) o reanuda (pausa). Coords relativas al canvas (= px lógicos, no hay escala interna).
  canvas.addEventListener('pointerdown', e => {
    hint.style.opacity = '0';
    const rect = canvas.getBoundingClientRect();
    const lx = e.clientX - rect.left, ly = e.clientY - rect.top;
    if (state === 'menu')   { tapMenu(lx, ly); return; }
    if (confirmQuit)        { tapConfirm(lx, ly); return; }
    if (state === 'over')   { overAdvance(); return; }
    if (state === 'paused') { togglePause(); return; }
  });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ── MENÚ (estilo CrazyTanks): nivel 0 = elegir modo · nivel 1 = setup (rival/puntos/fuego) ──
  // Filas del nivel 0 (modo), con su Y en fracción de H.
  function menuLevel0() {
    return [
      { key: '1p',        label: 'Un Jugador',    y: 0.40 },
      { key: '2p',        label: 'Dos Jugadores', y: 0.49 },
      { key: 'challenge', label: 'Desafío',       y: 0.58 },
      { key: 'bricks',    label: 'Ladrillos',     y: 0.67 },
      { key: 'exit',      label: 'Salir',         y: 0.76 },
    ];
  }
  // Filas del setup (nivel 1): en 2P se omite "Rival". Centradas verticalmente según cuántas haya.
  function menuSetupRows() {
    const keys = twoPlayers ? ['puntos', 'fuego'] : ['rival', 'puntos', 'fuego'];
    const span = 0.12, mid = 0.55, y0 = mid - span * (keys.length - 1) / 2;
    return keys.map((key, i) => ({ key, y: y0 + i * span }));
  }
  const PLAY_BTN_Y = 0.85;
  function setupRowLabel(key) {
    if (key === 'rival')  return 'Rival: ' + OPPONENTS[oppIdx].name;
    if (key === 'puntos') return 'Puntos: ' + (WIN_POINTS[ptsIdx] == null ? 'Práctica' : SCORE_LABELS[ptsIdx]);
    return 'Fuego: ' + (fireEnabled ? 'Sí' : 'No');
  }
  function setupCycle(key, dir) {
    if (key === 'rival')       { oppIdx = (oppIdx + dir + OPPONENTS.length) % OPPONENTS.length; applyOpponent(); }
    else if (key === 'puntos') { ptsIdx = (ptsIdx + dir + WIN_POINTS.length) % WIN_POINTS.length; }
    else                         fireEnabled = !fireEnabled;
  }
  // navegación con teclado
  function handleMenuKey(k) {
    if (k === 'arrowup'    || k === 'w') menuMove(-1);
    else if (k === 'arrowdown'  || k === 's') menuMove(1);
    else if (k === 'arrowleft'  || k === 'a') menuAdjust(-1);
    else if (k === 'arrowright' || k === 'd') menuAdjust(1);
    else if (k === 'enter' || k === ' ')      menuConfirm();
    else if (k === 'escape')                  onBack();
  }
  function menuMove(d)   { const n = (menulevel === 0 ? menuLevel0() : menuSetupRows()).length; menuOption = (menuOption + d + n) % n; }
  function menuAdjust(d) { if (menulevel !== 1) return; const r = menuSetupRows()[menuOption]; if (r) setupCycle(r.key, d); }
  function menuConfirm() {
    if (menulevel === 0) {
      const r = menuLevel0()[menuOption];
      if (r.key === '1p')           { twoPlayers = false; gotoSetup(); }
      else if (r.key === '2p')      { twoPlayers = true;  gotoSetup(); }
      else if (r.key === 'challenge') startChallenge();
      else if (r.key === 'bricks')    startBricks();
      else                            exitToArcade();
    } else startGame();
  }
  function gotoSetup() { menulevel = 1; menuOption = 0; applyOpponent(); syncUI(); }

  // toque sobre el menú (coords del canvas)
  function tapMenu(lx, ly) {
    const near = f => Math.abs(ly - f * H) < H * 0.06;
    if (menulevel === 0) {
      const rows = menuLevel0();
      for (let i = 0; i < rows.length; i++) if (near(rows[i].y)) { menuOption = i; menuConfirm(); return; }
    } else {
      const dir = lx < W / 2 ? -1 : 1;                  // mitad izq/der = anterior/siguiente valor
      const rows = menuSetupRows();
      for (let i = 0; i < rows.length; i++) if (near(rows[i].y)) { menuOption = i; setupCycle(rows[i].key, dir); return; }
      if (near(PLAY_BTN_Y)) startGame();
    }
  }
  function tapConfirm(lx, ly) {
    if (ly > H * 0.52 && ly < H * 0.68) { if (lx < W / 2) backToMenu(); else confirmQuit = false; }
  }

  // ── TRANSICIONES DE ESTADO ──
  function startGame()  { challenge = false; bricksMode = false; applyOpponent(); newMatch(); confirmQuit = false; syncUI(); }   // newMatch pone state='play'
  function rematch()    { if (bricksMode) { startBricks(); return; } newMatch(); confirmQuit = false; syncUI(); }
  function startChallenge() {
    challenge = true; bricksMode = false; challengeIdx = 0;
    twoPlayers = false; ptsIdx = 1;                  // 1 jugador, games a 10
    oppIdx = CHALLENGE_ORDER[0]; applyOpponent();
    newMatch(); confirmQuit = false; syncUI();
  }
  // acción al tocar/Enter en la pantalla de fin de partido
  function overAdvance() {
    if (!challenge) { rematch(); return; }
    if (winner === 1) {                              // ganaste este game
      if (challengeIdx >= CHALLENGE_ORDER.length - 1) { backToMenu(); return; }   // venciste a todos
      challengeIdx++;
      oppIdx = CHALLENGE_ORDER[challengeIdx]; applyOpponent();
      newMatch(); confirmQuit = false; syncUI();
    } else {
      backToMenu();                                  // perdiste → fin del desafío
    }
  }
  function backToMenu() {
    state = 'menu'; menulevel = 0; menuOption = twoPlayers ? 1 : 0; confirmQuit = false; challenge = false; bricksMode = false;
    embers.length = 0; sparks.length = 0; ballTrail.length = 0; balls = []; bricks = []; drops = [];
    syncUI();
  }
  function onBack() {
    if (state === 'menu') { if (menulevel === 1) { menulevel = 0; menuOption = twoPlayers ? 1 : 0; syncUI(); } return; }
    if (state === 'over') { backToMenu(); return; }
    confirmQuit = !confirmQuit;                         // en partido: abre/cierra "¿salir al menú?"
  }
  function exitToArcade() {
    if (window.self !== window.top) { try { window.parent.postMessage({ type: 'arcade:exit' }, '*'); } catch (e) {} return; }
    try { screen.orientation && screen.orientation.unlock && screen.orientation.unlock(); } catch {}
    location.href = '../../Arcade/';
  }
  // clases del body que prenden/apagan botones de esquina y pads
  function syncUI() {
    const b = document.body.classList;
    b.toggle('playing', state === 'play' || state === 'paused');
    b.toggle('two', twoPlayers);
    b.toggle('canback', state !== 'menu' || menulevel === 1);   // atrás visible en setup y en partido
    btnInfo.classList.toggle('on', showDebug);
  }

  // ── BOTONES DE ESQUINA ──
  function tappable(el, fn) { el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); }); }
  const btnInfo = document.getElementById('btnInfo');
  tappable(btnInfo, () => { showDebug = !showDebug; btnInfo.classList.toggle('on', showDebug); });
  tappable(document.getElementById('btnBack'), onBack);
  tappable(document.getElementById('btnPause'), togglePause);

  // ── PANTALLA COMPLETA + ORIENTACIÓN ───────────────────────────────────────
  // Bloque auto-contenido y REUTILIZABLE. Para portarlo a otro juego: copialo tal
  // cual y cambiá ORIENT ('landscape' | 'portrait'); el resto funciona igual. El
  // launcher (Arcade) ya desbloquea la orientación al volver, en su 'pageshow'.
  //
  // Comportamiento en Android Chrome:
  //   • PWA instalada → bloquea la orientación al CARGAR, sin gesto: entra directo
  //     en la orientación pedida y NO muestra el cartel "girá el teléfono". El área
  //     del notch/cámara se gana pidiendo Fullscreen API real en el primer toque
  //     (misma resolución que da el botón).
  //   • Pestaña del navegador → Fullscreen API + lock recién en el primer gesto
  //     (el navegador no permite ninguno de los dos sin interacción del usuario).
  //   • iOS Safari / sin soporte → falla en silencio y queda el cartel #rotate.
  const ORIENT  = 'landscape';   // ← orientación forzada de ESTE juego
  // ¿Embebidos en la shell del Arcade (iframe)? La shell maneja fullscreen + orientación
  // (las pidió al tocar el tile). El juego no las toca; sólo refleja/togglea vía postMessage.
  const EMBEDDED = (window.self !== window.top);
  if (EMBEDDED) document.body.classList.add('embedded');
  const fsTarget = document.documentElement;
  const _reqFs  = fsTarget.requestFullscreen || fsTarget.webkitRequestFullscreen;
  const _exitFs = document.exitFullscreen || document.webkitExitFullscreen;
  const isFs    = () => !!(document.fullscreenElement || document.webkitFullscreenElement);
  const isPWA   = () => (window.matchMedia && (matchMedia('(display-mode: fullscreen)').matches
                          || matchMedia('(display-mode: standalone)').matches))
                          || window.navigator.standalone === true;

  const lockOrient = () => {
    try {
      const so = screen.orientation;
      if (so && so.lock) { const p = so.lock(ORIENT); if (p && p.catch) p.catch(() => {}); }
    } catch {}
  };
  const unlockOrient = () => { try { screen.orientation && screen.orientation.unlock && screen.orientation.unlock(); } catch {} };
  const enterFs = () => {
    let p; try { p = _reqFs && _reqFs.call(fsTarget); } catch { p = null; }
    // El lock va entre o no a fullscreen (en PWA el request puede rechazar por estar
    // ya inmersa, pero la orientación igual debe quedar fijada).
    if (p && p.then) p.then(lockOrient, lockOrient);
    else lockOrient();
  };
  const exitFs  = () => { unlockOrient(); try { if (_exitFs) _exitFs.call(document); } catch {} };

  // El ícono refleja el estado EFECTIVO: dentro de la shell del Arcade ya estamos en
  // fullscreen (lo controla el documento padre, aunque este iframe no sea el fullscreenElement).
  function syncFsIcon() { document.body.classList.toggle('fs-on', isFs() || EMBEDDED); }
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);
  syncFsIcon();   // estado inicial correcto del ícono
  tappable(document.getElementById('btnFull'), () => {
    // Embebido: same-origin con la shell → llamamos requestFullscreen DIRECTO sobre el doc
    // padre para preservar el user-activation del tap (postMessage lo perdía y Chrome rechazaba).
    if (EMBEDDED) {
      try {
        const topDoc = window.top.document;
        if (topDoc.fullscreenElement || topDoc.webkitFullscreenElement) {
          (topDoc.exitFullscreen || topDoc.webkitExitFullscreen).call(topDoc);
        } else {
          const el = topDoc.documentElement;
          const req = el.requestFullscreen || el.webkitRequestFullscreen;
          const p = req.call(el);
          if (p && p.catch) p.catch(() => {});
        }
      } catch (e) {
        try { window.parent.postMessage({ type: 'arcade:fullscreen' }, '*'); } catch (e2) {}
      }
      return;
    }
    isFs() ? exitFs() : enterFs();
  });
  // Embebido: la shell nos avisa su estado de fullscreen para mantener el ícono sincronizado.
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'arcade:fs-state') document.body.classList.toggle('fs-on', !!e.data.on);
  });

  // Abierto suelto + PWA instalada: intentar landscape + Fullscreen API real apenas carga.
  // La orientación se fija siempre; el fullscreen real depende de que Chrome lo acepte sin
  // gesto. Si lo rechaza, queda el fallback del primer toque (más abajo) y no se rompe nada.
  if (!EMBEDDED && isPWA()) enterFs();

  // Primer toque (touch) en cualquier lugar = gesto válido para pedir Fullscreen API
  // real y ganar el área del notch. Reintenta en cada toque hasta lograrlo; una vez
  // conseguido NO vuelve a forzar (así no pelea si salís a propósito con el botón).
  let fsOnce = false;
  function tryAutoFs(e) {
    if (fsOnce) return;
    if (e && e.pointerType === 'mouse') return;   // en desktop no forzamos
    if (isFs()) { fsOnce = true; return; }
    enterFs();
  }
  if (!EMBEDDED) document.addEventListener('pointerdown', tryAutoFs, true);
  document.addEventListener('fullscreenchange', () => { if (isFs()) fsOnce = true; });

  function togglePause() {
    if (state === 'play') state = 'paused';
    else if (state === 'paused') state = 'play';
  }

  // ── RESIZE ──
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const oldH = H || 1;
    W = window.innerWidth;
    H = window.innerHeight;                              // canvas a pantalla completa (sin barra)
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // reubicar paletas/pelota proporcionalmente al alto nuevo
    const f = H / oldH;
    right.cy *= f; left.cy *= f; by *= f;
    // Pong se juega en horizontal: si la pantalla está vertical, mostrar el aviso de rotar.
    // Embebido: la shell del Arcade rota el iframe por CSS → el cartel NUNCA se muestra (evita
    // que se quede trabado si resize() ve cssH>cssW por un instante durante transiciones de FS).
    portrait = !EMBEDDED && window.innerHeight > window.innerWidth;
    document.getElementById('rotate').style.display = portrait ? 'flex' : 'none';
    bakeBackground();                                   // re-hornear el fondo estático al nuevo tamaño
  }
  window.addEventListener('resize', resize);

  // Hornea el fondo ESTÁTICO (gradiente radial + grilla) en un canvas offscreen una sola vez por resize.
  // Antes esto se redibujaba cada frame (un fill de gradiente a pantalla completa + ~30 líneas) — el mayor
  // costo de render en mobile. Ahora se blittea de una. Las "paredes" (que se prenden fuego) siguen vivas.
  function bakeBackground() {
    if (!bgCanvas) bgCanvas = document.createElement('canvas');
    bgCanvas.width = canvas.width; bgCanvas.height = canvas.height;
    const g = bgCanvas.getContext('2d');
    g.setTransform(dpr, 0, 0, dpr, 0, 0);
    const grad = g.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.05, W / 2, H / 2, Math.max(W, H) * 0.72);
    grad.addColorStop(0, '#0d1830'); grad.addColorStop(0.6, '#070b18'); grad.addColorStop(1, '#020308');
    g.fillStyle = grad; g.fillRect(0, 0, W, H);
    const step = Math.max(26, Math.min(W, H) * 0.06);
    g.lineWidth = 1; g.strokeStyle = rgba(NEON_GRID, 0.10);
    g.beginPath();
    for (let x = (W / 2) % step; x <= W; x += step) { g.moveTo(x, 0); g.lineTo(x, H); }
    for (let y = (H / 2) % step; y <= H; y += step) { g.moveTo(0, y); g.lineTo(W, y); }
    g.stroke();
  }

  // ── DRAW ──
  function drawBackground() {
    // blittear el fondo horneado (gradiente + grilla) a 1:1 en device-px (ignora la transform dpr del ctx)
    if (bgCanvas) { ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.drawImage(bgCanvas, 0, 0); ctx.restore(); }
    // marco neón arriba/abajo (las "paredes"). Cada borde se prende fuego por separado (dinámico).
    drawFrameLine(1.5, fireTop);
    drawFrameLine(H - 1.5, fireBot);
  }
  function drawFrameLine(y, lit) {
    const col = lit ? FIRE : rgba(NEON_P1, 0.55);
    ctx.save();
    ctx.strokeStyle = col;
    ctx.lineWidth = Math.max(2, H * 0.004) * (lit ? 1.8 : 1);
    ctx.shadowColor = col; ctx.shadowBlur = Math.min(W, H) * (lit ? 0.04 : 0.02);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.restore();
  }

  function drawNet() {
    const col = fireNet ? FIRE : rgba(NEON_P1, 0.22);
    const w = fireNet ? Math.max(4, 0.006 * W) : Math.max(2, 0.0028 * W);
    const dash = H * 0.03, gap = H * 0.022;
    ctx.save();
    ctx.strokeStyle = col;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.shadowColor = fireNet ? FIRE : rgba(NEON_P1, 0.7);
    ctx.shadowBlur = Math.min(W, H) * (fireNet ? 0.03 : 0.013);
    ctx.setLineDash([dash, gap]);
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.restore();
  }

  function drawPaddle(p, isRight) {
    const pw = paddleW(), ph = paddleH();
    const x = isRight ? rightX() : leftX();
    const y = p.cy - ph / 2;
    const r = Math.min(pw, ph) * 0.45, s = Math.min(W, H);
    const onF = p.onFire;
    // izquierda: en 2P es magenta, en 1P el color del contrincante elegido. `glow` puede diferir del
    // cuerpo (negro = cuerpo oscuro + resplandor gris claro, así se ve sobre el fondo).
    const col  = onF ? [255, 140, 30] : (isRight ? NEON_P1 : leftCol());
    const glow = onF ? [255, 140, 30] : (isRight ? NEON_P1 : leftGlow());
    // glow exterior: en fuego es naranja pero con blur contenido para no desdibujar el cuerpo
    ctx.save();
    ctx.shadowColor = rgba(glow, 0.95);
    ctx.shadowBlur = s * (onF ? 0.042 : 0.05);
    ctx.fillStyle = rgba(col, 0.9);
    roundRect(x, y, pw, ph, r); ctx.fill();          // 1 sola pasada con shadow (el doble fill duplicaba el blur, caro)
    ctx.shadowBlur = 0; ctx.fill();                  // cuerpo sólido encima, sin re-blurear
    ctx.restore();
    // núcleo claro con sheen vertical (glossy): más brillante arriba — define bien la paleta
    const inset = pw * 0.30;
    const cg = ctx.createLinearGradient(0, y, 0, y + ph);
    cg.addColorStop(0,   onF ? 'rgba(255,250,232,0.99)' : 'rgba(255,255,255,0.98)');
    cg.addColorStop(0.5, onF ? 'rgba(255,205,120,0.92)' : 'rgba(230,248,255,0.85)');
    cg.addColorStop(1,   onF ? 'rgba(255,160,60,0.82)'  : rgba(col, 0.7));
    ctx.fillStyle = cg;
    roundRect(x + inset * 0.5, y + ph * 0.05, pw - inset, ph * 0.9, r * 0.5); ctx.fill();
  }

  function drawBall() {
    const r = ballR();
    const bx = rbx, by = rby;                    // posición interpolada (sombrea la física → render suave)
    const col = fireball ? [255, 180, 50] : NEON_BALL;
    ctx.globalCompositeOperation = 'lighter';
    // estela: segmentos que UNEN las posiciones recientes (línea continua, sin huecos aunque la
    // pelota vaya rápida), con ancho cónico + caps redondos. El segmento final se extiende hasta
    // la posición actual para que no quede separada del último punto guardado.
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let i = 1; i < ballTrail.length; i++) {
      const t = i / ballTrail.length;             // 0 viejo → 1 nuevo
      const a = ballTrail[i - 1], b = ballTrail[i];
      ctx.strokeStyle = rgba(col, 0.13 * t);
      ctx.lineWidth = r * 2 * (0.25 + 0.75 * t);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
    if (ballTrail.length) {                        // une el último punto con la pelota actual
      const a = ballTrail[ballTrail.length - 1];
      ctx.strokeStyle = rgba(col, 0.13);
      ctx.lineWidth = r * 2;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(bx, by); ctx.stroke();
    }
    // resplandor radial (pulsa en fuego)
    const gr = r * (fireball ? (3.2 + 0.8 * Math.sin(performance.now() / 70)) : 2.4);
    const g = ctx.createRadialGradient(bx, by, 0, bx, by, gr);
    if (fireball) {
      g.addColorStop(0, 'rgba(255,240,170,0.7)');
      g.addColorStop(0.35, 'rgba(255,120,0,0.35)');
      g.addColorStop(1, 'rgba(255,40,0,0)');
    } else {
      g.addColorStop(0, rgba(NEON_BALL, 0.6));
      g.addColorStop(0.5, rgba(NEON_P1, 0.22));
      g.addColorStop(1, rgba(NEON_P1, 0));
    }
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(bx, by, gr, 0, TAU); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    // núcleo: esfera glossy. Degradé con luz arriba-izquierda, color medio y borde más oscuro
    // (da volumen) — sin cortes secos contra el glow.
    const lx = bx - r * 0.36, ly = by - r * 0.36;
    const cg = ctx.createRadialGradient(lx, ly, r * 0.04, bx, by, r * 1.02);
    if (fireball) {
      cg.addColorStop(0, '#fffdf2');
      cg.addColorStop(0.5, 'rgba(255,196,80,1)');
      cg.addColorStop(1, 'rgba(214,96,12,1)');
    } else {
      cg.addColorStop(0, '#ffffff');
      cg.addColorStop(0.5, rgba(NEON_BALL, 1));
      cg.addColorStop(1, 'rgba(64,150,200,1)');           // borde cian más oscuro = sombra de la esfera
    }
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(bx, by, r, 0, TAU); ctx.fill();
    // brillo especular SUAVE (radial → transparente, no un disco plano)
    const hx = bx - r * 0.33, hy = by - r * 0.33, hr = r * 0.6;
    const hg = ctx.createRadialGradient(hx, hy, 0, hx, hy, hr);
    hg.addColorStop(0, 'rgba(255,255,255,0.95)');
    hg.addColorStop(0.6, 'rgba(255,255,255,0.35)');
    hg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(hx, hy, hr, 0, TAU); ctx.fill();
  }

  // ── FUEGO (partículas: kind 0 = brasa, 1 = chispa rápida) ──
  function spawnEmber(x, y, vx, vy, life, size, kind) {
    if (embers.length > 340) return;
    embers.push({ x, y, vx, vy, life, max: life, size, kind: kind || 0 });
  }
  function emitFire() {
    const r = ballR(), s = Math.min(W, H);
    if (fireball) {
      for (let i = 0; i < 3; i++)                 // brasas (cuerpo del fuego)
        spawnEmber(bx + rnd(-r, r) * 0.6, by + rnd(-r, r) * 0.6,
          -bvx * 0.12 + rnd(-1, 1) * s * 0.25, -bvy * 0.12 + rnd(-1, 1) * s * 0.25,
          rnd(0.25, 0.55), rnd(r * 0.4, r * 0.9), 0);
      if (Math.random() < 0.7)                    // chispa (rápida, blanca, corta)
        spawnEmber(bx, by,
          -bvx * 0.05 + rnd(-1, 1) * s * 0.55, -bvy * 0.05 + rnd(-1, 1) * s * 0.55,
          rnd(0.12, 0.3), rnd(r * 0.12, r * 0.32), 1);
    }
    for (const [p, isR] of [[right, true], [left, false]]) {
      if (!p.onFire) continue;
      const ph = paddleH(), pw = paddleW();
      const cx = (isR ? rightX() : leftX()) + pw / 2;   // centro de la paleta
      if (Math.random() < 0.7)                    // brasas: suben desde el centro, repartidas a lo alto
        spawnEmber(cx + rnd(-1, 1) * pw * 0.4, p.cy + rnd(-ph / 2, ph / 2),
          rnd(-1, 1) * s * 0.05, -rnd(s * 0.1, s * 0.3),
          rnd(0.3, 0.6), rnd(pw * 0.5, pw * 1.2), 2);
      if (Math.random() < 0.35)                   // alguna chispa saltando hacia el campo
        spawnEmber(cx, p.cy + rnd(-ph / 2, ph / 2),
          (isR ? -1 : 1) * rnd(s * 0.1, s * 0.4), rnd(-1, 1) * s * 0.2,
          rnd(0.12, 0.28), rnd(pw * 0.2, pw * 0.45), 1);
    }
    // llamas a lo largo de los elementos prendidos (bordes y red)
    const fsz = () => rnd(r * 0.35, r * 0.8);
    if (fireBot && Math.random() < 0.6)            // piso → llamas que suben
      spawnEmber(rnd(0, W), H - rnd(0, r), rnd(-1, 1) * s * 0.06, -rnd(s * 0.12, s * 0.3), rnd(0.3, 0.6), fsz(), 0);
    if (fireTop && Math.random() < 0.6)            // techo → llamas que cuelgan hacia adentro
      spawnEmber(rnd(0, W), rnd(0, r), rnd(-1, 1) * s * 0.06, rnd(s * 0.04, s * 0.12), rnd(0.3, 0.55), fsz(), 0);
    if (fireNet && Math.random() < 0.6)            // red → llamas a lo largo del centro
      spawnEmber(W / 2 + rnd(-r, r) * 0.6, rnd(0, H), rnd(-1, 1) * s * 0.05, -rnd(s * 0.08, s * 0.22), rnd(0.3, 0.55), fsz(), 0);
  }
  function updateEmbers(dt) {
    const buoy = 0.6 * Math.min(W, H);
    for (let i = embers.length - 1; i >= 0; i--) {
      const e = embers[i];
      e.vy -= (e.kind === 1 ? buoy * 0.3 : buoy) * dt;   // las brasas flotan; las chispas casi van rectas
      const drag = e.kind === 1 ? 2.4 : 1.6;
      e.vx *= (1 - drag * dt); e.vy *= (1 - (e.kind === 1 ? 1.6 : 0.7) * dt);
      e.x += e.vx * dt; e.y += e.vy * dt;
      e.life -= dt;
      if (e.life <= 0) embers.splice(i, 1);
    }
  }
  function drawEmbers() {
    if (!embers.length) return;
    ctx.globalCompositeOperation = 'lighter';
    for (const e of embers) {
      const t = Math.max(0, e.life / e.max);   // 1 reciente → 0 muerta
      if (e.kind === 1) {                       // chispa: blanco-amarillo brillante
        ctx.fillStyle = `rgba(255,255,${Math.round(200 * t)},${0.85 * t})`;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size * (0.4 + 0.6 * t), 0, TAU); ctx.fill();
      } else if (e.kind === 2) {                // brasa de paleta: dorado/naranja más vívido y opaco
        const g = Math.round(120 + 130 * t);
        const b = Math.round(70 * t * t);
        ctx.fillStyle = `rgba(255,${g},${b},${0.72 * t})`;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size * (0.35 + 0.65 * t), 0, TAU); ctx.fill();
      } else {                                  // brasa: amarillo → rojo profundo
        const g = Math.round(70 + 165 * t);
        const b = Math.round(40 * t * t);
        ctx.fillStyle = `rgba(255,${g},${b},${0.5 * t})`;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size * (0.35 + 0.65 * t), 0, TAU); ctx.fill();
      }
    }
    ctx.globalCompositeOperation = 'source-over';
  }

  // ── CHISPAS DE IMPACTO (rebotes) ──
  function burst(x, y, col, n, spd, sz, life) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * TAU, v = spd * (0.3 + 0.7 * Math.random());
      sparks.push({
        x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
        life: life * (0.6 + 0.6 * Math.random()), max: life,
        size: sz * (0.5 + 0.8 * Math.random()), col,
      });
    }
  }
  function updateSparks(dt) {
    for (let i = sparks.length - 1; i >= 0; i--) {
      const p = sparks[i];
      p.vx *= (1 - 3 * dt); p.vy *= (1 - 3 * dt);
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) sparks.splice(i, 1);
    }
  }
  function drawSparks() {
    if (!sparks.length) return;
    ctx.globalCompositeOperation = 'lighter';
    for (const p of sparks) {
      const t = Math.max(0, p.life / p.max);
      // núcleo blanco-brillante cuando recién salta (t≈1) → vira al color de la paleta al apagarse: más punchy
      const k = 0.55 * t;   // mezcla hacia blanco, fuerte al inicio
      const c = [p.col[0] + (255 - p.col[0]) * k,
                 p.col[1] + (255 - p.col[1]) * k,
                 p.col[2] + (255 - p.col[2]) * k];
      ctx.fillStyle = rgba(c, 0.95 * t);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (0.3 + 0.7 * t), 0, TAU); ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
  }

  function drawScores() {
    if (WIN_POINTS[ptsIdx] == null) return;   // práctica: sin marcador
    const fs0 = Math.round(Math.min(60, H * 0.082));
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const c2 = fireNet ? [255, 180, 50] : leftGlow();   // izq = jug.2 / contrincante
    const c1 = fireNet ? [255, 180, 50] : NEON_P1;      // der = jug.1 (cian)
    ctx.save();
    drawScoreNum(String(j2score), W * 0.25, c2, j2pulse, fs0);
    drawScoreNum(String(j1score), W * 0.75, c1, j1pulse, fs0);
    ctx.restore();
  }
  // al sumar (pulse 1→0): el número PEGA UN SALTO (más grande), vira a blanco y refulge → se nota el punto.
  function drawScoreNum(txt, x, col, pulse, fs0) {
    const fs = Math.round(fs0 * (1 + 0.5 * pulse));
    ctx.font = `700 ${fs}px ${FONT}`;
    ctx.shadowColor = rgba(col, 0.85);
    ctx.shadowBlur = fs * (0.3 + pulse);
    const cc = [col[0] + (255 - col[0]) * pulse, col[1] + (255 - col[1]) * pulse, col[2] + (255 - col[2]) * pulse];
    ctx.fillStyle = rgba(cc, 0.95);
    ctx.fillText(txt, x, H * 0.045);
  }

  function drawFireLabels() {
    if (!right.onFire && !left.onFire) return;
    const fs = Math.round(Math.min(20, H * 0.026));
    ctx.font = `900 ${fs}px ${FONT}`;
    ctx.fillStyle = FIRE;
    ctx.textBaseline = 'top';
    ctx.letterSpacing = '0.08em';
    ctx.shadowColor = FIRE; ctx.shadowBlur = fs * 0.7;
    if (right.onFire) { ctx.textAlign = 'right'; ctx.fillText('ON FIRE', W - W * 0.03, H * 0.02); }
    if (left.onFire)  { ctx.textAlign = 'left';  ctx.fillText('ON FIRE', W * 0.03, H * 0.02); }
    ctx.shadowBlur = 0;
    ctx.letterSpacing = '0px';
  }

  // PAUSA: overlay oscuro + glifo de pausa con glow + "PAUSA". Sin texto parpadeante.
  function drawPause() {
    ctx.fillStyle = 'rgba(8,10,16,0.62)';
    ctx.fillRect(0, 0, W, H);
    const cx = W / 2, s = Math.min(W, H);
    const bw = s * 0.045, bh = s * 0.155, gap = s * 0.038, r = bw * 0.4;
    const top = H / 2 - bh / 2 - s * 0.045;
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.shadowColor = 'rgba(120,200,255,0.55)'; ctx.shadowBlur = s * 0.035;
    roundRect(cx - gap / 2 - bw, top, bw, bh, r); ctx.fill();
    roundRect(cx + gap / 2,      top, bw, bh, r); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(235,238,250,0.9)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const fs = Math.round(Math.min(32, s * 0.066));
    ctx.font = `700 ${fs}px ${FONT}`;
    ctx.letterSpacing = '0.22em';
    ctx.fillText('PAUSA', cx, top + bh + s * 0.07);
    ctx.letterSpacing = '0px';
  }

  function drawOver() {
    ctx.fillStyle = 'rgba(6,8,14,0.58)';
    ctx.fillRect(0, 0, W, H);
    let big, sub = 'tocá: revancha   ·   atrás: menú';
    if (bricksMode) {
      big = winner === 1 ? '¡GANASTE!' : 'GANA ' + OPPONENTS[oppIdx].name.toUpperCase();
      sub = `puntos ${j1score} - ${j2score}  ·  tocá: revancha  ·  atrás: menú`;
    } else if (challenge) {
      const total = CHALLENGE_ORDER.length;
      const oppName = OPPONENTS[CHALLENGE_ORDER[challengeIdx]].name;
      if (winner === 1) {
        if (challengeIdx >= total - 1) { big = '¡DESAFÍO SUPERADO!'; sub = `venciste a los ${total} · tocá: menú`; }
        else { big = 'VENCISTE A ' + oppName.toUpperCase(); sub = 'siguiente: ' + OPPONENTS[CHALLENGE_ORDER[challengeIdx + 1]].name + ' · tocá para seguir'; }
      } else {
        big = 'GANA ' + oppName.toUpperCase(); sub = `rivales vencidos: ${challengeIdx}/${total} · tocá: menú`;
      }
    } else if (twoPlayers) big = winner === 1 ? 'GANA JUGADOR 1' : 'GANA JUGADOR 2';
    else                   big = winner === 1 ? '¡GANASTE!' : 'GANA ' + OPPONENTS[oppIdx].name.toUpperCase();
    const s = Math.min(W, H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // glow según gane por fuego o no
    const fireWin = winner === 1 ? right.onFire : left.onFire;
    const glow = fireWin ? FIRE : 'rgba(120,200,255,0.6)';
    const bs = Math.round(Math.min(54, s * 0.105));
    ctx.font = `900 ${bs}px ${FONT}`;
    ctx.shadowColor = glow; ctx.shadowBlur = s * 0.055;
    ctx.fillStyle = '#fff';
    ctx.letterSpacing = '0.04em';
    ctx.fillText(big, W / 2, H / 2 - s * 0.025);
    ctx.shadowBlur = 0;
    const ss = Math.round(Math.min(15, s * 0.03));
    ctx.font = `500 ${ss}px ${FONT}`;
    ctx.fillStyle = 'rgba(200,210,230,0.7)';
    ctx.letterSpacing = '0.16em';
    ctx.fillText(sub, W / 2, H / 2 + bs * 0.7);
    ctx.letterSpacing = '0px';
  }

  // Cartel de progreso del desafío (centro-arriba, entre los marcadores).
  function drawChallengeBadge() {
    const s = Math.min(W, H), o = OPPONENTS[CHALLENGE_ORDER[challengeIdx]];
    mtext(`DESAFÍO  ${challengeIdx + 1}/${CHALLENGE_ORDER.length}  ·  ${o.name}`,
      Math.min(15, s * 0.026), o.glow, W / 2, H * 0.04, 0, 0.85, 700);
  }

  // texto de menú: Orbitron centrado con glow opcional (color = [r,g,b]).
  function mtext(txt, px, col, x, y, glow, alpha, weight) {
    ctx.font = `${weight || 700} ${px}px ${FONT}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (glow) { ctx.shadowColor = rgba(col, 1); ctx.shadowBlur = glow; }
    ctx.fillStyle = rgba(col, alpha == null ? 1 : alpha);
    ctx.fillText(txt, x, y);
    ctx.shadowBlur = 0;
  }

  // MENÚ: fondo de cancha + red, título PONG neón, y las filas del nivel actual (modo o setup).
  function drawMenu() {
    drawBackground();
