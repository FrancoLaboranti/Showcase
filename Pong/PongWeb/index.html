    drawNet();
    const s = Math.min(W, H), t = performance.now() / 1000;
    const pulse = 0.5 + 0.5 * Math.sin(t * 2.2);
    const cyan = NEON_P1, dim = [150, 165, 195];
    mtext('PONG', Math.min(118, s * 0.17), cyan, W / 2, H * 0.25, s * 0.05 * (0.6 + 0.4 * pulse), 1, 900);
    if (menulevel === 0) {
      menuLevel0().forEach((r, i) => {
        const on = menuOption === i;
        mtext(r.label, Math.min(42, s * 0.06), on ? cyan : dim, W / 2, r.y * H, on ? s * 0.03 : 0, on ? 1 : 0.75, 700);
      });
      mtext('↑ ↓ elegí  ·  Enter / tocá', Math.min(14, s * 0.024), dim, W / 2, H * 0.86, 0, 0.6, 500);
    } else {
      menuSetupRows().forEach((r, i) => {
        const on = menuOption === i;
        const label = setupRowLabel(r.key);
        const col = (r.key === 'rival') ? OPPONENTS[oppIdx].glow : cyan;
        mtext(on ? `‹  ${label}  ›` : label, Math.min(34, s * 0.05), on ? col : dim, W / 2, r.y * H, on ? s * 0.025 : 0, on ? 1 : 0.78, 700);
      });
      const pp = 0.6 + 0.4 * Math.sin(t * 4);
      mtext('▶ JUGAR', Math.min(40, s * 0.058), [120 + 120 * pp, 235, 150], W / 2, PLAY_BTN_Y * H, s * 0.03, 1, 900);
      mtext('‹ › cambian  ·  Enter / JUGAR arranca  ·  atrás vuelve', Math.min(13, s * 0.022), dim, W / 2, H * 0.93, 0, 0.55, 500);
    }
  }

  // Confirmación de salida al menú durante el partido (SÍ izq / NO der).
  function drawConfirm() {
    ctx.fillStyle = 'rgba(6,8,14,0.74)'; ctx.fillRect(0, 0, W, H);
    const s = Math.min(W, H);
    mtext('¿SALIR AL MENÚ?', Math.min(42, s * 0.062), [255, 255, 255], W / 2, H * 0.4, s * 0.04, 1, 900);
    mtext('SÍ', Math.min(34, s * 0.052), [255, 120, 120], W * 0.4, H * 0.6, s * 0.03, 1, 900);
    mtext('NO', Math.min(34, s * 0.052), NEON_P1,         W * 0.6, H * 0.6, s * 0.03, 1, 900);
    mtext('se pierde el partido', Math.min(13, s * 0.022), [180, 190, 210], W / 2, H * 0.72, 0, 0.65, 500);
  }

  // HUD de FPS, estilo BallsWeb: panel monoespaciado arriba a la izquierda.
  function drawDebugHUD() {
    if (!showDebug) return;
    const lines = [
      'FPS: ' + Math.round(1 / Math.max(1e-3, dtSmoothed)),
      'Bola: ' + Math.round(Math.hypot(bvx, bvy)) + ' px/s',
    ];
    const lh = 18, padX = 8, padY = 8, boxW = 132;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(padX, padY, boxW, lh * lines.length + 8);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = '13px ui-monospace, Menlo, Consolas, monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    lines.forEach((s, i) => ctx.fillText(s, padX + 6, padY + 4 + i * lh));
  }

  // "Zzz" sobre la paleta de la CPU mientras duerme (sólo en 1 jugador).
  function drawAISleep() {
    if (twoPlayers || !aiSleeping) return;
    const s = Math.min(W, H);
    ctx.save();
    ctx.fillStyle = rgba(leftGlow(), 0.85);
    ctx.shadowColor = rgba(leftGlow(), 0.6); ctx.shadowBlur = s * 0.02;
    ctx.font = `700 ${Math.round(s * 0.05)}px ${FONT}`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('Zzz', leftX() + paddleW() + s * 0.02, left.cy - paddleH() / 2 - s * 0.015);
    ctx.restore();
  }

  function rndi(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }
  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ── LOOP ── timestep fijo + interpolación (independiente del refresh, sin saltos)
  const FIXED_DT = 1 / 120;                            // física a 120 Hz constante
  let lastT = performance.now();
  let dtSmoothed = 1 / 60;                              // para el lector de FPS (suavizado, como Balls)
  let acc = 0;                                         // tiempo real pendiente de simular
  let prevBx = 0, prevBy = 0, rbx = 0, rby = 0;        // pos. anterior/interpolada de la pelota (render)
  function loop(now) {
    if (typeof now !== 'number') now = performance.now();
    const dt = Math.min(0.1, (now - lastT) / 1000);    // hasta 0.1s de catch-up tras un hipo
    lastT = now;
    dtSmoothed = dtSmoothed * 0.9 + dt * 0.1;

    FIRE = `rgb(255,${rndi(128, 255)},0)`;

    const playing = state === 'play' && !portrait && !confirmQuit;   // en vertical / confirmación → congelado
    if (playing) {
      acc += dt;
      let steps = 0;
      while (acc >= FIXED_DT && steps < 8) {            // pasos fijos; "recupera" varios si hubo lag
        if (bricksMode) {
          stepBricks(FIXED_DT);
        } else {
          prevBx = bx; prevBy = by;                     // estado previo para interpolar el render
          if (!twoPlayers) updateAI(FIXED_DT);
          updatePaddle(right, FIXED_DT, false, true);
          updatePaddle(left, FIXED_DT, !twoPlayers, false);
          updateBall(FIXED_DT);
        }
        acc -= FIXED_DT;
        steps++;
        if (state !== 'play') break;   // gol/punto que termina la partida: cortar el catch-up
      }
      if (acc > FIXED_DT) acc %= FIXED_DT;              // si se capó el catch-up, descartar el exceso
      const alpha = acc / FIXED_DT;                     // fracción no simulada → render interpolado
      if (bricksMode) {
        for (const b of balls) { b.rx = b.px + (b.x - b.px) * alpha; b.ry = b.py + (b.y - b.py) * alpha; }
        emitFireBricks();
      } else {
        rbx = prevBx + (bx - prevBx) * alpha;
        rby = prevBy + (by - prevBy) * alpha;
        emitFire();
      }
    } else if (bricksMode) {
      for (const b of balls) { b.rx = b.x; b.ry = b.y; }
    } else {
      rbx = bx; rby = by;
    }
    if (state !== 'paused' && !confirmQuit) { updateEmbers(dt); updateSparks(dt); }
    if (bricksMode && state === 'play' && !confirmQuit) updateDrops(dt);   // tokens caen/se atrapan (frame-rate)
    j1pulse = Math.max(0, j1pulse - dt / 0.55);          // decae el "golpe" del marcador (~0.55s)
    j2pulse = Math.max(0, j2pulse - dt / 0.55);

    // render
    if (state === 'menu') {
      drawMenu();
    } else if (bricksMode) {
      drawBackground();
      drawNet();
      drawScores();
      drawFireLabels();
      drawBricks();
      drawPaddle(left, false);
      drawPaddle(right, true);
      drawEmbers();
      drawSparks();
      drawDrops();
      for (const b of balls) drawBallObj(b);
      if (state === 'paused' && !confirmQuit) drawPause();
      if (state === 'over') drawOver();
      if (confirmQuit) drawConfirm();
    } else {
      drawBackground();
      drawNet();
      drawScores();
      drawFireLabels();
      drawPaddle(left, false);
      drawPaddle(right, true);
      drawAISleep();
      drawEmbers();
      drawSparks();
      drawBall();
      if (challenge) drawChallengeBadge();
      if (state === 'paused' && !confirmQuit) drawPause();
      if (state === 'over') drawOver();
      if (confirmQuit) drawConfirm();
    }
    drawDebugHUD();

    requestAnimationFrame(loop);
  }

  // ── INIT ──
  resize();
  right.cy = left.cy = H / 2;
  syncUI();                       // arranca en el menú (state = 'menu')
  loop();

  const hint = document.getElementById('hint');
  if (!isTouch) hint.textContent = 'menú: ↑↓ y Enter · en partido: ↑/↓ (y W/S en 2P) · P pausa · Esc menú';
  setTimeout(() => hint.style.opacity = '0', 5000);
  </script>
  <script>
    // Salida al menú directa, sin confirmación.
    document.getElementById('btnExit').addEventListener('click', () => {
      // Dentro de la shell del Arcade (iframe): le avisamos para que cierre el reproductor
      // SIN navegar (mantiene el fullscreen de la sesión). Suelto: navegamos al menú.
      if (window.self !== window.top) {
        try { window.parent.postMessage({ type: 'arcade:exit' }, '*'); } catch (e) {}
        return;
      }
      try { screen.orientation && screen.orientation.unlock && screen.orientation.unlock(); } catch {}
      location.href = '../../Arcade/';   // menú de la app (no el índice raíz "sin app")
    });
  </script>
</body>
</html>
