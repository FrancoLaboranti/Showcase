<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Showcase — Juegos</title>
<style>
  :root{
    --bg:#0d0f14; --bg2:#141823; --card:#1b2030; --card2:#222a3d;
    --text:#e8ecf4; --muted:#8b94a8; --accent:#5b8cff; --ring:#5b8cff55;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 100% at 50% 0%,var(--bg2),var(--bg));
    color:var(--text); min-height:100vh;
    padding:max(24px,env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
  }
  header{max-width:920px; margin:0 auto 28px; text-align:center;}
  h1{font-size:clamp(28px,7vw,44px); margin:8px 0 6px; letter-spacing:.5px;}
  header p{color:var(--muted); margin:0; font-size:clamp(13px,3.5vw,16px);}
  .grid{
    max-width:920px; margin:0 auto;
    display:grid; gap:14px;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  }
  a.card{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; text-decoration:none; color:var(--text);
    background:linear-gradient(160deg,var(--card),var(--card2));
    border:1px solid #ffffff10; border-radius:18px;
    padding:22px 14px; aspect-ratio:1/1;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  a.card:hover,a.card:focus-visible{
    transform:translateY(-3px);
    border-color:var(--accent);
    box-shadow:0 10px 30px -10px var(--ring); outline:none;
  }
  a.card:active{transform:translateY(0) scale(.97);}
  .ico{font-size:clamp(34px,9vw,46px); line-height:1;}
  .name{font-size:14px; font-weight:600; text-align:center;}
  footer{max-width:920px; margin:34px auto 0; text-align:center; color:var(--muted); font-size:12px;}
  footer a{color:var(--accent); text-decoration:none;}
</style>
</head>
<body>
  <header>
    <h1>🎮 Showcase</h1>
    <p>Colección de juegos y experimentos — tocá uno para jugar</p>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    Hecho con Pygame &amp; Canvas · <a href="https://github.com/FrancoLaboranti/Showcase">Código en GitHub</a>
  </footer>

  <script>
    // [icono, nombre, ruta a la versión web]
    const games = [
      ["🔮","Canicas","Balls/BallsWeb/"],
      ["♟️","Ajedrez","Chess/ChessWeb/"],
      ["🕐","Reloj","Clock/ClockWeb/"],
      ["🚜","Crazy Tanks","CrazyTanks/CrazyTanksWeb/"],
      ["🎆","Fuegos Artificiales","Fireworks/FireworksWeb/"],
      ["🎇","Fuegos V2","FireworksV2/FireworksV2Web/"],
      ["🔤","Ahorcado","Hangman/HangmanWeb/"],
      ["💣","Buscaminas","MineSweeperGPT/MineSweeperWeb/"],
      ["⚪","Mini Canicas","MiniBalls/MiniBallsWeb/"],
      ["🌀","Péndulo de Newton","Newton's Cradle/NewtonsCradleWeb/"],
      ["🃏","Póker","Poker/PokerWeb/"],
      ["🏓","Pong","Pong/PongWeb/"],
      ["🎵","Simón Dice","SimonSays/SimonSaysWeb/"],
      ["🐍","Snake","Snake/SnakeWeb/"],
      ["💥","Tank Wars","TankWARS/TankWARSWeb/"],
      ["❌","Ta-Te-Ti","Tateti/TatetiWeb/"],
      ["🏍️","Tron","Tron/TronWeb/"],
      ["🏍️","Tron V2","TronV2/TronV2Web/"],
    ];
    const grid = document.getElementById("grid");
    for (const [ico,name,path] of games){
      const a = document.createElement("a");
      a.className = "card";
      a.href = encodeURI(path);
      a.innerHTML = `<span class="ico">${ico}</span><span class="name">${name}</span>`;
      grid.appendChild(a);
    }
  </script>
</body>
</html>
