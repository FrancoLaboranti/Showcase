<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hangman / Ahorcado</title>
<link rel="stylesheet" href="../../Arcade/arcade-shell.css">
<style>
  :root { --kb-height: 168px; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #14161e;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e6e6e6;
  }
  /* Canvas occupies the screen ABOVE the on-screen keyboard. Dimensions set explicitly from JS. */
  #c {
    display: block; position: absolute;
    top: 0; left: 0;
  }

  /* Bar inferior (sentada arriba del teclado): nueva-ronda + cambio de idioma + salir.
     Layout flex centrado igual que los demás juegos — la shell agrega gap:8px. */
  #bar {
    position: absolute; left: 0; right: 0;
    bottom: calc(var(--kb-height) + env(safe-area-inset-bottom));
    height: 56px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 12px;
    background: rgba(0,0,0,0.55);
    border-top: 1px solid rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 3;
  }
  #ui { display: flex; gap: 8px; align-items: center; }
  #bar #ui button {
    height: 38px; min-width: 38px; padding: 0 12px;
    border-radius: 19px;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08);
    color: #e6e6e6;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: manipulation;
    transition: background 0.1s, transform 0.08s;
    font-size: 14px; font-weight: 700; letter-spacing: 0.04em;
  }
  #bar #ui button:active { background: rgba(255,255,255,0.22); transform: scale(0.94); }
  #bar #ui #btnNew { font-size: 19px; padding: 0; width: 38px; }

  /* Teclado virtual abajo. Las teclas se generan desde JS según el idioma. */
  #keyboard {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(var(--kb-height) + env(safe-area-inset-bottom));
    padding: 8px 6px env(safe-area-inset-bottom);
    display: flex; flex-direction: column; gap: 5px;
    background: rgba(0,0,0,0.55);
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 3;
  }
  #keyboard.hidden { display: none; }
  .kbrow { display: flex; justify-content: center; gap: 4px; flex: 1; padding: 0 4px; }
  .key {
    flex: 1 1 0; min-width: 0;
    /* Tope para que las filas QWERTY más cortas (7 teclas) no las inflen — el
       ancho lo marca la fila de 10. `justify-content: center` en .kbrow centra. */
    max-width: calc((100% - 36px) / 10);
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08);
    color: #d8d8d8;
    border-radius: 8px;
    font-size: clamp(14px, 4.5vw, 22px);
    font-weight: 700; letter-spacing: 0.02em;
    cursor: pointer; touch-action: manipulation;
    transition: background 0.08s, transform 0.06s, opacity 0.15s;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .key:active:not(:disabled) { background: rgba(255,255,255,0.22); transform: scale(0.92); }
  .key.correct { background: rgba(110,230,110,0.22); border-color: rgba(110,230,110,0.55); color: #c8ffc8; }
  .key.wrong   { background: rgba(230,90,90,0.22);  border-color: rgba(230,90,90,0.55);  color: #ffc8c8; }
  .key:disabled { cursor: default; opacity: 0.85; }

  /* Menú inicial: tapa todo, se oculta una vez elegido el idioma. */
  #menu {
    position: absolute; inset: 0;
    background: #14161e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 24px;
    z-index: 5;
  }
  #menu.hidden { display: none; }
  #menu h1 {
    font-size: clamp(40px, 11vw, 84px);
    font-weight: 800; letter-spacing: 0.06em;
  }
  #menu .sub {
    font-size: clamp(14px, 4vw, 18px);
    color: rgba(255,255,255,0.55);
    margin-top: 4px; margin-bottom: 18px;
  }
  #menu .lang-row { display: flex; gap: 14px; }
  #menu .lang-btn {
    padding: 16px 32px;
    font-size: clamp(16px, 4.5vw, 20px);
    font-weight: 800; letter-spacing: 0.05em;
    border: 2px solid rgba(150,150,150,0.4);
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.55);
    border-radius: 14px;
    cursor: pointer; touch-action: manipulation;
    transition: all 0.12s;
  }
  #menu .lang-btn.selected {
    border-color: rgba(110,230,110,0.85);
    color: #b8ffc8;
    background: rgba(110,230,110,0.10);
  }
  #menu .play-btn {
    margin-top: 24px;
    padding: 16px 48px;
    font-size: clamp(18px, 5vw, 22px);
    font-weight: 800; letter-spacing: 0.08em;
    background: rgba(110,180,255,0.15);
    border: 2px solid rgba(110,180,255,0.6);
    color: #e6f2ff;
    border-radius: 14px;
    cursor: pointer; touch-action: manipulation;
  }
  #menu .play-btn:active { transform: scale(0.96); background: rgba(110,180,255,0.28); }
  #menu .foot {
    position: absolute; bottom: calc(18px + env(safe-area-inset-bottom));
    font-size: 12px; color: rgba(255,255,255,0.3);
  }
  /* Botones ✕/⛶/ⓘ + overlay de salida vienen de arcade-shell.css (incluido en <head>). */
  /* HUD de FPS — formato Pong: panel monoespaciado arriba a la izquierda, sin border-radius. */
  #fpsOverlay {
    position: absolute;
    left: calc(8px + env(safe-area-inset-left));
    top: calc(8px + env(safe-area-inset-top));
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 18px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.55);
    padding: 4px 6px;
    pointer-events: none;
    display: none;
    z-index: 9;
  }


</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="bar">
    <button id="btnExit" aria-label="salir al menú" title="Salir al menú">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <div id="ui">
      <button id="btnNew"  aria-label="nueva palabra" title="Nueva palabra">↻</button>
      <button id="btnLang" aria-label="idioma" title="Cambiar idioma">ES</button>
    </div>
    <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
    </button>
    <button id="btnInfo" aria-label="info" title="Info / FPS">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>

  <div id="keyboard"></div>

  <div id="menu">
    <h1 id="menuTitle">AHORCADO</h1>
    <div class="sub" id="menuSub">ELEGÍ IDIOMA</div>
    <div class="lang-row">
      <button class="lang-btn selected" data-lang="es">ESPAÑOL</button>
      <button class="lang-btn" data-lang="en">ENGLISH</button>
    </div>
    <button class="play-btn" id="btnPlay">JUGAR</button>
    <div class="foot" id="menuFoot">tipeá una letra o tocá las teclas</div>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  HANGMAN — port web de Hangman.py.
  //  Renderiza horca + palabra + categoría/pista en canvas. El teclado
  //  virtual abajo es HTML para que el toque en mobile sea cómodo.
  //  Acepta también teclas físicas (incluida Ñ).
  // ════════════════════════════════════════════════════════════════════
  const TAU = Math.PI * 2;
  const MAX_FAILS = 6;

  const ALPHABETS = {
    es: 'ABCDEFGHIJKLMNÑOPQRSTUVWXYZ',
    en: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  };
  // Layout QWERTY en 3 filas. La Ñ se suma al final de la fila central en español.
  const KB_ROWS = {
    es: ['QWERTYUIOP', 'ASDFGHJKLÑ', 'ZXCVBNM'],
    en: ['QWERTYUIOP', 'ASDFGHJKL',  'ZXCVBNM'],
  };
  const UI = {
    es: { title:'AHORCADO', sub:'ELEGÍ IDIOMA', play:'JUGAR',
          misses:'FALLOS', used:'LETRAS USADAS',
          won:'¡GANASTE!', lost:'PERDISTE',
          wordWas:'LA PALABRA ERA', tryAgain:'TOCÁ PARA OTRA' },
    en: { title:'HANGMAN', sub:'CHOOSE LANGUAGE', play:'PLAY',
          misses:'MISSES', used:'LETTERS USED',
          won:'YOU WIN!', lost:'YOU LOSE',
          wordWas:'THE WORD WAS', tryAgain:'TAP FOR ANOTHER' },
  };

  // ---------- Estado del juego ----------
  const state = {
    screen: 'menu',        // 'menu' | 'playing' | 'won' | 'lost'
    lang:   'es',
    word:   '',
    category: '',
    hint:   '',
    revealed: [],
    fails: 0,
    correct: new Set(),
    wrong:   new Set(),
    wins: 0, losses: 0,
    shakeT: 0, shakeTotal: 0.4, lastFails: 0,
    flashT: 0,
    endStateAt: 0,    // performance.now() al entrar a won/lost — gracia para no auto-avanzar
  };
  const END_TAP_DELAY_MS = 250;  // ignora taps durante este tiempo después de ganar/perder

  // ---------- Palabras (texto fuente al final del archivo) ----------
  function parseWords(raw) {
    const out = [];
    for (let line of raw.split('\n')) {
      line = line.trim();
      if (!line || line.startsWith('#')) continue;
      const parts = line.split('|').map(p => p.trim());
      const word = parts[0].toUpperCase();
      const category = (parts[1] || '').toUpperCase();
      const hint = parts[2] || '';
      if (word) out.push({ word, category, hint });
    }
    return out;
  }
  const WORDS = { es: [], en: [] };

  // ---------- Canvas + resize ----------
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = 1;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    const kb = document.getElementById('keyboard');
    const kbH = state.screen === 'menu' ? 0 : kb.offsetHeight;
    H = Math.max(120, window.innerHeight - kbH);
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 50));

  // ---------- Helpers (espejo de xper / yper / sper de la versión Pygame) ----------
  const xper = p => p * W;
  const yper = p => p * H;
  const sper = p => p * (W + H) / 2;

  function text(size, content, align, color, x, y) {
    ctx.font = '700 ' + Math.round(size) + "px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.fillStyle = color;
    ctx.fillText(content, x, y);
  }

  // ---------- Dibujo de la horca + muñeco ----------
  function drawGallows() {
    const fails = state.fails;
    let shake = 0;
    if (state.shakeT > 0) {
      const phase = state.shakeT / state.shakeTotal;
      shake = Math.sin(state.shakeT * 80) * sper(0.005) * phase;
    }

    // Layout responsivo: en pantallas angostas (portrait) la horca queda más
    // chica y centrada arriba; en landscape va a la izquierda.
    const portrait = W < H * 1.2;
    const cx = portrait ? xper(0.5) : xper(0.25);
    const topY = portrait ? yper(0.10) : yper(0.12);
    const botY = portrait ? yper(0.55) : yper(0.85);
    const span = botY - topY;
    const armW = portrait ? xper(0.20) : xper(0.16);

    const thick = Math.max(3, sper(0.006));
    const wood = '#be965f';

    // Base, poste, travesaño, soporte diagonal
    line(wood, cx - armW * 0.9, botY, cx + armW * 0.9, botY, thick);
    line(wood, cx - armW * 0.5, botY, cx - armW * 0.5, topY, thick);
    line(wood, cx - armW * 0.5, topY, cx + armW * 0.6, topY, thick);
    line(wood, cx - armW * 0.5, topY + span * 0.06, cx - armW * 0.2, topY, Math.max(2, thick - 1));

    // Soga
    const ropeX = cx + armW * 0.6;
    const ropeTop = topY;
    const ropeBot = topY + span * 0.10;
    line('#cccccc', ropeX, ropeTop, ropeX, ropeBot, Math.max(2, thick - 2));

    // Muñeco
    const headR = span * 0.07;
    const bx = ropeX + shake;
    const headCY = ropeBot + headR;
    const dead = fails >= MAX_FAILS;
    const manColor = dead ? '#f05a5a' : '#ebdcc8';
    const bodyTop = headCY + headR;
    const bodyBot = bodyTop + span * 0.18;
    const shouldersY = bodyTop + span * 0.012;
    const hipY = bodyBot;
    const armLen = span * 0.12;
    const legLen = span * 0.16;
    const lw = Math.max(3, thick - 1);

    if (fails >= 1) {
      // Cabeza
      ctx.lineWidth = lw;
      ctx.strokeStyle = manColor;
      ctx.beginPath();
      ctx.arc(bx, headCY, headR, 0, TAU);
      ctx.stroke();
      const eoX = headR * 0.4;
      const eoY = headR * 0.15;
      if (dead) {
        const d = headR * 0.22;
        for (const ox of [-eoX, eoX]) {
          line(manColor, bx + ox - d, headCY - eoY - d, bx + ox + d, headCY - eoY + d, 2);
          line(manColor, bx + ox - d, headCY - eoY + d, bx + ox + d, headCY - eoY - d, 2);
        }
        // bocota de :(
        ctx.beginPath();
        ctx.strokeStyle = manColor;
        ctx.lineWidth = 2;
        ctx.arc(bx, headCY + headR * 0.45, headR * 0.30, Math.PI, TAU);
        ctx.stroke();
      } else {
        circle('#000', bx - eoX, headCY - eoY, Math.max(1, headR * 0.13));
        circle('#000', bx + eoX, headCY - eoY, Math.max(1, headR * 0.13));
      }
    }
    if (fails >= 2) line(manColor, bx, bodyTop, bx, bodyBot, lw);
    if (fails >= 3) line(manColor, bx, shouldersY, bx - armLen, shouldersY + armLen * 0.6, lw);
    if (fails >= 4) line(manColor, bx, shouldersY, bx + armLen, shouldersY + armLen * 0.6, lw);
    if (fails >= 5) line(manColor, bx, hipY, bx - armLen * 0.85, hipY + legLen, lw);
    if (fails >= 6) line(manColor, bx, hipY, bx + armLen * 0.85, hipY + legLen, lw);
  }

  function line(color, x1, y1, x2, y2, w) {
    ctx.strokeStyle = color;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
  function circle(color, x, y, r) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TAU);
    ctx.fill();
  }

  function drawWord() {
    if (!state.word) return;
    const portrait = W < H * 1.2;
    const cx = portrait ? xper(0.5) : xper(0.65);
    const yCat  = portrait ? yper(0.62) : yper(0.30);
    const yHint = portrait ? yper(0.68) : yper(0.36);
    const yWord = portrait ? yper(0.78) : yper(0.55);

    if (state.category) {
      text(sper(0.024), state.category, 'center', '#d8d870', cx, yCat);
    }
    if (state.hint) {
      text(sper(0.020), '"' + state.hint + '"', 'center', '#a0a0d0', cx, yHint);
    }

    const word = state.word;
    // Auto-ajustar tamaño según longitud para que entre siempre
    const maxWidth = portrait ? W * 0.9 : W * 0.65;
    let size = sper(0.055);
    let gap = size * 0.95;
    let totalW = word.length * gap;
    if (totalW > maxWidth) {
      const k = maxWidth / totalW;
      size *= k; gap *= k; totalW = maxWidth;
    }
    const startX = cx - totalW / 2 + gap / 2;

    for (let i = 0; i < word.length; i++) {
      const ch = word[i];
      const px = startX + i * gap;
      if (ch === ' ') continue;
      const reveal = state.revealed[i] || state.screen === 'lost' || state.screen === 'won';
      const shown = reveal ? ch : '';
      let color = '#e8e8e8';
      if (state.revealed[i]) color = '#78f078';
      else if (state.screen === 'lost') color = '#f06e6e';
      if (shown) text(size, shown, 'center', color, px, yWord - size * 0.05);
      // raya inferior
      line('#9a9a9a', px - gap * 0.4, yWord + size * 0.45, px + gap * 0.4, yWord + size * 0.45, Math.max(2, sper(0.0022)));
    }
  }

  function drawHUD() {
    const t = UI[state.lang];
    text(sper(0.022), t.misses + ': ' + state.fails + ' / ' + MAX_FAILS, 'left', '#c8c8c8', xper(0.02), yper(0.04));
    text(sper(0.022), 'W ' + state.wins + ' · L ' + state.losses, 'left', '#c8c8c8', xper(0.02), yper(0.085));
  }

  function drawEndMessage() {
    const t = UI[state.lang];
    const cx = (W < H * 1.2) ? xper(0.5) : xper(0.65);
    if (state.screen === 'won') {
      const f = 0.5 + 0.5 * Math.sin(performance.now() / 160);
      const r = Math.round(120 + 135 * f);
      const col = 'rgb(' + r + ',230,' + r + ')';
      text(sper(0.05), t.won, 'center', col, cx, yper(0.18));
      text(sper(0.022), t.tryAgain, 'center', '#c8c8c8', cx, yper(0.92));
    } else if (state.screen === 'lost') {
      text(sper(0.05), t.lost, 'center', '#f06e6e', cx, yper(0.18));
      text(sper(0.022), t.tryAgain, 'center', '#c8c8c8', cx, yper(0.92));
    }
  }

  // ---------- Loop ----------
  let lastT = performance.now();
  function frame() {
    const now = performance.now();
    const dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;

    // shake al fallar
    if (state.fails > state.lastFails) state.shakeT = state.shakeTotal;
    state.lastFails = state.fails;
    if (state.shakeT > 0) state.shakeT = Math.max(0, state.shakeT - dt);
    if (state.flashT > 0) state.flashT = Math.max(0, state.flashT - dt);

    ctx.fillStyle = '#14161e';
    ctx.fillRect(0, 0, W, H);

    if (state.screen !== 'menu') {
      drawGallows();
      drawWord();
      drawHUD();
      drawEndMessage();
    }

    requestAnimationFrame(frame);
  }

  // ---------- Lógica del juego ----------
  function startRound() {
    const pool = WORDS[state.lang];
    if (!pool || !pool.length) { state.screen = 'menu'; return; }
    const pick = pool[Math.floor(Math.random() * pool.length)];
    state.word = pick.word;
    state.category = pick.category;
    state.hint = pick.hint;
    state.revealed = [];
    for (const ch of state.word) state.revealed.push(ch === ' ');
    state.fails = 0;
    state.lastFails = 0;
    state.correct = new Set();
    state.wrong = new Set();
    state.screen = 'playing';
    buildKeyboard();
    document.getElementById('keyboard').classList.remove('hidden');
    document.getElementById('menu').classList.add('hidden');
    resize();
  }

  function guess(letter) {
    if (state.screen !== 'playing') return;
    if (!letter) return;
    letter = letter.toUpperCase();
    if (!ALPHABETS[state.lang].includes(letter)) return;
    if (state.correct.has(letter) || state.wrong.has(letter)) return;

    if (state.word.includes(letter)) {
      state.correct.add(letter);
      for (let i = 0; i < state.word.length; i++) {
        if (state.word[i] === letter) state.revealed[i] = true;
      }
      if (state.revealed.every(Boolean)) {
        state.screen = 'won';
        state.wins++;
        state.flashT = 1.0;
        state.endStateAt = performance.now();
      }
    } else {
      state.wrong.add(letter);
      state.fails++;
      if (state.fails >= MAX_FAILS) {
        state.screen = 'lost';
        state.losses++;
        state.flashT = 1.0;
        state.endStateAt = performance.now();
      }
    }
    refreshKeyboardKeys();
  }

  // ---------- Teclado virtual ----------
  function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    const rows = KB_ROWS[state.lang];
    rows.forEach(rowStr => {
      const row = document.createElement('div');
      row.className = 'kbrow';
      for (const ch of rowStr) {
        const b = document.createElement('button');
        b.className = 'key';
        b.dataset.letter = ch;
        b.textContent = ch;
        b.addEventListener('pointerdown', e => {
          e.preventDefault();
          guess(ch);
        });
        row.appendChild(b);
      }
      kb.appendChild(row);
    });
    refreshKeyboardKeys();
  }

  function refreshKeyboardKeys() {
    document.querySelectorAll('.key').forEach(k => {
      const ch = k.dataset.letter;
      k.classList.remove('correct', 'wrong');
      k.disabled = false;
      if (state.correct.has(ch)) { k.classList.add('correct'); k.disabled = true; }
      else if (state.wrong.has(ch)) { k.classList.add('wrong'); k.disabled = true; }
      if (state.screen === 'won' || state.screen === 'lost') k.disabled = true;
    });
  }

  // ---------- Input físico ----------
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (state.screen === 'menu') return;
      showMenu();
      return;
    }
    if (state.screen === 'menu') {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        startRound();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'Tab') {
        e.preventDefault();
        state.lang = state.lang === 'es' ? 'en' : 'es';
        applyLangToMenu();
      }
      return;
    }
    if (state.screen === 'won' || state.screen === 'lost') {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        startRound();
      }
      return;
    }
    // playing
    const ch = (e.key || '').toUpperCase();
    if (ch.length === 1) guess(ch);
  });

  // ---------- Menú ----------
  function applyLangToMenu() {
    const t = UI[state.lang];
    document.getElementById('menuTitle').textContent = t.title;
    document.getElementById('menuSub').textContent   = t.sub;
    document.getElementById('btnPlay').textContent   = t.play;
    document.querySelectorAll('#menu .lang-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.lang === state.lang);
    });
    document.getElementById('btnLang').textContent = state.lang.toUpperCase();
    document.documentElement.lang = state.lang;
  }
  function showMenu() {
    state.screen = 'menu';
    document.getElementById('menu').classList.remove('hidden');
    document.getElementById('keyboard').classList.add('hidden');
    applyLangToMenu();
    resize();
  }

  document.querySelectorAll('#menu .lang-btn').forEach(b => {
    b.addEventListener('pointerdown', e => {
      e.preventDefault();
      state.lang = b.dataset.lang;
      applyLangToMenu();
    });
  });
  document.getElementById('btnPlay').addEventListener('pointerdown', e => {
    e.preventDefault();
    startRound();
  });
  document.getElementById('btnNew').addEventListener('pointerdown', e => {
    e.preventDefault();
    startRound();
  });
  document.getElementById('btnLang').addEventListener('pointerdown', e => {
    e.preventDefault();
    state.lang = state.lang === 'es' ? 'en' : 'es';
    applyLangToMenu();
    startRound();
  });

  // Tap-para-continuar cuando terminó la ronda. Se engancha al canvas y al
  // teclado (cuyas teclas quedan disabled en won/lost — el pointerdown burbujea
  // hasta el div #keyboard). Hay una breve gracia para que el mismo gesto que
  // ganó/perdió no dispare la siguiente ronda.
  function advanceIfEnded(e) {
    if (state.screen !== 'won' && state.screen !== 'lost') return;
    if (performance.now() - state.endStateAt < END_TAP_DELAY_MS) return;
    e.preventDefault();
    startRound();
  }
  canvas.addEventListener('pointerdown', advanceIfEnded);
  document.getElementById('keyboard').addEventListener('pointerdown', advanceIfEnded);

  // ---------- Bootstrap ----------
  function init() {
    WORDS.es = parseWords(RAW_WORDS_ES);
    WORDS.en = parseWords(RAW_WORDS_EN);
    applyLangToMenu();
    resize();
    requestAnimationFrame(frame);
  }

  <!-- Shell del Arcade (exit + fullscreen + lock de orientación). data-orient: landscape/portrait/any. -->
  <script src="../../Arcade/arcade-shell.js" data-orient="portrait"></script>

  <div id="fpsOverlay">FPS: --</div>
  <script>
    (function() {
      let frameCount = 0, lastT = performance.now();
      const overlay = document.getElementById('fpsOverlay');
      function loop() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          const fps = Math.round(frameCount * 1000 / (now - lastT));
          if (overlay.style.display !== 'none') overlay.textContent = 'FPS: ' + fps;
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(loop);
      }
      loop();
      const btn = document.getElementById('btnInfo');
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        // El overlay arranca con display:none POR CSS — el style inline está vacío "", así que
        // comparamos con === 'block' (estado visible explícito) en vez de !== 'none' (que daba true
        // al inicio y se comía el primer tap).
        const showing = overlay.style.display === 'block';
        overlay.style.display = showing ? 'none' : 'block';
        btn.classList.toggle('on', !showing);
      });
    })();
  </script>
