<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Newton's Cradle</title>
<link rel="stylesheet" href="../../Arcade/arcade-shell.css">
<style>
  :root { --bar-height: 66px; }                                                  /* tweak to taste */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 35%, #1a1d22 0%, #050608 70%);
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  /* Canvas occupies only the space ABOVE the bar — the cradle is laid out inside that rect so it never
     sits behind the buttons. Dimensions are set explicitly from JS each resize. */
  #c {
    display: block; position: absolute;
    top: 0; left: 0;
  }

  #hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    max-width: min(88vw, 480px);
    background: rgba(10,12,18,0.78); border: 1px solid rgba(255,255,255,0.10);
    padding: 12px 20px; border-radius: 14px;
    text-align: center; color: rgba(255,255,255,0.92);
    font-size: 13px; letter-spacing: 0.04em; line-height: 1.45;
    pointer-events: none; transition: opacity 0.8s; z-index: 2;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }

  /* Bottom bar: count buttons + the two toggles. Opaque-ish background so it reads as a bezel rather
     than a HUD overlay. Same shell as BallsWeb / ClockWeb. */
  #bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(var(--bar-height) + env(safe-area-inset-bottom));
    padding: 0 16px env(safe-area-inset-bottom);
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 3;
  }
  #ui {
    display: flex; gap: 8px; align-items: center;
  }
  #ui button {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none;
    transition: background 0.1s, transform 0.08s;
    padding: 0;
  }
  #ui button:active { background: rgba(255,255,255,0.22); transform: scale(0.92); }
  #ui button svg { display: block; width: 22px; height: 22px; pointer-events: none; }
  #ui #btnMinus svg, #ui #btnPlus svg { width: 24px; height: 24px; }
  /* visual indicator for toggled-on state */
  #ui button.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); }
  /* Botones ✕/⛶/ⓘ + overlay de salida vienen de arcade-shell.css. */
  /* HUD de FPS — formato Pong: panel monoespaciado arriba a la izquierda, sin border-radius. */
  #fpsOverlay {
    position: absolute;
    left: calc(8px + env(safe-area-inset-left));
    top: calc(8px + env(safe-area-inset-top));
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 18px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.55);
    padding: 4px 6px;
    pointer-events: none;
    display: none;
    z-index: 9;
  }



</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">levantá una bola y soltala para impulsar las otras · +/− cambia la cantidad · 👻 fantasma · ⏸ pausa</div>
  <div id="bar">
  <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
<div id="ui">
      <button id="btnGhost" aria-label="fantasma" title="Modo fantasma (se atraviesan)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 3a7 7 0 0 0-7 7v9l2-1.6 2 1.6 2-1.6 1 1.6 1-1.6 2 1.6 2-1.6V10a7 7 0 0 0-7-7zm-2.2 6.2a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2zm4.4 0a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2z"/></svg>
      </button>
      <button id="btnHold" aria-label="congelar" title="Congelar (pausa la gravedad)">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
      </button>
      <button id="btnMinus" aria-label="quitar" title="Quitar bola">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 12h12"/></svg>
      </button>
      <button id="btnPlus" aria-label="agregar" title="Agregar bola">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 6v12M6 12h12"/></svg>
      </button>
      <button id="btnReset" aria-label="reiniciar" title="Reiniciar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg>
      </button>
    </div>
    <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
    </button>
    <button id="btnInfo" aria-label="info" title="Info / FPS">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  NEWTON'S CRADLE — péndulo de Newton "de verdad", con el shell mobile
  //  de BallsWeb / ClockWeb.
  //
  //  Física (reescrita, ya no es el port literal del .py crudo):
  //   · Cada bola es un péndulo rígido real: la aceleración angular es
  //     α = -ω²·sin(φ)  (φ = desvío respecto de la vertical), integrada con
  //     Euler semi-implícito a paso fijo de 5 ms. No es ángulo-chico: usa el
  //     sin completo, así que amplitudes grandes se ven correctas.
  //   · Colisiones: choque elástico de masas iguales = INTERCAMBIO de
  //     velocidad angular (mismo largo de hilo ⇒ intercambiar ω == intercambiar
  //     la velocidad lineal). Se resuelve iterando la cadena para que el impulso
  //     se propague entero en un mismo frame (1 bola entra → 1 sale del otro
  //     lado; 2 entran → 2 salen). COLLISION_LOSS=1 ⇒ sin pérdida en el choque.
  //   · Reposo: las bolas cuelgan rectas y JUSTO tocándose (separación = 2·radio),
  //     con una amortiguación de aire muy leve y un snap final, así no tiembla.
  // ════════════════════════════════════════════════════════════════════
  const TAU = Math.PI * 2;

  // ── PERILLAS DE AJUSTE ──
  const FIXED_DT       = 5;       // ms por paso de física (acumulador → estable e independiente del fps)
  const OMEGA          = 6.1;     // rad/s — frecuencia natural del péndulo (período chico ≈ 2π/OMEGA ≈ 1.0 s)
  const DAMP           = 0.15;    // 1/s — amortiguación de aire (chico = oscila mucho rato)
  const COLLISION_LOSS = 1.0;     // 1 = choque perfectamente elástico; <1 pierde energía en cada impacto
  const RESIDUAL       = 0.005;    // fracción que NO se transfiere en el choque ⇒ queda algo de sway en la cadena (0 = swap perfecto, fila muerta)
  const REST_SNAP_ANG  = 0.004;   // rad — por debajo de esto (y vel baja) se clava en reposo
  const REST_SNAP_VEL  = 0.012;   // rad/s
  const ANG_EPS        = 0.0015;  // rad — penetración angular por debajo de la cual no se corrige (anti-jitter en reposo)
  const VEL_EPS        = 1e-3;    // rad/s — umbral de "acercándose" para disparar el swap
  const FLING_TC       = 0.05;    // s — constante del filtro paso-bajo de la velocidad de arrastre (como MOUSE_SMOOTH_TC de Balls)
  const FLING_MAX      = 10;      // rad/s — tope del impulso que podés imprimirle a una bola al soltarla

  // colores de las bolas (acero cromado, como la foto: highlight brillante y borde oscuro fresnel)
  const STEEL = {
    hi:   'rgb(226,233,241)',
    lite: 'rgb(150,162,176)',
    mid:  'rgb(96,107,121)',
    lo:   'rgb(46,54,64)',
    edge: 'rgb(14,18,24)',
  };

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0, dpr = 1;
  // layout (recalculado en resize y al cambiar la cantidad de bolas)
  let radio = 30, L = 450, origY = 150, centerX = 0;
  let frameLeft = 0, frameRight = 0, frameTop = 0, baseY = 0, k = 1;
  // Escala de la ESCENA (ventana, luna, horizonte, planta): depende SÓLO de W/H, NO de la cantidad de
  // bolas. Así, al agregar/quitar bolas, sólo cambian la cuna y el tamaño de la mesa — el fondo queda fijo.
  let sceneR = 30, sceneK = 1;
  let tableTop = 0;             // y de la superficie del mueble donde se apoya la base del péndulo
  let tableLeft = 0;            // x donde EMPIEZA la mesa (sale por la derecha; la cuna queda cerca de este borde)
  let sceneDay = null, sceneNight = null;   // FONDO (pared+ventana+biblioteca+penumbra) — detrás de la planta
  let plantDay = null, plantNight = null;   // PLANTA sola (capa propia para poder animarla con un vaivén)
  let frontDay = null, frontNight = null;   // MESA (canto + sombra de contacto) — delante de la planta
  let godRaysDay = null, godRaysNight = null; // rayos de luz del ventanal (bakeados, blit con alpha animado)
  let frameLayer = null;        // marco del péndulo (arco + base + collares) bakeado — estático entre layouts
  let ballSprite = null, ballSpriteHalf = 0; // esfera metálica bakeada una vez por layout (mismo radio todas)
  let vignette = null;          // gradiente de viñeteado (oscurece bordes; da profundidad de "plano de cerca")
  let nightFactor = 0;          // 0 = día, 1 = noche (transiciona en bucle, independiente del péndulo)
  let sceneClock = 0;           // ms acumulados para el ciclo día/noche
  const NIGHT_PERIOD = 54;      // s — duración del ciclo día↔noche completo

  // estado de simulación
  let nroBalls = 5;
  let balls = [];
  let ghosted = false;          // toggle: las bolas se atraviesan (sin colisión) + se ven translúcidas
  let holding = false;          // toggle: congela la gravedad (modo pose)
  let grabbedBall = null;       // una sola bola agarrada por vez (pegajosa hasta soltar el dedo)
  let flingVel = 0;             // velocidad angular filtrada del arrastre, para imprimirla al soltar

  // ── geometría ──
  const getangle = (ax, ay, bx, by) => Math.atan2(by - ay, bx - ax);
  const colisionRyp = (cx, cy, w, h, px, py) => px > cx && px < cx + w && py > cy && py < cy + h;

  function origX(i) {
    const totalWidth = (nroBalls - 1) * radio * 2;
    return centerX - totalWidth / 2 + radio * 2 * i;
  }
  function setPos(b) { b.x = origX(b.nro) + Math.cos(b.angulo) * L; b.y = origY + Math.sin(b.angulo) * L; }

  const INSET_K    = 1.9;         // voladizo del marco más allá de la bola del extremo, en radios
  const BASE_THK_K = 1.3;         // grosor de la base negra, en radios
  const STRING_K   = 9.0;         // largo del hilo, en radios (hilos largos ⇒ bolas más chicas, como la foto)
  // MACETÓN (compartido por drawPlant y por el cálculo de tableLeft en layout, para no desincronizar)
  const PLANT_CX    = 0.086;      // centro del pote, fracción de W (corrido a la izq: deja gap con la mesa al tener 10 bolas)
  const PLANT_POTHW = 0.094;      // semiancho del pote, fracción de W (grande ⇒ macetón)
  function layout() {
    centerX = W / 2;
    // Plano de cerca: la base del péndulo se apoya sobre el CANTO de la mesa (a ~74% del alto). Arriba
    // entra una ventana grande; debajo del canto fino, todo a oscuras. Crece hacia arriba.
    tableTop = H * 0.74;
    const topMargin = H * 0.05;                                                    // aire arriba para el hint
    const divH = STRING_K + 0.15 + 1.1 + BASE_THK_K;                               // alto del aparato / radio
    const rW = (0.50 * W) / (2 * (nroBalls - 1) + 2 * INSET_K);
    const rH = (tableTop - topMargin) / divH;
    radio = Math.max(6, Math.min(rW, rH));
    k = radio / 30;
    // escala de escena estable (independiente de nroBalls) — fija ventana/luna/horizonte/planta
    sceneR = Math.min(W, H) * 0.06;
    sceneK = sceneR / 30;
    L = radio * STRING_K;
    const baseThk = radio * BASE_THK_K;
    baseY = tableTop - baseThk;                                                    // cara superior de la base (su fondo descansa en la mesa)
    frameTop = baseY - L - radio * 1.1;                                            // travesaño superior
    origY = frameTop;                                                              // pivote de los hilos
    const ballSpan = (nroBalls - 1) * radio * 2;
    const inset = radio * INSET_K;
    frameLeft  = centerX - ballSpan / 2 - inset;
    frameRight = centerX + ballSpan / 2 + inset;
    // la mesa empieza pasado el borde izquierdo de pantalla y sale por la derecha: la cuna queda
    // cerca del borde IZQUIERDO de la mesa. Pero SIEMPRE con separación visible respecto de la maceta:
    // nunca arranca a la izquierda del borde derecho del pote + un gap.
    const potRight = W * PLANT_CX + W * PLANT_POTHW * 1.04;                         // borde der del labio del macetón (ver drawPlant)
    const gap = Math.min(W, H) * 0.045;
    const cradleLeft = frameLeft - radio * 2.5;                                     // borde izq de la cuna (la base llega a frameLeft − 2.4·radio)
    // La mesa SIEMPRE contiene la cuna: su borde no puede quedar a la derecha del pie. Si hay lugar,
    // además deja un gap respecto del macetón; si la cuna es muy ancha (muchas bolas) gana la contención
    // y el pote se mete apenas detrás del canto de la mesa.
    tableLeft = Math.min(cradleLeft, potRight + gap);
    for (const b of balls) setPos(b);
  }

  const barEl = document.getElementById('bar');
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const barH = barEl.offsetHeight;
    W = window.innerWidth;
    H = window.innerHeight - barH;
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    layout();
    buildScenes();
    vignette = ctx.createRadialGradient(W * 0.5, H * 0.55, Math.min(W, H) * 0.16, W * 0.5, H * 0.55, Math.max(W, H) * 0.82);
    vignette.addColorStop(0,    'rgba(0,0,0,0)');
    vignette.addColorStop(0.35, 'rgba(0,0,0,0.07)');
    vignette.addColorStop(0.65, 'rgba(0,0,0,0.28)');
    vignette.addColorStop(1,    'rgba(0,0,0,0.56)');
  }
  window.addEventListener('resize', resize);

  function buildBalls() {
    balls = [];
    grabbedBall = null;
    for (let i = 0; i < nroBalls; i++)
      balls.push({ nro: i, angulo: Math.PI / 2, velocidad: 0, grabbed: false, pushed: false, x: 0, y: 0 });
    layout();
    buildScenes();                                                                 // el radio/ancho cambió ⇒ rearmar la escena (día + noche)
  }

  // ════════════════ FÍSICA ════════════════
  const W2 = () => OMEGA * OMEGA;
  function integrate(b, dt) {
    // péndulo real: α = -ω²·sin(φ), con φ = angulo - π/2  ⇒  α = ω²·cos(angulo).
    // Integración velocity-Verlet: conserva mejor la energía que Euler ⇒ el swing se ve más natural
    // y parejo (Euler semi-implícito metía amortiguación numérica que lo apagaba de más).
    const a0 = W2() * Math.cos(b.angulo);
    b.angulo += b.velocidad * dt + 0.5 * a0 * dt * dt;
    const a1 = W2() * Math.cos(b.angulo);
    b.velocidad += 0.5 * (a0 + a1) * dt;
    b.velocidad *= Math.exp(-DAMP * dt);
    // snap a reposo para que no quede temblando infinitamente
    const phi = b.angulo - Math.PI / 2;
    if (Math.abs(phi) < REST_SNAP_ANG && Math.abs(b.velocidad) < REST_SNAP_VEL) {
      b.angulo = Math.PI / 2; b.velocidad = 0;
    }
  }

  function clampAngle(b) {
    // no pasar de la horizontal a cada lado (igual que el .py)
    if (b.angulo < 0 && b.angulo >= -Math.PI / 2) { b.angulo = 0;       b.velocidad = 0; }
    if (b.angulo > -Math.PI && b.angulo < -Math.PI / 2) { b.angulo = Math.PI; b.velocidad = 0; }
    if (b.angulo < 0) { b.angulo = 0; if (b.velocidad < 0) b.velocidad = 0; }
    if (b.angulo > Math.PI) { b.angulo = Math.PI; if (b.velocidad > 0) b.velocidad = 0; }
  }

  // Colisiones resueltas en ESPACIO DE ÁNGULOS (no por distancia entre centros). Las anclas son paralelas
  // y equiespaciadas 2·radio, así que dos vecinas se tocan exactamente cuando tienen el mismo ángulo, y la
  // condición de no-penetración de la cadena es simplemente θ_izq ≥ θ_der. La "penetración" es entonces
  // pen = θ_b − θ_a (>0 = cruzaron / se pisan). Esto evita el bug del test por distancia: cerca de la
  // horizontal, si la arrastrada se atrasaba se separaba en VERTICAL, la distancia superaba 2·radio y se
  // soltaba antes del tope. Con ángulos, arrastrar hasta el extremo funciona igual que abajo.
  function resolveCollisions(allowSwap) {
    if (ghosted) return;
    for (let iter = 0; iter < nroBalls + 2; iter++) {
      let changed = false;
      for (let i = 0; i < balls.length - 1; i++) {
        const a = balls[i], b = balls[i + 1];                                      // a a la izquierda, b a la derecha
        const pen = b.angulo - a.angulo;                                           // >ANG_EPS = se están pisando
        if (pen <= ANG_EPS) continue;
        // "rígida" = agarrada por el dedo, o ya arrastrada por la cadena agarrada en este frame. La rígida
        // arrastra a la vecina EN VIVO sin transmitirle velocidad: le clava su mismo ángulo y le deja vel 0.
        // Se propaga por la cadena (la arrastrada también queda rígida) ⇒ se levantan de a dos/tres/… sin
        // que ninguna se suelte.
        const aRigid = a.grabbed || a.pushed;
        const bRigid = b.grabbed || b.pushed;
        if (aRigid && !bRigid)      { b.angulo = a.angulo; setPos(b); b.velocidad = 0; b.pushed = true; changed = true; }
        else if (bRigid && !aRigid) { a.angulo = b.angulo; setPos(a); a.velocidad = 0; a.pushed = true; changed = true; }
        else if (!aRigid && !bRigid) {
          const mid = (a.angulo + b.angulo) * 0.5;                                 // separar a contacto exacto (mismo ángulo)
          a.angulo = mid; setPos(a);
          b.angulo = mid; setPos(b);
          changed = true;
          // choque de masas iguales: intercambio de velocidad, sólo si se acercan. Pero IMPERFECTO: cada
          // una se queda con una fracción RESIDUAL de su propia velocidad, así la cadena conserva un poco
          // de movimiento (sway suave) en vez de quedar perfectamente muerta.
          if (allowSwap && (b.velocidad - a.velocidad) > VEL_EPS) {
            const va = a.velocidad, vb = b.velocidad;
            frameImpactV = Math.max(frameImpactV, vb - va);                         // energía del choque más fuerte de este frame → sonido
            a.velocidad = (vb * (1 - RESIDUAL) + va * RESIDUAL) * COLLISION_LOSS;
            b.velocidad = (va * (1 - RESIDUAL) + vb * RESIDUAL) * COLLISION_LOSS;
          }
        }
      }
      if (!changed) break;
    }
  }

  // ángulo del puntero respecto del ancla de la bola, mapeado al hemisferio inferior [0, π]
  function pointerAngle(b) {
    let ang = getangle(origX(b.nro), origY, mx, my);
    if (ang < 0 && ang >= -Math.PI / 2) ang = 0;
    else if (ang > -Math.PI && ang < -Math.PI / 2) ang = Math.PI;
    return ang;
  }

  function step(dtms) {
    const dt = dtms / 1000;

    // ── soltar: imprimir el impulso del arrastre (como el throw de Balls con mouseVx/Vy) ──
    // Se usa el flag `pushed` del frame ANTERIOR (todavía en las bolas) para que un grupo levantado
    // junto salga junto, todas con la misma velocidad angular. Por eso va ANTES del reset de `pushed`.
    if (!mDown && grabbedBall) {
      const fv = Math.max(-FLING_MAX, Math.min(FLING_MAX, flingVel));
      grabbedBall.velocidad = fv;
      for (const b of balls) if (b.pushed) b.velocidad = fv;
      grabbedBall = null;
    }

    for (const b of balls) b.pushed = false;                                       // se recalcula cada frame en resolveCollisions

    // ── agarre: una sola bola por vez y pegajosa (se mantiene hasta soltar el dedo) ──
    if (mDown && !grabbedBall) {
      for (const b of balls) {
        if (colisionRyp(b.x - radio, b.y - radio, radio * 2, radio * 2, mx, my)) {
          grabbedBall = b;
          flingVel = 0;
          b.angulo = pointerAngle(b); setPos(b);                                    // pegar al puntero sin spike de velocidad
          break;
        }
      }
    }

    for (const ball of balls) {
      ball.grabbed = (ball === grabbedBall);
      if (ball.grabbed) {
        const ang = pointerAngle(ball);
        const raw = (ang - ball.angulo) / dt;                                       // velocidad angular instantánea del arrastre
        const kf = 1 - Math.exp(-dt / FLING_TC);
        flingVel += (raw - flingVel) * kf;                                          // filtro paso-bajo (suaviza el jitter del puntero)
        ball.angulo = ang;
        ball.velocidad = 0;                                                         // mientras la sostenés no transmite; el impulso se aplica al soltar
      } else if (!holding) {
        integrate(ball, dt);
      }
      clampAngle(ball);
      setPos(ball);
    }
    // colisiones después de mover todo, para que el impulso se propague por la cadena
    resolveCollisions(!holding);
  }

  // ════════════════ DIBUJO ════════════════
  // path de rectángulo redondeado en un contexto cualquiera (sirve para el canvas principal y el de la escena)
  function rrp(c, x, y, w, h, rad) {
    rad = Math.min(rad, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + rad, y);
    c.arcTo(x + w, y, x + w, y + h, rad);
    c.arcTo(x + w, y + h, x, y + h, rad);
    c.arcTo(x, y + h, x, y, rad);
    c.arcTo(x, y, x + w, y, rad);
    c.closePath();
  }
  function rrPath(x, y, w, h, rad) { rrp(ctx, x, y, w, h, rad); }

  // ════════════════ ESCENA (habitación: pared + ventana grande + mesa) ════════════════
  // Se renderiza dos veces (día y noche) a canvas offscreen; el draw() crossfadea entre ambas.
  function buildScenes() {
    if (W <= 0 || H <= 0) return;
    sceneDay   = renderScene(false); sceneNight = renderScene(true);   // FONDO (detrás de la planta)
    godRaysDay = renderGodRays(false); godRaysNight = renderGodRays(true); // rayos del ventanal
    plantDay   = renderPlant(false); plantNight = renderPlant(true);   // PLANTA (capa animable)
    frontDay   = renderFront(false); frontNight = renderFront(true);   // MESA (delante de la planta)
    buildFrameLayer();                                                             // marco del péndulo bakeado (estático)
    bakeBallSprite();                                                              // esfera metálica bakeada (mismo radio todas)
  }

  // helper: canvas offscreen del tamaño del lienzo, escalado por dpr
  function newLayer() {
    const cv = document.createElement('canvas');
    cv.width = Math.max(1, Math.floor(W * dpr));
    cv.height = Math.max(1, Math.floor(H * dpr));
    const c = cv.getContext('2d');
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { cv, c };
  }
  // PLANTA sola, fondo transparente (capa propia para el vaivén)
  function renderPlant(night) { const { cv, c } = newLayer(); drawPlant(c, night); return cv; }
  // MESA: canto + sombra de contacto del péndulo, fondo transparente (va delante de la planta)
  function renderFront(night) {
    const { cv, c } = newLayer();
    drawTableEdge(c, night);
    // reflejo suave del aparato sobre el canto pulido (bakeado; cálido de día / tenue-frío de noche)
    {
      const topY = tableTop + 1, band = Math.min(H * 0.07, sceneR * 3.2);
      const base = night ? 'rgba(120,140,175,' : 'rgba(150,135,110,';
      const rg = c.createLinearGradient(0, topY, 0, topY + band);
      rg.addColorStop(0, base + (night ? 0.10 : 0.14) + ')');
      rg.addColorStop(0.55, base + (night ? 0.04 : 0.06) + ')');
      rg.addColorStop(1, 'rgba(0,0,0,0)');
      c.fillStyle = rg; c.fillRect(tableLeft, topY, W - tableLeft, band);
      for (const fx of [0.30, 0.5, 0.7]) {                                          // manchas difusas ~ bolas reflejadas
        const sx = tableLeft + (W - tableLeft) * fx, sy = topY + band * 0.3;
        const hg = c.createRadialGradient(sx, sy, 0, sx, sy, sceneR * 0.55);
        hg.addColorStop(0, `rgba(${night ? '190,205,235' : '225,215,190'},${night ? 0.05 : 0.09})`);
        hg.addColorStop(1, 'rgba(0,0,0,0)');
        c.fillStyle = hg; c.beginPath(); c.arc(sx, sy, sceneR * 0.55, 0, TAU); c.fill();
      }
    }
    const sw = (frameRight - frameLeft) + radio * 5;
    const csh = c.createRadialGradient(centerX, tableTop, 0, centerX, tableTop, sw * 0.5);
    csh.addColorStop(0, `rgba(0,0,0,${night ? 0.5 : 0.4})`); csh.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = csh; c.save(); c.translate(0, tableTop); c.scale(1, 0.16);
    c.beginPath(); c.arc(centerX, 0, sw * 0.5, 0, TAU); c.fill(); c.restore();
    return cv;
  }

  // geometría del ventanal (compartida por drawWindow, renderGodRays y el titileo de estrellas)
  function windowGeom() {
    const gx = W * 0.305, gy = -H * 0.30, gw = (W + sceneR) - gx, gh = (H + sceneR) - gy;
    return { gx, gy, gw, gh, horizonY: gy + gh * 0.62 };
  }

  // RAYO de luz del ventanal: UN SOLO CONO suave y amplio (bakeado, clipeado al vidrio). En draw() se
  // blitea con alpha "respirando". Cálido de día (sol naciente → apunta ARRIBA), frío de noche (luna
  // alta → baja al cuarto). Relleno radial desde la fuente ⇒ cae con la distancia, bordes suaves.
  function renderGodRays(night) {
    const { cv, c } = newLayer();
    const { gx, gy, gw, gh, horizonY } = windowGeom();
    const srcX = night ? gx + gw * 0.55 : gx + gw * 0.42;
    const srcY = night ? H * 0.18 : horizonY;
    const reach = Math.max(W, H) * 1.5;
    const dir = night ? Math.PI * 0.6 : -Math.PI * 0.5;                             // abajo (noche) / arriba (día)
    const half = Math.PI * 0.36;                                                    // cono AMPLIO (~±65°)
    c.save();
    c.beginPath(); c.rect(gx, Math.max(0, gy), gw, (gy + gh) - Math.max(0, gy)); c.clip();
    c.globalCompositeOperation = 'lighter';
    const rg = c.createRadialGradient(srcX, srcY, 0, srcX, srcY, reach);
    if (night) { rg.addColorStop(0, 'rgba(150,176,232,0.10)'); rg.addColorStop(0.5, 'rgba(140,168,228,0.035)'); rg.addColorStop(1, 'rgba(140,168,228,0)'); }
    else       { rg.addColorStop(0, 'rgba(255,228,158,0.12)'); rg.addColorStop(0.5, 'rgba(255,212,140,0.045)'); rg.addColorStop(1, 'rgba(255,206,128,0)'); }
    c.fillStyle = rg;
    c.beginPath();
    c.moveTo(srcX, srcY);
    c.arc(srcX, srcY, reach, dir - half, dir + half);                              // base del cono como arco suave
    c.closePath();
    c.fill();
    c.restore();
    return cv;
  }

  function renderScene(night) {
    const cv = document.createElement('canvas');
    cv.width  = Math.max(1, Math.floor(W * dpr));
    cv.height = Math.max(1, Math.floor(H * dpr));
    const s = cv.getContext('2d');
    s.setTransform(dpr, 0, 0, dpr, 0, 0);

    // ── PARED (sólo queda visible la franja izquierda, detrás de la biblioteca) ──
    let g = s.createLinearGradient(0, 0, 0, tableTop);
    if (night) { g.addColorStop(0, 'rgb(20,21,33)'); g.addColorStop(1, 'rgb(36,33,46)'); }
    else       { g.addColorStop(0, 'rgb(46,40,47)'); g.addColorStop(1, 'rgb(76,62,61)'); }
    s.fillStyle = g; s.fillRect(0, 0, W, tableTop);

    // ── VENTANAL GIGANTE, CORTADO: sin marco a la vista ──
    // Arranca a 0.305W (queda franja de pared contra la biblioteca, con un montante al ras), sale por
    // la derecha y por arriba (≈1/4 de su alto fuera de pantalla), y la mesa lo corta abajo.
    drawWindow(s, night);

    // ── BIBLIOTECA: llena la pared izquierda a lo alto completo (cortada arriba y abajo) ──
    drawBookshelf(s, night);

    // pool de luz que entra por el ventanal — cálida de día, fría (luna) de noche
    const lx0 = W * 0.62;
    const lg = s.createRadialGradient(lx0, H * 0.2, 0, lx0, H * 0.2, Math.max(W, H) * 0.7);
    if (night) { lg.addColorStop(0, 'rgba(150,172,230,0.10)'); lg.addColorStop(1, 'rgba(150,172,230,0)'); }
    else       { lg.addColorStop(0, 'rgba(255,226,170,0.16)'); lg.addColorStop(1, 'rgba(255,226,170,0)'); }
    s.fillStyle = lg; s.fillRect(0, 0, W, tableTop);

    // penumbra del rincón a la izquierda de la mesa (parte del FONDO, detrás de la planta).
    // La planta y la mesa se rinden en capas aparte (renderPlant/renderFront) para poder mover las hojas.
    drawTableShade(s);
    return cv;
  }

  // Ventanal gigante SIN bordes a la vista: sólo vidrio + parteluces. El rect real se extiende más
  // allá de los 4 lados visibles (izq: detrás de la biblioteca; der/arriba: fuera de pantalla; abajo:
  // sigue por detrás de la mesa) — estamos viendo ~3/4 de su altura, como un plano de cerca.
  function drawWindow(s, night) {
    const gx = W * 0.305;                                                           // arranca pasada la biblioteca (queda franja de pared)
    const gy = -H * 0.30;                                                           // ~1/4 del alto queda arriba, fuera de pantalla
    const gw = (W + sceneR) - gx;                                                   // sale por la derecha
    const gh = (H + sceneR) - gy;                                                   // sigue hasta abajo (la mesa lo corta)
    // vidrio (el gradiente se define sobre el alto TOTAL, así lo visible se lee como un recorte)
    const gg = s.createLinearGradient(0, gy, 0, gy + gh);
    if (night) {
      gg.addColorStop(0, 'rgb(10,14,34)'); gg.addColorStop(0.6, 'rgb(22,26,54)'); gg.addColorStop(1, 'rgb(40,40,66)');
    } else {
      gg.addColorStop(0, 'rgb(96,128,168)'); gg.addColorStop(0.45, 'rgb(176,168,170)');
      gg.addColorStop(0.7, 'rgb(224,176,132)'); gg.addColorStop(1, 'rgb(196,128,96)');
    }
    s.fillStyle = gg; s.fillRect(gx, gy, gw, gh);

    const horizonY = gy + gh * 0.62;                                                // línea de colinas, queda ~mitad visible
    if (night) {
      // estrellas (posiciones deterministas, sin Math.random para que no titilen al rearmar)
      for (let i = 0; i < 48; i++) {
        const sx = gx + ((i * 73) % 100) / 100 * gw;
        const sy = ((i * 149) % 100) / 100 * (horizonY - gy) + gy;
        if (sy < 0) continue;                                                       // fuera de pantalla
        const r = 0.6 + ((i * 37) % 10) / 10 * 1.1;
        s.globalAlpha = (0.3 + ((i * 53) % 10) / 10 * 0.6) * 0.6;                   // atenuadas: el titileo en vivo (drawStarTwinkle) suma encima
        s.fillStyle = 'rgba(255,255,255,0.85)';
        s.beginPath(); s.arc(sx, sy, r, 0, TAU); s.fill();
      }
      s.globalAlpha = 1;
      // bloom de la luna (detrás del disco → se lee luminosa, y le da origen a los rayos)
      const _moonX = gx + gw * 0.55, _moonY = H * 0.18, _moonR = sceneR * 1.1;
      const nb = s.createRadialGradient(_moonX, _moonY, 0, _moonX, _moonY, _moonR * 5);
      nb.addColorStop(0, 'rgba(200,216,255,0.22)'); nb.addColorStop(0.5, 'rgba(176,200,255,0.07)'); nb.addColorStop(1, 'rgba(190,210,255,0)');
      s.fillStyle = nb; s.beginPath(); s.arc(_moonX, _moonY, _moonR * 5, 0, TAU); s.fill();
      // luna + halo
      const mx = gx + gw * 0.55, my = H * 0.18, mr = sceneR * 1.1;
      const halo = s.createRadialGradient(mx, my, 0, mx, my, mr * 3);
      halo.addColorStop(0, 'rgba(220,230,255,0.4)'); halo.addColorStop(1, 'rgba(220,230,255,0)');
      s.fillStyle = halo; s.beginPath(); s.arc(mx, my, mr * 3, 0, TAU); s.fill();
      const mg = s.createRadialGradient(mx - mr * 0.3, my - mr * 0.3, 0, mx, my, mr);
      mg.addColorStop(0, 'rgb(245,248,255)'); mg.addColorStop(1, 'rgb(196,206,228)');
      s.fillStyle = mg; s.beginPath(); s.arc(mx, my, mr, 0, TAU); s.fill();
    } else {
      // bloom del sol (amplio y cálido, detrás del disco → ancla los rayos)
      const _sunX = gx + gw * 0.42, _sunY = horizonY;
      const db = s.createRadialGradient(_sunX, _sunY, 0, _sunX, _sunY, H * 0.6);
      db.addColorStop(0, 'rgba(255,238,180,0.34)'); db.addColorStop(0.45, 'rgba(255,212,150,0.13)'); db.addColorStop(1, 'rgba(255,200,140,0)');
      s.fillStyle = db; s.fillRect(gx, Math.max(0, gy), gw, gh);
      // sol bajo + resplandor
      const sun = s.createRadialGradient(gx + gw * 0.42, horizonY, 0, gx + gw * 0.42, horizonY, H * 0.45);
      sun.addColorStop(0, 'rgba(255,238,200,0.95)'); sun.addColorStop(0.5, 'rgba(255,210,150,0.4)'); sun.addColorStop(1, 'rgba(255,210,150,0)');
      s.fillStyle = sun; s.fillRect(gx, Math.max(0, gy), gw, gh);
    }

    // colinas lejanas
    s.fillStyle = night ? 'rgba(14,16,30,0.85)' : 'rgba(64,74,68,0.55)';
    s.beginPath(); s.moveTo(gx, horizonY + H * 0.04);
    s.quadraticCurveTo(gx + gw * 0.3, horizonY - H * 0.05, gx + gw * 0.55, horizonY + H * 0.02);
    s.quadraticCurveTo(gx + gw * 0.8, horizonY + H * 0.08, gx + gw, horizonY - H * 0.02);
    s.lineTo(gx + gw, gy + gh); s.lineTo(gx, gy + gh); s.closePath(); s.fill();

    // parteluces: grilla regular sobre el rect TOTAL — las barras se van de pantalla por los 4 lados,
    // ningún borde del marco a la vista
    const bar = Math.max(4, sceneR * 0.42);
    const cell = Math.max(sceneR * 6, H * 0.36);
    s.strokeStyle = night ? 'rgb(46,32,18)' : 'rgb(74,50,28)'; s.lineWidth = bar;
    s.beginPath();
    s.moveTo(gx + bar * 0.4, gy); s.lineTo(gx + bar * 0.4, gy + gh);               // montante al ras del borde izq (se lee como barra, no como fin de ventana)
    for (let px = gx + cell; px < gx + gw; px += cell) { s.moveTo(px, gy); s.lineTo(px, gy + gh); }
    for (let py = gy + cell; py < gy + gh; py += cell) { s.moveTo(gx, py); s.lineTo(gx + gw, py); }
    s.stroke();
    // reflejo diagonal sutil en el vidrio
    s.strokeStyle = night ? 'rgba(180,200,255,0.06)' : 'rgba(255,255,255,0.10)'; s.lineWidth = Math.max(4, sceneR * 0.5);
    s.beginPath(); s.moveTo(gx + gw * 0.08, H * 0.5); s.lineTo(gx + gw * 0.55, H * 0.02); s.stroke();
  }

  // Penumbra a la IZQUIERDA del inicio de la mesa (el rincón/biblioteca sigue bajando oscuro). Va
  // DETRÁS de la planta, así no oscurece la maceta.
  function drawTableShade(s) {
    const over = s.createLinearGradient(0, tableTop, 0, H);
    over.addColorStop(0, 'rgba(0,0,0,0.25)');
    over.addColorStop(0.45, 'rgba(0,0,0,0.7)');
    over.addColorStop(1, 'rgba(0,0,0,0.92)');
    s.fillStyle = over; s.fillRect(0, tableTop, tableLeft, H - tableTop);
  }

  // El CANTO FINO de la mesa (tableLeft → W) + su sombra debajo. Va DELANTE de la planta (la tapa,
  // igual que la cuna). Grosor FIJO (sceneR, no cambia con la cantidad de bolas).
  function drawTableEdge(s, night) {
    const DK = night ? 0.62 : 1;
    const edgeH = sceneR * 2.6;
    const bottom = tableTop + edgeH;
    // ── canto de madera (tableLeft → W) ──
    const g = s.createLinearGradient(0, tableTop, 0, bottom);
    g.addColorStop(0,    `rgb(${132*DK|0},${86*DK|0},${50*DK|0})`);                // arista superior, iluminada
    g.addColorStop(0.14, `rgb(${102*DK|0},${65*DK|0},${36*DK|0})`);
    g.addColorStop(1,    `rgb(${54*DK|0},${33*DK|0},${17*DK|0})`);
    s.fillStyle = g; s.fillRect(tableLeft, tableTop, W - tableLeft, edgeH);
    // realce del canto superior (la arista donde apoya el péndulo)
    s.strokeStyle = night ? 'rgba(150,170,210,0.45)' : 'rgba(230,186,134,0.75)';
    s.lineWidth = Math.max(1.5, 1.4 * sceneK);
    s.beginPath(); s.moveTo(tableLeft + 2, tableTop + 1); s.lineTo(W, tableTop + 1); s.stroke();
    // arista izquierda de la mesa (el corte vertical del borde)
    s.strokeStyle = night ? 'rgba(120,136,170,0.3)' : 'rgba(200,150,100,0.45)';
    s.lineWidth = Math.max(1, sceneK);
    s.beginPath(); s.moveTo(tableLeft + 1, tableTop + 1); s.lineTo(tableLeft + 1, bottom); s.stroke();
    // una veta fina
    s.strokeStyle = 'rgba(18,8,4,0.3)'; s.lineWidth = Math.max(1, 0.6 * sceneK);
    s.beginPath(); const ly = tableTop + edgeH * 0.55; s.moveTo(tableLeft, ly); s.lineTo(W, ly); s.stroke();
    // ── debajo del canto: oscuridad (sombra dura del borde → negro) ──
    const dg = s.createLinearGradient(0, bottom, 0, H);
    dg.addColorStop(0,   'rgba(0,0,0,0.9)');
    dg.addColorStop(0.35, night ? 'rgb(5,5,8)' : 'rgb(9,6,5)');
    dg.addColorStop(1,   night ? 'rgb(2,2,4)' : 'rgb(4,3,3)');
    s.fillStyle = dg; s.fillRect(tableLeft, bottom, W - tableLeft, H - bottom);
  }

  // Maceta con planta en PRIMER PLANO, esquina inferior izquierda: la maceta queda cortada por el
  // borde de abajo (el piso no se ve) y el follaje asoma hasta el nivel de la mesa. Más oscura que
  // la escena (está cerca de cámara, a contraluz).
  function drawPlant(s, night) {
    const DK = (night ? 0.5 : 1) * 0.82;

    // ---- color helper: cada canal por DK ----
    const C = (r, g, b, a) =>
      a === undefined
        ? "rgb(" + ((r * DK) | 0) + "," + ((g * DK) | 0) + "," + ((b * DK) | 0) + ")"
        : "rgba(" + ((r * DK) | 0) + "," + ((g * DK) | 0) + "," + ((b * DK) | 0) + "," + a + ")";

    // ---- PRNG sembrado (mulberry32), 100% determinista ----
    function mulberry32(a) {
      return function () {
        a |= 0; a = (a + 0x6d2b79f5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ---- composicion (toda la planta dentro del ~22% izquierdo) ----
    const px = W * PLANT_CX;       // centro del pote
    const lipY = H * 0.85;         // borde superior del pote (más arriba ⇒ cuerpo del macetón más visible)
    const pot = W * PLANT_POTHW;   // semiancho del pote (macetón)

    // Sin recorte duro: la cuna se dibuja ENCIMA de la planta (en draw()), así que las hojas que se
    // estiran hacia la derecha quedan tapadas por la cuna de forma natural, sin el corte vertical feo.
    // El save() queda como wrapper inofensivo (el restore() al final lo cierra).
    s.save();

    // ============================================================
    // HOJA-ESPADA: forma curva afinada con arqueo + gravedad,
    // franja central variegada (verde lima) y nervadura oscura.
    // baseX/baseY = origen (corona). ang = direccion de salida (rad,
    // 0 = derecha, -PI/2 = arriba). len, w, arch (curvatura/caida).
    // backLayer => mas oscura. seed para micro-variacion de tono.
    // ============================================================
    function swordLeaf(baseX, baseY, ang, len, w, arch, backLayer, seed) {
      s.save();
      s.translate(baseX, baseY);
      s.rotate(ang);

      // Eje de la hoja: recto al nacer, luego se arquea hacia afuera y CAE por gravedad. En coords
      // locales +x es "a lo largo". gs hace que el doblez vaya SIEMPRE hacia abajo en el mundo (sin
      // importar la direccion de la hoja): asi las hojas de la izquierda tambien cuelgan, no se arquean
      // para arriba. (local +y mapea a world-y * cos(ang); elegimos el signo que da world-down.)
      const tipX = len;
      const gs = Math.cos(ang) >= 0 ? 1 : -1;
      const c1x = len * 0.42, c1y = gs * len * arch * 0.12;
      const c2x = len * 0.78, c2y = gs * len * arch * 0.45;
      const tipY = gs * len * arch * 0.95;

      // muestreo de la espina (bezier cubica) para construir el contorno
      const N = 14;
      const spineX = [], spineY = [], nrmX = [], nrmY = [];
      let pxp = 0, pyp = 0;
      for (let i = 0; i <= N; i++) {
        const t = i / N, mt = 1 - t;
        const bx =
          3 * mt * mt * t * c1x +
          3 * mt * t * t * c2x +
          t * t * t * tipX;
        const by =
          3 * mt * mt * t * c1y +
          3 * mt * t * t * c2y +
          t * t * t * tipY;
        spineX[i] = bx; spineY[i] = by;
        const dx = bx - pxp, dy = by - pyp;
        pxp = bx; pyp = by;
        const dl = Math.hypot(dx, dy) || 1;
        nrmX[i] = -dy / dl; nrmY[i] = dx / dl;
      }

      // ancho a lo largo: hoja-espada -> ancha al ~1/4, afila a PUNTA FINA (→0 en la punta).
      // (antes el término base 0.18 dejaba la punta con ~18% del ancho ⇒ borde romo/rectangular).
      const halfW = (t) => {
        const e = Math.sin(Math.pow(t, 0.5) * Math.PI);                            // 0 en base y punta, máx ~t=0.25
        return w * (e + (1 - t) * 0.05);                                           // pizca de cuerpo en la base; punta a 0
      };

      // --- relleno: gradiente longitudinal (base->punta) ---
      const baseLight = backLayer ? -16 : 0;
      const tone = ((seed * 23) % 11) - 5; // -5..+5 micro-variacion
      const g = s.createLinearGradient(0, 0, tipX, tipY);
      g.addColorStop(0.00, C(28 + baseLight + tone, 64 + baseLight, 34 + baseLight));
      g.addColorStop(0.45, C(40 + baseLight + tone, 96 + baseLight + tone, 46 + baseLight));
      g.addColorStop(1.00, C(30 + baseLight, 78 + baseLight, 40 + baseLight));
      s.fillStyle = g;

      s.beginPath();
      s.moveTo(spineX[0] + nrmX[0] * halfW(0), spineY[0] + nrmY[0] * halfW(0));
      for (let i = 1; i <= N; i++) {
        const hw = halfW(i / N);
        s.lineTo(spineX[i] + nrmX[i] * hw, spineY[i] + nrmY[i] * hw);
      }
      for (let i = N; i >= 0; i--) {
        const hw = halfW(i / N);
        s.lineTo(spineX[i] - nrmX[i] * hw, spineY[i] - nrmY[i] * hw);
      }
      s.closePath();
      s.fill();

      // --- VARIEGADO: franja central verde lima en degrade ---
      const stripeLight = backLayer ? -22 : 0;
      const sg = s.createLinearGradient(0, 0, tipX, tipY);
      sg.addColorStop(0.00, C(70 + stripeLight, 130 + stripeLight, 58 + stripeLight, 0.0));
      sg.addColorStop(0.18, C(120 + stripeLight, 175 + stripeLight, 80 + stripeLight, 0.85));
      sg.addColorStop(0.55, C(150 + stripeLight, 200 + stripeLight, 95 + stripeLight, 0.9));
      sg.addColorStop(0.92, C(110 + stripeLight, 165 + stripeLight, 75 + stripeLight, 0.55));
      sg.addColorStop(1.00, C(110 + stripeLight, 165 + stripeLight, 75 + stripeLight, 0.0));
      s.fillStyle = sg;

      s.beginPath();
      s.moveTo(spineX[0], spineY[0]);
      for (let i = 1; i <= N; i++) {
        const hw = halfW(i / N) * 0.42;
        s.lineTo(spineX[i] + nrmX[i] * hw, spineY[i] + nrmY[i] * hw);
      }
      for (let i = N; i >= 0; i--) {
        const hw = halfW(i / N) * 0.42;
        s.lineTo(spineX[i] - nrmX[i] * hw, spineY[i] - nrmY[i] * hw);
      }
      s.closePath();
      s.fill();

      // --- nervadura central oscura ---
      s.strokeStyle = C(18, 48, 26, 0.5);
      s.lineWidth = Math.max(0.6, w * 0.05);
      s.lineCap = "round";
      s.beginPath();
      s.moveTo(spineX[0], spineY[0]);
      for (let i = 1; i <= N; i++) s.lineTo(spineX[i], spineY[i]);
      s.stroke();

      // --- borde inferior mas oscuro (volumen) ---
      s.strokeStyle = C(20, 52, 28, 0.4);
      s.lineWidth = Math.max(0.6, w * 0.06);
      s.lineJoin = "round";
      s.beginPath();
      s.moveTo(spineX[0] - nrmX[0] * halfW(0), spineY[0] - nrmY[0] * halfW(0));
      for (let i = 1; i <= N; i++) {
        const hw = halfW(i / N);
        s.lineTo(spineX[i] - nrmX[i] * hw, spineY[i] - nrmY[i] * hw);
      }
      s.stroke();

      s.restore();
    }

    // ============================================================
    // CANA (tronco lenoso afinado con anillos de cicatriz)
    // ============================================================
    function drawCane(cx, baseY, topY, wBase) {
      const h = baseY - topY;
      const wTop = wBase * 0.62;
      const lean = (cx - px) * 0.12;
      const topX = cx + lean;

      const tg = s.createLinearGradient(cx - wBase, 0, cx + wBase, 0);
      tg.addColorStop(0.0, C(96, 74, 46));
      tg.addColorStop(0.5, C(168, 134, 86));
      tg.addColorStop(1.0, C(88, 66, 42));
      s.fillStyle = tg;

      s.beginPath();
      s.moveTo(cx - wBase, baseY);
      s.quadraticCurveTo(cx - wBase * 0.8, topY + h * 0.5, topX - wTop, topY);
      s.lineTo(topX + wTop, topY);
      s.quadraticCurveTo(cx + wBase * 0.8, topY + h * 0.5, cx + wBase, baseY);
      s.closePath();
      s.fill();

      // sombra lado izquierdo del tronco
      const sh = s.createLinearGradient(cx - wBase, 0, cx + wBase, 0);
      sh.addColorStop(0.0, C(40, 28, 16, 0.45));
      sh.addColorStop(0.35, C(40, 28, 16, 0.0));
      sh.addColorStop(1.0, C(40, 28, 16, 0.0));
      s.fillStyle = sh;
      s.beginPath();
      s.moveTo(cx - wBase, baseY);
      s.quadraticCurveTo(cx - wBase * 0.8, topY + h * 0.5, topX - wTop, topY);
      s.lineTo(topX + wTop, topY);
      s.quadraticCurveTo(cx + wBase * 0.8, topY + h * 0.5, cx + wBase, baseY);
      s.closePath();
      s.fill();

      // anillos de cicatriz (curvos, abrazando el tronco)
      s.lineCap = "round";
      const rings = Math.max(6, (h / (sceneR * 0.7)) | 0);
      for (let i = 1; i < rings; i++) {
        const t = i / rings;
        const y = baseY - h * t;
        const w = wBase * (1 - t) + wTop * t;
        const xx = cx + lean * t;
        s.strokeStyle = C(70, 50, 30, 0.4);
        s.lineWidth = Math.max(1, sceneK * 0.6);
        s.beginPath();
        s.moveTo(xx - w * 0.85, y);
        s.quadraticCurveTo(xx, y + w * 0.35, xx + w * 0.85, y);
        s.stroke();
        // realce claro debajo del anillo
        s.strokeStyle = C(185, 150, 100, 0.22);
        s.lineWidth = Math.max(0.8, sceneK * 0.35);
        const dy = Math.max(1, sceneK * 0.5);
        s.beginPath();
        s.moveTo(xx - w * 0.8, y + dy);
        s.quadraticCurveTo(xx, y + w * 0.35 + dy, xx + w * 0.8, y + dy);
        s.stroke();
      }

      return { x: topX, y: topY, w: wTop };
    }

    // ============================================================
    // ROSETA: fuente de hojas que se arquean hacia afuera y caen.
    // Sesgada hacia la IZQUIERDA/arriba (la planta vive abajo-izq, asi
    // se derrama hacia el rincon y no invade el pendulo a la derecha).
    // Dos pasadas: traseras (oscuras) + delanteras (mas claras).
    // ============================================================
    function rosette(rng, crown, scale, sideBias) {
      const { x: cxr, y: cyr } = crown;

      // ---- CAPA TRASERA (mas hojas, mas oscuras, mas abiertas) ----
      const backN = 16;
      for (let i = 0; i < backN; i++) {
        const t = i / (backN - 1);
        // abanico bajo/medio: de casi-horizontal izq a casi-horizontal der,
        // pero comprimido hacia la izquierda via sideBias.
        let ang = -Math.PI * 1.02 + t * Math.PI * 0.86;
        ang += sideBias * 0.18;
        ang += (rng() - 0.5) * 0.16;
        const horiz = Math.abs(Math.cos(ang));
        const len = scale * (1.18 + horiz * 0.6) * (0.9 + rng() * 0.16);            // mas largas
        const w = scale * (0.055 + rng() * 0.085);                                  // ancho variado (0.055–0.14): planta real
        const arch = 0.95 + horiz * 1.25 + rng() * 0.3;                             // caen mas (con gs ⇒ hacia abajo)
        swordLeaf(cxr, cyr, ang, len, w, arch, true, (i * 7 + 3) | 0);
      }

      // ---- CAPA DELANTERA (corona erguida + caida) ----
      const frontN = 18;
      for (let i = 0; i < frontN; i++) {
        const t = i / (frontN - 1);
        // abanico completo, levemente sesgado a la izquierda.
        let ang = -Math.PI * 1.06 + t * Math.PI * 0.94;
        ang += sideBias * 0.12;
        ang += (rng() - 0.5) * 0.14;
        const up = Math.max(0, -Math.sin(ang));
        const horiz = Math.abs(Math.cos(ang));
        const len = scale * (0.82 + horiz * 0.78 + (1 - up) * 0.16) * (0.92 + rng() * 0.14);  // mas largas
        const w = scale * (0.048 + rng() * 0.08);                                   // ancho variado (0.048–0.128)
        const arch = 0.6 + horiz * 1.5 + (rng() - 0.5) * 0.3;                       // caen mas
        swordLeaf(cxr, cyr, ang, len, w, arch, false, (i * 13 + 5) | 0);
      }

      // ---- HOJAS COLGANTES (weeping): largas y muy caidas, sesgadas abajo/izquierda ----
      const weepN = 6;
      for (let i = 0; i < weepN; i++) {
        const lr = (i % 3 === 0) ? 1 : -1;                                          // mayoria a la IZQ (rincon), pocas a la der para no chocar el clip
        let ang = lr > 0 ? -0.05 - rng() * 0.45 : Math.PI + 0.05 + rng() * 0.45;    // casi horizontal a cada lado
        ang += sideBias * 0.1;
        const len = scale * (1.45 + rng() * 0.45);                                  // las mas largas del ramo
        const w = scale * (0.05 + rng() * 0.06);                                    // ancho variado (0.05–0.11)
        const arch = 1.5 + rng() * 0.7;                                             // cuelgan fuerte
        swordLeaf(cxr, cyr, ang, len, w, arch, lr > 0, (i * 29 + 7) | 0);
      }

      // ---- CORONA: hojas erguidas que LLENAN toda la copa (sin hueco arriba) ----
      // arco superior amplio (arriba-izq → arriba-der pasando por la vertical), largo comparable a las
      // laterales y arqueo BAJO para que se queden paradas en vez de caer hacia los costados.
      const crownN = 9;
      for (let i = 0; i < crownN; i++) {
        const t = i / (crownN - 1);
        let ang = -Math.PI * 0.84 + t * Math.PI * 0.68;                             // de arriba-izq a arriba-der
        ang += sideBias * 0.10;
        ang += (rng() - 0.5) * 0.10;
        const horiz = Math.abs(Math.cos(ang));
        const len = scale * (0.84 + horiz * 0.4) * (0.9 + rng() * 0.16);            // a la altura de las laterales
        const w = scale * (0.05 + rng() * 0.07);                                    // ancho variado
        const arch = 0.26 + horiz * 0.55 + rng() * 0.18;                            // arqueo bajo ⇒ erguidas, llenan la copa
        swordLeaf(cxr, cyr, ang, len, w, arch, false, (i * 17 + 9) | 0);
      }
    }

    // ============================================================
    // ENSAMBLE
    // ============================================================
    // 3 canas de DISTINTA altura. La alta corona ~ H*0.32.
    // Escalas de hoja reducidas y biases hacia la izquierda para no
    // invadir la derecha (ademas del clip duro de seguridad).
    const canes = [
      // cx,                  topY,        wBase,        leafScale, sideBias
      [px - pot * 0.34, H * 0.50, pot * 0.21, H * 0.185, -0.7], // izq, media
      [px + pot * 0.36, H * 0.59, pot * 0.18, H * 0.150, -0.2], // der, baja
      [px - pot * 0.02, H * 0.30, pot * 0.26, H * 0.210, -0.35] // central, alta
    ];

    // dibujo de atras hacia adelante (la alta tapa abajo)
    const crowns = [];
    const order = [1, 0, 2];
    for (const idx of order) {
      const cx = canes[idx][0], topY = canes[idx][1], wBase = canes[idx][2];
      crowns[idx] = drawCane(cx, lipY + pot * 0.05, topY, wBase);
    }

    for (const idx of order) {
      const leafScale = canes[idx][3], sideBias = canes[idx][4];
      const rng = mulberry32(1000 + idx * 137); // semilla CONSTANTE por cana
      rosette(rng, crowns[idx], leafScale, sideBias);
    }

    // ============================================================
    // TIERRA / CORTEZA en el borde del pote
    // ============================================================
    const soilY = lipY - pot * 0.04;
    const soilG = s.createLinearGradient(0, soilY - pot * 0.18, 0, soilY + pot * 0.1);
    soilG.addColorStop(0, C(58, 40, 26));
    soilG.addColorStop(1, C(30, 20, 12));
    s.fillStyle = soilG;
    s.beginPath();
    s.ellipse(px, soilY, pot * 0.92, pot * 0.26, 0, 0, TAU);
    s.fill();
    // montoncitos de corteza (deterministas por hash)
    const rngSoil = mulberry32(777);
    for (let i = 0; i < 14; i++) {
      const a = (i / 14) * TAU;
      const rr = pot * (0.2 + ((i * 53) % 60) / 100);
      const bx = px + Math.cos(a) * rr * 0.95;
      const by = soilY + Math.sin(a) * rr * 0.26;
      const r = pot * (0.05 + rngSoil() * 0.06);
      s.fillStyle = C(70 - (i % 3) * 12, 48, 30, 0.9);
      s.beginPath();
      s.ellipse(bx, by, r, r * 0.7, a, 0, TAU);
      s.fill();
    }

    // ============================================================
    // MACETA terracota (cuerpo cortado por el borde inferior > H)
    // ============================================================
    const bodyG = s.createLinearGradient(px - pot, 0, px + pot, 0);
    bodyG.addColorStop(0.0, C(112, 56, 36));
    bodyG.addColorStop(0.18, C(150, 80, 52));
    bodyG.addColorStop(0.5, C(192, 116, 78));
    bodyG.addColorStop(0.82, C(150, 80, 52));
    bodyG.addColorStop(1.0, C(96, 48, 30));
    s.fillStyle = bodyG;
    s.beginPath();
    s.moveTo(px - pot * 0.9, lipY);
    s.lineTo(px - pot * 0.66, H + 4);
    s.lineTo(px + pot * 0.66, H + 4);
    s.lineTo(px + pot * 0.9, lipY);
    s.closePath();
    s.fill();

    // sombreado interno del cuerpo (volumen)
    const bodyShade = s.createLinearGradient(px - pot, 0, px + pot, 0);
    bodyShade.addColorStop(0.0, C(40, 18, 10, 0.5));
    bodyShade.addColorStop(0.32, C(40, 18, 10, 0.0));
    bodyShade.addColorStop(0.8, C(40, 18, 10, 0.0));
    bodyShade.addColorStop(1.0, C(40, 18, 10, 0.55));
    s.fillStyle = bodyShade;
    s.beginPath();
    s.moveTo(px - pot * 0.9, lipY);
    s.lineTo(px - pot * 0.66, H + 4);
    s.lineTo(px + pot * 0.66, H + 4);
    s.lineTo(px + pot * 0.9, lipY);
    s.closePath();
    s.fill();

    // labio / reborde superior del pote
    const lipG = s.createLinearGradient(px - pot, 0, px + pot, 0);
    lipG.addColorStop(0.0, C(132, 68, 44));
    lipG.addColorStop(0.5, C(206, 128, 86));
    lipG.addColorStop(1.0, C(120, 60, 40));
    s.fillStyle = lipG;
    rrp(s, px - pot * 1.04, lipY - pot * 0.32, pot * 2.08, pot * 0.44, pot * 0.12);
    s.fill();

    // brillo especular del labio
    s.fillStyle = C(225, 150, 105, 0.45);
    rrp(s, px - pot * 0.96, lipY - pot * 0.28, pot * 1.92, pot * 0.12, pot * 0.06);
    s.fill();
    // sombra bajo el labio
    s.fillStyle = C(40, 18, 10, 0.35);
    rrp(s, px - pot * 0.92, lipY + pot * 0.08, pot * 1.84, pot * 0.07, pot * 0.04);
    s.fill();

    s.restore(); // fin del clip de seguridad
  }

  // ── BIBLIOTECA (llena toda la pared izquierda; se corta arriba y abajo de la pantalla ⇒ se lee
  //    ENORME, plano de cerca; la mesa/penumbra la tapan de tableTop para abajo) ──
  const BOOK_COLORS = [[122,52,46],[48,72,96],[150,120,52],[70,96,60],[96,60,96],[176,98,52],[60,70,88],[140,52,52],[44,86,82],[120,108,70]];
  function drawBookshelf(s, night) {
    const DK = night ? 0.5 : 1;
    const bsL = W * 0.012, bsR = W * 0.27;
    const bsTop = -H * 0.10, bsBottom = H * 1.04;                                  // nace y muere FUERA de pantalla
    const fr = Math.max(6, W * 0.012);                                             // grosor de la carcasa
    // sombra del mueble sobre la pared (sólo se ve la del lado derecho)
    s.fillStyle = 'rgba(0,0,0,0.3)'; s.fillRect(bsR, bsTop, fr * 1.6, bsBottom - bsTop);
    // carcasa de madera
    const woodG = s.createLinearGradient(bsL, 0, bsR, 0);
    woodG.addColorStop(0,   `rgb(${66*DK|0},${42*DK|0},${21*DK|0})`);
    woodG.addColorStop(0.5, `rgb(${96*DK|0},${62*DK|0},${33*DK|0})`);
    woodG.addColorStop(1,   `rgb(${52*DK|0},${33*DK|0},${17*DK|0})`);
    s.fillStyle = woodG; s.fillRect(bsL, bsTop, bsR - bsL, bsBottom - bsTop);
    // hueco interior oscuro
    const inL = bsL + fr, inR = bsR - fr;
    s.fillStyle = night ? 'rgb(12,9,7)' : 'rgb(26,17,11)'; s.fillRect(inL, bsTop, inR - inL, bsBottom - bsTop);
    // estantes ALTOS (libros grandes): la primera y la última fila quedan cortadas por los bordes
    const rows = 4, rowH = (bsBottom - bsTop) / rows;
    for (let r = 0; r <= rows; r++) {
      const shelfY = bsTop + (r + 1) * rowH;
      let bx = inL + 3, idx = r * 97 + 11;
      while (bx < inR - 6) {
        const bw = rowH * 0.085 + ((idx * 37) % 100) / 100 * rowH * 0.13;          // lomos proporcionales al estante
        if (bx + bw > inR - 3) break;
        const bh = rowH * (0.62 + ((idx * 53) % 100) / 100 * 0.3);
        const c = BOOK_COLORS[(idx * 7) % BOOK_COLORS.length];
        const by = shelfY - bh - 3;
        s.fillStyle = `rgb(${c[0]*DK|0},${c[1]*DK|0},${c[2]*DK|0})`;
        s.fillRect(bx, by, bw, bh);
        s.fillStyle = 'rgba(255,255,255,0.10)'; s.fillRect(bx, by, Math.max(1.5, bw * 0.2), bh);  // brillo del lomo
        s.fillStyle = 'rgba(0,0,0,0.25)'; s.fillRect(bx, by + bh * 0.14, bw, Math.max(1.5, bh * 0.045)); // banda
        bx += bw + 2; idx++;
      }
      // tabla del estante
      if (shelfY < bsBottom) { s.fillStyle = woodG; s.fillRect(inL, shelfY, inR - inL, Math.max(3, fr * 0.55)); }
    }
    // canto claro del lado derecho de la carcasa
    s.strokeStyle = night ? 'rgba(150,170,210,0.22)' : 'rgba(212,170,118,0.4)';
    s.lineWidth = Math.max(1, sceneK);
    s.beginPath(); s.moveTo(bsR - 1, Math.max(0, bsTop)); s.lineTo(bsR - 1, Math.min(H, bsBottom)); s.stroke();
  }

  // varilla de madera torneada (capsule): degradé perpendicular oscuro→lomo iluminado→oscuro = cilindro,
  // con vetas finas a lo largo y un brillo cálido suave sobre el lomo.
  function woodDowel(c, x, y, w, h) {
    const horizontal = w >= h;
    const rad = Math.min(w, h) / 2;
    const g = horizontal ? c.createLinearGradient(0, y, 0, y + h)
                         : c.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0,    'rgb(28,11,7)');
    g.addColorStop(0.12, 'rgb(66,26,16)');
    g.addColorStop(0.40, 'rgb(112,50,32)');
    g.addColorStop(0.5,  'rgb(138,66,44)');                                        // lomo iluminado (caoba)
    g.addColorStop(0.62, 'rgb(100,44,28)');
    g.addColorStop(0.86, 'rgb(56,22,13)');
    g.addColorStop(1,    'rgb(24,9,5)');
    rrp(c, x, y, w, h, rad); c.fillStyle = g; c.fill();
    c.save(); rrp(c, x, y, w, h, rad); c.clip();
    // vetas
    c.strokeStyle = 'rgba(20,6,3,0.4)'; c.lineWidth = Math.max(1, 0.5 * k);
    c.beginPath();
    for (const f of [0.3, 0.5, 0.68, 0.82]) {
      if (horizontal) { const ly = y + h * f; c.moveTo(x + rad, ly); c.lineTo(x + w - rad, ly); }
      else            { const lx = x + w * f; c.moveTo(lx, y + rad); c.lineTo(lx, y + h - rad); }
    }
    c.stroke();
    // brillo cálido sobre el lomo
    c.strokeStyle = 'rgba(206,132,98,0.42)'; c.lineWidth = Math.max(1, Math.min(w, h) * 0.07);
    c.beginPath();
    if (horizontal) { const ly = y + h * 0.42; c.moveTo(x + rad, ly); c.lineTo(x + w - rad, ly); }
    else            { const lx = x + w * 0.42; c.moveTo(lx, y + rad); c.lineTo(lx, y + h - rad); }
    c.stroke();
    c.restore();
  }

  // arco "∏" único y limpio: dos parantes + travesaño, todo en madera torneada. Parantes primero y el
  // travesaño encima, así la curva en las esquinas queda prolija.
  function drawArch(c) {
    const thk = radio * 0.32;
    woodDowel(c, frameLeft - thk / 2,  frameTop, thk, (baseY - frameTop) + thk);             // parante izq (entra en la base)
    woodDowel(c, frameRight - thk / 2, frameTop, thk, (baseY - frameTop) + thk);             // parante der
    woodDowel(c, frameLeft - thk / 2,  frameTop - thk / 2, (frameRight - frameLeft) + thk, thk); // travesaño
  }

  // collar de bronce donde el parante entra en la base
  function drawCollar(c, cx) {
    const w = radio * 0.74, h = radio * 0.42;
    const g = c.createLinearGradient(cx - w / 2, 0, cx + w / 2, 0);
    g.addColorStop(0,   'rgb(74,52,20)');
    g.addColorStop(0.5, 'rgb(214,176,98)');
    g.addColorStop(1,   'rgb(74,52,20)');
    rrp(c, cx - w / 2, baseY - h * 0.55, w, h, h * 0.35); c.fillStyle = g; c.fill();
  }

  // base de madera maciza
  function drawBase(c) {
    const xL = frameLeft - radio * 2.4, xR = frameRight + radio * 2.4;
    const top = baseY, thk = radio * BASE_THK_K, w = xR - xL, rad = radio * 0.26;
    // sombra en el piso
    const sh = c.createLinearGradient(0, top + thk, 0, top + thk + radio * 1.2);
    sh.addColorStop(0, 'rgba(0,0,0,0.4)'); sh.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = sh; c.fillRect(xL - radio, top + thk - 2, w + radio * 2, radio * 1.3);
    // cuerpo madera (cara iluminada arriba → canto oscuro abajo)
    const g = c.createLinearGradient(0, top, 0, top + thk);
    g.addColorStop(0,    'rgb(108,48,30)');
    g.addColorStop(0.16, 'rgb(78,32,20)');
    g.addColorStop(1,    'rgb(32,12,7)');
    rrp(c, xL, top, w, thk, rad); c.fillStyle = g; c.fill();
    c.save(); rrp(c, xL, top, w, thk, rad); c.clip();
    // sheen cálido en la cara superior (bisel)
    const gloss = c.createLinearGradient(0, top, 0, top + thk * 0.4);
    gloss.addColorStop(0, 'rgba(190,116,82,0.5)');
    gloss.addColorStop(1, 'rgba(190,116,82,0)');
    c.fillStyle = gloss; c.fillRect(xL, top, w, thk * 0.4);
    // vetas horizontales
    c.strokeStyle = 'rgba(20,6,3,0.32)'; c.lineWidth = Math.max(1, 0.6 * k);
    c.beginPath();
    for (const f of [0.42, 0.62, 0.8]) { const ly = top + thk * f; c.moveTo(xL + rad, ly); c.lineTo(xR - rad, ly); }
    c.stroke();
    // canto superior iluminado
    c.strokeStyle = 'rgba(212,140,104,0.6)'; c.lineWidth = Math.max(1, 1.0 * k);
    c.beginPath(); c.moveTo(xL + rad, top + 1); c.lineTo(xR - rad, top + 1); c.stroke();
    // veta curva de madera torneada (determinista) → "mueble real" en vez de cilindro liso
    c.strokeStyle = 'rgba(15,5,2,0.16)'; c.lineWidth = Math.max(0.5, 0.4 * k);
    const nv = 7;
    for (let i = 0; i < nv; i++) {
      const sx0 = xL + (w / nv) * i + Math.sin(i * 0.7) * w * 0.03;
      c.beginPath();
      c.moveTo(sx0, top);
      c.quadraticCurveTo(sx0 + w * 0.12, top + thk * 0.45, sx0 + w * 0.22, top + thk);
      c.stroke();
    }
    // bisel: sombra fina justo debajo del canto iluminado
    c.strokeStyle = 'rgba(0,0,0,0.30)'; c.lineWidth = Math.max(1.2, 0.7 * k);
    c.beginPath(); c.moveTo(xL + rad, top + Math.max(2, 1.6 * k)); c.lineTo(xR - rad, top + Math.max(2, 1.6 * k)); c.stroke();
    c.restore();
  }

  // El marco no cambia entre frames ⇒ se bakea a un layer y draw() lo blitea (ahorra ~10 gradientes/frame).
  function buildFrameLayer() {
    frameLayer = document.createElement('canvas');
    frameLayer.width  = Math.max(1, Math.floor(W * dpr));
    frameLayer.height = Math.max(1, Math.floor(H * dpr));
    const c = frameLayer.getContext('2d');
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawArch(c);                                                                   // arco de madera único
    drawBase(c);                                                                   // base por delante (tapa el pie de los parantes)
    drawCollar(c, frameLeft); drawCollar(c, frameRight);                           // collares donde entran a la base
  }

  // La esfera es idéntica para todas las bolas ⇒ se bakea UNA vez por layout y se blitea por bola
  // (antes: 4 gradientes radiales × bola × frame).
  function bakeBallSprite() {
    const r = Math.max(2, radio), pad = 3;
    const S = Math.ceil((r + pad) * 2);
    ballSprite = document.createElement('canvas');
    ballSprite.width = ballSprite.height = Math.ceil(S * dpr);
    const c = ballSprite.getContext('2d');
    c.scale(dpr, dpr);
    drawMetalBall(c, S / 2, S / 2, r);
    ballSpriteHalf = S / 2;
  }

  // hilos: cada bola cuelga de dos hilos abiertos en V hacia el travesaño; con un splay > radio los de
  // bolas vecinas se cruzan y arman la clásica red en X. Finos y con un dejo de brillo metálico.
  // Hilos de TODAS las bolas en un solo path/stroke (mismo estilo) — antes era 1 stroke por bola.
  function drawStrings() {
    const splay = radio * 1.15, ay = frameTop;
    ctx.lineWidth = Math.max(1, 0.7 * k);
    ctx.strokeStyle = 'rgba(225,229,236,0.55)';
    ctx.lineCap = 'round';
    ctx.beginPath();
    for (const ball of balls) {
      const ax = origX(ball.nro);
      ctx.moveTo(ax - splay, ay); ctx.lineTo(ball.x, ball.y);
      ctx.moveTo(ax + splay, ay); ctx.lineTo(ball.x, ball.y);
    }
    ctx.stroke();
  }

  // Sombras de contacto de TODAS las bolas con UN solo save/clip/restore (el clip es el mismo rect de
  // la base para todas) — antes clipeaba y save/restore por bola. CLIPEADA a la tapa: una bola levantada
  // fuera de la cuna no proyecta sombra "en el aire".
  function drawBallShadows() {
    const baseTop = baseY;
    const xL = frameLeft - radio * 2.4, xR = frameRight + radio * 2.4;
    const fadeZone = radio * 4.5;
    ctx.save();
    ctx.beginPath(); ctx.rect(xL, baseY - radio * 0.4, xR - xL, radio * 0.9); ctx.clip();
    for (const ball of balls) {
      const t = Math.max(0, Math.min(1, (ball.y - origY) / L));                    // 0 = arriba, 1 = reposo
      let liftFade = (t - 0.66) / (0.94 - 0.66);
      liftFade = Math.max(0, Math.min(1, liftFade));
      liftFade = liftFade * liftFade * (3 - 2 * liftFade);                          // smoothstep: meseta + caída
      let a = 0.46 * liftFade;
      if (a < 0.02) continue;
      const dOut = Math.max((xL + fadeZone) - ball.x, ball.x - (xR - fadeZone), 0);
      const edgeFade = Math.max(0, 1 - dOut / fadeZone);
      a *= edgeFade * edgeFade * edgeFade;                                          // se apaga antes del borde
      if (a < 0.02) continue;
      const sideScale = 0.6 + 0.4 * edgeFade;
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.beginPath();
      ctx.ellipse(ball.x, baseTop, radio * (0.7 + 0.4 * t) * sideScale, radio * 0.26 * sideScale, 0, 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawMetalBall(ctx, x, y, r) {                                           // ctx local: se usa para el bake
    // cuerpo metálico oscuro: highlight arriba-izquierda → medio → borde oscuro (fresnel)
    const hx = x - r * 0.4, hy = y - r * 0.42;
    const g = ctx.createRadialGradient(hx, hy, r * 0.06, hx, hy, r * 1.75);
    g.addColorStop(0,    STEEL.hi);
    g.addColorStop(0.22, STEEL.lite);
    g.addColorStop(0.5,  STEEL.mid);
    g.addColorStop(0.82, STEEL.lo);
    g.addColorStop(1,    STEEL.edge);
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.clip();
    ctx.fillStyle = g; ctx.fillRect(x - r, y - r, r * 2, r * 2);

    // rim-light: arco claro fino sobre el borde inferior-derecho (luz reflejada del ambiente)
    const rg = ctx.createRadialGradient(x, y, r * 0.78, x, y, r);
    rg.addColorStop(0, 'rgba(150,160,172,0)');
    rg.addColorStop(0.82, 'rgba(150,160,172,0)');
    rg.addColorStop(1, 'rgba(170,182,196,0.5)');
    ctx.fillStyle = rg; ctx.fillRect(x - r, y - r, r * 2, r * 2);

    // reflejo de rebote (luz del piso) abajo
    const bx = x + r * 0.18, by = y + r * 0.6;
    const g2 = ctx.createRadialGradient(bx, by, 0, bx, by, r * 0.8);
    g2.addColorStop(0, 'rgba(120,132,146,0.4)');
    g2.addColorStop(1, 'rgba(120,132,146,0)');
    ctx.fillStyle = g2; ctx.fillRect(x - r, y - r, r * 2, r * 2);
    ctx.restore();

    // hotspot especular nítido (núcleo blanco + halo)
    const sx = x - r * 0.36, sy = y - r * 0.44;
    const halo = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 0.34);
    halo.addColorStop(0, 'rgba(255,255,255,0.5)');
    halo.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(sx, sy, r * 0.34, 0, TAU); ctx.fill();
    const core = Math.max(1.2, r * 0.1);
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath(); ctx.arc(sx, sy, core, 0, TAU); ctx.fill();

    // contorno fino para despegar del fondo
    ctx.lineWidth = Math.max(1, 0.8 * k);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.arc(x, y, r - 0.4, 0, TAU); ctx.stroke();
  }

  // crossfade día→noche de un par de capas. En las MESETAS (día/noche plenos) blitea UNA sola capa
  // (antes a noche plena dibujaba día+noche, con la de día 100% tapada → ~4 blits full-screen al pedo).
  function blitDN(day, nite) {
    if (nightFactor >= 0.999) { if (nite) ctx.drawImage(nite, 0, 0, W, H); return; } // noche plena: sólo noche
    if (day) ctx.drawImage(day, 0, 0, W, H);
    if (nite && nightFactor > 0.001) { ctx.globalAlpha = nightFactor; ctx.drawImage(nite, 0, 0, W, H); ctx.globalAlpha = 1; }
  }

  function draw() {
    const tt = performance.now() / 1000;
    ctx.clearRect(0, 0, W, H);
    // FONDO (pared + ventana + biblioteca + penumbra) — crossfade día/noche
    blitDN(sceneDay, sceneNight);

    // RAYOS de luz del ventanal (capa bakeada) con alpha "respirando"
    const rayBreath = 0.78 + Math.sin(tt * 0.4) * 0.22;
    if (godRaysDay && nightFactor < 0.999)   { ctx.globalAlpha = (1 - nightFactor) * rayBreath; ctx.drawImage(godRaysDay, 0, 0, W, H); ctx.globalAlpha = 1; }
    if (godRaysNight && nightFactor > 0.001) { ctx.globalAlpha = nightFactor * rayBreath * 0.85; ctx.drawImage(godRaysNight, 0, 0, W, H); ctx.globalAlpha = 1; }
    // MOTAS de polvo a la deriva dentro de la luz (live, deterministas, additivas)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const dustN = 14, zL = W * 0.45, zR = W, zT = H * 0.02, zB = H * 0.68;
    for (let i = 0; i < dustN; i++) {
      const sx = (i * 73) % 100, sy = (i * 149) % 100;
      const phase = tt * (0.12 + (i % 4) * 0.03) + i * 0.5;
      const x = zL + (sx / 100) * (zR - zL) + Math.sin(phase) * W * 0.03;
      const y = zT + (sy / 100) * (zB - zT) + Math.cos(tt * 0.17 + i * 0.6) * H * 0.04;
      if (x < zL || x > zR || y < zT || y > zB) continue;
      const r = 1 + (i % 3) * 0.7;
      const a = (0.22 + (i % 5) * 0.04) * (0.6 + 0.4 * Math.sin(phase * 0.5));
      const af = a * (0.85 - nightFactor * 0.5);
      if (af < 0.01) continue;
      ctx.fillStyle = nightFactor < 0.5 ? `rgba(255,246,210,${af})` : `rgba(205,222,255,${af})`;
      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
    }
    ctx.restore();
    // TITILEO de estrellas (sólo de noche; mismas posiciones deterministas que el bake, + seno)
    if (nightFactor > 0.02) drawStarTwinkle(tt);

    // PLANTA con vaivén tenue: shear horizontal anclado en la maceta (abajo fijo, hojas arriba se mecen).
    // Dos senoides desfasadas → brisa orgánica. performance.now() para el tiempo (no afecta la física).
    const anchorY = H * 0.86;
    const sway = Math.sin(tt * 0.55) * 0.012 + Math.sin(tt * 1.27 + 0.7) * 0.006;
    ctx.save();
    ctx.transform(1, 0, sway, 1, -sway * anchorY, 0);
    blitDN(plantDay, plantNight);
    ctx.restore();
    // MESA (canto + sombra de contacto) — delante de la planta
    blitDN(frontDay, frontNight);
    if (frameLayer) ctx.drawImage(frameLayer, 0, 0, W, H);                          // marco bakeado
    if (!ghosted) drawBallShadows();
    drawStrings();
    ctx.globalAlpha = ghosted ? 0.4 : 1;
    const bh = ballSpriteHalf;
    for (const ball of balls) ctx.drawImage(ballSprite, ball.x - bh, ball.y - bh, bh * 2, bh * 2); // esfera bakeada
    ctx.globalAlpha = 1;
    // oclusión de contacto entre bolas que se tocan (las lee como esferas sólidas, no translúcidas)
    drawContactOcclusion();
    // viñeteado (profundidad / plano de cerca)
    if (vignette) { ctx.fillStyle = vignette; ctx.fillRect(0, 0, W, H); }
    // COLOR GRADE unificado (absorbe el veil de noche): lerp cálido-dorado (día) → frío-azul (noche)
    {
      const nf = nightFactor;
      const r = Math.round(255 * (1 - nf) + 30 * nf);
      const g = Math.round(232 * (1 - nf) + 42 * nf);
      const b = Math.round(178 * (1 - nf) + 86 * nf);
      const a = 0.028 * (1 - nf) + 0.20 * nf;
      ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // titileo de estrellas en vivo (mismas posiciones que el bake nocturno + seno por estrella)
  function drawStarTwinkle(tt) {
    const { gx, gy, gw, horizonY } = windowGeom();
    for (let i = 0; i < 48; i++) {
      const sx = gx + ((i * 73) % 100) / 100 * gw;
      const sy = ((i * 149) % 100) / 100 * (horizonY - gy) + gy;
      if (sy < 0) continue;
      const r = 0.6 + ((i * 37) % 10) / 10 * 1.1;
      const baseA = 0.3 + ((i * 53) % 10) / 10 * 0.6;
      const per = 0.8 + ((i * 23) % 100) / 100 * 0.7;
      const a = Math.max(0, baseA + Math.sin(tt * TAU / per + i * 0.3) * 0.18) * nightFactor;
      if (a < 0.01) continue;
      ctx.globalAlpha = a; ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, TAU); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // oclusión de contacto: oscurece la costura entre bolas que se tocan
  function drawContactOcclusion() {
    if (ghosted) return;
    for (let i = 0; i < balls.length - 1; i++) {
      const a = balls[i], b = balls[i + 1];
      const d = Math.hypot(b.x - a.x, b.y - a.y);
      if (d > radio * 2.06) continue;
      const k2 = 1 - d / (radio * 2.06);
      if (k2 < 0.05) continue;                                                      // en reposo la costura es casi nula → no dibujar
      const cxm = (a.x + b.x) / 2, cym = (a.y + b.y) / 2;
      ctx.fillStyle = `rgba(0,0,0,${0.30 * k2})`;
      ctx.beginPath(); ctx.ellipse(cxm, cym, radio * 0.28, radio * 0.14, 0, 0, TAU); ctx.fill();
    }
  }

  // ════════════════ INPUT ════════════════
  let mx = 0, my = 0, mDown = false;
  function evtPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
  canvas.addEventListener('pointerdown', e => {
    canvas.setPointerCapture(e.pointerId);
    const p = evtPos(e); mx = p.x; my = p.y; mDown = true;
    hint.style.opacity = '0';
    audioResume();
  });
  canvas.addEventListener('pointermove', e => { const p = evtPos(e); mx = p.x; my = p.y; });
  function endPointer() { mDown = false; }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ── botones (pointerdown, no click: responden aunque haya otro toque activo) ──
  function addBall()    { if (nroBalls < 10) { nroBalls++; buildBalls(); } }
  function removeBall() { if (nroBalls > 1)  { nroBalls--; buildBalls(); } }
  function reset()      { buildBalls(); }                                          // reconstruye en reposo, misma cantidad

  function holdable(el, fn) {
    let iv = null, pid = null;
    const stop = () => {
      if (iv) { clearInterval(iv); iv = null; }
      pid = null;
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', stop);
      document.removeEventListener('pointercancel', stop);
    };
    const onMove = e => {
      if (e.pointerId !== pid) return;
      const r = el.getBoundingClientRect();
      if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) stop();
    };
    const start = e => {
      e.preventDefault();
      audioResume();
      pid = e.pointerId;
      try { el.releasePointerCapture(e.pointerId); } catch {}
      fn();
      iv = setInterval(fn, 220);
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', stop);
      document.addEventListener('pointercancel', stop);
    };
    el.addEventListener('pointerdown', start);
  }
  function tappable(el, fn) { el.addEventListener('pointerdown', e => { e.preventDefault(); audioResume(); fn(); }); }

  holdable(document.getElementById('btnPlus'), addBall);
  holdable(document.getElementById('btnMinus'), removeBall);
  const btnGhost = document.getElementById('btnGhost');
  tappable(btnGhost, () => { ghosted = !ghosted; btnGhost.classList.toggle('on', ghosted); });
  const btnHold = document.getElementById('btnHold');
  tappable(btnHold, () => { holding = !holding; btnHold.classList.toggle('on', holding); });
  tappable(document.getElementById('btnReset'), reset);

  // ════════════════ SONIDO (clic metálico sintetizado en Web Audio) ════════════════
  // No hay samples en esta carpeta, así que el "clac" se genera: un par de parciales inarmónicos con
  // decaída rápida (la campanita metálica) + un transitorio de ruido filtrado (el ataque). Se dispara
  // a lo sumo una vez por frame, con cooldown, escalando volumen/pitch con la fuerza del choque.
  let actx = null, lastClickT = 0, frameImpactV = 0;
  const SND_COOLDOWN = 32;     // ms mínimos entre clics (evita ametralladora)
  const SND_VTHR     = 0.4;    // rad/s — por debajo no suena (roces numéricos)
  function audioResume() {
    try {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      if (actx.state === 'suspended') actx.resume();
    } catch (e) {}
  }
  function playClick(intensity) {
    if (!actx) return;
    const t = actx.currentTime;
    // tic MUY suave: blip tonal grave, redondeado con un lowpass (sin agudos hirientes ni ruido de
    // ataque), volumen bajísimo. Mínimo audible para que siempre se escuche el tic.
    const vol = (0.3 + 0.7 * Math.max(0, Math.min(1, intensity))) * 0.035;
    const pitch = 1 + (Math.random() * 2 - 1) * 0.06;
    const g = actx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.003);                                // ataque suave (3ms): tic sin click digital
    g.gain.exponentialRampToValueAtTime(0.0003, t + 0.06);                         // decaída corta
    const lp = actx.createBiquadFilter();                                          // redondea: corta lo hiriente
    lp.type = 'lowpass'; lp.frequency.value = 2400; lp.Q.value = 0.6;
    g.connect(lp).connect(actx.destination);
    const base = 1050 * pitch;
    for (const [m, gg] of [[1, 1], [2.0, 0.12]]) {                                 // fundamental + un dejo de octava
      const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = base * m;
      const og = actx.createGain(); og.gain.value = gg;
      o.connect(og).connect(g); o.start(t); o.stop(t + 0.07);
    }
  }

  // ════════════════ LOOP (paso fijo) ════════════════
  let lastT = performance.now(), acc = 0;
  function frame(now) {
    if (typeof now !== 'number') now = performance.now();
    let elapsed = now - lastT; lastT = now;
    if (elapsed > 100) elapsed = 100;                                            // anti spiral-of-death tras un blur de ventana
    acc += elapsed;
    frameImpactV = 0;
    while (acc >= FIXED_DT) { step(FIXED_DT); acc -= FIXED_DT; }
    // sonido del choque más fuerte de este frame (con cooldown)
    if (frameImpactV > SND_VTHR && now - lastClickT > SND_COOLDOWN) {
      lastClickT = now; playClick(Math.min(1, frameImpactV / 6));
    }
    // ciclo día↔noche (independiente del péndulo): mesetas largas + transiciones suaves con smoothstep
    sceneClock += elapsed;
    const ph = (sceneClock / 1000 % NIGHT_PERIOD) / NIGHT_PERIOD;
    const ss = (a, b, x) => { x = Math.max(0, Math.min(1, (x - a) / (b - a))); return x * x * (3 - 2 * x); };
    nightFactor = ph < 0.42 ? 0 : ph < 0.50 ? ss(0.42, 0.50, ph) : ph < 0.92 ? 1 : 1 - ss(0.92, 1.0, ph);
    draw();
    requestAnimationFrame(frame);
  }

  // ── init ──
  const hint = document.getElementById('hint');
  resize();
  buildBalls();
  requestAnimationFrame(frame);
  setTimeout(() => hint.style.opacity = '0', 5000);
  </script>

  <!-- Shell del Arcade (exit + fullscreen + lock de orientación). data-orient: landscape/portrait/any. -->
  <script src="../../Arcade/arcade-shell.js" data-orient="landscape"></script>

  <div id="fpsOverlay">FPS: --</div>
  <script>
    (function() {
      let frameCount = 0, lastT = performance.now();
      let fpsOn = false;                                                            // estado real (no depender del display inline, que arranca vacío)
      const overlay = document.getElementById('fpsOverlay');
      function loop() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          const fps = Math.round(frameCount * 1000 / (now - lastT));
          if (fpsOn) overlay.textContent = 'FPS: ' + fps;
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(loop);
      }
      loop();
      const btn = document.getElementById('btnInfo');
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        fpsOn = !fpsOn;
        overlay.style.display = fpsOn ? 'block' : 'none';
        btn.classList.toggle('on', fpsOn);
      });
    })();
  </script>
