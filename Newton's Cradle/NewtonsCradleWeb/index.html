<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Newton's Cradle</title>
<link rel="stylesheet" href="../../Arcade/arcade-shell.css">
<style>
  :root { --bar-height: 66px; }                                                  /* tweak to taste */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 35%, #1a1d22 0%, #050608 70%);
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  /* Canvas occupies only the space ABOVE the bar — the cradle is laid out inside that rect so it never
     sits behind the buttons. Dimensions are set explicitly from JS each resize. */
  #c {
    display: block; position: absolute;
    top: 0; left: 0;
  }

  #hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    max-width: min(88vw, 480px);
    background: rgba(10,12,18,0.78); border: 1px solid rgba(255,255,255,0.10);
    padding: 12px 20px; border-radius: 14px;
    text-align: center; color: rgba(255,255,255,0.92);
    font-size: 13px; letter-spacing: 0.04em; line-height: 1.45;
    pointer-events: none; transition: opacity 0.8s; z-index: 2;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }

  /* Bottom bar: count buttons + the two toggles. Opaque-ish background so it reads as a bezel rather
     than a HUD overlay. Same shell as BallsWeb / ClockWeb. */
  #bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(var(--bar-height) + env(safe-area-inset-bottom));
    padding: 0 16px env(safe-area-inset-bottom);
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 3;
  }
  #ui {
    display: flex; gap: 8px; align-items: center;
  }
  #ui button {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.08);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none;
    transition: background 0.1s, transform 0.08s;
    padding: 0;
  }
  #ui button:active { background: rgba(255,255,255,0.22); transform: scale(0.92); }
  #ui button svg { display: block; width: 22px; height: 22px; pointer-events: none; }
  #ui #btnMinus svg, #ui #btnPlus svg { width: 24px; height: 24px; }
  /* visual indicator for toggled-on state */
  #ui button.on { background: rgba(120,200,255,0.28); border-color: rgba(120,200,255,0.55); }
  /* Botones ✕/⛶/ⓘ + overlay de salida vienen de arcade-shell.css. */
  /* HUD de FPS — formato Pong: panel monoespaciado arriba a la izquierda, sin border-radius. */
  #fpsOverlay {
    position: absolute;
    left: calc(8px + env(safe-area-inset-left));
    top: calc(8px + env(safe-area-inset-top));
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 18px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.55);
    padding: 4px 6px;
    pointer-events: none;
    display: none;
    z-index: 9;
  }



</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">levantá una bola y soltala para impulsar las otras · +/− cambia la cantidad · 👻 fantasma · ⏸ pausa</div>
  <div id="bar">
  <button id="btnExit" aria-label="salir al menu" title="Salir al menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
<div id="ui">
      <button id="btnGhost" aria-label="fantasma" title="Modo fantasma (se atraviesan)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 3a7 7 0 0 0-7 7v9l2-1.6 2 1.6 2-1.6 1 1.6 1-1.6 2 1.6 2-1.6V10a7 7 0 0 0-7-7zm-2.2 6.2a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2zm4.4 0a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2z"/></svg>
      </button>
      <button id="btnHold" aria-label="congelar" title="Congelar (pausa la gravedad)">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
      </button>
      <button id="btnMinus" aria-label="quitar" title="Quitar bola">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 12h12"/></svg>
      </button>
      <button id="btnPlus" aria-label="agregar" title="Agregar bola">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 6v12M6 12h12"/></svg>
      </button>
      <button id="btnReset" aria-label="reiniciar" title="Reiniciar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg>
      </button>
    </div>
    <button id="btnFs" aria-label="pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><g class="ic-enter"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></g><g class="ic-exit"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></g></svg>
    </button>
    <button id="btnInfo" aria-label="info" title="Info / FPS">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.9" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════
  //  NEWTON'S CRADLE — péndulo de Newton "de verdad", con el shell mobile
  //  de BallsWeb / ClockWeb.
  //
  //  Física (reescrita, ya no es el port literal del .py crudo):
  //   · Cada bola es un péndulo rígido real: la aceleración angular es
  //     α = -ω²·sin(φ)  (φ = desvío respecto de la vertical), integrada con
  //     Euler semi-implícito a paso fijo de 5 ms. No es ángulo-chico: usa el
  //     sin completo, así que amplitudes grandes se ven correctas.
  //   · Colisiones: choque elástico de masas iguales = INTERCAMBIO de
  //     velocidad angular (mismo largo de hilo ⇒ intercambiar ω == intercambiar
  //     la velocidad lineal). Se resuelve iterando la cadena para que el impulso
  //     se propague entero en un mismo frame (1 bola entra → 1 sale del otro
  //     lado; 2 entran → 2 salen). COLLISION_LOSS=1 ⇒ sin pérdida en el choque.
  //   · Reposo: las bolas cuelgan rectas y JUSTO tocándose (separación = 2·radio),
  //     con una amortiguación de aire muy leve y un snap final, así no tiembla.
  // ════════════════════════════════════════════════════════════════════
  const TAU = Math.PI * 2;

  // ── PERILLAS DE AJUSTE ──
  const FIXED_DT       = 5;       // ms por paso de física (acumulador → estable e independiente del fps)
  const OMEGA          = 6.1;     // rad/s — frecuencia natural del péndulo (período chico ≈ 2π/OMEGA ≈ 1.0 s)
  const DAMP           = 0.15;    // 1/s — amortiguación de aire (chico = oscila mucho rato)
  const COLLISION_LOSS = 1.0;     // 1 = choque perfectamente elástico; <1 pierde energía en cada impacto
  const RESIDUAL       = 0.005;    // fracción que NO se transfiere en el choque ⇒ queda algo de sway en la cadena (0 = swap perfecto, fila muerta)
  const REST_SNAP_ANG  = 0.004;   // rad — por debajo de esto (y vel baja) se clava en reposo
  const REST_SNAP_VEL  = 0.012;   // rad/s
  const ANG_EPS        = 0.0015;  // rad — penetración angular por debajo de la cual no se corrige (anti-jitter en reposo)
  const VEL_EPS        = 1e-3;    // rad/s — umbral de "acercándose" para disparar el swap
  const FLING_TC       = 0.05;    // s — constante del filtro paso-bajo de la velocidad de arrastre (como MOUSE_SMOOTH_TC de Balls)
  const FLING_MAX      = 10;      // rad/s — tope del impulso que podés imprimirle a una bola al soltarla

  // colores de las bolas (acero cromado, como la foto: highlight brillante y borde oscuro fresnel)
  const STEEL = {
    hi:   'rgb(226,233,241)',
    lite: 'rgb(150,162,176)',
    mid:  'rgb(96,107,121)',
    lo:   'rgb(46,54,64)',
    edge: 'rgb(14,18,24)',
  };

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0, dpr = 1;
  // layout (recalculado en resize y al cambiar la cantidad de bolas)
  let radio = 30, L = 450, origY = 150, centerX = 0;
  let frameLeft = 0, frameRight = 0, frameTop = 0, baseY = 0, k = 1;
  let tableTop = 0;             // y de la superficie del mueble donde se apoya la base del péndulo
  let sceneDay = null, sceneNight = null;   // habitación pre-renderizada en sus dos estados (se rearman sólo en resize)
  let nightFactor = 0;          // 0 = día, 1 = noche (transiciona en bucle, independiente del péndulo)
  let sceneClock = 0;           // ms acumulados para el ciclo día/noche
  const NIGHT_PERIOD = 54;      // s — duración del ciclo día↔noche completo

  // estado de simulación
  let nroBalls = 5;
  let balls = [];
  let ghosted = false;          // toggle: las bolas se atraviesan (sin colisión) + se ven translúcidas
  let holding = false;          // toggle: congela la gravedad (modo pose)
  let grabbedBall = null;       // una sola bola agarrada por vez (pegajosa hasta soltar el dedo)
  let flingVel = 0;             // velocidad angular filtrada del arrastre, para imprimirla al soltar

  // ── geometría ──
  const getangle = (ax, ay, bx, by) => Math.atan2(by - ay, bx - ax);
  const colisionRyp = (cx, cy, w, h, px, py) => px > cx && px < cx + w && py > cy && py < cy + h;

  function origX(i) {
    const totalWidth = (nroBalls - 1) * radio * 2;
    return centerX - totalWidth / 2 + radio * 2 * i;
  }
  function setPos(b) { b.x = origX(b.nro) + Math.cos(b.angulo) * L; b.y = origY + Math.sin(b.angulo) * L; }

  const INSET_K    = 1.9;         // voladizo del marco más allá de la bola del extremo, en radios
  const BASE_THK_K = 1.3;         // grosor de la base negra, en radios
  const STRING_K   = 9.0;         // largo del hilo, en radios (hilos largos ⇒ bolas más chicas, como la foto)
  function layout() {
    centerX = W / 2;
    // Plano de cerca: la base del péndulo se apoya sobre el borde de la mesa, bien abajo (a ~82% del
    // alto), así abajo sólo se ve el CANTO de la mesa y arriba entra una ventana grande. Crece hacia arriba.
    tableTop = H * 0.82;
    const topMargin = H * 0.06;                                                    // aire arriba para el hint
    const divH = STRING_K + 0.15 + 1.1 + BASE_THK_K;                               // alto del aparato / radio
    const rW = (0.50 * W) / (2 * (nroBalls - 1) + 2 * INSET_K);
    const rH = (tableTop - topMargin) / divH;
    radio = Math.max(6, Math.min(rW, rH));
    k = radio / 30;
    L = radio * STRING_K;
    const baseThk = radio * BASE_THK_K;
    baseY = tableTop - baseThk;                                                    // cara superior de la base (su fondo descansa en la mesa)
    frameTop = baseY - L - radio * 1.1;                                            // travesaño superior
    origY = frameTop;                                                              // pivote de los hilos
    const ballSpan = (nroBalls - 1) * radio * 2;
    const inset = radio * INSET_K;
    frameLeft  = centerX - ballSpan / 2 - inset;
    frameRight = centerX + ballSpan / 2 + inset;
    for (const b of balls) setPos(b);
  }

  const barEl = document.getElementById('bar');
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const barH = barEl.offsetHeight;
    W = window.innerWidth;
    H = window.innerHeight - barH;
    canvas.width  = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    layout();
    buildScenes();
  }
  window.addEventListener('resize', resize);

  function buildBalls() {
    balls = [];
    grabbedBall = null;
    for (let i = 0; i < nroBalls; i++)
      balls.push({ nro: i, angulo: Math.PI / 2, velocidad: 0, grabbed: false, pushed: false, x: 0, y: 0 });
    layout();
    buildScenes();                                                                 // el radio/ancho cambió ⇒ rearmar la escena (día + noche)
  }

  // ════════════════ FÍSICA ════════════════
  function integrate(b, dt) {
    // péndulo real: α = -ω²·sin(φ), con φ = angulo - π/2  ⇒  α = ω²·cos(angulo)
    const alpha = OMEGA * OMEGA * Math.cos(b.angulo);
    b.velocidad += alpha * dt;
    b.velocidad *= Math.exp(-DAMP * dt);
    b.angulo += b.velocidad * dt;
    // snap a reposo para que no quede temblando infinitamente
    const phi = b.angulo - Math.PI / 2;
    if (Math.abs(phi) < REST_SNAP_ANG && Math.abs(b.velocidad) < REST_SNAP_VEL) {
      b.angulo = Math.PI / 2; b.velocidad = 0;
    }
  }

  function clampAngle(b) {
    // no pasar de la horizontal a cada lado (igual que el .py)
    if (b.angulo < 0 && b.angulo >= -Math.PI / 2) { b.angulo = 0;       b.velocidad = 0; }
    if (b.angulo > -Math.PI && b.angulo < -Math.PI / 2) { b.angulo = Math.PI; b.velocidad = 0; }
    if (b.angulo < 0) { b.angulo = 0; if (b.velocidad < 0) b.velocidad = 0; }
    if (b.angulo > Math.PI) { b.angulo = Math.PI; if (b.velocidad > 0) b.velocidad = 0; }
  }

  // Colisiones resueltas en ESPACIO DE ÁNGULOS (no por distancia entre centros). Las anclas son paralelas
  // y equiespaciadas 2·radio, así que dos vecinas se tocan exactamente cuando tienen el mismo ángulo, y la
  // condición de no-penetración de la cadena es simplemente θ_izq ≥ θ_der. La "penetración" es entonces
  // pen = θ_b − θ_a (>0 = cruzaron / se pisan). Esto evita el bug del test por distancia: cerca de la
  // horizontal, si la arrastrada se atrasaba se separaba en VERTICAL, la distancia superaba 2·radio y se
  // soltaba antes del tope. Con ángulos, arrastrar hasta el extremo funciona igual que abajo.
  function resolveCollisions(allowSwap) {
    if (ghosted) return;
    for (let iter = 0; iter < nroBalls + 2; iter++) {
      let changed = false;
      for (let i = 0; i < balls.length - 1; i++) {
        const a = balls[i], b = balls[i + 1];                                      // a a la izquierda, b a la derecha
        const pen = b.angulo - a.angulo;                                           // >ANG_EPS = se están pisando
        if (pen <= ANG_EPS) continue;
        // "rígida" = agarrada por el dedo, o ya arrastrada por la cadena agarrada en este frame. La rígida
        // arrastra a la vecina EN VIVO sin transmitirle velocidad: le clava su mismo ángulo y le deja vel 0.
        // Se propaga por la cadena (la arrastrada también queda rígida) ⇒ se levantan de a dos/tres/… sin
        // que ninguna se suelte.
        const aRigid = a.grabbed || a.pushed;
        const bRigid = b.grabbed || b.pushed;
        if (aRigid && !bRigid)      { b.angulo = a.angulo; setPos(b); b.velocidad = 0; b.pushed = true; changed = true; }
        else if (bRigid && !aRigid) { a.angulo = b.angulo; setPos(a); a.velocidad = 0; a.pushed = true; changed = true; }
        else if (!aRigid && !bRigid) {
          const mid = (a.angulo + b.angulo) * 0.5;                                 // separar a contacto exacto (mismo ángulo)
          a.angulo = mid; setPos(a);
          b.angulo = mid; setPos(b);
          changed = true;
          // choque de masas iguales: intercambio de velocidad, sólo si se acercan. Pero IMPERFECTO: cada
          // una se queda con una fracción RESIDUAL de su propia velocidad, así la cadena conserva un poco
          // de movimiento (sway suave) en vez de quedar perfectamente muerta.
          if (allowSwap && (b.velocidad - a.velocidad) > VEL_EPS) {
            const va = a.velocidad, vb = b.velocidad;
            a.velocidad = (vb * (1 - RESIDUAL) + va * RESIDUAL) * COLLISION_LOSS;
            b.velocidad = (va * (1 - RESIDUAL) + vb * RESIDUAL) * COLLISION_LOSS;
          }
        }
      }
      if (!changed) break;
    }
  }

  // ángulo del puntero respecto del ancla de la bola, mapeado al hemisferio inferior [0, π]
  function pointerAngle(b) {
    let ang = getangle(origX(b.nro), origY, mx, my);
    if (ang < 0 && ang >= -Math.PI / 2) ang = 0;
    else if (ang > -Math.PI && ang < -Math.PI / 2) ang = Math.PI;
    return ang;
  }

  function step(dtms) {
    const dt = dtms / 1000;

    // ── soltar: imprimir el impulso del arrastre (como el throw de Balls con mouseVx/Vy) ──
    // Se usa el flag `pushed` del frame ANTERIOR (todavía en las bolas) para que un grupo levantado
    // junto salga junto, todas con la misma velocidad angular. Por eso va ANTES del reset de `pushed`.
    if (!mDown && grabbedBall) {
      const fv = Math.max(-FLING_MAX, Math.min(FLING_MAX, flingVel));
      grabbedBall.velocidad = fv;
      for (const b of balls) if (b.pushed) b.velocidad = fv;
      grabbedBall = null;
    }

    for (const b of balls) b.pushed = false;                                       // se recalcula cada frame en resolveCollisions

    // ── agarre: una sola bola por vez y pegajosa (se mantiene hasta soltar el dedo) ──
    if (mDown && !grabbedBall) {
      for (const b of balls) {
        if (colisionRyp(b.x - radio, b.y - radio, radio * 2, radio * 2, mx, my)) {
          grabbedBall = b;
          flingVel = 0;
          b.angulo = pointerAngle(b); setPos(b);                                    // pegar al puntero sin spike de velocidad
          break;
        }
      }
    }

    for (const ball of balls) {
      ball.grabbed = (ball === grabbedBall);
      if (ball.grabbed) {
        const ang = pointerAngle(ball);
        const raw = (ang - ball.angulo) / dt;                                       // velocidad angular instantánea del arrastre
        const kf = 1 - Math.exp(-dt / FLING_TC);
        flingVel += (raw - flingVel) * kf;                                          // filtro paso-bajo (suaviza el jitter del puntero)
        ball.angulo = ang;
        ball.velocidad = 0;                                                         // mientras la sostenés no transmite; el impulso se aplica al soltar
      } else if (!holding) {
        integrate(ball, dt);
      }
      clampAngle(ball);
      setPos(ball);
    }
    // colisiones después de mover todo, para que el impulso se propague por la cadena
    resolveCollisions(!holding);
  }

  // ════════════════ DIBUJO ════════════════
  // path de rectángulo redondeado en un contexto cualquiera (sirve para el canvas principal y el de la escena)
  function rrp(c, x, y, w, h, rad) {
    rad = Math.min(rad, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + rad, y);
    c.arcTo(x + w, y, x + w, y + h, rad);
    c.arcTo(x + w, y + h, x, y + h, rad);
    c.arcTo(x, y + h, x, y, rad);
    c.arcTo(x, y, x + w, y, rad);
    c.closePath();
  }
  function rrPath(x, y, w, h, rad) { rrp(ctx, x, y, w, h, rad); }

  // ════════════════ ESCENA (habitación: pared + ventana grande + mesa) ════════════════
  // Se renderiza dos veces (día y noche) a canvas offscreen; el draw() crossfadea entre ambas.
  function buildScenes() {
    if (W <= 0 || H <= 0) return;
    sceneDay = renderScene(false);
    sceneNight = renderScene(true);
  }

  function renderScene(night) {
    const cv = document.createElement('canvas');
    cv.width  = Math.max(1, Math.floor(W * dpr));
    cv.height = Math.max(1, Math.floor(H * dpr));
    const s = cv.getContext('2d');
    s.setTransform(dpr, 0, 0, dpr, 0, 0);

    // ── PARED (de 0 hasta la mesa) ──
    let g = s.createLinearGradient(0, 0, 0, tableTop);
    if (night) { g.addColorStop(0, 'rgb(20,21,33)'); g.addColorStop(1, 'rgb(36,33,46)'); }
    else       { g.addColorStop(0, 'rgb(46,40,47)'); g.addColorStop(1, 'rgb(76,62,61)'); }
    s.fillStyle = g; s.fillRect(0, 0, W, tableTop);

    // ── VENTANA GRANDE (~3/4 de la pantalla, centrada detrás del péndulo) ──
    const winW = Math.min(W * 0.94, Math.max(W * 0.75, (frameRight - frameLeft) + radio * 8));
    const winTop = H * 0.05, winBottom = tableTop - radio * 0.4;
    drawWindow(s, centerX - winW / 2, winTop, winW, winBottom - winTop, night);

    // pool de luz que entra por la ventana — cálida de día, fría (luna) de noche
    const lg = s.createRadialGradient(centerX, H * 0.18, 0, centerX, H * 0.18, Math.max(W, H) * 0.7);
    if (night) { lg.addColorStop(0, 'rgba(150,172,230,0.10)'); lg.addColorStop(1, 'rgba(150,172,230,0)'); }
    else       { lg.addColorStop(0, 'rgba(255,226,170,0.16)'); lg.addColorStop(1, 'rgba(255,226,170,0)'); }
    s.fillStyle = lg; s.fillRect(0, 0, W, tableTop);

    // ── MESA: sólo el CANTO (franja de madera de tableTop al fondo) ──
    drawTableEdge(s, night);

    // sombra de contacto del péndulo sobre la tapa de la mesa
    const sw = (frameRight - frameLeft) + radio * 5;
    const csh = s.createRadialGradient(centerX, tableTop, 0, centerX, tableTop, sw * 0.5);
    csh.addColorStop(0, `rgba(0,0,0,${night ? 0.5 : 0.4})`); csh.addColorStop(1, 'rgba(0,0,0,0)');
    s.fillStyle = csh; s.save(); s.translate(0, tableTop); s.scale(1, 0.16);
    s.beginPath(); s.arc(centerX, 0, sw * 0.5, 0, TAU); s.fill(); s.restore();
    return cv;
  }

  // ventana grande con marco de madera, grilla de parteluces y vista (atardecer de día / cielo estrellado de noche)
  function drawWindow(s, x, y, w, h, night) {
    const fr = Math.max(6, radio * 0.5);                                            // grosor del marco
    // marco de madera (de noche, más oscuro)
    const frG = s.createLinearGradient(x, y, x, y + h);
    if (night) { frG.addColorStop(0, 'rgb(60,42,24)'); frG.addColorStop(1, 'rgb(34,24,14)'); }
    else       { frG.addColorStop(0, 'rgb(96,64,36)'); frG.addColorStop(1, 'rgb(56,36,18)'); }
    s.fillStyle = frG; rrp(s, x - fr * 0.4, y - fr * 0.4, w + fr * 0.8, h + fr * 0.8, fr * 0.6); s.fill();
    const gx = x + fr, gy = y + fr, gw = w - 2 * fr, gh = h - 2 * fr;
    // vidrio
    const gg = s.createLinearGradient(0, gy, 0, gy + gh);
    if (night) {
      gg.addColorStop(0, 'rgb(10,14,34)'); gg.addColorStop(0.6, 'rgb(22,26,54)'); gg.addColorStop(1, 'rgb(40,40,66)');
    } else {
      gg.addColorStop(0, 'rgb(96,128,168)'); gg.addColorStop(0.45, 'rgb(176,168,170)');
      gg.addColorStop(0.7, 'rgb(224,176,132)'); gg.addColorStop(1, 'rgb(196,128,96)');
    }
    s.fillStyle = gg; s.fillRect(gx, gy, gw, gh);

    if (night) {
      // estrellas (posiciones deterministas, sin Math.random para que no titilen al rearmar)
      s.fillStyle = 'rgba(255,255,255,0.85)';
      for (let i = 0; i < 36; i++) {
        const sx = gx + ((i * 73) % 100) / 100 * gw;
        const sy = gy + ((i * 149) % 100) / 100 * gh * 0.7;
        const r = 0.6 + ((i * 37) % 10) / 10 * 1.1;
        s.globalAlpha = 0.3 + ((i * 53) % 10) / 10 * 0.6;
        s.beginPath(); s.arc(sx, sy, r, 0, TAU); s.fill();
      }
      s.globalAlpha = 1;
      // luna + halo
      const mx = gx + gw * 0.7, my = gy + gh * 0.26, mr = gh * 0.13;
      const halo = s.createRadialGradient(mx, my, 0, mx, my, mr * 3);
      halo.addColorStop(0, 'rgba(220,230,255,0.4)'); halo.addColorStop(1, 'rgba(220,230,255,0)');
      s.fillStyle = halo; s.beginPath(); s.arc(mx, my, mr * 3, 0, TAU); s.fill();
      const mg = s.createRadialGradient(mx - mr * 0.3, my - mr * 0.3, 0, mx, my, mr);
      mg.addColorStop(0, 'rgb(245,248,255)'); mg.addColorStop(1, 'rgb(196,206,228)');
      s.fillStyle = mg; s.beginPath(); s.arc(mx, my, mr, 0, TAU); s.fill();
    } else {
      // sol bajo + resplandor
      const sun = s.createRadialGradient(gx + gw * 0.34, gy + gh * 0.62, 0, gx + gw * 0.34, gy + gh * 0.62, gh * 0.5);
      sun.addColorStop(0, 'rgba(255,238,200,0.95)'); sun.addColorStop(0.5, 'rgba(255,210,150,0.4)'); sun.addColorStop(1, 'rgba(255,210,150,0)');
      s.fillStyle = sun; s.fillRect(gx, gy, gw, gh);
    }

    // colinas lejanas
    s.fillStyle = night ? 'rgba(14,16,30,0.85)' : 'rgba(64,74,68,0.55)';
    s.beginPath(); s.moveTo(gx, gy + gh * 0.74);
    s.quadraticCurveTo(gx + gw * 0.3, gy + gh * 0.6, gx + gw * 0.55, gy + gh * 0.72);
    s.quadraticCurveTo(gx + gw * 0.8, gy + gh * 0.82, gx + gw, gy + gh * 0.68);
    s.lineTo(gx + gw, gy + gh); s.lineTo(gx, gy + gh); s.closePath(); s.fill();

    // parteluces (grilla, panes ~ cuadrados)
    const cols = Math.max(2, Math.round(gw / (gh * 0.55)));
    const rows = Math.max(2, Math.round(gh * cols / gw));
    s.strokeStyle = night ? 'rgb(46,32,18)' : 'rgb(74,50,28)'; s.lineWidth = Math.max(2, fr * 0.45);
    s.beginPath();
    for (let c = 1; c < cols; c++) { const px = gx + gw * c / cols; s.moveTo(px, gy); s.lineTo(px, gy + gh); }
    for (let r = 1; r < rows; r++) { const py = gy + gh * r / rows; s.moveTo(gx, py); s.lineTo(gx + gw, py); }
    s.stroke();
    // reflejo diagonal sutil en el vidrio
    s.strokeStyle = night ? 'rgba(180,200,255,0.06)' : 'rgba(255,255,255,0.10)'; s.lineWidth = Math.max(3, fr * 0.8);
    s.beginPath(); s.moveTo(gx + gw * 0.05, gy + gh * 0.55); s.lineTo(gx + gw * 0.5, gy + gh * 0.05); s.stroke();
    // alféizar
    s.fillStyle = night ? 'rgb(52,36,20)' : 'rgb(78,52,28)'; s.fillRect(x - fr, y + h - fr * 0.2, w + 2 * fr, fr * 1.1);
  }

  // mesa de madera proporcional (tapa + faldón con dos cajones + cuatro patas + estante)
  // Plano de cerca: sólo se ve el CANTO de la mesa (una franja de madera desde tableTop hasta el fondo).
  function drawTableEdge(s, night) {
    const DK = night ? 0.62 : 1;
    const g = s.createLinearGradient(0, tableTop, 0, H);
    g.addColorStop(0,    `rgb(${126*DK|0},${82*DK|0},${48*DK|0})`);                // canto superior, más iluminado
    g.addColorStop(0.10, `rgb(${100*DK|0},${64*DK|0},${36*DK|0})`);
    g.addColorStop(0.5,  `rgb(${76*DK|0},${48*DK|0},${26*DK|0})`);
    g.addColorStop(1,    `rgb(${44*DK|0},${27*DK|0},${14*DK|0})`);
    s.fillStyle = g; s.fillRect(0, tableTop, W, H - tableTop);
    // realce del canto superior (la arista donde apoya el péndulo)
    s.strokeStyle = night ? 'rgba(150,170,210,0.45)' : 'rgba(224,180,128,0.7)';
    s.lineWidth = Math.max(1.5, 1.4 * k);
    s.beginPath(); s.moveTo(0, tableTop + 1); s.lineTo(W, tableTop + 1); s.stroke();
    // vetas horizontales sutiles a lo largo del canto
    s.strokeStyle = 'rgba(18,8,4,0.28)'; s.lineWidth = Math.max(1, 0.6 * k);
    s.beginPath();
    for (const f of [0.32, 0.55, 0.78]) { const ly = tableTop + (H - tableTop) * f; s.moveTo(0, ly); s.lineTo(W, ly); }
    s.stroke();
  }

  // varilla de madera torneada (capsule): degradé perpendicular oscuro→lomo iluminado→oscuro = cilindro,
  // con vetas finas a lo largo y un brillo cálido suave sobre el lomo.
  function woodDowel(x, y, w, h) {
    const horizontal = w >= h;
    const rad = Math.min(w, h) / 2;
    const g = horizontal ? ctx.createLinearGradient(0, y, 0, y + h)
                         : ctx.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0,    'rgb(28,11,7)');
    g.addColorStop(0.12, 'rgb(66,26,16)');
    g.addColorStop(0.40, 'rgb(112,50,32)');
    g.addColorStop(0.5,  'rgb(138,66,44)');                                        // lomo iluminado (caoba)
    g.addColorStop(0.62, 'rgb(100,44,28)');
    g.addColorStop(0.86, 'rgb(56,22,13)');
    g.addColorStop(1,    'rgb(24,9,5)');
    rrPath(x, y, w, h, rad); ctx.fillStyle = g; ctx.fill();
    ctx.save(); rrPath(x, y, w, h, rad); ctx.clip();
    // vetas
    ctx.strokeStyle = 'rgba(20,6,3,0.4)'; ctx.lineWidth = Math.max(1, 0.5 * k);
    ctx.beginPath();
    for (const f of [0.3, 0.5, 0.68, 0.82]) {
      if (horizontal) { const ly = y + h * f; ctx.moveTo(x + rad, ly); ctx.lineTo(x + w - rad, ly); }
      else            { const lx = x + w * f; ctx.moveTo(lx, y + rad); ctx.lineTo(lx, y + h - rad); }
    }
    ctx.stroke();
    // brillo cálido sobre el lomo
    ctx.strokeStyle = 'rgba(206,132,98,0.42)'; ctx.lineWidth = Math.max(1, Math.min(w, h) * 0.07);
    ctx.beginPath();
    if (horizontal) { const ly = y + h * 0.42; ctx.moveTo(x + rad, ly); ctx.lineTo(x + w - rad, ly); }
    else            { const lx = x + w * 0.42; ctx.moveTo(lx, y + rad); ctx.lineTo(lx, y + h - rad); }
    ctx.stroke();
    ctx.restore();
  }

  // arco "∏" único y limpio: dos parantes + travesaño, todo en madera torneada. Parantes primero y el
  // travesaño encima, así la curva en las esquinas queda prolija.
  function drawArch() {
    const thk = radio * 0.32;
    woodDowel(frameLeft - thk / 2,  frameTop, thk, (baseY - frameTop) + thk);             // parante izq (entra en la base)
    woodDowel(frameRight - thk / 2, frameTop, thk, (baseY - frameTop) + thk);             // parante der
    woodDowel(frameLeft - thk / 2,  frameTop - thk / 2, (frameRight - frameLeft) + thk, thk); // travesaño
  }

  // collar de bronce donde el parante entra en la base
  function drawCollar(cx) {
    const w = radio * 0.74, h = radio * 0.42;
    const g = ctx.createLinearGradient(cx - w / 2, 0, cx + w / 2, 0);
    g.addColorStop(0,   'rgb(74,52,20)');
    g.addColorStop(0.5, 'rgb(214,176,98)');
    g.addColorStop(1,   'rgb(74,52,20)');
    rrPath(cx - w / 2, baseY - h * 0.55, w, h, h * 0.35); ctx.fillStyle = g; ctx.fill();
  }

  // base de madera maciza
  function drawBase() {
    const xL = frameLeft - radio * 2.4, xR = frameRight + radio * 2.4;
    const top = baseY, thk = radio * BASE_THK_K, w = xR - xL, rad = radio * 0.26;
    // sombra en el piso
    const sh = ctx.createLinearGradient(0, top + thk, 0, top + thk + radio * 1.2);
    sh.addColorStop(0, 'rgba(0,0,0,0.4)'); sh.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sh; ctx.fillRect(xL - radio, top + thk - 2, w + radio * 2, radio * 1.3);
    // cuerpo madera (cara iluminada arriba → canto oscuro abajo)
    const g = ctx.createLinearGradient(0, top, 0, top + thk);
    g.addColorStop(0,    'rgb(108,48,30)');
    g.addColorStop(0.16, 'rgb(78,32,20)');
    g.addColorStop(1,    'rgb(32,12,7)');
    rrPath(xL, top, w, thk, rad); ctx.fillStyle = g; ctx.fill();
    ctx.save(); rrPath(xL, top, w, thk, rad); ctx.clip();
    // sheen cálido en la cara superior (bisel)
    const gloss = ctx.createLinearGradient(0, top, 0, top + thk * 0.4);
    gloss.addColorStop(0, 'rgba(190,116,82,0.5)');
    gloss.addColorStop(1, 'rgba(190,116,82,0)');
    ctx.fillStyle = gloss; ctx.fillRect(xL, top, w, thk * 0.4);
    // vetas horizontales
    ctx.strokeStyle = 'rgba(20,6,3,0.32)'; ctx.lineWidth = Math.max(1, 0.6 * k);
    ctx.beginPath();
    for (const f of [0.42, 0.62, 0.8]) { const ly = top + thk * f; ctx.moveTo(xL + rad, ly); ctx.lineTo(xR - rad, ly); }
    ctx.stroke();
    // canto superior iluminado
    ctx.strokeStyle = 'rgba(212,140,104,0.6)'; ctx.lineWidth = Math.max(1, 1.0 * k);
    ctx.beginPath(); ctx.moveTo(xL + rad, top + 1); ctx.lineTo(xR - rad, top + 1); ctx.stroke();
    ctx.restore();
  }

  function drawFrame() {
    drawArch();                                                                    // arco cromado único
    drawBase();                                                                    // base por delante (tapa el pie de los parantes)
    drawCollar(frameLeft); drawCollar(frameRight);                                 // collares donde entran a la base
  }

  // hilos: cada bola cuelga de dos hilos abiertos en V hacia el travesaño; con un splay > radio los de
  // bolas vecinas se cruzan y arman la clásica red en X. Finos y con un dejo de brillo metálico.
  function drawStrings(ball) {
    const splay = radio * 1.15;
    const ax = origX(ball.nro), ay = frameTop;
    ctx.lineWidth = Math.max(1, 0.7 * k);
    ctx.strokeStyle = 'rgba(225,229,236,0.55)';
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(ax - splay, ay); ctx.lineTo(ball.x, ball.y);
    ctx.moveTo(ax + splay, ay); ctx.lineTo(ball.x, ball.y);
    ctx.stroke();
  }

  // sombra de contacto de la bola sobre la base (más marcada cuanto más cerca del reposo está)
  function drawBallShadow(ball) {
    const baseTop = baseY;
    const t = Math.max(0, Math.min(1, (ball.y - origY) / L));                      // 0 = arriba, 1 = en reposo
    const a = 0.4 * t * t;
    if (a < 0.02) return;
    ctx.save();
    ctx.fillStyle = `rgba(0,0,0,${a})`;
    ctx.beginPath();
    ctx.ellipse(ball.x, baseTop, radio * (0.7 + 0.4 * t), radio * 0.26, 0, 0, TAU);
    ctx.fill();
    ctx.restore();
  }

  function drawMetalBall(x, y, r) {
    // cuerpo metálico oscuro: highlight arriba-izquierda → medio → borde oscuro (fresnel)
    const hx = x - r * 0.4, hy = y - r * 0.42;
    const g = ctx.createRadialGradient(hx, hy, r * 0.06, hx, hy, r * 1.75);
    g.addColorStop(0,    STEEL.hi);
    g.addColorStop(0.22, STEEL.lite);
    g.addColorStop(0.5,  STEEL.mid);
    g.addColorStop(0.82, STEEL.lo);
    g.addColorStop(1,    STEEL.edge);
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.clip();
    ctx.fillStyle = g; ctx.fillRect(x - r, y - r, r * 2, r * 2);

    // rim-light: arco claro fino sobre el borde inferior-derecho (luz reflejada del ambiente)
    const rg = ctx.createRadialGradient(x, y, r * 0.78, x, y, r);
    rg.addColorStop(0, 'rgba(150,160,172,0)');
    rg.addColorStop(0.82, 'rgba(150,160,172,0)');
    rg.addColorStop(1, 'rgba(170,182,196,0.5)');
    ctx.fillStyle = rg; ctx.fillRect(x - r, y - r, r * 2, r * 2);

    // reflejo de rebote (luz del piso) abajo
    const bx = x + r * 0.18, by = y + r * 0.6;
    const g2 = ctx.createRadialGradient(bx, by, 0, bx, by, r * 0.8);
    g2.addColorStop(0, 'rgba(120,132,146,0.4)');
    g2.addColorStop(1, 'rgba(120,132,146,0)');
    ctx.fillStyle = g2; ctx.fillRect(x - r, y - r, r * 2, r * 2);
    ctx.restore();

    // hotspot especular nítido (núcleo blanco + halo)
    const sx = x - r * 0.36, sy = y - r * 0.44;
    const halo = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 0.34);
    halo.addColorStop(0, 'rgba(255,255,255,0.5)');
    halo.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(sx, sy, r * 0.34, 0, TAU); ctx.fill();
    const core = Math.max(1.2, r * 0.1);
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath(); ctx.arc(sx, sy, core, 0, TAU); ctx.fill();

    // contorno fino para despegar del fondo
    ctx.lineWidth = Math.max(1, 0.8 * k);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.arc(x, y, r - 0.4, 0, TAU); ctx.stroke();
  }

  function draw() {
    // fondo: crossfade día → noche
    if (sceneDay) ctx.drawImage(sceneDay, 0, 0, W, H);
    else ctx.clearRect(0, 0, W, H);
    if (sceneNight && nightFactor > 0.001) {
      ctx.globalAlpha = nightFactor; ctx.drawImage(sceneNight, 0, 0, W, H); ctx.globalAlpha = 1;
    }
    drawFrame();
    if (!ghosted) for (const ball of balls) drawBallShadow(ball);
    for (const ball of balls) drawStrings(ball);
    ctx.globalAlpha = ghosted ? 0.4 : 1;
    for (const ball of balls) drawMetalBall(ball.x, ball.y, radio);
    ctx.globalAlpha = 1;
    // veil frío de noche sobre TODO (incluye el péndulo) para que la luz cuaje con la escena
    if (nightFactor > 0.001) {
      ctx.fillStyle = `rgba(18,26,54,${nightFactor * 0.2})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // ════════════════ INPUT ════════════════
  let mx = 0, my = 0, mDown = false;
  function evtPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
  canvas.addEventListener('pointerdown', e => {
    canvas.setPointerCapture(e.pointerId);
    const p = evtPos(e); mx = p.x; my = p.y; mDown = true;
    hint.style.opacity = '0';
  });
  canvas.addEventListener('pointermove', e => { const p = evtPos(e); mx = p.x; my = p.y; });
  function endPointer() { mDown = false; }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ── botones (pointerdown, no click: responden aunque haya otro toque activo) ──
  function addBall()    { if (nroBalls < 10) { nroBalls++; buildBalls(); } }
  function removeBall() { if (nroBalls > 1)  { nroBalls--; buildBalls(); } }
  function reset()      { buildBalls(); }                                          // reconstruye en reposo, misma cantidad

  function holdable(el, fn) {
    let iv = null, pid = null;
    const stop = () => {
      if (iv) { clearInterval(iv); iv = null; }
      pid = null;
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', stop);
      document.removeEventListener('pointercancel', stop);
    };
    const onMove = e => {
      if (e.pointerId !== pid) return;
      const r = el.getBoundingClientRect();
      if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) stop();
    };
    const start = e => {
      e.preventDefault();
      pid = e.pointerId;
      try { el.releasePointerCapture(e.pointerId); } catch {}
      fn();
      iv = setInterval(fn, 220);
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', stop);
      document.addEventListener('pointercancel', stop);
    };
    el.addEventListener('pointerdown', start);
  }
  function tappable(el, fn) { el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); }); }

  holdable(document.getElementById('btnPlus'), addBall);
  holdable(document.getElementById('btnMinus'), removeBall);
  const btnGhost = document.getElementById('btnGhost');
  tappable(btnGhost, () => { ghosted = !ghosted; btnGhost.classList.toggle('on', ghosted); });
  const btnHold = document.getElementById('btnHold');
  tappable(btnHold, () => { holding = !holding; btnHold.classList.toggle('on', holding); });
  tappable(document.getElementById('btnReset'), reset);

  // ════════════════ LOOP (paso fijo) ════════════════
  let lastT = performance.now(), acc = 0;
  function frame(now) {
    if (typeof now !== 'number') now = performance.now();
    let elapsed = now - lastT; lastT = now;
    if (elapsed > 100) elapsed = 100;                                            // anti spiral-of-death tras un blur de ventana
    acc += elapsed;
    while (acc >= FIXED_DT) { step(FIXED_DT); acc -= FIXED_DT; }
    // ciclo día↔noche (independiente del péndulo): mesetas largas + transiciones suaves con smoothstep
    sceneClock += elapsed;
    const ph = (sceneClock / 1000 % NIGHT_PERIOD) / NIGHT_PERIOD;
    const ss = (a, b, x) => { x = Math.max(0, Math.min(1, (x - a) / (b - a))); return x * x * (3 - 2 * x); };
    nightFactor = ph < 0.42 ? 0 : ph < 0.50 ? ss(0.42, 0.50, ph) : ph < 0.92 ? 1 : 1 - ss(0.92, 1.0, ph);
    draw();
    requestAnimationFrame(frame);
  }

  // ── init ──
  const hint = document.getElementById('hint');
  resize();
  buildBalls();
  requestAnimationFrame(frame);
  setTimeout(() => hint.style.opacity = '0', 5000);
  </script>

  <!-- Shell del Arcade (exit + fullscreen + lock de orientación). data-orient: landscape/portrait/any. -->
  <script src="../../Arcade/arcade-shell.js" data-orient="landscape"></script>

  <div id="fpsOverlay">FPS: --</div>
  <script>
    (function() {
      let frameCount = 0, lastT = performance.now();
      let fpsOn = false;                                                            // estado real (no depender del display inline, que arranca vacío)
      const overlay = document.getElementById('fpsOverlay');
      function loop() {
        frameCount++;
        const now = performance.now();
        if (now - lastT >= 500) {
          const fps = Math.round(frameCount * 1000 / (now - lastT));
          if (fpsOn) overlay.textContent = 'FPS: ' + fps;
          frameCount = 0; lastT = now;
        }
        requestAnimationFrame(loop);
      }
      loop();
      const btn = document.getElementById('btnInfo');
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        fpsOn = !fpsOn;
        overlay.style.display = fpsOn ? 'block' : 'none';
        btn.classList.toggle('on', fpsOn);
      });
    })();
  </script>
