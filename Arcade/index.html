<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0d0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Arcade">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Arcade</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      background: #0d0e14;
      color: #e6e9ef;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
    }
    header {
      padding: 28px 20px 12px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 32px; font-weight: 700; letter-spacing: 0.22em;
      color: #ffffff;
    }
    .subtitle {
      margin-top: 6px;
      font-size: 12px; letter-spacing: 0.2em;
      color: #7d8493;
    }
    main {
      flex: 1; overflow-y: auto; padding: 16px 16px 4px;
      -webkit-overflow-scrolling: touch;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      max-width: 720px; margin: 0 auto;
    }
    .tile {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      background: linear-gradient(160deg, #1a1d28, #11131b);
      border: 1px solid #262a36;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 14px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.1s ease, border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .tile:active {
      transform: scale(0.96);
      border-color: #4a536b;
      background: linear-gradient(160deg, #20232f, #14161f);
    }
    .tile-art {
      width: 64%; height: auto; margin-bottom: 10px;
      display: block;
    }
    .tile-name {
      font-size: 15px; font-weight: 700; letter-spacing: 0.14em;
      color: #ffffff;
    }
    .tile-tag {
      font-size: 10px; color: #6a7185; margin-top: 4px; letter-spacing: 0.12em;
    }
    .tile.soon {
      opacity: 0.35;
      pointer-events: none;
      filter: grayscale(0.6);
    }
    .tile.soon .tile-name { color: #5a6273; }
    .empty-note {
      text-align: center;
      color: #4a525f;
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 24px 0;
    }
    footer {
      padding: 8px 20px 14px; text-align: center;
      font-size: 11px; color: #4a525f; letter-spacing: 0.1em;
    }
    footer a { color: #6a7185; text-decoration: none; }
    #installBtn {
      display: none;
      margin: 12px auto 0;
      padding: 10px 22px;
      border: 1px solid #4a536b;
      border-radius: 999px;
      background: linear-gradient(160deg, #1a1d28, #11131b);
      color: #ffd95a;
      font-size: 13px; font-weight: 700; letter-spacing: 0.16em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #installBtn:active { transform: scale(0.96); border-color: #ffd95a; }
    #installBtn.show { display: inline-block; }

    /* Reproductor (shell): el juego corre en un iframe a pantalla completa SIN navegar,
       así la Fullscreen API pedida en el tap del tile se mantiene toda la sesión (gana el
       notch y oculta la barra de estado). Cubre todo, sin safe-area, para full-bleed. */
    #player { position: fixed; inset: 0; z-index: 1000; display: none; background: #000; }
    #player.show { display: block; }
    #frame { width: 100%; height: 100%; border: 0; display: block; }

    /* Botón "salir de la app" (cierra la PWA). Sólo visible en el menú. */
    #exitApp {
      position: fixed; z-index: 50;
      top: calc(env(safe-area-inset-top) + 10px);
      right: calc(env(safe-area-inset-right) + 12px);
      width: 36px; height: 36px; border-radius: 50%; padding: 0;
      border: 1px solid #3a4154; background: rgba(20,22,30,0.82); color: #9aa3b6;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s, border-color 0.15s, color 0.15s;
    }
    #exitApp:active { transform: scale(0.92); border-color: #ff8a8e; color: #ff8a8e; }
    #exitApp svg { width: 18px; height: 18px; display: block; }

    /* Pantalla de entrada: el toque acá es el gesto que activa fullscreen al abrir la app
       (un gesto NO se puede simular por código — isTrusted/activation lo impiden). */
    #enter {
      position: fixed; inset: 0; z-index: 500; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: #0d0e14; color: #e6e9ef; text-align: center; padding: 24px;
    }
    #enter.hide { display: none; }
    #enter .et { font-size: 30px; font-weight: 700; letter-spacing: 0.24em; color: #fff; }
    #enter .es { font-size: 13px; letter-spacing: 0.24em; color: #7d8493; animation: blink 1.4s steps(2, start) infinite; }
    @keyframes blink { 50% { opacity: 0.25; } }
  </style>
</head>
<body>
  <!-- Pantalla de entrada (gesto inicial → fullscreen al abrir la app) -->
  <div id="enter">
    <div class="et">ARCADE</div>
    <div class="es">▶ TOCÁ PARA ENTRAR</div>
  </div>

  <button id="exitApp" aria-label="salir de la app" title="Salir de la app">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v9"/><path d="M6.4 6.4a8 8 0 1 0 11.2 0"/></svg>
  </button>

  <header>
    <h1>ARCADE</h1>
    <div class="subtitle">PROTOTIPOS</div>
    <button id="installBtn">⬇ INSTALAR APP</button>
  </header>

  <main>
    <div class="grid" id="grid">
      <!-- data-src: ruta del juego (se carga en el iframe) · data-orient: orientación forzada -->
      <a class="tile" href="../Pong/PongWeb/" data-src="../Pong/PongWeb/" data-orient="landscape">
        <svg class="tile-art" viewBox="0 0 100 70" aria-hidden="true">
          <rect x="50" y="0" width="1.5" height="70" fill="#262a36"/>
          <rect x="6"  y="20" width="6" height="30" rx="1.5" fill="#e6e9ef"/>
          <rect x="88" y="28" width="6" height="22" rx="1.5" fill="#e6e9ef"/>
          <circle cx="46" cy="38" r="4.5" fill="#ffd95a"/>
        </svg>
        <div class="tile-name">PONG</div>
        <div class="tile-tag">2P · IA</div>
      </a>
    </div>
    <div class="empty-note">más juegos próximamente</div>
  </main>

  <footer>v0.1 · prototipo</footer>

  <!-- Reproductor: el juego vive acá adentro (iframe creado por JS), sin navegar -->
  <div id="player"></div>

  <script>
    // Registrar service worker (necesario para que la PWA sea "instalable")
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // Instalación: Chrome ya no muestra banner automático. Capturamos el evento,
    // mostramos un botón propio y disparamos el prompt nativo al tocarlo.
    let deferredPrompt = null;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();            // evita el mini-infobar; lo controlamos nosotros
      deferredPrompt = e;
      installBtn.classList.add('show');
    });
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.classList.remove('show');
    });
    // Si ya está instalada (o se instala), ocultar el botón.
    window.addEventListener('appinstalled', () => installBtn.classList.remove('show'));

    // Salir de la app: en una PWA instalada (ventana de app) window.close() la cierra.
    // En una pestaña común el navegador no deja cerrarla por script y no pasa nada.
    document.getElementById('exitApp').addEventListener('click', () => {
      try { window.close(); } catch (e) {}
    });

    // ── ORIENTACIÓN + REPRODUCTOR (shell) ─────────────────────────────────────
    const player = document.getElementById('player');
    const root   = document.documentElement;
    let frame = null;   // se crea uno nuevo por juego y se destruye al salir

    function lockOrient(o) {
      try {
        if (screen.orientation && screen.orientation.lock) {
          const p = screen.orientation.lock(o);
          if (p && p.catch) p.catch(() => {});
        }
      } catch (e) {}
    }
    let entered = false;   // true tras tocar "ENTRAR" (gesto inicial de la app)

    // Pide Fullscreen API (si hace falta) y bloquea la orientación DESPUÉS de entrar.
    // CLAVE del bug de los "2 toques": llamar al lock de orientación de forma SÍNCRONA junto
    // al requestFullscreen hace que Chrome rechace el primer pedido. El lock va en el .then,
    // recién cuando ya estamos en fullscreen. (requestFullscreen sí debe ser síncrono dentro
    // del handler del gesto: un .then previo perdería la "user activation".)
    function enterFullscreenThen(orient) {
      if (document.fullscreenElement || !root.requestFullscreen) { lockOrient(orient); return Promise.resolve(); }
      let p; try { p = root.requestFullscreen(); } catch (e) { lockOrient(orient); return Promise.reject(e); }
      if (p && p.then) return p.then(() => lockOrient(orient), (e) => { lockOrient(orient); throw e; });
      lockOrient(orient); return Promise.resolve();
    }
    // volver de un juego (bfcache incl.) re-fija portrait, pero recién después de entrar
    window.addEventListener('pageshow', () => { if (entered && !player.classList.contains('show')) lockOrient('portrait'); });

    // Pantalla de entrada (gesto inicial, vía 'click' = gesto completo). Si el fullscreen es
    // rechazado, mostramos el motivo en el splash y podés volver a tocar para reintentar.
    const enterEl  = document.getElementById('enter');
    const enterMsg = enterEl.querySelector('.es');
    function enterApp() {
      enterFullscreenThen('portrait').then(
        () => { entered = true; enterEl.classList.add('hide'); },
        (e) => { enterMsg.textContent = 'FS: ' + ((e && (e.name + (e.message ? ' · ' + e.message : ''))) || e); }
      );
    }
    enterEl.addEventListener('click', enterApp);

    // Lanzar un juego: el TAP del tile es un gesto válido → pedimos Fullscreen API real
    // (gana el notch + oculta la barra de estado) y bloqueamos la orientación del juego.
    // Creamos un IFRAME NUEVO por juego: su carga inicial NO agrega entrada al historial
    // (cambiar .src de un iframe existente sí lo hace, y eso rompía el back en el 2º ciclo).
    function launch(src, orient) {
      // normalmente ya entramos a fullscreen en el splash → acá sólo fija la orientación;
      // si no (fallback), pide fullscreen y lockea después.
      enterFullscreenThen(orient || 'landscape').catch(() => {});
      frame = document.createElement('iframe');
      frame.id = 'frame';
      frame.allow = 'fullscreen; accelerometer; gyroscope; autoplay';
      frame.setAttribute('allowfullscreen', '');
      frame.src = src;
      player.appendChild(frame);
      player.classList.add('show');
      history.pushState({ arcadeGame: true }, '');   // el "atrás" de Android cierra el juego
    }
    function closeGame() {
      if (!player.classList.contains('show')) return;   // evita doble cierre
      player.classList.remove('show');
      if (frame) { frame.remove(); frame = null; }       // destruye el juego (y su historial)
      lockOrient('portrait');                            // menú vertical — NO salimos de fullscreen
    }

    // Cada tile con data-src lanza su juego (preventDefault del <a>, que queda de fallback
    // si se abre la página suelta sin la shell).
    document.getElementById('grid').addEventListener('click', (e) => {
      const tile = e.target.closest('.tile[data-src]');
      if (!tile) return;
      e.preventDefault();
      launch(tile.dataset.src, tile.dataset.orient);
    });

    // El juego pide salir (botón ✕ in-game) vía postMessage. Pasa por history.back para
    // compartir el camino con el botón "atrás" de Android (popstate → closeGame).
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'arcade:exit') {
        if (history.state && history.state.arcadeGame) history.back();
        else closeGame();
      }
    });
    window.addEventListener('popstate', () => { if (player.classList.contains('show')) closeGame(); });
  </script>
</body>
</html>
