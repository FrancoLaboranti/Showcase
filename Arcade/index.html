<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0d0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Arcade">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Arcade</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      background: #0d0e14;
      color: #e6e9ef;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
    }
    header {
      padding: 28px 20px 12px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 32px; font-weight: 700; letter-spacing: 0.22em;
      color: #ffffff;
    }
    .subtitle {
      margin-top: 6px;
      font-size: 12px; letter-spacing: 0.2em;
      color: #7d8493;
    }
    main {
      flex: 1; overflow-y: auto; padding: 16px 16px 4px;
      -webkit-overflow-scrolling: touch;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      max-width: 720px; margin: 0 auto;
    }
    .tile {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      background: linear-gradient(160deg, #1a1d28, #11131b);
      border: 1px solid #262a36;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 14px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.1s ease, border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .tile:active {
      transform: scale(0.96);
      border-color: #4a536b;
      background: linear-gradient(160deg, #20232f, #14161f);
    }
    .tile-art {
      width: 64%; height: auto; margin-bottom: 10px;
      display: block;
    }
    .tile .emoji { font-size: 44px; line-height: 1; margin-bottom: 8px; }
    .tile-name {
      font-size: 14px; font-weight: 700; letter-spacing: 0.1em;
      color: #ffffff; text-align: center;
    }
    .tile-tag {
      font-size: 10px; color: #6a7185; margin-top: 4px; letter-spacing: 0.12em;
    }
    .tile.soon {
      opacity: 0.35;
      pointer-events: none;
      filter: grayscale(0.6);
    }
    .tile.soon .tile-name { color: #5a6273; }
    .empty-note {
      text-align: center;
      color: #4a525f;
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 24px 0;
    }
    footer {
      padding: 8px 20px 14px; text-align: center;
      font-size: 11px; color: #4a525f; letter-spacing: 0.1em;
    }
    footer a { color: #6a7185; text-decoration: none; }
    #installBtn {
      display: none;
      margin: 12px auto 0;
      padding: 10px 22px;
      border: 1px solid #4a536b;
      border-radius: 999px;
      background: linear-gradient(160deg, #1a1d28, #11131b);
      color: #ffd95a;
      font-size: 13px; font-weight: 700; letter-spacing: 0.16em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #installBtn:active { transform: scale(0.96); border-color: #ffd95a; }
    #installBtn.show { display: inline-block; }

    /* Reproductor (shell): el juego corre en un iframe a pantalla completa SIN navegar,
       así la Fullscreen API pedida en el tap del tile se mantiene toda la sesión (gana el
       notch y oculta la barra de estado). Cubre todo, sin safe-area, para full-bleed. */
    #player { position: fixed; inset: 0; z-index: 1000; display: none; background: #000; }
    #player.show { display: block; }
    #frame { width: 100%; height: 100%; border: 0; display: block; }
    /* Juego landscape SIN rotar el dispositivo: el aparato queda en portrait (no rota → cero
       flashes) y rotamos el iframe 90° por CSS, dándole tamaño landscape. Sostenés el celu de
       costado. El juego adentro ve un viewport landscape; los toques se mapean solos por el
       transform. (translateX(100vw)+rotate(90deg) con origen 0,0 hace calzar exacto la pantalla.) */
    @media (orientation: portrait) {
      #frame.landscape {
        position: absolute; top: 0; left: 0;
        width: 100vh; height: 100vw;
        transform-origin: 0 0;
        transform: translateX(100vw) rotate(90deg);
      }
    }

    /* Botón "salir de la app" (cierra la PWA). Sólo visible cuando estamos en PWA instalada
       (display-mode: standalone/fullscreen). En pestaña del browser window.close() está
       bloqueado por Chrome, así que el botón no tendría función — se oculta para evitar
       confusión. El usuario cierra la pestaña con la ✕ del browser como cualquier otra web. */
    #exitApp {
      position: fixed; z-index: 50;
      top: calc(env(safe-area-inset-top) + 10px);
      right: calc(env(safe-area-inset-right) + 12px);
      width: 36px; height: 36px; border-radius: 50%; padding: 0;
      border: 1px solid #3a4154; background: rgba(20,22,30,0.82); color: #9aa3b6;
      display: none; align-items: center; justify-content: center; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s, border-color 0.15s, color 0.15s;
    }
    @media (display-mode: standalone), (display-mode: fullscreen), (display-mode: minimal-ui) {
      #exitApp { display: flex; }
    }
    #exitApp:active { transform: scale(0.92); border-color: #ff8a8e; color: #ff8a8e; }
    #exitApp svg { width: 18px; height: 18px; display: block; }

    /* Pantalla de entrada: el toque acá es el gesto que activa fullscreen al abrir la app
       (un gesto NO se puede simular por código — isTrusted/activation lo impiden). */
    #enter {
      position: fixed; inset: 0; z-index: 500; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: #0d0e14; color: #e6e9ef; text-align: center; padding: 24px;
    }
    #enter.hide { display: none; }
    #enter .et { font-size: 30px; font-weight: 700; letter-spacing: 0.24em; color: #fff; }
    #enter .es { font-size: 13px; letter-spacing: 0.24em; color: #7d8493; animation: blink 1.4s steps(2, start) infinite; }
    #enter .ev { margin-top: 20px; font-size: 11px; letter-spacing: 0.22em; color: #4a525f; }
    @keyframes blink { 50% { opacity: 0.25; } }
  </style>
</head>
<body>
  <!-- Pantalla de entrada (gesto inicial → fullscreen al abrir la app) -->
  <div id="enter">
    <div class="et">ARCADE</div>
    <div class="es">▶ TOCÁ PARA ENTRAR</div>
    <div class="ev" id="splashVer"></div>
  </div>

  <button id="exitApp" aria-label="salir de la app" title="Salir de la app">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v9"/><path d="M6.4 6.4a8 8 0 1 0 11.2 0"/></svg>
  </button>

  <header>
    <h1>ARCADE</h1>
    <div class="subtitle">PROTOTIPOS</div>
    <button id="installBtn">⬇ INSTALAR APP</button>
  </header>

  <main>
    <div class="grid" id="grid"><!-- tiles generadas por JS (ver GAMES) --></div>
  </main>

  <footer id="footerVer"></footer>

  <!-- Reproductor: el juego vive acá adentro (iframe creado por JS), sin navegar -->
  <div id="player"></div>

  <script>
    // Versión visible (splash + footer). SUBIR este número en cada update → permite confirmar
    // de un vistazo si la PWA tomó el último deploy (Android cachea fuerte).
    const VERSION = 'v1.0';
    { const sv = document.getElementById('splashVer'); if (sv) sv.textContent = VERSION;
      const fv = document.getElementById('footerVer'); if (fv) fv.textContent = VERSION + ' · prototipo'; }

    // Catálogo de juegos: [emoji, nombre, ruta (relativa a /Arcade/), orientación].
    // 'landscape' rota el iframe por CSS (sostenés el celu de costado); 'portrait' = normal.
    const GAMES = [
      ['🔮', 'Canicas',      'Balls/BallsWeb/',                 'portrait'],
      ['♟️', 'Ajedrez',       'Chess/ChessWeb/',                 'portrait'],
      ['🕐', 'Reloj',         'Clock/ClockWeb/',                 'portrait'],
      ['🚜', 'Crazy Tanks',   'CrazyTanks/CrazyTanksWeb/',       'landscape'],
      ['🎆', 'Fuegos',        'Fireworks/FireworksWeb/',         'portrait'],
      ['🎇', 'Fuegos V2',     'FireworksV2/FireworksV2Web/',     'landscape'],
      ['🔤', 'Ahorcado',      'Hangman/HangmanWeb/',             'portrait'],
      ['💣', 'Buscaminas',    'MineSweeperGPT/MineSweeperWeb/',  'portrait'],
      ['⚪', 'Mini Canicas',  'MiniBalls/MiniBallsWeb/',         'portrait'],
      ['🌀', 'Péndulo',       "Newton's Cradle/NewtonsCradleWeb/", 'landscape'],
      ['🃏', 'Póker',         'Poker/PokerWeb/',                 'landscape'],
      ['🏓', 'Pong',          'Pong/PongWeb/',                   'landscape'],
      ['🎵', 'Simón Dice',    'SimonSays/SimonSaysWeb/',         'portrait'],
      ['🐍', 'Snake',         'Snake/SnakeWeb/',                 'portrait'],
      ['💥', 'Tank Wars',     'TankWARS/TankWARSWeb/',           'landscape'],
      ['❌', 'Ta-Te-Ti',      'Tateti/TatetiWeb/',               'portrait'],
      ['🏍️', 'Tron',          'Tron/TronWeb/',                   'portrait'],
      ['🏍️', 'Tron V2',       'TronV2/TronV2Web/',               'landscape'],
    ];
    {
      const grid = document.getElementById('grid');
      for (const [ico, name, path, orient] of GAMES) {
        const src = encodeURI('../' + path);   // codifica el espacio de "Newton's Cradle"
        const a = document.createElement('a');
        a.className = 'tile';
        a.href = src;                            // fallback si se abre suelto (sin la shell)
        a.dataset.src = src;
        a.dataset.orient = orient;
        a.innerHTML = '<span class="emoji">' + ico + '</span><span class="tile-name">' + name + '</span>';
        grid.appendChild(a);
      }
    }

    // Registrar service worker (necesario para que la PWA sea "instalable")
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    // Instalación: Chrome ya no muestra banner automático. Capturamos el evento,
    // mostramos un botón propio y disparamos el prompt nativo al tocarlo.
    let deferredPrompt = null;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();            // evita el mini-infobar; lo controlamos nosotros
      deferredPrompt = e;
      installBtn.classList.add('show');
    });
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.classList.remove('show');
    });
    // Si ya está instalada (o se instala), ocultar el botón.
    window.addEventListener('appinstalled', () => installBtn.classList.remove('show'));

    // Salir de la app. window.close() cierra la PWA SIEMPRE QUE no haya historial de
    // navegación — por eso los juegos NO usan pushState (ver launch/closeGame), así el
    // historial queda en 1 y este botón siempre puede cerrar la app. El botón sólo se
    // muestra en PWA instalada (ver CSS @media display-mode arriba), así que en pestaña
    // del browser no se llega a clickear.
    document.getElementById('exitApp').addEventListener('click', () => {
      try { window.close(); } catch (e) {}
    });

    // ── ORIENTACIÓN + REPRODUCTOR (shell) ─────────────────────────────────────
    const player = document.getElementById('player');
    const root   = document.documentElement;
    let frame = null;   // se crea uno nuevo por juego y se destruye al salir

    function lockOrient(o) {
      try {
        if (screen.orientation && screen.orientation.lock) {
          const p = screen.orientation.lock(o);
          if (p && p.catch) p.catch(() => {});
        }
      } catch (e) {}
    }
    // Lock portrait CON REINTENTOS: al pasar a fullscreen DESDE landscape, en varios Android el
    // lock se rechaza al primer intento. Reintentamos unas veces; si igual falla, lo mostramos
    // en el footer (para diagnosticar). En éxito no toca el footer.
    function lockPortrait(tries) {
      tries = tries || 0;
      let p;
      try { p = (screen.orientation && screen.orientation.lock) ? screen.orientation.lock('portrait') : null; }
      catch (e) { showLockErr(e && e.name || e); return; }
      if (p && p.then) p.then(null, (e) => {
        if (tries < 5) setTimeout(() => lockPortrait(tries + 1), 180);
        else showLockErr((e && e.name) || e);
      });
    }
    function showLockErr(msg) {
      const fv = document.getElementById('footerVer');
      if (fv) fv.textContent = VERSION + ' · lock✗ ' + msg;
    }
    let entered = false;   // true tras tocar "ENTRAR" (gesto inicial de la app)

    // La pantalla de entrada (y el menú) van en VERTICAL. En la PWA instalada Android Chrome
    // permite fijar la orientación al cargar sin gesto; en pestaña falla en silencio. Esto va
    // en la carga (no junto al requestFullscreen del toque), así no reintroduce el bug de 2 toques.
    lockOrient('portrait');

    // Sólo Fullscreen API (notch + barra de estado). La orientación del DISPOSITIVO NO cambia:
    // queda en portrait fijo (lock arriba). Los juegos landscape se rotan por CSS (clase
    // .landscape al iframe en launch), no rotando el aparato → cero flashes de orientación.
    function requestFs() {
      if (document.fullscreenElement || !root.requestFullscreen) return Promise.resolve();
      let p; try { p = root.requestFullscreen(); } catch (e) { return Promise.reject(e); }
      return (p && p.then) ? p : Promise.resolve();
    }
    // volver de un juego (bfcache incl.) re-asegura portrait (no-op si ya está → sin flash)
    window.addEventListener('pageshow', () => { if (entered && !player.classList.contains('show')) lockOrient('portrait'); });

    // Pantalla de entrada (gesto inicial, vía 'click' = gesto completo). Si el fullscreen es
    // rechazado, mostramos el motivo en el splash y podés volver a tocar para reintentar.
    const enterEl  = document.getElementById('enter');
    const enterMsg = enterEl.querySelector('.es');
    function enterApp() {
      // El splash SIEMPRE se cierra al primer click — entrar al menú no debe depender de que
      // el browser acepte fullscreen (en desktop suele fallar silenciosamente sin causa visible
      // para el usuario, y mantenerlo trabado en el splash es UX rota). Lock + FS son best-effort.
      entered = true;
      enterEl.classList.add('hide');
      requestFs().then(lockPortrait, (e) => {
        // Diagnóstico opcional en el footer (no bloquea al usuario)
        const fv = document.getElementById('footerVer');
        if (fv && e) fv.textContent = VERSION + ' · FS✗ ' + ((e.name || e) + '');
      });
    }
    enterEl.addEventListener('click', enterApp);

    // Lanzar un juego: el TAP del tile es un gesto válido → pedimos Fullscreen API real
    // (gana el notch + oculta la barra de estado) y bloqueamos la orientación del juego.
    // Creamos un IFRAME NUEVO por juego (su carga inicial no agrega entrada al historial) y
    // NO usamos pushState: así el historial queda en 1 y el botón "salir de la app" siempre
    // puede cerrar la PWA. Contrapartida elegida: el botón atrás del cel dentro de un juego
    // cierra la app (para volver al menú se usa la ✕ del juego).
    function launch(src, orient) {
      requestFs().catch(() => {});   // fullscreen para el notch; el aparato NO rota (portrait fijo)
      frame = document.createElement('iframe');
      frame.id = 'frame';
      frame.allow = 'fullscreen; accelerometer; gyroscope; autoplay';
      frame.setAttribute('allowfullscreen', '');
      // Juego landscape → rotación por CSS (no se rota el dispositivo). Portrait → normal.
      if (orient === 'landscape') frame.classList.add('landscape');
      // cache-buster: el juego carga siempre su última versión (evita caché vieja tras deploy).
      frame.src = src + (src.indexOf('?') >= 0 ? '&' : '?') + 't=' + Date.now();
      player.appendChild(frame);
      player.classList.add('show');
    }
    function closeGame() {
      if (!player.classList.contains('show')) return;   // evita doble cierre
      player.classList.remove('show');
      if (frame) { frame.remove(); frame = null; }       // destruye el juego
      lockOrient('portrait');                            // menú vertical
    }

    // Cada tile con data-src lanza su juego (preventDefault del <a>, que queda de fallback
    // si se abre la página suelta sin la shell).
    document.getElementById('grid').addEventListener('click', (e) => {
      const tile = e.target.closest('.tile[data-src]');
      if (!tile) return;
      e.preventDefault();
      launch(tile.dataset.src, tile.dataset.orient);
    });

    // Mensajes del juego embebido:
    //  • arcade:exit       → cerrar el reproductor (volver al menú)
    //  • arcade:fullscreen → toggle del fullscreen real (lo maneja la shell, no el iframe)
    window.addEventListener('message', (e) => {
      if (!e.data) return;
      if (e.data.type === 'arcade:exit') { closeGame(); return; }
      if (e.data.type === 'arcade:fullscreen') {
        if (document.fullscreenElement) { try { document.exitFullscreen(); } catch (x) {} }
        else if (root.requestFullscreen) { try { const p = root.requestFullscreen(); if (p && p.catch) p.catch(() => {}); } catch (x) {} }
      }
    });
    // Al (re)entrar a fullscreen, re-fijar portrait (el lock sólo agarra confiable en fullscreen,
    // y un toggle pudo soltarlo). Además avisamos al juego el estado para que sincronice el ícono.
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) lockPortrait();
      if (frame && frame.contentWindow) {
        try { frame.contentWindow.postMessage({ type: 'arcade:fs-state', on: !!document.fullscreenElement }, '*'); } catch (x) {}
      }
    });
  </script>
</body>
</html>
